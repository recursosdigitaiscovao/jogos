<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo dos Jogos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f0f5fa;    
            --body-bg: #e9f1f8;       
            --primary-red: #E63946;
            --text-grey: #7a8b9a;
        }

        /* Bloqueio total de scroll */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        html, body { height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        body { 
            background-color: var(--body-bg); 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER COMPACTO */
        header { 
            background: var(--header-bg); 
            padding: 8px 15px; 
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .header-center { display: flex; align-items: center; justify-content: center; gap: 8px; }
        #header-icon { height: 40px; width: auto; }
        .title-main { font-weight: 900; font-size: 1rem; text-transform: uppercase; line-height: 1; }
        #txt-titulo1 { color: var(--primary-red); }
        #txt-titulo2 { color: #a5b4c4; }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.6rem; }

        /* INTRO */
        .sub-header { 
            background: white; 
            text-align: center; 
            padding: 5px; 
            border-bottom-left-radius: 20px; 
            border-bottom-right-radius: 20px; 
            flex-shrink: 0;
        }
        .intro-text { color: #5d7082; font-size: 0.8rem; font-weight: 800; }

        /* ÁREA CENTRAL - Ajuste Dinâmico */
        main { 
            flex: 1; 
            padding: 10px; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0; /* Importante para o flex encolher */
        }

        .game-wrapper { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr); /* 3 linhas para caber tudo sem scroll */
            gap: 8px;
            width: 100%;
            height: 100%;
            max-width: 500px;
        }

        /* CARTÕES COLORIDOS */
        .game-card { 
            border-radius: 18px; 
            border: 3px solid #fff; 
            text-decoration: none; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* O 5º item ocupa a linha de baixo toda para manter proporção */
        .game-card:last-child {
            grid-column: span 2;
        }

        .card-img-container { 
            flex: 1; /* Faz a imagem ocupar o máximo de espaço disponível */
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.2);
            min-height: 0;
        }
        
        .card-img-container img { 
            max-height: 85%; 
            max-width: 85%; 
            object-fit: contain;
        }

        .game-card h2 { 
            color: white; 
            font-size: 0.85rem; 
            font-weight: 900; 
            text-align: center;
        }

        /* RODAPÉ */
        footer { 
            padding: 5px; 
            text-align: center; 
            color: var(--text-grey); 
            font-size: 0.6rem; 
            font-weight: 700; 
            flex-shrink: 0;
        }

        /* DESKTOP / TABLET */
        @media (min-width: 768px) {
            header { padding: 15px; }
            #header-icon { height: 60px; }
            .title-main { font-size: 1.6rem; }
            .title-sub { font-size: 0.8rem; }
            .intro-text { font-size: 1.1rem; }
            .game-wrapper { 
                grid-template-columns: repeat(5, 1fr); 
                grid-template-rows: 1fr;
                max-width: 1100px;
                height: 350px;
            }
            .game-card:last-child { grid-column: span 1; }
            .game-card h2 { font-size: 1.1rem; }
            footer { font-size: 0.8rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1"></span> 
                    <span id="txt-titulo2"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;

                document.getElementById('txt-titulo1').textContent = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').textContent = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').textContent = config.textos.subtitulo;
                document.getElementById('txt-intro').textContent = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.logo;

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const tema = config.temaCores[jogo.tema] || { borda: "#FFFFFF", fundo: "#5ba4e5" };
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.backgroundColor = tema.fundo;
                    card.style.borderColor = tema.borda;

                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
