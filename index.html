<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recursos Digitais - Galeria de Jogos</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Impede scroll global */
        }

        /* Header IGUAL ao Footer */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 10px 15px;
            text-align: center;
            color: #7f8c8d;
            border-bottom: 1px solid #ddd; /* Linha igual ao footer */
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.1rem;
            color: #2c3e50;
            display: inline-block;
        }

        header strong {
            color: #ff6b81;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-left: 5px;
        }

        /* Contentor Principal Flexível */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 0;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 900px;
            /* Garante que a grelha não ultrapasse a altura disponível */
            max-height: 100%; 
        }

        .btn-menu {
            text-decoration: none;
            border-radius: 18px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 3px solid white;
            /* Altura adaptável para caber no ecrã */
            height: clamp(80px, 15vh, 150px); 
        }

        /* Cores e Sombras 3D */
        .btn-pre { background-color: #ffb3c6; box-shadow: 0 5px 0 #e691a7; }
        .btn-1   { background-color: #ffbe76; box-shadow: 0 5px 0 #e6a75a; }
        .btn-2   { background-color: #55efc4; box-shadow: 0 5px 0 #45cfa8; }
        .btn-3   { background-color: #74b9ff; box-shadow: 0 5px 0 #5ea2e6; }
        .btn-4   { background-color: #a29bfe; box-shadow: 0 5px 0 #8a81e6; }

        .btn-menu:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .icon {
            font-size: clamp(1.8rem, 6vh, 3rem);
            margin-bottom: 5px;
        }

        .ano-texto {
            font-size: 0.85rem;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Footer */
        footer {
            width: 100%;
            padding: 10px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        footer strong {
            color: #2c3e50;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .menu-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .btn-pre { 
                grid-column: span 2; 
                height: clamp(60px, 12vh, 100px);
                flex-direction: row;
                gap: 15px;
            }
        }

        /* Landscape Mobile */
        @media (max-height: 450px) {
            header, footer { padding: 5px; font-size: 0.7rem; }
            header h1 { font-size: 0.9rem; }
            .menu-container { grid-template-columns: repeat(5, 1fr); gap: 8px; }
            .btn-pre { grid-column: span 1; flex-direction: column; gap: 0; }
            .btn-menu { height: clamp(60px, 60vh, 120px); padding: 5px; }
            .icon { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Galeria de Jogos</h1>
        <strong>Aventura!</strong>
    </header>

    <main>
        <nav class="menu-container">
            <a href="https://recursosdigitaiscovao.github.io/jogos/pre" class="btn-menu btn-pre">
                <span class="icon">🦒</span>
                <span class="ano-texto">PRÉ-ESCOLAR</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/1" class="btn-menu btn-1">
                <span class="icon">🐥</span>
                <span class="ano-texto">1º ANO</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/2" class="btn-menu btn-2">
                <span class="icon">🐢</span>
                <span class="ano-texto">2º ANO</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/3" class="btn-menu btn-3">
                <span class="icon">🦊</span>
                <span class="ano-texto">3º ANO</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/4" class="btn-menu btn-4">
                <span class="icon">👨‍🚀</span>
                <span class="ano-texto">4º ANO</span>
            </a>
        </nav>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

</body>
</html>
