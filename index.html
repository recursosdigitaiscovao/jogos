<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recursos Digitais - Galeria de Jogos</title>
    <style>
        /* Reset e Estilo Base */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Cabeçalho Melhorado */
        header {
            width: 100%;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-bottom: 6px solid #ffb3c6;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        .subtitle {
            margin-top: 10px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            opacity: 0.9;
            font-weight: 300;
        }

        /* Container de Navegação */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 95%;
            max-width: 1100px;
            padding: 20px;
            margin-bottom: 40px;
        }

        /* Botões Estilo Card 3D */
        .btn-menu {
            text-decoration: none;
            border-radius: 25px;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 4px solid white;
            position: relative;
            overflow: hidden;
        }

        /* Cores e Sombras 3D específicas */
        .btn-pre { background-color: #ffb3c6; box-shadow: 0 8px 0 #e691a7; }
        .btn-1   { background-color: #ffbe76; box-shadow: 0 8px 0 #e6a75a; }
        .btn-2   { background-color: #55efc4; box-shadow: 0 8px 0 #45cfa8; }
        .btn-3   { background-color: #74b9ff; box-shadow: 0 8px 0 #5ea2e6; }
        .btn-4   { background-color: #a29bfe; box-shadow: 0 8px 0 #8a81e6; }

        .btn-menu:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        @media (hover: hover) {
            .btn-menu:hover {
                transform: translateY(-5px);
                filter: brightness(1.05);
            }
        }

        /* Ícones e Texto */
        .icon {
            font-size: clamp(3rem, 10vw, 4.5rem);
            margin-bottom: 15px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        .ano-texto {
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Footer */
        footer {
            margin-top: auto;
            width: 100%;
            padding: 25px;
            background-color: #fff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
        }

        footer strong {
            color: #2c3e50;
            border-bottom: 2px solid #ffb3c6;
        }

        /* Ajustes para ecrãs pequenos */
        @media (max-width: 480px) {
            .menu-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .btn-pre { grid-column: span 2; } /* Destaque para o pré no mobile */
        }

        /* Ajustes para modo paisagem em telemóveis */
        @media (max-height: 500px) and (orientation: landscape) {
            header { padding: 15px; margin-bottom: 15px; }
            .menu-container { grid-template-columns: repeat(5, 1fr); gap: 10px; }
            .icon { font-size: 2.2rem; margin-bottom: 5px; }
            .ano-texto { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Galeria de Jogos</h1>
        <p class="subtitle">Aprender é a maior aventura!</p>
    </header>

    <nav class="menu-container">
        <a href="https://recursosdigitaiscovao.github.io/jogos/pre" class="btn-menu btn-pre">
            <span class="icon">🦒</span>
            <span class="ano-texto">PRÉ-ESCOLAR</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/1" class="btn-menu btn-1">
            <span class="icon">🐥</span>
            <span class="ano-texto">1º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/2" class="btn-menu btn-2">
            <span class="icon">🐢</span>
            <span class="ano-texto">2º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/3" class="btn-menu btn-3">
            <span class="icon">🦊</span>
            <span class="ano-texto">3º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/4" class="btn-menu btn-4">
            <span class="icon">👨‍🚀</span>
            <span class="ano-texto">4º ANO</span>
        </a>
    </nav>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

</body>
</html>
