<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recursos Digitais - Galeria de Jogos</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Cabeçalho Compacto e Branco */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 10px; /* Altura reduzida */
            text-align: center;
            color: #2c3e50;
            border-bottom: 3px solid #ffb3c6; /* Linha rosa sutil */
            margin-bottom: 20px; /* Menos espaço antes dos botões */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.4rem, 5vw, 2rem);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            margin-top: 5px;
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: 400;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 95%;
            max-width: 1000px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .btn-menu {
            text-decoration: none;
            border-radius: 20px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 3px solid white;
            position: relative;
        }

        /* Cores e Sombras 3D */
        .btn-pre { background-color: #ffb3c6; box-shadow: 0 6px 0 #e691a7; }
        .btn-1   { background-color: #ffbe76; box-shadow: 0 6px 0 #e6a75a; }
        .btn-2   { background-color: #55efc4; box-shadow: 0 6px 0 #45cfa8; }
        .btn-3   { background-color: #74b9ff; box-shadow: 0 6px 0 #5ea2e6; }
        .btn-4   { background-color: #a29bfe; box-shadow: 0 6px 0 #8a81e6; }

        .btn-menu:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        .icon {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            margin-bottom: 10px;
            filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.1));
        }

        .ano-texto {
            font-size: 1rem;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        footer {
            margin-top: auto;
            width: 100%;
            padding: 15px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.85rem;
        }

        footer strong {
            color: #2c3e50;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .menu-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .btn-pre { grid-column: span 2; padding: 15px; }
        }

        /* Landscape Mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            header { padding: 8px; margin-bottom: 10px; }
            .subtitle { display: none; }
            .menu-container { grid-template-columns: repeat(5, 1fr); }
            .icon { font-size: 1.8rem; margin-bottom: 5px; }
            .ano-texto { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Galeria de Jogos</h1>
        <p class="subtitle">Escolhe a tua etapa!</p>
    </header>

    <nav class="menu-container">
        <a href="https://recursosdigitaiscovao.github.io/jogos/pre" class="btn-menu btn-pre">
            <span class="icon">🦒</span>
            <span class="ano-texto">PRÉ-ESCOLAR</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/1" class="btn-menu btn-1">
            <span class="icon">🐥</span>
            <span class="ano-texto">1º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/2" class="btn-menu btn-2">
            <span class="icon">🐢</span>
            <span class="ano-texto">2º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/3" class="btn-menu btn-3">
            <span class="icon">🦊</span>
            <span class="ano-texto">3º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/4" class="btn-menu btn-4">
            <span class="icon">👨‍🚀</span>
            <span class="ano-texto">4º ANO</span>
        </a>
    </nav>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

</body>
</html>
