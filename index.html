<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Digitais - Galeria de Jogos</title>
    <style>
        /* Cores Mais Limpas e Fundo Claro */
        body {
            background-color: #f4f7f6; /* Cinza muito claro, descansa a vista */
            color: #333; /* Texto quase preto */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        /* Contentor dos Menus */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 colunas */
            gap: 30px;
            max-width: 800px;
            width: 100%;
        }

        /* Estilo Base dos Botões (Cards) */
        .btn-menu {
            text-decoration: none;
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column; /* Imagem/Emoji em cima, texto em baixo */
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid transparent;
        }

        /* Efeito ao passar o rato (Hover) */
        .btn-menu:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }

        /* Tamanho do Emoji/Imagem */
        .icon {
            font-size: 4rem; /* Emoji bem grande */
            margin-bottom: 15px;
        }

        /* Tamanho do Texto do Ano */
        .ano-texto {
            font-size: 1.5rem;
            font-weight: bold;
            color: white; /* Texto branco dentro dos botões coloridos */
        }

        /* --- Cores Individuais para cada Ano (Apelativas) --- */
        
        /* 1º Ano - Amarelo/Laranja (Energia) */
        .btn-1 {
            background-color: #f39c12;
        }
        .btn-1:hover { border-color: #e67e22; }

        /* 2º Ano - Verde (Crescimento) */
        .btn-2 {
            background-color: #27ae60;
        }
        .btn-2:hover { border-color: #219150; }

        /* 3º Ano - Azul (Conhecimento) */
        .btn-3 {
            background-color: #2980b9;
        }
        .btn-3:hover { border-color: #2471a3; }

        /* 4º Ano - Roxo (Criatividade) */
        .btn-4 {
            background-color: #8e44ad;
        }
        .btn-4:hover { border-color: #763a92; }

        /* Responsividade para telemóveis */
        @media (max-width: 600px) {
            .menu-container {
                grid-template-columns: 1fr; /* 1 coluna no telemóvel */
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <h1>🎮 Galeria de Jogos</h1>
    <p class="subtitle">Seleciona o teu ano para começar a jogar!</p>

    <div class="menu-container">
        <a href="#" class="btn-menu btn-1">
            <span class="icon">🐣</span> <span class="ano-texto">1º ANO</span>
        </a>

        <a href="#" class="btn-menu btn-2">
            <span class="icon">🐸</span> <span class="ano-texto">2º ANO</span>
        </a>

        <a href="#" class="btn-menu btn-3">
            <span class="icon">🦊</span> <span class="ano-texto">3º ANO</span>
        </a>

        <a href="#" class="btn-menu btn-4">
            <span class="icon">🚀</span> <span class="ano-texto">4º ANO</span>
        </a>
    </div>

</body>
</html>
