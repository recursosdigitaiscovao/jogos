<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo dos Jogos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f0f5fa;    
            --sub-header-bg: #ffffff; 
            --body-bg: #e9f1f8;       
            --primary-blue: #5ba4e5;
            --text-grey: #7a8b9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--body-bg); 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            background: var(--header-bg);
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 15px;
            min-height: 80px; 
            flex-shrink: 0;
        }

        .header-center { display: flex; align-items: center; gap: 12px; }
        #header-icon { height: 50px; width: auto; }
        .title-main { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; display: flex; flex-direction: column; line-height: 1.1; }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.75rem; display: block; }

        /* SUB-HEADER */
        .sub-header {
            background: var(--sub-header-bg); text-align: center; padding: 12px;
            border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.03); flex-shrink: 0;
            margin-bottom: 20px;
        }
        .intro-text { color: #5d7082; font-size: 0.95rem; font-weight: 800; }

        /* ÁREA CENTRAL */
        main { 
            flex: 1; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
        }

        .game-wrapper { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        /* CARTÕES JOGOS */
        .game-card { 
            background: white; border-radius: 25px; border: 4px solid #fff; 
            text-decoration: none; padding: 12px; display: flex; flex-direction: column; 
            align-items: center; transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .card-img-container { 
            width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            border-radius: 20px; margin-bottom: 10px;
        }
        .card-img-container img { max-height: 75%; max-width: 75%; object-fit: contain; }
        .game-card h2 { color: #002d58; font-size: 0.95rem; font-weight: 900; text-align: center; }

        .game-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        footer { padding: 20px; text-align: center; color: var(--text-grey); font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }

        /* AJUSTES DESKTOP */
        @media (min-width: 768px) {
            #header-icon { height: 70px; }
            .title-main { font-size: 1.8rem; }
            .title-sub { font-size: 0.9rem; }
            .game-wrapper { grid-template-columns: repeat(5, 1fr); gap: 25px; }
            .game-card h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1" style="color: var(--primary-blue);"></span> 
                    <span id="txt-titulo2" style="color: #a5b4c4;"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <!-- Importante: O ficheiro dados.js deve estar na mesma pasta -->
    <script src="dados.js"></script>
    <script>
        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;

                // Preencher Textos
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;

                // Logo (usando o ícone home da config)
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.home;

                // Gerar Grelha de Anos
                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const tema = config.temaCores[jogo.tema] || { borda: "#FFFFFF", fundo: "#f0f0f0" };
                    
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.borderColor = tema.borda;

                    card.innerHTML = `
                        <div class="card-img-container" style="background-color: ${tema.fundo};">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            } else {
                console.error("Erro: O ficheiro dados.js não foi carregado corretamente.");
            }
        };
    </script>
</body>
</html>
