<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            width: 100%;
            padding: 25px 10px 40px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 15%;
            border-bottom-right-radius: 50% 15%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 10;
        }

        h1 {
            white-space: nowrap;
            /* Tamanho ajustado para ser grande mas caber em mobile */
            font-size: clamp(1.4rem, 6vw, 2.8rem); 
            color: #ff4757;
            text-shadow: 3px 3px 0px #ffcccb;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 0 20px; 
            min-height: 0;
        }

        .grid-container {
            display: grid;
            width: 100%;
            height: 60%; 
            max-width: 1250px;
            gap: 15px;
            grid-template-columns: repeat(5, 1fr); 
        }

        .card {
            text-decoration: none;
            color: white;
            height: 100%; 
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid white;
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .icon { 
            width: auto;
            height: clamp(60px, 12vh, 110px);
            margin-bottom: 10px; 
            display: block;
            object-fit: contain;
        }
        
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            background: white; padding: 10px 0; text-align: center;
            font-size: 1rem; color: #777; flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        @media (max-width: 800px) {
            h1 {
                font-size: clamp(1.2rem, 5.5vw, 1.6rem); /* Garante uma linha no mobile */
            }

            main {
                align-items: flex-start; /* Sobe os botões para junto do header */
                padding-top: 25px; /* Pequeno respiro do topo */
            }

            .grid-container {
                height: 75%; /* Aumentado para os botões ficarem grandes e visíveis */
                grid-template-columns: repeat(2, 1fr); 
                grid-template-rows: repeat(3, 1fr);
                gap: 12px;
            }
            
            .card.ano4 { grid-column: span 2; }
            
            .icon {
                height: clamp(55px, 10vh, 75px); /* Ícones maiores no telemóvel */
            }
        }

        /* Ajuste para ecrãs muito pequenos (ex: iPhone SE) */
        @media (max-width: 350px) {
            h1 { font-size: 1.1rem; }
            .grid-container { height: 80%; }
        }
    </style>
</head>
<body>

    <header>
        <h1><span>🚀</span> Mundo dos Jogos <span>🎮</span></h1>
        <p style="color: #666; font-size: clamp(0.8rem, 2vh, 1.1rem); margin-top: 5px;">Escolhe o teu ano e diverte-te!</p>
    </header>

    <main>
        <div class="grid-container">
            <a href="/jogos/pre/" class="card pre">
                <img id="img-pre" src="" alt="Pré-Escolar" class="icon">
                <span>Pré-Escolar</span>
            </a>
            <a href="/jogos/1/" class="card ano1">
                <img id="img-ano1" src="" alt="1º Ano" class="icon">
                <span>1º Ano</span>
            </a>
            <a href="/jogos/2/" class="card ano2">
                <img id="img-ano2" src="" alt="2º Ano" class="icon">
                <span>2º Ano</span>
            </a>
            <a href="/jogos/3/" class="card ano3">
                <img id="img-ano3" src="" alt="3º Ano" class="icon">
                <span>3º Ano</span>
            </a>
            <a href="/jogos/4/" class="card ano4">
                <img id="img-ano4" src="" alt="4º Ano" class="icon">
                <span>4º Ano</span>
            </a>
        </div>
    </main>

    <footer>Recursos Digitais Covão</footer>

    <script src="dados.js"></script>
    <script>
        window.onload = () => {
            if (typeof PORTAL_CONFIG !== 'undefined') {
                const path = PORTAL_CONFIG.caminhoIcons;
                const imgs = PORTAL_CONFIG.icones;
                document.getElementById('img-pre').src = path + imgs.pre;
                document.getElementById('img-ano1').src = path + imgs.ano1;
                document.getElementById('img-ano2').src = path + imgs.ano2;
                document.getElementById('img-ano3').src = path + imgs.ano3;
                document.getElementById('img-ano4').src = path + imgs.ano4;
            }
        };
    </script>
</body>
</html>
