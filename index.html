<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Digitais - Menu de Jogos</title>
    <style>
        body {
            background-color: #1a1a2e; /* Azul escuro "gaming" */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            text-shadow: 2px 2px #e94560;
            margin-bottom: 40px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 colunas */
            gap: 25px;
            max-width: 600px;
        }

        .btn-menu {
            background-color: #16213e;
            border: 2px solid #e94560;
            color: white;
            padding: 30px 50px;
            text-align: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
            display: block;
        }

        .btn-menu:hover {
            background-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 15px #e94560;
        }

        /* Responsividade para telemóveis */
        @media (max-width: 500px) {
            .menu-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>🎮 RECURSOS DIGITAIS</h1>
    <p>Escolhe o teu nível:</p>

    <div class="menu-container">
        <a href="#" class="btn-menu">1º ANO</a>
        <a href="#" class="btn-menu">2º ANO</a>
        <a href="#" class="btn-menu">3º ANO</a>
        <a href="#" class="btn-menu">4º ANO</a>
    </div>

</body>
</html>
