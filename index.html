<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Digitais - Galeria de Jogos</title>
    <style>
        /* Cores Mais Limpas e Fundo Claro */
        body {
            background-color: #f4f7f6; /* Cinza muito claro, descansa a vista */
            color: #333; /* Texto quase preto */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        /* Contentor dos Menus */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 colunas */
            gap: 30px;
            max-width: 800px;
            width: 100%;
        }

        /* Estilo Base dos Botões (Cards) */
        .btn-menu {
            text-decoration: none;
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column; /* Imagem/Emoji em cima, texto em baixo */
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid transparent;
        }

        /* Efeito ao passar o rato (Hover) */
        .btn-menu:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }

        /* Tamanho do Emoji/Imagem */
        .icon {
            font-size: 4rem; /* Emoji bem grande */
            margin-bottom: 15px;
        }

        /* Tamanho do Texto do Ano */
        .ano-texto {
            font-size: 1.5rem;
            font-weight: bold;
            color: white; /* Texto branco
