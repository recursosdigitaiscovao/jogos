<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Digitais - Galeria de Jogos</title>
    <style>
        /* Estilo Geral */
        body {
            background-color: #f4f7f6;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px; /* Reduzido de 40px */
        }

        h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 2.2rem; /* Reduzido de 2.8rem */
            letter-spacing: -1px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-top: 8px;
        }

        /* Contentor dos Menus */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px; /* Reduzido de 25px */
            max-width: 600px; /* Reduzido de 800px para compactar */
            width: 100%;
        }

        /* Estilo dos Botões/Cards - Agora mais pequenos */
        .btn-menu {
            text-decoration: none;
            border-radius: 15px; /* Cantos um pouco menos arredondados para combinar com o tamanho */
            padding: 20px 10px; /* Reduzido significativamente de 35px 20px */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 2px solid white;
        }

        .btn-menu:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* Emojis Médios */
        .icon {
            font-size: 3rem; /* Reduzido de 4.5rem */
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        /* Texto do Ano */
        .ano-texto {
            font-size: 1.2rem; /* Reduzido de 1.6rem */
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Cores Vibrantes */
        .btn-1 { background-color: #ff9f43; }
        .btn-2 { background-color: #10ac84; }
        .btn-3 { background-color: #2e86de; }
        .btn-4 { background-color: #9b59b6; }

        /* Rodapé */
        footer {
            margin-top: 40px;
            color: #95a5a6;
            font-size: 0.9rem;
            border-top: 1px solid #e0e0e0;
            width: 100%;
            max-width: 300px;
            text-align: center;
            padding-top: 15px;
        }

        footer strong {
            color: #2c3e50;
        }

        /* Ajuste para Telemóveis */
        @media (max-width: 480px) {
            .menu-container {
                grid-template-columns: repeat(2, 1fr); /* Mantém 2 colunas mesmo no mobile se preferir, ou mude para 1fr */
                gap: 15px;
            }
            h1 { font-size: 1.8rem; }
            .icon { font-size: 2.5rem; }
            .ano-texto { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Recursos Digitais</h1>
        <p class="subtitle">Escolhe o teu ano e diverte-te!</p>
    </header>

    <div class="menu-container">
        <a href="https://recursosdigitaiscovao.github.io/jogos/1" class="btn-menu btn-1">
            <span class="icon">🐣</span>
            <span class="ano-texto">1º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/2" class="btn-menu btn-2">
            <span class="icon">🐸</span>
            <span class="ano-texto">2º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/3" class="btn-menu btn-3">
            <span class="icon">FOX</span>
            <span class="ano-texto">3º ANO</span>
        </a>

        <a href="https://recursosdigitaiscovao.github.io/jogos/4" class="btn-menu btn-4">
            <span class="icon">🚀</span>
            <span class="ano-texto">4º ANO</span>
        </a>
    </div>

    <footer>
        Criado por: <strong>Professor Luís</strong>
    </footer>

</body>
</html>
