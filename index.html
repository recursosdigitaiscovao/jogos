<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recursos Digitais - Galeria de Jogos</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header inspirado no Footer, mas com azul e maior altura */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 20px 15px; /* Um pouco maior */
            text-align: center;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        header p {
            color: #2e86de; /* Azul solicitado */
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: none;
        }

        /* Área central flexível */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            min-height: 0;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 colunas no mobile */
            gap: 12px;
            width: 100%;
            max-width: 1000px;
        }

        .btn-menu {
            text-decoration: none;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 4px solid white;
            height: clamp(90px, 16vh, 180px);
        }

        /* Cores e Sombras 3D */
        .btn-pre { background-color: #ffb3c6; box-shadow: 0 6px 0 #e691a7; }
        .btn-1   { background-color: #ffbe76; box-shadow: 0 6px 0 #e6a75a; }
        .btn-2   { background-color: #55efc4; box-shadow: 0 6px 0 #45cfa8; }
        .btn-3   { background-color: #74b9ff; box-shadow: 0 6px 0 #5ea2e6; }
        .btn-4   { background-color: #a29bfe; box-shadow: 0 6px 0 #8a81e6; }

        .btn-menu:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        .icon {
            font-size: clamp(2rem, 8vh, 3.5rem);
            margin-bottom: 8px;
        }

        .ano-texto {
            font-size: 0.9rem;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* AJUSTES PARA PC (Ecrãs largos) */
        @media (min-width: 768px) {
            .menu-container {
                grid-template-columns: repeat(5, 1fr); /* Todos lado a lado no PC */
                gap: 20px;
            }
            .btn-menu {
                height: 220px; /* Menus maiores no PC */
                padding: 30px;
            }
            .icon { font-size: 4rem; }
            .ano-texto { font-size: 1.1rem; }
            
            .btn-menu:hover {
                transform: translateY(-8px);
                filter: brightness(1.05);
            }
        }

        /* Footer */
        footer {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        footer strong { color: #2c3e50; }

        /* Mobile ajuste específico para o botão PRÉ */
        @media (max-width: 480px) {
            .btn-pre { 
                grid-column: span 2; 
                flex-direction: row;
                gap: 20px;
                height: 90px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Galeria de Jogos</h1>
        <p>Escolhe o teu ano e diverte-te!</p>
    </header>

    <main>
        <nav class="menu-container">
            <a href="https://recursosdigitaiscovao.github.io/jogos/pre" class="btn-menu btn-pre">
                <span class="icon">🦒</span>
                <span class="ano-texto">PRÉ</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/1" class="btn-menu btn-1">
                <span class="icon">🐥</span>
                <span class="ano-texto">1º ANO</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/2" class="btn-menu btn-2">
                <span class="icon">🐢</span>
                <span class="ano-texto">2º ANO</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/3" class="btn-menu btn-3">
                <span class="icon">🦊</span>
                <span class="ano-texto">3º ANO</span>
            </a>

            <a href="https://recursosdigitaiscovao.github.io/jogos/4" class="btn-menu btn-4">
                <span class="icon">👨‍🚀</span>
                <span class="ano-texto">4º ANO</span>
            </a>
        </nav>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

</body>
</html>
