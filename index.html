<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo dos Jogos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f0f5fa;    
            --body-bg: #e9f1f8;       
            --primary-red: #E63946;
            --text-grey: #7a8b9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        html, body { 
            height: 100vh; 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
        }

        body { 
            background-color: var(--body-bg); 
            display: flex; 
            flex-direction: column;
        }

        /* HEADER */
        header { 
            background: var(--header-bg); 
            padding: 10px; 
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        .header-center { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #header-icon { height: 45px; width: auto; }
        .title-main { font-weight: 900; font-size: 1.15rem; text-transform: uppercase; line-height: 1; }
        #txt-titulo1 { color: var(--primary-red); }
        #txt-titulo2 { color: #a5b4c4; }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.65rem; display: block; }

        /* INTRO */
        .sub-header { 
            background: white; 
            text-align: center; 
            padding: 8px; 
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px; 
            flex-shrink: 0;
        }
        .intro-text { color: #5d7082; font-size: 0.9rem; font-weight: 800; }

        /* ÁREA CENTRAL */
        main { 
            flex: 1; 
            min-height: 0; 
            padding: 15px;
            display: flex;
            align-items: center; /* Centraliza a grelha verticalmente */
            justify-content: center;
        }

        .game-wrapper { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%; /* No mobile ocupa o espaço todo para evitar scroll */
            max-width: 450px;
        }

        .game-card { 
            border-radius: 22px; 
            border: 4px solid #fff; 
            text-decoration: none; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
            min-height: 0;
        }

        .game-card:nth-child(5) {
            grid-column: span 2;
            justify-self: center;
            width: 50%;
        }

        .card-img-container { 
            flex: 1;
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 16px; 
            background: rgba(255, 255, 255, 0.2);
            min-height: 0; 
        }
        
        .card-img-container img { 
            max-height: 85%; 
            max-width: 85%; 
            object-fit: contain;
        }

        .game-card h2 { 
            color: white; 
            font-size: 0.9rem; 
            font-weight: 900; 
            text-align: center;
            margin-top: 5px;
        }

        /* FOOTER */
        footer { 
            padding: 10px; 
            text-align: center; 
            color: var(--text-grey); 
            font-size: 0.7rem; 
            font-weight: 700; 
            flex-shrink: 0;
        }

        /* AJUSTES PARA ECRÃS MAIORES (TABLETS E PC) */
        @media (min-width: 768px) {
            #header-icon { height: 65px; }
            .title-main { font-size: 1.8rem; }
            .title-sub { font-size: 0.9rem; }
            .intro-text { font-size: 1.2rem; }

            .game-wrapper { 
                grid-template-columns: repeat(5, 1fr); 
                grid-template-rows: 1fr;
                max-width: 1100px;
                height: auto; /* Deixa de ser 100% da altura */
                max-height: 400px; /* Limita a altura dos cards no PC */
                gap: 20px;
            }

            .game-card { 
                aspect-ratio: 1 / 1.2; /* Mantém um formato proporcional bonito */
                padding: 20px;
            }

            .game-card:nth-child(5) { grid-column: span 1; width: 100%; }
            .game-card h2 { font-size: 1.2rem; }
            .game-card:hover { transform: translateY(-10px); }
            
            footer { font-size: 0.85rem; padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1"></span> 
                    <span id="txt-titulo2"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;

                document.getElementById('txt-titulo1').textContent = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').textContent = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').textContent = config.textos.subtitulo;
                document.getElementById('txt-intro').textContent = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.logo;

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const tema = config.temaCores[jogo.tema] || { borda: "#FFFFFF", fundo: "#5ba4e5" };
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.backgroundColor = tema.fundo;
                    card.style.borderColor = tema.borda;

                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
