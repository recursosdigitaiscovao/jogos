<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo dos Jogos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #ffffff;    
            --body-bg: #f0f4f8;       
            --text-main: #2d3436;
            --text-grey: #636e72;
        }

        /* Fundo com textura de pontos e gradiente */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background: var(--body-bg);
            background-image: radial-gradient(#d1d8e0 1px, transparent 1px);
            background-size: 30px 30px; /* Textura de pontos subtil */
            height: 100dvh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column;
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            background: var(--header-bg); 
            padding: 15px; 
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        .header-center { display: flex; align-items: center; justify-content: center; gap: 15px; }
        #header-icon { height: clamp(40px, 8vw, 60px); width: auto; }
        
        .title-group { display: flex; flex-direction: column; }
        .title-main { font-weight: 900; font-size: clamp(1.1rem, 5vw, 1.8rem); text-transform: uppercase; line-height: 0.9; }
        #txt-titulo1 { color: #d63031; } /* Vermelho Mundo */
        #txt-titulo2 { color: #b2bec3; } /* Cinza Jogos */
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: clamp(0.6rem, 3vw, 0.9rem); margin-top: 4px; }

        /* SUB-HEADER / INTRO */
        .sub-header { 
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            text-align: center; 
            padding: 12px; 
            margin-bottom: 10px;
        }
        .intro-text { color: var(--text-grey); font-size: clamp(0.85rem, 4vw, 1.1rem); font-weight: 800; }

        /* GRID DE JOGOS */
        main { 
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .game-wrapper { 
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 colunas */
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* CARD STYLE (BASEADO NA IMAGEM) */
        .game-card { 
            position: relative;
            border-radius: 30px; 
            background: white;
            text-decoration: none; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #fff;
            aspect-ratio: 1 / 1.1;
        }

        /* Estilo para o último card no mobile (centrado se for ímpar) */
        .game-card:last-child:nth-child(odd) {
            grid-column: span 2;
            width: calc(50% - 10px);
            justify-self: center;
        }

        /* Container da Imagem Interno */
        .card-img-container { 
            width: 100%;
            height: 75%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.3); /* Será sobreposto via JS */
            margin-bottom: 10px;
        }
        
        .card-img-container img { 
            max-height: 80%; 
            max-width: 80%; 
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .game-card h2 { 
            color: white; 
            font-size: clamp(0.9rem, 4vw, 1.3rem); 
            font-weight: 900; 
            margin-bottom: 5px;
        }

        /* HOVER E EFEITO GLOW */
        .game-card:hover {
            transform: scale(1.05) translateY(-5px);
        }

        /* FOOTER */
        footer { 
            padding: 15px; 
            text-align: center; 
            color: var(--text-grey); 
            font-size: 0.75rem; 
            font-weight: 700; 
        }

        /* TABLET E DESKTOP (5 EM LINHA) */
        @media (min-width: 900px) {
            .game-wrapper { 
                grid-template-columns: repeat(5, 1fr); /* 5 cards em linha */
                gap: 25px;
            }
            .game-card:last-child:nth-child(odd) {
                grid-column: span 1;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1"></span> 
                    <span id="txt-titulo2"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;

                document.getElementById('txt-titulo1').textContent = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').textContent = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').textContent = config.textos.subtitulo;
                document.getElementById('txt-intro').textContent = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.logo;

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const tema = config.temaCores[jogo.tema];
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    
                    // Aplica cores e sombra dinâmica (Glow)
                    card.style.backgroundColor = tema.fundo;
                    card.style.boxShadow = `0 15px 35px -10px ${tema.fundo}88`; // Glow suave

                    card.innerHTML = `
                        <div class="card-img-container" style="background-color: rgba(255,255,255,0.25)">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
