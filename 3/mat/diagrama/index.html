<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo: Caule-e-Folhas Duplo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
            --cor-texto: #8c5d40;
            --cor-acerto: #45cfa8;
            --cor-erro: #ff4757;
            --cor-meninas: #e691a7;
            --cor-meninos: #5ea2e6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 15px 10px 35px 10px;
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 15%;
            border-bottom-right-radius: 50% 15%;
            box-shadow: 0 10px 30px rgba(255, 107, 26, 0.1);
            position: relative;
        }

        .btn-voltar {
            position: absolute;
            right: 15px;
            top: 15px;
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        h1 { color: var(--vibrant-orange); font-size: 1.3rem; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .game-container {
            background: white;
            padding: 15px;
            border-radius: 25px;
            border: 4px solid var(--vibrant-orange);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        .pergunta {
            font-size: 1.1rem;
            color: var(--cor-texto);
            margin-bottom: 15px;
            font-weight: bold;
            min-height: 50px;
        }

        /* --- Estilo do Diagrama Duplo --- */
        .diagrama-duplo {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            background: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            align-items: center;
        }

        .cabecalho-duplo {
            font-size: 0.8rem;
            font-weight: bold;
            padding-bottom: 10px;
        }

        .folhas-esq { text-align: right; color: var(--cor-meninas); padding-right: 15px; letter-spacing: 5px; }
        .folhas-dir { text-align: left; color: var(--cor-meninos); padding-left: 15px; letter-spacing: 5px; }
        
        .caule-central {
            font-weight: 700;
            color: white;
            background: var(--vibrant-orange);
            padding: 5px 12px;
            border-radius: 10px;
            min-width: 40px;
        }

        .linha { display: contents; }

        /* Opções */
        .opcoes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn-opcao {
            background: white;
            border: 2px solid var(--vibrant-orange);
            padding: 10px;
            border-radius: 12px;
            font-family: 'Fredoka';
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--vibrant-orange);
        }

        .feedback {
            margin-top: 10px;
            font-weight: bold;
            height: 20px;
            font-size: 0.9rem;
        }

        #btn-proximo {
            margin-top: 15px;
            background: var(--cor-acerto);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Fredoka';
            font-weight: bold;
            display: none;
            cursor: pointer;
        }

        footer { padding: 10px; text-align: center; color: #777; font-size: 0.8rem; background: white; }
    </style>
</head>
<body>

    <header>
        <a href="../" class="btn-voltar">⬅ Voltar</a>
        <h1>📊 Batalha de Números</h1>
        <p style="color: #8c5d40; font-size: 0.8rem;">Meninas vs Meninos</p>
    </header>

    <main>
        <div class="game-container">
            <div id="enunciado" class="pergunta">Quem tem o maior número de todos?</div>
            
            <!-- Tabela do Diagrama Duplo -->
            <div class="diagrama-duplo">
                <div class="cabecalho-duplo" style="color: var(--cor-meninas)">MENINAS</div>
                <div class="cabecalho-duplo" style="color: var(--vibrant-orange)">CAULE</div>
                <div class="cabecalho-duplo" style="color: var(--cor-meninos)">MENINOS</div>

                <!-- Linha 1 -->
                <div class="folhas-esq">5 2</div>
                <div class="caule-central">1</div>
                <div class="folhas-dir">0 4 8</div>
                
                <!-- Linha 2 -->
                <div class="folhas-esq">8 3 1</div>
                <div class="caule-central">2</div>
                <div class="folhas-dir">2 5</div>

                <!-- Linha 3 -->
                <div class="folhas-esq">0</div>
                <div class="caule-central">3</div>
                <div class="folhas-dir">1 6</div>
            </div>

            <div class="opcoes" id="area-opcoes"></div>
            <div id="feedback" class="feedback"></div>
            <button id="btn-proximo">Próximo Desafio ➔</button>
        </div>
    </main>

    <footer>Recursos Digitais Covão</footer>

    <script>
        const desafios = [
            {
                pergunta: "Quem tem o maior número de todos?",
                opcoes: ["Meninas (30)", "Meninos (36)"],
                correta: 1
            },
            {
                pergunta: "No caule 1, quem tem mais folhas?",
                opcoes: ["Meninas", "Meninos"],
                correta: 1 // Meninos têm 3 folhas (0,4,8), Meninas têm 2 (2,5)
            },
            {
                pergunta: "Qual é o menor número das Meninas?",
                opcoes: ["12", "15", "10", "21"],
                correta: 0 // Caule 1, Folha 2 = 12
            },
            {
                pergunta: "Quantos meninos estão no caule 2?",
                opcoes: ["2 meninos", "3 meninos", "5 meninos"],
                correta: 0 // Folhas 2 e 5 = 22 e 25
            }
        ];

        let indiceAtual = 0;

        function carregarDesafio() {
            const desafio = desafios[indiceAtual];
            document.getElementById('enunciado').innerText = desafio.pergunta;
            document.getElementById('feedback').innerText = "";
            document.getElementById('btn-proximo').style.display = "none";
            
            const areaOpcoes = document.getElementById('area-opcoes');
            areaOpcoes.innerHTML = "";

            desafio.opcoes.forEach((texto, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcao';
                btn.innerText = texto;
                btn.onclick = () => verificarResposta(i);
                areaOpcoes.appendChild(btn);
            });
        }

        function verificarResposta(escolhida) {
            const desafio = desafios[indiceAtual];
            const feedback = document.getElementById('feedback');

            if (escolhida === desafio.correta) {
                feedback.innerHTML = "✅ Certíssimo! Estás atento!";
                feedback.style.color = "var(--cor-acerto)";
                document.getElementById('btn-proximo').style.display = "inline-block";
            } else {
                feedback.innerHTML = "❌ Quase! Tenta ver outra vez.";
                feedback.style.color = "var(--cor-erro)";
            }
        }

        document.getElementById('btn-proximo').onclick = () => {
            indiceAtual++;
            if (indiceAtual >= desafios.length) {
                document.getElementById('enunciado').innerText = "🏆 Incrível! És um mestre dos diagramas!";
                document.querySelector('.diagrama-duplo').style.opacity = "0.3";
                document.getElementById('area-opcoes').innerHTML = "";
                document.getElementById('btn-proximo').style.display = "none";
            } else {
                carregarDesafio();
            }
        };

        carregarDesafio();
    </script>
</body>
</html>
