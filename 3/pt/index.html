<div class="overlay" id="overlay" onclick="closeMenus()"></div>

<header>
    <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
    <div class="logo-center"><img id="head-logo" src="" alt="Logo"><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
    <div class="header-right"><a href="../" id="link-voltar-header" class="btn-voltar-header"><img id="header-back-icon" src="" width="18"> <span id="txt-voltar-header">VOLTAR</span></a><a href="../" id="link-voltar-mobile" class="btn-voltar-mobile"><img id="header-back-mobile" src="" alt="Voltar" style="height:35px;"></a></div>
</header>

<main>
    <div class="intro-container">
        <p id="hub-intro-sub"></p>
    </div>
    <div class="game-wrapper" id="gamesGrid"></div>
</main>

<footer id="txt-rodape"></footer>

<script src="biblioteca.js"></script>
<script src="dados.js"></script>

<script>
    function initUI() {
        if (typeof JOGO_CONFIG === 'undefined' || typeof BIBLIOTECA_TEMAS === 'undefined' || typeof BIBLIOTECA_CONTEUDO === 'undefined') return;
        
        const conf = JOGO_CONFIG;
        const tema = BIBLIOTECA_TEMAS[conf.areaAtiva];
        const info = BIBLIOTECA_CONTEUDO[conf.anoAtivo][conf.areaAtiva];
        const pIconsMenu = conf.caminhoIconsMenu;
        const pIconsJogos = conf.caminhoIconsJogos;
        const root = document.documentElement;

        root.style.setProperty('--bg-page', tema.corPagina);
        root.style.setProperty('--primary-blue', tema.corPrimaria);
        root.style.setProperty('--primary-dark', tema.corEscura);
        root.style.setProperty('--text-grey', tema.corTexto);

        document.title = info.t1 + " " + info.t2;
        document.getElementById('tit-l1').innerText = info.t1;
        document.getElementById('tit-l2').innerText = info.t2;
        document.getElementById('sub-tit').innerText = info.sub;
        document.getElementById('hub-intro-sub').innerText = info.intro;
        document.getElementById('txt-rodape').innerHTML = info.rodape;
        
        document.getElementById('head-logo').src = pIconsMenu + conf.iconesMenu[conf.anoAtivo];
        document.getElementById('header-back-icon').src = pIconsMenu + conf.iconesMenu.voltar;
        document.getElementById('header-back-mobile').src = pIconsMenu + tema.voltarMobile;

        const menuBox = document.getElementById('dropdownMenu');
        menuBox.innerHTML = ''; 
        const menuLabels = { home: 'Início', pre: 'Pré', ano1: '1º Ano', ano2: '2º Ano', ano3: '3º Ano', ano4: '4º Ano' };
        ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
            if(conf.links[k]) {
                const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
                a.innerHTML = `<img src="${pIconsMenu}${conf.iconesMenu[k]}"><span>${menuLabels[k]}</span>`;
                menuBox.appendChild(a);
            }
        });
        const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = "../"; 
        btnV.innerHTML = `<img src="${pIconsMenu}${conf.iconesMenu.voltar}"> <span>VOLTAR</span>`;
        menuBox.appendChild(btnV);

        const grid = document.getElementById('gamesGrid');
        grid.innerHTML = ''; 
        conf.listaJogos.forEach(jogo => {
            const card = document.createElement('a'); card.className = 'game-card'; card.href = jogo.link;
            card.innerHTML = `<div class="card-img-container"><img src="${pIconsJogos}${jogo.icon}"></div><h2>${jogo.nome}</h2>`;
            grid.appendChild(card);
        });
    }

    function toggleHamburger(e) {
        e.stopPropagation();
        const m = document.getElementById('dropdownMenu');
        const ov = document.getElementById('overlay');
        if(m.style.display === 'flex') { closeMenus(); } 
        else { m.style.display = 'flex'; ov.style.display = 'block'; }
    }

    function closeMenus() {
        document.getElementById('dropdownMenu').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    window.onload = initUI;
</script>
