<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enforcado 1º Ano - Professor Luís</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        header h1 { font-size: 1rem; color: #2c3e50; font-weight: 800; }

        /* SIDEBAR COMPLETA */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            display: block; width: 100%; padding: 15px; margin-bottom: 8px;
            border: none; background: #f8f9fa; border-radius: 12px;
            text-align: left; font-weight: bold; color: #2c3e50; cursor: pointer;
        }
        .sidebar-item.active { background: #ff9f43; color: white; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay-bg.active { display: block; }

        /* MENU DE TEMAS */
        #menu-container { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .theme-card {
            background: #e0f7fa; border-radius: 20px; padding: 25px; text-align: center;
            cursor: pointer; border: 2px solid #4dd0e1; box-shadow: 0 6px 0 #4dd0e1; position: relative;
        }
        .theme-card:active { top: 4px; box-shadow: 0 2px 0 #4dd0e1; }
        .theme-card span { font-size: 3rem; display: block; margin-bottom: 10px; }
        .theme-card p { font-weight: 800; color: #006064; text-transform: uppercase; }

        /* ÁREA DE JOGO */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: space-around; padding: 15px; }
        .hangman-visual { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .word-img { font-size: 4.5rem; background: white; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 3px solid #ff9f43; }
        
        /* DESENHO SIMPLES */
        .hangman-box { width: 100px; height: 100px; position: relative; }
        .part { position: absolute; background: #2c3e50; display: none; }
        .base { width: 40px; height: 3px; bottom: 0; left: 30px; display: block; }
        .pole { width: 3px; height: 80px; bottom: 0; left: 30px; display: block; }
        .rope { width: 2px; height: 10px; top: 10px; left: 70px; display: block; }
        .head { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #2c3e50; top: 20px; left: 62px; }
        .body-v { width: 2px; height: 25px; top: 38px; left: 70px; }
        .l-arm, .r-arm { width: 15px; height: 2px; top: 45px; }
        .l-arm { left: 56px; transform: rotate(-30deg); } .r-arm { left: 71px; transform: rotate(30deg); }
        .l-leg, .r-leg { width: 15px; height: 2px; top: 62px; }
        .l-leg { left: 56px; transform: rotate(-45deg); } .r-leg { left: 71px; transform: rotate(45deg); }

        .word-display { font-size: 2.2rem; font-weight: bold; letter-spacing: 6px; color: #2c3e50; margin: 15px 0; }

        /* TECLADO REALISTA */
        .keyboard { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; width: 100%; max-width: 550px; }
        .key {
            background: #fff; border: 1px solid #ccc; border-radius: 6px;
            padding: 12px 0; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 3px 0 #ddd; color: #333;
        }
        .key.used { background: #f0f0f0; color: #ccc; box-shadow: none; transform: translateY(2px); }

        /* BOTÕES DE FINAL */
        #game-controls { display: none; gap: 10px; margin-top: 15px; }
        .btn-final { padding: 12px 20px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn-replay { background: #2ecc71; }
        .btn-home { background: #3498db; }

        footer { width: 100%; padding: 10px; background: #fff; text-align: center; border-top: 1px solid #eee; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="overlay-bg" id="overlay-bg" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 20px;">Menu Jogos</h2>
        <button class="sidebar-item" onclick="location.reload()">🏠 Menu de Temas</button>
        <button class="sidebar-item">🦒 Pré-Escolar</button>
        <button class="sidebar-item active">🐥 1º Ano</button>
        <button class="sidebar-item">🐢 2º Ano</button>
        <button class="sidebar-item">🦊 3º Ano</button>
        <button class="sidebar-item">👨‍🚀 4º Ano</button>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:10px; border:none; background:#eee; border-radius:8px;">Fechar Menu</button>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <h1>Enforcado do 1º Ano</h1>
        </div>
        <button onclick="location.reload()" style="background:#ff9f43; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">Sair</button>
    </header>

    <div id="menu-container">
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div class="hangman-visual">
            <div class="word-img" id="word-img">❓</div>
            <div class="hangman-box">
                <div class="part base"></div><div class="part pole"></div><div class="part rope"></div>
                <div class="part head" id="h-head"></div><div class="part body-v" id="h-body"></div>
                <div class="part l-arm" id="h-larm"></div><div class="part r-arm" id="h-rarm"></div>
                <div class="part l-leg" id="h-lleg"></div><div class="part r-leg" id="h-rleg"></div>
            </div>
        </div>
        
        <div class="word-display" id="word-display">_ _ _</div>
        
        <div id="game-controls">
            <button class="btn-final btn-replay" onclick="resetGame()">Jogar de Novo 🔄</button>
            <button class="btn-final btn-home" onclick="location.reload()">Escolher Tema 🏠</button>
        </div>

        <div class="keyboard" id="keyboard"></div>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Frutas": { icon: "🍎", words: [
                {p:"BANANA", i:"🍌"}, {p:"UVA", i:"🍇"}, {p:"FIGO", i:"🥯"}, {p:"PERA", i:"🍐"}, {p:"KIWI", i:"🥝"},
                {p:"ANANAS", i:"🍍"}, {p:"MANGA", i:"🥭"}, {p:"MELAO", i:"🍈"}, {p:"CEREJA", i:"🍒"}, {p:"AMEIXA", i:"🫐"},
                {p:"TAMARA", i:"🌴"}, {p:"LIMA", i:"🍋"}, {p:"COCO", i:"🥥"}, {p:"CAQUI", i:"🍅"}, {p:"MORANGO", i:"🍓"},
                {p:"AMORA", i:"🍇"}, {p:"NESPERA", i:"🍊"}, {p:"MELANCIA", i:"🍉"}, {p:"ABACATE", i:"🥑"}, {p:"ROMÃ", i:"🍎"}
            ]},
            "Animais": { icon: "🐱", words: [
                {p:"CAO", i:"🐶"}, {p:"GATO", i:"🐱"}, {p:"PATO", i:"🦆"}, {p:"VACA", i:"🐮"}, {p:"ZEBRA", i:"🦓"},
                {p:"LEAO", i:"🦁"}, {p:"TIGRE", i:"🐯"}, {p:"URSO", i:"🐻"}, {p:"RATO", i:"🐭"}, {p:"COELHO", i:"🐰"},
                {p:"PEIXE", i:"🐟"}, {p:"GALO", i:"🐓"}, {p:"PORCO", i:"🐷"}, {p:"MOSCA", i:"🪰"}, {p:"GIRAFA", i:"🦒"},
                {p:"MACACO", i:"🐒"}, {p:"COBRA", i:"🐍"}, {p:"SAPO", i:"🐸"}, {p:"LOUVA", i:"🦗"}, {p:"GRILO", i:"🦗"}
            ]},
            "Cores": { icon: "🎨", words: [
                {p:"AZUL", i:"🔵"}, {p:"ROSA", i:"💗"}, {p:"VERDE", i:"🟢"}, {p:"PRETO", i:"⚫"}, {p:"BRANCO", i:"⚪"},
                {p:"ROXO", i:"🟣"}, {p:"CINZA", i:"🔘"}, {p:"AMARELO", i:"🟡"}, {p:"VIOLETA", i:"♒"}, {p:"LARANJA", i:"🟠"},
                {p:"BEGE", i:"🏷️"}, {p:"DOURADO", i:"👑"}, {p:"PRATA", i:"🥈"}, {p:"CREME", i:"🍦"}, {p:"LILA", i:"🌸"},
                {p:"CASTANHO", i:"🟤"}, {p:"VERMELHO", i:"🔴"}, {p:"TURQUESA", i:"💎"}, {p:"CARMIM", i:"💄"}, {p:"SALMAO", i:"🍣"}
            ]},
            "Escola": { icon: "🎒", words: [
                {p:"COLA", i:"🧪"}, {p:"PASTA", i:"🎒"}, {p:"LIVRO", i:"📚"}, {p:"MESA", i:"🪑"}, {p:"QUADRO", i:"🖼️"},
                {p:"GIZ", i:"🖍️"}, {p:"ESTOJO", i:"👝"}, {p:"MOCHILA", i:"🎒"}, {p:"PAPEL", i:"📄"}, {p:"MAPA", i:"🗺️"},
                {p:"PONTAS", i:"✏️"}, {p:"TINTA", i:"🎨"}, {p:"PINCEL", i:"🖌️"}, {p:"CANETA", i:"🖊️"}, {p:"TESTE", i:"📝"},
                {p:"ALUNO", i:"🧑‍🎓"}, {p:"SALA", i:"🏫"}, {p:"RECREIO", i:"🛝"}, {p:"BANCO", i:"🪑"}, {p:"FOLHA", i:"🍃"}
            ]}
        };

        let activeCategory = "";
        let secretWord = "";
        let guessedLetters = [];
        let mistakes = 0;
        let gameEnded = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay-bg').classList.toggle('active');
        }

        function createThemes() {
            const grid = document.getElementById('theme-grid');
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => { activeCategory = key; resetGame(); };
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function resetGame() {
            gameEnded = false;
            const list = themes[activeCategory].words;
            const data = list[Math.floor(Math.random() * list.length)];
            secretWord = data.p;
            document.getElementById('word-img').innerText = data.i;
            guessedLetters = [];
            mistakes = 0;

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('keyboard').style.display = 'grid';

            updateDisplay();
            createKeyboard();
            resetHangman();
        }

        function createKeyboard() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            letters.forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = l;
                btn.onclick = () => handleGuess(l, btn);
                kb.appendChild(btn);
            });
        }

        function handleGuess(letter, btn) {
            if (gameEnded || btn.classList.contains('used')) return;
            btn.classList.add('used');

            if (secretWord.includes(letter)) {
                guessedLetters.push(letter);
                if (secretWord.split("").every(l => guessedLetters.includes(l))) endGame(true);
            } else {
                mistakes++;
                drawHangman();
                if (mistakes === 6) endGame(false);
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('word-display').innerText = secretWord.split("").map(l => 
                guessedLetters.includes(l) ? l : "_"
            ).join(" ");
        }

        function drawHangman() {
            const parts = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"];
            if (mistakes > 0) document.getElementById(parts[mistakes - 1]).style.display = 'block';
        }

        function resetHangman() {
            ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        function endGame(won) {
            gameEnded = true;
            document.getElementById('keyboard').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
            if (!won) document.getElementById('word-display').innerText = secretWord;
            alert(won ? "Parabéns, Professor Luís! Os alunos ganharam! 🏆" : "Oh não! Tenta outra vez! A palavra era " + secretWord);
        }

        createThemes();
    </script>
</body>
</html>
