<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enforcado - Professor Luís</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        .game-icon { font-size: 1.6rem; }
        header h1 { font-size: 0.95rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #2c3e50; margin-bottom: 20px; border-bottom: 3px solid #ff9f43; padding-bottom: 5px; }
        .sidebar-item {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 14px; 
            margin-bottom: 8px; border: none; background: #f8f9fa; border-radius: 12px;
            text-align: left; font-weight: bold; color: #2c3e50; cursor: pointer; text-decoration: none;
        }
        .sidebar-item.active { background: #ff9f43; color: white; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay-bg.active { display: block; }

        /* MODAL INFORMAÇÃO */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 85%; max-width: 400px; 
            border-radius: 25px; padding: 25px; text-align: center;
        }

        /* MENU DE TEMAS */
        #menu-container { flex: 1; overflow-y: auto; padding: 10px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .theme-card {
            background: #e0f7fa; border-radius: 20px; padding: 20px;
            cursor: pointer; border: 2px solid #4dd0e1; box-shadow: 0 6px 0 #4dd0e1; position: relative;
        }
        .theme-card span { font-size: 2.5rem; display: block; margin-bottom: 5px; }
        .theme-card p { font-weight: 800; color: #006064; font-size: 0.8rem; text-transform: uppercase; }

        /* JOGO */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 10px; gap: 15px; }
        
        .game-visual-container {
            display: flex; align-items: center; justify-content: center;
            gap: 20px; width: 100%; max-width: 400px;
        }

        .hangman-box { width: 140px; height: 110px; position: relative; background: rgba(255,255,255,0.8); border-radius: 15px; border: 1px solid #eee; flex-shrink: 0; }
        .part { position: absolute; background: #2c3e50; display: none; }
        .base { width: 50px; height: 4px; bottom: 10px; left: 20px; display: block; }
        .pole { width: 4px; height: 90px; bottom: 10px; left: 20px; display: block; }
        .gallows-top { width: 60px; height: 4px; top: 15px; left: 20px; display: block; }
        .rope { width: 2px; height: 12px; top: 15px; left: 78px; display: block; }
        .head { width: 24px; height: 24px; border-radius: 50%; border: 3px solid #2c3e50; top: 27px; left: 67px; background: #fff; }
        .body-v { width: 3px; height: 30px; top: 51px; left: 78px; }
        .l-arm { width: 20px; height: 3px; top: 58px; left: 59px; transform: rotate(-30deg); }
        .r-arm { width: 20px; height: 3px; top: 58px; left: 79px; transform: rotate(30deg); }
        .l-leg { width: 20px; height: 3px; top: 80px; left: 60px; transform: rotate(-45deg); }
        .r-leg { width: 20px; height: 3px; top: 80px; left: 78px; transform: rotate(45deg); }

        #word-hint-container {
            display: flex; align-items: center; justify-content: center;
            width: 100px; height: 100px; 
            background: #fff; border-radius: 20px; 
            border: 3px solid #ff9f43;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            position: relative; flex-shrink: 0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #word-img { font-size: 3.8rem; filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.1)); }
        
        #color-blot { 
            width: 70px; height: 70px; border-radius: 50%; display: none; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.1);
        }

        .word-display { font-size: 2.2rem; font-weight: bold; letter-spacing: 6px; color: #2c3e50; margin: 5px 0; }
        
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; max-width: 480px; padding: 5px; }
        .key { 
            background: #fff; border: 2px solid #ccc; border-radius: 10px;
            padding: 12px 0; font-weight: 800; font-size: 1.1rem; cursor: pointer; 
            box-shadow: 0 4px 0 #ddd; color: #333; transition: 0.1s;
        }
        .key.used { background: #f0f0f0; color: #bbb; border-color: #ddd; box-shadow: none; transform: translateY(2px); }

        #game-controls { display: none; flex-direction: column; gap: 8px; width: 220px; }
        .btn-final { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
        
        footer { width: 100%; padding: 10px; background: #fff; text-align: center; border-top: 1px solid #eee; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="overlay-bg" id="overlay-bg" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>Menu Global</h3>
        <a href="#" class="sidebar-item" onclick="location.reload()">🏠 Menu de Temas</a>
        <a href="/jogos/pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
        <a href="/jogos/1" class="sidebar-item active"><span>🐥</span> 1º Ano</a>
        <a href="/jogos/2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
        <a href="/jogos/3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
        <a href="/jogos/4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:10px; border:none; background:#eee; border-radius:8px; font-weight:bold;">Fechar ×</button>
    </div>

    <div class="modal-overlay" id="modal-ajuda">
        <div class="modal-content">
            <h2 style="color:#3498db; margin-bottom:15px;">Como Jogar</h2>
            <p>Observa a imagem ao lado da forca e tenta adivinhar a palavra. Se acertares, passas logo à próxima! Se errares 6 vezes, o boneco aparece!</p>
            <button onclick="fecharAjuda()" style="margin-top:20px; padding:12px 25px; background:#2ecc71; color:white; border:none; border-radius:15px; font-weight:bold; box-shadow:0 4px 0 #27ae60; cursor:pointer;">Entendi!</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <span class="game-icon">📝</span>
            <h1>Enforcado</h1>
        </div>
        <button class="btn-voltar-3d" onclick="location.reload()">⬅ Voltar</button>
    </header>

    <div id="menu-container">
        <div style="padding: 15px;">
            <button onclick="abrirAjuda()" style="background:#3498db; color:white; border:none; padding:10px 20px; border-radius:15px; font-weight:bold; box-shadow:0 4px 0 #2980b9; display:flex; align-items:center; gap:8px; margin: 0 auto; cursor:pointer;">
                <span>ℹ️</span> Como se Joga
            </button>
        </div>
        <div class="theme-grid" id="theme-grid" style="padding: 10px;"></div>
    </div>

    <main id="game-area">
        <div class="game-visual-container">
            <div class="hangman-box">
                <div class="part base"></div><div class="part pole"></div><div class="part gallows-top"></div><div class="part rope"></div>
                <div class="part head" id="h-head"></div><div class="part body-v" id="h-body"></div>
                <div class="part l-arm" id="h-larm"></div><div class="part r-arm" id="h-rarm"></div>
                <div class="part l-leg" id="h-lleg"></div><div class="part r-leg" id="h-rleg"></div>
            </div>
            <div id="word-hint-container">
                <div id="word-img">❓</div>
                <div id="color-blot"></div> 
            </div>
        </div>
        <div class="word-display" id="word-display"></div>
        <div id="status-msg" style="font-weight:bold; margin:5px 0; text-align:center; min-height: 24px;"></div>
        <div id="game-controls">
            <button class="btn-final" style="background:#2ecc71; box-shadow:0 4px 0 #27ae60;" onclick="resetGame()">Jogar de Novo 🔄</button>
            <button class="btn-final" style="background:#3498db; box-shadow:0 4px 0 #2980b9;" onclick="location.reload()">Escolher Tema 🏠</button>
        </div>
        <div class="keyboard" id="keyboard"></div>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Animais": {icon:"🐶", words:[
                {p:"GATO",i:"🐱"},{p:"PATO",i:"🦆"},{p:"VACA",i:"🐮"},{p:"ZEBRA",i:"🦓"},{p:"TIGRE",i:"🐯"},{p:"URSO",i:"🐻"},{p:"RATO",i:"🐭"},{p:"SAPO",i:"🐸"},{p:"GALO",i:"🐓"},{p:"PORCO",i:"🐷"},{p:"MOSCA",i:"🪰"},{p:"GIRAFA",i:"🦒"},{p:"MACACO",i:"🐒"},{p:"COBRA",i:"🐍"},{p:"PEIXE",i:"🐟"},{p:"PANDA",i:"🐼"},{p:"LONTRA",i:"🦦"},{p:"ESQUILO",i:"🐿️"},{p:"LEAO",i:"🦁"},{p:"PERU",i:"🦃"}
            ]},
            "Cores": {icon:"🎨", words:[
                {p:"AZUL", c:"#0000FF"},{p:"ROSA", c:"#FFC0CB"},{p:"VERDE", c:"#008000"},{p:"PRETO", c:"#000000"},{p:"BRANCO", c:"#FFFFFF"},
                {p:"ROXO", c:"#800080"},{p:"CINZA", c:"#808080"},{p:"AMARELO", c:"#FFFF00"},{p:"LARANJA", c:"#FFA500"},{p:"BEGE", c:"#F5F5DC"},
                {p:"VERMELHO", c:"#FF0000"},{p:"TURQUESA", c:"#40E0D0"},{p:"LILA", c:"#C8A2C8"},{p:"CREME", c:"#FFFDD0"},{p:"DOURADO", c:"#FFD700"},
                {p:"PRATA", c:"#C0C0C0"},{p:"GELO", c:"#F0F8FF"},{p:"SALMAO", c:"#FA8072"},{p:"CARMIM", c:"#960018"},{p:"VINHO", c:"#722F37"}
            ]},
            "Escola": {icon:"🎒", words:[
                {p:"COLA",i:"🧪"},{p:"PASTA",i:"🎒"},{p:"LIVRO",i:"📚"},{p:"MESA",i:"🪑"},{p:"GIZ",i:"🖍️"},{p:"ESTOJO",i:"👝"},{p:"PAPEL",i:"📄"},{p:"MAPA",i:"🗺️"},{p:"ESCOLA",i:"🏫"},{p:"ALUNO",i:"🧑‍🎓"},{p:"TINTA",i:"🎨"},{p:"BANCO",i:"🪑"},{p:"QUADRO",i:"🖼️"},{p:"CANETA",i:"🖊️"},{p:"FOLHA",i:"📄"},{p:"TESTE",i:"📝"},{p:"PINCEL",i:"🖌️"},{p:"LATA",i:"🥫"},{p:"BLOCO",i:"🗒️"},{p:"LUPA",i:"🔍"}
            ]},
            "Utensilios": {icon:"🍴", words:[
                {p:"GARFO",i:"🍴"},{p:"FACA",i:"🔪"},{p:"COPO",i:"🥛"},{p:"PRATO",i:"🍽️"},{p:"BULE",i:"🫖"},{p:"TACA",i:"🏆"},{p:"JARRA",i:"🏺"},{p:"PANELA",i:"🥘"},{p:"COLHER",i:"🥄"},{p:"TABUA",i:"🪵"},{p:"VASO",i:"🪴"},{p:"BALDE",i:"🪣"},{p:"PENTE",i:"🪮"},{p:"MALA",i:"💼"},{p:"CHAVE",i:"🔑"},{p:"LUVA",i:"🧤"},{p:"VELA",i:"🕯️"},{p:"RODO",i:"🧹"},{p:"BOTA",i:"🥾"},{p:"REDE",i:"🕸️"}
            ]}
        };

        let activeCategory = "", secretWord = "", guessedLetters = [], mistakes = 0, playedWords = {};

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay-bg').classList.toggle('active'); }
        function abrirAjuda() { document.getElementById('modal-ajuda').style.display = 'flex'; }
        function fecharAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }

        function createThemes() {
            const grid = document.getElementById('theme-grid'); grid.innerHTML = '';
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div'); card.className = 'theme-card';
                card.onclick = () => { activeCategory = key; resetGame(); };
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function resetGame() {
            if (!playedWords[activeCategory] || playedWords[activeCategory].length === 0) {
                playedWords[activeCategory] = shuffle([...themes[activeCategory].words]);
            }
            
            const data = playedWords[activeCategory].pop();
            secretWord = data.p;
            
            const hintContainer = document.getElementById('word-hint-container');
            const imgEl = document.getElementById('word-img');
            const blotEl = document.getElementById('color-blot');
            
            hintContainer.style.animation = 'none';
            hintContainer.offsetHeight;
            hintContainer.style.animation = 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

            if (activeCategory === "Cores") {
                imgEl.style.display = 'none'; blotEl.style.display = 'block';
                blotEl.style.backgroundColor = data.c;
                blotEl.style.border = (data.p === "BRANCO" || data.p === "GELO") ? "2px solid #eee" : "none";
            } else {
                imgEl.style.display = 'block'; blotEl.style.display = 'none';
                imgEl.innerText = data.i;
            }
            
            guessedLetters = []; mistakes = 0;
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('status-msg').innerText = '';
            document.getElementById('keyboard').style.display = 'grid';
            updateDisplay(); createKeyboard(); resetHangman();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const btn = document.createElement('button'); btn.className = 'key'; btn.innerText = l;
                btn.onclick = () => { if(!btn.classList.contains('used')) handleGuess(l, btn); };
                kb.appendChild(btn);
            });
        }

        function handleGuess(l, btn) {
            btn.classList.add('used');
            if(secretWord.includes(l)) {
                guessedLetters.push(l);
                if(secretWord.split("").every(x => guessedLetters.includes(x))) endGame(true);
            } else {
                mistakes++; drawHangman();
                if(mistakes === 6) endGame(false);
            }
            updateDisplay();
        }

        function updateDisplay() { document.getElementById('word-display').innerText = secretWord.split("").map(l => guessedLetters.includes(l) ? l : "_").join(" "); }
        function drawHangman() { const p = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"]; if(mistakes > 0) document.getElementById(p[mistakes-1]).style.display = 'block'; }
        function resetHangman() { ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => document.getElementById(id).style.display='none'); }

        function endGame(won) {
            const s = document.getElementById('status-msg');
            document.getElementById('keyboard').style.display = 'none';
            
            if(won) { 
                s.innerText = "🏆 MUITO BEM!"; s.style.color = "#2ecc71";
                setTimeout(() => { resetGame(); }, 1000);
            } else { 
                s.innerText = "❌ A PALAVRA ERA: " + secretWord; s.style.color = "#e74c3c";
                document.getElementById('game-controls').style.display = 'flex';
            }
        }

        createThemes();
    </script>
</body>
</html>
