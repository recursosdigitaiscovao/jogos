<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo do Enforcado: 1º Ano - Template_1</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER & SIDEBAR (Igual à Sopa de Letras) */
        header {
            width: 100%; background-color: #ffffff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        .game-icon { font-size: 1.5rem; }
        header h1 { font-size: 1rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* MODAL PERSONALIZADO */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 85%; max-width: 400px; 
            border-radius: 25px; padding: 25px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* ÁREA DO JOGO DO ENFORCADO */
        #menu-container { flex: 1; overflow-y: auto; padding: 10px; text-align: center; }
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }

        /* DESENHO DO ENFORCADO */
        .hangman-box {
            width: 150px; height: 150px; background: white; border-radius: 20px;
            margin-bottom: 20px; border: 2px solid #3498db; position: relative;
        }
        .part { position: absolute; background: #2c3e50; display: none; }
        .base { width: 60px; height: 4px; bottom: 10px; left: 45px; display: block; }
        .pole { width: 4px; height: 120px; bottom: 10px; left: 45px; display: block; }
        .top { width: 60px; height: 4px; top: 20px; left: 45px; display: block; }
        .rope { width: 2px; height: 20px; top: 20px; left: 105px; display: block; }
        .head { width: 30px; height: 30px; border-radius: 50%; border: 3px solid #2c3e50; top: 40px; left: 90px; background: none; }
        .body-p { width: 3px; height: 40px; top: 70px; left: 104px; }
        .l-arm { width: 25px; height: 3px; top: 85px; left: 80px; transform: rotate(-30deg); }
        .r-arm { width: 25px; height: 3px; top: 85px; left: 105px; transform: rotate(30deg); }
        .l-leg { width: 25px; height: 3px; top: 120px; left: 80px; transform: rotate(-45deg); }
        .r-leg { width: 25px; height: 3px; top: 120px; left: 105px; transform: rotate(45deg); }

        /* PALAVRA OCULTA */
        .word-display {
            display: flex; gap: 8px; margin-bottom: 20px; font-size: 2rem;
            font-weight: bold; color: #2c3e50; letter-spacing: 4px;
        }

        /* TECLADO */
        .keyboard {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
            max-width: 450px; margin-top: auto; padding-bottom: 20px;
        }
        .key {
            background: #e0f7fa; border: 2px solid #4dd0e1; border-radius: 10px;
            padding: 10px 5px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #4dd0e1; color: #006064; transition: 0.1s;
        }
        .key.used { background: #eee; border-color: #ccc; box-shadow: none; color: #ccc; cursor: default; }
        .key:active:not(.used) { transform: translateY(3px); box-shadow: 0 1px 0 #4dd0e1; }

        /* GRID DE TEMAS (Igual) */
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .theme-card {
            background: #e0f7fa; border-radius: 20px; padding: 20px; text-align: center;
            cursor: pointer; border: 2px solid #4dd0e1; box-shadow: 0 6px 0 #4dd0e1; position: relative;
        }
        .theme-card:active { top: 4px; box-shadow: 0 2px 0 #4dd0e1; }
        .theme-card span { font-size: 2.5rem; }
        .theme-card p { font-size: 0.85rem; font-weight: 800; color: #006064; text-transform: uppercase; }

        footer { width: 100%; padding: 12px; background: #fff; text-align: center; border-top: 2px solid #eee; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="modal-ajuda">
        <div class="modal-content">
            <h2>Como Jogar</h2>
            <p>1. Escolhe um tema.<br>
               2. Tenta adivinhar as letras da palavra.<br>
               3. Se errares muitas vezes, o boneco aparece!<br>
               4. Consegues salvar o boneco? Boa sorte! 🍀</p>
            <button onclick="fecharAjuda()" style="background:#2ecc71; color:white; border:none; padding:12px 30px; border-radius:15px; font-weight:bold; box-shadow: 0 4px 0 #27ae60;">Vamos a isso!</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="alert('Menu em breve!')">☰</span>
            <span class="game-icon">🔤</span>
            <h1 id="header-title">Jogo do Enforcado</h1>
        </div>
        <button class="btn-voltar-3d" onclick="location.reload()">⬅ Voltar</button>
    </header>

    <div id="menu-container">
        <div style="padding: 20px;"><button onclick="abrirAjuda()" style="background:#3498db; color:white; border:none; padding:10px 20px; border-radius:15px; font-weight:bold; box-shadow:0 4px 0 #2980b9;">ℹ️ Como Jogar</button></div>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div id="hint-icon" style="font-size: 3rem; margin-bottom: 10px;"></div>
        
        <div class="hangman-box">
            <div class="part base"></div>
            <div class="part pole"></div>
            <div class="part top"></div>
            <div class="part rope"></div>
            <div class="part head" id="h-head"></div>
            <div class="part body-p" id="h-body"></div>
            <div class="part l-arm" id="h-larm"></div>
            <div class="part r-arm" id="h-rarm"></div>
            <div class="part l-leg" id="h-lleg"></div>
            <div class="part r-leg" id="h-rleg"></div>
        </div>

        <div class="word-display" id="word-display"></div>
        <div class="keyboard" id="keyboard"></div>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Frutas": { icon: "🍎", words: ["MACA", "BANANA", "PERA", "UVA", "LARANJA"] },
            "Animais": { icon: "🐶", words: ["CAO", "GATO", "VACA", "LEAO", "ZEBRA"] },
            "Escola": { icon: "🎒", words: ["LAPIS", "COLA", "LIVRO", "PASTA", "RE_GUA"] }
        };

        let secretWord = "";
        let guessedLetters = [];
        let mistakes = 0;
        const maxMistakes = 6;

        function abrirAjuda() { document.getElementById('modal-ajuda').style.display = 'flex'; }
        function fecharAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }

        function createMenu() {
            const grid = document.getElementById('theme-grid');
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startGame(key);
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function startGame(theme) {
            const themeData = themes[theme];
            secretWord = themeData.words[Math.floor(Math.random() * themeData.words.length)];
            guessedLetters = [];
            mistakes = 0;

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('header-title').innerText = theme;
            document.getElementById('hint-icon').innerText = themeData.icon;

            updateDisplay();
            createKeyboard();
            resetHangman();
        }

        function createKeyboard() {
            const keys = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            keys.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = letter;
                btn.onclick = () => handleGuess(letter, btn);
                kb.appendChild(btn);
            });
        }

        function handleGuess(letter, btn) {
            if (btn.classList.contains('used')) return;
            btn.classList.add('used');

            if (secretWord.includes(letter)) {
                guessedLetters.push(letter);
                if (checkWin()) {
                    setTimeout(() => { alert("Boa! Ganhaste! 🏆 A palavra era: " + secretWord); location.reload(); }, 200);
                }
            } else {
                mistakes++;
                drawHangman();
                if (mistakes === maxMistakes) {
                    setTimeout(() => { alert("Oh não! Tenta outra vez! ⛔ A palavra era: " + secretWord); location.reload(); }, 200);
                }
            }
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('word-display');
            display.innerHTML = secretWord.split("").map(l => 
                guessedLetters.includes(l) ? l : "_"
            ).join(" ");
        }

        function checkWin() {
            return secretWord.split("").every(l => guessedLetters.includes(l));
        }

        function drawHangman() {
            const parts = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"];
            document.getElementById(parts[mistakes - 1]).style.display = 'block';
        }

        function resetHangman() {
            ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        createMenu();
    </script>
</body>
</html>
