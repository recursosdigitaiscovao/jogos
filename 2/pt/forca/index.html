<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enforcado - Template 2</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER TEMPLATE 2 */
        header {
            width: 100%; background: #2c3e50; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            color: white; border-bottom: 4px solid #1a252f; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #ecf0f1; }
        header h1 { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .btn-voltar-3d {
            text-decoration: none; color: white; background-color: #e74c3c;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 6px; border: none; box-shadow: 0 4px 0 #c0392b;
            cursor: pointer; transition: 0.1s;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #c0392b; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: #fff; box-shadow: 5px 0 25px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; padding: 25px;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            display: flex; align-items: center; gap: 12px; width: 100%; padding: 15px; 
            margin-bottom: 10px; border-radius: 10px; background: #f8f9fa;
            font-weight: 600; color: #34495e; cursor: pointer; text-decoration: none;
        }
        .sidebar-item.active { background: #3498db; color: white; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        .overlay-bg.active { display: block; }

        /* MENU DE TEMAS */
        #menu-container { flex: 1; overflow-y: auto; padding: 30px 20px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .theme-card {
            background: white; border-radius: 15px; padding: 25px;
            cursor: pointer; border: 1px solid #dcdde1; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .theme-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .theme-card span { font-size: 2.8rem; display: block; margin-bottom: 10px; }
        .theme-card p { font-weight: 700; color: #2c3e50; }

        /* JOGO */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .hangman-box { 
            width: 160px; height: 140px; position: relative; 
            margin-bottom: 30px; background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .part { position: absolute; background: #34495e; display: none; }
        .base { width: 60px; height: 5px; bottom: 15px; left: 30px; display: block; border-radius: 2px; }
        .pole { width: 5px; height: 100px; bottom: 15px; left: 30px; display: block; }
        .gallows-top { width: 70px; height: 5px; top: 20px; left: 30px; display: block; }
        .rope { width: 3px; height: 15px; top: 20px; left: 98px; display: block; }
        .head { width: 28px; height: 28px; border-radius: 50%; border: 4px solid #34495e; top: 35px; left: 86px; background: #fff; }
        .body-v { width: 4px; height: 35px; top: 63px; left: 98px; }
        .l-arm { width: 22px; height: 4px; top: 70px; left: 77px; transform: rotate(-35deg); }
        .r-arm { width: 22px; height: 4px; top: 70px; left: 99px; transform: rotate(35deg); }
        .l-leg { width: 22px; height: 4px; top: 95px; left: 78px; transform: rotate(-45deg); }
        .r-leg { width: 22px; height: 4px; top: 95px; left: 98px; transform: rotate(45deg); }

        .word-display { font-size: 2.5rem; font-weight: 800; letter-spacing: 10px; color: #2c3e50; margin: 20px 0; text-align: center; }
        .category-tag { background: #3498db; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; max-width: 500px; }
        .key { 
            background: white; border: none; border-radius: 8px;
            padding: 15px 0; font-weight: 700; font-size: 1.2rem; cursor: pointer; 
            box-shadow: 0 4px 0 #dcdde1; color: #2c3e50; transition: 0.1s;
        }
        .key:active:not(.used) { transform: translateY(2px); box-shadow: 0 2px 0 #dcdde1; }
        .key.used { background: #e9ecef; color: #adb5bd; box-shadow: none; cursor: default; }

        #game-controls { display: none; flex-direction: column; gap: 10px; width: 240px; margin-top: 20px; }
        .btn-final { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
        
        footer { width: 100%; padding: 15px; background: #fff; text-align: center; border-top: 1px solid #eee; font-size: 0.85rem; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="overlay-bg" id="overlay-bg" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom:20px; color:#2c3e50;">Menu</h3>
        <a href="#" class="sidebar-item" onclick="location.reload()">🏠 Menu Principal</a>
        <a href="#" class="sidebar-item active">🐥 1º Ano</a>
        <button onclick="toggleMenu()" style="margin-top:30px; width:100%; padding:12px; border:none; background:#eee; border-radius:8px; font-weight:bold;">Fechar</button>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <h1>Enforcado 1º Ano</h1>
        </div>
        <button class="btn-voltar-3d" onclick="location.reload()">Voltar</button>
    </header>

    <div id="menu-container">
        <h2 style="margin-bottom: 25px; color:#34495e;">Escolhe um Tema</h2>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div class="category-tag" id="current-cat-name">TEMA</div>
        
        <div class="hangman-box">
            <div class="part base"></div><div class="part pole"></div><div class="part gallows-top"></div><div class="part rope"></div>
            <div class="part head" id="h-head"></div><div class="part body-v" id="h-body"></div>
            <div class="part l-arm" id="h-larm"></div><div class="part r-arm" id="h-rarm"></div>
            <div class="part l-leg" id="h-lleg"></div><div class="part r-leg" id="h-rleg"></div>
        </div>

        <div class="word-display" id="word-display"></div>
        <div id="status-msg" style="font-weight:bold; margin-bottom:20px; min-height: 24px;"></div>
        
        <div id="game-controls">
            <button class="btn-final" style="background:#27ae60; box-shadow:0 4px 0 #219150;" onclick="resetGame()">Tentar de Novo</button>
            <button class="btn-final" style="background:#34495e; box-shadow:0 4px 0 #1a252f;" onclick="location.reload()">Mudar Tema</button>
        </div>
        <div class="keyboard" id="keyboard"></div>
    </main>

    <footer>Recursos Digitais Covão • <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Animais": {icon:"🐶", words:["GATO","PATO","VACA","ZEBRA","TIGRE","URSO","RATO","SAPO","GALO","PORCO","MOSCA","GIRAFA","MACACO","COBRA","PEIXE","PANDA","LONTRA","ESQUILO","LEAO","PERU"]},
            "Cores": {icon:"🎨", words:["AZUL","ROSA","VERDE","PRETO","BRANCO","ROXO","CINZA","AMARELO","LARANJA","BEGE","VERMELHO","TURQUESA","LILA","CREME","DOURADO","PRATA","GELO","SALMAO","CARMIM","VINHO"]},
            "Escola": {icon:"🎒", words:["COLA","PASTA","LIVRO","MESA","GIZ","ESTOJO","PAPEL","MAPA","SALA","ALUNO","TINTA","BANCO","QUADRO","CANETA","FOLHA","TESTE","PINCEL","LATA","BLOCO","LUPA"]},
            "Utensilios": {icon:"🍴", words:["GARFO","FACA","COPO","PRATO","BULE","TACA","JARRA","PANELA","COLHER","TABUA","VASO","BALDE","PENTE","MALA","CHAVE","LUVA","VELA","RODO","BOTA","REDE"]}
        };

        let activeCategory = "", secretWord = "", guessedLetters = [], mistakes = 0, playedWords = {};

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay-bg').classList.toggle('active'); }

        function createThemes() {
            const grid = document.getElementById('theme-grid'); grid.innerHTML = '';
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div'); card.className = 'theme-card';
                card.onclick = () => { activeCategory = key; resetGame(); };
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function resetGame() {
            if (!playedWords[activeCategory] || playedWords[activeCategory].length === 0) {
                playedWords[activeCategory] = shuffle([...themes[activeCategory].words]);
            }
            
            secretWord = playedWords[activeCategory].pop();
            guessedLetters = []; mistakes = 0;
            
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('status-msg').innerText = '';
            document.getElementById('keyboard').style.display = 'grid';
            document.getElementById('current-cat-name').innerText = activeCategory.toUpperCase();
            
            updateDisplay(); createKeyboard(); resetHangman();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const btn = document.createElement('button'); btn.className = 'key'; btn.innerText = l;
                btn.onclick = () => { if(!btn.classList.contains('used')) handleGuess(l, btn); };
                kb.appendChild(btn);
            });
        }

        function handleGuess(l, btn) {
            btn.classList.add('used');
            if(secretWord.includes(l)) {
                guessedLetters.push(l);
                if(secretWord.split("").every(x => guessedLetters.includes(x))) endGame(true);
            } else {
                mistakes++; drawHangman();
                if(mistakes === 6) endGame(false);
            }
            updateDisplay();
        }

        function updateDisplay() { document.getElementById('word-display').innerText = secretWord.split("").map(l => guessedLetters.includes(l) ? l : "_").join(" "); }
        function drawHangman() { const p = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"]; if(mistakes > 0) document.getElementById(p[mistakes-1]).style.display = 'block'; }
        function resetHangman() { ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => document.getElementById(id).style.display='none'); }

        function endGame(won) {
            const s = document.getElementById('status-msg');
            document.getElementById('keyboard').style.display = 'none';
            
            if(won) { 
                s.innerText = "PARABÉNS! 🌟"; s.style.color = "#27ae60";
                setTimeout(() => { resetGame(); }, 1000);
            } else { 
                s.innerText = "FIM DO JOGO. A PALAVRA ERA: " + secretWord; s.style.color = "#e74c3c";
                document.getElementById('game-controls').style.display = 'flex';
            }
        }

        createThemes();
    </script>
</body>
</html>
