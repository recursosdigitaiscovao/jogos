<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enforcado 1º Ano - Professor Luís</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        header h1 { font-size: 0.9rem; color: #2c3e50; font-weight: 800; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            display: block; width: 100%; padding: 15px; margin-bottom: 8px;
            border: none; background: #f8f9fa; border-radius: 12px;
            text-align: left; font-weight: bold; color: #2c3e50; cursor: pointer;
        }
        .sidebar-item.active { background: #ff9f43; color: white; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay-bg.active { display: block; }

        /* MENU DE TEMAS */
        #menu-container { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .theme-card {
            background: #e0f7fa; border-radius: 20px; padding: 20px; text-align: center;
            cursor: pointer; border: 2px solid #4dd0e1; box-shadow: 0 6px 0 #4dd0e1; position: relative;
        }
        .theme-card span { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .theme-card p { font-weight: 800; color: #006064; font-size: 0.8rem; text-transform: uppercase; }

        /* ÁREA DE JOGO */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 10px; gap: 10px; }
        
        /* DESENHO DO ENFORCADO CORRIGIDO */
        .hangman-box { 
            width: 160px; height: 140px; 
            position: relative; 
            background: rgba(255,255,255,0.5); 
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .part { position: absolute; background: #2c3e50; display: none; }
        .base { width: 60px; height: 4px; bottom: 10px; left: 20px; display: block; }
        .pole { width: 4px; height: 110px; bottom: 10px; left: 20px; display: block; }
        .gallows-top { width: 70px; height: 4px; top: 20px; left: 20px; display: block; }
        .rope { width: 2px; height: 20px; top: 20px; left: 88px; display: block; }
        
        .head { width: 30px; height: 30px; border-radius: 50%; border: 3px solid #2c3e50; top: 40px; left: 74px; background: white; }
        .body-v { width: 3px; height: 40px; top: 70px; left: 87px; }
        .l-arm { width: 25px; height: 3px; top: 80px; left: 63px; transform: rotate(-30deg); }
        .r-arm { width: 25px; height: 3px; top: 80px; left: 89px; transform: rotate(30deg); }
        .l-leg { width: 25px; height: 3px; top: 108px; left: 65px; transform: rotate(-45deg); }
        .r-leg { width: 25px; height: 3px; top: 108px; left: 87px; transform: rotate(45deg); }

        .word-display { font-size: 2.2rem; font-weight: bold; letter-spacing: 6px; color: #2c3e50; margin-bottom: 10px; }
        .word-img { font-size: 3.5rem; margin-bottom: 5px; }

        /* TECLADO */
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; max-width: 450px; }
        .key {
            background: #fff; border: 1px solid #ccc; border-radius: 8px;
            padding: 12px 0; font-weight: bold; font-size: 1rem; cursor: pointer;
            box-shadow: 0 3px 0 #ddd;
        }
        .key.used { background: #f0f0f0; color: #ccc; box-shadow: none; transform: translateY(2px); }

        /* MENSAGEM FINAL */
        #status-msg { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; display: none; text-align: center; }
        #game-controls { display: none; flex-direction: column; gap: 8px; width: 200px; }
        .btn-final { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
        .btn-replay { background: #2ecc71; box-shadow: 0 4px 0 #27ae60; }
        .btn-home { background: #3498db; box-shadow: 0 4px 0 #2980b9; }

        footer { width: 100%; padding: 10px; background: #fff; text-align: center; border-top: 1px solid #eee; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="overlay-bg" id="overlay-bg" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 20px;">Menu 1º Ano</h2>
        <button class="sidebar-item" onclick="location.reload()">🏠 Menu de Temas</button>
        <button class="sidebar-item active">🐥 1º Ano - Enforcado</button>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:10px; border:none; background:#eee; border-radius:8px;">Fechar</button>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <h1>Enforcado do 1º Ano</h1>
        </div>
        <button onclick="location.reload()" style="background:#ff9f43; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">Sair</button>
    </header>

    <div id="menu-container">
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div class="word-img" id="word-img">❓</div>
        
        <div class="hangman-box">
            <div class="part base"></div><div class="part pole"></div><div class="part gallows-top"></div><div class="part rope"></div>
            <div class="part head" id="h-head"></div><div class="part body-v" id="h-body"></div>
            <div class="part l-arm" id="h-larm"></div><div class="part r-arm" id="h-rarm"></div>
            <div class="part l-leg" id="h-lleg"></div><div class="part r-leg" id="h-rleg"></div>
        </div>
        
        <div class="word-display" id="word-display"></div>
        
        <div id="status-msg"></div>

        <div id="game-controls">
            <button class="btn-final btn-replay" onclick="resetGame()">Jogar de Novo 🔄</button>
            <button class="btn-final btn-home" onclick="location.reload()">Escolher Tema 🏠</button>
        </div>

        <div class="keyboard" id="keyboard"></div>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Frutas": [
                {p:"BANANA", i:"🍌"}, {p:"UVA", i:"🍇"}, {p:"FIGO", i:"🥯"}, {p:"PERA", i:"🍐"}, {p:"ANANAS", i:"🍍"},
                {p:"MANGA", i:"🥭"}, {p:"MELAO", i:"🍈"}, {p:"LIMA", i:"🍋"}, {p:"KIWI", i:"🥝"}, {p:"CEREJA", i:"🍒"}
            ],
            "Animais": [
                {p:"CAO", i:"🐶"}, {p:"GATO", i:"🐱"}, {p:"PATO", i:"🦆"}, {p:"VACA", i:"🐮"}, {p:"ZEBRA", i:"🦓"},
                {p:"LEAO", i:"🦁"}, {p:"TIGRE", i:"🐯"}, {p:"URSO", i:"🐻"}, {p:"RATO", i:"🐭"}, {p:"SAPO", i:"🐸"}
            ],
            "Cores": [
                {p:"AZUL", i:"🔵"}, {p:"ROSA", i:"💗"}, {p:"VERDE", i:"🟢"}, {p:"PRETO", i:"⚫"}, {p:"BRANCO", i:"⚪"},
                {p:"ROXO", i:"🟣"}, {p:"CINZA", i:"🔘"}, {p:"AMARELO", i:"🟡"}, {p:"LARANJA", i:"🟠"}, {p:"CASTANHO", i:"🟤"}
            ],
            "Escola": [
                {p:"COLA", i:"🧪"}, {p:"PASTA", i:"🎒"}, {p:"LIVRO", i:"📚"}, {p:"MESA", i:"🪑"}, {p:"GIZ", i:"🖍️"},
                {p:"ESTOJO", i:"👝"}, {p:"PAPEL", i:"📄"}, {p:"MAPA", i:"🗺️"}, {p:"TINTA", i:"🎨"}, {p:"SALA", i:"🏫"}
            ]
        };

        let activeCategory = "";
        let secretWord = "";
        let guessedLetters = [];
        let mistakes = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay-bg').classList.toggle('active');
        }

        function createThemes() {
            const grid = document.getElementById('theme-grid');
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => { activeCategory = key; resetGame(); };
                const icons = {"Frutas":"🍎", "Animais":"🐱", "Cores":"🎨", "Escola":"🎒"};
                card.innerHTML = `<span>${icons[key]}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function resetGame() {
            const list = themes[activeCategory];
            const data = list[Math.floor(Math.random() * list.length)];
            secretWord = data.p;
            document.getElementById('word-img').innerText = data.i;
            guessedLetters = [];
            mistakes = 0;

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('keyboard').style.display = 'grid';

            updateDisplay();
            createKeyboard();
            resetHangman();
        }

        function createKeyboard() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            letters.forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = l;
                btn.onclick = () => handleGuess(l, btn);
                kb.appendChild(btn);
            });
        }

        function handleGuess(letter, btn) {
            if (btn.classList.contains('used')) return;
            btn.classList.add('used');

            if (secretWord.includes(letter)) {
                guessedLetters.push(letter);
                if (secretWord.split("").every(l => guessedLetters.includes(l))) endGame(true);
            } else {
                mistakes++;
                drawHangman();
                if (mistakes === 6) endGame(false);
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('word-display').innerText = secretWord.split("").map(l => 
                guessedLetters.includes(l) ? l : "_"
            ).join(" ");
        }

        function drawHangman() {
            const parts = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"];
            if (mistakes > 0) document.getElementById(parts[mistakes - 1]).style.display = 'block';
        }

        function resetHangman() {
            ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        function endGame(won) {
            document.getElementById('keyboard').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            if (won) {
                msg.innerText = "🏆 PARABÉNS! GANHASTE!";
                msg.style.color = "#2ecc71";
            } else {
                msg.innerText = "❌ OH NÃO! A palavra era: " + secretWord;
                msg.style.color = "#e74c3c";
            }
        }

        createThemes();
    </script>
</body>
</html>
