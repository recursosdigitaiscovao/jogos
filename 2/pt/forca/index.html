<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enforcado - 2º Ano</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(16, 172, 132, 0.05); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; z-index: 100; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #10ac84; }
        header h1 { font-size: 0.95rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #fff; background-color: #10ac84;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: none; box-shadow: 0 4px 0 #0d8a6a;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #10ac84; margin-bottom: 20px; border-bottom: 3px solid #10ac84; padding-bottom: 5px; }
        .sidebar-item {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 14px; 
            margin-bottom: 8px; border: none; background: #f8f9fa; border-radius: 12px;
            text-align: left; font-weight: bold; color: #2c3e50; cursor: pointer; text-decoration: none;
        }
        .sidebar-item.active { background: #10ac84; color: white; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay-bg.active { display: block; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: white; width: 85%; max-width: 400px; border-radius: 25px; padding: 25px; text-align: center; }

        /* MENU DE TEMAS */
        #menu-container { flex: 1; overflow-y: auto; padding: 10px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .theme-card {
            background: #fff; border-radius: 20px; padding: 20px;
            cursor: pointer; border: 2px solid #10ac84; box-shadow: 0 6px 0 #10ac84;
        }
        .theme-card span { font-size: 2.5rem; display: block; margin-bottom: 5px; }
        .theme-card p { font-weight: 800; color: #10ac84; font-size: 0.8rem; text-transform: uppercase; }

        /* BOTÃO INFORMAÇÃO AJUSTADO */
        .btn-ajuda {
            background: #10ac84; color: white; border: none; padding: 10px 20px;
            border-radius: 15px; font-weight: bold; margin-bottom: 20px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 0 #0d8a6a;
        }

        /* JOGO - ÁREA OTIMIZADA */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: flex-start; padding: 5px 10px; gap: 5px; }
        
        .category-tag { color: #10ac84; font-weight: 800; font-size: 1rem; text-transform: uppercase; margin-top: 5px; }

        .hangman-box { 
            width: 140px; height: 120px; position: relative; 
            background: #fff; border-radius: 15px; border: 1px solid #eee; margin-bottom: 5px;
        }
        .part { position: absolute; background: #2c3e50; display: none; }
        .base { width: 50px; height: 4px; bottom: 10px; left: 30px; display: block; }
        .pole { width: 4px; height: 90px; bottom: 10px; left: 30px; display: block; }
        .gallows-top { width: 60px; height: 4px; top: 20px; left: 30px; display: block; }
        .rope { width: 2px; height: 12px; top: 20px; left: 88px; display: block; }
        .head { width: 24px; height: 24px; border-radius: 50%; border: 3px solid #2c3e50; top: 32px; left: 77px; background: #fff; }
        .body-v { width: 3px; height: 30px; top: 56px; left: 88px; }
        .l-arm { width: 18px; height: 3px; top: 62px; left: 71px; transform: rotate(-35deg); }
        .r-arm { width: 18px; height: 3px; top: 62px; left: 89px; transform: rotate(35deg); }
        .l-leg { width: 18px; height: 3px; top: 85px; left: 71px; transform: rotate(-45deg); }
        .r-leg { width: 18px; height: 3px; top: 85px; left: 88px; transform: rotate(45deg); }

        .word-display { font-size: 2.2rem; font-weight: bold; letter-spacing: 6px; color: #2c3e50; margin: 10px 0; }
        
        /* TECLADO MAIS PARA CIMA */
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; max-width: 480px; padding: 5px; margin-top: 5px; }
        .key { 
            background: #fff; border: 1px solid #ccc; border-radius: 8px;
            padding: 10px 0; font-weight: 800; font-size: 1rem; cursor: pointer; 
            box-shadow: 0 3px 0 #ddd; color: #333; transition: 0.1s;
        }
        .key.used { background: #f0f0f0; color: #bbb; border-color: #ddd; box-shadow: none; transform: translateY(2px); }

        #status-msg { font-weight: bold; margin: 5px 0; text-align: center; min-height: 20px; font-size: 1.1rem; }
        #game-controls { display: none; flex-direction: column; gap: 8px; width: 220px; margin-top: 10px; }
        .btn-final { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
        
        footer { width: 100%; padding: 10px; background: #fff; text-align: center; border-top: 1px solid #eee; font-size: 0.8rem; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="overlay-bg" id="overlay-bg" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>Menu Global</h3>
        <a href="#" class="sidebar-item" onclick="location.reload()">🏠 Início</a>
        <a href="/jogos/pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
        <a href="/jogos/1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
        <a href="/jogos/2" class="sidebar-item active"><span>🐢</span> 2º Ano</a>
        <a href="/jogos/3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
        <a href="/jogos/4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:10px; border:none; background:#eee; border-radius:8px; font-weight:bold; color:#10ac84;">Fechar ×</button>
    </div>

    <div class="modal-overlay" id="modal-ajuda">
        <div class="modal-content">
            <h2 style="color:#10ac84; margin-bottom:15px;">Como Jogar</h2>
            <p>Tenta adivinhar a palavra secreta escolhendo as letras no teclado. Se errares 6 vezes, o boneco fica completo!</p>
            <button onclick="fecharAjuda()" style="margin-top:20px; padding:12px 25px; background:#10ac84; color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">Entendi!</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <h1 id="game-title">Enforcado do 2º Ano</h1>
        </div>
        <button class="btn-voltar-3d" onclick="location.reload()">⬅ Voltar</button>
    </header>

    <div id="menu-container">
        <div style="padding: 15px;">
            <button class="btn-ajuda" onclick="abrirAjuda()">ℹ️ Como se joga</button>
        </div>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div class="category-tag" id="current-cat-name">TEMA</div>
        <div class="hangman-box">
            <div class="part base"></div><div class="part pole"></div><div class="part gallows-top"></div><div class="part rope"></div>
            <div class="part head" id="h-head"></div><div class="part body-v" id="h-body"></div>
            <div class="part l-arm" id="h-larm"></div><div class="part r-arm" id="h-rarm"></div>
            <div class="part l-leg" id="h-lleg"></div><div class="part r-leg" id="h-rleg"></div>
        </div>
        <div class="word-display" id="word-display"></div>
        <div id="status-msg" style="min-height: 24px;"></div>
        
        <div class="keyboard" id="keyboard"></div>

        <div id="game-controls">
            <button class="btn-final" style="background:#10ac84; box-shadow:0 4px 0 #0d8a6a;" onclick="resetGame()">Jogar de Novo 🔄</button>
            <button class="btn-final" style="background:#2c3e50; box-shadow:0 4px 0 #1a252f;" onclick="location.reload()">Escolher Tema 🏠</button>
        </div>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Animais": {icon:"🐶", words:["GATO","PATO","VACA","ZEBRA","TIGRE","URSO","RATO","SAPO","GALO","PORCO","MOSCA","GIRAFA","MACACO","COBRA","PEIXE","PANDA","LONTRA","ESQUILO","LEAO","PERU"]},
            "Cores": {icon:"🎨", words:["AZUL","ROSA","VERDE","PRETO","BRANCO","ROXO","CINZA","AMARELO","LARANJA","BEGE","VERMELHO","TURQUESA","LILA","CREME","DOURADO","PRATA","GELO","SALMAO","CARMIM","VINHO"]},
            "Escola": {icon:"🎒", words:["COLA","PASTA","LIVRO","MESA","GIZ","ESTOJO","PAPEL","MAPA","SALA","ALUNO","TINTA","BANCO","QUADRO","CANETA","FOLHA","TESTE","PINCEL","LATA","BLOCO","LUPA"]},
            "Utensílios": {icon:"🍴", words:["GARFO","FACA","COPO","PRATO","BULE","TACA","JARRA","PANELA","COLHER","TABUA","VASO","BALDE","PENTE","MALA","CHAVE","LUVA","VELA","RODO","BOTA","REDE"]}
        };

        let activeCategory = "", secretWord = "", guessedLetters = [], mistakes = 0, playedWords = {};

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay-bg').classList.toggle('active'); }
        function abrirAjuda() { document.getElementById('modal-ajuda').style.display = 'flex'; }
        function fecharAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }

        function createThemes() {
            const grid = document.getElementById('theme-grid'); grid.innerHTML = '';
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div'); card.className = 'theme-card';
                card.onclick = () => { activeCategory = key; resetGame(); };
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function resetGame() {
            if (!playedWords[activeCategory] || playedWords[activeCategory].length === 0) {
                playedWords[activeCategory] = shuffle([...themes[activeCategory].words]);
            }
            secretWord = playedWords[activeCategory].pop();
            guessedLetters = []; mistakes = 0;
            
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('status-msg').innerText = '';
            document.getElementById('keyboard').style.display = 'grid';
            document.getElementById('current-cat-name').innerText = activeCategory;
            
            updateDisplay(); createKeyboard(); resetHangman();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const btn = document.createElement('button'); btn.className = 'key'; btn.innerText = l;
                btn.onclick = () => { if(!btn.classList.contains('used')) handleGuess(l, btn); };
                kb.appendChild(btn);
            });
        }

        function handleGuess(l, btn) {
            btn.classList.add('used');
            if(secretWord.includes(l)) {
                guessedLetters.push(l);
                if(secretWord.split("").every(x => guessedLetters.includes(x))) endGame(true);
            } else {
                mistakes++; drawHangman();
                if(mistakes === 6) endGame(false);
            }
            updateDisplay();
        }

        function updateDisplay() { document.getElementById('word-display').innerText = secretWord.split("").map(l => guessedLetters.includes(l) ? l : "_").join(" "); }
        function drawHangman() { const p = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"]; if(mistakes > 0) document.getElementById(p[mistakes-1]).style.display = 'block'; }
        function resetHangman() { ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => document.getElementById(id).style.display='none'); }

        function endGame(won) {
            const s = document.getElementById('status-msg');
            document.getElementById('keyboard').style.display = 'none';
            if(won) { 
                s.innerText = "🏆 MUITO BEM!"; s.style.color = "#10ac84";
                setTimeout(() => { resetGame(); }, 1200);
            } else { 
                s.innerText = "❌ A PALAVRA ERA: " + secretWord; s.style.color = "#e74c3c";
                document.getElementById('game-controls').style.display = 'flex';
            }
        }
        createThemes();
    </script>
</body>
</html>
