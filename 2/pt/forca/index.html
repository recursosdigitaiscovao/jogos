<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo do Enforcado: 1º Ano - Versão Pedagógica</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER & SIDEBAR */
        header {
            width: 100%; background-color: #ffffff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .game-icon { font-size: 1.5rem; }
        header h1 { font-size: 1rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* ÁREA DE JOGO */
        #menu-container { flex: 1; overflow-y: auto; padding: 10px; text-align: center; }
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }

        /* IMAGEM DA PALAVRA */
        .word-image-container {
            font-size: 4.5rem; margin-bottom: 10px; 
            background: white; width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 4px solid #ff9f43;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* BONECO */
        .hangman-box {
            width: 140px; height: 120px; position: relative; margin-bottom: 15px;
        }
        .part { position: absolute; background: #2c3e50; display: none; }
        .base { width: 40px; height: 4px; bottom: 0; left: 20px; display: block; }
        .pole { width: 4px; height: 100px; bottom: 0; left: 20px; display: block; }
        .top { width: 50px; height: 4px; top: 0; left: 20px; display: block; }
        .rope { width: 2px; height: 15px; top: 0; left: 70px; display: block; }
        .head { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #2c3e50; top: 15px; left: 57px; background: white; }
        .body-p { width: 3px; height: 35px; top: 41px; left: 69px; }
        .l-arm { width: 20px; height: 3px; top: 55px; left: 50px; transform: rotate(-30deg); }
        .r-arm { width: 20px; height: 3px; top: 55px; left: 72px; transform: rotate(30deg); }
        .l-leg { width: 20px; height: 3px; top: 85px; left: 52px; transform: rotate(-45deg); }
        .r-leg { width: 20px; height: 3px; top: 85px; left: 70px; transform: rotate(45deg); }

        /* PALAVRA OCULTA */
        .word-display {
            display: flex; gap: 8px; margin-bottom: 20px; font-size: 1.8rem;
            font-weight: bold; color: #2c3e50; text-transform: uppercase;
        }

        /* TECLADO LARGO COM ACENTOS */
        .keyboard {
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            gap: 5px;
            width: 100%; max-width: 500px;
            padding: 10px;
        }
        .key {
            background: #e0f7fa; border: 2px solid #4dd0e1; border-radius: 8px;
            padding: 12px 0; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 4px 0 #4dd0e1; color: #006064; transition: 0.1s;
        }
        .key.used { background: #eee; border-color: #ccc; box-shadow: none; color: #ccc; cursor: default; }
        .key.accent { background: #fffde7; border-color: #fdd835; box-shadow: 0 4px 0 #fdd835; }
        .key:active:not(.used) { transform: translateY(3px); box-shadow: 0 1px 0 #4dd0e1; }

        /* GRID TEMAS */
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .theme-card {
            background: #e0f7fa; border-radius: 20px; padding: 20px; text-align: center;
            cursor: pointer; border: 2px solid #4dd0e1; box-shadow: 0 6px 0 #4dd0e1; position: relative;
        }
        .theme-card span { font-size: 2.5rem; }
        .theme-card p { font-size: 0.85rem; font-weight: 800; color: #006064; text-transform: uppercase; }

        footer { width: 100%; padding: 12px; background: #fff; text-align: center; border-top: 2px solid #eee; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span class="game-icon">🔤</span>
            <h1 id="header-title">Enforcado do 1º Ano</h1>
        </div>
        <button class="btn-voltar-3d" onclick="location.reload()">⬅ Voltar</button>
    </header>

    <div id="menu-container">
        <div style="padding: 20px;"></div>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div class="word-image-container" id="word-image">❓</div>
        
        <div class="hangman-box">
            <div class="part base"></div><div class="part pole"></div><div class="part top"></div><div class="part rope"></div>
            <div class="part head" id="h-head"></div><div class="part body-p" id="h-body"></div>
            <div class="part l-arm" id="h-larm"></div><div class="part r-arm" id="h-rarm"></div>
            <div class="part l-leg" id="h-lleg"></div><div class="part r-leg" id="h-rleg"></div>
        </div>

        <div class="word-display" id="word-display"></div>
        <div class="keyboard" id="keyboard"></div>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Frutas": { icon: "🍎", words: [
                {p: "MAÇÃ", i: "🍎"}, {p: "BANANA", i: "🍌"}, {p: "LARANJA", i: "🍊"}, {p: "PÊRA", i: "🍐"}, {p: "LIMÃO", i: "🍋"}
            ]},
            "Animais": { icon: "🦁", words: [
                {p: "CÃO", i: "🐶"}, {p: "GATO", i: "🐱"}, {p: "LEÃO", i: "🦁"}, {p: "ARAÑA", i: "🕷️"}, {p: "TUBARÃO", i: "🦈"}
            ]},
            "Escola": { icon: "🎒", words: [
                {p: "LÁPIS", i: "✏️"}, {p: "RÉGUA", i: "📏"}, {p: "COLA", i: "🧪"}, {p: "CADERNO", i: "📓"}, {p: "MOCHILA", i: "🎒"}
            ]}
        };

        let secretWord = "";
        let guessedLetters = [];
        let mistakes = 0;

        function createMenu() {
            const grid = document.getElementById('theme-grid');
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startGame(key);
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function startGame(theme) {
            const data = themes[theme].words[Math.floor(Math.random() * themes[theme].words.length)];
            secretWord = data.p;
            document.getElementById('word-image').innerText = data.i;
            guessedLetters = [];
            mistakes = 0;

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('header-title').innerText = theme;

            updateDisplay();
            createKeyboard();
            resetHangman();
        }

        function createKeyboard() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZÇÁÉÍÓÚÂÊÔ".split("");
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            letters.forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'key' + (l.length > 1 || "ÇÁÉÍÓÚÂÊÔ".includes(l) ? ' accent' : '');
                btn.innerText = l;
                btn.onclick = () => handleGuess(l, btn);
                kb.appendChild(btn);
            });
        }

        function handleGuess(letter, btn) {
            if (btn.classList.contains('used')) return;
            btn.classList.add('used');

            if (secretWord.toUpperCase().includes(letter)) {
                guessedLetters.push(letter);
                if (checkWin()) {
                    setTimeout(() => { alert("Muito bem! Acertaste: " + secretWord + " 🏆"); location.reload(); }, 200);
                }
            } else {
                mistakes++;
                drawHangman();
                if (mistakes === 6) {
                    setTimeout(() => { alert("Tenta outra vez! A palavra era: " + secretWord); location.reload(); }, 200);
                }
            }
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('word-display');
            display.innerHTML = secretWord.split("").map(l => 
                guessedLetters.includes(l.toUpperCase()) ? l : "_"
            ).join(" ");
        }

        function checkWin() {
            return secretWord.split("").every(l => guessedLetters.includes(l.toUpperCase()));
        }

        function drawHangman() {
            const parts = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"];
            document.getElementById(parts[mistakes - 1]).style.display = 'block';
        }

        function resetHangman() {
            ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        createMenu();
    </script>
</body>
</html>
