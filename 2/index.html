<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2º Ano - Disciplinas</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: #55efc4; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.6rem;
            cursor: pointer;
            color: #2d3436;
        }

        header h1 {
            font-size: 1.1rem;
            color: #2d3436;
            font-weight: 700;
        }

        /* BOTÃO VOLTAR - ATUALIZADO PARA O VERDE #55efc4 */
        .btn-voltar-3d {
            text-decoration: none;
            color: #2d3436;
            background-color: #55efc4;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 8px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #1dd1a1;
            box-shadow: 0 3px 0 #1dd1a1;
            transition: all 0.2s ease;
        }

        .btn-voltar-3d:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1dd1a1;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar h3 {
            color: #2d3436;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #55efc4;
        }

        .sidebar-item {
            text-decoration: none;
            color: #636e72;
            font-weight: 600;
            padding: 14px;
            border-radius: 15px;
            background: #fdfdfd;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .sidebar-item:hover { 
            background: #55efc4; 
            color: white; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 150;
        }
        .overlay.active { display: block; }

        /* Área Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 20px;
        }

        .emoji-principal {
            font-size: 4.5rem;
            margin-bottom: 5px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08));
        }

        .subtitulo {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 35px;
            text-align: center;
            opacity: 0.9;
        }

        /* BOTÕES DISCIPLINAS */
        .menu-disciplinas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 850px;
        }

        .btn-disciplina {
            background: #ffffff;
            text-decoration: none;
            padding: 25px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            height: clamp(160px, 28vh, 220px);
        }

        .btn-disciplina span { 
            font-size: 3.5rem; 
            transition: transform 0.3s ease;
        }

        .portugues { color: #4b7bec; box-shadow: 0 6px 0 rgba(75, 123, 236, 0.4); }
        .matematica { color: #eb3b5a; box-shadow: 0 6px 0 rgba(235, 59, 90, 0.4); }
        .estudo-meio { color: #20bf6b; box-shadow: 0 6px 0 rgba(32, 191, 107, 0.4); }

        .btn-disciplina:hover {
            transform: translateY(-2px);
        }

        .btn-disciplina:hover span {
            transform: scale(1.1);
        }

        .btn-disciplina:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        /* Footer */
        footer {
            width: 100%;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            text-align: center;
            color: #95a5a6;
            font-size: 0.85rem;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .menu-disciplinas { grid-template-columns: 1fr; gap: 15px; }
            .btn-disciplina { 
                height: 85px; 
                flex-direction: row; 
                justify-content: flex-start;
                padding-left: 25px;
                border-radius: 22px;
            }
            .btn-disciplina span { font-size: 2.2rem; min-width: 45px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f8f9fa; cursor:pointer; font-weight:bold; border-radius:12px; color:#636e72;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Menu do 2º Ano</h1>
        </div>
        <a href="../" class="btn-voltar-3d">
            <span>⬅</span> VOLTAR
        </a>
    </header>

    <main>
        <div class="emoji-principal">🐥</div>
        <p class="subtitulo">Qual a aventura que vamos escolher?</p>

        <nav class="menu-disciplinas">
            <a href="pt/" class="btn-disciplina portugues">
                <span>📚</span> Português
            </a>

            <a href="mat/" class="btn-disciplina matematica">
                <span>🧮</span> Matemática
            </a>

            <a href="em/" class="btn-disciplina estudo-meio">
                <span>🌍</span> Estudo do Meio
            </a>
        </nav>
    </main>

    <footer>
        Recursos Digitais Covão • <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
