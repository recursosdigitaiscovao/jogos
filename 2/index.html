<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Disciplinas</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: #55efc4; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: #2c3e50;
        }

        header h1 {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 800;
        }

        .btn-voltar-3d {
            text-decoration: none;
            color: #000000;
            background-color: #55efc4;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #1dd1a1;
            box-shadow: 0 2px 0 #1dd1a1;
            transition: all 0.1s ease;
        }

        .btn-voltar-3d:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #1dd1a1;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #55efc4;
        }

        .sidebar-item {
            text-decoration: none;
            color: #444;
            font-weight: bold;
            padding: 14px;
            border-radius: 12px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .sidebar-item:hover { 
            background: #55efc4; 
            color: #000; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 150;
        }
        .overlay.active { display: block; }

        /* Área Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 20px;
        }

        .emoji-principal {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitulo {
            font-size: 1.2rem;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }

        /* BOTÕES ESTILO JOGO */
        .menu-disciplinas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .btn-disciplina {
            position: relative;
            background: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 900;
            border: 4px solid #fff;
            transition: all 0.2s ease;
            overflow: hidden;
            height: clamp(150px, 25vh, 200px);
        }

        /* Cores e Sombras 3D específicas */
        .portugues { 
            color: #2980b9; 
            box-shadow: 0 10px 0 #2980b9, 0 15px 20px rgba(0,0,0,0.1); 
        }
        .matematica { 
            color: #c0392b; 
            box-shadow: 0 10px 0 #c0392b, 0 15px 20px rgba(0,0,0,0.1); 
        }
        .estudo-meio { 
            color: #27ae60; 
            box-shadow: 0 10px 0 #27ae60, 0 15px 20px rgba(0,0,0,0.1); 
        }

        .btn-disciplina span { 
            font-size: 4rem; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Efeito de Brilho nos botões */
        .btn-disciplina::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .btn-disciplina:hover::after { left: 100%; }

        .btn-disciplina:hover span { transform: scale(1.2); }

        .btn-disciplina:active {
            transform: translateY(6px);
        }
        
        .portugues:active { box-shadow: 0 4px 0 #2980b9; }
        .matematica:active { box-shadow: 0 4px 0 #c0392b; }
        .estudo-meio:active { box-shadow: 0 4px 0 #27ae60; }

        /* Footer */
        footer {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.9rem;
        }

        /* Ajustes Mobile */
        @media (max-width: 600px) {
            .menu-disciplinas { grid-template-columns: 1fr; gap: 20px; }
            .btn-disciplina { 
                height: 90px; 
                flex-direction: row; 
                justify-content: flex-start;
                padding-left: 30px;
                gap: 25px;
            }
            .btn-disciplina span { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Menu do 1º Ano</h1>
        </div>
        <a href="../" class="btn-voltar-3d">
            <span>⬅</span> VOLTAR
        </a>
    </header>

    <main>
        <div class="emoji-principal">🐥</div>
        <p class="subtitulo">Olá, exploradores! Vamos jogar?</p>

        <nav class="menu-disciplinas">
            <a href="pt/" class="btn-disciplina portugues">
                <span>📚</span> Português
            </a>

            <a href="mat/" class="btn-disciplina matematica">
                <span>🧮</span> Matemática
            </a>

            <a href="em/" class="btn-disciplina estudo-meio">
                <span>🌍</span> Estudo do Meio
            </a>
        </nav>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
