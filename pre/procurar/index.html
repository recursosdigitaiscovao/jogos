<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Encontra o Animal</title>
    <style>
        /* Reset e Estilo Geral - Template Identico */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #ffffff; /* Fundo Branco */
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Barra Superior Rosa - Template Identico */
        header {
            background-color: #ffb3c6; /* Rosa Pastel do Pré */
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .titulo-container { display: flex; align-items: center; gap: 8px; }
        header h2 { margin: 0; font-size: clamp(0.85rem, 4vw, 1.2rem); }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            border: 1px solid white;
        }

        /* Área do Jogo Responsiva */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            gap: 15px;
            width: 100%;
        }

        /* Cartão Principal Branco - Template Identico */
        .card-principal {
            background: #fff9fa; /* Fundo ligeiramente rosado */
            border: 4px solid #ffdae3;
            padding: clamp(10px, 4vw, 20px);
            border-radius: 25px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Instrução com o Animal Alvo */
        .instrucao-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            border-bottom: 2px solid #ffdae3;
            padding-bottom: 10px;
        }

        .texto-instrucao {
            font-size: clamp(1.1rem, 5vw, 1.5rem);
            font-weight: bold;
            color: #ff6b81;
            margin: 0;
        }

        #animal-alvo {
            font-size: clamp(3rem, 10vw, 4.5rem); /* Animal Alvo GRANDE */
            margin: 0;
            animation: pulse 2s infinite;
        }

        /* Grelha de 10 Opções (Animais) */
        .grelha-animais {
            display: grid;
            /* 5 colunas por defeito para caberem 10 animais (2 linhas) */
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 2vw, 15px);
            width: 100%;
            padding: 10px 0;
        }

        /* Botão Animal (Template Identico) */
        .btn-animal {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 18px;
            padding: clamp(8px, 2vw, 15px);
            font-size: clamp(2rem, 8vw, 3rem); /* Tamanho do Animal na grelha */
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; /* Mantém quadrado */
            box-shadow: 0 4px 0 #e0e0e0;
        }

        /* Feedback Visual - Template Identico */
        .btn-animal.correto { background-color: #7bed9f !important; border-color: #2ed573 !important; box-shadow: 0 4px 0 #2ed573 !important; }
        .btn-animal.errado { background-color: #ff7675 !important; border-color: #d63031 !important; box-shadow: 0 4px 0 #d63031 !important; }

        .btn-animal:active { transform: translateY(2px); box-shadow: 0 2px 0 #e0e0e0; }

        /* Barra de Progresso/Rondas */
        .progresso { color: #95a5a6; font-weight: bold; font-size: 0.9rem; margin-top: auto; padding-bottom: 10px; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Painel Final - Template Identico */
        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            flex: 1;
        }

        .botoes-final {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin-top: 20px;
        }

        .btn-final {
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        /* AJUSTES RESPONSIVOS */
        
        /* Tablets e Ecrãs Médios */
        @media (min-width: 600px) {
            .grelha-animais { gap: 15px; }
            .card-principal { padding: 20px; }
        }

        /* Telemóveis em Paisagem (Landscape) */
        @media (max-height: 500px) and (orientation: landscape) {
            header { height: 50px; }
            main { padding: 5px 15px; gap: 5px; }
            .card-principal { flex-direction: row; gap: 15px; padding: 10px; border-width: 2px; }
            .instrucao-container { flex-direction: column; width: 30%; border-bottom: none; border-right: 2px solid #ffdae3; padding: 0 10px 0 0; }
            .texto-instrucao { font-size: 1rem; }
            #animal-alvo { font-size: 3rem; }
            .grelha-animais { width: 70%; grid-template-columns: repeat(5, 1fr); padding: 0; gap: 8px; }
            .btn-animal { font-size: 2rem; padding: 5px; }
            .progresso { font-size: 0.8rem; padding: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="titulo-container">
            <span>🔍</span> <h2>Onde está o Animal?</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        
        <div class="card-principal">
            <div class="instrucao-container">
                <p class="texto-instrucao">Encontra o:</p>
                <div id="animal-alvo">🦁</div>
            </div>

            <div class="grelha-animais" id="grelha">
                </div>
        </div>

        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 10</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🏆</div>
        <h1 style="color: #ff6b81; margin: 0;">Parabéns!</h1>
        <p style="font-size: 1.2rem; color: #7f8c8d;">És um observador fantástico!</p>
        
        <div class="botoes-final">
            <button class="btn-final" style="background:#2ecc71;" onclick="reiniciarJogo()">Jogar de Novo 🔄</button>
            <a href="../index.html" class="btn-final" style="background:#ffb3c6;">Sair ⬅️</a>
        </div>
    </div>

    <script>
        // Pool de animais (apenas emojis)
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', 'Koala', '🐙', '🐷', '🐮', '🐱', '🐶'];
        let ronda = 1;
        let animalCerto = '';

        function iniciarRonda() {
            // Se o jogo terminar (10 rondas)
            if (ronda > 10) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            
            // 1. Escolher o animal certo (alvo)
            animalCerto = animaisPool[Math.floor(Math.random() * animaisPool.length)];
            document.getElementById('animal-alvo').innerText = animalCerto;

            // 2. Criar lista de 10 opções (1 certa + 9 erradas)
            let opcoes = [animalCerto];
            while (opcoes.length < 10) {
                let errado = animaisPool[Math.floor(Math.random() * animaisPool.length)];
                // Garante que não repete animais na grelha
                if (!opcoes.includes(errado)) {
                    opcoes.push(errado);
                }
            }

            // 3. Embaralhar opções aleatoriamente
            opcoes.sort(() => Math.random() - 0.5);

            // 4. Gerar os botões na grelha
            const container = document.getElementById('grelha');
            container.innerHTML = ''; // Limpar ronda anterior
            
            opcoes.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'btn-animal';
                btn.innerText = emoji;
                btn.onclick = () => verificarResposta(emoji, btn);
                container.appendChild(btn);
            });
        }

        function verificarResposta(escolha, btn) {
            // Evitar cliques múltiplos durante o feedback
            if (document.querySelector('.correto') || document.querySelector('.errado')) return;

            if (escolha === animalCerto) {
                btn.classList.add('correto'); // Feedback verde
                setTimeout(() => {
                    ronda++;
                    iniciarRonda();
                }, 1000); // Espera 1 segundo para passar de ronda
            } else {
                btn.classList.add('errado'); // Feedback vermelho
                setTimeout(() => btn.classList.remove('errado'), 600); // Remove o vermelho após 0.6s
            }
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarRonda();
        }

        // Iniciar o jogo pela primeira vez
        iniciarRonda();
    </script>
</body>
</html>
