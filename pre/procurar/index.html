<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Encontra o Animal</title>
    <style>
        /* Reset e Estilo Geral */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #ffffff;
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Barra Superior Rosa */
        header {
            background-color: #ffb3c6; 
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .titulo-container { display: flex; align-items: center; gap: 8px; }
        header h2 { margin: 0; font-size: clamp(0.85rem, 4vw, 1.1rem); }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            border: 1px solid white;
        }

        /* Área do Jogo Responsiva */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            gap: 15px;
            width: 100%;
        }

        /* Cartão Principal */
        .card-principal {
            background: #fff9fa;
            border: 4px solid #ffdae3;
            padding: clamp(10px, 4vw, 20px);
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Instrução e Alvo */
        .instrucao-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #ffdae3;
        }

        .texto-instrucao {
            font-size: clamp(1rem, 5vw, 1.3rem);
            font-weight: bold;
            color: #ff6b81;
            margin: 0;
        }

        #animal-alvo {
            font-size: clamp(3rem, 12vw, 4.5rem);
            animation: pulse 2s infinite;
        }

        /* Grelha de 10 Opções */
        .grelha-animais {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .btn-animal {
            background: white;
            border: 3px solid #f0f0f0;
            border-radius: 15px;
            padding: 5px;
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            box-shadow: 0 4px 0 #f0f0f0;
        }

        /* Feedback */
        .btn-animal.correto { background-color: #7bed9f !important; border-color: #2ed573 !important; box-shadow: 0 4px 0 #2ed573 !important; }
        .btn-animal.errado { background-color: #ff7675 !important; border-color: #d63031 !important; box-shadow: 0 4px 0 #d63031 !important; }
        .btn-animal:active { transform: translateY(2px); box-shadow: 0 2px 0 #f0f0f0; }

        .progresso { color: #95a5a6; font-weight: bold; font-size: 0.9rem; margin-top: 10px; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Painel Final */
        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            flex: 1;
        }

        .botoes-final {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin-top: 20px;
        }

        .btn-final {
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* AJUSTES RESPONSIVOS (PAISAGEM/LANDSCAPE) */
        @media (max-height: 500px) and (orientation: landscape) {
            main { padding: 5px; }
            .card-principal { flex-direction: row; max-width: 600px; padding: 10px; }
            .instrucao-container { flex-direction: column; width: 30%; border-bottom: none; border-right: 2px dashed #ffdae3; margin-bottom: 0; }
            .grelha-animais { width: 70%; padding-left: 10px; }
            .btn-animal { font-size: 1.8rem; }
            #animal-alvo { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="titulo-container">
            <span>🔍</span> <h2>Onde está o Animal?</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <div class="card-principal">
            <div class="instrucao-container">
                <p class="texto-instrucao">Encontra o:</p>
                <div id="animal-alvo">🦁</div>
            </div>

            <div class="grelha-animais" id="grelha"></div>
        </div>
        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 10</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🏆</div>
        <h1 style="color: #ff6b81; margin: 0;">Parabéns!</h1>
        <p style="font-size: 1.2rem; color: #7f8c8d;">És um observador fantástico!</p>
        <div class="botoes-final">
            <button class="btn-final" style="background:#2ecc71;" onclick="reiniciarJogo()">Jogar de Novo 🔄</button>
            <a href="../index.html" class="btn-final" style="background:#ffb3c6;">Sair ⬅️</a>
        </div>
    </div>

    <script>
        // Pool de animais corrigido (apenas Emojis)
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨', '🐷', '🐮', '🐱', '🐶', '🦓', '🐹'];
        let ronda = 1;
        let animalCerto = '';

        function iniciarRonda() {
            if (ronda > 10) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            animalCerto = animaisPool[Math.floor(Math.random() * animaisPool.length)];
            document.getElementById('animal-alvo').innerText = animalCerto;

            let opcoes = [animalCerto];
            while (opcoes.length < 10) {
                let errado = animaisPool[Math.floor(Math.random() * animaisPool.length)];
                if (!opcoes.includes(errado)) {
                    opcoes.push(errado);
                }
            }

            opcoes.sort(() => Math.random() - 0.5);

            const container = document.getElementById('grelha');
            container.innerHTML = '';
            
            opcoes.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'btn-animal';
                btn.innerText = emoji;
                btn.onclick = () => verificarResposta(emoji, btn);
                container.appendChild(btn);
            });
        }

        function verificarResposta(escolha, btn) {
            if (document.querySelector('.correto') || document.querySelector('.errado')) return;

            if (escolha === animalCerto) {
                btn.classList.add('correto');
                setTimeout(() => {
                    ronda++;
                    iniciarRonda();
                }, 800);
            } else {
                btn.classList.add('errado');
                setTimeout(() => btn.classList.remove('errado'), 500);
            }
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarRonda();
        }

        iniciarRonda();
    </script>
</body>
</html>
