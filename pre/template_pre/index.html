<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Template Jogo</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: rgba(255, 179, 198, 0.4); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.6rem;
            cursor: pointer;
            color: #2d3436;
        }

        .jogo-icon {
            font-size: 1.4rem;
        }

        header h1 {
            font-size: 1.1rem;
            color: #2d3436;
            font-weight: 700;
        }

        .btn-voltar-3d-rosa {
            text-decoration: none;
            color: #2d3436;
            background-color: #ffb3c6;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ef87a1;
            box-shadow: 0 3px 0 #ef87a1;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        .btn-voltar-3d-rosa:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #ef87a1;
        }

        /* Sidebar - Menu Hambúrguer */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar h3 {
            color: #2d3436;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffb3c6;
        }

        .sidebar-item {
            text-decoration: none;
            color: #636e72;
            font-weight: 600;
            padding: 14px;
            border-radius: 15px;
            background: #fdfdfd;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .sidebar-item:hover { 
            background: #ffb3c6; 
            color: white; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 150;
        }
        .overlay.active { display: block; }

        /* Área Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.2); 
        }

        .mensagem-template {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2d3436;
            text-align: center;
            line-height: 1.4;
            max-width: 80%;
        }

        footer {
            width: 100%;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            text-align: center;
            color: #2d3436;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="/jogos/" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="/jogos/pre/" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="/jogos/1/" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="/jogos/2/" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="/jogos/3/" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="/jogos/4/" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f8f9fa; cursor:pointer; font-weight:bold; border-radius:12px; color:#636e72;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <div class="jogo-icon">🎮</div> 
            <h1>Template para os jogos</h1>
        </div>
        <a href="/jogos/pre/" class="btn-voltar-3d-rosa">
            <span>⬅</span> VOLTAR
        </a>
    </header>

    <main>
        <p class="mensagem-template">Template para os jogos da Pré</p>
    </main>

    <footer>
        Recursos Digitais Covão • <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
