<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Template Base - Pré-Escolar</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            /* Fundo com a transparência aplicada ao rosa do Pré-Escolar */
            background-color: rgba(255, 179, 198, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* HEADER PADRONIZADO */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: #2c3e50;
        }

        .game-icon {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }

        header h1 {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: 800;
        }

        /* BOTÃO VOLTAR 3D - ROSA PRÉ-ESCOLAR */
        .btn-voltar-3d {
            text-decoration: none;
            color: #ffffff;
            background-color: #ffb3c6;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ff8fa3;
            box-shadow: 0 2px 0 #ff8fa3;
            transition: all 0.1s ease;
        }

        .btn-voltar-3d:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #ff8fa3;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }
        .sidebar h3 { 
            color: #2c3e50; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            border-bottom: 2px solid #ffb3c6; 
        }

        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px;
        }
        .sidebar-item:hover { background: #ffb3c6; color: white; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DE CONTEÚDO PRINCIPAL */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* FOOTER */
        footer {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../../../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../../../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../../../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span class="game-icon">🦒</span>
            <h1>Título da Atividade (Pré)</h1>
        </div>
        <a href="../" class="btn-voltar-3d">
            <span>⬅</span> Voltar
        </a>
    </header>

    <main>
        <p style="color: #7f8c8d;">Nova atividade colorida para os mais pequenos!</p>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
