<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Jogo das Letras</title>
    <style>
        /* Reset e Estilo Geral */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(255, 179, 198, 0.4); 
            color: #2c3e50;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* HEADER PADRONIZADO */
        header {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; padding: 5px; }
        header h1 { font-size: 1rem; color: #2d3436; font-weight: 700; }
        
        .icon-abc { color: #0984e3; font-weight: 900; font-size: 1.1rem; letter-spacing: -1px; }

        .btn-voltar-3d {
            text-decoration: none;
            color: #2d3436;
            background-color: #ffb3c6;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #ef87a1;
            box-shadow: 0 3px 0 #ef87a1; 
            transition: all 0.1s ease;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 12px; border-radius: 12px; background: #fdfdfd;
            display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
            border: 1px solid #eee;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DO JOGO */
        main {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 10px; overflow-y: auto;
        }

        /* NOVA INSTRUÇÃO NO CORPO */
        .instrucao-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .instrucao-texto {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ef87a1;
            text-shadow: 1px 1px 0px white;
        }
        .btn-info-circular {
            width: 24px; height: 24px; border-radius: 50%;
            background: #2d3436; color: white; border: none;
            font-size: 0.8rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .cartao-letra {
            background: white;
            width: 150px;
            height: 170px;
            border: 6px dashed #ffdae3;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            background-image: radial-gradient(#fff5f7 2px, transparent 2px);
            background-size: 15px 15px;
        }
