<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold; color:var(--cor-principal);">MENU</span>
        <button onclick="toggleMenu()" style="border:none; background:none; cursor:pointer; font-size:20px;">✕</button>
    </div>
    <a href="/jogos/" class="sidebar-item">🏠 Início</a>
    <a href="/jogos/pre/" class="sidebar-item"><img id="side-pre" src=""> Pré-Escolar</a>
    <a href="/jogos/1/" class="sidebar-item"><img id="side-1" src=""> 1º Ano</a>
    <a href="/jogos/2/" class="sidebar-item"><img id="side-2" src=""> 2º Ano</a>
    <a href="/jogos/3/" class="sidebar-item"><img id="side-3" src=""> 3º Ano</a>
    <a href="/jogos/4/" class="sidebar-item"><img id="side-4" src=""> 4º Ano</a>
</div>

<header class="nav-bar">
    <button onclick="toggleMenu()" style="background:none; border:none; font-size:26px; color:var(--cor-principal); cursor:pointer;">☰</button>
    <h1 style="display:flex; align-items:center; gap:10px; font-size:1rem; color:var(--cor-principal); margin: 0;">
        <img id="header-icon" src="" style="height:32px;"> Pré-Escolar - Sombras
    </h1>
    <a href="../" style="background:var(--cor-principal); color:white; padding:8px 15px; border-radius:50px; text-decoration:none; font-weight:bold; font-size:0.8rem;">⬅ Voltar</a>
</header>

<main class="main-content">
    <div id="shared-gear-menu" class="gear-menu"></div>

    <section id="intro-screen" class="screen active">
        <div class="game-card">
            <div class="explanation-box">
                <img id="anim-shadow-img" src="" class="anim-shadow">
                <img id="anim-animal-img" src="" class="anim-item">
                <p style="color:var(--cor-texto); font-weight:bold; margin-top:15px;">De quem é esta sombra?</p>
            </div>
            <h2 style="color:var(--cor-principal); text-align:center; margin:10px 0;">Sombras Misteriosas</h2>
            <div class="intro-controls" style="display:flex; gap:10px; width:100%;">
                <button class="btn-jogar" onclick="startGame()">JOGAR</button>
                <div class="gear-btn" onclick="toggleGear(this)">
                    <img class="gear-img-src" src="" style="width:100%;">
                </div>
            </div>
        </div>
    </section>

    <section id="game-screen" class="screen">
        <div class="game-card">
            <div class="card-header">
                <div class="info-top">
                    <span>⏱️ <span id="lbl-timer">00:00</span></span>
                </div>
                <div class="stars-container" id="stars-bar"></div>
                <div>PTS: <span id="points">0</span></div>
            </div>
            <div id="main-game-area" class="game-area">
                <div id="targets-grid" class="drop-grid"></div>
                <div id="drags-grid" class="drag-grid"></div>
            </div>
            <div class="gear-btn rd-float" onclick="toggleGear(this)">
                <img class="gear-img-src" src="" style="width:100%;">
            </div>
        </div>
    </section>
</main>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2 id="modal-title" style="color:var(--cor-principal);">Parabéns!</h2>
        <div id="modal-msg" style="margin: 20px 0;"></div>
        <button class="btn-jogar" style="width:100%" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<!-- ÁUDIOS CURTOS -->
<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script src="dados.js"></script>
<script>
    let currentRound = 1, points = 0;
    let selectedTheme = 'animais', matchedCount = 0;
    let dragElement = null, startX, startY;
    let timerInterval, seconds = 0;
    const MAX_ROUNDS = 10; // 5 Nível 1 + 5 Nível 2

    window.onload = () => {
        const p = JOGO_CONFIG.caminhoIcons;
        const g = JOGO_CONFIG.caminhoGeralImg;
        document.getElementById('header-icon').src = p + JOGO_CONFIG.iconesMenu.pre;
        document.getElementById('side-pre').src = p + JOGO_CONFIG.iconesMenu.pre;
        document.getElementById('side-1').src = p + JOGO_CONFIG.iconesMenu.ano1;
        document.getElementById('side-2').src = p + JOGO_CONFIG.iconesMenu.ano2;
        document.getElementById('side-3').src = p + JOGO_CONFIG.iconesMenu.ano3;
        document.getElementById('side-4').src = p + JOGO_CONFIG.iconesMenu.ano4;
        document.querySelectorAll('.gear-img-src').forEach(img => img.src = g + "rd.png");
        
        const menuCat = document.getElementById('shared-gear-menu');
        Object.keys(JOGO_CONFIG.categorias).forEach(key => {
            const cat = JOGO_CONFIG.categorias[key];
            const div = document.createElement('div');
            div.className = 'gear-opt';
            div.onclick = () => setTheme(key);
            div.innerHTML = `<img src="${cat.caminho + cat.lista[0]}">`;
            menuCat.appendChild(div);
        });
        setTheme('animais');
    };

    function startTimer() {
        clearInterval(timerInterval);
        seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('lbl-timer').innerText = `${mins}:${secs}`;
        }, 1000);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    
    function toggleGear(btn) { 
        const menu = document.getElementById('shared-gear-menu');
        if(menu.classList.contains('active')) { menu.style.display = 'none'; menu.classList.remove('active'); return; }
        const rect = btn.getBoundingClientRect();
        menu.style.display = 'flex';
        menu.style.left = (rect.left - menu.offsetWidth + rect.width) + "px";
        menu.style.top = (rect.top - menu.offsetHeight - 10) + "px";
        menu.classList.add('active');
    }

    function setTheme(t) { 
        selectedTheme = t; 
        currentRound = 1;
        const menu = document.getElementById('shared-gear-menu');
        menu.classList.remove('active'); menu.style.display = 'none';
        const cat = JOGO_CONFIG.categorias[t];
        document.getElementById('anim-shadow-img').src = cat.caminho + cat.lista[0];
        document.getElementById('anim-animal-img').src = cat.caminho + cat.lista[0];
        if(document.getElementById('game-screen').classList.contains('active')) { loadRound(); startTimer(); }
    }

    function startGame() {
        document.getElementById('intro-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        startTimer();
        initStars();
        loadRound();
    }

    function initStars() {
        const bar = document.getElementById('stars-bar');
        bar.innerHTML = '';
        for(let i=0; i<MAX_ROUNDS; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            bar.appendChild(s);
        }
    }

    function loadRound() {
        matchedCount = 0;
        const cat = JOGO_CONFIG.categorias[selectedTheme];
        let allItems = [...cat.lista].sort(() => 0.5 - Math.random());
        
        let targets = [], drags = [];

        // Nível 1: Rondas 1 a 5 | Nível 2: Rondas 6 a 10
        if(currentRound <= 5) {
            targets = allItems.slice(0, 5);
            drags = [...targets].sort(() => 0.5 - Math.random());
        } else {
            let selection = allItems.slice(0, 8);
            drags = [...selection].sort(() => 0.5 - Math.random());
            targets = selection.slice(0, 5).sort(() => 0.5 - Math.random());
        }

        const tGrid = document.getElementById('targets-grid');
        const dGrid = document.getElementById('drags-grid');
        tGrid.innerHTML = ''; dGrid.innerHTML = '';

        targets.forEach(img => {
            const div = document.createElement('div');
            div.className = 'target-box';
            div.dataset.id = img;
            div.innerHTML = `<img src="${cat.caminho + img}">`;
            tGrid.appendChild(div);
        });

        drags.forEach(img => {
            const div = document.createElement('div');
            div.className = 'item-drag';
            div.dataset.id = img;
            div.innerHTML = `<img src="${cat.caminho + img}">`;
            div.addEventListener('mousedown', startDrag);
            div.addEventListener('touchstart', startDrag, {passive: false});
            dGrid.appendChild(div);
        });
    }

    function startDrag(e) {
        e.preventDefault();
        dragElement = this;
        const event = e.type === 'touchstart' ? e.touches[0] : e;
        const rect = dragElement.getBoundingClientRect();
        startX = event.clientX - rect.left;
        startY = event.clientY - rect.top;
        dragElement.classList.add('dragging');
        dragElement.style.width = rect.width + 'px';
        dragElement.style.height = rect.height + 'px';
        moveAt(event.clientX, event.clientY);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);
    }

    function onMove(e) { const event = e.type === 'touchmove' ? e.touches[0] : e; moveAt(event.clientX, event.clientY); }
    function moveAt(clientX, clientY) { if(dragElement) { dragElement.style.left = (clientX - startX) + 'px'; dragElement.style.top = (clientY - startY) + 'px'; } }

    function stopDrag(e) {
        if(!dragElement) return;
        const event = e.type === 'touchend' ? e.changedTouches[0] : e;
        dragElement.hidden = true;
        const elemBelow = document.elementFromPoint(event.clientX, event.clientY);
        dragElement.hidden = false;
        
        const target = elemBelow ? elemBelow.closest('.target-box') : null;

        if(target && !target.classList.contains('filled')) {
            if(target.dataset.id === dragElement.dataset.id) {
                playSound('snd-correct');
                target.classList.add('filled');
                dragElement.remove();
                points += 20;
                document.getElementById('points').innerText = points;
                matchedCount++;
                if(matchedCount === 5) {
                    updateVisualFeedback(true);
                    setTimeout(nextRound, 600);
                }
            } else {
                // ERRO: Errou a sombra, pula ronda
                playSound('snd-wrong');
                updateVisualFeedback(false);
                setTimeout(nextRound, 600);
            }
        } else if (!target && elemBelow && !elemBelow.closest('.drag-grid')) {
             // Se soltar fora de um target mas noutra área
             dragReset();
        } else {
            dragReset();
        }

        if(dragElement) dragReset();
        
        document.removeEventListener('mousemove', onMove); document.removeEventListener('touchmove', onMove);
        document.removeEventListener('mouseup', stopDrag); document.removeEventListener('touchend', stopDrag);
    }

    function dragReset() {
        if(dragElement) {
            dragElement.classList.remove('dragging');
            dragElement.style.position = 'relative';
            dragElement.style.left = '0'; dragElement.style.top = '0';
            dragElement = null;
        }
    }

    function playSound(id) {
        const s = document.getElementById(id);
        s.currentTime = 0;
        s.play().catch(e => {});
    }

    function updateVisualFeedback(isCorrect) {
        const stars = document.querySelectorAll('.star');
        const targetStar = stars[currentRound - 1];
        if(targetStar) {
            targetStar.classList.add(isCorrect ? 'correct' : 'wrong');
        }
    }

    function nextRound() {
        if(currentRound < MAX_ROUNDS) {
            currentRound++;
            loadRound();
        } else {
            endGame();
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        const finalTime = document.getElementById('lbl-timer').innerText;
        document.getElementById('modal-msg').innerHTML = `<h2>Fantástico!</h2><p>Pontos: <b>${points}</b></p><p>Tempo: <b>${finalTime}</b></p>`;
        document.getElementById('modal').style.display = 'flex';
    }
</script>
