<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Sombras - Educativo</title>
    <style>
        /* ESTILOS DO JOGO */
        :root {
            --cor-primaria: #4A90E2;
            --cor-sucesso: #2ECC71;
            --cor-fundo: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--cor-fundo);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 900px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .hidden { display: none !important; }

        /* Menu */
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .btn-categoria {
            padding: 20px;
            background: white;
            border: 3px solid var(--cor-primaria);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-categoria:hover {
            background: var(--cor-primaria);
            color: white;
            transform: translateY(-5px);
        }

        /* Área de Jogo */
        .hud {
            display: flex;
            justify-content: space-around;
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .match-container {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin-top: 20px;
        }

        .coluna {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            min-height: 400px;
        }

        /* Peças coloridas */
        .peca-drag {
            width: 90px;
            height: 90px;
            object-fit: contain;
            cursor: grab;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 5px;
            margin: auto;
        }

        .peca-drag:active { cursor: grabbing; }

        /* Sombras */
        .alvo-sombra {
            width: 100px;
            height: 100px;
            border: 2px dashed #bbb;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            margin: auto;
        }

        .img-sombra {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: brightness(0); /* Cria a sombra preta */
            opacity: 0.2;
        }

        /* Acerto */
        .acertou {
            border: 2px solid var(--cor-sucesso) !important;
            background: #eafff2 !important;
        }
        .acertou .img-sombra {
            filter: none !important;
            opacity: 1 !important;
        }

        /* Modal Relatório */
        #modal-relatorio {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .btn-restart {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- ECRÃ INICIAL -->
    <div id="ecra-menu">
        <h1>Jogo das Sombras</h1>
        <p>Escolhe uma categoria para jogar:</p>
        <div id="grid-categorias" class="grid-categorias"></div>
    </div>

    <!-- ECRÃ DE JOGO -->
    <div id="ecra-jogo" class="hidden">
        <div class="hud">
            <div id="info-nivel">Nível 1</div>
            <div id="info-tempo">Tempo: 0s</div>
            <div id="info-pontos">Pontos: 0</div>
        </div>
        
        <div class="match-container">
            <div id="coluna-objetos" class="coluna"></div>
            <div id="coluna-sombras" class="coluna"></div>
        </div>
    </div>

    <!-- RELATÓRIO FINAL -->
    <div id="modal-relatorio" class="hidden">
        <div class="modal-content">
            <h2 id="rel-titulo"></h2>
            <p id="rel-pontos-valor"></p>
            <p id="rel-tempo-valor"></p>
            <button class="btn-restart" onclick="location.reload()">Jogar Novamente</button>
        </div>
    </div>
</div>

<script>
    /* =======================================================
       DADOS.JS (Mantido fiel na íntegra conforme o template)
       ======================================================= */
    var JOGO_CONFIG = {
        caminhoIcons: "../../icons/", 
        caminhoImg: "../../img/",
        iconesMenu: {
            pre: "iconpre.png",
            ano1: "icon1.png",
            ano2: "icon2.png",
            ano3: "icon3.png",
            ano4: "icon4.png"
        },
        categorias: {
            animais: {
                nome: "Animais",
                caminho: "../../img/animaisdomesticos/",
                lista: ["galinha.png", "cabra.png", "ovelha.png", "coelho.png", "burro.png", "peru.png", "porco.png", "cavalo.png", "vaca.png", "pato.png", "gato.png", "cao.png"]
            },
            frutas: {
                nome: "Frutas",
                caminho: "../../img/frutas/",
                lista: ["ananas.png", "banana.png", "cereja.png", "kiwi.png", "laranja.png", "maca.png", "melancia.png", "morango.png", "papaia.png", "pera.png", "uvas.png"]
            },
            materialescolar: {
                nome: "Material Escolar",
                caminho: "../../img/materialescolar/",
                lista: ["cola.png", "folha.png", "tesoura.png", "capa.png", "estojo.png", "livro.png", "esquadro.png", "regua.png", "mochila.png", "borracha.png", "caneta.png", "pincel.png", "lapis.png", "afia.png"]
            },
            numeros: {
                nome: "Números",
                iconeEspecial: "123.png",
                caminho: "../../img/numeros/",
                lista: ["zero.png", "um.png", "dois.png", "tres.png", "quatro.png", "cinco.png", "seis.png", "sete.png", "oito.png", "nove.png", "dez.png"]
            },
            letras: {
                nome: "Letras",
                iconeEspecial: "abc.png",
                caminho: "../../img/letras/",
                lista: [
                    "letra_a.png", "letra_b.png", "letra_c.png", "letra_d.png", "letra_e.png", 
                    "letra_f.png", "letra_g.png", "letra_h.png", "letra_i.png", "letra_j.png", 
                    "letra_k.png", "letra_l.png", "letra_m.png", "letra_n.png", "letra_o.png", 
                    "letra_p.png", "letra_q.png", "letra_r.png", "letra_s.png", "letra_t.png", 
                    "letra_u.png", "letra_v.png", "letra_w.png", "letra_x.png", "letra_y.png", "letra_z.png"
                ]
            }
        },
        relatorio: {
            titulo: "Fim do Jogo!",
            pontosTotal: "Pontos:",
            tempoTotal: "Tempo:"
        }
    };

    /* =======================================================
       LÓGICA DO JOGO
       ======================================================= */
    let nivelAtual = 1;
    let categoriaAtiva = null;
    let acertosNoNivel = 0;
    let pontosAcumulados = 0;
    let segundos = 0;
    let timerId;

    // 1. Gerar Menu Inicial baseado no Objeto JOGO_CONFIG
    const menuGrid = document.getElementById('grid-categorias');
    for (const key in JOGO_CONFIG.categorias) {
        const cat = JOGO_CONFIG.categorias[key];
        const btn = document.createElement('div');
        btn.className = 'btn-categoria';
        btn.innerHTML = `<span>${cat.nome}</span>`;
        btn.onclick = () => iniciarJogo(key);
        menuGrid.appendChild(btn);
    }

    function iniciarJogo(idCat) {
        categoriaAtiva = JOGO_CONFIG.categorias[idCat];
        document.getElementById('ecra-menu').classList.add('hidden');
        document.getElementById('ecra-jogo').classList.remove('hidden');
        
        timerId = setInterval(() => {
            segundos++;
            document.getElementById('info-tempo').innerText = `Tempo: ${segundos}s`;
        }, 1000);

        carregarFase();
    }

    function carregarFase() {
        acertosNoNivel = 0;
        const totalItens = (nivelAtual === 1) ? 6 : 8;
        document.getElementById('info-nivel').innerText = `Nível ${nivelAtual}`;

        // Limpar colunas
        const colObj = document.getElementById('coluna-objetos');
        const colSom = document.getElementById('coluna-sombras');
        colObj.innerHTML = '';
        colSom.innerHTML = '';

        // Sorteia itens da lista da categoria
        let itensSorteados = [...categoriaAtiva.lista]
            .sort(() => Math.random() - 0.5)
            .slice(0, totalItens);

        // Criar peças para arrastar (Embaralhadas)
        let ordemDrag = [...itensSorteados].sort(() => Math.random() - 0.5);
        ordemDrag.forEach(nomeImg => {
            const img = document.createElement('img');
            img.src = categoriaAtiva.caminho + nomeImg;
            img.className = 'peca-drag';
            img.id = "drag-" + nomeImg.split('.')[0];
            img.draggable = true;
            img.ondragstart = (e) => e.dataTransfer.setData("text", nomeImg);
            colObj.appendChild(img);
        });

        // Criar sombras alvo (Embaralhadas)
        let ordemSombra = [...itensSorteados].sort(() => Math.random() - 0.5);
        ordemSombra.forEach(nomeImg => {
            const divAlvo = document.createElement('div');
            divAlvo.className = 'alvo-sombra';
            divAlvo.dataset.match = nomeImg;
            
            // Gerar a sombra usando a própria imagem + CSS filter
            divAlvo.innerHTML = `<img src="${categoriaAtiva.caminho + nomeImg}" class="img-sombra">`;

            // Drag Events
            divAlvo.ondragover = (e) => e.preventDefault();
            divAlvo.ondrop = (e) => {
                e.preventDefault();
                const idArrastado = e.dataTransfer.getData("text");
                if (idArrastado === divAlvo.dataset.match) {
                    divAlvo.classList.add('acertou');
                    // Esconder a peça colorida original
                    const pecaOriginal = document.getElementById("drag-" + idArrastado.split('.')[0]);
                    if(pecaOriginal) pecaOriginal.style.visibility = "hidden";
                    
                    pontosAcumulados += 10;
                    acertosNoNivel++;
                    document.getElementById('info-pontos').innerText = `Pontos: ${pontosAcumulados}`;
                    
                    if (acertosNoNivel === totalItens) {
                        proximoPasso();
                    }
                }
            };
            colSom.appendChild(divAlvo);
        });
    }

    function proximoPasso() {
        if (nivelAtual === 1) {
            setTimeout(() => {
                alert("Nível 1 concluído! Vamos para o Nível 2 (8 itens)");
                nivelAtual = 2;
                carregarFase();
            }, 500);
        } else {
            finalizarJogo();
        }
    }

    function finalizarJogo() {
        clearInterval(timerId);
        const rel = JOGO_CONFIG.relatorio;
        document.getElementById('modal-relatorio').classList.remove('hidden');
        document.getElementById('rel-titulo').innerText = rel.titulo;
        document.getElementById('rel-pontos-valor').innerText = `${rel.pontosTotal} ${pontosAcumulados}`;
        document.getElementById('rel-tempo-valor').innerText = `${rel.tempoTotal} ${segundos}s`;
    }
</script>

</body>
</html>
