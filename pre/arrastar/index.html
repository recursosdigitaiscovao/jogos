<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Sombras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Menu de Categorias -->
        <div id="menu-categorias">
            <h1>Escolha uma Categoria</h1>
            <div id="lista-categorias"></div>
        </div>

        <!-- Área do Jogo -->
        <div id="jogo-area" class="hidden">
            <div id="header-jogo">
                <span id="label-nivel">Nível 1</span>
                <span id="label-tempo">Tempo: 0s</span>
            </div>
            
            <div class="match-container">
                <div id="coluna-objetos" class="dropzone-container"></div>
                <div id="coluna-sombras" class="dropzone-container"></div>
            </div>
        </div>

        <!-- Modal de Relatório -->
        <div id="modal-fim" class="hidden">
            <div class="modal-content">
                <h2 id="res-titulo"></h2>
                <p id="res-pontos"></p>
                <p id="res-tempo"></p>
                <button onclick="location.reload()">Jogar Novamente</button>
            </div>
        </div>
    </div>

    <script src="dados.js"></script>
    <script src="script.js"></script>
</body>
</html>
