<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Jogo das Sombras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <!-- Menu Principal -->
        <div id="menu-inicial">
            <h1>Jogo das Sombras</h1>
            <div id="container-categorias"></div>
        </div>

        <!-- Tela de Jogo -->
        <div id="tela-jogo" class="hidden">
            <div class="hud">
                <div id="display-nivel">Nível 1</div>
                <div id="display-tempo">00:00</div>
            </div>
            
            <div class="game-board">
                <div id="col-objetos" class="col"></div>
                <div id="col-sombras" class="col"></div>
            </div>
        </div>

        <!-- Relatório Final -->
        <div id="modal-relatorio" class="hidden">
            <div class="modal-box">
                <h2 id="rel-titulo"></h2>
                <p id="rel-pontos"></p>
                <p id="rel-tempo"></p>
                <button onclick="location.reload()">Reiniciar</button>
            </div>
        </div>
    </div>

    <script src="dados.js"></script>
    <script src="script.js"></script>
</body>
</html>
