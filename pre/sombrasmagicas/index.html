<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-page: #e9f0f8; 
            --bg-header: #f0f7ff;
            --bg-container: #e9f0f8;
            --bg-card: #ffffff;
            --borda-card: none;
            --sombra-card: 0 15px 35px rgba(0,0,0,0.1);
            /* Espaço do Jogo (src-game) */
            --bg-espaco-jogo: #ffffff;
            --borda-espaco-jogo: 3px dashed #ccc;
            
            --primary-blue: #5ba4e5; 
            --primary-dark: #3d7db8; 
            --text-grey: #5d7082; 
            --header-h: 70px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            height: var(--header-h); background: var(--bg-header); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.05); z-index: 2500;
        }

        .game-container { 
            flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; 
            background-color: var(--bg-container); 
        }
        
        .game-card { 
            background: var(--bg-card); width: 100%; max-width: 1000px; height: 100%; 
            border-radius: 40px; padding: 20px; display: flex; flex-direction: column;
            border: var(--borda-card);
            box-shadow: var(--sombra-card);
            position: relative; overflow: hidden;
        }

        /* ESPAÇO DO JOGO (src-game) */
        #game-main-content { 
            flex: 1; width: 100%; 
            background: var(--bg-espaco-jogo); 
            border: var(--borda-espaco-jogo); 
            border-radius: 30px; display: flex; align-items: center; justify-content: center; 
            padding: 15px; position: relative; overflow: hidden; 
        }

        /* Badges Flat */
        .badge { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 12px; color: white; }
        .badge-timer { background: #cbd9e6; color: var(--text-grey); }
        .badge-round { background: var(--primary-blue); }
        .badge-hit { background: #7ed321; }
        .badge-miss { background: #ff5e5e; }

        /* Estilos base omitidos para brevidade, mantêm-se os originais do menu/telas */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; flex: 1; }
        .screen.active { display: flex !important; }
        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .status-group { display: flex; align-items: center; gap: 8px; }
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; }
    </style>
</head>
<body>
    <header id="main-header">
        <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src=""><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
        <div class="header-right"></div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div class="status-group"><div class="badge badge-timer">⏳ <span id="timer-val">00:00</span></div><div class="badge badge-round"><span id="round-val">1 / 10</span></div></div>
                <div class="status-group"><div class="badge badge-hit">✓ <span id="hits-val">0</span></div><div class="badge badge-miss">✗ <span id="miss-val">0</span></div></div>
            </div>

            <section class="screen active" id="scr-intro">
                <p id="intro-instr"></p>
                <button onclick="goToGame()">JOGAR</button>
            </section>

            <section class="screen" id="scr-game">
                <div id="game-main-content">
                    <!-- Espaço do Jogo (src-game) -->
                </div>
            </section>
        </div>
    </main>

    <script src="categorias.js"></script>
    <script src="dados.js"></script>
    <script src="jogo.js"></script>

    <script>
    function initUI() {
        const setup = CONFIG_MESTRE; 
        const tema = BIBLIOTECA_TEMAS[setup.area]; 
        const cont = BIBLIOTECA_CONTEUDO[setup.ano][setup.area]; 
        const conf = JOGO_CONFIG;

        const root = document.documentElement;

        // 1. APLICAÇÃO CIRÚRGICA DE CORES (Prioridade para o Conteúdo do Ano)
        root.style.setProperty('--primary-blue', tema.corPrimaria); 
        root.style.setProperty('--bg-page', tema.corPagina);
        
        // Header
        root.style.setProperty('--bg-header', cont.corHeader || tema.corHeader || '#f0f7ff');
        
        // Container
        root.style.setProperty('--bg-container', cont.corContainer || tema.corContainer || tema.corPagina);
        
        // Card Principal
        root.style.setProperty('--bg-card', cont.corCard || tema.corCard || '#ffffff');
        root.style.setProperty('--borda-card', cont.bordaCard || 'none');
        root.style.setProperty('--sombra-card', cont.sombraCard || '0 15px 35px rgba(0,0,0,0.1)');

        // Espaço do Jogo (src-game / game-main-content)
        root.style.setProperty('--bg-espaco-jogo', cont.corEspacoJogo || '#ffffff');
        root.style.setProperty('--borda-espaco-jogo', cont.bordaEspacoJogo || '3px dashed rgba(0,0,0,0.1)');

        // Textos
        document.getElementById('tit-l1').innerText = cont.t1; 
        document.getElementById('tit-l2').innerText = cont.t2; 
        document.getElementById('sub-tit').innerText = cont.sub; 
        
        if(window.gerarIntroJogo) {
            document.getElementById('intro-instr').innerText = window.gerarIntroJogo();
        }
        
        // Restante da lógica de ícones e menus...
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu[setup.ano];
    }

    function toggleHamburger(e) { /* Lógica Hamburguer */ }
    function goToGame() { 
        document.getElementById('scr-intro').classList.remove('active'); 
        document.getElementById('scr-game').classList.add('active'); 
        document.getElementById('status-bar').style.display = 'flex';
    }
    
    window.onload = initUI;
    </script>
</body>
</html>
