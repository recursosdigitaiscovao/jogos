<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sombras Mágicas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-page: #e9f0f8; --bg-header: #ffffff; --bg-container: #ffffff;
            --primary-blue: #5ba4e5; --primary-dark: #3d7db8; --highlight-green: #7ed321; 
            --error-red: #ff5e5e; --white: #ffffff; --text-grey: #5d7082; --header-h: 70px; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; height: 100dvh; 
            width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column; 
        }
        
        header { 
            height: var(--header-h); background: var(--bg-header); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; z-index: 2500; flex-shrink: 0; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4); position: relative; 
        }

        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }

        .game-container { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            padding: 10px; overflow: hidden; /* Garante que nada sai daqui */
        }

        .game-card { 
            background: var(--bg-container); 
            width: 100%; max-width: 1000px; 
            height: 100%; max-height: 800px; /* Limite para não esticar demais em monitores gigantes */
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(176,196,217,0.5); 
            display: flex; flex-direction: column; 
            padding: 15px; position: relative; overflow: hidden; 
        }

        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
        .badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 13px; color: white; }

        #game-main-content { 
            flex: 1; width: 100%; 
            background: var(--white); 
            border: 2px dashed rgba(91, 164, 229, 0.2); 
            border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; /* Conteúdo interno será gerado pelo jogo.js */
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex !important; }

        .btn-jogar-stretch { background: var(--primary-blue); color: white; border: none; border-radius: 15px; padding: 15px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); width: 100%; max-width: 300px; }
        .btn-jogar-stretch:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--primary-dark); }

        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 20px; border-radius: 25px 25px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .rd-item { background: #f8f9fa; border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; font-weight: 700; font-size: 13px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 2000; }
        
        /* Classes auxiliares para o Drag and Drop */
        .drop-target.hover { background: #f0f7ff !important; border-color: var(--highlight-green) !important; transform: scale(1.02); }
        .dragging { opacity: 0.4; }

        @media (max-width: 600px) {
            .logo-text h1 { font-size: 14px; }
            .badge { padding: 4px 8px; font-size: 11px; }
            .game-card { border-radius: 15px; padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    <header>
        <div class="header-left"><i class="fas fa-bars hamburger-btn" style="font-size: 24px; color: var(--primary-blue); cursor:pointer;" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src="" style="height:40px;"><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1></div></div>
        <div class="header-right"><a href="#" id="link-voltar-header" class="btn-voltar-header" style="text-decoration:none;"><span id="txt-voltar-header" style="color:var(--primary-blue); font-weight:900; font-size:12px;"></span></a></div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div style="display:flex; gap:8px;"><div class="badge" style="background:#cbd9e6; color:#5d7082;">⏳ <span id="timer-val">00:00</span></div><div class="badge" style="background:var(--primary-blue);">⭐ <span id="round-val">1/10</span></div></div>
                <div style="display:flex; gap:8px; align-items:center;"><div class="badge" style="background:var(--highlight-green);"><i class="fas fa-check"></i> <span id="hits-val">0</span></div><img id="rd-game-btn" src="" style="height:28px; cursor:pointer;" onclick="openRDMenu(event)"></div>
            </div>

            <!-- INTRO -->
            <section class="screen active" id="scr-intro">
                <div id="intro-animation-container" style="flex:1; width:100%; display:flex; align-items:center; justify-content:center;"></div>
                <p style="font-weight:900; color:var(--text-grey); margin-bottom:15px; text-align:center; font-size:14px;">ARRASTA A IMAGEM OU CLICA NA CERTA!</p>
                <button class="btn-jogar-stretch" onclick="startCurrentGame()">JOGAR</button>
            </section>

            <!-- JOGO -->
            <section class="screen" id="scr-game">
                <div id="game-main-content"></div>
            </section>
            
            <!-- RESULTADO -->
            <section class="screen" id="scr-result">
                <img id="res-taca" style="height:100px; margin-bottom:15px;">
                <h2 id="res-tit" style="color:var(--primary-blue); font-weight:900; margin-bottom:15px; text-align:center;"></h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <div style="background:#f8f9fa; padding:10px 20px; border-radius:15px; text-align:center; border:1px solid #eee;">
                        <span id="res-pts" style="font-size:20px; font-weight:900; color:var(--primary-blue);"></span><br><small>ACERTOS</small>
                    </div>
                    <div style="background:#f8f9fa; padding:10px 20px; border-radius:15px; text-align:center; border:1px solid #eee;">
                        <span id="res-tim" style="font-size:20px; font-weight:900; color:var(--primary-blue);"></span><br><small>TEMPO</small>
                    </div>
                </div>
                <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
            </section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel"><div id="rd-list"></div></div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
        function initUI() {
            const setup = CONFIG_MESTRE; const tema = BIBLIOTECA_TEMAS[setup.area]; const cont = BIBLIOTECA_CONTEUDO[setup.ano][setup.area]; const conf = JOGO_CONFIG;
            document.documentElement.style.setProperty('--primary-blue', tema.corPrimaria); 
            document.documentElement.style.setProperty('--bg-page', tema.corPagina);
            document.documentElement.style.setProperty('--bg-header', tema.corHeader);
            document.documentElement.style.setProperty('--bg-container', tema.corContainer);
            
            document.getElementById('tit-l1').innerText = cont.t1; document.getElementById('tit-l2').innerText = cont.t2;
            document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu[setup.ano];
            document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
            document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
            document.getElementById('link-voltar-header').href = conf.linkVoltar;

            if(window.selecionarCategoria) selecionarCategoria('animais');

            // Exemplo animado
            document.getElementById('intro-animation-container').innerHTML = `
                <div style="display:flex; align-items:center; gap:20px;">
                    <img src="${conf.caminhoImg}animaisselvagens/leao.png" style="height:60px; border:2px solid #eee; border-radius:10px; padding:5px;">
                    <i class="fas fa-arrow-right" style="color:var(--primary-blue); font-size:20px; animation: bounceX 1.5s infinite;"></i>
                    <img src="${conf.caminhoImg}animaisselvagens/leao.png" style="height:60px; filter:brightness(0); border:2px dashed #ccc; border-radius:10px; padding:5px;">
                </div>
                <style>@keyframes bounceX { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(10px); } }</style>
            `;

            // Menu Temas
            const rdBox = document.getElementById('rd-list'); rdBox.innerHTML = '';
            Object.keys(conf.categorias).forEach(key => {
                const c = conf.categorias[key]; const div = document.createElement('div'); div.className = 'rd-item';
                div.innerHTML = `<img src="${conf.caminhoImg}${c.imgCapa}" style="height:40px; display:block; margin:0 auto 5px;">${c.nome}`;
                div.onclick = () => { selecionarCategoria(key); closeMenus(); goToIntro(); }; rdBox.appendChild(div);
            });
        }

        function startCurrentGame() {
            document.getElementById('scr-intro').classList.remove('active');
            document.getElementById('scr-game').classList.add('active');
            document.getElementById('status-bar').style.display = 'flex';
            if(window.initGame) window.initGame();
        }

        function goToIntro() { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-intro').classList.add('active');
            document.getElementById('status-bar').style.display = 'none';
        }

        function openRDMenu(e) { e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
        function toggleHamburger() { /* Lógica do menu lateral se necessário */ }
        window.onload = initUI;
    </script>
</body>
</html>
