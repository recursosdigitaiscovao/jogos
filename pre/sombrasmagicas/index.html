<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #5ba4e5; --primary-dark: #3d7db8; 
            --bg-header: #ffffff; --bg-main: #e9f0f8; --bg-card: #ffffff; --border-card: #5ba4e5;
            --highlight-green: #7ed321; --error-red: #ff5e5e; --text-grey: #5d7082; --header-h: 70px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-main); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        header { 
            height: var(--header-h); background: var(--bg-header); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; 
            z-index: 2500; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); position: relative; 
        }

        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 48px; width: auto; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 8px; color: #88a; font-weight: 700; text-transform: uppercase; }

        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 7px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 0 var(--primary-dark); }

        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .game-card { 
            background: var(--bg-card); width: 100%; max-width: 1000px; height: 100%; 
            border-radius: 40px; 
            /* TRACEJADO DISCRETO: 2px e opacidade na cor */
            border: 2px dashed rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; padding: 25px; position: relative; overflow: hidden; 
        }

        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; }
        .status-group { display: flex; align-items: center; gap: 10px; }
        .badge { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 12px; border-radius: 15px; font-weight: 900; font-size: 13px; color: white; }
        .badge-timer { background: #cbd9e6; color: var(--text-grey); }
        .badge-round { background: var(--primary-blue); box-shadow: 0 3px 0 var(--primary-dark); }
        .badge-hit { background: var(--highlight-green); }
        .badge-miss { background: var(--error-red); }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; flex: 1; }
        .screen.active { display: flex !important; }
        
        #game-main-content { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }

        .btn-jogar-stretch { background: var(--primary-blue); color: white; border: none; border-radius: 20px; padding: 18px; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); width: 100%; text-decoration: none; }
        
        .menu-dropdown { position: absolute; top: 60px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 3000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-decoration: none; color: var(--text-grey); font-weight: 700; }
        
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 25px; border-radius: 35px 35px 0 0; transition: 0.4s; }
        .rd-panel.active { bottom: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 2000; }

        @media (max-width: 650px) { .btn-voltar-header { display: none; } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    <header>
        <div class="header-left"><i class="fas fa-bars" style="font-size:28px; color:var(--primary-blue); cursor:pointer;" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src=""><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
        <div class="header-right"><a href="#" id="link-voltar-header" class="btn-voltar-header"><span>VOLTAR</span></a></div>
    </header>

    <main class="game-container">
        <div class="game-card" id="main-card">
            <div class="status-bar" id="status-bar">
                <div class="status-group"><div class="badge badge-timer">⏳ <span id="timer-val">00:00</span></div><div class="badge badge-round"><span id="round-val">1 / 10</span></div></div>
                <div class="status-group"><div class="badge badge-hit">✅ <span id="hits-val">0</span></div><div class="badge badge-miss">❌ <span id="miss-val">0</span></div><img id="rd-game-btn" src="" style="height:40px; cursor:pointer;" onclick="openRDMenu(event)"></div>
            </div>

            <!-- ECRÃ 1: INTRO -->
            <section class="screen active" id="scr-intro">
                <div id="intro-animation-container" style="flex:1; width:100%; display:flex; align-items:center; justify-content:center;"></div>
                <p id="intro-instr" style="font-weight: 800; color: var(--text-grey); text-align: center; margin-bottom: 25px;"></p>
                <div style="display:flex; width:100%; gap:15px; align-items:center; max-width:400px;"><button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button><img id="rd-intro-btn" src="" onclick="openRDMenu(event)" style="height:60px; cursor:pointer;"></div>
            </section>

            <!-- ECRÃ 2: JOGO -->
            <section class="screen" id="scr-game"><div id="game-main-content"></div></section>
            
            <!-- ECRÃ 3: RESULTADOS -->
            <section class="screen" id="scr-result">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
                    <img id="res-taca" style="width:130px; margin-bottom:15px;">
                    <h2 id="res-tit" style="font-size:32px; color: var(--primary-blue); font-weight:900; margin-bottom:20px;"></h2>
                    <div style="display:flex; gap:15px; margin-bottom:30px;">
                        <div style="background:#f8f9fa; padding:15px 25px; border-radius:20px; text-align:center;"><span id="res-pts" style="font-size:28px; font-weight:900; color:var(--primary-blue);">0</span><br><small style="font-weight:800; color:#88a;">ACERTOS</small></div>
                        <div style="background:#f8f9fa; padding:15px 25px; border-radius:20px; text-align:center;"><span id="res-tim" style="font-size:28px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small style="font-weight:800; color:#88a;">TEMPO</small></div>
                    </div>
                    <button class="btn-jogar-stretch" style="max-width:300px;" onclick="location.reload()">REPETIR</button>
                </div>
            </section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel"><h3 style="text-align:center; color:var(--primary-blue); margin-bottom:20px; font-weight:900;">Escolher Tema</h3><div id="rd-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;"></div></div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
    function initUI() {
        const setup = CONFIG_MESTRE; const tema = BIBLIOTECA_TEMAS[setup.area]; 
        const cont = BIBLIOTECA_CONTEUDO[setup.ano][setup.area]; const conf = JOGO_CONFIG;

        const root = document.documentElement;
        root.style.setProperty('--primary-blue', tema.corPrimaria);
        root.style.setProperty('--primary-dark', tema.corEscura);
        root.style.setProperty('--bg-header', tema.corHeader);
        root.style.setProperty('--bg-main', tema.corFundoMain);
        root.style.setProperty('--bg-card', tema.corFundoCard);
        
        // Ajuste discreto na borda: Cor do tema com opacidade 0.3
        document.getElementById('main-card').style.borderColor = tema.corBordaCard + "4D"; 

        document.getElementById('tit-l1').innerText = cont.t1; 
        document.getElementById('tit-l2').innerText = cont.t2; 
        document.getElementById('sub-tit').innerText = cont.sub; 
        document.getElementById('intro-instr').innerText = cont.intro;
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu[setup.ano];
        document.getElementById('rd-intro-btn').src = conf.caminhoImg + "rd.png"; 
        document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('link-voltar-header').href = conf.linkVoltar; 

        const menuBox = document.getElementById('dropdownMenu'); menuBox.innerHTML = '';
        ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}"><span>${k.toUpperCase()}</span>`;
            menuBox.appendChild(a);
        });

        const rdBox = document.getElementById('rd-list'); rdBox.innerHTML = '';
        Object.keys(conf.categorias).forEach(key => {
            const c = conf.categorias[key]; const div = document.createElement('div'); div.className = 'rd-item';
            div.style.cssText = "background:#f8f9fa; padding:15px; border-radius:15px; text-align:center; cursor:pointer;";
            div.innerHTML = `<img src="${conf.caminhoImg}${c.imgCapa}" height="50"><br><span style="font-weight:800; font-size:12px;">${c.nome}</span>`;
            div.onclick = () => { if(window.selecionarCategoria) window.selecionarCategoria(key); closeMenus(); goToIntro(); }; 
            rdBox.appendChild(div);
        });
        if(window.startLogic) window.startLogic();
    }

    function goToIntro() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-intro').classList.add('active'); document.getElementById('status-bar').style.display = 'none'; }
    function goToGame() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-game').classList.add('active'); document.getElementById('status-bar').style.display = 'flex'; if(window.initGame) window.initGame(); }
    function toggleHamburger() { const m = document.getElementById('dropdownMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; document.getElementById('overlay').style.display = m.style.display === 'flex' ? 'block' : 'none'; }
    function openRDMenu() { document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    
    window.onload = initUI;
    </script>
</body>
</html>
