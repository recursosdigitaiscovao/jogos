<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Associa o Par - Professor Luís</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }

        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: contain;
        }

        header {
            background-color: #ffb3c6;
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            flex-shrink: 0;
        }

        header h2 { margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }

        .btn-topo {
            color: white; text-decoration: none; font-weight: bold;
            background: rgba(255,255,255,0.2); padding: 5px 10px;
            border-radius: 8px; font-size: 0.75rem; border: 1px solid white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 5px;
            align-items: center;
            justify-content: center;
        }

        .instrucao {
            font-size: 0.95rem;
            font-weight: bold;
            color: #ff6b81;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Estrutura Responsiva em 3 Colunas */
        .game-wrapper {
            display: flex;
            width: 100%;
            max-width: 800px;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .coluna-pequenas {
            width: 75px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
        }

        .coluna-central {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
            align-items: center; /* Centraliza os pares no meio do ecrã */
        }

        /* Par: Imagem e Quadrado LADO A LADO */
        .par-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            background: #fff9fa;
            border: 2px solid #ffdae3;
            border-radius: 15px;
            padding: 8px;
            gap: 12px;
            width: 100%;
            max-width: 280px;
        }

        .img-grande {
            font-size: clamp(2.5rem, 7vh, 4rem);
            flex: 1;
            text-align: center;
        }

        .alvo-largada {
            width: 70px;
            height: 70px;
            background: white;
            border: 3px dashed #ffb3c6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .img-pequena {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            width: 65px;
            height: 65px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #e0e0e0;
            cursor: grab;
        }

        .img-pequena.correto {
            background-color: #7bed9f !important;
            border-color: #2ed573 !important;
            box-shadow: none !important;
            transform: scale(0.85);
        }

        .progresso {
            font-size: 0.85rem;
            font-weight: bold;
            color: #95a5a6;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            color: #95a5a6;
            border-top: 1px solid #eee;
        }

        @media (min-width: 600px) {
            .coluna-pequenas { width: 100px; }
            .img-pequena { width: 85px; height: 85px; font-size: 2.8rem; }
            .alvo-largada { width: 85px; height: 85px; }
            .par-container { max-width: 350px; padding: 15px; }
        }

        #final-panel { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        .btn-final { padding: 15px 30px; border-radius: 20px; color: white; border: none; font-weight: bold; background: #2ecc71; cursor: pointer; font-size: 1.1rem; }
        
        .sortable-ghost { opacity: 0; }
    </style>
</head>
<body>

    <header>
        <h2><span>🧩</span> Associa o Par</h2>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <p class="instrucao">Leva o pequeno para o lado do igual!</p>
        
        <div class="game-wrapper">
            <div class="coluna-pequenas" id="col-esq"></div>
            <div class="coluna-central" id="col-cen"></div>
            <div class="coluna-pequenas" id="col-dir"></div>
        </div>
        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 5</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🌟</div>
        <h1 style="color: #ff6b81">Muito bem!</h1>
        <button class="btn-final" onclick="reiniciarJogo()">Jogar de Novo 🔄</button>
    </div>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

    <script>
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨', '🐷', '🐮', '🐱', '🐶', '🦓', '🐹'];
        let ronda = 1;
        let acertosRonda = 0;

        function iniciarJogo() {
            if (ronda > 5) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            acertosRonda = 0;
            const colEsq = document.getElementById('col-esq');
            const colCen = document.getElementById('col-cen');
            const colDir = document.getElementById('col-dir');
            
            colEsq.innerHTML = ''; colCen.innerHTML = ''; colDir.innerHTML = '';

            let misturados = [...animaisPool].sort(() => 0.5 - Math.random());
            let selecionados = misturados.slice(0, 3);
            let distratores = misturados.slice(3, 6);
            let todasPequenas = [...selecionados, ...distratores].sort(() => 0.5 - Math.random());

            selecionados.forEach(animal => {
                const container = document.createElement('div');
                container.className = 'par-container';
                container.innerHTML = `
                    <div class="img-grande">${animal}</div>
                    <div class="alvo-largada" data-animal="${animal}"></div>
                `;
                colCen.appendChild(container);

                new Sortable(container.querySelector('.alvo-largada'), {
                    group: 'jogo',
                    animation: 200,
                    onAdd: function(evt) {
                        const item = evt.item;
                        if (item.dataset.animal === evt.to.dataset.animal) {
                            item.classList.add('correto');
                            acertosRonda++;
                            if (acertosRonda === 3) {
                                setTimeout(() => {
                                    ronda++;
                                    iniciarJogo();
                                }, 700);
                            }
                        } else {
                            evt.from.appendChild(item);
                        }
                    }
                });
            });

            todasPequenas.forEach((animal, i) => {
                const el = document.createElement('div');
                el.className = 'img-pequena';
                el.innerText = animal;
                el.dataset.animal = animal;
                if (i < 3) colEsq.appendChild(el);
                else colDir.appendChild(el);
            });

            [colEsq, colDir].forEach(col => {
                new Sortable(col, {
                    group: 'jogo',
                    animation: 200,
                    sort: false,
                    delay: 0,
                    touchStartThreshold: 5
                });
            });
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarJogo();
        }

        iniciarJogo();
    </script>
</body>
</html>
