<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Associa o Par - Pré-Escolar</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: rgba(255, 179, 198, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* HEADER */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        .game-icon { font-size: 1.5rem; display: flex; align-items: center; }
        header h1 { font-size: 1.1rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #ffffff; background-color: #ffb3c6;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; display: flex; align-items: center; gap: 8px;
            border: 1px solid #ff8fa3; box-shadow: 0 2px 0 #ff8fa3;
            transition: all 0.1s ease;
        }
        .btn-voltar-3d:active { transform: translateY(1px); box-shadow: 0 1px 0 #ff8fa3; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #2c3e50; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ffb3c6; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px;
            transition: 0.2s;
        }
        .sidebar-item:hover { background: #ffb3c6; color: white; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DO JOGO */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
        }

        .instrucao {
            font-size: 1rem; font-weight: bold; color: #ff6b81;
            margin-bottom: 15px; background: white; padding: 5px 15px;
            border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .game-wrapper {
            display: flex; width: 100%; max-width: 800px;
            gap: 10px; align-items: center; justify-content: center;
        }

        .coluna-pequenas {
            width: 75px; display: flex; flex-direction: column;
            gap: 15px; justify-content: center;
        }

        .coluna-central {
            flex: 1; display: flex; flex-direction: column;
            gap: 12px; justify-content: center; align-items: center;
        }

        .par-container {
            display: flex; align-items: center; justify-content: center;
            background: white; border: 2px solid #ffdae3;
            border-radius: 15px; padding: 8px; gap: 12px;
            width: 100%; max-width: 280px;
        }

        .img-grande { font-size: clamp(2.5rem, 7vh, 4rem); flex: 1; }

        .alvo-largada {
            width: 70px; height: 70px; background: #fff;
            border: 3px dashed #ffb3c6; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .img-pequena {
            background: white; border: 2px solid #e0e0e0;
            border-radius: 12px; width: 65px; height: 65px;
            font-size: 2rem; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 4px 0 #e0e0e0;
            cursor: grab;
        }

        .img-pequena.correto {
            background-color: #7bed9f !important;
            border-color: #2ed573 !important;
            box-shadow: none !important;
            transform: scale(0.85);
        }

        .progresso { font-size: 0.9rem; font-weight: bold; color: #7f8c8d; margin-top: 15px; }

        /* MODAL FINAL */
        .modal-final {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 179, 198, 0.95); z-index: 300;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        /* FOOTER */
        footer {
            width: 100%; padding: 12px; background-color: #ffffff;
            text-align: center; color: #7f8c8d; border-top: 1px solid #ddd;
            font-size: 0.9rem; flex-shrink: 0;
        }

        @media (min-width: 600px) {
            .coluna-pequenas { width: 100px; }
            .img-pequena, .alvo-largada { width: 85px; height: 85px; }
            .img-pequena { font-size: 2.8rem; }
            .par-container { max-width: 350px; padding: 15px; }
        }

        .sortable-ghost { opacity: 0; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="/jogos" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="/jogos/pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="/jogos/1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="/jogos/2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="/Jogos/3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="/jogos/4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span class="game-icon">🧩</span>
            <h1>Associa o Par</h1>
        </div>
        <a href="../" class="btn-voltar-3d">
            <span>⬅</span> Voltar
        </a>
    </header>

    <main id="game-main">
        <p class="instrucao">Leva o pequeno para o lado do igual!</p>
        
        <div class="game-wrapper">
            <div class="coluna-pequenas" id="col-esq"></div>
            <div class="coluna-central" id="col-cen"></div>
            <div class="coluna-pequenas" id="col-dir"></div>
        </div>
        
        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 5</p>
    </main>

    <div id="final-modal" class="modal-final">
        <div style="font-size: 5rem; margin-bottom: 20px;">🌟</div>
        <h1 style="font-size: 2.5rem; margin-bottom: 30px;">MUITO BEM!</h1>
        <button class="btn-voltar-3d" style="background: white; color: #ffb3c6; font-size: 1.2rem; padding: 15px 40px;" onclick="reiniciarJogo()">REPETIR 🔄</button>
    </div>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨', '🐷', '🐮', '🐱', '🐶', '🦓', '🐹'];
        let ronda = 1;
        let acertosRonda = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function iniciarJogo() {
            if (ronda > 5) {
                document.getElementById('final-modal').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            acertosRonda = 0;
            const colEsq = document.getElementById('col-esq');
            const colCen = document.getElementById('col-cen');
            const colDir = document.getElementById('col-dir');
            
            colEsq.innerHTML = ''; colCen.innerHTML = ''; colDir.innerHTML = '';

            let misturados = [...animaisPool].sort(() => 0.5 - Math.random());
            let selecionados = misturados.slice(0, 3);
            let distratores = misturados.slice(3, 6);
            let todasPequenas = [...selecionados, ...distratores].sort(() => 0.5 - Math.random());

            selecionados.forEach(animal => {
                const container = document.createElement('div');
                container.className = 'par-container';
                container.innerHTML = `
                    <div class="img-grande">${animal}</div>
                    <div class="alvo-largada" data-animal="${animal}"></div>
                `;
                colCen.appendChild(container);

                new Sortable(container.querySelector('.alvo-largada'), {
                    group: 'jogo',
                    animation: 200,
                    onAdd: function(evt) {
                        const item = evt.item;
                        if (item.dataset.animal === evt.to.dataset.animal) {
                            item.classList.add('correto');
                            acertosRonda++;
                            if (acertosRonda === 3) {
                                setTimeout(() => {
                                    ronda++;
                                    iniciarJogo();
                                }, 700);
                            }
                        } else {
                            evt.from.appendChild(item);
                        }
                    }
                });
            });

            todasPequenas.forEach((animal, i) => {
                const el = document.createElement('div');
                el.className = 'img-pequena';
                el.innerText = animal;
                el.dataset.animal = animal;
                if (i < 3) colEsq.appendChild(el);
                else colDir.appendChild(el);
            });

            [colEsq, colDir].forEach(col => {
                new Sortable(col, {
                    group: 'jogo',
                    animation: 200,
                    sort: false,
                    touchStartThreshold: 5
                });
            });
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('final-modal').style.display = 'none';
            iniciarJogo();
        }

        iniciarJogo();
    </script>
</body>
</html>
