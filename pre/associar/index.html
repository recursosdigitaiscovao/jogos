<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Encontrar Pares</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #ffffff;
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background-color: #ffb3c6; 
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .titulo-container { display: flex; align-items: center; gap: 8px; }
        header h2 { margin: 0; font-size: clamp(0.85rem, 4vw, 1.2rem); }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            border: 1px solid white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            gap: 15px;
            width: 100%;
        }

        .instrucao {
            font-size: clamp(1rem, 4.5vw, 1.3rem);
            font-weight: bold;
            color: #ff6b81;
            text-align: center;
            margin: 0;
        }

        /* Grelha de Jogo */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(8px, 2vw, 15px);
            width: 100%;
            max-width: 500px;
        }

        .btn-card {
            background: #fff9fa;
            border: 3px solid #ffdae3;
            border-radius: 18px;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #ffdae3;
        }

        /* Diferença de tamanhos */
        .grande { font-size: clamp(2.5rem, 12vw, 4rem); }
        .pequeno { font-size: clamp(1.2rem, 6vw, 2rem); }

        /* Estados */
        .selecionado { border-color: #3498db; background-color: #ebf5fb; transform: scale(1.05); box-shadow: 0 4px 0 #3498db; }
        .correto { background-color: #7bed9f !important; border-color: #2ed573 !important; box-shadow: 0 4px 0 #2ed573 !important; visibility: hidden; opacity: 0; }
        .errado { background-color: #ff7675 !important; border-color: #d63031 !important; box-shadow: 0 4px 0 #d63031 !important; }

        .progresso { color: #95a5a6; font-weight: bold; font-size: 0.9rem; }

        /* Painel Final */
        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            flex: 1;
        }

        .botoes-final {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
        }

        .btn-final {
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
        }

        @media (max-height: 500px) and (orientation: landscape) {
            header { height: 45px; }
            main { gap: 8px; padding: 10px; }
            .game-grid { grid-template-columns: repeat(4, 1fr); max-width: 400px; }
            .grande { font-size: 2.5rem; }
            .pequeno { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="titulo-container">
            <span>🧩</span> <h2>Pares de Animais</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <p class="instrucao">Clica no animal grande e no seu par pequeno!</p>
        
        <div class="game-grid" id="grid"></div>

        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 10</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🌟</div>
        <h1 style="color: #ff6b81; margin: 0;">Incrível!</h1>
        <p style="font-size: 1.2rem; color: #7f8c8d;">Encontraste todos os pares!</p>
        
        <div class="botoes-final">
            <button class="btn-final" style="background:#2ecc71;" onclick="reiniciarJogo()">Jogar de Novo 🔄</button>
            <a href="../index.html" class="btn-final" style="background:#ffb3c6;">Sair ⬅️</a>
        </div>
    </div>

    <script>
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨'];
        let ronda = 1;
        let primeiraEscolha = null;
        let paresEncontrados = 0;

        function iniciarRonda() {
            if (ronda > 10) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            paresEncontrados = 0;
            primeiraEscolha = null;
            
            // Selecionar 4 animais aleatórios
            let selecionados = [...animaisPool].sort(() => 0.5 - Math.random()).slice(0, 4);
            
            // Criar objetos para a grelha (4 grandes e 4 pequenos)
            let cartas = [];
            selecionados.forEach(animal => {
                cartas.push({ animal, tamanho: 'grande' });
                cartas.push({ animal, tamanho: 'pequeno' });
            });

            // Baralhar
            cartas.sort(() => 0.5 - Math.random());

            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            cartas.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = `btn-card ${item.tamanho}`;
                btn.innerText = item.animal;
                btn.dataset.animal = item.animal;
                btn.onclick = () => clicarCarta(btn);
                grid.appendChild(btn);
            });
        }

        function clicarCarta(btn) {
            if (btn.classList.contains('correto') || btn === primeiraEscolha) return;

            btn.classList.add('selecionado');

            if (!primeiraEscolha) {
                primeiraEscolha = btn;
            } else {
                if (primeiraEscolha.dataset.animal === btn.dataset.animal) {
                    // ACERTO
                    primeiraEscolha.classList.add('correto');
                    btn.classList.add('correto');
                    paresEncontrados++;
                    primeiraEscolha = null;

                    if (paresEncontrados === 4) {
                        setTimeout(() => {
                            ronda++;
                            iniciarRonda();
                        }, 1000);
                    }
                } else {
                    // ERRO
                    btn.classList.add('errado');
                    primeiraEscolha.classList.add('errado');
                    
                    setTimeout(() => {
                        btn.classList.remove('selecionado', 'errado');
                        primeiraEscolha.classList.remove('selecionado', 'errado');
                        primeiraEscolha = null;
                    }, 500);
                }
            }
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarRonda();
        }

        iniciarRonda();
    </script>
</body>
</html>
