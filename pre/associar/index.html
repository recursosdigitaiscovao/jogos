<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Associa o Par</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* Bloqueio total de movimentos parasitas no telemóvel */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; /* Crucial para o drag and drop no telemóvel */
        }

        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: contain;
        }

        header {
            background-color: #ffb3c6;
            color: white;
            padding: 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            flex-shrink: 0;
        }

        .titulo-wrapper { display: flex; align-items: center; gap: 8px; }
        .icon-header { font-size: 1.3rem; }
        header h2 { margin: 0; font-size: 1rem; }

        .btn-topo {
            color: white; text-decoration: none; font-weight: bold;
            background: rgba(255,255,255,0.2); padding: 5px 10px;
            border-radius: 8px; font-size: 0.7rem; border: 1px solid white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 5px;
            align-items: center;
        }

        .instrucao {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ff6b81;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Contentor do Jogo: 3 colunas fixas */
        .game-grid {
            display: grid;
            grid-template-columns: 75px 1fr 75px; /* Colunas laterais fixas para não quebrar */
            gap: 10px;
            width: 100%;
            max-width: 500px;
            flex: 1;
            align-items: center;
        }

        .coluna-pequenas {
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: space-around;
            height: 100%;
        }

        .coluna-central {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            justify-content: space-around;
        }

        /* Contentor do Par Grande */
        .par-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff9fa;
            border: 2px solid #ffdae3;
            border-radius: 12px;
            padding: 5px;
            position: relative;
        }

        .img-grande {
            font-size: 3rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        /* Alvo Branco - Onde se larga */
        .alvo-largada {
            width: 65px;
            height: 65px;
            background: white;
            border: 3px dashed #ffb3c6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Imagens Pequenas Arrastáveis */
        .img-pequena {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            width: 65px;
            height: 65px;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #e0e0e0;
            cursor: grab;
            z-index: 100;
            touch-action: none;
        }

        .img-pequena.correto {
            background-color: #7bed9f !important;
            border-color: #2ed573 !important;
            box-shadow: none !important;
            transform: scale(0.9);
        }

        /* Ajuste para ecrãs maiores (PC/Tablet) */
        @media (min-width: 600px) {
            .game-grid { grid-template-columns: 100px 1fr 100px; max-width: 700px; }
            .img-pequena, .alvo-largada { width: 85px; height: 85px; font-size: 2.8rem; }
            .img-grande { font-size: 4rem; }
        }

        #final-panel { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .btn-final { padding: 15px 30px; border-radius: 20px; color: white; border: none; font-weight: bold; background: #2ecc71; cursor: pointer; }

        /* Estilo da peça enquanto é arrastada */
        .sortable-fallback {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <header>
        <div class="titulo-wrapper">
            <span class="icon-header">🧩</span>
            <h2>Associa o Par</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <p class="instrucao">Arrasta o pequeno para o seu par grande!</p>
        
        <div class="game-grid">
            <div class="coluna-pequenas" id="col-esq"></div>
            <div class="coluna-central" id="col-cen"></div>
            <div class="coluna-pequenas" id="col-dir"></div>
        </div>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🌟</div>
        <h1 style="#ff6b81">Muito bem!</h1>
        <button class="btn-final" onclick="reiniciarJogo()">Recomeçar 🔄</button>
    </div>

    <script>
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨', '🐷', '🐮', '🐱', '🐶', '🦓', '🐹'];
        let acertosRonda = 0;

        function iniciarJogo() {
            acertosRonda = 0;
            const colEsq = document.getElementById('col-esq');
            const colCen = document.getElementById('col-cen');
            const colDir = document.getElementById('col-dir');
            
            colEsq.innerHTML = ''; colCen.innerHTML = ''; colDir.innerHTML = '';

            // Escolher 3 animais para os pares e 3 para distrair
            let misturados = [...animaisPool].sort(() => 0.5 - Math.random());
            let selecionados = misturados.slice(0, 3);
            let distratores = misturados.slice(3, 6);
            
            // Criar as 6 imagens pequenas (3 certas + 3 distratores)
            let todasPequenas = [...selecionados, ...distratores].sort(() => 0.5 - Math.random());

            // Gerar Centro (3 Grandes)
            selecionados.forEach(animal => {
                const container = document.createElement('div');
                container.className = 'par-container';
                container.innerHTML = `
                    <div class="img-grande">${animal}</div>
                    <div class="alvo-largada" data-animal="${animal}"></div>
                `;
                colCen.appendChild(container);

                // Configurar o alvo para receber
                new Sortable(container.querySelector('.alvo-largada'), {
                    group: 'jogo',
                    animation: 150,
                    swapThreshold: 1,
                    forceFallback: true,
                    onAdd: function(evt) {
                        const item = evt.item;
                        if (item.dataset.animal === evt.to.dataset.animal) {
                            item.classList.add('correto');
                            acertosRonda++;
                            if (acertosRonda === 3) {
                                setTimeout(() => {
                                    document.getElementById('jogo-container').style.display = 'none';
                                    document.getElementById('final-panel').style.display = 'flex';
                                }, 600);
                            }
                        } else {
                            evt.from.appendChild(item);
                        }
                    }
                });
            });

            // Distribuir as 6 pequenas (3 esquerda, 3 direita)
            todasPequenas.forEach((animal, i) => {
                const el = document.createElement('div');
                el.className = 'img-pequena';
                el.innerText = animal;
                el.dataset.animal = animal;
                
                if (i < 3) colEsq.appendChild(el);
                else colDir.appendChild(el);
            });

            // Configurar as colunas laterais para permitir arrastar
            [colEsq, colDir].forEach(col => {
                new Sortable(col, {
                    group: 'jogo',
                    animation: 150,
                    sort: false,
                    forceFallback: true,
                    delay: 0, // Inicia o drag imediatamente ao tocar
                    touchStartThreshold: 0
                });
            });
        }

        function reiniciarJogo() {
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarJogo();
        }

        iniciarJogo();
    </script>
</body>
</html>
