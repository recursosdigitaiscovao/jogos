<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Mestre da Observação</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }

        body {
            background-color: #ffffff;
            color: #2c3e50;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #ffb3c6;
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 55px;
            flex-shrink: 0;
        }

        header h2 { margin: 0; font-size: clamp(0.8rem, 4vw, 1.1rem); }
        .btn-topo {
            color: white; text-decoration: none; font-weight: bold;
            background: rgba(255,255,255,0.2); padding: 6px 10px;
            border-radius: 10px; font-size: 0.75rem; border: 1px solid white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 5px;
            align-items: center;
            gap: 5px;
        }

        .instrucao {
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
            font-weight: bold; color: #ff6b81; text-align: center; margin: 5px 0;
        }

        /* Contentor Principal Flexível */
        .game-layout {
            display: flex;
            flex-direction: column; /* Vertical por defeito (mobile) */
            width: 100%;
            height: 100%;
            gap: 5px;
            max-width: 1000px;
        }

        /* Zonas das Pequenas (Laterais/Topo/Fundo) */
        .zona-pequenas {
            display: flex;
            flex-direction: row; /* Horizontal no mobile */
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: #fff;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            min-height: 70px;
        }

        /* Zona Central dos Alvos */
        .zona-central {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .par-container {
            display: flex;
            align-items: center;
            background: #fff9fa;
            border: 2px solid #ffdae3;
            border-radius: 15px;
            padding: 5px;
            height: calc(18vh - 20px);
            max-height: 100px;
        }

        .img-grande {
            flex: 1;
            font-size: clamp(2.5rem, 12vh, 4rem);
            text-align: center;
        }

        .alvo-largada {
            flex: 1;
            height: 90%;
            background: white;
            border: 3px dashed #ffb3c6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Peças Draggable */
        .img-pequena {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            width: clamp(55px, 14vw, 85px);
            height: clamp(55px, 14vw, 85px);
            font-size: clamp(1.8rem, 8vw, 3rem);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #e0e0e0;
            z-index: 10;
        }

        .img-pequena.correto {
            background-color: #7bed9f !important;
            border-color: #2ed573 !important;
            box-shadow: none !important;
            transform: scale(0.85);
        }

        .progresso { color: #95a5a6; font-size: 0.8rem; font-weight: bold; margin: 5px; }

        /* Media Query para ecrãs largos (Tablets/PC) */
        @media (min-width: 768px) {
            .game-layout { flex-direction: row; align-items: stretch; }
            .zona-pequenas { flex-direction: column; width: 120px; height: auto; }
            .zona-central { padding: 0 20px; }
            .par-container { height: calc(20vh - 30px); }
        }

        /* Painel Final */
        #final-panel {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; height: 100%;
        }

        .btn-final {
            padding: 15px 30px; border-radius: 15px; color: white; border: none;
            font-weight: bold; font-size: 1.1rem; margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="titulo-container">
            <span>🦁</span> <h2>Mestre da Observação</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <p class="instrucao">Arrasta os pares pequenos para o quadrado branco!</p>
        
        <div class="game-layout">
            <div class="zona-pequenas" id="zona-1"></div>
            
            <div class="zona-central" id="zona-alvos"></div>
            
            <div class="zona-pequenas" id="zona-2"></div>
        </div>

        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 10</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🏆</div>
        <h1 style="color: #ff6b81;">Parabéns!</h1>
        <p>Completaste o desafio de observação!</p>
        <button class="btn-final" style="background:#2ecc71;" onclick="reiniciarJogo()">Jogar de Novo 🔄</button>
        <a href="../index.html" class="btn-final" style="background:#ffb3c6; text-decoration:none; display:inline-block;">Sair</a>
    </div>

    <script>
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨', '🐷', '🐮', '🐱', '🐶', '🦓', '🐹'];
        let ronda = 1;
        let acertosRonda = 0;

        function iniciarRonda() {
            if (ronda > 10) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            acertosRonda = 0;
            
            // Escolher 4 para os pares e 4 distratores (Total 8 pequenas)
            let misturados = [...animaisPool].sort(() => 0.5 - Math.random());
            let selecionadosGrandes = misturados.slice(0, 4);
            let distratores = misturados.slice(4, 8);
            let todasPequenas = [...selecionadosGrandes, ...distratores].sort(() => 0.5 - Math.random());

            // Limpar e Gerar Alvos Centrais
            const centro = document.getElementById('zona-alvos');
            centro.innerHTML = '';
            selecionadosGrandes.forEach(animal => {
                const par = document.createElement('div');
                par.className = 'par-container';
                par.innerHTML = `<div class="img-grande">${animal}</div><div class="alvo-largada" data-animal="${animal}"></div>`;
                centro.appendChild(par);

                new Sortable(par.querySelector('.alvo-largada'), {
                    group: 'jogo',
                    onAdd: function(evt) {
                        const item = evt.item;
                        const alvo = evt.to;
                        if (item.dataset.animal === alvo.dataset.animal) {
                            item.classList.add('correto');
                            acertosRonda++;
                            if (acertosRonda === 4) setTimeout(() => { ronda++; iniciarRonda(); }, 800);
                        } else {
                            // Devolve à zona original se estiver errado
                            document.getElementById('zona-1').appendChild(item);
                        }
                    }
                });
            });

            // Distribuir as 8 pequenas pelas duas zonas (4 cada)
            const z1 = document.getElementById('zona-1');
            const z2 = document.getElementById('zona-2');
            z1.innerHTML = ''; z2.innerHTML = '';

            todasPequenas.forEach((animal, i) => {
                const el = document.createElement('div');
                el.className = 'img-pequena';
                el.innerText = animal;
                el.dataset.animal = animal;
                (i < 4 ? z1 : z2).appendChild(el);
            });

            [z1, z2].forEach(z => new Sortable(z, { group: 'jogo', animation: 150 }));
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarRonda();
        }

        iniciarRonda();
    </script>
</body>
</html>
