<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Arrastar e Associar</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            background-color: #ffffff;
            color: #2c3e50;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Importante para o Drag and Drop */
        }

        header {
            background-color: #ffb3c6;
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 55px;
            flex-shrink: 0;
        }

        .titulo-container { display: flex; align-items: center; gap: 8px; }
        header h2 { margin: 0; font-size: clamp(0.8rem, 4vw, 1.1rem); }

        .btn-topo {
            color: white; text-decoration: none; font-weight: bold;
            background: rgba(255,255,255,0.2); padding: 6px 10px;
            border-radius: 10px; font-size: 0.75rem; border: 1px solid white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            align-items: center;
        }

        .instrucao {
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            font-weight: bold; color: #ff6b81; text-align: center; margin: 0;
        }

        /* Contentor do Jogo */
        .game-container {
            display: flex;
            flex-direction: column; /* Vertical no telemóvel */
            width: 100%;
            max-width: 800px;
            gap: 10px;
            flex: 1;
        }

        /* Coluna da Esquerda (Grandes + Alvos) */
        .zona-grandes {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 2;
        }

        .par-grande {
            display: flex;
            align-items: center;
            background: #fff0f3;
            border: 2px solid #ffdae3;
            border-radius: 15px;
            padding: 5px;
            height: calc(18vh - 20px); /* Ajusta à altura do ecrã */
            min-height: 60px;
        }

        .img-grande {
            flex: 1;
            font-size: clamp(2rem, 10vh, 3.5rem);
            text-align: center;
        }

        .alvo-largada {
            flex: 1;
            height: 100%;
            background-color: white;
            border: 2px dashed #ffb3c6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Zona das Peças Arrastáveis (Direita ou Baixo) */
        .zona-pequenas {
            display: flex;
            flex-direction: row; /* Horizontal no telemóvel */
            justify-content: center;
            background: #fdf2f5;
            border: 2px solid #ffdae3;
            border-radius: 15px;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .img-pequena {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            width: clamp(50px, 15vw, 80px);
            height: clamp(50px, 15vw, 80px);
            font-size: clamp(1.5rem, 8vw, 2.5rem);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #e0e0e0;
            touch-action: none; /* Bloqueia o scroll ao tocar na peça */
        }

        .img-pequena.correto {
            background-color: #7bed9f !important;
            border-color: #2ed573 !important;
            box-shadow: none !important;
            transform: scale(0.9);
        }

        .progresso { color: #95a5a6; font-size: 0.85rem; margin-bottom: 5px; }

        /* Painel Final */
        #final-panel {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; flex: 1;
        }

        .btn-final {
            padding: 15px 30px; border-radius: 15px; text-decoration: none;
            font-weight: bold; color: white; border: none; font-size: 1rem; margin-top: 15px;
        }

        /* MEDIA QUERIES PARA MODO PAISAGEM OU TABLETS */
        @media (min-width: 600px) or (orientation: landscape) {
            .game-container { flex-direction: row; }
            .zona-pequenas { flex-direction: column; width: 120px; height: 100%; }
            .par-grande { height: calc(20vh - 25px); }
        }
    </style>
</head>
<body>

    <header>
        <div class="titulo-container">
            <span>🧩</span> <h2>Arrastar e Associar</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <p class="instrucao">Leva o pequeno para o seu par grande!</p>
        
        <div class="game-container">
            <div class="zona-grandes" id="zona-grandes"></div>
            <div class="zona-pequenas" id="zona-pequenas"></div>
        </div>

        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 10</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 4rem;">🏆</div>
        <h1 style="color: #ff6b81;">Muito Bem!</h1>
        <button class="btn-final" style="background:#2ecc71;" onclick="reiniciarJogo()">Jogar de Novo 🔄</button>
        <a href="../index.html" class="btn-final" style="background:#ffb3c6; display: inline-block;">Sair</a>
    </div>

    <script>
        const animaisFofos = ['🦁', '🦒', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨'];
        let ronda = 1;
        let acertosRonda = 0;

        function iniciarRonda() {
            if (ronda > 10) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            acertosRonda = 0;
            
            let selecionados = [...animaisFofos].sort(() => 0.5 - Math.random()).slice(0, 4);
            
            // Gerar Grandes
            const zonaGrandes = document.getElementById('zona-grandes');
            zonaGrandes.innerHTML = '';
            selecionados.forEach(animal => {
                const par = document.createElement('div');
                par.className = 'par-grande';
                par.innerHTML = `<div class="img-grande">${animal}</div><div class="alvo-largada" data-animal="${animal}"></div>`;
                zonaGrandes.appendChild(par);

                new Sortable(par.querySelector('.alvo-largada'), {
                    group: 'jogo',
                    onAdd: function(evt) {
                        const item = evt.item;
                        const alvo = evt.to;
                        if (item.dataset.animal === alvo.dataset.animal) {
                            item.classList.add('correto');
                            acertosRonda++;
                            if (acertosRonda === 4) setTimeout(() => { ronda++; iniciarRonda(); }, 800);
                        } else {
                            // Devolve à origem se estiver errado
                            document.getElementById('zona-pequenas').appendChild(item);
                        }
                    }
                });
            });

            // Gerar Pequenas
            const zonaPequenas = document.getElementById('zona-pequenas');
            zonaPequenas.innerHTML = '';
            [...selecionados].sort(() => 0.5 - Math.random()).forEach(animal => {
                const pequeno = document.createElement('div');
                pequeno.className = 'img-pequena';
                pequeno.innerText = animal;
                pequeno.dataset.animal = animal;
                zonaPequenas.appendChild(pequeno);
            });

            new Sortable(zonaPequenas, { group: 'jogo', animation: 150 });
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarRonda();
        }

        iniciarRonda();
    </script>
</body>
</html>
