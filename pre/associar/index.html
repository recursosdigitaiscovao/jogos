<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Associa o Par</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* Impede o scroll padrão para podermos detetar o deslize para baixo */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }

        body {
            background-color: #ffffff;
            color: #2c3e50;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100svh;
            overflow: hidden;
            position: relative;
        }

        /* Indicador visual de atualização */
        #refresh-indicator {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffb3c6;
            color: white;
            padding: 10px 20px;
            border-radius: 0 0 20px 20px;
            font-weight: bold;
            transition: top 0.2s;
            z-index: 999;
        }

        header {
            background-color: #ffb3c6;
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* Correção do Ícone no Telemóvel */
        .titulo-wrapper { 
            display: flex !important; 
            flex-direction: row !important;
            align-items: center !important; 
            gap: 10px;
        }
        
        .icon-header { font-size: 1.4rem; display: inline-block; }
        header h2 { margin: 0; font-size: 1.1rem; white-space: nowrap; }

        .btn-topo {
            color: white; text-decoration: none; font-weight: bold;
            background: rgba(255,255,255,0.2); padding: 6px 12px;
            border-radius: 10px; font-size: 0.8rem; border: 1px solid white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 5px;
            align-items: center;
            min-height: 0;
            padding-bottom: 70px; 
        }

        .instrucao {
            font-size: 1rem;
            font-weight: bold; color: #ff6b81; text-align: center; margin-bottom: 10px;
        }

        .game-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            gap: 10px;
            min-height: 0;
        }

        .zona-pequenas {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
            padding: 8px;
            background: #fdfdfd;
            border: 2px solid #eee;
            border-radius: 15px;
            min-height: 80px;
        }

        .zona-central {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
            min-height: 0;
        }

        .par-container {
            display: flex;
            align-items: center;
            background: #fff9fa;
            border: 2px solid #ffdae3;
            border-radius: 18px;
            padding: 6px;
            height: 20%; 
            max-height: 100px;
        }

        .img-grande {
            flex: 1;
            font-size: clamp(2.2rem, 9vh, 3.5rem);
            text-align: center;
        }

        .alvo-largada {
            flex: 1;
            height: 90%;
            background: white;
            border: 3px dashed #ffb3c6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-pequena {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            width: clamp(55px, 16vw, 75px);
            height: clamp(55px, 16vw, 75px);
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #e0e0e0;
        }

        .img-pequena.correto {
            background-color: #7bed9f !important;
            border-color: #2ed573 !important;
            box-shadow: none !important;
            transform: scale(0.85);
        }

        .progresso { color: #95a5a6; font-size: 0.85rem; font-weight: bold; margin-top: 5px; }

        @media (min-width: 768px) {
            .game-layout { flex-direction: row; }
            .zona-pequenas { flex-direction: column; width: 130px; height: auto; }
            .par-container { height: 22%; }
        }

        #final-panel { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .btn-final { padding: 15px 30px; border-radius: 20px; color: white; border: none; font-weight: bold; background: #2ecc71; }
    </style>
</head>
<body id="body-main">

    <div id="refresh-indicator">🔄 A atualizar...</div>

    <header>
        <div class="titulo-wrapper">
            <span class="icon-header">🧩</span>
            <h2>Associa o Par</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <p class="instrucao">Leva o pequeno para o par igual!</p>
        
        <div class="game-layout">
            <div class="zona-pequenas" id="zona-1"></div>
            <div class="zona-central" id="zona-alvos"></div>
            <div class="zona-pequenas" id="zona-2"></div>
        </div>

        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 10</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🌟</div>
        <h1 style="color: #ff6b81;">Muito bem!</h1>
        <button class="btn-final" onclick="reiniciarJogo()">Recomeçar 🔄</button>
    </div>

    <script>
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨', '🐷', '🐮', '🐱', '🐶', '🦓', '🐹'];
        let ronda = 1;
        let acertosRonda = 0;

        // Lógica de "Pull to Refresh" (Deslizar para baixo)
        let touchStart = 0;
        let touchEnd = 0;
        
        document.addEventListener('touchstart', e => { touchStart = e.targetTouches[0].pageY; }, false);
        
        document.addEventListener('touchmove', e => {
            touchEnd = e.targetTouches[0].pageY;
            if (touchEnd - touchStart > 100 && window.scrollY === 0) {
                document.getElementById('refresh-indicator').style.top = '0px';
            }
        }, false);

        document.addEventListener('touchend', e => {
            if (touchEnd - touchStart > 100) {
                setTimeout(() => {
                    document.getElementById('refresh-indicator').style.top = '-50px';
                    iniciarRonda(); // Reinicia a ronda atual
                }, 500);
            }
            touchStart = 0;
            touchEnd = 0;
        }, false);

        function iniciarRonda() {
            if (ronda > 10) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }
            document.getElementById('ronda-atual').innerText = ronda;
            acertosRonda = 0;
            
            let misturados = [...animaisPool].sort(() => 0.5 - Math.random());
            let selecionadosGrandes = misturados.slice(0, 4);
            let distratores = misturados.slice(4, 8);
            let todasPequenas = [...selecionadosGrandes, ...distratores].sort(() => 0.5 - Math.random());

            const centro = document.getElementById('zona-alvos');
            centro.innerHTML = '';
            selecionadosGrandes.forEach(animal => {
                const par = document.createElement('div');
                par.className = 'par-container';
                par.innerHTML = `<div class="img-grande">${animal}</div><div class="alvo-largada" data-animal="${animal}"></div>`;
                centro.appendChild(par);

                new Sortable(par.querySelector('.alvo-largada'), {
                    group: 'jogo',
                    animation: 200,
                    onAdd: function(evt) {
                        const item = evt.item;
                        if (item.dataset.animal === evt.to.dataset.animal) {
                            item.classList.add('correto');
                            acertosRonda++;
                            if (acertosRonda === 4) setTimeout(() => { ronda++; iniciarRonda(); }, 800);
                        } else {
                            evt.from.appendChild(item);
                        }
                    }
                });
            });

            const z1 = document.getElementById('zona-1');
            const z2 = document.getElementById('zona-2');
            z1.innerHTML = ''; z2.innerHTML = '';
            todasPequenas.forEach((animal, i) => {
                const el = document.createElement('div');
                el.className = 'img-pequena';
                el.innerText = animal;
                el.dataset.animal = animal;
                (i < 4 ? z1 : z2).appendChild(el);
            });

            [z1, z2].forEach(z => new Sortable(z, { group: 'jogo', animation: 200, sort: false }));
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarRonda();
        }

        iniciarRonda();
    </script>
</body>
</html>
