<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Associa o Par</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* Reset e Estilo Geral */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(255, 179, 198, 0.4); 
            color: #2c3e50;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* HEADER */
        header {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; padding: 5px; }
        header h1 { font-size: 1rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none;
            color: #2d3436;
            background-color: #ffb3c6;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #ef87a1;
            box-shadow: 0 3px 0 #ef87a1;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #ef87a1; }

        /* SIDEBAR E OVERLAY */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 12px; border-radius: 12px; background: #fdfdfd;
            display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DO JOGO (Centralizada verticalmente) */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Alterado de flex-start para center */
            padding: 10px; 
        }

        .game-wrapper {
            display: flex;
            width: 100%;
            max-width: 650px;
            gap: 15px;
            align-items: center; /* Centralizado para melhor aspeto */
            justify-content: center;
        }

        .coluna-pequenas {
            width: 75px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .coluna-central {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        /* CARTÃO PRINCIPAL */
        .par-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 3px solid #ffdae3;
            border-radius: 18px;
            padding: 8px;
            gap: 8px;
            width: 100%;
            max-width: 280px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }

        .img-grande { font-size: 2.8rem; flex: 1; text-align: center; }

        .alvo-largada {
            width: 65px;
            height: 65px;
            background: #fafafa;
            border: 3px dashed #ffb3c6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ANIMAIS PEQUENOS */
        .img-pequena {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            width: 65px;
            height: 65px;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center; 
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
            cursor: grab;
        }

        .img-pequena.correto {
            background-color: #7bed9f !important;
            border-color: #2ed573 !important;
            box-shadow: none !important;
            transform: scale(0.85);
        }

        /* BARRA DE PROGRESSO */
        .barra-progresso-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
        }

        .progresso { color: #7f8c8d; font-weight: 700; font-size: 1rem; }

        /* FOOTER */
        footer {
            width: 100%; padding: 10px; background-color: rgba(255, 255, 255, 0.8);
            text-align: center; color: #2d3436; font-size: 0.75rem;
        }

        .modal-final {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 179, 198, 0.98); z-index: 300;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="fecharModais()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom: 20px; border-bottom: 2px solid #ffb3c6;">Menu</h3>
        <nav>
            <a href="/jogos/" class="sidebar-item">🏠 Início</a>
            <a href="/jogos/pre/" class="sidebar-item">🦒 Pré-Escolar</a>
            <a href="/jogos/1/" class="sidebar-item">🐥 1º Ano</a>
            <a href="/jogos/2/" class="sidebar-item">🐢 2º Ano</a>
        </nav>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span style="font-size: 1.3rem;">🧩</span>
            <h1>Associa o Par</h1>
        </div>
        <a href="/jogos/pre/" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main id="game-main">
        <div class="game-wrapper">
            <div class="coluna-pequenas" id="col-esq"></div>
            <div class="coluna-central" id="col-cen"></div>
            <div class="coluna-pequenas" id="col-dir"></div>
        </div>
        
        <div class="barra-progresso-info">
            <p class="progresso">Ronda <span id="ronda-atual">1</span> / 5</p>
        </div>
    </main>

    <div id="final-modal" class="modal-final">
        <div style="font-size: 5rem;">🌟</div>
        <h1 style="font-size: 2.5rem; margin-bottom: 20px;">MUITO BEM!</h1>
        <button class="btn-voltar-3d" style="background: white; color: #ff6b81; padding: 15px 40px; justify-content: center;" onclick="reiniciarJogo()">REPETIR 🔄</button>
    </div>

    <footer>
        Recursos Digitais Covão • <strong>Professor Luís</strong>
    </footer>

    <script>
        const animaisPool = [
            '🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', 
            '🦄', '🐝', '🐞', '🦋', '🐢', '🐨', '🐷', '🐮', '🐱', '🐶', '🦓', '🐹',
            '🦀', '🐳', '🦖', '🦜', '🦩', '🦭', '🐿️', '🦉', '🦔', '🦘', '🦝', '🦑',
            '🐊', '🐆', '🐫', '🦢', '🦃', '🐎', '🐐', '🐓'
        ];
        
        let ronda = 1;
        let acertosRonda = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function fecharModais() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function iniciarJogo() {
            if (ronda > 5) {
                document.getElementById('game-main').style.display = 'none';
                document.getElementById('final-modal').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            acertosRonda = 0;
            const colEsq = document.getElementById('col-esq');
            const colCen = document.getElementById('col-cen');
            const colDir = document.getElementById('col-dir');
            
            colEsq.innerHTML = ''; colCen.innerHTML = ''; colDir.innerHTML = '';

            let misturados = [...animaisPool].sort(() => 0.5 - Math.random());
            let selecionados = misturados.slice(0, 4);
            let distratores = misturados.slice(4, 8);
            let todasPequenas = [...selecionados, ...distratores].sort(() => 0.5 - Math.random());

            selecionados.forEach(animal => {
                const container = document.createElement('div');
                container.className = 'par-container';
                container.innerHTML = `
                    <div class="img-grande">${animal}</div>
                    <div class="alvo-largada" data-animal="${animal}"></div>
                `;
                colCen.appendChild(container);

                new Sortable(container.querySelector('.alvo-largada'), {
                    group: 'jogo',
                    animation: 200,
                    onAdd: function(evt) {
                        const item = evt.item;
                        if (item.dataset.animal === evt.to.dataset.animal) {
                            item.classList.add('correto');
                            acertosRonda++;
                            if (acertosRonda === 4) {
                                setTimeout(() => { ronda++; iniciarJogo(); }, 700);
                            }
                        } else {
                            evt.from.appendChild(item);
                        }
                    }
                });
            });

            todasPequenas.forEach((animal, i) => {
                const el = document.createElement('div');
                el.className = 'img-pequena';
                el.innerText = animal;
                el.dataset.animal = animal;
                if (i < 4) colEsq.appendChild(el);
                else colDir.appendChild(el);
            });

            [colEsq, colDir].forEach(col => {
                new Sortable(col, {
                    group: 'jogo',
                    animation: 200,
                    sort: false,
                    touchStartThreshold: 5
                });
            });
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('game-main').style.display = 'flex';
            document.getElementById('final-modal').style.display = 'none';
            iniciarJogo();
        }

        iniciarJogo();
    </script>
</body>
</html>
