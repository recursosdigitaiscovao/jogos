<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Associar Imagens</title>
    <style>
        /* Reset e Estilo Geral */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #ffffff;
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Permite crescer se necessário */
            overflow-x: hidden;
        }

        /* Barra Superior Fixa */
        header {
            background-color: #ffb3c6; 
            color: white;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .titulo-container { display: flex; align-items: center; gap: 8px; }
        header h2 { margin: 0; font-size: clamp(0.85rem, 4vw, 1.2rem); }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            border: 1px solid white;
        }

        /* Área do Jogo Responsiva */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            gap: 15px;
            width: 100%;
        }

        .instrucao {
            font-size: clamp(1rem, 4.5vw, 1.4rem);
            font-weight: bold;
            color: #ff6b81;
            text-align: center;
        }

        /* Moldura da imagem MAIOR */
        .alvo-container {
            background: #fff0f3; 
            padding: clamp(15px, 5vw, 30px);
            border-radius: 30px;
            border: 4px dashed #ffb3c6;
            width: 90%;
            max-width: 350px;
            aspect-ratio: 1 / 1; /* Mantém quadrado */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #animal-grande {
            font-size: clamp(5rem, 25vw, 8rem);
            animation: pulse 2s infinite;
        }

        /* Grelha de Opções */
        .opcoes-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 450px;
        }

        .btn-opcao {
            background: #fff9fa;
            border: 3px solid #ffdae3;
            border-radius: 18px;
            padding: clamp(10px, 3vw, 20px);
            font-size: clamp(2rem, 10vw, 3.2rem);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #ffdae3;
        }

        .btn-opcao.correto { background-color: #7bed9f !important; border-color: #2ed573 !important; box-shadow: 0 4px 0 #2ed573 !important; }
        .btn-opcao.errado { background-color: #ff7675 !important; border-color: #d63031 !important; box-shadow: 0 4px 0 #d63031 !important; }

        .btn-opcao:active { transform: translateY(2px); box-shadow: 0 2px 0 #ffdae3; }

        .progresso { color: #95a5a6; font-weight: bold; font-size: 0.9rem; margin-top: 10px; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Painel Final */
        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            flex: 1;
        }

        .botoes-final {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin-top: 20px;
        }

        .btn-final {
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        /* AJUSTES PARA ECRÃS PEQUENOS E PAISAGEM */
        @media (max-height: 550px) {
            header { height: 50px; }
            main { gap: 10px; padding: 10px; }
            .alvo-container { max-width: 180px; padding: 10px; }
            #animal-grande { font-size: 4rem; }
            .instrucao { font-size: 1rem; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            main { flex-direction: row; flex-wrap: wrap; }
            .instrucao { width: 100%; margin-bottom: 0; }
            .alvo-container { width: 180px; margin-right: 20px; }
            .opcoes-container { width: calc(100% - 220px); max-width: 350px; }
            .progresso { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="titulo-container">
            <span>🟦</span> <h2>Associar Imagens</h2>
        </div>
        <a href="../index.html" class="btn-topo">⬅ Voltar</a>
    </header>

    <main id="jogo-container">
        <p class="instrucao">🔍 Encontra o igual e pequenino!</p>
        
        <div class="alvo-container">
            <div id="animal-grande">🦁</div>
        </div>

        <div class="opcoes-container" id="opcoes"></div>

        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 10</p>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">✨</div>
        <h1 style="color: #ff6b81; margin: 0;">Boa!</h1>
        <p style="font-size: 1.2rem; color: #7f8c8d;">Terminaste o desafio!</p>
        
        <div class="botoes-final">
            <button class="btn-final" style="background:#2ecc71;" onclick="reiniciarJogo()">Jogar de Novo 🔄</button>
            <a href="../index.html" class="btn-final" style="background:#ffb3c6;">Sair ⬅️</a>
        </div>
    </div>

    <script>
        const animaisPool = ['🦒', '🦁', '🐘', '🐵', '🐸', '🐼', '🐧', '🐙', '🐰', '🦊', '🐻', '🐥', '🦄', '🐝', '🐞', '🦋', '🐢', '🐨'];
        let ronda = 1;
        let animalCerto = '';

        function iniciarRonda() {
            if (ronda > 10) {
                document.getElementById('jogo-container').style.display = 'none';
                document.getElementById('final-panel').style.display = 'flex';
                return;
            }

            document.getElementById('ronda-atual').innerText = ronda;
            
            animalCerto = animaisPool[Math.floor(Math.random() * animaisPool.length)];
            document.getElementById('animal-grande').innerText = animalCerto;

            let opcoes = [animalCerto];
            while (opcoes.length < 3) {
                let errado = animaisPool[Math.floor(Math.random() * animaisPool.length)];
                if (!opcoes.includes(errado)) opcoes.push(errado);
            }

            opcoes.sort(() => Math.random() - 0.5);

            const container = document.getElementById('opcoes');
            container.innerHTML = '';
            
            opcoes.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcao';
                btn.innerText = emoji;
                btn.onclick = () => verificarResposta(emoji, btn);
                container.appendChild(btn);
            });
        }

        function verificarResposta(escolha, btn) {
            if (document.querySelector('.correto') || document.querySelector('.errado')) return;

            if (escolha === animalCerto) {
                btn.classList.add('correto');
                setTimeout(() => {
                    ronda++;
                    iniciarRonda();
                }, 800);
            } else {
                btn.classList.add('errado');
                setTimeout(() => btn.classList.remove('errado'), 500);
            }
        }

        function reiniciarJogo() {
            ronda = 1;
            document.getElementById('jogo-container').style.display = 'flex';
            document.getElementById('final-panel').style.display = 'none';
            iniciarRonda();
        }

        iniciarRonda();
    </script>
</body>
</html>
