<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Jogo Labirinto</title>
<style>
    body { margin: 0; background: #222; }
    canvas { display: block; margin: auto; background: #fff; }
</style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="600"></canvas>

<script>
const JOGO_CONFIG = {
    caminhoIcons: "../../icons/", 
    caminhoImg: "../../img/",
    iconesMenu: {
        pre: "iconpre.png",
        ano1: "icon1.png",
        ano2: "icon2.png",
        ano3: "icon3.png",
        ano4: "icon4.png"
    },
    labirinto: {
        caminho: "../../img/labirinto/",
        obstaculos: ["pedra.png", "buraco.png"],
        categorias: {
            cao: { nome: "Cão", sprite: "l_cao.png", objetivo: "l_comida_cao.png", corParede: "#e691a7" },
            gato: { nome: "Gato", sprite: "l_gato.png", objetivo: "l_comida_gato.png", corParede: "#d47a92" },
            passaro: { nome: "Pássaro", sprite: "l_passaro.png", objetivo: "l_comida_passaro.png", corParede: "#8db596" }
        }
    },
    relatorio: {
        titulo: "Fim da Aventura!",
        pontosTotal: "Pontos:",
        tempoTotal: "Tempo:"
    }
};

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const TAM = 10;
const TAM_CEL = 60;

let grid = [];
let inicio = {x:0, y:0};
let fim = {x:TAM-1, y:TAM-1};

// 🔹 Criar grid vazio
function criarGrid() {
    grid = [];
    for (let y = 0; y < TAM; y++) {
        let linha = [];
        for (let x = 0; x < TAM; x++) {
            linha.push(0); // 0 = livre
        }
        grid.push(linha);
    }
}

// 🔹 BFS para garantir caminho
function existeCaminho() {
    let fila = [inicio];
    let visitado = new Set();

    while (fila.length) {
        let {x, y} = fila.shift();
        let chave = x + "," + y;

        if (visitado.has(chave)) continue;
        visitado.add(chave);

        if (x === fim.x && y === fim.y) return true;

        let dirs = [[1,0],[-1,0],[0,1],[0,-1]];

        for (let [dx, dy] of dirs) {
            let nx = x + dx;
            let ny = y + dy;

            if (nx>=0 && ny>=0 && nx<TAM && ny<TAM) {
                if (grid[ny][nx] === 0) {
                    fila.push({x:nx, y:ny});
                }
            }
        }
    }

    return false;
}

// 🔹 Colocar obstáculos sem bloquear o caminho
function gerarObstaculos() {
    let tentativas = 0;

    while (tentativas < 200) {
        let x = Math.floor(Math.random() * TAM);
        let y = Math.floor(Math.random() * TAM);

        if ((x === inicio.x && y === inicio.y) ||
            (x === fim.x && y === fim.y)) continue;

        if (grid[y][x] === 1) continue;

        // tenta colocar
        grid[y][x] = 1;

        // verifica se ainda há caminho
        if (!existeCaminho()) {
            grid[y][x] = 0; // desfaz
        }

        tentativas++;
    }
}

// 🔹 Desenhar
function desenhar() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let y = 0; y < TAM; y++) {
        for (let x = 0; x < TAM; x++) {

            if (grid[y][x] === 1) {
                ctx.fillStyle = "#444";
            } else {
                ctx.fillStyle = "#ddd";
            }

            ctx.fillRect(x*TAM_CEL, y*TAM_CEL, TAM_CEL-2, TAM_CEL-2);
        }
    }

    // início
    ctx.fillStyle = "green";
    ctx.fillRect(inicio.x*TAM_CEL, inicio.y*TAM_CEL, TAM_CEL-2, TAM_CEL-2);

    // fim
    ctx.fillStyle = "red";
    ctx.fillRect(fim.x*TAM_CEL, fim.y*TAM_CEL, TAM_CEL-2, TAM_CEL-2);
}

// 🔹 Inicializar
function iniciar() {
    criarGrid();
    gerarObstaculos();
    desenhar();
}

iniciar();
</script>

</body>
</html>
