<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Labirinto</title>
<style>
    body { margin:0; background:#222; }
    canvas { display:block; margin:auto; background:#fff; }
</style>
</head>
<body>

<canvas id="canvas" width="600" height="600"></canvas>

<script>
// 🔴 TEU CÓDIGO — NÃO ALTERADO
const JOGO_CONFIG = {
    caminhoIcons: "../../icons/", 
    caminhoImg: "../../img/",
    iconesMenu: {
        pre: "iconpre.png",
        ano1: "icon1.png",
        ano2: "icon2.png",
        ano3: "icon3.png",
        ano4: "icon4.png"
    },
    labirinto: {
        caminho: "../../img/labirinto/",
        obstaculos: ["pedra.png", "buraco.png"],
        categorias: {
            cao: { nome: "Cão", sprite: "l_cao.png", objetivo: "l_comida_cao.png", corParede: "#e691a7" },
            gato: { nome: "Gato", sprite: "l_gato.png", objetivo: "l_comida_gato.png", corParede: "#d47a92" },
            passaro: { nome: "Pássaro", sprite: "l_passaro.png", objetivo: "l_comida_passaro.png", corParede: "#8db596" }
        }
    },
    relatorio: {
        titulo: "Fim da Aventura!",
        pontosTotal: "Pontos:",
        tempoTotal: "Tempo:"
    }
};
// 🔴 FIM DO TEU CÓDIGO



// ================================
// 🔧 LÓGICA MELHORADA DO LABIRINTO
// ================================

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const GRID = 10;
const SIZE = 60;

let mapa = [];
let inicio = {x:0, y:0};
let fim = {x:GRID-1, y:GRID-1};

// Criar mapa vazio
function criarMapa() {
    mapa = [];
    for (let y = 0; y < GRID; y++) {
        let linha = [];
        for (let x = 0; x < GRID; x++) {
            linha.push(0); // 0 livre
        }
        mapa.push(linha);
    }
}

// 🔹 Criar caminho garantido (linha base)
function criarCaminhoSeguro() {
    let x = 0, y = 0;
    mapa[y][x] = 2; // caminho seguro

    while (x !== fim.x || y !== fim.y) {
        if (Math.random() < 0.5 && x < fim.x) x++;
        else if (y < fim.y) y++;

        mapa[y][x] = 2;
    }
}

// 🔹 Colocar obstáculos SEM bloquear o caminho
function colocarObstaculos() {
    for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {

            // não mexe no caminho seguro
            if (mapa[y][x] === 2) continue;

            // probabilidade de obstáculo
            if (Math.random() < 0.3) {
                mapa[y][x] = 1;
            }
        }
    }
}

// 🔹 Validar caminho extra (segurança adicional)
function existeCaminho() {
    let fila = [inicio];
    let visitados = new Set();

    while (fila.length) {
        let {x,y} = fila.shift();
        let key = x+","+y;

        if (visitados.has(key)) continue;
        visitados.add(key);

        if (x === fim.x && y === fim.y) return true;

        let dirs = [[1,0],[-1,0],[0,1],[0,-1]];

        for (let [dx,dy] of dirs) {
            let nx = x+dx;
            let ny = y+dy;

            if (nx>=0 && ny>=0 && nx<GRID && ny<GRID) {
                if (mapa[ny][nx] !== 1) {
                    fila.push({x:nx,y:ny});
                }
            }
        }
    }

    return false;
}

// 🔹 Gerar labirinto completo
function gerarLabirinto() {
    do {
        criarMapa();
        criarCaminhoSeguro();
        colocarObstaculos();
    } while (!existeCaminho());
}

// 🔹 Desenho simples
function desenhar() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {

            if (mapa[y][x] === 1) {
                ctx.fillStyle = "#333"; // obstáculo
            } else if (mapa[y][x] === 2) {
                ctx.fillStyle = "#bde0fe"; // caminho garantido
            } else {
                ctx.fillStyle = "#eee";
            }

            ctx.fillRect(x*SIZE, y*SIZE, SIZE-2, SIZE-2);
        }
    }

    // início
    ctx.fillStyle = "green";
    ctx.fillRect(inicio.x*SIZE, inicio.y*SIZE, SIZE-2, SIZE-2);

    // fim
    ctx.fillStyle = "red";
    ctx.fillRect(fim.x*SIZE, fim.y*SIZE, SIZE-2, SIZE-2);
}

// 🔹 Inicializar
function iniciar() {
    gerarLabirinto();
    desenhar();
}

iniciar();

</script>
</body>
</html>
