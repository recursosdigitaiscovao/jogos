<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Jogo da Simetria</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(255, 179, 198, 0.4);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%;
            background: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        header h1 { font-size: 1rem; color: #2d3436; }

        .btn-voltar-3d {
            text-decoration: none;
            color: #2d3436;
            background-color: #ffb3c6;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #ef87a1;
            box-shadow: 0 3px 0 #ef87a1;
            cursor: pointer;
        }

        /* ÁREA PRINCIPAL */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            gap: 20px;
        }

        /* GRELHA DO JOGO */
        .jogo-container {
            display: flex;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 40px);
            grid-template-rows: repeat(8, 40px);
            border: 2px solid #333;
        }

        /* Divisória central grossa */
        .divisor {
            width: 6px;
            background: #000;
        }

        .cell {
            width: 40px;
            height: 40px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cell.readonly { cursor: default; }

        /* PALETA DE CORES */
        .paleta {
            display: flex;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cor-opcao {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid #eee;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cor-opcao.selected {
            transform: scale(1.2);
            border-color: #2d3436;
        }

        /* BOTÃO VERIFICAR */
        .btn-verificar {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 5px 0 #27ae60;
            cursor: pointer;
        }

        .btn-verificar:active { transform: translateY(3px); box-shadow: 0 2px 0 #27ae60; }

        /* MODAL FINAL */
        #final-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 179, 198, 0.98);
            z-index: 300;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        footer {
            width: 100%; padding: 10px; background-color: white;
            text-align: center; color: #2d3436; font-size: 0.75rem;
        }

        /* CORES DO JOGO */
        .c-sky { background-color: #c4e9f5; }
        .c-black { background-color: #000000; }
        .c-blue { background-color: #0000ff; }
        .c-yellow { background-color: #ffff00; }
        .c-white { background-color: #ffffff; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span style="font-size: 1.3rem;">🧩</span>
            <h1>Faz o Espelho!</h1>
        </div>
        <a href="/jogos/pre/" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main>
        <div class="jogo-container">
            <div class="grid" id="grid-left"></div>
            
            <div class="divisor"></div>
            
            <div class="grid" id="grid-right"></div>
        </div>

        <div class="paleta" id="paleta">
            <div class="cor-opcao c-sky" onclick="selecionarCor('#c4e9f5', this)"></div>
            <div class="cor-opcao c-black" onclick="selecionarCor('#000000', this)"></div>
            <div class="cor-opcao c-blue" onclick="selecionarCor('#0000ff', this)"></div>
            <div class="cor-opcao c-yellow" onclick="selecionarCor('#ffff00', this)"></div>
        </div>

        <button class="btn-verificar" onclick="verificarSimetria()">Verifique ✅</button>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🎨</div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">INCRÍVEL!</h1>
        <p style="font-size: 1.2rem; margin-bottom: 25px;">Ficou um espelho perfeito!</p>
        <button class="btn-voltar-3d" style="background: white; color: #ff6b81; padding: 15px 40px; justify-content: center;" onclick="location.reload()">JOGAR DE NOVO 🔄</button>
    </div>

    <footer>
        Recursos Digitais Covão • <strong>Professor Luís</strong>
    </footer>

    <script>
        // Definição das cores da imagem (Lado Esquerdo)
        // Cores: S (Sky), B (Blue), K (Black), Y (Yellow)
        const S = '#c4e9f5', B = '#0000ff', K = '#000000', Y = '#ffff00';
        
        const modeloEsquerdo = [
            [S, S, S, S],
            [S, S, B, B],
            [S, B, S, S],
            [S, B, S, K],
            [B, B, B, B],
            [B, B, Y, B],
            [B, B, B, B],
            [S, K, S, S]
        ];

        let corSelecionada = '';

        function inicializarGrids() {
            const leftGrid = document.getElementById('grid-left');
            const rightGrid = document.getElementById('grid-right');

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 4; c++) {
                    // Preencher esquerda (modelo)
                    const cellL = document.createElement('div');
                    cellL.className = 'cell readonly';
                    cellL.style.backgroundColor = modeloEsquerdo[r][c];
                    leftGrid.appendChild(cellL);

                    // Preencher direita (vazio)
                    const cellR = document.createElement('div');
                    cellR.className = 'cell';
                    cellR.dataset.row = r;
                    cellR.dataset.col = c;
                    cellR.onclick = function() {
                        if(corSelecionada) this.style.backgroundColor = corSelecionada;
                    };
                    rightGrid.appendChild(cellR);
                }
            }
        }

        function selecionarCor(cor, elemento) {
            corSelecionada = cor;
            document.querySelectorAll('.cor-opcao').forEach(el => el.classList.remove('selected'));
            elemento.classList.add('selected');
        }

        function verificarSimetria() {
            const cellsR = document.querySelectorAll('#grid-right .cell');
            let correto = true;

            cellsR.forEach(cell => {
                const r = cell.dataset.row;
                const c = cell.dataset.col;
                
                // Na simetria horizontal simples, comparamos com a mesma linha e coluna espelhada
                // Se o utilizador quiser simetria "espelho", a lógica seria comparar com a coluna invertida.
                // Mas geralmente para o Pré, é reproduzir a cor na mesma posição (cópia).
                // Vou usar a lógica de cópia exata conforme a imagem sugerida.
                
                const corEsperada = rgbToHex(modeloEsquerdo[r][c]);
                const corAtual = rgbToHex(cell.style.backgroundColor);

                if (corAtual !== corEsperada) {
                    correto = false;
                    cell.style.border = "2px solid red";
                    setTimeout(() => cell.style.border = "1px solid #ccc", 1000);
                }
            });

            if (correto) {
                document.getElementById('final-panel').style.display = 'flex';
            } else {
                alert("Algumas cores não estão certas. Tenta outra vez! 😊");
            }
        }

        // Helper para converter cor do browser para Hex
        function rgbToHex(rgb) {
            if (!rgb) return "";
            if (rgb.startsWith('#')) return rgb;
            const vals = rgb.match(/\d+/g);
            return "#" + vals.map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("");
        }

        inicializarGrids();
    </script>
</body>
</html>
