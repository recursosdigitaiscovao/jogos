<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Pinta</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(255, 179, 198, 0.4); 
            color: #2c3e50;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background-color: white; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05); flex-shrink: 0; z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; padding: 5px; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none; color: #2d3436; background-color: #ffb3c6;
            font-weight: bold; font-size: 0.75rem; padding: 8px 14px;
            border-radius: 8px; border: 1px solid #ef87a1;
            box-shadow: 0 3px 0 #ef87a1; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s; z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; 
            margin-bottom: 6px; border: 1px solid #eee; transition: 0.2s;
        }
        .sidebar-item:hover { background-color: #ffb3c6; color: white; border-color: #ef87a1; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* JOGO PRINCIPAL */
        main {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 10px; gap: 10px; overflow-y: auto;
        }

        .area-desenho { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }

        .quadro {
            background: white; padding: 8px; border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); border: 3px solid #fff;
        }
        .quadro.alvo { border-color: #ffb3c6; }
        .quadro.interativo { border-color: #7bed9f; }

        .grid {
            display: grid; grid-template-columns: repeat(4, 50px); grid-template-rows: repeat(4, 50px); 
            gap: 1px; background: #eee; border: 1px solid #ddd;
        }

        .cell { width: 100%; height: 100%; background: white; cursor: pointer; }

        /* BARRA DE FERRAMENTAS */
        .barra-ferramentas {
            display: flex; align-items: center; background: white;
            padding: 10px 18px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .paleta { display: flex; gap: 6px; align-items: center; }
        .cor-btn { width: 38px; height: 38px; border-radius: 50%; border: 3px solid #f0f0f0; cursor: pointer; }
        .cor-btn.active { border-color: #2d3436; transform: scale(1.1); }

        .espacador { width: 30px; }
        .grupo-acoes { display: flex; gap: 10px; }

        /* BOTÕES QUADRADOS CINZENTOS PEQUENOS */
        .btn-quadrado-cinza {
            width: 40px; height: 40px; border-radius: 10px; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: 0.1s;
        }

        .btn-vassoura-cinza { background: #7f8c8d; box-shadow: 0 4px 0 #606c6d; color: white; }
        .btn-vassoura-cinza span { filter: brightness(0) invert(1); }

        .btn-visto-cinza { background: #95a5a6; box-shadow: 0 4px 0 #7a8a8b; color: white; }
        
        .btn-quadrado-cinza:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

        /* MODAIS */
        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 320px; background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 400; text-align: center; border: 3px solid #ffb3c6;
        }
        .modal-custom.active { display: block; }

        #final-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 179, 198, 0.98); z-index: 300;
            flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;
        }

        /* FOOTER UNIFICADO */
        footer { 
            width: 100%; padding: 12px; background: white; text-align: center; 
            font-size: 0.8rem; border-top: 1px solid #eee; flex-shrink: 0;
            color: #7f8c8d;
        }
        footer .destaque { color: #ff6b81; font-weight: bold; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(4, 42px); grid-template-rows: repeat(4, 42px); }
            .area-desenho { flex-direction: column; gap: 8px; }
            .espacador { width: 15px; }
            .cor-btn { width: 34px; height: 34px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="fecharModais()"></div>

    <div id="modal-sucesso" class="modal-custom">
        <div style="font-size: 3.5rem;">🌟</div>
        <h2 style="color: #2ecc71; margin-top: 10px;">Muito Bem!</h2>
        <p style="margin: 15px 0; font-weight: 600; line-height: 1.4;">O Professor Luís está<br>orgulhoso de ti! ⭐</p>
        <button class="btn-visto-cinza" style="width: 100%; height: 45px; border-radius: 12px; border:none; color:white; font-weight:bold;" onclick="proximaRonda()">PRÓXIMO</button>
    </div>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom: 20px; border-bottom: 2px solid #ffb3c6; color: #ff6b81;">Menu Escolar</h3>
        <nav>
            <a href="/jogos/" class="sidebar-item">🏠 Início</a>
            <a href="/jogos/pre/" class="sidebar-item">🦒 Pré-Escolar</a>
            <a href="/jogos/1/" class="sidebar-item">🐥 1º Ano</a>
            <a href="/jogos/2/" class="sidebar-item">🐢 2º Ano</a>
            <a href="/jogos/3/" class="sidebar-item">🦁 3º Ano</a>
            <a href="/jogos/4/" class="sidebar-item">🐘 4º Ano</a>
        </nav>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span style="font-size: 1.3rem;">🎨</span>
            <h1>Pinta</h1>
        </div>
        <a href="/jogos/pre/" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main>
        <div class="area-desenho">
            <div class="quadro alvo"><div class="grid" id="grid-modelo"></div></div>
            <div class="quadro interativo"><div class="grid" id="grid-pintura"></div></div>
        </div>

        <div class="barra-ferramentas">
            <div class="paleta" id="paleta"></div>
            <div class="espacador"></div>
            <div class="grupo-acoes">
                <button class="btn-quadrado-cinza btn-vassoura-cinza" onclick="limparQuadro()" title="Limpar">
                    <span>🧹</span>
                </button>
                <button class="btn-quadrado-cinza btn-visto-cinza" onclick="verificar()" title="Verificar">✔</button>
            </div>
        </div>

        <div style="margin-top: 5px;">
            <p style="font-weight: bold; color: #7f8c8d; font-size: 0.85rem;">Ronda <span id="ronda-atual">1</span> / 5</p>
        </div>
    </main>

    <div id="final-panel">
        <div style="font-size: 5rem;">🏆</div>
        <h1>MUITO BEM!</h1>
        <p>Concluíste todas as rondas!<br>O <strong>Professor Luís</strong> está muito contente.</p>
        <button class="btn-voltar-3d" style="background: white; padding: 15px 40px; margin-top: 25px; justify-content: center;" onclick="location.reload()">REPETIR 🔄</button>
    </div>

    <footer><span class="destaque">Recursos Digitais Covão</span> • <span class="destaque">Professor Luís</span></footer>

    <script>
        const B = '#0984e3', R = '#ff7675', Y = '#f1c40f', G = '#2ecc71', P = '#a29bfe', O = '#e17055', W = '#ffffff';
        const dbDesenhos = [
            { c: [B, R], m: [[W,B,B,W],[B,R,R,B],[B,R,R,B],[W,B,B,W]] },
            { c: [G, Y], m: [[G,W,W,W],[G,G,W,W],[G,G,G,W],[G,G,G,G]] },
            { c: [R, B], m: [[R,R,R,R],[W,W,W,W],[B,B,B,B],[W,W,W,W]] },
            { c: [Y, P], m: [[Y,W,W,P],[W,Y,P,W],[W,P,Y,W],[P,W,W,Y]] },
            { c: [B, G], m: [[B,B,G,G],[B,B,G,G],[G,G,B,B],[G,G,B,B]] },
            { c: [R, Y], m: [[W,Y,Y,W],[Y,R,R,Y],[Y,R,R,Y],[W,Y,Y,W]] },
            { c: [P, O], m: [[P,P,P,P],[O,O,O,O],[P,P,P,P],[O,O,O,O]] },
            { c: [G, B], m: [[G,W,G,W],[W,B,W,B],[G,W,G,W],[W,B,W,B]] }
        ];

        let nivelAtual = 0;
        let corSelecionada = '';
        let sequenciaJogo = [];

        function inicializarJogo() {
            sequenciaJogo = [...dbDesenhos].sort(() => 0.5 - Math.random()).slice(0, 5);
            carregarRonda();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function fecharModais() {
            document.querySelectorAll('.modal-custom, .sidebar, .overlay').forEach(el => el.classList.remove('active'));
        }

        function carregarRonda() {
            fecharModais();
            const dados = sequenciaJogo[nivelAtual];
            document.getElementById('ronda-atual').innerText = nivelAtual + 1;
            
            const paleta = document.getElementById('paleta');
            paleta.innerHTML = '';
            [...dados.c, W].forEach(cor => {
                const b = document.createElement('div');
                b.className = 'cor-btn';
                b.style.backgroundColor = cor;
                if(cor === W) b.style.border = "1px solid #ddd";
                b.onclick = () => {
                    corSelecionada = cor;
                    document.querySelectorAll('.cor-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                };
                paleta.appendChild(b);
            });
            corSelecionada = dados.c[0]; 
            paleta.firstChild.classList.add('active');

            const gMod = document.getElementById('grid-modelo');
            const gPin = document.getElementById('grid-pintura');
            gMod.innerHTML = ''; gPin.innerHTML = '';

            for(let i=0; i<16; i++) {
                const r = Math.floor(i / 4);
                const col = i % 4;
                const cM = document.createElement('div');
                cM.className = 'cell';
                cM.style.backgroundColor = dados.m[r][col];
                gMod.appendChild(cM);

                const cP = document.createElement('div');
                cP.className = 'cell';
                cP.onclick = function() { this.style.backgroundColor = corSelecionada; };
                gPin.appendChild(cP);
            }
        }

        function limparQuadro() {
            document.querySelectorAll('#grid-pintura .cell').forEach(c => c.style.backgroundColor = W);
        }

        function verificar() {
            const cellsPin = document.querySelectorAll('#grid-pintura .cell');
            const mapa = sequenciaJogo[nivelAtual].m;
            let correto = true;

            cellsPin.forEach((c, idx) => {
                const r = Math.floor(idx / 4);
                const col = idx % 4;
                const corCelia = rgbToHex(c.style.backgroundColor) || '#ffffff';
                if(corCelia !== mapa[r][col]) correto = false;
            });

            if(correto) {
                document.getElementById('overlay').classList.add('active');
                document.getElementById('modal-sucesso').classList.add('active');
            } else {
                // MENSAGEM DE ERRO PERSONALIZADA
                alert("Ainda não está igual! O Professor Luís sabe que tu consegues, tenta outra vez! 💪");
            }
        }

        function proximaRonda() {
            nivelAtual++;
            if(nivelAtual < 5) {
                carregarRonda();
            } else {
                fecharModais();
                document.getElementById('final-panel').style.display = 'flex';
            }
        }

        function rgbToHex(rgb) {
            if(!rgb || rgb.startsWith('#')) return rgb;
            const vals = rgb.match(/\d+/g);
            return "#" + vals.map(x => parseInt(x).toString(16).padStart(2, '0')).join("");
        }

        inicializarJogo();
    </script>
</body>
</html>
