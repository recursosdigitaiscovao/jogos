<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Menu da Girafa</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffb3c6; /* Rosa Pastel */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header inspirado no Footer */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-icon {
            font-size: 1.6rem;
            cursor: pointer;
            color: #2c3e50;
            padding: 5px;
        }

        header h1 {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: 800;
        }

        /* Botão Voltar no Header */
        .btn-voltar-topo {
            text-decoration: none;
            color: #2e86de;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1.5px solid #2e86de;
            padding: 5px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .btn-voltar-topo:active {
            background: #2e86de;
            color: white;
        }

        /* Menu Lateral Expansível */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar h3 {
            color: #2c3e50;
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffb3c6;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-item {
            text-decoration: none;
            color: #444;
            font-weight: bold;
            padding: 12px 15px;
            border-radius: 12px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }

        .sidebar-item:hover { background: #ffb3c6; color: white; }
        .sidebar-item span { font-size: 1.4rem; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 150;
        }
        .overlay.active { display: block; }

        /* Área Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .emoji-principal {
            font-size: clamp(4rem, 12vh, 6rem);
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.1));
        }

        .subtitulo {
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .menu-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .btn-jogo {
            background-color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #ff6b81;
            font-weight: bold;
            border: 4px solid white;
            box-shadow: 0 6px 0 #e691a7;
            height: clamp(130px, 22vh, 180px);
            transition: 0.2s;
        }

        .btn-jogo span { font-size: 2.8rem; }
        .btn-jogo:active { transform: translateY(3px); box-shadow: 0 3px 0 #e691a7; }

        /* Footer */
        footer {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        footer strong { color: #2c3e50; }

        @media (min-width: 768px) {
            .menu-jogos { grid-template-columns: 1fr 1fr; gap: 25px; }
            .btn-jogo { height: 220px; font-size: 1.3rem; }
            .btn-jogo span { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="#" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="#" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="#" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="#" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="#" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border-radius:10px; border:1px solid #ddd; background:#f8f9fa; cursor:pointer; font-weight:bold;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Jogos da Pré</h1>
        </div>
        <a href="../" class="btn-voltar-topo">⬅ Voltar</a>
    </header>

    <main>
        <div class="emoji-principal">🦒</div>
        <p class="subtitulo">Escolhe um jogo para começares:</p>

        <nav class="menu-jogos">
            <a href="associar/" class="btn-jogo">
                <span>🧩</span> Associa o Par
            </a>

            <a href="procurar/" class="btn-jogo">
                <span>🔍</span> Procurar
            </a>
        </nav>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
