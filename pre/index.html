<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Menu da Girafa</title>
    <style>
        /* Estilo Base e Reset */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffb3c6; /* Rosa Pastel Anterior */
            color: #444;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .emoji-principal {
            font-size: clamp(60px, 15vh, 100px);
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.1));
        }

        h1 {
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            margin: 0 0 10px 0;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitulo {
            font-size: clamp(1rem, 4.5vw, 1.3rem);
            margin-bottom: 40px;
            max-width: 500px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Menu de Jogos Responsivo */
        .menu-jogos {
            display: flex;
            flex-direction: column; /* Coluna em telemóveis */
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        /* Botão do Jogo */
        .btn-jogo {
            background-color: white;
            text-decoration: none;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            font-weight: bold;
            padding: clamp(25px, 8vh, 45px);
            border-radius: 30px;
            box-shadow: 0 8px 0 #ff8fa3; /* Sombra rosa mais escura */
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: #ff6b81;
            border: 4px solid #fff;
        }

        .btn-jogo span {
            font-size: clamp(3rem, 12vw, 4.5rem);
        }

        /* Efeito de Clique */
        .btn-jogo:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #ff8fa3;
        }

        /* Hover para Computador */
        @media (hover: hover) {
            .btn-jogo:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 0 #ff8fa3;
                background-color: #fffafb;
            }
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 40px;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 8px 25px;
            border: 2px solid white;
            border-radius: 50px;
            transition: background 0.3s;
        }

        .btn-voltar:active {
            background: rgba(255, 255, 255, 0.2);
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            opacity: 0.9;
            font-size: 0.9rem;
            color: white;
        }

        /* Ajuste para Tablets e ecrãs largos (Lado a Lado) */
        @media (min-width: 650px) {
            .menu-jogos {
                flex-direction: row;
                justify-content: center;
            }
            .btn-jogo {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🦒</div>
    
    <h1>Jogos da Girafa</h1>
    <p class="subtitulo">Olá! Escolhe um jogo para começares:</p>

    <nav class="menu-jogos">
        <a href="associar/" class="btn-jogo">
            <span>🧩</span> Associa o Par
        </a>

        <a href="procurar/" class="btn-jogo">
            <span>🔍</span> Procurar
        </a>
    </nav>

    <a href="../" class="btn-voltar">⬅ Voltar</a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
