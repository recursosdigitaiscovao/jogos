<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cor Principal do Pré-Escolar */
            --cor-principal: #e691a7; 
            --soft-bg: #fff5f7;
            --azul-pt: #5ea2e6;
            --azul-pt-fundo: #ebf4ff;
            --verde-mat: #45cfa8;
            --verde-mat-fundo: #e8f9f4;
            --vermelho-em: #ff4757;
            --vermelho-em-fundo: #fff0f1;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        /* --- Sidebar --- */
        .sidebar { 
            position: fixed; top: 0; left: -260px; width: 240px; height: 100%; 
            background: white; box-shadow: 5px 0 15px rgba(0,0,0,0.1); 
            transition: 0.3s; z-index: 2000; padding-top: 10px; 
        }
        .sidebar.active { left: 0; }
        
        /* Efeito de Hover no BOTÃO inteiro */
        .sidebar-item { 
            display: flex; align-items: center; padding: 15px 25px; 
            color: #555; text-decoration: none; border-bottom: 1px solid #f9f9f9;
            transition: all 0.3s ease; font-weight: normal;
            cursor: pointer;
        }
        .sidebar-item:hover {
            background-color: var(--soft-bg);
            padding-left: 35px;
            color: var(--cor-principal) !important;
            font-weight: bold;
        }
        .img-icon-sidebar { height: 26px; width: auto; margin-right: 12px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        /* --- Header --- */
        header {
            background: white;
            padding: 20px 0 50px 0;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 100; flex-shrink: 0; position: relative;
            min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header-line-1 {
            position: relative; width: 100%; display: flex; justify-content: center; align-items: center; min-height: 50px;
        }

        .menu-btn {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 30px; cursor: pointer;
            color: var(--cor-principal); padding: 0;
        }

        .btn-voltar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background-color: var(--cor-principal); color: white; text-decoration: none;
            padding: 8px 18px; border-radius: 50px; font-weight: bold; font-size: 0.9rem;
            display: flex; align-items: center; gap: 5px; transition: 0.2s; white-space: nowrap;
        }

        .header-title-group { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .img-icon-header { height: clamp(35px, 5vh, 50px); width: auto; }

        h1 { font-size: clamp(1.2rem, 4vw, 2.2rem); color: var(--cor-principal); white-space: nowrap; margin: 0; }
        .header-subtitle { width: 100%; text-align: center; color: #8a6436; font-size: clamp(0.75rem, 2vh, 1.05rem); margin-top: 10px; font-weight: 400; }

        /* --- Main Content --- */
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 0; }
        .games-grid { display: grid; width: 100%; height: 90%; max-width: 1100px; gap: 20px; grid-template-columns: repeat(3, 1fr); }

        .game-card {
            background: white; border-radius: 25px; padding: 15px; text-align: center; 
            display: flex; flex-direction: column; text-decoration: none; 
            border-bottom: 8px solid rgba(0,0,0,0.08); transition: 0.3s; min-height: 0;
        }
        .game-card:hover { transform: translateY(-5px); }

        .game-img-container { flex: 1; width: 100%; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; min-height: 0; }
        .
