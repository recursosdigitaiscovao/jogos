<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carregando...</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-page: #ffffff; --primary-blue: #5ba4e5; --primary-dark: #3d7db8; 
            --white: #ffffff; --text-grey: #5d7082; 
            --header-h: 100px; 
            --outer-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: background 0.3s;
            /* Textura de fundo suave (bolinhas e triângulos como na imagem) */
            background-image: radial-gradient(rgba(0,0,0,0.03) 2px, transparent 2px);
            background-size: 40px 40px;
        }

        /* HEADER (MANTIDO) */
        header { 
            height: var(--header-h); background: #fbfdff; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 25px; z-index: 2500; flex-shrink: 0;
            box-shadow: var(--outer-shadow); position: relative;
        }
        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 65px; width: auto; } 
        .logo-text h1 { font-size: 22px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 9px; color: #7A8B9A !important; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .hamburger-btn { font-size: 32px; color: var(--primary-blue); cursor: pointer; padding: 5px; z-index: 3001; }
        .btn-voltar-mobile { display: flex !important; align-items: center; text-decoration: none; padding: 5px; z-index: 3001; transition: transform 0.2s ease; }
        .btn-voltar-mobile:hover { transform: scale(1.1); }
        .btn-voltar-mobile img { height: 45px; width: auto; }

        .menu-dropdown { position: absolute; top: 85px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 3000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 18px; background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); text-decoration: none; color: #5d7082; font-weight: 700; font-size: 0.9rem; min-width: 200px; transition: 0.2s; }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        .menu-item img { height: 22px; width: 22px; object-fit: contain; }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 2000; }

        /* ÁREA DE JOGOS - CAMINHO DE APRENDIZAGEM */
        main { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative;
        }

        /* Linha Sinuosa (Background Path) */
        main::before {
            content: "";
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 120px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="25" d="M0,160L80,176C160,192,320,224,480,213.3C640,203,800,149,960,138.7C1120,128,1280,160,1360,176L1440,192"></path></svg>');
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 0;
            pointer-events: none;
        }

        .intro-container { text-align: center; margin-bottom: 25px; z-index: 1; }
        .intro-container p { color: var(--text-grey); font-weight: 800; font-size: 1.1rem; } 

        .game-wrapper { 
            width: 100%; 
            max-width: 1100px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center; 
            padding-bottom: 40px; 
            z-index: 1;
        }

        /* CARD ESTILO IMAGEM */
        .game-card { 
            background: #ffffff; 
            width: 165px; height: 175px; 
            border-radius: 28px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            padding: 12px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid #f0f4f8;
            position: relative;
        }

        .game-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 35px rgba(91, 164, 229, 0.4); /* Glow igual ao da imagem */
            border-color: var(--primary-blue);
        }

        /* Container da Imagem Inset */
        .card-img-container { 
            width: 100%; 
            height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 20px; 
            background: #f8fafc; /* Cor de fundo interna leve */
            margin-bottom: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .card-img-container img { max-width: 75%; max-height: 75%; object-fit: contain; }
        
        .game-card h2 { 
            color: #5d7082; 
            font-size: 0.75rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1.2;
        }

        footer { padding: 15px; text-align: center; color: var(--text-grey); font-weight: 700; font-size: 0.8rem; flex-shrink: 0; background: rgba(255,255,255,0.5); }

        @media (max-width: 650px) { 
            header { height: 80px; padding: 0 15px; }
            .logo-center img { height: 45px; }
            .game-wrapper { gap: 15px; }
            .game-card { width: 145px; height: 160px; border-radius: 22px; }
            .card-img-container { height: 95px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        
        <div class="logo-center">
            <img id="head-logo" src="" alt="Logo">
            <div class="logo-text">
                <h1 id="tit-l1"></h1>
                <h1 id="tit-l2"></h1>
                <p id="sub-tit"></p>
            </div>
        </div>

        <div class="header-right">
            <a href="../" id="link-voltar-mobile" class="btn-voltar-mobile">
                <img id="header-back-mobile" src="" alt="Voltar">
            </a>
        </div>
    </header>

    <main>
        <div class="intro-container">
            <p id="hub-intro-sub"></p>
        </div>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="biblioteca.js"></script>
    <script src="dados.js"></script>
    
    <script>
        function initUI() {
            if (typeof JOGO_CONFIG === 'undefined' || typeof BIBLIOTECA_TEMAS === 'undefined' || typeof BIBLIOTECA_CONTEUDO === 'undefined') return;
            
            const conf = JOGO_CONFIG;
            const tema = BIBLIOTECA_TEMAS[conf.areaAtiva];
            const info = BIBLIOTECA_CONTEUDO[conf.anoAtivo][conf.areaAtiva];
            const pIconsMenu = conf.caminhoIconsMenu;
            const pIconsJogos = conf.caminhoIconsJogos;
            const root = document.documentElement;

            // Ajuste dinâmico de cores
            root.style.setProperty('--bg-page', tema.corPagina);
            root.style.setProperty('--primary-blue', tema.corPrimaria);
            root.style.setProperty('--primary-dark', tema.corEscura);
            root.style.setProperty('--text-grey', tema.corTexto);

            document.title = info.t1 + " " + info.t2;
            document.getElementById('tit-l1').innerText = info.t1;
            document.getElementById('tit-l2').innerText = info.t2;
            document.getElementById('sub-tit').innerText = info.sub;
            document.getElementById('hub-intro-sub').innerText = info.intro;
            document.getElementById('txt-rodape').innerHTML = info.rodape;
            
            document.getElementById('head-logo').src = pIconsMenu + conf.iconesMenu[conf.anoAtivo];
            document.getElementById('header-back-mobile').src = pIconsMenu + tema.voltarMobile;

            // Menu Dropdown
            const menuBox = document.getElementById('dropdownMenu');
            menuBox.innerHTML = ''; 
            const menuLabels = { home: 'Início', pre: 'Pré', ano1: '1º Ano', ano2: '2º Ano', ano3: '3º Ano', ano4: '4º Ano' };
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                if(conf.links[k]) {
                    const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
                    a.innerHTML = `<img src="${pIconsMenu}${conf.iconesMenu[k]}"><span>${menuLabels[k]}</span>`;
                    menuBox.appendChild(a);
                }
            });

            // Grid de Jogos com estilo da imagem
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = ''; 
            conf.listaJogos.forEach(jogo => {
                const card = document.createElement('a'); 
                card.className = 'game-card'; 
                card.href = jogo.link;
                card.innerHTML = `
                    <div class="card-img-container">
                        <img src="${pIconsJogos}${jogo.icon}">
                    </div>
                    <h2>${jogo.nome}</h2>
                `;
                grid.appendChild(card);
            });
        }

        function toggleHamburger(e) {
            e.stopPropagation();
            const m = document.getElementById('dropdownMenu');
            const ov = document.getElementById('overlay');
            if(m.style.display === 'flex') { closeMenus(); } 
            else { m.style.display = 'flex'; ov.style.display = 'block'; }
        }

        function closeMenus() {
            document.getElementById('dropdownMenu').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = initUI;
    </script>
</body>
</html>
