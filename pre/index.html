<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pré-Escolar - Menu da Girafa</title>
    <style>
        /* Estilo Base e Reset */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffb3c6; /* Rosa Pastel */
            color: #444;
            margin: 0;
            padding: 10px; /* Reduzido para dar mais espaço em mobile */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100svh; /* Suporte para barras de navegação mobile */
        }

        .emoji-principal {
            font-size: clamp(50px, 12vh, 90px);
            margin-bottom: 5px;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.1));
        }

        h1 {
            font-size: clamp(1.6rem, 7vw, 2.5rem);
            margin: 0 0 5px 0;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitulo {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            margin-bottom: 25px;
            max-width: 90%;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Menu de Jogos Responsivo com Grid */
        .menu-jogos {
            display: grid;
            grid-template-columns: 1fr; /* Uma coluna por padrão (Mobile) */
            gap: 15px;
            width: 100%;
            max-width: 700px;
            padding: 10px;
        }

        /* Botão do Jogo */
        .btn-jogo {
            background-color: white;
            text-decoration: none;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            font-weight: bold;
            padding: clamp(20px, 5vh, 40px);
            border-radius: 25px;
            box-shadow: 0 6px 0 #ff8fa3;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ff6b81;
            border: 4px solid #fff;
        }

        .btn-jogo span {
            font-size: clamp(2.5rem, 10vw, 4rem);
        }

        /* Efeito de Clique */
        .btn-jogo:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #ff8fa3;
        }

        /* Hover para Computador */
        @media (hover: hover) {
            .btn-jogo:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 0 #ff8fa3;
                background-color: #fffafb;
            }
        }

        /* Ajuste para Tablets e Computadores (Lado a Lado) */
        @media (min-width: 600px) {
            .menu-jogos {
                grid-template-columns: 1fr 1fr; /* Duas colunas */
                gap: 20px;
            }
        }

        /* Ajuste para Telemóveis em Horizontal (Landscape) */
        @media (max-height: 450px) {
            body { padding: 5px; }
            .emoji-principal { display: none; } /* Esconde o emoji grande para ganhar espaço */
            .menu-jogos { grid-template-columns: 1fr 1fr; }
            .btn-jogo { padding: 10px; flex-direction: row; }
            .btn-jogo span { font-size: 2rem; }
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin: 25px 0;
            text-decoration: none;
            font-size: 1rem;
            padding: 8px 25px;
            border: 2px solid white;
            border-radius: 50px;
            transition: background 0.3s;
        }

        footer {
            margin-top: auto;
            padding: 15px 0;
            opacity: 0.9;
            font-size: 0.8rem;
            color: white;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🦒</div>
    
    <h1>Jogos da Girafa</h1>
    <p class="subtitulo">Olá! Escolhe um jogo para começares:</p>

    <nav class="menu-jogos">
        <a href="associar/" class="btn-jogo">
            <span>🧩</span> Associa o Par
        </a>

        <a href="procurar/" class="btn-jogo">
            <span>🔍</span> Procurar
        </a>
    </nav>

    <a href="../" class="btn-voltar">⬅ Voltar</a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
