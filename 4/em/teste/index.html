<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4º Ano - Membros da UE</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(155, 89, 182, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            width: 100%; background: #fff; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 0.9rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .eu-icon { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; }

        .btn-voltar-3d {
            text-decoration: none; color: #ffffff; background-color: #9b59b6;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #8e44ad; box-shadow: 0 2px 0 #8e44ad;
        }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 15px rgba(0,0,0,0.2); }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* JOGO */
        main { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .game-area { 
            display: flex; 
            gap: 20px; 
            width: 100%; 
            max-width: 650px; 
            justify-content: center;
        }

        .column { display: flex; flex-direction: column; gap: 10px; min-height: 350px; }
        #col-bandeiras { width: 100px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.3); }

        .flag-card { 
            width: 80px; height: 55px; 
            background: white; border-radius: 4px; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); 
            cursor: grab; touch-action: none;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid transparent;
        }
        .flag-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Dropzone alterada para alinhar ao centro */
        .dropzone { 
            width: 220px; height: 65px; 
            background: #fff; border: 2px dashed #bdc3c7; 
            border-radius: 12px; display: flex; 
            align-items: center; justify-content: flex-start; 
            padding: 5px 15px; gap: 10px; transition: 0.3s;
        }
        .dropzone.correct { background: #eafaf1 !important; border-color: #2ecc71 !important; pointer-events: none; }
        .dropzone.wrong { background: #fdedec; border-color: #e74c3c; }
        .pais-txt { font-weight: 800; font-size: 0.8rem; color: #2c3e50; }

        .control-area { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        .btn-check { 
            background: #2ecc71; color: white; border: none; padding: 12px 30px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 0 #27ae60; font-size: 1rem;
        }
        .btn-check:active { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }

        .ronda-txt { font-weight: 800; color: #9b59b6; background: white; padding: 8px 20px; border-radius: 20px; border: 2px solid #9b59b6; }

        /* MODAIS E CERTIFICADO */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; z-index: 1000; width: 90%; max-width: 400px; text-align: center; border: 4px solid #9b59b6; }
        #certificado-container { display: none; flex: 1; align-items: center; justify-content: center; padding: 20px; }
        #certificado { background: #fff; padding: 40px; border: 15px double #9b59b6; text-align: center; max-width: 600px; width: 100%; }
        .nome-aluno { font-family: 'Georgia', serif; font-size: 2rem; border-bottom: 2px solid #000; padding: 5px; margin: 20px 0; display: inline-block; min-width: 250px; }
        
        footer { width: 100%; padding: 10px; background: #fff; text-align: center; color: #7f8c8d; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    
    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()" style="cursor:pointer">☰</div>
            <h1><img src="https://flagcdn.com/w40/eu.png" class="eu-icon"> Associa Bandeiras</h1>
        </div>
        <a href="../" class="btn-voltar-3d">⬅ Voltar</a>
    </header>

    <main id="game-main">
        <div class="game-area">
            <div class="column" id="col-bandeiras"></div>
            <div class="column" id="col-nomes"></div>
        </div>

        <div class="control-area">
            <div class="ronda-txt">Ronda <span id="num-ronda">1</span>/5</div>
            <button class="btn-check" onclick="verificarRonda()">VERIFICAR ✅</button>
        </div>
    </main>

    <div id="certificado-container">
        <div id="certificado">
            <h1 style="color:#9b59b6;">DIPLOMA</h1>
            <p>Certificamos que o(a) aluno(a):</p>
            <div class="nome-aluno" id="display-nome">_________</div>
            <p>Concluiu com distinção o desafio dos <strong>Estados-Membros da UE</strong>.</p>
            <button onclick="window.print()" style="margin-top:20px; padding:10px;">IMPRIMIR</button>
        </div>
    </div>

    <div id="modal-nome" class="modal">
        <h2>Parabéns! 🇪🇺</h2>
        <p>Escreve o teu nome:</p>
        <input type="text" id="input-nome" style="width:80%; padding:10px; margin:15px; border-radius:8px; border:1px solid #ccc;">
        <button class="btn-check" onclick="gerarCertificado()">VER DIPLOMA</button>
    </div>

    <script>
        const paises = [
            { id: "at", nome: "ÁUSTRIA", img: "austria_m.png" }, { id: "be", nome: "BÉLGICA", img: "belgica_m.png" },
            { id: "bg", nome: "BULGÁRIA", img: "bulgaria_m.png" }, { id: "hr", nome: "CROÁCIA", img: "croacia_m.png" },
            { id: "cy", nome: "CHIPRE", img: "chipre_m.png" }, { id: "cz", nome: "CHÉQUIA", img: "chequia_m.png" },
            { id: "dk", nome: "DINAMARCA", img: "dinamarca_m.png" }, { id: "ee", nome: "ESTÓNIA", img: "estonia_m.png" },
            { id: "fi", nome: "FINLÂNDIA", img: "finlandia_m.png" }, { id: "fr", nome: "FRANÇA", img: "franca_m.png" },
            { id: "de", nome: "ALEMANHA", img: "alemanha_m.png" }, { id: "gr", nome: "GRÉCIA", img: "grecia_m.png" },
            { id: "hu", nome: "HUNGRIA", img: "hungria_m.png" }, { id: "ie", nome: "IRLANDA", img: "irlanda_m.png" },
            { id: "it", nome: "ITÁLIA", img: "italia_m.png" }, { id: "lv", nome: "LETÓNIA", img: "letonia_m.png" },
            { id: "lt", nome: "LITUÂNIA", img: "lituania_m.png" }, { id: "lu", nome: "LUXEMBURGO", img: "luxemburgo_m.png" },
            { id: "mt", nome: "MALTA", img: "malta_m.png" }, { id: "nl", nome: "PAÍSES BAIXOS", img: "paisesbaixos_m.png" },
            { id: "pl", nome: "POLÓNIA", img: "polonia_m.png" }, { id: "pt", nome: "PORTUGAL", img: "portugal_m.png" },
            { id: "ro", nome: "ROMÉNIA", img: "romenia_m.png" }, { id: "sk", nome: "ESLOVÁQUIA", img: "eslovaquia_m.png" },
            { id: "si", nome: "ESLOVÉNIA", img: "eslovenia_m.png" }, { id: "es", nome: "ESPANHA", img: "espanha_m.png" },
            { id: "se", nome: "SUÉCIA", img: "suecia_m.png" }
        ];

        let pool = [...paises].sort(() => Math.random() - 0.5);
        let ronda = 1;
        let draggedEl = null;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

        function novaRonda() {
            if (ronda > 5) { 
                document.getElementById('modal-nome').style.display = 'block'; 
                document.getElementById('overlay').classList.add('active');
                return; 
            }
            document.getElementById('num-ronda').innerText = ronda;
            
            const selecionados = pool.splice(0, 5);
            const flagsCol = document.getElementById('col-bandeiras');
            const namesCol = document.getElementById('col-nomes');
            flagsCol.innerHTML = ''; namesCol.innerHTML = '';

            // Criar Bandeiras
            selecionados.forEach(p => {
                const div = document.createElement('div');
                div.className = 'flag-card'; div.draggable = true; div.dataset.id = p.id;
                div.innerHTML = `<img src="${p.img}" onerror="this.src='https://placehold.co/80x55?text=?'; console.log('Erro na imagem: ${p.img}')">`;
                div.addEventListener('dragstart', e => { draggedEl = e.currentTarget; });
                // Touch events
                div.addEventListener('touchstart', tStart, {passive:false});
                div.addEventListener('touchmove', tMove, {passive:false});
                div.addEventListener('touchend', tEnd);
                flagsCol.appendChild(div);
            });

            // Criar Zonas de Drop (Nomes)
            [...selecionados].sort(() => Math.random() - 0.5).forEach(p => {
                const div = document.createElement('div');
                div.className = 'dropzone'; div.dataset.id = p.id;
                div.innerHTML = `<span class="pais-txt">${p.nome}</span>`;
                div.addEventListener('dragover', e => e.preventDefault());
                div.addEventListener('drop', e => { e.preventDefault(); handlePlace(e.currentTarget); });
                namesCol.appendChild(div);
            });
        }

        function handlePlace(zone) {
            // Se a zona já tem uma bandeira, devolve a antiga para a coluna lateral
            const existingFlag = zone.querySelector('.flag-card');
            if(existingFlag) document.getElementById('col-bandeiras').appendChild(existingFlag);
            
            zone.appendChild(draggedEl);
            zone.classList.remove('wrong');
        }

        function verificarRonda() {
            const zones = document.querySelectorAll('.dropzone');
            let todasCertas = true;
            let preenchidas = 0;

            zones.forEach(zone => {
                const flag = zone.querySelector('.flag-card');
                if(flag) {
                    preenchidas++;
                    if(flag.dataset.id === zone.dataset.id) {
                        zone.classList.add('correct');
                        zone.classList.remove('wrong');
                    } else {
                        zone.classList.add('wrong');
                        todasCertas = false;
                        // Devolve a errada para a esquerda após breve delay
                        setTimeout(() => {
                            if(!zone.classList.contains('correct')) {
                                document.getElementById('col-bandeiras').appendChild(flag);
                                zone.classList.remove('wrong');
                            }
                        }, 800);
                    }
                } else {
                    todasCertas = false;
                }
            });

            if(todasCertas && preenchidas === 5) {
                setTimeout(() => {
                    ronda++;
                    novaRonda();
                }, 1000);
            }
        }

        function gerarCertificado() {
            const nome = document.getElementById('input-nome').value;
            if(!nome) return alert("Escreve o nome!");
            document.getElementById('display-nome').innerText = nome;
            document.getElementById('game-main').style.display = 'none';
            document.getElementById('modal-nome').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('certificado-container').style.display = 'flex';
        }

        // Touch Logic
        function tStart(e) { draggedEl = e.currentTarget; }
        function tMove(e) { 
            e.preventDefault(); const t = e.touches[0]; 
            draggedEl.style.position = 'fixed'; draggedEl.style.left = t.clientX - 40 + 'px'; 
            draggedEl.style.top = t.clientY - 25 + 'px'; draggedEl.style.zIndex = 1000; 
        }
        function tEnd(e) {
            draggedEl.style.display = 'none'; 
            const t = e.changedTouches[0];
            const target = document.elementFromPoint(t.clientX, t.clientY);
            draggedEl.style.display = 'flex'; draggedEl.style.position = 'static';
            const zone = target ? target.closest('.dropzone') : null;
            if(zone) handlePlace(zone);
            else document.getElementById('col-bandeiras').appendChild(draggedEl);
        }

        novaRonda();
    </script>
</body>
</html>
