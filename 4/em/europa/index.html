<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4º Ano - Associa Bandeiras</title>
    <script src="dados.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        :root {
            --primary: #9b59b6;
            --primary-dark: #8e44ad;
        }

        body {
            background-color: rgba(155, 89, 182, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: #fff; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #ddd; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        header h1 { font-size: 0.9rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; }

        /* Botão Voltar - Texto em Branco */
        .btn-voltar {
            text-decoration: none; color: #fff; background: var(--primary);
            font-weight: bold; font-size: 0.75rem; padding: 7px 14px;
            border-radius: 8px; border: 1px solid var(--primary-dark);
            box-shadow: 0 2px 0 var(--primary-dark);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -260px; top: 0; width: 260px; height: 100%;
            background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            transition: 0.3s ease; z-index: 200; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #f5f5f5; padding-bottom: 10px; }
        .sidebar-item { 
            padding: 12px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; 
            color: #2c3e50; font-weight: 600; text-decoration: none; 
            display: flex; align-items: center; gap: 10px; border-radius: 8px; transition: 0.2s;
        }
        .sidebar-item:hover { background-color: var(--primary); color: #fff; }

        /* JOGO MAIN */
        main { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .instrucao-topo { display: flex; align-items: center; gap: 10px; margin: 15px 0 15px 0; }
        .instrucao-topo h2 { color: #2c3e50; font-size: 1.1rem; font-weight: 700; }

        /* Botão Informação Redondo Roxo */
        .btn-info {
            background: var(--primary); color: #fff; width: 22px; height: 22px;
            border-radius: 50%; border: none; font-weight: bold; font-style: italic;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; box-shadow: 0 2px 0 var(--primary-dark);
        }

        /* ESTRELAS */
        .stars-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .star { font-size: 2rem; color: transparent; -webkit-text-stroke: 2px var(--primary); transition: 0.3s; }
        .star.filled { color: var(--primary); }

        /* TABULEIRO */
        #game-board { display: grid; grid-template-columns: 85px 220px; gap: 12px; width: fit-content; align-items: center; }
        .flag-slot { width: 80px; height: 55px; border: 2px dashed #ccc; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .flag-card { width: 80px; height: 55px; background: white; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); cursor: grab; touch-action: none; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #ddd; z-index: 10; }
        .flag-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .dropzone { width: 220px; height: 60px; background: #fff; border: 2px dashed #bdc3c7; border-radius: 12px; display: flex; align-items: center; padding-left: 5px; transition: 0.3s; }
        .dropzone.correct { background: #eafaf1 !important; border-color: #2ecc71 !important; pointer-events: none; }
        .dropzone.wrong { background: #fdedec; border-color: #e74c3c; }
        .pais-txt { font-weight: 800; font-size: 0.85rem; color: #2c3e50; flex: 1; text-align: center; }

        /* Botão Verificar Pequeno e Roxo */
        .control-area { margin-top: 20px; }
        .btn-check { 
            background: var(--primary); color: #fff; border: none; 
            padding: 10px 30px; border-radius: 10px; font-weight: bold; 
            cursor: pointer; font-size: 0.95rem; text-transform: uppercase;
            box-shadow: 0 4px 0 var(--primary-dark); transition: 0.1s;
        }
        .btn-check:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--primary-dark); }

        /* OVERLAY E MODAIS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; z-index: 1000; width: 85%; max-width: 350px; text-align: center; border: 4px solid var(--primary); }
        #certificado-container { display: none; flex: 1; align-items: center; justify-content: center; padding: 20px; }
        #certificado { background: #fff; padding: 30px; border: 12px double var(--primary); text-align: center; width: 100%; max-width: 500px; }
        .nome-aluno { font-family: 'Georgia', serif; font-size: 2rem; border-bottom: 2px solid #333; margin: 20px 0; display: inline-block; min-width: 220px; }
        footer { padding: 8px; background: #fff; text-align: center; color: #7f8c8d; font-size: 0.7rem; border-top: 1px solid #eee; }
    </style>
</head>
