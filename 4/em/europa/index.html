<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Associa Bandeiras</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        :root {
            --primary-color: #9b59b6; /* Cor do botão voltar e progressão */
            --primary-dark: #8e44ad;
            --success-color: #2ecc71;
            --bg-color: rgba(155, 89, 182, 0.1);
        }

        body {
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- HEADER & MENU --- */
        header {
            width: 100%; background: #fff; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #ddd; z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        
        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 4px; padding: 5px; }
        .menu-icon div { width: 22px; height: 3px; background: var(--primary-color); border-radius: 2px; }

        /* Menu Lateral */
        .side-menu {
            position: fixed; top: 0; left: -260px; width: 260px; height: 100%;
            background: white; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); padding-top: 20px;
        }
        .side-menu.active { left: 0; }
        .side-menu h3 { padding: 20px 25px; color: var(--primary-dark); font-size: 1.2rem; border-bottom: 1px solid #eee; }
        .side-menu a {
            display: flex; align-items: center; gap: 15px; padding: 15px 25px; 
            text-decoration: none; color: #2c3e50; font-weight: 600; transition: 0.2s;
        }
        /* Hover com cor do botão voltar e texto preto */
        .side-menu a:hover { background-color: var(--primary-color); color: #000; }

        header h1 { font-size: 1.1rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; }
        
        /* Botão Voltar com texto preto */
        .btn-voltar {
            text-decoration: none; color: #000; background: var(--primary-color);
            font-weight: bold; font-size: 0.75rem; padding: 8px 15px;
            border-radius: 8px; border: 1px solid var(--primary-dark);
        }

        /* --- PROGRESSÃO --- */
        .progress-container {
            width: 80%; max-width: 400px; height: 14px; background: #e0e0e0;
            border-radius: 10px; margin: 15px auto; overflow: hidden; border: 1px solid #ccc;
        }
        #progress-fill { width: 0%; height: 100%; background: var(--primary-color); transition: 0.6s ease; }

        /* --- ÁREA DE JOGO ALINHADA --- */
        main { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .game-container { 
            width: 100%; max-width: 450px; 
            display: flex; flex-direction: column; gap: 10px; 
        }

        /* Linha que alinha bandeira com a caixa */
        .game-row {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }

        .source-slot {
            width: 80px; height: 55px; border: 2px dashed #ccc; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
        }

        .flag-card { 
            width: 80px; height: 55px; background: white; border-radius: 6px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); cursor: grab; touch-action: none;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1px solid #ddd; z-index: 10;
        }
        .flag-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .dropzone { 
            flex: 1; height: 60px; background: #fff; border: 2px dashed #bdc3c7; 
            border-radius: 12px; display: flex; align-items: center; 
            padding: 4px; gap: 8px; transition: 0.3s; position: relative;
        }
        
        .dropzone.correct { background: #eafaf1 !important; border-color: var(--success-color) !important; pointer-events: none; }
        .dropzone.wrong { background: #fdedec; border-color: #e74c3c; }
        .pais-txt { font-weight: 800; font-size: 0.85rem; color: #2c3e50; flex: 1; text-align: center; }

        /* Botão Verificar */
        .btn-check { 
            margin-top: 20px; background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white; border: none; padding: 16px 50px; border-radius: 50px;
            font-weight: 900; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 6px 0 #1e8449, 0 8px 15px rgba(0,0,0,0.2);
            transition: 0.1s;
        }
        .btn-check:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e8449; }

        /* Modais e Certificado */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; z-index: 1000; width: 85%; max-width: 350px; text-align: center; border: 4px solid var(--primary-color); }
        #certificado-container { display: none; flex: 1; align-items: center; justify-content: center; padding: 20px; }
        #certificado { background: #fff; padding: 35px; border: 12px double var(--primary-color); text-align: center; width: 100%; }

        footer { padding: 10px; background: #fff; text-align: center; color: #7f8c8d; font-size: 0.7rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu(false); fecharModais();"></div>
    
    <nav class="side-menu" id="side-menu">
        <h3>Menu Jogos</h3>
        <a href="/jogos/">🏠 Início</a>
        <a href="/jogos/pre/">🎨 Pré-Escolar</a>
        <a href="/jogos/1/">❶ 1º Ano</a>
        <a href="/jogos/2/">❷ 2º Ano</a>
        <a href="/jogos/3/">❸ 3º Ano</a>
        <a href="/jogos/4/">❹ 4º Ano</a>
    </nav>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu(true)">
                <div></div><div></div><div></div>
            </div>
            <img src="imagens/portugal_m.png" style="width:24px; border-radius:2px;" onerror="this.src='https://flagcdn.com/w40/eu.png'">
            <h1>Associa Bandeiras</h1>
        </div>
        <a href="../" class="btn-voltar">⬅ VOLTAR</a>
    </header>

    <main id="game-main">
        <div class="progress-container"><div id="progress-fill"></div></div>
        
        <div class="game-container" id="game-container">
            <!-- Gerado via JavaScript -->
        </div>

        <button class="btn-check" onclick="verificarRonda()">VERIFICAR ✅</button>
    </main>

    <div id="modal-nome" class="modal">
        <h3 style="color:var(--success-color);">Parabéns! 🇪🇺</h3>
        <p style="margin:15px 0;">Completaste o desafio! Escreve o teu nome:</p>
        <input type="text" id="input-nome" placeholder="Teu nome" style="width:90%; padding:12px; margin-bottom:20px; text-align:center; border:2px solid #ddd; border-radius:8px;">
        <button class="btn-check" onclick="gerarCertificado()" style="padding:10px 30px;">GERAR DIPLOMA</button>
    </div>

    <div id="certificado-container">
        <div id="certificado">
            <h2 style="color:var(--primary-color); font-size: 2.5rem;">DIPLOMA</h2>
            <p>Certificamos que</p>
            <div style="font-size:2rem; margin:20px 0; border-bottom:2px solid #333; font-family:serif;" id="display-nome">_________</div>
            <p>Concluiu o desafio de Geografia sobre a <strong>União Europeia</strong>.</p>
            <button class="btn-check" onclick="window.print()" style="margin-top:20px; background:#34495e; box-shadow:0 4px 0 #2c3e50;">IMPRIMIR</button>
        </div>
    </div>

    <footer>Professor Luís - Recursos Digitais Covão</footer>
