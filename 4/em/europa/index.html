<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4º Ano - Associa Bandeiras</title>
    <script src="dados.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        :root {
            --primary: #9b59b6;
            --primary-dark: #8e44ad;
        }

        body {
            background-color: rgba(155, 89, 182, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100dvh; /* Altura dinâmica para telemóveis */
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: #fff; padding: 8px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #ddd; z-index: 100; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        header h1 { font-size: 0.85rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; }

        .btn-voltar {
            text-decoration: none; color: #fff; background: var(--primary);
            font-weight: bold; font-size: 0.7rem; padding: 6px 12px;
            border-radius: 8px; border: 1px solid var(--primary-dark);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -260px; top: 0; width: 260px; height: 100%;
            background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            transition: 0.3s ease; z-index: 200; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: var(--primary); margin-bottom: 10px; border-bottom: 2px solid #f5f5f5; padding-bottom: 5px; }
        .sidebar-item { 
            padding: 10px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; 
            color: #2c3e50; font-weight: 600; text-decoration: none; 
            display: flex; align-items: center; gap: 10px; border-radius: 8px;
        }
        .sidebar-item:hover { background-color: var(--primary); color: #fff; }

        /* CONTEÚDO PRINCIPAL (Flexível) */
        main { 
            flex: 1; padding: 5px; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: center; overflow: hidden;
        }

        .instrucao-topo { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .instrucao-topo h2 { color: #2c3e50; font-size: 1rem; font-weight: 700; }
        .btn-info {
            background: var(--primary); color: #fff; width: 20px; height: 20px;
            border-radius: 50%; border: none; font-weight: bold; font-style: italic;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
        }

        .stats-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 10px; font-weight: 800; color: var(--primary-dark);
        }
        .stat-box { font-size: 0.9rem; min-width: 65px; text-align: center; }

        .stars-container { display: flex; gap: 4px; }
        .star { font-size: 1.4rem; color: transparent; -webkit-text-stroke: 1.5px var(--primary); transition: 0.3s; }
        .star.filled { color: var(--primary); }

        /* TABULEIRO (Reduzido ligeiramente para caber em ecrãs pequenos) */
        #game-board { 
            display: grid; grid-template-columns: 75px 200px; gap: 8px; 
            width: fit-content; align-items: center;
        }
        .flag-slot { width: 70px; height: 50px; border: 2px dashed #ccc; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .flag-card { width: 70px; height: 50px; background: white; border-radius: 6px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: grab; touch-action: none; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #ddd; z-index: 10; }
        .flag-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .dropzone { width: 200px; height: 55px; background: #fff; border: 2px dashed #bdc3c7; border-radius: 10px; display: flex; align-items: center; padding-left: 5px; transition: 0.3s; }
        .dropzone.correct { background: #eafaf1 !important; border-color: #2ecc71 !important; pointer-events: none; }
        .dropzone.wrong { background: #fdedec; border-color: #e74c3c; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .pais-txt { font-weight: 800; font-size: 0.75rem; color: #2c3e50; flex: 1; text-align: center; pointer-events: none; }

        .control-area { margin-top: 10px; flex-shrink: 0; }
        .btn-check { 
            background: var(--primary); color: #fff; border: none; 
            padding: 8px 30px; border-radius: 10px; font-weight: bold; 
            cursor: pointer; font-size: 0.9rem; text-transform: uppercase;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* MODAIS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1000; width: 85%; max-width: 320px; text-align: center; border: 4px solid var(--primary); }
        
        #certificado-container { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background:#fff; z-index:500; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        #certificado { background: #fff; padding: 20px; border: 10px double var(--primary); text-align: center; width: 100%; max-width: 450px; }
