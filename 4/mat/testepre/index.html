<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Pré-Escolar - A Floresta</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #eef9eb;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
        }
        .nav-bar {
            background: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .back-btn {
            background: #56ab2f;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px;
        }
        .game-card {
            background: white;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            border: 4px solid #a8e063;
            transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-10px); }
        .game-img {
            width: 100%;
            height: 180px;
            background: #f0f0f0;
            border-radius: 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        h2 { color: #2d5a27; }
        .play-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: 'Fredoka';
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">⬅ Voltar</a>
        <h1 style="color: #56ab2f; margin: 0;">🌳 Floresta dos Jogos</h1>
        <div style="width: 100px;"></div>
    </div>

    <div class="games-grid">
        <div class="game-card">
            <div class="game-img">🍎</div>
            <h2>Contar Frutas</h2>
            <button class="play-btn">JOGAR</button>
        </div>
        <div class="game-card">
            <div class="game-img">🎨</div>
            <h2>Cores Mágicas</h2>
            <button class="play-btn">JOGAR</button>
        </div>
        <div class="game-card">
            <div class="game-img">🐶</div>
            <h2>Sons Animais</h2>
            <button class="play-btn">JOGAR</button>
        </div>
    </div>

</body>
</html>
