<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Escolar - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-principal: #e691a7;
            --cor-fundo: #fdf2f5;
            --cor-texto: #8a4b5b;
        }

        body {
            background: var(--cor-fundo);
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Header / Nav --- */
        .nav-bar {
            background: white;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: var(--cor-principal);
            padding: 0;
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: var(--cor-principal);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        h1 {
            color: var(--cor-principal);
            margin: 0;
            font-size: 1.5rem;
            text-align: center;
            flex-grow: 1;
        }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 250px;
            height: 100%;
            background: white;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            transition: 0.4s;
            z-index: 1000;
            padding-top: 20px;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 2px solid var(--cor-fundo);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-item {
            display: block;
            padding: 15px 25px;
            color: #555;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 400;
            transition: 0.3s;
            border-left: 5px solid transparent;
        }

        .sidebar-item:hover {
            background: var(--cor-fundo);
            color: var(--cor-principal);
            border-left: 5px solid var(--cor-principal);
        }

        /* Overlay para fechar o menu ao clicar fora */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        /* --- Grid de Jogos --- */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px;
        }

        .game-card {
            background: white;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            border: 4px solid var(--cor-principal);
            transition: 0.3s;
        }

        .game-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 10px 20px rgba(230, 145, 167, 0.2);
        }

        .game-img {
            width: 100%;
            height: 180px;
            background: var(--cor-fundo);
            border-radius: 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        h2 { color: var(--cor-texto); }

        .play-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: 'Fredoka';
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .play-btn:hover { background: #ff6b81; transform: scale(1.05); }

    </style>
</head>
<body>

    <!-- Menu Lateral (Sidebar) -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold; color: var(--cor-principal);">MENU</span>
            <button onclick="toggleMenu()" style="border:none; background:none; cursor:pointer; font-size: 20px;">✕</button>
        </div>
        <a href="/jogos/" class="sidebar-item">🏠 Início</a>
        <a href="/jogos/pre/" class="sidebar-item">🦒 Pré-Escolar</a>
        <a href="/jogos/1/" class="sidebar-item">🐥 1º Ano</a>
        <a href="/jogos/2/" class="sidebar-item">🐢 2º Ano</a>
        <a href="/jogos/3/" class="sidebar-item">🦊 3º Ano</a>
        <a href="/jogos/4/" class="sidebar-item">👨‍🚀 4º Ano</a>
    </div>

    <!-- Navegação Superior -->
    <div class="nav-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        
        <h1>🦒 Jogos da Pré</h1>
        
        <a href="index.html" class="back-btn">Voltar ➡</a>
    </div>

    <!-- Conteúdo Principal -->
    <div class="games-grid">
        <div class="game-card">
            <div class="game-img">🍎</div>
            <h2>Contar Frutas</h2>
            <button class="play-btn">JOGAR</button>
        </div>
        <div class="game-card">
            <div class="game-img">🎨</div>
            <h2>Cores Mágicas</h2>
            <button class="play-btn">JOGAR</button>
        </div>
        <div class="game-card">
            <div class="game-img">🐶</div>
            <h2>Sons Animais</h2>
            <button class="play-btn">JOGAR</button>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>

</body>
</html>
