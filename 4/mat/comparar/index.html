<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compara os Números - Matemática</title>
    <style>
        /* === ESTILOS GLOBAIS === */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(155, 89, 182, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
            color: #2c3e50;
        }

        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; z-index: 100; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 0.85rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        .btn-roxo-3d {
            text-decoration: none; color: #ffffff; background-color: #9b59b6;
            font-weight: bold; font-size: 0.75rem; padding: 10px 18px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
            border: 1px solid #732d91; box-shadow: 0 4px 0 #732d91; cursor: pointer; transition: 0.1s;
        }
        .btn-roxo-3d:active { transform: translateY(3px); box-shadow: 0 0 0 #732d91; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; overflow: hidden; }
        .screen-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 450px; }

        .main-title { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .title-header-row { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        
        .game-main-icon { display: flex; flex-direction: column; align-items: center; line-height: 0.5; color: #9b59b6; }
        .game-main-icon .top-row { display: flex; gap: 1px; font-size: 1.6rem; font-weight: 900; }
        .game-main-icon .bottom-row { font-size: 1.6rem; font-weight: 900; }

        .title-header-row h2 { color: #2c3e50; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; white-space: nowrap; }
        .btn-info-minimal { font-size: 1.8rem; cursor: pointer; border: none; background: none; line-height: 1; }

        /* BARRA DE STATUS - SEM FUNDO */
        .status-bar-line {
            width: 100%; max-width: 450px; display: flex; 
            justify-content: space-between; align-items: center; 
            margin-bottom: 10px; padding: 5px 10px;
        }
        .timer-group { display: flex; align-items: center; gap: 5px; color: #9b59b6; font-weight: 900; font-size: 0.9rem; }
        
        /* ESTRELAS ESTILIZADAS */
        .stars-row { display: flex; gap: 4px; }
        .star-box { font-size: 1.6rem; color: white; -webkit-text-stroke: 1.5px #9b59b6; }
        .star-box.correct { color: #9b59b6; -webkit-text-stroke: 1px #732d91; }
        .star-box.wrong { color: #e74c3c; -webkit-text-stroke: 1px #c0392b; }
        
        .combo-group { font-weight: 800; color: #9b59b6; font-size: 0.85rem; display: flex; align-items: center; gap: 3px; }

        .game-card {
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1); width: 100%;
            display: flex; flex-direction: column; min-height: 310px; justify-content: center;
            border: 1px solid #ddd;
        }

        .category-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .cat-card { border-radius: 15px; padding: 18px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .cat-card span:first-child { font-size: 0.75rem; color: rgba(0,0,0,0.6); }
        .cat-card span:last-child { font-weight: 900; font-size: 1.1rem; color: #2c3e50; }

        .c1 { background: #D1E9FF; box-shadow: 0 4px 0 #A8C9E6; }
        .c2 { background: #D1FFDA; box-shadow: 0 4px 0 #A8E6B6; }
        .c3 { background: #FFF4D1; box-shadow: 0 4px 0 #E6D8A8; }
        .c4 { background: #FFD1D1; box-shadow: 0 4px 0 #E6A8A8; }
        .c5 { background: #EED1FF; box-shadow: 0 4px 0 #CFA8E6; }
        .c6 { background: #D1FFF9; box-shadow: 0 4px 0 #A8E6DF; }
        .c7 { background: #F9FFD1; box-shadow: 0 4px 0 #DFE6A8; }
        .c8 { background: #E2E2E2; box-shadow: 0 4px 0 #BDBDBD; }

        .comparison-layout { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .num-box { font-size: 2.3rem; font-weight: 900; color: #000; flex: 1; text-align: center; }
        .symbol-box { 
            font-size: 2.8rem; font-weight: 900; color: #9b59b6; 
            background: #fdfaff; border: 3px solid #ecdff5; 
            width: 85px; height: 85px; display: flex; align-items: center; justify-content: center; 
            border-radius: 15px;
        }

        .correct-flash { background: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong-flash { background: #e74c3c !important; color: white !important; border-color: #c0392b !important; }

        .btn-grid-symbols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .btn-symbol { font-size: 2rem; padding: 10px; height: 65px; }

        .hidden { display: none !important; }

        /* MODAL FEEDBACK */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 92%; max-width: 350px; }
        .summary-box { background: #fdfaff; border-radius: 15px; padding: 12px; margin: 15px 0; border: 1px dashed #9b59b6; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; font-weight: bold; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <header>
        <div class="header-left"><div style="cursor:pointer; font-size: 1.5rem;" onclick="location.reload()">☰</div><h1>Compara os Números</h1></div>
        <button onclick="handleVoltar()" class="btn-roxo-3d">⬅ Voltar</button>
    </header>

    <main>
        <div class="screen-container">
            <div class="main-title">
                <div class="title-header-row">
                    <div class="game-main-icon"><div class="top-row"><b>></b><b><</b></div><div class="bottom-row"><b>=</b></div></div>
                    <h2 id="view-title-main">Qual é o sinal?</h2>
                    <span class="btn-info-minimal" onclick="openInfo()">💡</span>
                </div>
            </div>

            <div id="game-status" class="status-bar-line hidden">
                <div class="timer-group"><span>⏱️</span><span id="timer-display">00:00</span></div>
                <div class="stars-row" id="stars-row">
                    <span class="star-box">★</span><span class="star-box">★</span><span class="star-box">★</span><span class="star-box">★</span><span class="star-box">★</span>
                </div>
                <div class="combo-group"><span>🔥</span><span id="combo-display">0</span></div>
            </div>
            
            <div class="game-card">
                <div id="menu-categorias" class="category-container">
                    <div class="cat-card c1" onclick="startChallenge(100)"><span>Até</span><span>100</span></div>
                    <div class="cat-card c2" onclick="startChallenge(200)"><span>Até</span><span>200</span></div>
                    <div class="cat-card c3" onclick="startChallenge(400)"><span>Até</span><span>400</span></div>
                    <div class="cat-card c4" onclick="startChallenge(600)"><span>Até</span><span>600</span></div>
                    <div class="cat-card c5" onclick="startChallenge(1000)"><span>Até</span><span>1 000</span></div>
                    <div class="cat-card c6" onclick="startChallenge(10000)"><span>Até</span><span>10 000</span></div>
                    <div class="cat-card c7" onclick="startChallenge(100000)"><span>Até</span><span>100 000</span></div>
                    <div class="cat-card c8" onclick="startChallenge(1000000)"><span>Até</span><span>1 000 000</span></div>
                </div>

                <div id="jogo-container" class="hidden" style="width: 100%; display: flex; flex-direction: column;">
                    <div class="comparison-layout">
                        <div id="num-left" class="num-box">0</div>
                        <div id="symbol-display" class="symbol-box">?</div>
                        <div id="num-right" class="num-box">0</div>
                    </div>
                    <div class="btn-grid-symbols">
                        <button class="btn-roxo-3d btn-symbol" onclick="checkAnswer('<')"><</button>
                        <button class="btn-roxo-3d btn-symbol" onclick="checkAnswer('=')">=</button>
                        <button class="btn-roxo-3d btn-symbol" onclick="checkAnswer('>')">></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SONS -->
    <audio id="snd-correct" src="https://actions.google.com/sounds/v1/ui/beep_short_on.ogg"></audio>
    <audio id="snd-wrong" src="https://actions.google.com/sounds/v1/ui/button_click_error.ogg"></audio>

    <div id="modal-feedback" class="modal">
        <div class="modal-content">
            <h2 id="f-titulo" style="color:#9b59b6">Excelente!</h2>
            <p id="f-texto" style="margin: 10px 0; font-weight: bold;"></p>
            <div class="summary-box">
                <div class="summary-line"><span>Nível 1</span><span id="res-l1"></span></div>
                <div class="summary-line"><span>Nível 2</span><span id="res-l2"></span></div>
                <div class="summary-line"><span>Nível 3</span><span id="res-l3"></span></div>
            </div>
            <button class="btn-roxo-3d" style="width: 100%;" onclick="handleVoltar()">MUDAR CATEGORIA</button>
        </div>
    </div>

    <script>
        let valLeft=0, valRight=0, limiteCat=0, combo=0, nivelAtivo=1, perguntaAtual=0, segs=0, timer, interactable=true;
        let stats={l1:0, l2:0, l3:0}, resultadosNivel=[];

        function handleVoltar() {
            clearInterval(timer);
            document.getElementById('menu-categorias').classList.remove('hidden');
            document.getElementById('jogo-container').classList.add('hidden');
            document.getElementById('game-status').classList.add('hidden');
            document.getElementById('modal-feedback').style.display='none';
        }

        function startChallenge(max) {
            limiteCat=max; nivelAtivo=1; combo=0; segs=0; perguntaAtual=0; stats={l1:0,l2:0,l3:0};
            document.getElementById('menu-categorias').classList.add('hidden');
            document.getElementById('jogo-container').classList.remove('hidden');
            document.getElementById('game-status').classList.remove('hidden');
            clearInterval(timer);
            timer = setInterval(() => { segs++; document.getElementById('timer-display').innerText = Math.floor(segs/60).toString().padStart(2,'0') + ':' + (segs%60).toString().padStart(2,'0'); }, 1000);
            proxima();
        }

        function proxima() {
            if (perguntaAtual === 5) {
                if (nivelAtivo < 3) { nivelAtivo++; perguntaAtual=0; resultadosNivel=[]; proxima(); return; }
                else { finalizar(); return; }
            }
            interactable=true;
            document.getElementById('view-title-main').innerText = "Nível " + nivelAtivo;
            document.getElementById('combo-display').innerText = combo;
            const box = document.getElementById('symbol-display');
            box.innerText="?"; box.className="symbol-box";

            const stars = document.getElementById('stars-row').children;
            for(let i=0; i<5; i++){
                stars[i].className='star-box';
                if(resultadosNivel[i]==='correct') stars[i].classList.add('correct');
                else if(resultadosNivel[i]==='wrong') stars[i].classList.add('wrong');
            }

            let min = (nivelAtivo===1)?1:(nivelAtivo===2?Math.floor(limiteCat/3):1);
            let max = (nivelAtivo===1)?Math.floor(limiteCat/3):limiteCat;
            valLeft = Math.floor(Math.random()*(max-min+1))+min;
            valRight = Math.floor(Math.random()*(max-min+1))+min;
            if(Math.random()<0.2) valRight=valLeft;

            if (nivelAtivo < 3) {
                document.getElementById('num-left').innerText = valLeft.toLocaleString('pt-PT');
                document.getElementById('num-right').innerText = valRight.toLocaleString('pt-PT');
            } else {
                let p1 = Math.floor(Math.random()*valLeft);
                document.getElementById('num-left').innerHTML = `<span style="font-size:1.5rem">${p1}+${valLeft-p1}</span>`;
                document.getElementById('num-right').innerText = valRight.toLocaleString('pt-PT');
            }
        }

        function checkAnswer(choice) {
            if(!interactable) return;
            interactable=false;
            let correct = valLeft<valRight?'<':(valLeft>valRight?'>':'=');
            const box = document.getElementById('symbol-display');
            box.innerText=choice;
            if(choice===correct) {
                combo++; stats['l'+nivelAtivo]++; resultadosNivel.push('correct');
                box.classList.add('correct-flash'); document.getElementById('snd-correct').play();
            } else {
                combo=0; resultadosNivel.push('wrong');
                box.classList.add('wrong-flash'); document.getElementById('snd-wrong').play();
            }
            perguntaAtual++; setTimeout(proxima, 800);
        }

        function finalizar() {
            clearInterval(timer);
            const total = stats.l1 + stats.l2 + stats.l3;
            let msg = "";
            if(total < 7) msg = "Tens que te esforçar mais.";
            else if(total < 11) msg = "Está quase lá.";
            else if(total < 14) msg = "Muito bem, mas acho que consegues fazer melhor.";
            else if(total === 14) msg = "Boa, és um especialista.";
            else msg = "Boa, és um especialista."; // Para 15

            document.getElementById('f-titulo').innerText = total === 15 ? "Incrível!" : "Fim do Jogo";
            document.getElementById('f-texto').innerText = msg;
            
            const fmt = (v) => `<span style="color:#2ecc71">${v}C</span> / <span style="color:#e74c3c">${5-v}E</span>`;
            document.getElementById('res-l1').innerHTML = fmt(stats.l1);
            document.getElementById('res-l2').innerHTML = fmt(stats.l2);
            document.getElementById('res-l3').innerHTML = fmt(stats.l3);
            document.getElementById('modal-feedback').style.display='flex';
        }

        function openInfo() { alert("Compara os dois lados e escolhe o sinal correto!"); }
    </script>
</body>
</html>
