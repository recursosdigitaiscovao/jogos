<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compara os Números - Matemática</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background-color: rgba(155, 89, 182, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; flex-shrink: 0;
        }
        
        .btn-roxo-3d {
            text-decoration: none; color: #ffffff; background-color: #9b59b6;
            font-weight: bold; font-size: 0.75rem; padding: 10px 18px;
            border-radius: 10px; border: 1px solid #732d91; box-shadow: 0 4px 0 #732d91; cursor: pointer;
        }
        .btn-roxo-3d:active { transform: translateY(3px); box-shadow: 0 0 0 #732d91; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .screen-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 450px; }

        .main-title { margin-bottom: 30px; text-align: center; }
        .title-header-row { display: flex; align-items: center; gap: 10px; }
        .title-header-row h2 { color: #2c3e50; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; }

        /* BARRA DE STATUS TRANSPARENTE */
        .status-bar-line {
            width: 100%; display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; padding: 5px 15px; background: transparent; border: none;
        }
        .timer-group, .combo-group { color: #9b59b6; font-weight: 900; font-size: 0.9rem; }
        
        /* ESTRELAS: BRANCO COM BORDA ROXA */
        .stars-row { display: flex; gap: 4px; }
        .star-box { 
            font-size: 1.6rem; color: white; 
            -webkit-text-stroke: 1.5px #9b59b6; 
        }
        .star-box.correct { color: #9b59b6; -webkit-text-stroke: 1px #732d91; }
        .star-box.wrong { color: #e74c3c; -webkit-text-stroke: 1px #c0392b; }

        /* QUADRADO DE JOGO REDONDO */
        .game-card {
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%;
            min-height: 310px; border: 1px solid #ddd;
            display: flex; flex-direction: column; justify-content: center;
        }

        .category-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cat-card { border-radius: 15px; padding: 15px; cursor: pointer; text-align: center; }
        .cat-card span:last-child { font-weight: 900; font-size: 1.1rem; display: block; }

        .c1 { background: #D1E9FF; } .c2 { background: #D1FFDA; } .c3 { background: #FFF4D1; } .c4 { background: #FFD1D1; }
        .c5 { background: #EED1FF; } .c6 { background: #D1FFF9; } .c7 { background: #F9FFD1; } .c8 { background: #E2E2E2; }

        .comparison-layout { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .num-box { font-size: 2.3rem; font-weight: 900; color: #000; flex: 1; text-align: center; }
        .symbol-box { 
            font-size: 2.8rem; font-weight: 900; color: #9b59b6; 
            background: #fdfaff; border: 3px solid #ecdff5; 
            width: 80px; height: 80px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .correct-flash { background: #2ecc71 !important; color: white !important; }
        .wrong-flash { background: #e74c3c !important; color: white !important; }

        .btn-grid-symbols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-symbol { font-size: 2rem; height: 65px; }

        .hidden { display: none !important; }

        /* MODAL FEEDBACK */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 90%; max-width: 350px; }
        .summary-box { background: #fdfaff; border-radius: 15px; padding: 15px; margin: 15px 0; border: 1px dashed #9b59b6; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; color: #9b59b6;">MATEMÁTICA</div>
        <button onclick="handleVoltar()" class="btn-roxo-3d">MENU</button>
    </header>

    <main>
        <div class="screen-container">
            <div class="main-title">
                <div class="title-header-row">
                    <h2 id="view-title-main">Qual é o sinal?</h2>
                </div>
            </div>

            <!-- STATUS BAR TRANSPARENTE -->
            <div id="game-status" class="status-bar-line hidden">
                <div class="timer-group">⏱️ <span id="timer-display">00:00</span></div>
                <div class="stars-row" id="stars-row">
                    <span class="star-box">★</span><span class="star-box">★</span><span class="star-box">★</span><span class="star-box">★</span><span class="star-box">★</span>
                </div>
                <div class="combo-group">🔥 <span id="combo-display">0</span></div>
            </div>
            
            <div class="game-card">
                <div id="menu-categorias" class="category-container">
                    <div class="cat-card c1" onclick="startChallenge(100)"><span>Até</span><span>100</span></div>
                    <div class="cat-card c2" onclick="startChallenge(200)"><span>Até</span><span>200</span></div>
                    <div class="cat-card c3" onclick="startChallenge(400)"><span>Até</span><span>400</span></div>
                    <div class="cat-card c4" onclick="startChallenge(600)"><span>Até</span><span>600</span></div>
                    <div class="cat-card c5" onclick="startChallenge(1000)"><span>Até</span><span>1 000</span></div>
                    <div class="cat-card c6" onclick="startChallenge(10000)"><span>Até</span><span>10 000</span></div>
                    <div class="cat-card c7" onclick="startChallenge(100000)"><span>Até</span><span>100 000</span></div>
                    <div class="cat-card c8" onclick="startChallenge(1000000)"><span>Até</span><span>1 000 000</span></div>
                </div>

                <div id="jogo-container" class="hidden">
                    <div class="comparison-layout">
                        <div id="num-left" class="num-box">0</div>
                        <div id="symbol-display" class="symbol-box">?</div>
                        <div id="num-right" class="num-box">0</div>
                    </div>
                    <div class="btn-grid-symbols">
                        <button class="btn-roxo-3d btn-symbol" onclick="checkAnswer('<')"><</button>
                        <button class="btn-roxo-3d btn-symbol" onclick="checkAnswer('=')">=</button>
                        <button class="btn-roxo-3d btn-symbol" onclick="checkAnswer('>')">></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SONS -->
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <!-- MODAL FEEDBACK -->
    <div id="modal-feedback" class="modal">
        <div class="modal-content">
            <h2 id="f-titulo" style="color:#9b59b6; font-size: 1.5rem;">Fim do Jogo!</h2>
            <p id="f-texto" style="margin: 15px 0; font-size: 1rem; color: #2c3e50; font-weight: bold;"></p>
            
            <div class="summary-box">
                <div class="summary-line"><span>Nível 1:</span><span id="res-l1"></span></div>
                <div class="summary-line"><span>Nível 2:</span><span id="res-l2"></span></div>
                <div class="summary-line"><span>Nível 3:</span><span id="res-l3"></span></div>
            </div>

            <button class="btn-roxo-3d" style="width: 100%;" onclick="handleVoltar()">RECOMEÇAR</button>
        </div>
    </div>

    <script>
        let valLeft, valRight, limiteCat, combo=0, nivelAtivo=1, perguntaAtual=0, segs=0, timer;
        let stats={l1:0, l2:0, l3:0}, resultadosNivel=[];

        function handleVoltar() {
            clearInterval(timer);
            document.getElementById('menu-categorias').classList.remove('hidden');
            document.getElementById('jogo-container').classList.add('hidden');
            document.getElementById('game-status').classList.add('hidden');
            document.getElementById('modal-feedback').style.display = 'none';
            document.getElementById('view-title-main').innerText = "Qual é o sinal?";
        }

        function startChallenge(max) {
            limiteCat=max; nivelAtivo=1; combo=0; segs=0; perguntaAtual=0; stats={l1:0,l2:0,l3:0}; resultadosNivel=[];
            document.getElementById('menu-categorias').classList.add('hidden');
            document.getElementById('jogo-container').classList.remove('hidden');
            document.getElementById('game-status').classList.remove('hidden');
            clearInterval(timer);
            timer = setInterval(() => { 
                segs++; 
                document.getElementById('timer-display').innerText = 
                Math.floor(segs/60).toString().padStart(2,'0') + ':' + (segs%60).toString().padStart(2,'0'); 
            }, 1000);
            proxima();
        }

        function proxima() {
            if (perguntaAtual === 5) {
                if (nivelAtivo < 3) { 
                    nivelAtivo++; perguntaAtual=0; resultadosNivel=[]; proxima(); return; 
                } else { 
                    finalizar(); return; 
                }
            }

            document.getElementById('view-title-main').innerText = "Nível " + nivelAtivo;
            document.getElementById('combo-display').innerText = combo;
            
            const box = document.getElementById('symbol-display');
            box.innerText = "?"; box.className = "symbol-box";

            const stars = document.getElementById('stars-row').children;
            for(let i=0; i<5; i++) {
                stars[i].className = 'star-box';
                if(resultadosNivel[i] === 'correct') stars[i].classList.add('correct');
                if(resultadosNivel[i] === 'wrong') stars[i].classList.add('wrong');
            }

            let min = (nivelAtivo === 1) ? 1 : (nivelAtivo === 2 ? Math.floor(limiteCat/3) : 1);
            let max = (nivelAtivo === 1) ? Math.floor(limiteCat/3) : limiteCat;
            valLeft = Math.floor(Math.random()*(max-min+1)) + min;
            valRight = Math.floor(Math.random()*(max-min+1)) + min;
            if(Math.random() < 0.2) valRight = valLeft;

            if (nivelAtivo < 3) {
                document.getElementById('num-left').innerText = valLeft.toLocaleString('pt-PT');
                document.getElementById('num-right').innerText = valRight.toLocaleString('pt-PT');
            } else {
                let p1 = Math.floor(Math.random() * valLeft);
                document.getElementById('num-left').innerHTML = `<span style="font-size:1.4rem">${p1}+${valLeft-p1}</span>`;
                document.getElementById('num-right').innerText = valRight.toLocaleString('pt-PT');
            }
        }

        function checkAnswer(choice) {
            let correct = valLeft < valRight ? '<' : (valLeft > valRight ? '>' : '=');
            const box = document.getElementById('symbol-display');
            box.innerText = choice;
            
            if (choice === correct) {
                combo++; stats['l'+nivelAtivo]++;
                resultadosNivel.push('correct');
                box.classList.add('correct-flash');
                document.getElementById('snd-correct').play();
            } else {
                combo = 0;
                resultadosNivel.push('wrong');
                box.classList.add('wrong-flash');
                document.getElementById('snd-wrong').play();
            }
            perguntaAtual++;
            setTimeout(proxima, 700);
        }

        function finalizar() {
            clearInterval(timer);
            const total = stats.l1 + stats.l2 + stats.l3;
            let msg = "";
            
            if (total < 7) msg = "Tens que te esforçar mais.";
            else if (total < 11) msg = "Está quase lá.";
            else if (total < 14) msg = "Muito bem, mas acho que consegues fazer melhor.";
            else msg = "Boa, és um especialista.";

            document.getElementById('f-texto').innerText = msg;
            
            const render = (val) => `<span style="color:#2ecc71">${val} Certas</span> / <span style="color:#e74c3c">${5-val} Erradas</span>`;
            document.getElementById('res-l1').innerHTML = render(stats.l1);
            document.getElementById('res-l2').innerHTML = render(stats.l2);
            document.getElementById('res-l3').innerHTML = render(stats.l3);
            
            document.getElementById('modal-feedback').style.display = 'flex';
        }
    </script>
</body>
</html>
