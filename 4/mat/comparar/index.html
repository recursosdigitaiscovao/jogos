<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compara os Números - Matemática</title>
    <style>
        /* === ESTILOS GLOBAIS === */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(155, 89, 182, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
            color: #2c3e50;
        }

        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; z-index: 100; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 0.85rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        .btn-roxo-3d {
            text-decoration: none; color: #ffffff; background-color: #9b59b6;
            font-weight: bold; font-size: 0.75rem; padding: 10px 18px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
            border: 1px solid #732d91; box-shadow: 0 4px 0 #732d91; cursor: pointer; transition: 0.1s;
        }
        .btn-roxo-3d:active { transform: translateY(3px); box-shadow: 0 0 0 #732d91; }

        /* === ÁREA PRINCIPAL === */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; overflow: hidden; }
        .screen-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 450px; }

        /* TÍTULO NO TOPO COM GRANDE ESPAÇO PARA O JOGO */
        .main-title { 
            width: 100%; display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 50px; /* ESPAÇO SOLICITADO */
        }
        .title-header-row { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        
        /* ÍCONE DO JOGO: SINAIS GRANDES E JUNTOS */
        .game-main-icon { display: flex; flex-direction: column; align-items: center; line-height: 0.5; color: #9b59b6; }
        .game-main-icon .top-row { display: flex; gap: 1px; font-size: 1.6rem; font-weight: 900; }
        .game-main-icon .bottom-row { font-size: 1.6rem; font-weight: 900; }

        .title-header-row h2 { color: #2c3e50; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; white-space: nowrap; }
        .btn-info-minimal { font-size: 1.8rem; cursor: pointer; border: none; background: none; line-height: 1; }

        /* BARRA DE STATUS ENCOSTADA AO JOGO */
        .status-bar-line {
            width: 100%; max-width: 450px; display: flex; 
            justify-content: space-between; align-items: center; 
            margin-bottom: 0px; 
            padding: 8px 15px;
            background: rgba(255,255,255,0.6);
            border-radius: 15px 15px 0 0;
            border: 1px solid #eee;
            border-bottom: none;
        }
        .timer-group { display: flex; align-items: center; gap: 5px; color: #9b59b6; font-weight: 900; font-size: 0.9rem; }
        .stars-row { display: flex; gap: 4px; }
        .star-box { font-size: 1.4rem; color: white; -webkit-text-stroke: 1.5px #9b59b6; }
        .star-box.correct { color: #9b59b6; -webkit-text-stroke: 1px #732d91; }
        .star-box.wrong { color: #e74c3c; -webkit-text-stroke: 1px #c0392b; }
        .combo-group { font-weight: 800; color: #9b59b6; font-size: 0.85rem; }

        /* CARTÃO DO JOGO */
        .game-card {
            background: white; padding: 25px; border-radius: 0 0 25px 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1); width: 100%;
            display: flex; flex-direction: column; min-height: 310px; justify-content: center;
            border: 1px solid #eee;
        }

        /* CATEGORIAS PASTEL */
        .category-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .cat-card { border-radius: 15px; padding: 18px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .cat-card span:first-child { font-size: 0.75rem; color: rgba(0,0,0,0.6); }
        .cat-card span:last-child { font-weight: 900; font-size: 1.1rem; color: #2c3e50; }

        .c1 { background: #D1E9FF; box-shadow: 0 4px 0 #A8C9E6; }
        .c2 { background: #D1FFDA; box-shadow: 0 4px 0 #A8E6B6; }
        .c3 { background: #FFF4D1; box-shadow: 0 4px 0 #E6D8A8; }
        .c4 { background: #FFD1D1; box-shadow: 0 4px 0 #E6A8A8; }
        .c5 { background: #EED1FF; box-shadow: 0 4px 0 #CFA8E6; }
        .c6 { background: #D1FFF9; box-shadow: 0 4px 0 #A8E6DF; }
        .c7 { background: #F9FFD1; box-shadow: 0 4px 0 #DFE6A8; }
        .c8 { background: #E2E2E2; box-shadow: 0 4px 0 #BDBDBD; }

        /* ÁREA DE COMPARAÇÃO */
        .comparison-layout { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .num-box { font-size: 2.3rem; font-weight: 900; color: #000; flex: 1; text-align: center; }
        .symbol-box { 
            font-size: 2.8rem; font-weight: 900; color: #9b59b6; 
            background: #fdfaff; border: 3px solid #ecdff5; 
            width: 85px; height: 85px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 15px; transition: 0.1s;
        }

        .correct-flash { background: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong-flash { background: #e74c3c !important; color: white !important; border-color: #c0392b !important; }

        .btn-grid-symbols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .btn-symbol { font-size: 2rem; padding: 10px; height: 65px; }

        .hidden { display: none !important; }

        /* MODAIS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 92%; max-width: 350px; }
        .summary-box { background: #fdfaff; border-radius: 15px; padding: 12px; margin: 15px 0; border: 1px dashed #9b59b6; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 4px; }

        footer { width: 100%; padding: 15px; background: #fff; text-align: center; color: #7f8c8d; border-top: 1px solid #ddd; font-size: 0.8rem; flex-shrink: 0; }
    </style>
</head>

            <h1><span class="header-icon">👨‍🚀</span> Compara os Números</h1>
