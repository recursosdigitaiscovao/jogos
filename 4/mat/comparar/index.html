<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparação de Números - Matemática</title>
    <style>
        /* === ESTILOS GLOBAIS (TEMPLATE RIGOROSO) === */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(155, 89, 182, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; 
            overflow: hidden; 
            color: #2c3e50;
        }

        /* === CABEÇALHO === */
        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; z-index: 100; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 0.9rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        .btn-voltar-3d {
            text-decoration: none; color: #ffffff; background-color: #9b59b6;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #732d91; box-shadow: 0 3px 0 #732d91; 
            cursor: pointer; transition: 0.1s;
        }
        .btn-voltar-3d:active { transform: translateY(3px); box-shadow: 0 0 0 #732d91; }

        /* === SIDEBAR === */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 15px rgba(0,0,0,0.2); }
        .sidebar.active { left: 0; }
        .sidebar-item { text-decoration: none; color: #444; font-weight: bold; padding: 14px; border-radius: 12px; background: #f8f9fa; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; transition: 0.2s; }
        .sidebar-item:hover { background-color: #9b59b6; color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* === ÁREA PRINCIPAL === */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px 0 15px 0; overflow: hidden; }
        .screen-container { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        
        .main-title { text-align: center; flex-shrink: 0; }
        .title-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .title-row h2 { color: #2c3e50; font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .btn-info { background: none; border: none; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; }

        /* PAINEL DE STATUS */
        .stats-panel { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; flex-shrink: 0; }
        .stat-item { display: flex; align-items: center; gap: 5px; font-weight: bold; color: #2c3e50; font-size: 0.9rem; }
        .stars-container { display: flex; gap: 5px; }
        .star-svg { width: 22px; height: 22px; fill: none; stroke: #9b59b6; stroke-width: 2; transition: 0.3s; }
        .star-svg.win { fill: #9b59b6; }
        .star-svg.lose { fill: #e74c3c; stroke: #e74c3c; }

        /* QUADRADO BRANCO */
        .game-card {
            background: white; border-radius: 20px;
            border-bottom: 6px solid #d4d4d4; box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: calc(100% - 20px); max-width: 950px; flex: 1;
            margin-bottom: 5px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden; position: relative;
        }

        /* GRELHA DE CATEGORIAS */
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; height: 100%; padding: 40px; }
        .cat-card {
            background: #fdfaff; border: 2px solid #ecdff5; border-radius: 15px;
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; box-shadow: 0 4px 0 #ecdff5; padding: 15px; height: 100%;
        }
        .cat-card:active { transform: translateY(2px); box-shadow: 0 0 0 #ecdff5; }
        .cat-card span:last-child { font-size: 1.3rem; font-weight: 900; color: #9b59b6; }
