<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Jogos Educativos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #f0f9ff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background: #ffcc00;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-family: 'Fredoka One', cursive;
            color: #d35400;
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
            padding-bottom: 50px;
        }
        .btn-ano {
            text-decoration: none;
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .btn-ano:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        /* Cores e Temas */
        .pre { background: #4caf50; border-bottom: 8px solid #388e3c; }
        .ano1 { background: #2196f3; border-bottom: 8px solid #1976d2; }
        .ano2 { background: #ff9800; border-bottom: 8px solid #f57c00; }
        .ano3 { background: #795548; border-bottom: 8px solid #5d4037; }
        .ano4 { background: #607d8b; border-bottom: 8px solid #455a64; }

        .icon { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Escola Divertida 🎒</h1>
    </header>

    <div class="container">
        <a href="pre-escolar.html" class="btn-ano pre">
            <span class="icon">🌳</span>
            Pré-Escolar
        </a>
        <a href="1ano.html" class="btn-ano ano1">
            <span class="icon">🚀</span>
            1º Ano
        </a>
        <a href="2ano.html" class="btn-ano ano2">
            <span class="icon">🏠</span>
            2º Ano
        </a>
        <a href="3ano.html" class="btn-ano ano3">
            <span class="icon">🗺️</span>
            3º Ano
        </a>
        <a href="4ano.html" class="btn-ano ano4">
            <span class="icon">🤖</span>
            4º Ano
        </a>
    </div>

</body>
</html>
