<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }

        .header {
            width: 100%;
            padding: 15px 0; /* Reduzido para dar espaço aos botões longos */
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 10%;
            border-bottom-right-radius: 50% 10%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #ff4757;
            text-shadow: 2px 2px 0px #ffcccb;
            margin: 0;
            animation: bounce 2s infinite;
        }

        /* Espaço centralizado para os botões */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px;
            width: 95%;
            max-width: 1200px;
            margin: auto; 
            padding: 10px 25px; /* Padding de 25px nas laterais */
            flex: 1;
            align-items: center;
        }

        .card {
            text-decoration: none;
            color: white;
            /* Altura alongada: mínima 140px, preferencial 30% da altura da tela, máxima 250px */
            height: clamp(140px, 30vh, 250px); 
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.8rem, 1.5vw, 1.2rem);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid white;
            text-align: center;
            padding: 15px;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* Ícones maiores */
        .icon { 
            font-size: clamp(3rem, 8vh, 5rem); 
            margin-bottom: 15px; 
        }
        
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            background: white;
            color: #666;
            text-align: center;
            padding: 15px 0;
            font-size: 1rem;
            width: 100%;
            flex-shrink: 0;
            font-weight: normal; /* Texto sem negrito conforme pedido anteriormente */
        }

        /* Ajustes de responsividade */
        @media (max-width: 768px) {
            .grid-container {
                gap: 8px;
                padding: 10px 15px;
            }
            .card {
                height: clamp(120px, 35vh, 200px);
                border-width: 4px;
            }
            .icon {
                font-size: clamp(2.5rem, 7vh, 4rem);
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Mundo dos Jogos 🎮</h1>
        <p style="color: #666; font-size: 1rem; margin-top: 5px;">Escolhe o teu ano e diverte-te!</p>
    </div>

    <div class="grid-container">
        <a href="/jogos/pre/" class="card pre">
            <span class="icon">🦒</span>
            <span>Pré-Escolar</span>
        </a>
        <a href="/jogos/1/" class="card ano1">
            <span class="icon">🐥</span>
            <span>1º Ano</span>
        </a>
        <a href="/jogos/2/" class="card ano2">
            <span class="icon">🐢</span>
            <span>2º Ano</span>
        </a>
        <a href="/jogos/3/" class="card ano3">
            <span class="icon">🦊</span>
            <span>3º Ano</span>
        </a>
        <a href="/jogos/4/" class="card ano4">
            <span class="icon">👨‍🚀</span>
            <span>4º Ano</span>
        </a>
    </div>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
