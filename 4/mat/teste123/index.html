<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>1º Ano - Missão Espacial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0d1b2a;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background: #1b263b;
            width: 100%;
            padding: 20px;
            text-align: center;
            font-family: 'Fredoka One', cursive;
        }
        .btn-voltar {
            position: absolute;
            left: 20px;
            top: 25px;
            color: white;
            text-decoration: none;
            background: #415a77;
            padding: 10px 15px;
            border-radius: 10px;
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 50px;
            width: 80%;
            max-width: 500px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            background: #415a77;
            padding: 25px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            transition: 0.3s;
            border: 3px solid transparent;
        }
        .menu-item:hover {
            background: #778da9;
            border-color: #e0e1dd;
            transform: translateX(10px);
        }
        .icon-m { font-size: 2.5rem; margin-right: 20px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-voltar">⬅ Voltar</a>
        <h1>🚀 Missão 1º Ano</h1>
    </header>

    <div class="menu-container">
        <!-- Estes links podem levar para páginas como '1ano-portugues.html' -->
        <a href="#" class="menu-item">
            <span class="icon-m">📘</span> Português
        </a>
        <a href="#" class="menu-item">
            <span class="icon-m">🔢</span> Matemática
        </a>
        <a href="#" class="menu-item">
            <span class="icon-m">🌍</span> Estudo do Meio
        </a>
    </div>

</body>
</html>
