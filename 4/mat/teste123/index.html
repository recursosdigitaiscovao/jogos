<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Altura fixa para caber no ecrã */
            overflow: hidden; /* Impede o scroll para ver tudo ao mesmo tempo */
        }

        .header {
            width: 100%;
            padding: 20px 0; /* Reduzido para ganhar espaço */
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 10%;
            border-bottom-right-radius: 50% 10%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            flex-shrink: 0; /* Não deixa o header encolher */
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #ff4757;
            text-shadow: 2px 2px 0px #ffcccb;
            margin: 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Container que ocupa o espaço central */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px;
            width: 95%;
            max-width: 1100px;
            margin: auto; /* Centraliza verticalmente no espaço disponível */
            padding: 10px 0;
            flex: 1; /* Ocupa o máximo de espaço entre header e footer */
            align-items: center;
        }

        .card {
            text-decoration: none;
            color: white;
            height: clamp(100px, 20vh, 180px); /* Altura adaptável à altura do ecrã */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.7rem, 1.2vw, 1.1rem);
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 4px solid white;
            text-align: center;
            padding: 5px;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .icon { 
            font-size: clamp(1.8rem, 5vh, 3rem); 
            margin-bottom: 5px; 
        }
        
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            background: white;
            color: #666;
            text-align: center;
            padding: 15px 0;
            font-size: 0.9rem;
            width: 100%;
            flex-shrink: 0; /* Não deixa o footer sumir */
        }

        /* Ajuste para ecrãs pequenos ou telemóveis deitados */
        @media (max-width: 600px) {
            .grid-container {
                gap: 5px;
                width: 98%;
            }
            .card {
                border-width: 2px;
                border-radius: 12px;
            }
            p.subtitle { display: none; } /* Esconde o subtítulo no telemóvel para ganhar espaço */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Mundo dos Jogos 🎮</h1>
        <p class="subtitle" style="color: #666; font-size: 1rem; margin-top: 5px;">Escolhe o teu ano!</p>
    </div>

    <div class="grid-container">
        <a href="/jogos/pre/" class="card pre">
            <span class="icon">🦒</span>
            <span>Pré</span>
        </a>
        <a href="/jogos/1/" class="card ano1">
            <span class="icon">🐥</span>
            <span>1º Ano</span>
        </a>
        <a href="/jogos/2/" class="card ano2">
            <span class="icon">🐢</span>
            <span>2º Ano</span>
        </a>
        <a href="/jogos/3/" class="card ano3">
            <span class="icon">🦊</span>
            <span>3º Ano</span>
        </a>
        <a href="/jogos/4/" class="card ano4">
            <span class="icon">👨‍🚀</span>
            <span>4º Ano</span>
        </a>
    </div>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
