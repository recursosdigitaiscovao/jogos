<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        /* Header e Footer Brancos */
        header, footer {
            background: white;
            width: 100%;
            flex-shrink: 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }

        header {
            padding: 15px 0;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        h1 {
            font-size: clamp(1.4rem, 4vh, 2.2rem);
            color: #ff4757;
            text-shadow: 2px 2px 0px #ffcccb;
            animation: bounce 2s infinite;
        }

        .header-text {
            color: #666;
            font-size: clamp(0.85rem, 2vh, 1rem);
            margin-top: 4px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Área do Main com padding lateral de 25px */
        main {
            flex: 1; 
            display: flex;
            align-items: center; /* Centraliza a grid verticalmente */
            justify-content: center;
            padding: 0 25px; 
        }

        /* Grid com 50% da altura do espaço disponível */
        .grid-container {
            display: grid;
            width: 100%;
            height: 50%; /* Define que a grid ocupa metade da altura do main */
            max-width: 1250px;
            gap: 15px;
            grid-template-columns: repeat(5, 1fr); /* 5 colunas no PC */
        }

        .card {
            text-decoration: none;
            color: white;
            height: 100%; /* Ocupa toda a altura permitida pelos 50% da grid */
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 5px solid white;
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        /* Ícones Grandes */
        .icon { 
            font-size: clamp(2.8rem, 8vh, 5.5rem); 
            margin-bottom: 10px; 
            display: block;
        }
        
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            padding: 15px 0;
            font-size: 1rem;
            color: #777;
            font-weight: normal;
        }

        /* RESPONSIVIDADE PARA TELEMÓVEL */
        @media (max-width: 800px) {
            /* No telemóvel, 50% pode ser pouco para 3 linhas, então ajustamos para 65% */
            .grid-container {
                height: 65%; 
                grid-template-columns: repeat(2, 1fr); /* 2 colunas */
                grid-template-rows: repeat(3, 1fr); /* 3 linhas */
                gap: 10px;
            }

            .card.ano4 {
                grid-column: span 2; /* Astronauta ocupa a base */
            }

            .icon {
                font-size: clamp(2.5rem, 7vh, 4rem);
                margin-bottom: 5px;
            }
        }

        /* Ajuste para ecrãs muito baixos */
        @media (max-height: 500px) {
            .grid-container { height: 80%; }
            .header-text { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🚀 Mundo dos Jogos </h1>
        <p class="header-text">Escolhe o teu ano e diverte-te a aprender!</p>
    </header>

    <main>
        <div class="grid-container">
            <a href="/jogos/pre/" class="card pre">
                <span class="icon">🦒</span>
                <span>Pré-Escolar</span>
            </a>
            <a href="/jogos/1/" class="card ano1">
                <span class="icon">🐥</span>
                <span>1º Ano</span>
            </a>
            <a href="/jogos/2/" class="card ano2">
                <span class="icon">🐢</span>
                <span>2º Ano</span>
            </a>
            <a href="/jogos/3/" class="card ano3">
                <span class="icon">🦊</span>
                <span>3º Ano</span>
            </a>
            <a href="/jogos/4/" class="card ano4">
                <span class="icon">👨‍🚀</span>
                <span>4º Ano</span>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
