<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores solicitadas */
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Garante que o corpo ocupa a altura toda */
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 10%;
            border-bottom-right-radius: 50% 10%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #ff4757;
            text-shadow: 3px 3px 0px #ffcccb;
            margin: 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Container ajustado para 5 colunas na mesma linha */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* Força 5 colunas */
            gap: 15px;
            width: 95%;
            max-width: 1200px;
            margin: 60px auto;
            flex: 1; /* Empurra o footer para baixo */
        }

        .card {
            text-decoration: none;
            color: white;
            height: 180px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid white;
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .icon { 
            font-size: clamp(2.5rem, 4vw, 3.5rem); 
            margin-bottom: 10px; 
        }
        
        /* Cores dos Botões */
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            background: white;
            color: #666;
            text-align: center;
            padding: 20px 0;
            font-size: 1rem;
            width: 100%;
        }

        /* Responsividade para telemóveis */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); /* No telemóvel ajusta para não ficar minúsculo */
                gap: 10px;
                margin: 30px auto;
            }
            .card {
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Mundo dos Jogos 🎮</h1>
        <p style="color: #666; font-size: 1.1rem; margin-top: 10px;">Escolhe o teu ano e diverte-te a aprender!</p>
    </div>

    <div class="grid-container">
        <!-- Links corrigidos conforme pedido -->
        <a href="/jogos/pre/" class="card pre">
            <span class="icon">🦒</span>
            <span>Pré-Escolar</span>
        </a>
        <a href="/jogos/1/" class="card ano1">
            <span class="icon">🐥</span>
            <span>1º Ano</span>
        </a>
        <a href="/jogos/2/" class="card ano2">
            <span class="icon">🐢</span>
            <span>2º Ano</span>
        </a>
        <a href="/jogos/3/" class="card ano3">
            <span class="icon">🦊</span>
            <span>3º Ano</span>
        </a>
        <a href="/jogos/4/" class="card ano4">
            <span class="icon">👨‍🚀</span>
            <span>4º Ano</span>
        </a>
    </div>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
