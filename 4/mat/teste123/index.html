<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Pré-Escolar - Floresta dos Jogos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            background: #e8f5e9;
            font-family: 'Arial', sans-serif;
            margin: 0;
            text-align: center;
        }
        header {
            background: #4caf50;
            color: white;
            padding: 20px;
            font-family: 'Fredoka One', cursive;
        }
        .btn-voltar {
            position: absolute;
            left: 20px;
            top: 25px;
            color: white;
            text-decoration: none;
            background: #2e7d32;
            padding: 10px 15px;
            border-radius: 10px;
        }
        .grid-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .jogo-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            border: 4px solid #81c784;
            transition: 0.3s;
        }
        .jogo-card:hover { transform: scale(1.05); }
        .thumbnail {
            width: 100%;
            height: 150px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-voltar">⬅ Voltar</a>
        <h1>🌳 Floresta do Pré-Escolar</h1>
    </header>

    <div class="grid-jogos">
        <!-- Exemplo de Jogo -->
        <div class="jogo-card">
            <div class="thumbnail">🖼️ Imagem do Jogo</div>
            <h3>Contar Animais</h3>
            <button onclick="alert('Aqui abre o jogo!')">Jogar</button>
        </div>
        
        <div class="jogo-card">
            <div class="thumbnail">🎨 Imagem do Jogo</div>
            <h3>Cores da Natureza</h3>
            <button>Jogar</button>
        </div>
        <!-- Adicionar mais jogos aqui -->
    </div>

</body>
</html>
