<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Estrutura para preencher o ecrã sem scroll */
        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa 100% da altura da janela */
            overflow: hidden; /* Impede scroll global */
        }

        /* Header e Footer Brancos e Fixos */
        header, footer {
            background: white;
            width: 100%;
            flex-shrink: 0; /* Impede que encolham */
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }

        header {
            padding: 15px 0;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #ff4757;
            text-shadow: 2px 2px 0px #ffcccb;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Área Principal que se ajusta */
        main {
            flex: 1; /* Ocupa todo o espaço disponível entre header e footer */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px; /* Padding de 25px nas laterais como pedido */
            overflow-y: auto; /* Se o ecrã for muito pequeno (ex: telemóvel deitado), permite scroll interno */
        }

        /* Grid Responsivo */
        .grid-container {
            display: grid;
            width: 100%;
            max-width: 1200px;
            gap: 15px;
            /* No PC: 5 colunas */
            grid-template-columns: repeat(5, 1fr); 
            padding: 20px 0;
        }

        .card {
            text-decoration: none;
            color: white;
            /* Altura dinâmica para se ajustar ao ecrã */
            height: clamp(130px, 25vh, 300px); 
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.85rem, 1.2vw, 1.2rem);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 5px solid white;
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        /* Ícones Grandes */
        .icon { 
            font-size: clamp(2.5rem, 7vh, 5rem); 
            margin-bottom: 10px; 
            display: block;
        }
        
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            padding: 15px 0;
            font-size: 1rem;
            font-weight: normal; /* Texto sem negrito */
            color: #666;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        /* RESPONSIVIDADE PARA TELEMÓVEL */
        @media (max-width: 850px) {
            .grid-container {
                /* No Telemóvel: 2 colunas */
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px;
            }

            /* Faz com que o 5º botão (Astronauta) ocupe as duas colunas para ficar centrado */
            .card.ano4 {
                grid-column: span 2;
                height: clamp(100px, 15vh, 150px); /* Um pouco mais baixo por ser largo */
            }
            
            h1 { font-size: 1.4rem; }
            .card { height: clamp(120px, 20vh, 200px); }
        }

        /* Ajuste para telemóveis muito pequenos */
        @media (max-width: 400px) {
            main { padding: 0 15px; }
            .grid-container { gap: 8px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🚀 Mundo dos Jogos 🎮</h1>
    </header>

    <main>
        <div class="grid-container">
            <a href="/jogos/pre/" class="card pre">
                <span class="icon">🦒</span>
                <span>Pré-Escolar</span>
            </a>
            <a href="/jogos/1/" class="card ano1">
                <span class="icon">🐥</span>
                <span>1º Ano</span>
            </a>
            <a href="/jogos/2/" class="card ano2">
                <span class="icon">🐢</span>
                <span>2º Ano</span>
            </a>
            <a href="/jogos/3/" class="card ano3">
                <span class="icon">🦊</span>
                <span>3º Ano</span>
            </a>
            <a href="/jogos/4/" class="card ano4">
                <span class="icon">👨‍🚀</span>
                <span>4º Ano</span>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
