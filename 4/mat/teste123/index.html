<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            width: 100%;
            padding: 30px 10px 50px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 10;
        }

        h1 {
            /* white-space: nowrap garante que não quebra linha no telemóvel */
            white-space: nowrap;
            font-size: clamp(1.1rem, 5vh, 2.8rem);
            color: #ff4757;
            text-shadow: 3px 3px 0px #ffcccb;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-text {
            color: #666;
            font-size: clamp(0.8rem, 2vh, 1.1rem);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 0 25px; 
            min-height: 0;
        }

        .grid-container {
            display: grid;
            width: 100%;
            height: 50%; 
            max-width: 1250px;
            gap: 15px;
            grid-template-columns: repeat(5, 1fr); 
        }

        .card {
            text-decoration: none;
            color: white;
            height: 100%; 
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid white;
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .icon { 
            font-size: clamp(3rem, 9vh, 6rem); 
            margin-bottom: 10px; 
            display: block;
        }
        
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            background: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1rem;
            color: #777;
            font-weight: normal; 
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        @media (max-width: 800px) {
            /* Ajuste para o título não quebrar */
            h1 { font-size: clamp(1rem, 5.5vw, 1.5rem); }

            /* Faz os botões subirem no telemóvel */
            main {
                align-items: flex-start; 
                padding-top: 20px; 
            }

            header { 
                padding: 20px 10px 35px 10px; 
                border-bottom-left-radius: 50% 10%;
                border-bottom-right-radius: 50% 10%;
            }

            .grid-container {
                height: 65%; 
                grid-template-columns: repeat(2, 1fr); 
                grid-template-rows: repeat(3, 1fr);
                gap: 10px;
            }

            .card.ano4 {
                grid-column: span 2; 
            }

            .icon {
                font-size: clamp(2.5rem, 8vh, 4rem);
                margin-bottom: 5px;
            }
        }

        @media (max-height: 550px) {
            .header-text { display: none; }
            header { padding: 10px 0 20px 0; }
            .grid-container { height: 75%; }
        }
    </style>
</head>
<body>

    <header>
        <h1><span>🚀</span> Mundo dos Jogos <span>🎮</span></h1>
        <p class="header-text">Escolhe o teu ano e diverte-te a aprender!</p>
    </header>

    <main>
        <div class="grid-container">
            <a href="/jogos/pre/" class="card pre">
                <span class="icon">🦒</span>
                <span>Pré-Escolar</span>
            </a>
            <a href="/jogos/1/" class="card ano1">
                <span class="icon">🐥</span>
                <span>1º Ano</span>
            </a>
            <a href="/jogos/2/" class="card ano2">
                <span class="icon">🐢</span>
                <span>2º Ano</span>
            </a>
            <a href="/jogos/3/" class="card ano3">
                <span class="icon">🦊</span>
                <span>3º Ano</span>
            </a>
            <a href="/jogos/4/" class="card ano4">
                <span class="icon">👨‍🚀</span>
                <span>4º Ano</span>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
