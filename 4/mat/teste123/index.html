<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: #e691a7;
            --ano1: #e6a75a;
            --ano2: #45cfa8;
            --ano3: #5ea2e6;
            --ano4: #8a81e6;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Altura dinâmica para telemóveis */
            overflow: hidden; 
        }

        header, footer {
            background: white;
            width: 100%;
            flex-shrink: 0; /* Impede que encolham */
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }

        header {
            padding: 20px 0;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        h1 {
            font-size: clamp(1.5rem, 5vh, 2.5rem);
            color: #ff4757;
            text-shadow: 2px 2px 0px #ffcccb;
            animation: bounce 2s infinite;
        }

        .header-text {
            color: #666;
            font-size: clamp(0.9rem, 2.5vh, 1.1rem);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Área Principal que ocupa o resto do ecrã */
        main {
            flex: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 25px; /* Padding de 25px nas laterais */
        }

        .grid-container {
            display: grid;
            width: 100%;
            height: 100%; /* Faz o grid ocupar toda a altura do main */
            max-width: 1300px;
            gap: 20px;
            grid-template-columns: repeat(5, 1fr); /* PC: 5 colunas */
            align-items: stretch; /* Estica os botões para preencher a altura */
        }

        .card {
            text-decoration: none;
            color: white;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 2vh, 1.4rem);
            font-weight: bold;
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid white;
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Ícones MUITO MAIORES */
        .icon { 
            font-size: clamp(3.5rem, 10vh, 7rem); 
            margin-bottom: 15px; 
            display: block;
            line-height: 1;
        }
        
        .pre { background-color: var(--pre); }
        .ano1 { background-color: var(--ano1); }
        .ano2 { background-color: var(--ano2); }
        .ano3 { background-color: var(--ano3); }
        .ano4 { background-color: var(--ano4); }

        footer {
            padding: 15px 0;
            font-size: 1.1rem;
            color: #777;
            font-weight: normal;
        }

        /* RESPONSIVIDADE PARA TELEMÓVEL */
        @media (max-width: 800px) {
            header { padding: 15px 0; }
            
            .grid-container {
                grid-template-columns: repeat(2, 1fr); /* 2 colunas */
                grid-template-rows: repeat(3, 1fr); /* 3 linhas para ocupar o ecrã todo */
                gap: 12px;
            }

            /* O 5º botão (Astronauta) ocupa a base inteira */
            .card.ano4 {
                grid-column: span 2;
            }

            .card {
                border-width: 5px;
                padding: 5px;
            }

            .icon {
                font-size: clamp(3rem, 8vh, 5rem);
                margin-bottom: 5px;
            }
        }

        /* Ajuste para ecrãs muito pequenos (ex: iPhone SE ou telemóveis antigos) */
        @media (max-height: 600px) {
            .header-text { display: none; } /* Esconde frase para dar mais espaço aos botões */
            header { padding: 5px 0; }
            .icon { font-size: 2.5rem; }
            .card { border-radius: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🚀 Mundo dos Jogos 🎮</h1>
        <p class="header-text">Escolhe o teu ano e diverte-te a aprender!</p>
    </header>

    <main>
        <div class="grid-container">
            <a href="/jogos/pre/" class="card pre">
                <span class="icon">🦒</span>
                <span>Pré-Escolar</span>
            </a>
            <a href="/jogos/1/" class="card ano1">
                <span class="icon">🐥</span>
                <span>1º Ano</span>
            </a>
            <a href="/jogos/2/" class="card ano2">
                <span class="icon">🐢</span>
                <span>2º Ano</span>
            </a>
            <a href="/jogos/3/" class="card ano3">
                <span class="icon">🦊</span>
                <span>3º Ano</span>
            </a>
            <a href="/jogos/4/" class="card ano4">
                <span class="icon">👨‍🚀</span>
                <span>4º Ano</span>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
