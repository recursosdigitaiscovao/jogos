<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pre: linear-gradient(135deg, #a8e063, #56ab2f);
            --ano1: linear-gradient(135deg, #00c6ff, #0072ff);
            --ano2: linear-gradient(135deg, #f2994a, #f2c94c);
            --ano3: linear-gradient(135deg, #8e44ad, #c33764);
            --ano4: linear-gradient(135deg, #2c3e50, #4ca1af);
        }
        body {
            font-family: 'Fredoka', sans-serif;
            background: #f0faff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .header {
            width: 100%;
            padding: 50px 0;
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 3.5rem;
            color: #ff4757;
            text-shadow: 3px 3px 0px #ffcccb;
            margin: 0;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            margin: 60px 0;
        }
        .card {
            text-decoration: none;
            color: white;
            height: 200px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid white;
        }
        .card:hover {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .card i { font-size: 4rem; margin-bottom: 10px; }
        
        .pre { background: var(--pre); }
        .ano1 { background: var(--ano1); }
        .ano2 { background: var(--ano2); }
        .ano3 { background: var(--ano3); }
        .ano4 { background: var(--ano4); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Mundo dos Jogos 🎮</h1>
        <p style="color: #666; font-size: 1.2rem;">Escolhe o teu ano e diverte-te a aprender!</p>
    </div>

    <div class="grid-container">
        <a href="pre-escolar.html" class="card pre"><span>🌳</span>Pré-Escolar</a>
        <a href="1ano.html" class="card ano1"><span>👨‍🚀</span>1º Ano</a>
        <a href="2ano.html" class="card ano2"><span>🏠</span>2º Ano</a>
        <a href="3ano.html" class="card ano3"><span>🗺️</span>3º Ano</a>
        <a href="4ano.html" class="card ano4"><span>🤖</span>4º Ano</a>
    </div>

</body>
</html>
