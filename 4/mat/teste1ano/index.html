<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contar Objetos - Pré-Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta de Verdes */
            --verde-escuro: #1b4332; /* Cor do Header e Footer */
            --verde-medio: #2d6a4f;
            --verde-principal: #409167;
            --verde-claro: #95d5b2;
            --verde-fundo: #f7fff7;
            --texto-claro: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--verde-fundo);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none;
        }

        /* Header e Footer idênticos */
        header, footer {
            background-color: var(--verde-escuro);
            color: var(--texto-claro);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px; /* Mantém alinhamento com o main */
        }

        .btn-voltar {
            background: var(--verde-medio);
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            border: 2px solid var(--verde-claro);
        }

        .btn-voltar:hover {
            background: var(--verde-principal);
        }

        /* Main com Padding lateral de 25px sempre */
        main {
            flex: 1;
            width: 100%;
            max-width: 1200px; /* Limite para ecrãs grandes */
            margin: 0 auto;
            padding: 40px 25px; /* 25px nas laterais como solicitado */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Quadro do Jogo */
        .quadro {
            width: 100%;
            max-width: 700px;
            min-height: 280px;
            background: white;
            border: 6px solid var(--verde-principal);
            border-radius: 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .objeto {
            font-size: clamp(3rem, 10vw, 5rem); /* Tamanho responsivo */
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Área de Interação */
        #feedback {
            height: 50px;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--verde-escuro);
            text-align: center;
            margin-bottom: 20px;
        }

        .botoes-numeros {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .btn-num {
            width: clamp(60px, 15vw, 85px);
            height: clamp(60px, 15vw, 85px);
            border: none;
            border-radius: 20px;
            background: var(--verde-principal);
            color: white;
            font-size: 2rem;
            font-family: 'Fredoka';
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--verde-escuro);
            transition: 0.1s;
        }

        .btn-num:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--verde-escuro);
        }

        .btn-num:hover {
            background: var(--verde-medio);
        }

        /* Footer */
        footer {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Responsividade Extra */
        @media (max-width: 480px) {
            header h2 { font-size: 1.2rem; }
            .quadro { padding: 15px; min-height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="pre-escolar.html" class="btn-voltar">⬅ VOLTAR</a>
        <h2 style="margin: 0;">Quantos são?</h2>
        <div style="width: 80px;" class="desktop-spacer"></div>
    </header>

    <main>
        <div id="feedback"></div>
        
        <div class="quadro" id="palco">
            <!-- Os objetos aparecem aqui -->
        </div>

        <div class="botoes-numeros">
            <button class="btn-num" onclick="verificar(1)">1</button>
            <button class="btn-num" onclick="verificar(2)">2</button>
            <button class="btn-num" onclick="verificar(3)">3</button>
            <button class="btn-num" onclick="verificar(4)">4</button>
            <button class="btn-num" onclick="verificar(5)">5</button>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

    <script>
        let numeroCorreto = 0;
        const itens = ['🍎', '⚽', '🚗', '🐱', '🍦', '🎁', '🎈'];

        function novoJogo() {
            const palco = document.getElementById('palco');
            const feedback = document.getElementById('feedback');
            palco.innerHTML = '';
            feedback.innerHTML = '';
            
            // Gerar número de 1 a 5
            numeroCorreto = Math.floor(Math.random() * 5) + 1;
            
            // Escolher objeto aleatório
            const emojiFase = itens[Math.floor(Math.random() * itens.length)];

            for (let i = 0; i < numeroCorreto; i++) {
                const div = document.createElement('div');
                div.className = 'objeto';
                div.innerHTML = emojiFase;
                palco.appendChild(div);
            }
        }

        function verificar(n) {
            const feedback = document.getElementById('feedback');
            if (n === numeroCorreto) {
                feedback.innerHTML = '<span style="color: #2d6a4f">Muito bem! 🌟</span>';
                setTimeout(novoJogo, 1500);
            } else {
                feedback.innerHTML = '<span style="color: #d90429">Tenta contar outra vez! 😊</span>';
            }
        }

        // Iniciar ao carregar
        window.onload = novoJogo;
    </script>

</body>
</html>
