<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contar Objetos - Pré-Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0faff;
            --primary: #ff4757;
            --secondary: #2196f3;
            --success: #2ed573;
            --wood: #795548;
            --footer-bg: #2d3436;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none;
        }

        /* Topo */
        .header {
            background: white;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-voltar {
            background: var(--wood);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        /* Área do Jogo */
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .board {
            width: 100%;
            max-width: 600px;
            min-height: 250px;
            background: white;
            border: 8px solid var(--wood);
            border-radius: 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .item {
            font-size: 4rem;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Botões de Números */
        .number-grid {
            display: flex;
            gap: 15px;
        }

        .btn-num {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 15px;
            background: var(--secondary);
            color: white;
            font-size: 2rem;
            font-family: 'Fredoka';
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #1976d2;
            transition: 0.1s;
        }

        .btn-num:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1976d2;
        }

        #message {
            height: 40px;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Rodapé */
        footer {
            background: var(--footer-bg);
            color: white;
            text-align: center;
            padding: 20px 0;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .correct { color: var(--success); }
        .wrong { color: var(--primary); }

    </style>
</head>
<body>

    <div class="header">
        <a href="pre-escolar.html" class="btn-voltar">⬅ Voltar</a>
        <h2 style="margin: 0; color: var(--wood);">Quantos objetos vês?</h2>
        <div style="width: 80px;"></div>
    </div>

    <div class="game-container">
        <div id="message"></div>
        
        <div class="board" id="gameBoard">
            <!-- Os objetos aparecem aqui -->
        </div>

        <div class="number-grid">
            <button class="btn-num" onclick="check(1)">1</button>
            <button class="btn-num" onclick="check(2)">2</button>
            <button class="btn-num" onclick="check(3)">3</button>
            <button class="btn-num" onclick="check(4)">4</button>
            <button class="btn-num" onclick="check(5)">5</button>
        </div>
        
        <button onclick="initGame()" style="margin-top: 30px; padding: 10px 20px; cursor: pointer; border-radius: 10px; border: none; background: #ddd; font-family: 'Fredoka';">Mudar Objetos 🔄</button>
    </div>

    <footer>
        Recursos Digitais Covão
    </footer>

    <script>
        let targetNumber = 0;
        const emojis = ['🍎', '🐻', '🚗', '⚽', '🍦', '🎁', '🐱'];

        function initGame() {
            const board = document.getElementById('gameBoard');
            const message = document.getElementById('message');
            board.innerHTML = '';
            message.innerHTML = '';
            
            // Define um número entre 1 e 5
            targetNumber = Math.floor(Math.random() * 5) + 1;
            
            // Escolhe um emoji aleatório para esta rodada
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];

            // Cria os elementos no quadro
            for (let i = 0; i < targetNumber; i++) {
                const el = document.createElement('div');
                el.className = 'item';
                el.innerHTML = randomEmoji;
                board.appendChild(el);
            }
        }

        function check(n) {
            const message = document.getElementById('message');
            if (n === targetNumber) {
                message.innerHTML = '<span class="correct">Parabéns! Estás certo! 🎉</span>';
                setTimeout(initGame, 2000); // Reinicia após 2 segundos
            } else {
                message.innerHTML = '<span class="wrong">Quase lá! Tenta contar outra vez. 😊</span>';
            }
        }

        // Inicia o jogo assim que a página carrega
        window.onload = initGame;
    </script>

</body>
</html>
