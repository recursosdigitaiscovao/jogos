<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Contar - Pré-Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-suave: #eef9eb;
            --madeira: #795548;
            --madeira-escura: #5d4037;
            --primaria: #ff4757;
            --sucesso: #2ecc71;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--verde-suave);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Barra Superior */
        .top-nav {
            background: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-voltar {
            background: var(--madeira);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            border-bottom: 5px solid var(--madeira-escura);
            transition: 0.2s;
        }

        .btn-voltar:hover { transform: translateY(2px); border-bottom-width: 3px; }

        /* Área do Jogo */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quadro-contagem {
            width: 90%;
            max-width: 800px;
            height: 300px;
            background: white;
            border: 10px solid var(--madeira);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 15px 0 rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        /* Os objetos a contar (Estrelas) */
        .objeto {
            font-size: 5rem;
            animation: aparecer 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes aparecer {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Painel de Números */
        .painel-numeros {
            display: flex;
            gap: 15px;
        }

        .btn-numero {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 20px;
            background: #00c6ff;
            color: white;
            font-size: 2.5rem;
            font-family: 'Fredoka';
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #0072ff;
            transition: 0.1s;
        }

        .btn-numero:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0072ff;
        }

        .btn-numero:hover { background: #33d1ff; }

        /* Mensagem de Feedback */
        #feedback {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
            height: 40px;
        }

        .texto-sucesso { color: var(--sucesso); }
        .texto-erro { color: var(--primaria); }

    </style>
</head>
<body>

    <div class="top-nav">
        <a href="pre-escolar.html" class="btn-voltar">⬅ VOLTAR</a>
        <h1 style="color: var(--madeira); margin: 0;">Quantos são?</h1>
        <div style="width: 100px;"></div>
    </div>

    <div class="game-area">
        <div class="quadro-contagem" id="palco">
            <!-- Objetos aparecem aqui via JS -->
        </div>

        <div id="feedback"></div>

        <div class="painel-numeros">
            <button class="btn-numero" onclick="verificar(1)">1</button>
            <button class="btn-numero" onclick="verificar(2)">2</button>
            <button class="btn-numero" onclick="verificar(3)">3</button>
            <button class="btn-numero" onclick="verificar(4)">4</button>
            <button class="btn-numero" onclick="verificar(5)">5</button>
        </div>
    </div>

    <script>
        let numeroCerto = 0;

        function iniciarJogo() {
            const palco = document.getElementById('palco');
            const feedback = document.getElementById('feedback');
            palco.innerHTML = '';
            feedback.innerHTML = '';
            
            // Gera um número aleatório entre 1 e 5
            numeroCerto = Math.floor(Math.random() * 5) + 1;

            // Adiciona os objetos (Estrelas) ao palco
            for (let i = 0; i < numeroCerto; i++) {
                const obj = document.createElement('div');
                obj.className = 'objeto';
                obj.innerHTML = '⭐'; // Podes mudar para 🍎, 🐻, etc.
                palco.appendChild(obj);
            }
        }

        function verificar(escolha) {
            const feedback = document.getElementById('feedback');
            
            if (escolha === numeroCerto) {
                feedback.innerHTML = '<span class="texto-sucesso">Muito Bem! 🎉</span>';
                // Espera 1.5 segundos e gera novo jogo
                setTimeout(iniciarJogo, 1500);
            } else {
                feedback.innerHTML = '<span class="texto-erro">Tenta outra vez! 🤔</span>';
            }
        }
