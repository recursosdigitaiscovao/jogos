<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo - Pré-Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-floresta: #2d5a27;
            --verde-claro: #a8e063;
            --madeira: #795548;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #eef9eb; /* Fundo suave verde */
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Evita scroll na página do jogo */
        }

        /* Barra Superior */
        .top-nav {
            background: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .btn-voltar {
            background: var(--madeira);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border-bottom: 5px solid #3e2723;
        }

        .btn-voltar:hover {
            transform: scale(1.05);
            background: #5d4037;
        }

        .titulo-jogo {
            color: var(--verde-floresta);
            font-size: 1.8rem;
            margin: 0;
            text-align: center;
            flex-grow: 1;
        }

        /* Área do Jogo */
        .game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Moldura de "Madeira" para o Jogo */
        .moldura {
            width: 95%;
            max-width: 1000px;
            height: 80vh;
            background: #fff;
            border: 12px solid var(--madeira);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Iframe do Jogo (Onde vais meter o link do Wordwall/Genially/etc) */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Decoração de Folhas nos cantos */
        .decor-folha {
            position: absolute;
            font-size: 5rem;
            z-index: 5;
            pointer-events: none; /* Não interfere no clique */
        }
        .folha-1 { top: -10px; left: -10px; transform: rotate(-15deg); }
        .folha-2 { bottom: -10px; right: -10px; transform: rotate(165deg); }

    </style>
</head>
<body>

    <div class="top-nav">
        <a href="pre-escolar.html" class="btn-voltar">⬅ VOLTAR</a>
        <h1 class="titulo-jogo">🍎 Contar as Frutas</h1>
        <div style="width: 120px;"></div> <!-- Equilíbrio visual -->
    </div>

    <div class="game-container">
        <span class="decor-folha folha-1">🍃</span>
        <span class="decor-folha folha-2">🌿</span>
        
        <div class="moldura">
            <!-- SUBSTITUI O SRC PELO LINK DO TEU JOGO -->
            <iframe src="https://wordwall.net/play/embed/12345/678/910" 
                    allowfullscreen></iframe>
        </div>
    </div>

    <!-- Som de clique opcional ou incentivo -->
    <script>
        console.log("Jogo carregado! Diverte-te na floresta.");
    </script>

</body>
</html>
