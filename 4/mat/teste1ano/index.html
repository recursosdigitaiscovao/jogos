<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>1º Ano - Viagem Espacial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            color: white;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 40px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }
        .menu-button {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 100px; /* Estilo comprimido */
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            font-size: 2rem;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .menu-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: #00c6ff;
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-right: 30px;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.5);
        }
        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">⬅ Menu Principal</a>

    <div class="header">
        <h1>👨‍🚀 Missão 1º Ano</h1>
        <p>Escolhe a tua disciplina e começa a aventura!</p>
    </div>

    <div class="container">
        <a href="1ano-portugues.html" class="menu-button">
            <div class="icon-circle">📚</div>
            Português
        </a>
        <a href="1ano-matematica.html" class="menu-button">
            <div class="icon-circle">🔢</div>
            Matemática
        </a>
        <a href="1ano-estudo.html" class="menu-button">
            <div class="icon-circle">🌍</div>
            Estudo do Meio
        </a>
    </div>

</body>
</html>
