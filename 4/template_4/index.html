<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Template de Jogo</title>
    <style>
        /* === ESTILOS GLOBAIS === */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(155, 89, 182, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; 
            overflow: hidden; /* Garante que nada saia do ecrã */
            color: #2c3e50;
        }

        /* === CABEÇALHO === */
        header {
            width: 100%; background: #fff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; z-index: 100; flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 0.9rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        .btn-voltar-3d {
            text-decoration: none; color: #ffffff; background-color: #9b59b6;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #732d91; box-shadow: 0 3px 0 #732d91; 
            cursor: pointer; transition: 0.1s;
        }
        .btn-voltar-3d:active { transform: translateY(3px); box-shadow: 0 0 0 #732d91; }

        /* === SIDEBAR === */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 15px rgba(0,0,0,0.2); }
        .sidebar.active { left: 0; }
        .sidebar-item { text-decoration: none; color: #444; font-weight: bold; padding: 14px; border-radius: 12px; background: #f8f9fa; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .sidebar-item:hover { background-color: #9b59b6; color: #ffffff; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* === ÁREA PRINCIPAL (Puxada 60px para cima via padding reduzido) === */
        main { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; /* Centraliza no espaço restante */
            padding: 10px 5px; /* Espaço mínimo para não encostar no header */
            overflow: hidden; /* Remove scroll interno */
        }
        .screen-container { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: center; }
        
        /* Título e Ícone */
        .main-title { text-align: center; margin-bottom: 5px; }
        .title-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .title-row .game-icon { font-size: 2rem; }
        .title-row h2 { color: #2c3e50; font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        
        /* Botão Lâmpada (Apenas ícone) */
        .btn-info { background: none; border: none; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; }

        /* PAINEL DE STATUS */
        .stats-panel {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 8px; font-size: 0.9rem;
        }
        .stat-item { display: flex; align-items: center; gap: 5px; font-weight: bold; color: #2c3e50; }
        .stars-container { display: flex; gap: 3px; }
        .star-svg { width: 20px; height: 20px; fill: none; stroke: #9b59b6; stroke-width: 2; }
        .star-svg.win { fill: #9b59b6; }
        .star-svg.lose { fill: #e74c3c; stroke: #e74c3c; }

        /* QUADRADO BRANCO (Adaptável sem scroll) */
        .game-card {
            background: white; 
            padding: 20px; 
            border-radius: 20px;
            border-bottom: 6px solid #d4d4d4;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: calc(100% - 10px);
            max-width: 800px;
            /* Altura calculada para nunca fazer scroll: 100vh - header - footer - titulos - margens */
            max-height: calc(100vh - 280px); 
            height: auto;
            min-height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-y: auto; /* Se o conteúdo do jogo em si for gigante, o scroll fica só dentro do card */
        }

        /* MODAIS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; }
        .btn-ready { background: #9b59b6; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; color: white; width: 100%; margin-top: 15px; }

        footer { width: 100%; padding: 10px; background: #fff; text-align: center; color: #7f8c8d; border-top: 1px solid #ddd; font-size: 0.75rem; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom: 15px; color: #2c3e50;">Navegação</h3>
        <nav class="sidebar-menu">
            <a href="/jogos/" class="sidebar-item">🏠 Início</a>
            <a href="/jogos/pre/" class="sidebar-item">🦒 Pré-Escolar</a>
            <a href="/jogos/1/" class="sidebar-item">🐥 1º Ano</a>
            <a href="/jogos/2/" class="sidebar-item">🐢 2º Ano</a>
            <a href="/jogos/3/" class="sidebar-item">🦊 3º Ano</a>
            <a href="/jogos/4/" class="sidebar-item">👨‍🚀 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:10px; border:none; background:#eee; cursor:pointer; font-weight:bold; border-radius:8px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()" style="cursor:pointer; font-size: 1.5rem;">☰</div>
            <h1><span class="header-icon">👨‍🚀</span> Menu Matemática</h1>
        </div>
        <button onclick="handleVoltar()" class="btn-voltar-3d">⬅ Voltar</button>
    </header>

    <main>
        <div class="screen-container">
            
            <div class="main-title">
                <div class="title-row">
                    <span class="game-icon">🎮</span>
                    <h2>Nome do Jogo</h2>
                    <button class="btn-info" onclick="openInfo()">💡</button>
                </div>
                <p style="margin-top: 2px; margin-bottom: 15px; font-weight: bold; color: #555; font-size: 0.9rem;">Instrução inicial do jogo aqui.</p>
            </div>

            <div class="stats-panel">
                <div class="stat-item">⏱️ <span id="timer">00:00</span></div>
                <div class="stars-container">
                    <svg class="star-svg" viewBox="0 0 24 24" id="star-1"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
                    <svg class="star-svg" viewBox="0 0 24 24" id="star-2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
                    <svg class="star-svg" viewBox="0 0 24 24" id="star-3"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
                    <svg class="star-svg" viewBox="0 0 24 24" id="star-4"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
                    <svg class="star-svg" viewBox="0 0 24 24" id="star-5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
                </div>
                <div class="stat-item">Pontos: <span id="score">0</span></div>
            </div>
            
            <div class="game-card" id="game-area">
                <h1 style="color: #9b59b6; font-size: 2rem; margin-bottom: 5px;">JOGO</h1>
                <p style="color: #7f8c8d; font-weight: bold; font-size: 0.9rem;">Sem scroll: tudo visível num único ecrã.</p>
            </div>
        </div>
    </main>

    <div id="modal-info" class="modal">
        <div class="modal-content">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">💡</div>
            <h2 style="color: #8e44ad; margin-bottom: 10px;">Como Jogar</h2>
            <p style="text-align: left; color: #444; font-size: 0.9rem; line-height: 1.4;">Explicação das regras aqui.</p>
            <button class="btn-ready" onclick="closeInfo()">Estou pronto.</button>
        </div>
    </div>

    <footer>Recursos Digitais Covão - Professor Luís</footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function openInfo() { document.getElementById('modal-info').style.display = 'flex'; }
        function closeInfo() { document.getElementById('modal-info').style.display = 'none'; }
        function handleVoltar() { window.location.href = '../'; }
    </script>
</body>
</html>
