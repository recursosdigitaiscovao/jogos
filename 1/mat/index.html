<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Matemática</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ff9f43; /* Laranja Sólido */
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .emoji-principal {
            font-size: 60px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitulo {
            font-size: 1rem;
            margin-bottom: 25px;
            max-width: 450px;
            opacity: 0.9;
        }

        /* Grelha para 3 ou 4 botões lado a lado */
        .menu-jogos {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colunas no telemóvel */
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .btn-jogo {
            background-color: white;
            text-decoration: none;
            font-size: 0.9rem; /* Texto mais pequeno para caber */
            font-weight: bold;
            padding: 15px 5px;
            border-radius: 15px;
            box-shadow: 0 5px 0 #e67e22;
            transition: all 0.2s;
            display: flex;
            flex-direction: column; /* Ícone em cima, texto em baixo */
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #2c3e50;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-jogo span {
            font-size: 1.8rem; /* Ícone em destaque */
        }

        /* Cores nos ícones para ser mais apelativo */
        .soma { color: #27ae60; }
        .subtrair { color: #c0392b; }
        .ligar { color: #2980b9; }

        .btn-jogo:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #e67e22;
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 40px;
            text-decoration: none;
            font-size: 1rem;
            border-bottom: 2px solid white;
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            opacity: 0.8;
            font-size: 0.8rem;
        }

        /* Ajuste para 4 botões em ecrãs ligeiramente maiores ou se preferir no futuro */
        @media (min-width: 400px) {
            .menu-jogos {
                grid-template-columns: repeat(3, 1fr); 
            }
        }

        @media (min-width: 700px) {
            .menu-jogos {
                grid-template-columns: repeat(3, 1fr);
                max-width: 700px;
                gap: 20px;
            }
            .btn-jogo {
                font-size: 1.2rem;
                padding: 25px;
            }
            .btn-jogo span {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🐣</div>
    
    <h1>Matemática</h1>
    <p class="subtitulo">Escolhe o teu desafio favorito:</p>

    <div class="menu-jogos">
        <a href="soma10/" class="btn-jogo">
            <span class="soma">➕</span>
            Somar10
        </a>

        <a href="subtrair10/" class="btn-jogo">
            <span class="subtrair">➖</span>
            Subtrair10
        </a>

        <a href="liga10/" class="btn-jogo">
            <span class="ligar">🔢</span>
            Ligar10
        </a>
    </div>

    <a href="../" class="btn-voltar">
        ⬅ Voltar
    </a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
