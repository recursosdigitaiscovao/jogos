<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Matemática</title>
    <style>
        /* Estilo Base e Reset */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ff9f43; /* Laranja Sólido */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .emoji-principal {
            font-size: clamp(50px, 12vw, 70px);
            margin-bottom: 5px;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitulo {
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            margin-bottom: 30px;
            max-width: 450px;
            opacity: 0.95;
        }

        /* Grelha de Jogos Responsiva */
        .menu-jogos {
            display: grid;
            /* No telemóvel pequeno, os 3 botões ficam lado a lado */
            grid-template-columns: repeat(3, 1fr); 
            gap: clamp(10px, 3vw, 20px);
            width: 100%;
            max-width: 800px;
        }

        .btn-jogo {
            background-color: white;
            text-decoration: none;
            font-size: clamp(0.75rem, 2.5vw, 1.2rem);
            font-weight: bold;
            padding: clamp(12px, 4vw, 30px) 5px;
            border-radius: clamp(15px, 3vw, 20px);
            box-shadow: 0 5px 0 #e67e22;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #2c3e50;
        }

        .btn-jogo span {
            font-size: clamp(1.8rem, 7vw, 3.5rem); /* Ícone fluído */
        }

        /* Cores dos Ícones */
        .soma { color: #27ae60; }
        .subtrair { color: #c0392b; }
        .ligar { color: #2980b9; }

        /* Feedback de Toque/Clique */
        .btn-jogo:active {
            transform: translateY(3px) scale(0.95);
            box-shadow: 0 2px 0 #e67e22;
        }

        @media (hover: hover) {
            .btn-jogo:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 0 #e67e22;
            }
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 40px;
            text-decoration: none;
            font-size: 1rem;
            padding: 8px 20px;
            border: 2px solid white;
            border-radius: 50px;
            transition: background 0.3s;
        }

        .btn-voltar:active {
            background: rgba(255, 255, 255, 0.2);
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        /* Ajuste extra para ecrãs muito estreitos (evita que o texto saia do botão) */
        @media (max-width: 320px) {
            .menu-jogos { gap: 5px; }
            .btn-jogo { padding: 10px 2px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🐣</div>
    
    <h1>Matemática</h1>
    <p class="subtitulo">Escolhe o teu desafio favorito:</p>

    <nav class="menu-jogos">
        <a href="soma10/" class="btn-jogo">
            <span class="soma">➕</span>
            Somar10
        </a>

        <a href="subtrair10/" class="btn-jogo">
            <span class="subtrair">➖</span>
            Subtrair10
        </a>

        <a href="liga10/" class="btn-jogo">
            <span class="ligar">🔢</span>
            Ligar10
        </a>
    </nav>

    <a href="../" class="btn-voltar">⬅ Voltar</a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
