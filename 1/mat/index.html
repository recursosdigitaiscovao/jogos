<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matemática 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e8f9f4;           /* Fundo Esverdeado */
            --primary-color: #45cfa8;    /* Cor dos Títulos */
            --primary-dark: #38a889;      
            --white: #ffffff;
            --text-grey: #5d7082;
            --outer-shadow: 10px 10px 20px #c6d8d3, -10px -10px 20px #ffffff;
            --inner-shadow: inset 4px 4px 8px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; height: 100dvh;
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER */
        header { 
            background: var(--bg-page);
            width: 100%; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center; 
            flex-shrink: 0; 
            z-index: 1000;
            min-height: 100px;
        }

        .header-left { padding: 15px; display: flex; justify-content: center; }
        .hamburger-btn { font-size: 28px; color: var(--primary-color); cursor: pointer; transition: transform 0.2s; }
        .hamburger-btn:hover { transform: scale(1.1); color: var(--primary-dark); }

        .header-center-content { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #header-icon { height: 70px; width: auto; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); }
        
        .header-titles { display: flex; flex-direction: column; line-height: 1; }
        .title-main { color: var(--primary-color); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        .title-sub { color: var(--text-grey); font-weight: 400; font-size: 0.75rem; margin-top: 2px; }

        /* ÁREA CENTRAL */
        main {
            flex: 1; 
            overflow-y: auto; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        .game-wrapper { 
            width: 100%;
            max-width: 1200px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            justify-items: center; 
            padding: 10px 10px 30px 10px;
        }

        .intro-text {
            grid-column: 1 / -1; 
            text-align: center; 
            color: var(--text-grey);
            font-size: 0.8rem; 
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* CARD IGUAL AO MODELO DA IMAGEM */
        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 160px; 
            min-height: 150px;
            border-radius: 25px; /* Cantos arredondados do card */
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            text-decoration: none; 
            padding: 12px; 
            text-align: center;
            transition: all 0.2s ease;
        }
        .game-card:hover { transform: translateY(-5px); }

        /* Caixa interna branca da imagem */
        .card-img-container { 
            background: white;
            width: 100%; 
            height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 12px;
            border-radius: 18px;
            box-shadow: var(--inner-shadow); /* Efeito de profundidade */
        }
        .card-img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        
        .game-card h2 { 
            color: var(--primary-color); /* Texto azul/verde como na imagem */
            font-size: 0.85rem; 
            font-weight: 900; 
            margin-top: auto; 
            padding-bottom: 5px;
        }

        /* FOOTER */
        footer {
            background: var(--bg-page);
            width: 100%;
            padding: 12px;
            text-align: center;
            flex-shrink: 0; 
            border-top: 1px solid rgba(176, 196, 217, 0.3);
            color: var(--text-grey);
            font-weight: 700;
            font-size: 0.7rem;
            z-index: 1000;
        }

        /* MENU HAMBURGUER */
        .menu-dropdown { 
            position: absolute; top: 65px; left: 15px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }

        .menu-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 18px; 
            background: white; border-radius: 15px; box-shadow: 4px 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; min-width: 190px; text-decoration: none; 
            color: var(--text-grey); font-weight: 700; font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .menu-item:hover { 
            background: var(--primary-color); 
            color: white;
        }
        .menu-item img { height: 20px; width: 20px; object-fit: contain; }

        /* BOTÃO VOLTAR - CORREÇÃO HOVER BRANCO */
        .menu-item-voltar { 
            background: var(--primary-color) !important; 
            color: white !important; 
        }
        .menu-item-voltar img { filter: brightness(0) invert(1); } /* Ícone branco inicial */

        .menu-item-voltar:hover { 
            background: white !important; 
            color: var(--primary-color) !important; 
            box-shadow: 4px 4px 15px rgba(0,0,0,0.15);
        }
        .menu-item-voltar:hover img { filter: none; } /* Ícone volta à cor original no fundo branco */

        .menu-divider { height: 1px; background-color: rgba(176, 196, 217, 0.4); margin: 2px 10px; }

        /* DESKTOP AJUSTES */
        @media (min-width: 768px) {
            header { grid-template-columns: 110px 1fr 110px; min-height: 120px; }
            #header-icon { height: 90px; }
            .title-main { font-size: 1.4rem; }
            .game-wrapper { gap: 30px; padding: 20px; }
            .game-card { max-width: 180px; min-height: 170px; }
            .card-img-container { height: 110px; }
            .game-card h2 { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center-content">
            <img id="header-icon" src="" alt="">
            <div class="header-titles">
                <div id="txt-titulo1" class="title-main"></div>
                <div id="txt-titulo2" class="title-main"></div>
                <div id="txt-subtitulo" class="title-sub"></div>
            </div>
        </div>
        <div class="header-right"></div>
    </header>

    <main>
        <div class="game-wrapper" id="gamesGrid">
            <div id="txt-intro" class="intro-text"></div>
        </div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => { 
            const menu = document.getElementById('dropdownMenu');
            if(menu) menu.style.display = 'none'; 
        };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                const menuBox = document.getElementById('dropdownMenu');
                const niveis = [
                    { label: 'Início', key: 'home' },
                    { label: 'Pré-Escolar', key: 'pre' },
                    { label: '1º Ano', key: 'ano1' },
                    { label: '2º Ano', key: 'ano2' },
                    { label: '3º Ano', key: 'ano3' },
                    { label: '4º Ano', key: 'ano4' }
                ];

                niveis.forEach(n => {
                    if(config.links[n.key]) {
                        const a = document.createElement('a');
                        a.className = 'menu-item';
                        a.href = config.links[n.key];
                        a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[n.key]}"><span>${n.label}</span>`;
                        menuBox.appendChild(a);
                    }
                });

                const divider = document.createElement('div');
                divider.className = 'menu-divider';
                menuBox.appendChild(divider);

                const btnVoltar = document.createElement('a');
                btnVoltar.className = 'menu-item menu-item-voltar'; 
                btnVoltar.href = config.links.home; 
                btnVoltar.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu.voltar}"><span>VOLTAR</span>`;
                menuBox.appendChild(btnVoltar);

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
