<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Identifica as Formas</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: #ff9f43; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
            color: #2c3e50;
        }

        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; }
        header h1 { font-size: 1.1rem; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 15px;
            border-radius: 8px; border: 1px solid #e67e22;
            box-shadow: 0 2px 0 #e67e22;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s; z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .instrucao-card {
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 6px 0 #e67e22;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .instrucao-card h2 { font-size: 1.2rem; }
        .instrucao-card span { color: #e67e22; font-weight: 800; }

        /* GRELHA ALINHADA */
        .grelha-formas {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
        }

        .forma-btn {
            background: white;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            border: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .forma-btn:active { transform: scale(0.9); }

        #pop-sucesso {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #2ecc71; color: white; padding: 20px 40px;
            border-radius: 50px; font-size: 2rem; font-weight: bold; z-index: 300;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .show-pop { transform: translate(-50%, -50%) scale(1) !important; }

        footer {
            width: 100%; padding: 10px; background: white;
            text-align: center; color: #7f8c8d; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div id="pop-sucesso">MUITO BEM! ⭐</div>

    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
        </nav>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Identifica as Formas</h1>
        </div>
        <a href="../" class="btn-voltar-3d"><span>⬅</span> SAIR</a>
    </header>

    <main>
        <div class="instrucao-card">
            <h2 id="instrucao">Clica apenas nos <span id="alvo-nome">Quadrados</span></h2>
            <p style="margin-top:5px; font-size: 0.9rem;">Faltam: <strong id="faltam-txt">0</strong></p>
        </div>

        <div class="grelha-formas" id="grelha"></div>
    </main>

    <footer>Recursos Digitais Covão - Professor Luís</footer>

    <script>
        const figuras = [
            { nome: "Quadrados", tipo: "Q", emojis: ["🟦", "🟨", "🟥", "🟩"] },
            { nome: "Círculos", tipo: "C", emojis: ["🔵", "🟡", "🔴", "🟢"] },
            { nome: "Triângulos", tipo: "T", emojis: ["🔺"] }, // O emoji de triângulo é mais limitado em cores padrão
            { nome: "Estrelas", tipo: "E", emojis: ["⭐"] }
        ];

        let alvoAtual;
        let nivel = 1;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function novoJogo() {
            const grelha = document.getElementById('grelha');
            grelha.innerHTML = "";
            
            // Escolhe um alvo aleatório
            alvoAtual = figuras[Math.floor(Math.random() * figuras.length)];
            document.getElementById('alvo-nome').innerText = alvoAtual.nome;

            // Criar lista de formas (16 total na grelha 4x4)
            let totalItens = 16;
            let itensAlvo = 3 + nivel; 
            let listaFinal = [];

            // Adicionar alvos
            for(let i=0; i<itensAlvo; i++) {
                listaFinal.push({ tipo: alvoAtual.tipo, emoji: alvoAtual.emojis[Math.floor(Math.random()*alvoAtual.emojis.length)] });
            }

            // Adicionar distrações
            while(listaFinal.length < totalItens) {
                let distracao = figuras[Math.floor(Math.random() * figuras.length)];
                if(distracao.tipo !== alvoAtual.tipo) {
                    listaFinal.push({ tipo: distracao.tipo, emoji: distracao.emojis[Math.floor(Math.random()*distracao.emojis.length)] });
                }
            }

            // Baralhar a lista
            listaFinal.sort(() => Math.random() - 0.5);

            // Gerar botões
            listaFinal.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'forma-btn';
                btn.innerText = item.emoji;
                btn.onclick = function() {
                    if(item.tipo === alvoAtual.tipo) {
                        this.style.visibility = "hidden";
                        verificarFim();
                    } else {
                        this.style.background = "#ffcccc";
                        setTimeout(() => this.style.background = "white", 300);
                    }
                };
                grelha.appendChild(btn);
            });
            
            atualizarContagem();
        }

        function atualizarContagem() {
            let restantes = 0;
            const botoes = document.querySelectorAll('.forma-btn');
            // Lógica simples para contar quantos do tipo alvo ainda estão visíveis
            // No mundo real compararíamos o conteúdo ou uma propriedade
            // Para simplificar, vamos apenas ver quem falta
            const totalAlvos = 3 + nivel;
            let encontrados = 0;
            document.querySelectorAll('.forma-btn').forEach(b => {
                if(b.style.visibility === "hidden") encontrados++;
            });
            document.getElementById('faltam-txt').innerText = totalAlvos - encontrados;
        }

        function verificarFim() {
            atualizarContagem();
            if(document.getElementById('faltam-txt').innerText == "0") {
                const pop = document.getElementById('pop-sucesso');
                pop.classList.add('show-pop');
                setTimeout(() => {
                    pop.classList.remove('show-pop');
                    nivel = nivel < 5 ? nivel + 1 : 1;
                    novoJogo();
                }, 1200);
            }
        }

        novoJogo();
    </script>
</body>
</html>
