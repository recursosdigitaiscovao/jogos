<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identifica as Formas - 1º Ano</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: rgba(255, 159, 67, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* HEADER */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 8px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        header h1 { font-size: 1.1rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none;
            color: #000000;
            background-color: #ff9f43;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e67e22;
            box-shadow: 0 2px 0 #e67e22;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #ff9f43; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px; margin-bottom: 8px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* JOGO */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 15px;
        }

        #round-indicator {
            font-weight: bold;
            color: #e67e22;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        #instruction-box {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
            background: white;
            padding: 15px;
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid #ff9f43;
        }

        .shapes-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
            justify-items: center;
        }

        /* FORMAS */
        .shape-item { width: 70px; height: 70px; cursor: pointer; transition: 0.2s; }
        .circle { background: #e74c3c; border-radius: 50%; }
        .square { background: #f1c40f; }
        .rectangle { width: 90px; height: 55px; background: #9b59b6; margin: 7px 0; }
        .triangle {
            width: 0; height: 0;
            border-left: 35px solid transparent; border-right: 35px solid transparent;
            border-bottom: 70px solid #2ecc71;
        }
        .pentagon {
            background: #e67e22;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }
        .hexagon {
            background: #34495e;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .selected { opacity: 0.1; pointer-events: none; }

        footer {
            width: 100%; padding: 12px; background-color: #ffffff;
            text-align: center; color: #7f8c8d; border-top: 1px solid #ddd;
            font-size: 0.8rem;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 159, 67, 0.98); z-index: 300;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }

        .btn-modal {
            padding: 15px 40px; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            min-width: 200px;
            margin: 10px;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../../../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../../../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../../../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Identifica as Formas 🐥</h1>
        </div>
        <a href="../" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main>
        <div id="round-indicator">Ronda: <span id="current-round">1</span> / 10</div>
        <div id="instruction-box">Clica em todos os... <br><strong id="target-shape" style="color: #e67e22;">---</strong></div>
        <div class="shapes-container" id="shapes-grid"></div>
    </main>

    <div id="win-modal" class="modal">
        <h1 style="font-size: 3rem;">INCRÍVEL! 🏆</h1>
        <p style="font-size: 1.5rem; margin: 20px;">Completaste as 10 rondas!</p>
        
        <button onclick="location.reload()" class="btn-modal" style="background: white; color: #ff9f43;">REPETIR 🔄</button>
        <a href="../" class="btn-modal" style="background: #2c3e50; color: white;">VOLTAR ⬅</a>
    </div>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        const shapeTypes = [
            { id: 'quadrado', class: 'square' },
            { id: 'retângulo', class: 'rectangle' },
            { id: 'círculo', class: 'circle' },
            { id: 'triângulo', class: 'triangle' },
            { id: 'pentágono', class: 'pentagon' },
            { id: 'hexágono', class: 'hexagon' }
        ];

        let currentRound = 1;
        let shapesToFind = 0;
        let targetId = '';

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function startRound() {
            if (currentRound > 10) {
                document.getElementById('win-modal').style.display = 'flex';
                return;
            }

            document.getElementById('current-round').innerText = currentRound;
            const grid = document.getElementById('shapes-grid');
            grid.innerHTML = '';
            shapesToFind = 0;

            const randomTarget = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
            targetId = randomTarget.id;
            document.getElementById('target-shape').innerText = targetId.toUpperCase() + (targetId.endsWith('o') ? 'S' : 'ES');

            for (let i = 0; i < 9; i++) {
                const randomShape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
                const div = document.createElement('div');
                div.className = `shape-item ${randomShape.class}`;
                
                let isMatch = (targetId === 'retângulo') 
                    ? (randomShape.id === 'retângulo' || randomShape.id === 'quadrado')
                    : (randomShape.id === targetId);

                if (isMatch) shapesToFind++;

                div.onclick = function() {
                    if (isMatch) {
                        this.classList.add('selected');
                        shapesToFind--;
                        if (shapesToFind === 0) {
                            currentRound++;
                            setTimeout(startRound, 600);
                        }
                    } else {
                        this.style.filter = "drop-shadow(0 0 8px red)";
                        setTimeout(() => this.style.filter = "none", 400);
                    }
                };
                grid.appendChild(div);
            }

            if (shapesToFind === 0) startRound();
        }

        startRound();
    </script>
</body>
</html>
