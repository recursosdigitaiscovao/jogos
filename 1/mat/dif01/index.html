<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diferenças Matemáticas - 1º Ano</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        header {
            background-color: #ff9f43;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        header h2 { margin: 0; font-size: 1.1rem; }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            gap: 10px;
        }

        .status-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #ff9f43;
            font-weight: bold;
            color: #ff9f43;
            font-size: 0.9rem;
        }

        .canvas-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
        }

        .image-box {
            position: relative;
            background: #f0f4f8;
            border: 3px solid #ff9f43;
            border-radius: 15px;
            width: 100%;
            height: 35vh; /* Ajuste para caber as duas no ecrã */
            overflow: hidden;
            user-select: none;
        }

        .diff-target {
            position: absolute;
            font-size: 2rem;
            cursor: pointer;
            z-index: 5;
            transition: transform 0.2s;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .static-element {
            position: absolute;
            font-size: 2rem;
            opacity: 0.8;
            pointer-events: none;
        }

        .marker {
            position: absolute;
            width: 35px;
            height: 35px;
            border: 4px solid #e74c3c;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .found { display: block; }

        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .botoes-final {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-final {
            padding: 15px 20px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            cursor: pointer;
        }

        @media (min-width: 700px) {
            .canvas-container { grid-template-columns: 1fr 1fr; }
            .image-box { height: 60vh; }
            header h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h2>🔍 Jogo das Diferenças</h2>
        <a href="../index.html" class="btn-topo">⬅ 1ºAno</a>
    </header>

    <main id="main-content">
        <div class="status-bar">
            <div class="info-box">Nível: <span id="level-txt">1</span></div>
            <div class="info-box">Diferenças: <span id="count">0</span> / <span id="total-txt">5</span></div>
        </div>

        <div id="game-area" class="canvas-container">
            <div class="image-box" id="img-orig"></div>
            <div class="image-box" id="img-diff"></div>
        </div>

        <div id="final-panel">
            <div style="font-size: 4rem;">🏆</div>
            <h1 style="color: #ff9f43;">Mestre da Observação!</h1>
            <p>Completaste todos os níveis com sucesso!</p>
            <div class="botoes-final">
                <button onclick="location.reload()" class="btn-final" style="background:#2ecc71;">Repetir 🔄</button>
                <a href="../index.html" class="btn-final" style="background:#3498db;">Matemática 🧮</a>
            </div>
        </div>
    </main>

    <script>
        const levels = [
            { id: 1, total: 5, 
              orig: [{x:10,y:10,e:'1️⃣'}, {x:70,y:20,e:'🔺'}, {x:40,y:50,e:'🔵'}, {x:15,y:70,e:'📏'}, {x:75,y:70,e:'🖍️'}],
              diff: [{x:10,y:10,e:'2️⃣'}, {x:70,y:20,e:'🟦'}, {x:40,y:50,e:'⭐'}, {x:15,y:70,e:'📐'}, {x:75,y:70,e:'✂️'}]
            },
            { id: 2, total: 7,
              orig: [{x:10,y:10,e:'➕'}, {x:80,y:10,e:'3️⃣'}, {x:45,y:15,e:'🟢'}, {x:10,y:40,e:'📦'}, {x:80,y:45,e:'5️⃣'}, {x:20,y:75,e:'⭕'}, {x:70,y:80,e:'🔢'}],
              diff: [{x:10,y:10,e:'➖'}, {x:80,y:10,e:'9️⃣'}, {x:45,y:15,e:'🟡'}, {x:10,y:40,e:'🎁'}, {x:80,y:45,e:'6️⃣'}, {x:20,y:75,e:'❌'}, {x:70,y:80,e:'🔡'}]
            },
            { id: 3, total: 10,
              orig: [{x:5,y:5,e:'🍎'},{x:45,y:5,e:'7️⃣'},{x:85,y:5,e:'🔷'},{x:10,y:35,e:'⏰'},{x:50,y:40,e:'➕'},{x:85,y:40,e:'0️⃣'},{x:5,y:70,e:'📏'},{x:35,y:75,e:'🎨'},{x:65,y:75,e:'💡'},{x:85,y:80,e:'🪁'}],
              diff: [{x:5,y:5,e:'🍐'},{x:45,y:5,e:'1️⃣'},{x:85,y:5,e:'🔶'},{x:10,y:35,e:'⌚'},{x:50,y:40,e:'✖️'},{x:85,y:40,e:'8️⃣'},{x:5,y:70,e:'📐'},{x:35,y:75,e:'🎭'},{x:65,y:75,e:'🔦'},{x:85,y:80,e:'🎈'}]
            }
        ];

        let currentLevelIndex = 0;
        let foundInLevel = 0;
        const foundState = [];

        function loadLevel() {
            const level = levels[currentLevelIndex];
            foundInLevel = 0;
            foundState.length = 0;
            document.getElementById('level-txt').innerText = level.id;
            document.getElementById('total-txt').innerText = level.total;
            document.getElementById('count').innerText = 0;

            const origBox = document.getElementById('img-orig');
            const diffBox = document.getElementById('img-diff');
            origBox.innerHTML = '';
            diffBox.innerHTML = '';

            level.orig.forEach((item, index) => {
                // Elemento na esquerda (para referência)
                const el = document.createElement('div');
                el.className = 'static-element';
                el.style.left = item.x + '%';
                el.style.top = item.y + '%';
                el.innerText = item.e;
                origBox.appendChild(el);

                // Elemento na direita (o alvo do clique)
                const target = document.createElement('div');
                target.className = 'diff-target';
                target.style.left = level.diff[index].x + '%';
                target.style.top = level.diff[index].y + '%';
                target.innerText = level.diff[index].e;
                
                const marker = document.createElement('div');
                marker.className = 'marker';
                marker.id = 'm-' + index;
                target.appendChild(marker);

                foundState.push(false);
                target.onclick = (e) => markFound(index);
                
                diffBox.appendChild(target);
            });
        }

        function markFound(index) {
            if (foundState[index]) return;
            
            foundState[index] = true;
            foundInLevel++;
            document.getElementById('m-' + index).classList.add('found');
            document.getElementById('count').innerText = foundInLevel;

            if (foundInLevel === levels[currentLevelIndex].total) {
                setTimeout(() => {
                    currentLevelIndex++;
                    if (currentLevelIndex < levels.length) {
                        alert("Boa! Vamos para o próximo nível!");
                        loadLevel();
                    } else {
                        showWin();
                    }
                }, 500);
            }
        }

        function showWin() {
            document.getElementById('game-area').style.display = 'none';
            document.querySelector('.status-bar').style.display = 'none';
            document.getElementById('final-panel').style.display = 'flex';
        }

        loadLevel();
    </script>
</body>
</html>
