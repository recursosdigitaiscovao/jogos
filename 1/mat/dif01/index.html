<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Educativo - 1º Ano</title>
    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.85); /* Transparência controlada */
            --accent: #4CAF50;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container Responsivo */
        .game-container {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            margin: 20px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px; /* Limite para Desktop */
            text-align: center;
            flex-grow: 1;
        }

        .shapes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Lógica: Quadrados também são Retângulos */
        .shape {
            margin: auto;
            transition: transform 0.2s;
        }

        .square {
            width: 80px;
            height: 80px;
            background: #e74c3c;
        }

        .rectangle {
            width: 120px;
            height: 70px;
            background: #3498db;
        }

        footer {
            width: 100%;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Ajustes para ecrãs pequenos */
        @media (max-width: 480px) {
            .game-container { padding: 1rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Vamos Aprender as Formas!</h1>
        <p>Sabias que todo o <strong>quadrado</strong> também é um <strong>retângulo</strong> especial?</p>
        
        <div class="shapes-grid">
            <div class="shape square" title="Sou um quadrado e um retângulo!"></div>
            <div class="shape rectangle" title="Sou um retângulo!"></div>
        </div>
    </div>

    <footer>
        Criado por: [Seu Nome/Criador]
    </footer>

</body>
</html>
