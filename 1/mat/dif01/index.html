<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diferenças Geométricas - 1º Ano</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        header {
            background-color: #ff9f43;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        header h2 { margin: 0; font-size: 1.1rem; }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 10px;
        }

        .status-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 4px 12px;
            border-radius: 20px;
            border: 2px solid #ff9f43;
            font-weight: bold;
            color: #ff9f43;
            font-size: 0.85rem;
        }

        .canvas-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
            max-width: 900px;
            flex-grow: 1;
        }

        .image-section {
            display: flex;
            flex-direction: column;
        }

        .label-imagem {
            font-weight: bold;
            color: #ff9f43;
            font-size: 0.9rem;
            text-align: center;
            background: #fff3e6;
            padding: 3px;
            border-radius: 10px 10px 0 0;
            border: 2px solid #ff9f43;
            border-bottom: none;
        }

        .image-box {
            position: relative;
            background: #fdfdfd;
            border: 3px solid #ff9f43;
            border-radius: 0 0 15px 15px;
            width: 100%;
            height: 33vh;
            overflow: hidden;
            user-select: none;
        }

        .shape {
            position: absolute;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            transition: transform 0.2s;
        }

        .clickable { cursor: pointer; z-index: 10; }

        .marker {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 4px solid #e74c3c;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 20;
        }

        .found { display: block; }

        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .btn-final {
            padding: 15px 25px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            margin: 10px;
        }

        @media (min-width: 700px) {
            .canvas-container { grid-template-columns: 1fr 1fr; }
            .image-box { height: 65vh; }
        }
    </style>
</head>
<body>

    <header>
        <h2>🔍 Geometria das Diferenças</h2>
        <a href="../index.html" class="btn-topo">⬅ 1ºAno</a>
    </header>

    <main>
        <div class="status-bar" id="game-stats">
            <div class="info-box">Nível <span id="level-txt">1</span></div>
            <div class="info-box">Erros: <span id="count">0</span> / <span id="total-txt">5</span></div>
        </div>

        <div id="game-area" class="canvas-container">
            <div class="image-section">
                <div class="label-imagem">Original</div>
                <div class="image-box" id="img-orig"></div>
            </div>
            <div class="image-section">
                <div class="label-imagem">Encontra aqui as diferenças</div>
                <div class="image-box" id="img-diff"></div>
            </div>
        </div>

        <div id="final-panel">
            <div style="font-size: 4rem;">📐</div>
            <h1 style="color: #ff9f43;">Excelente Observador!</h1>
            <p>Conseguiste identificar todas as mudanças nas figuras!</p>
            <div style="display: flex;">
                <button onclick="location.reload()" class="btn-final" style="background:#2ecc71;">Repetir 🔄</button>
                <a href="../index.html" class="btn-final" style="background:#3498db;">Voltar 🧮</a>
            </div>
        </div>
    </main>

    <script>
        // Formas comuns que não mudam (Decoração idêntica)
        const baseShapes = [
            {x:5, y:5, e:'🟦'}, {x:45, y:5, e:'🟡'}, {x:85, y:5, e:'🔺'},
            {x:5, y:30, e:'🟢'}, {x:85, y:30, e:'🟧'}, {x:45, y:85, e:'🔷'},
            {x:5, y:85, e:'🟥'}, {x:85, y:85, e:'🟣'}, {x:25, y:15, e:'⭐'},
            {x:65, y:15, e:'🟡'}, {x:10, y:55, e:'🔺'}, {x:80, y:55, e:'🟦'},
            {x:30, y:40, e:'🟠'}, {x:60, y:40, e:'🟢'}, {x:20, y:70, e:'🟨'}
        ];

        const levels = [
            { id: 1, total: 5, 
              orig: [{x:45,y:30,e:'🟦'}, {x:15,y:45,e:'🔺'}, {x:75,y:45,e:'🟡'}, {x:35,y:65,e:'⭐'}, {x:65,y:65,e:'🟩'}],
              diff: [{x:45,y:30,e:'🟥'}, {x:15,y:45,e:'🟡'}, {x:75,y:45,e:'🔺'}, {x:35,y:65,e:'🔷'}, {x:65,y:65,e:'🟠'}]
            },
            { id: 2, total: 7,
              orig: [{x:45,y:30,e:'🟦'}, {x:15,y:45,e:'🔺'}, {x:75,y:45,e:'🟡'}, {x:35,y:65,e:'⭐'}, {x:65,y:65,e:'🟩'}, {x:50,y:60,e:'🟣'}, {x:40,y:15,e:'🟫'}],
              diff: [{x:45,y:30,e:'🟩'}, {x:15,y:45,e:'⭐'}, {x:75,y:45,e:'🟧'}, {x:35,y:65,e:'🟥'}, {x:65,y:65,e:'🔵'}, {x:50,y:60,e:'🟡'}, {x:40,y:15,e:'🟦'}]
            },
            { id: 3, total: 10,
              orig: [{x:45,y:30,e:'🟦'}, {x:15,y:45,e:'🔺'}, {x:75,y:45,e:'🟡'}, {x:35,y:65,e:'⭐'}, {x:65,y:65,e:'🟩'}, {x:50,y:60,e:'🟣'}, {x:40,y:15,e:'🟫'}, {x:30,y:80,e:'🟡'}, {x:70,y:80,e:'🟦'}, {x:50,y:45,e:'🔺'}],
              diff: [{x:45,y:30,e:'🟡'}, {x:15,y:45,e:'🟦'}, {x:75,y:45,e:'🔺'}, {x:35,y:65,e:'🟥'}, {x:65,y:65,e:'⭐'}, {x:50,y:60,e:'🟢'}, {x:40,y:15,e:'🟧'}, {x:30,y:80,e:'🔺'}, {x:70,y:80,e:'🟡'}, {x:50,y:45,e:'🟦'}]
            }
        ];

        let currentLevelIndex = 0;
        let foundInLevel = 0;
        let foundState = [];

        function loadLevel() {
            const level = levels[currentLevelIndex];
            foundInLevel = 0;
            foundState = new Array(level.total).fill(false);
            
            document.getElementById('level-txt').innerText = level.id;
            document.getElementById('total-txt').innerText = level.total;
            document.getElementById('count').innerText = 0;

            const origBox = document.getElementById('img-orig');
            const diffBox = document.getElementById('img-diff');
            origBox.innerHTML = '';
            diffBox.innerHTML = '';

            // 1. Adicionar as 15 figuras de base (IGUAIS)
            [origBox, diffBox].forEach(box => {
                baseShapes.forEach(s => {
                    const el = document.createElement('div');
                    el.className = 'shape';
                    el.style.left = s.x + '%';
                    el.style.top = s.y + '%';
                    el.innerText = s.e;
                    box.appendChild(el);
                });
            });

            // 2. Adicionar as figuras que mudam (ERROS)
            level.orig.forEach((item, index) => {
                // No original
                const elOrig = document.createElement('div');
                elOrig.className = 'shape';
                elOrig.style.left = item.x + '%';
                elOrig.style.top = item.y + '%';
                elOrig.innerText = item.e;
                origBox.appendChild(elOrig);

                // No diferencial (Clicável)
                const target = document.createElement('div');
                target.className = 'shape clickable';
                target.style.left = level.diff[index].x + '%';
                target.style.top = level.diff[index].y + '%';
                target.innerText = level.diff[index].e;
                
                const marker = document.createElement('div');
                marker.className = 'marker';
                marker.id = 'm-' + index;
                target.appendChild(marker);

                target.onclick = () => markFound(index);
                diffBox.appendChild(target);
            });
        }

        function markFound(index) {
            if (foundState[index]) return;
            foundState[index] = true;
            foundInLevel++;
            document.getElementById('m-' + index).classList.add('found');
            document.getElementById('count').innerText = foundInLevel;

            if (foundInLevel === levels[currentLevelIndex].total) {
                setTimeout(() => {
                    currentLevelIndex++;
                    if (currentLevelIndex < levels.length) {
                        loadLevel();
                    } else {
                        showWin();
                    }
                }, 400);
            }
        }

        function showWin() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('game-stats').style.display = 'none';
            document.getElementById('final-panel').style.display = 'flex';
        }

        loadLevel();
    </script>
</body>
</html>
