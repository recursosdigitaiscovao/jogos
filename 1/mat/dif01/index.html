<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identifica as Formas - 1º Ano</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            /* Laranja Sólido padrão do 1º Ano, sem transparência */
            background-color: #ff9f43; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* HEADER PADRONIZADO */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: #2c3e50;
        }

        header h1 {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 800;
        }

        header .emoji {
            font-size: 1.5rem;
            margin-left: 5px;
        }

        /* BOTÃO VOLTAR 3D NO HEADER */
        .btn-voltar-3d-header {
            text-decoration: none;
            color: #000000;
            background-color: #ff9f43;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e67e22;
            box-shadow: 0 2px 0 #e67e22;
            transition: all 0.1s ease;
        }

        .btn-voltar-3d-header:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #e67e22;
        }

        /* BOTÃO VOLTAR NO FIM DO JOGO */
        .btn-voltar-fim {
            display: none;
            margin-top: 20px;
            text-decoration: none;
            color: #ffffff;
            background-color: #2c3e50;
            font-weight: bold;
            font-size: 1rem;
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid #1a252f;
            box-shadow: 0 4px 0 #1a252f;
            transition: all 0.1s ease;
        }

        .btn-voltar-fim:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a252f;
        }

        /* SIDEBAR - LINKS (Recuando para a raiz) */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar h3 { 
            color: #2c3e50; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            border-bottom: 2px solid #ff9f43; 
        }

        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }

        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px;
        }

        .sidebar-item:hover { background: #ff9f43; color: white; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA PRINCIPAL COM CARD BRANCO */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-menu {
            background-color: #ffffff;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        h2 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .subtitulo {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .menu-jogos {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px;
            width: 100%;
        }

        .btn-jogo {
            background-color: #f8f9fa;
            text-decoration: none;
            color: #2c3e50;
            padding: 20px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .btn-jogo span {
            font-size: 2.2rem;
        }

        .btn-jogo:active {
            transform: scale(0.95);
            background-color: #e9ecef;
            border-color: #ff9f43;
        }

        /* FOOTER */
        footer {
            width: 100%;
            padding: 15px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        @media (max-width: 380px) {
            h2 { font-size: 1.5rem; }
            .btn-jogo span { font-size: 1.8rem; }
            .btn-jogo { font-size: 0.75rem; padding: 15px 5px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Identifica as Formas<span class="emoji">🐥</span></h1>
        </div>
        <a href="../" class="btn-voltar-3d-header">
            <span>⬅</span> 1º ANO
        </a>
    </header>

    <main>
        <div class="card-menu">
            <h2>Desafios</h2>
            <p class="subtitulo">Escolhe o teu jogo favorito:</p>

            <nav class="menu-jogos">
                <a href="soma10/" class="btn-jogo">
                    <span style="color: #27ae60;">➕</span>
                    Somar10
                </a>

                <a href="subtrair10/" class="btn-jogo">
                    <span style="color: #e74c3c;">➖</span>
                    Subtrair10
                </a>

                <a href="liga10/" class="btn-jogo">
                    <span style="color: #2980b9;">🔢</span>
                    Ligar10
                </a>
            </nav>

            <a href="../" class="btn-voltar-fim" id="btn-voltar-fim">
                <span>⬅</span> VOLTAR
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Função para mostrar o botão voltar no fim do jogo (para ser chamada pela lógica do jogo)
        function mostrarBotaoVoltar() {
            document.getElementById('btn-voltar-fim').style.display = 'block';
        }
    </script>
</body>
</html>
