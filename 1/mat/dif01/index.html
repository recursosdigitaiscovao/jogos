<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Identifica as Formas</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            /* Fundo Laranja com Transparência (RGBA) como no Soma10 */
            background-color: rgba(255, 159, 67, 0.8); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
            color: #2c3e50;
        }

        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; }
        header h1 { font-size: 1.1rem; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 15px;
            border-radius: 8px; border: 1px solid #e67e22;
            box-shadow: 0 2px 0 #e67e22;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            justify-content: flex-start;
        }

        .instrucao-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }

        /* GRELHA DE 12 IMAGENS (3 colunas x 4 linhas) */
        .grelha-formas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
            padding: 10px;
        }

        .forma-container {
            background: white;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: none;
            overflow: hidden;
        }

        /* Variação de tamanhos */
        .tam-pequeno { font-size: 1.8rem; }
        .tam-medio { font-size: 2.8rem; }
        .tam-grande { font-size: 3.8rem; }

        #pop-sucesso {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #2ecc71; color: white; padding: 20px 40px;
            border-radius: 50px; font-size: 2rem; font-weight: bold; z-index: 300;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .show-pop { transform: translate(-50%, -50%) scale(1) !important; }

        footer {
            width: 100%; padding: 12px; background: white;
            text-align: center; color: #7f8c8d; font-size: 0.85rem;
            border-top: 1px solid #ddd; flex-shrink: 0;
        }

        /* Responsividade para ecrãs muito pequenos */
        @media (max-width: 350px) {
            .grelha-formas { gap: 10px; }
            .tam-grande { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="pop-sucesso">BOA! ⭐</div>

    <header>
        <div class="header-left">
            <span class="menu-icon">🐥</span>
            <h1>Identifica as Formas</h1>
        </div>
        <a href="../" class="btn-voltar-3d">SAIR</a>
    </header>

    <main>
        <div class="instrucao-card">
            <h2>Clica nos <span id="alvo-nome" style="color:#e67e22">...</span></h2>
            <p>Faltam encontrar: <strong id="faltam-txt">0</strong></p>
        </div>

        <div class="grelha-formas" id="grelha"></div>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        const formasConfig = [
            { nome: "Quadrados", tipo: "Q", emojis: ["🟦", "🟨", "🟥", "🟩"] },
            { nome: "Círculos", tipo: "C", emojis: ["🔵", "🟡", "🔴", "🟢"] },
            { nome: "Triângulos", tipo: "T", emojis: ["🔺"] },
            { nome: "Retângulos", tipo: "R", emojis: ["▮", "▬"] }, // Representação de retângulos
            { nome: "Estrelas", tipo: "E", emojis: ["⭐"] }
        ];

        const tamanhos = ["tam-pequeno", "tam-medio", "tam-grande"];
        let alvoAtual;

        function novoJogo() {
            const grelha = document.getElementById('grelha');
            grelha.innerHTML = "";
            
            // Escolhe alvo aleatório
            alvoAtual = formasConfig[Math.floor(Math.random() * formasConfig.length)];
            document.getElementById('alvo-nome').innerText = alvoAtual.nome;

            let totalItens = 12; // Apenas 12 imagens como pedido
            let itensAlvo = 3; 
            let listaFinal = [];

            // Adicionar alvos
            for(let i=0; i<itensAlvo; i++) {
                listaFinal.push({ 
                    tipo: alvoAtual.tipo, 
                    emoji: alvoAtual.emojis[Math.floor(Math.random()*alvoAtual.emojis.length)],
                    tamanho: tamanhos[Math.floor(Math.random()*tamanhos.length)]
                });
            }

            // Adicionar distrações
            while(listaFinal.length < totalItens) {
                let distracao = formasConfig[Math.floor(Math.random() * formasConfig.length)];
                if(distracao.tipo !== alvoAtual.tipo) {
                    listaFinal.push({ 
                        tipo: distracao.tipo, 
                        emoji: distracao.emojis[Math.floor(Math.random()*distracao.emojis.length)],
                        tamanho: tamanhos[Math.floor(Math.random()*tamanhos.length)]
                    });
                }
            }

            listaFinal.sort(() => Math.random() - 0.5);

            listaFinal.forEach(item => {
                const btn = document.createElement('div');
                btn.className = `forma-container ${item.tamanho}`;
                btn.innerText = item.emoji;
                btn.onclick = function() {
                    if(item.tipo === alvoAtual.tipo) {
                        this.style.visibility = "hidden";
                        verificarFim();
                    } else {
                        this.style.background = "#ffcccc";
                        setTimeout(() => this.style.background = "white", 300);
                    }
                };
                grelha.appendChild(btn);
            });
            
            atualizarContagem();
        }

        function atualizarContagem() {
            let visiveis = 0;
            const containers = document.querySelectorAll('.forma-container');
            // Como as formas desaparecem, contamos apenas as que ainda estão lá e são do tipo alvo
            // Para simplificar, usamos o texto da instrução
            const itensRestantes = Array.from(document.querySelectorAll('.forma-container'))
                .filter(b => b.style.visibility !== "hidden" && b.innerText.match) // Lógica simplificada
            
            // Recontagem real baseada na visibilidade para o aluno
            let faltaEncontrar = 0;
            // Aqui uma lógica interna para o contador
            const totalAlvosIniciais = 3;
            let escondidos = 0;
            document.querySelectorAll('.forma-container').forEach(b => {
                if(b.style.visibility === "hidden") escondidos++;
            });
            
            document.getElementById('faltam-txt').innerText = totalAlvosIniciais - escondidos;
        }

        function verificarFim() {
            atualizarContagem();
            if(document.getElementById('faltam-txt').innerText == "0") {
                const pop = document.getElementById('pop-sucesso');
                pop.classList.add('show-pop');
                setTimeout(() => {
                    pop.classList.remove('show-pop');
                    novoJogo();
                }, 1200);
            }
        }

        novoJogo();
    </script>
</body>
</html>
