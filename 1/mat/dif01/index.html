<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diferenças Geométricas - 1º Ano</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        header {
            background-color: #ff9f43;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        header h2 { margin: 0; font-size: 1.1rem; }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 10px;
        }

        .status-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 4px 12px;
            border-radius: 20px;
            border: 2px solid #ff9f43;
            font-weight: bold;
            color: #ff9f43;
            font-size: 0.85rem;
        }

        .canvas-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            width: 100%;
            max-width: 900px;
            flex-grow: 1;
        }

        .image-section {
            display: flex;
            flex-direction: column;
        }

        .label-imagem {
            font-weight: bold;
            color: #ff9f43;
            font-size: 0.9rem;
            text-align: center;
            background: #fff3e6;
            padding: 3px;
            border-radius: 10px 10px 0 0;
            border: 1px solid #ff9f43;
            border-bottom: none;
        }

        .image-box {
            position: relative;
            background: #ffffff;
            border: 3px solid #ff9f43;
            border-radius: 0 0 15px 15px;
            width: 100%;
            height: 32vh;
            overflow: hidden;
            user-select: none;
        }

        /* Formas Geométricas de Fundo */
        .bg-shape {
            position: absolute;
            opacity: 0.15;
            pointer-events: none;
        }

        .math-item {
            position: absolute;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            z-index: 5;
        }

        .diff-target {
            cursor: pointer;
            z-index: 10;
        }

        .marker {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #e74c3c;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 20;
        }

        .found { display: block; }

        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: center;
            height: 100%;
        }

        .btn-final {
            padding: 15px 25px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            margin: 10px;
            font-size: 1.1rem;
        }

        @media (min-width: 700px) {
            .canvas-container { grid-template-columns: 1fr 1fr; }
            .image-box { height: 62vh; }
            header h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h2>🔍 Jogo das Diferenças</h2>
        <a href="../index.html" class="btn-topo">⬅ 1ºAno</a>
    </header>

    <main id="main-content">
        <div class="status-bar" id="game-stats">
            <div class="info-box">Nível <span id="level-txt">1</span></div>
            <div class="info-box">Diferenças: <span id="count">0</span> / <span id="total-txt">5</span></div>
        </div>

        <div id="game-area" class="canvas-container">
            <div class="image-section">
                <div class="label-imagem">Original</div>
                <div class="image-box" id="img-orig"></div>
            </div>
            <div class="image-section">
                <div class="label-imagem">Encontra aqui as diferenças</div>
                <div class="image-box" id="img-diff"></div>
            </div>
        </div>

        <div id="final-panel">
            <div style="font-size: 5rem;">🥳</div>
            <h1 style="color: #ff9f43; margin:10px; font-size: 2.5rem;">Incrível!</h1>
            <p style="font-size: 1.2rem;">Encontraste todos os erros matemáticos!</p>
            <div style="display: flex;">
                <button onclick="location.reload()" class="btn-final" style="background:#2ecc71;">Repetir 🔄</button>
                <a href="../index.html" class="btn-final" style="background:#3498db;">Matemática 🧮</a>
            </div>
        </div>
    </main>

    <script>
        // Configuração dos Níveis
        const levels = [
            { id: 1, total: 5, 
              orig: [{x:15,y:15,e:'1️⃣'}, {x:75,y:25,e:'🔺'}, {x:45,y:55,e:'🔵'}, {x:20,y:75,e:'📏'}, {x:80,y:75,e:'🖍️'}],
              diff: [{x:15,y:15,e:'2️⃣'}, {x:75,y:25,e:'🟦'}, {x:45,y:55,e:'⭐'}, {x:20,y:75,e:'📐'}, {x:80,y:75,e:'✂️'}]
            },
            { id: 2, total: 7,
              orig: [{x:10,y:15,e:'➕'}, {x:80,y:10,e:'3️⃣'}, {x:45,y:15,e:'🟢'}, {x:10,y:40,e:'📦'}, {x:85,y:45,e:'5️⃣'}, {x:25,y:75,e:'⭕'}, {x:70,y:80,e:'🔢'}],
              diff: [{x:10,y:15,e:'➖'}, {x:80,y:10,e:'9️⃣'}, {x:45,y:15,e:'🟡'}, {x:10,y:40,e:'🎁'}, {x:85,y:45,e:'6️⃣'}, {x:25,y:75,e:'❌'}, {x:70,y:80,e:'🔡'}]
            },
            { id: 3, total: 10,
              orig: [{x:5,y:10,e:'🍎'},{x:45,y:8,e:'7️⃣'},{x:85,y:10,e:'🔷'},{x:15,y:35,e:'⏰'},{x:55,y:40,e:'➕'},{x:85,y:45,e:'0️⃣'},{x:8,y:70,e:'📏'},{x:35,y:80,e:'🎨'},{x:65,y:75,e:'💡'},{x:88,y:82,e:'🪁'}],
              diff: [{x:5,y:10,e:'🍐'},{x:45,y:8,e:'1️⃣'},{x:85,y:10,e:'🔶'},{x:15,y:35,e:'⌚'},{x:55,y:40,e:'✖️'},{x:85,y:45,e:'8️⃣'},{x:8,y:70,e:'📐'},{x:35,y:80,e:'🎭'},{x:65,y:75,e:'🔦'},{x:88,y:82,e:'🎈'}]
            }
        ];

        let currentLevelIndex = 0;
        let foundInLevel = 0;
        let foundState = [];

        function createBackground(box) {
            const colors = ['#ff9f43', '#2ecc71', '#3498db', '#e74c3c', '#9b59b6', '#f1c40f'];
            const shapes = ['50%', '0%', '20%']; // Círculo, Quadrado, Arredondado
            
            for (let i = 0; i < 15; i++) {
                const shape = document.createElement('div');
                shape.className = 'bg-shape';
                const size = Math.random() * 40 + 20;
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                shape.style.left = Math.random() * 90 + '%';
                shape.style.top = Math.random() * 90 + '%';
                shape.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                shape.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                shape.style.transform = `rotate(${Math.random() * 360}deg)`;
                box.appendChild(shape);
            }
        }

        function loadLevel() {
            const level = levels[currentLevelIndex];
            foundInLevel = 0;
            foundState = new Array(level.total).fill(false);
            
            document.getElementById('level-txt').innerText = level.id;
            document.getElementById('total-txt').innerText = level.total;
            document.getElementById('count').innerText = 0;

            const origBox = document.getElementById('img-orig');
            const diffBox = document.getElementById('img-diff');
            origBox.innerHTML = '';
            diffBox.innerHTML = '';

            // Gerar o mesmo fundo geométrico para ambos
            const seed = Math.random(); // Para garantir que o fundo seja igual nos dois lados
            createBackground(origBox);
            createBackground(diffBox);

            // Adicionar os elementos do jogo
            level.orig.forEach((item, index) => {
                // No original
                const elOrig = document.createElement('div');
                elOrig.className = 'math-item';
                elOrig.style.left = item.x + '%';
                elOrig.style.top = item.y + '%';
                elOrig.innerText = item.e;
                origBox.appendChild(elOrig);

                // No diferencial
                const target = document.createElement('div');
                target.className = 'math-item diff-target';
                target.style.left = level.diff[index].x + '%';
                target.style.top = level.diff[index].y + '%';
                target.innerText = level.diff[index].e;
                
                const marker = document.createElement('div');
                marker.className = 'marker';
                marker.id = 'm-' + index;
                target.appendChild(marker);

                target.onclick = () => markFound(index);
                diffBox.appendChild(target);
            });
        }

        function markFound(index) {
            if (foundState[index]) return;
            
            foundState[index] = true;
            foundInLevel++;
            document.getElementById('m-' + index).classList.add('found');
            document.getElementById('count').innerText = foundInLevel;

            if (foundInLevel === levels[currentLevelIndex].total) {
                setTimeout(() => {
                    currentLevelIndex++;
                    if (currentLevelIndex < levels.length) {
                        loadLevel();
                    } else {
                        showWin();
                    }
                }, 400);
            }
        }

        function showWin() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('game-stats').style.display = 'none';
            document.getElementById('final-panel').style.display = 'flex';
        }

        loadLevel();
    </script>
</body>
</html>
