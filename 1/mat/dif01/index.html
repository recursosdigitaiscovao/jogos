<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Geometria</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: #ff9f43; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
            color: #2c3e50;
        }

        /* HEADER PADRONIZADO */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        header h1 { font-size: 1.1rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 15px;
            border-radius: 8px; display: flex; align-items: center; gap: 8px;
            border: 1px solid #e67e22; box-shadow: 0 2px 0 #e67e22;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s; z-index: 200; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DE JOGO */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        .instrucao-card {
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 0 #e67e22;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .instrucao-card h2 { font-size: 1.3rem; margin-bottom: 5px; }
        .instrucao-card span { color: #e67e22; font-weight: 800; text-transform: uppercase; }

        .campo-formas {
            flex: 1;
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            border: 3px dashed rgba(255,255,255,0.5);
        }

        .forma-item {
            position: absolute;
            font-size: clamp(2.5rem, 8vw, 4rem);
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
            padding: 10px;
        }

        .forma-item:active { transform: scale(1.3); }

        /* FEEDBACKS */
        #feedback-pop {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #2ecc71; color: white; padding: 30px;
            border-radius: 50%; font-size: 4rem; z-index: 300;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .show-pop { transform: translate(-50%, -50%) scale(1) !important; }

        footer {
            width: 100%; padding: 10px; background: white;
            text-align: center; color: #7f8c8d; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div id="feedback-pop">🌟</div>

    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
        </nav>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Geometria: Encontra as Formas</h1>
        </div>
        <a href="../" class="btn-voltar-3d"><span>⬅</span> SAIR</a>
    </header>

    <main>
        <div class="instrucao-card">
            <p>Nível <span id="txt-nivel">1</span></p>
            <h2 id="msg-instrucao">Clica em todos os <span id="alvo-nome">Quadrados</span></h2>
            <p style="font-size: 0.9rem; color: #666;">Faltam: <strong id="txt-faltam">0</strong></p>
        </div>

        <div class="campo-formas" id="container"></div>
    </main>

    <footer>Recursos Digitais Covão - Professor Luís</footer>

    <script>
        const formasConfig = [
            { nome: "Quadrados", emoji: "🟦", tipo: "quadrado" },
            { nome: "Círculos", emoji: "🟡", tipo: "circulo" },
            { nome: "Triângulos", emoji: "🔺", tipo: "triangulo" },
            { nome: "Estrelas", emoji: "⭐", tipo: "estrela" }
        ];

        let nivelAtual = 1;
        let alvoAtual = null;
        let formasNoCampo = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function iniciarNivel() {
            const container = document.getElementById('container');
            container.innerHTML = "";
            
            // Escolher o alvo do nível aleatoriamente
            alvoAtual = formasConfig[Math.floor(Math.random() * formasConfig.length)];
            document.getElementById('alvo-nome').innerText = alvoAtual.nome;
            document.getElementById('txt-nivel').innerText = nivelAtual;

            const totalFormas = 15 + (nivelAtual * 2); 
            const quantidadeAlvos = 3 + nivelAtual;
            let alvosGerados = 0;

            document.getElementById('txt-faltam').innerText = quantidadeAlvos;

            for (let i = 0; i < totalFormas; i++) {
                const el = document.createElement('div');
                el.className = 'forma-item';
                
                // Decidir se é a forma certa ou errada
                let config;
                if (alvosGerados < quantidadeAlvos) {
                    config = alvoAtual;
                    el.dataset.correto = "true";
                    alvosGerados++;
                } else {
                    do {
                        config = formasConfig[Math.floor(Math.random() * formasConfig.length)];
                    } while (config.tipo === alvoAtual.tipo);
                    el.dataset.correto = "false";
                }

                el.innerText = config.emoji;
                
                // Posição Aleatória
                el.style.left = Math.random() * 85 + "%";
                el.style.top = Math.random() * 85 + "%";
                el.style.transform = `rotate(${Math.random() * 360}deg)`;

                el.onclick = function() {
                    if (this.dataset.correto === "true") {
                        this.style.visibility = "hidden";
                        verificarProgresso();
                    } else {
                        // Feedback visual de erro (tremer)
                        this.style.filter = "grayscale(100%)";
                        setTimeout(() => this.style.filter = "", 500);
                    }
                };

                container.appendChild(el);
            }
        }

        function verificarProgresso() {
            let restantes = 0;
            document.querySelectorAll('.forma-item[data-correto="true"]').forEach(el => {
                if (el.style.visibility !== "hidden") restantes++;
            });

            document.getElementById('txt-faltam').innerText = restantes;

            if (restantes === 0) {
                const pop = document.getElementById('feedback-pop');
                pop.classList.add('show-pop');
                
                setTimeout(() => {
                    pop.classList.remove('show-pop');
                    nivelAtual++;
                    iniciarNivel();
                }, 1200);
            }
        }

        iniciarNivel();
    </script>
</body>
</html>
