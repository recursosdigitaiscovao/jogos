<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ligar Números - 1º Ano</title>
    
    <style>
        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        header {
            background-color: #ff9f43;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        header h2 { margin: 0; font-size: 1.2rem; }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            gap: 10px;
        }

        .info-jogo {
            color: #7f8c8d;
            font-size: 1rem;
            margin: 0;
            font-weight: bold;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            max-height: 70vh;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        /* Cartões mais apelativos */
        .item {
            background-color: #f0f7ff;
            color: #2c3e50;
            border-radius: 20px;
            padding: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #d0e4f5;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #bedcff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Cores alternadas para a coluna das palavras */
        #words-col .item {
            background-color: #f0fff4;
            border-color: #c1f0d0;
            box-shadow: 0 5px 0 #a8e6bc;
        }

        .selected {
            background-color: #ff9f43 !important;
            color: white !important;
            border-color: #fff !important;
            box-shadow: 0 5px 0 #e67e22 !important;
            transform: scale(1.02);
        }

        .correct {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        /* Painel Final */
        #final-panel {
            display: none;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .btn-final {
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            box-shadow: 0 6px 0 #27ae60;
            cursor: pointer;
        }

        .btn-final.mat {
            background-color: #3498db;
            box-shadow: 0 6px 0 #2980b9;
        }

        @media (min-width: 700px) {
            .item { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h2>🔢 Ligar Números</h2>
        <a href="../index.html" class="btn-topo">⬅ 1ºAno</a>
    </header>

    <main>
        <p id="label-info" class="info-jogo">Ronda: <span id="ronda-atual">1</span> / 3</p>
        
        <div id="game-board" class="game-container">
            <div class="column" id="numbers-col"></div>
            <div class="column" id="words-col"></div>
        </div>

        <div id="final-panel">
            <h1 style="color:#ff9f43; margin-top:0;">🌟 Parabéns!</h1>
            <button class="btn-final" onclick="location.reload()">Jogar Novamente 🔄</button>
            <a href="../index.html" class="btn-final mat">Voltar à Matemática 🧮</a>
        </div>
    </main>

    <script>
        const allData = [
            { n: "1", w: "Um" }, { n: "2", w: "Dois" }, { n: "3", w: "Três" },
            { n: "4", w: "Quatro" }, { n: "5", w: "Cinco" }, { n: "6", w: "Seis" },
            { n: "7", w: "Sete" }, { n: "8", w: "Oito" }, { n: "9", w: "Nove" },
            { n: "10", w: "Dez" }
        ];

        let selectedNum = null;
        let selectedWord = null;
        let pairsFound = 0;
        let currentRound = 1;

        function initGame() {
            if (currentRound > 3) {
                showFinal();
                return;
            }

            document.getElementById('ronda-atual').innerText = currentRound;
            const numsCol = document.getElementById('numbers-col');
            const wordsCol = document.getElementById('words-col');
            
            numsCol.innerHTML = '';
            wordsCol.innerHTML = '';
            pairsFound = 0;
            selectedNum = null;
            selectedWord = null;

            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, 5);
            const nums = [...shuffled].sort(() => 0.5 - Math.random());
            const words = [...shuffled].sort(() => 0.5 - Math.random());

            nums.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = item.n;
                div.onclick = () => selectItem(div, 'num', item.n);
                numsCol.appendChild(div);
            });

            words.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = item.w;
                div.onclick = () => selectItem(div, 'word', item.n);
                wordsCol.appendChild(div);
            });
        }

        function selectItem(el, type, val) {
            if (el.classList.contains('correct')) return;

            if (type === 'num') {
                document.querySelectorAll('#numbers-col .item').forEach(i => i.classList.remove('selected'));
                selectedNum = { el, val };
            } else {
                document.querySelectorAll('#words-col .item').forEach(i => i.classList.remove('selected'));
                selectedWord = { el, val };
            }

            el.classList.add('selected');

            if (selectedNum && selectedWord) {
                if (selectedNum.val === selectedWord.val) {
                    const sN = selectedNum.el;
                    const sW = selectedWord.el;
                    setTimeout(() => {
                        sN.classList.add('correct');
                        sW.classList.add('correct');
                        pairsFound++;
                        if (pairsFound === 5) {
                            currentRound++;
                            setTimeout(initGame, 600);
                        }
                    }, 250);
                    selectedNum = null;
                    selectedWord = null;
                } else {
                    const sN = selectedNum.el;
                    const sW = selectedWord.el;
                    setTimeout(() => {
                        sN.classList.remove('selected');
                        sW.classList.remove('selected');
                    }, 400);
                    selectedNum = null;
                    selectedWord = null;
                }
            }
        }

        function showFinal() {
            document.getElementById('game-board').style.display = 'none';
            document.getElementById('label-info').style.display = 'none';
            document.getElementById('final-panel').style.display = 'flex';
        }

        initGame();
    </script>
</body>
</html>
