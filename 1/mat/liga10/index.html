<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ligar Números - 1º Ano</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            /* Fundo sólido laranja suave padrão 1º Ano */
            background-color: rgba(255, 159, 67, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* HEADER PADRONIZADO */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: #2c3e50;
        }

        header h1 {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 800;
        }

        /* BOTÃO VOLTAR 3D */
        .btn-voltar-3d {
            text-decoration: none;
            color: #000000;
            background-color: #ff9f43;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e67e22;
            box-shadow: 0 2px 0 #e67e22;
            transition: all 0.1s ease;
        }

        .btn-voltar-3d:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #e67e22;
        }

        /* SIDEBAR - LINKS CORRIGIDOS */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar h3 { 
            color: #2c3e50; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            border-bottom: 2px solid #ff9f43; 
        }

        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }

        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px;
        }

        .sidebar-item:hover { background: #ff9f43; color: white; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA PRINCIPAL */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            gap: 15px;
        }

        .info-jogo {
            font-size: 1.1rem;
            font-weight: bold;
            color: #d35400;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            max-height: 65vh;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        .item {
            background-color: white;
            color: #2c3e50;
            border-radius: 20px;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 0 rgba(0,0,0,0.05);
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #eee;
            transition: transform 0.2s;
        }

        .selected {
            background-color: #ff9f43 !important;
            color: white !important;
            border-color: #fff !important;
            box-shadow: 0 5px 0 #e67e22 !important;
            transform: scale(1.05);
        }

        .correct {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        /* PAINEL FINAL */
        #final-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255,159,67,0.2);
            width: 90%;
            max-width: 400px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .botoes-lado-a-lado {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-top: 25px;
        }

        .btn-final {
            flex: 1;
            background-color: #ff9f43;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            box-shadow: 0 5px 0 #e67e22;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-final:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #e67e22;
        }

        .btn-final.mat {
            background-color: #2c3e50;
            box-shadow: 0 5px 0 #1a252f;
        }

        /* FOOTER */
        footer {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        @media (min-width: 700px) {
            .item { font-size: 2rem; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../../../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../../../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../../../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>🔢 Ligar Números</h1>
        </div>
        <a href="../" class="btn-voltar-3d">
            <span>⬅</span> Voltar
        </a>
    </header>

    <main>
        <p id="label-info" class="info-jogo">Ronda: <span id="ronda-atual">1</span> / 3</p>
        
        <div id="game-board" class="game-container">
            <div class="column" id="numbers-col"></div>
            <div class="column" id="words-col"></div>
        </div>

        <div id="final-panel">
            <div style="font-size: 4rem;">🌟</div>
            <h2 style="color:#ff9f43; margin-bottom: 10px;">Parabéns!</h2>
            <p style="color: #7f8c8d; font-weight: bold;">Completaste todos os desafios!</p>
            
            <div class="botoes-lado-a-lado">
                <button class="btn-final" onclick="location.reload()">REPETIR 🔄</button>
                <a href="../" class="btn-final mat">MENU 🧮</a>
            </div>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        const allData = [
            { n: "1", w: "Um" }, { n: "2", w: "Dois" }, { n: "3", w: "Três" },
            { n: "4", w: "Quatro" }, { n: "5", w: "Cinco" }, { n: "6", w: "Seis" },
            { n: "7", w: "Sete" }, { n: "8", w: "Oito" }, { n: "9", w: "Nove" },
            { n: "10", w: "Dez" }
        ];

        let selectedNum = null;
        let selectedWord = null;
        let pairsFound = 0;
        let currentRound = 1;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function initGame() {
            if (currentRound > 3) {
                showFinal();
                return;
            }

            document.getElementById('ronda-atual').innerText = currentRound;
            const numsCol = document.getElementById('numbers-col');
            const wordsCol = document.getElementById('words-col');
            
            numsCol.innerHTML = '';
            wordsCol.innerHTML = '';
            pairsFound = 0;
            selectedNum = null;
            selectedWord = null;

            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, 5);
            const nums = [...shuffled].sort(() => 0.5 - Math.random());
            const words = [...shuffled].sort(() => 0.5 - Math.random());

            nums.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = item.n;
                div.onclick = () => selectItem(div, 'num', item.n);
                numsCol.appendChild(div);
            });

            words.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = item.w;
                div.onclick = () => selectItem(div, 'word', item.n);
                wordsCol.appendChild(div);
            });
        }

        function selectItem(el, type, val) {
            if (el.classList.contains('correct')) return;

            if (type === 'num') {
                document.querySelectorAll('#numbers-col .item').forEach(i => i.classList.remove('selected'));
                selectedNum = { el, val };
            } else {
                document.querySelectorAll('#words-col .item').forEach(i => i.classList.remove('selected'));
                selectedWord = { el, val };
            }

            el.classList.add('selected');

            if (selectedNum && selectedWord) {
                if (selectedNum.val === selectedWord.val) {
                    const sN = selectedNum.el;
                    const sW = selectedWord.el;
                    setTimeout(() => {
                        sN.classList.add('correct');
                        sW.classList.add('correct');
                        pairsFound++;
                        if (pairsFound === 5) {
                            currentRound++;
                            setTimeout(initGame, 600);
                        }
                    }, 250);
                    selectedNum = null;
                    selectedWord = null;
                } else {
                    const sN = selectedNum.el;
                    const sW = selectedWord.el;
                    setTimeout(() => {
                        sN.classList.remove('selected');
                        sW.classList.remove('selected');
                    }, 400);
                    selectedNum = null;
                    selectedWord = null;
                }
            }
        }

        function showFinal() {
            document.getElementById('game-board').style.display = 'none';
            document.getElementById('label-info').style.display = 'none';
            document.getElementById('final-panel').style.display = 'flex';
        }

        initGame();
    </script>
</body>
</html>
