<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ligar Números - 1º Ano</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ff9f43; /* Laranja Sólido */
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        h1 { font-size: 1.8rem; margin: 15px 0 5px 0; }
        .instrucao { font-size: 1.1rem; margin-bottom: 20px; opacity: 0.9; }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            background-color: white;
            color: #333;
            border-radius: 20px;
            padding: 20px 10px;
            font-size: 1.6rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #e67e22;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .selected {
            background-color: #2e86de !important;
            color: white !important;
            border-color: #fff;
            transform: scale(1.05);
        }

        .correct {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: auto;
            margin-bottom: 20px;
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 2px solid white;
        }

        /* Animação para novos cartões */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item { animation: fadeIn 0.4s ease; }

        @media (min-width: 700px) {
            h1 { font-size: 2.5rem; }
            .item { font-size: 2rem; padding: 30px; }
            .game-container { max-width: 600px; gap: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🔢 Ligar Números</h1>
        <p class="instrucao">Liga o número ao seu nome!</p>
    </header>

    <div class="game-container">
        <div class="column" id="numbers-col"></div>
        <div class="column" id="words-col"></div>
    </div>

    <a href="index.html" class="btn-voltar">⬅ Voltar</a>

    <script>
        const allData = [
            { n: "1", w: "Um" }, { n: "2", w: "Dois" }, { n: "3", w: "Três" },
            { n: "4", w: "Quatro" }, { n: "5", w: "Cinco" }, { n: "6", w: "Seis" },
            { n: "7", w: "Sete" }, { n: "8", w: "Oito" }, { n: "9", w: "Nove" },
            { n: "10", w: "Dez" }
        ];

        let selectedNum = null;
        let selectedWord = null;
        let pairsFound = 0;

        function initGame() {
            const numsCol = document.getElementById('numbers-col');
            const wordsCol = document.getElementById('words-col');
            
            // Limpa o tabuleiro para a nova ronda
            numsCol.innerHTML = '';
            wordsCol.innerHTML = '';
            pairsFound = 0;
            selectedNum = null;
            selectedWord = null;

            // Escolhe 5 números aleatórios
            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            const nums = [...shuffled].sort(() => 0.5 - Math.random());
            const words = [...shuffled].sort(() => 0.5 - Math.random());

            nums.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = item.n;
                div.onclick = () => selectItem(div, 'num', item.n);
                numsCol.appendChild(div);
            });

            words.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = item.w;
                div.onclick = () => selectItem(div, 'word', item.n);
                wordsCol.appendChild(div);
            });
        }

        function selectItem(el, type, val) {
            if (el.classList.contains('correct')) return;

            if (type === 'num') {
                document.querySelectorAll('#numbers-col .item').forEach(i => i.classList.remove('selected'));
                selectedNum = { el, val };
            } else {
                document.querySelectorAll('#words-col .item').forEach(i => i.classList.remove('selected'));
                selectedWord = { el, val };
            }

            el.classList.add('selected');

            if (selectedNum && selectedWord) {
                if (selectedNum.val === selectedWord.val) {
                    const sN = selectedNum.el;
                    const sW = selectedWord.el;
                    setTimeout(() => {
                        sN.classList.add('correct');
                        sW.classList.add('correct');
                        pairsFound++;
                        if (pairsFound === 5) {
                            setTimeout(initGame, 500); // Carrega novos cartões automaticamente
                        }
                    }, 250);
                    selectedNum = null;
                    selectedWord = null;
                } else {
                    const sN = selectedNum.el;
                    const sW = selectedWord.el;
                    setTimeout(() => {
                        sN.classList.remove('selected');
                        sW.classList.remove('selected');
                    }, 400);
                    selectedNum = null;
                    selectedWord = null;
                }
            }
        }

        initGame();
    </script>
</body>
</html>
