<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matemática 1º Ano - O Trator das Dezenas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-principal: #ff9100;
            --cor-vibrante: #ff7300;
            --cor-fundo: #fef7ed;
            --cor-texto: #8a6436;
            --cor-jogo-verde: #45cfa8;
            --cor-erro: #ff4757;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Fredoka', sans-serif; background: var(--cor-fundo);
            overflow: hidden; 
        }

        /* --- Estrutura de Navegação --- */
        .nav-bar {
            height: var(--header-height); background: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative; z-index: 100;
        }

        /* --- Contentor Principal --- */
        .main-container {
            height: calc(100% - var(--header-height));
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
        }

        .game-card {
            background: white; border: 4px solid var(--cor-principal);
            border-radius: 25px; width: 100%; max-width: 900px;
            height: 100%; max-height: 600px;
            display: flex; flex-direction: column; overflow: hidden;
            position: relative;
        }

        .screen { display: none; flex-direction: column; width: 100%; height: 100%; padding: 15px; }
        .screen.active { display: flex; }

        /* --- O Comboio do Trator (A Peça Central) --- */
        .road-area {
            flex: 1; background: #e8f9f4; border-radius: 20px;
            position: relative; overflow: hidden; border: 2px dashed #b2dfdb;
            display: flex; align-items: center;
        }

        .tractor-train {
            display: flex; align-items: flex-end; position: absolute;
            left: -100%; /* Começa fora do ecrã à esquerda */
            transition: transform 1s ease-out;
            will-change: transform;
        }

        .tractor-img { height: 18vh; max-height: 100px; width: auto; z-index: 2; }
        
        .wagon-box {
            display: flex; flex-direction: column; align-items: center;
            width: 25vh; max-width: 140px; margin-left: -2px;
        }

        .cargo-area {
            height: 12vh; max-height: 80px; width: 80%;
            display: flex; align-items: flex-end; justify-content: center;
            gap: 2px; padding-bottom: 5px;
        }

        .wagon-img { width: 100%; height: auto; }

        /* --- Fardos (Dezenas e Unidades) --- */
        .fardo-unit { width: 22px; height: auto; }
        .tens-stack { display: flex; flex-direction: column-reverse; gap: 1px; }

        /* --- Botões Uniformes --- */
        .controls-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; padding-top: 10px;
        }

        .btn-game {
            background: white; border: 3px solid var(--cor-jogo-verde);
            border-radius: 15px; height: 75px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; font-family: 'Fredoka'; font-weight: 700;
            color: var(--cor-texto); font-size: 1rem;
        }

        .btn-game img {
            width: 40px; height: 40px; object-fit: contain; margin-bottom: 2px;
        }

        .btn-deliver {
            grid-column: span 3; background: var(--cor-vibrante);
            color: white; border: none; border-radius: 50px;
            font-size: 1.3rem; height: 50px; cursor: pointer;
            box-shadow: 0 4px 0 #bf5600; font-family: 'Fredoka';
        }

        /* --- Animações --- */
        .pos-center { transform: translateX(calc(50vw + 50%)); } /* Ajustado via JS */
        .pos-exit { transform: translateX(2000px); }

        .btn-intro {
            background: var(--cor-jogo-verde); color: white; border: none;
            padding: 15px 40px; border-radius: 20px; font-size: 1.5rem;
            font-weight: 700; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="nav-bar">
        <div style="font-weight: bold; color: var(--cor-principal);">☰ MENU</div>
        <div id="game-title" style="font-weight: 700; color: var(--cor-texto);">O Trator das Dezenas</div>
        <div style="background: var(--cor-principal); color: white; padding: 5px 10px; border-radius: 10px; font-size: 0.8rem;">1º ANO</div>
    </header>

    <div class="main-container">
        <div class="game-card">
            
            <!-- ECRÃ INICIAL -->
            <section id="screen-intro" class="screen active" style="align-items: center; justify-content: center; text-align: center;">
                <h1 style="color: var(--cor-principal); margin: 0;">Vamos carregar o Trator?</h1>
                <p style="color: var(--cor-texto);">Aprende a contar as dezenas e as unidades.</p>
                
                <div class="road-area" style="width: 100%; height: 200px; margin: 20px 0;">
                    <div id="intro-train" class="tractor-train">
                        <img src="https://i.ibb.co/v4m8v7z/tractor.png" class="tractor-img">
                        <div class="wagon-box"><div class="cargo-area" id="intro-cargo-1"></div><img src="https://i.ibb.co/m0fH4Yy/wagon.png" class="wagon-img"></div>
                        <div class="wagon-box"><div class="cargo-area" id="intro-cargo-2"></div><img src="https://i.ibb.co/m0fH4Yy/wagon.png" class="wagon-img"></div>
                    </div>
                </div>

                <div style="display: flex; gap: 20px;">
                    <div id="intro-btn-1" class="btn-game" style="width: 100px;"><img src="https://i.ibb.co/FBTm8v8/ten.png"> +10</div>
                    <div id="intro-btn-2" class="btn-game" style="width: 100px;"><img src="https://i.ibb.co/fD38x8y/unit.png"> +1</div>
                </div>

                <button class="btn-intro" onclick="startGame()">JOGAR</button>
            </section>

            <!-- ECRÃ DE JOGO -->
            <section id="screen-game" class="screen">
                <div style="display: flex; justify-content: space-between; font-weight: bold; color: var(--cor-texto); margin-bottom: 10px;">
                    <span>PONTOS: <span id="pts">0</span></span>
                    <span id="instruction-text">Carrega: 25</span>
                    <span>TEMPO: <span id="timer">00:00</span></span>
                </div>

                <div class="road-area">
                    <div id="game-train" class="tractor-train">
                        <img src="https://i.ibb.co/v4m8v7z/tractor.png" class="tractor-img">
                        <div class="wagon-box">
                            <div id="game-cargo-tens" class="cargo-area"></div>
                            <img src="https://i.ibb.co/m0fH4Yy/wagon.png" class="wagon-img">
                        </div>
                        <div class="wagon-box">
                            <div id="game-cargo-units" class="cargo-area" style="display: grid; grid-template-columns: repeat(5, 1fr); justify-items: center;"></div>
                            <img src="https://i.ibb.co/m0fH4Yy/wagon.png" class="wagon-img">
                        </div>
                    </div>
                </div>

                <div id="game-controls" class="controls-grid">
                    <button class="btn-game" onclick="addCargo('ten')">
                        <img src="https://i.ibb.co/FBTm8v8/ten.png"> DEZENA
                    </button>
                    <button class="btn-game" onclick="addCargo('unit')">
                        <img src="https://i.ibb.co/fD38x8y/unit.png"> UNIDADE
                    </button>
                    <button class="btn-game" style="border-color: var(--cor-erro);" onclick="clearCargo()">
                        🗑️ LIMPAR
                    </button>
                    <button class="btn-deliver" onclick="checkAnswer()">ENTREGAR CARGA</button>
                </div>
            </section>

        </div>
    </div>

    <script>
        // Configurações e Estado
        const imgFardo = "https://i.ibb.co/6R0D5H1/bale.png";
        let targetValue = 0;
        let currentTens = 0;
        let currentUnits = 0;
        let points = 0;

        // Ao carregar, prepara a animação da intro
        window.onload = () => {
            const introTrain = document.getElementById('intro-train');
            // O trator avança puxando os reboques
            setTimeout(() => {
                introTrain.style.transform = "translateX(450px)";
            }, 500);
        };

        function startGame() {
            document.getElementById('screen-intro').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            nextRound();
        }

        function nextRound() {
            targetValue = Math.floor(Math.random() * 40) + 11;
            document.getElementById('instruction-text').innerText = "Carrega: " + targetValue;
            clearCargo();
            
            const train = document.getElementById('game-train');
            train.style.transition = "none";
            train.style.transform = "translateX(-500px)";
            
            setTimeout(() => {
                train.style.transition = "transform 1s ease-out";
                train.style.transform = "translateX(550px)";
            }, 100);
        }

        function addCargo(type) {
            if(type === 'ten') {
                if(currentTens >= 5) return;
                currentTens++;
                const stack = document.createElement('div');
                stack.className = 'tens-stack';
                for(let i=0; i<10; i++) {
                    const img = document.createElement('img');
                    img.src = imgFardo; img.className = 'fardo-unit';
                    stack.appendChild(img);
                }
                document.getElementById('game-cargo-tens').appendChild(stack);
            } else {
                if(currentUnits >= 15) return;
                currentUnits++;
                const img = document.createElement('img');
                img.src = imgFardo; img.className = 'fardo-unit';
                document.getElementById('game-cargo-units').appendChild(img);
            }
        }

        function clearCargo() {
            currentTens = 0;
            currentUnits = 0;
            document.getElementById('game-cargo-tens').innerHTML = "";
            document.getElementById('game-cargo-units').innerHTML = "";
        }

        function checkAnswer() {
            const total = (currentTens * 10) + currentUnits;
            const train = document.getElementById('game-train');

            if(total === targetValue) {
                points += 10;
                document.getElementById('pts').innerText = points;
                // Animação de saída (Trator puxa tudo para fora)
                train.style.transform = "translateX(1500px)";
                setTimeout(nextRound, 1200);
            } else {
                alert("Tenta outra vez! Precisamos de " + targetValue);
                clearCargo();
            }
        }
    </script>
</body>
</html>
