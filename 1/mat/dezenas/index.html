<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trator das Dezenas</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Fredoka', sans-serif;
    background:#e8f9f4;
}

/* 🚜 trator */
.trator-img {
    height:60px;
}

/* 🚜 animação esquerda → direita */
.anim-enter {
    animation: driveIn 1s ease-out forwards;
    opacity:0;
}

@keyframes driveIn {
    0% { transform: translateX(-150%) scaleX(-1); opacity:0; }
    100% { transform: translateX(0) scaleX(-1); opacity:1; }
}

/* layout */
.game-area {
    height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.scene-container {
    display:flex;
    align-items:flex-end;
    gap:5px;
}

.reboque-container {
    position:relative;
}

.carga-area {
    position:absolute;
    bottom:30%;
    left:10%;
    width:80%;
    display:flex;
    flex-wrap:wrap-reverse;
    gap:2px;
}

.carga-area img {
    width:20px;
}

/* botões */
.controls {
    text-align:center;
    margin-top:20px;
}

button {
    padding:10px 20px;
    margin:5px;
    border-radius:10px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.btn-main {
    background:#ff9100;
    color:white;
}

.btn-img img {
    height:30px;
}
</style>
</head>

<body>

<div class="game-area">
    <div class="scene-container" id="tractor-train">
        
        <img id="game-tractor" class="trator-img anim-enter">

        <div class="reboque-container">
            <div id="carga-tens" class="carga-area"></div>
            <img id="reb1">
        </div>

        <div class="reboque-container">
            <div id="carga-units" class="carga-area"></div>
            <img id="reb2">
        </div>

    </div>
</div>

<div class="controls">
    <button onclick="add('D')">+10</button>
    <button onclick="add('U')">+1</button>

    <!-- 🧽 botão com imagem -->
    <button class="btn-img" onclick="clearC()">
        <img id="btn-bor">
    </button>

    <br><br>

    <button class="btn-main" onclick="moverTrator()">
        ENTREGAR
    </button>
</div>

<script src="dados.js"></script>

<script>
let uTens = 0;
let uUnits = 0;

window.onload = () => {
    const pm = JOGO_CONFIG.caminhoImg;
    const v = JOGO_CONFIG.veiculos;

    document.getElementById('game-tractor').src = pm + v.trator;
    document.getElementById('reb1').src = pm + v.reboque;
    document.getElementById('reb2').src = pm + v.reboque;
    document.getElementById('btn-bor').src = pm + v.borracha;
};

/* ➕ adicionar */
function add(tipo){
    if(tipo === 'D') uTens += 10;
    if(tipo === 'U') uUnits += 1;
    render();
}

/* 🧹 limpar */
function clearC(){
    uTens = 0;
    uUnits = 0;
    render();
}

/* 🎨 render cubos (empilha 5 por coluna) */
function render(){
    const pm = JOGO_CONFIG.caminhoImg;
    const v = JOGO_CONFIG.veiculos;

    const units = document.getElementById('carga-units');
    units.innerHTML = '';

    let total = uUnits + uTens;
    let col = 0;
    let row = 0;

    for(let i=0;i<total;i++){
        const img = document.createElement('img');
        img.src = pm + v.unidade;

        img.style.position = "absolute";
        img.style.bottom = (row * 22) + "px";
        img.style.left = (col * 22) + "px";

        units.appendChild(img);

        row++;
        if(row === 5){
            row = 0;
            col++;
        }
    }
}

/* 🚜 mover */
function moverTrator(){
    const t = document.getElementById('tractor-train');
    t.style.transition = "transform 1s linear";
    t.style.transform = "translateX(300px)";
}
</script>

</body>
</html>
