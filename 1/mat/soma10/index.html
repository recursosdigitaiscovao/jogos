<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Somar10 com Balões</title>
    <style>
        /* Reset e Estilo Geral - Template_1 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: #fff4e6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        header {
            width: 100%; background-color: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none; color: #ffffff; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22;
            box-shadow: 0 3px 0 #e67e22; cursor: pointer;
        }

        /* ÁREA DO JOGO */
        main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; position: relative; padding: 20px;
            z-index: 5;
        }

        #score {
            font-size: 1.1rem; font-weight: bold; color: #e67e22;
            background: white; padding: 8px 25px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        #question-box {
            font-size: 2.5rem; font-weight: bold; color: #2c3e50;
            border: 6px solid #ff9f43; padding: 20px; width: 90%;
            max-width: 400px; border-radius: 25px; background: white;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            z-index: 20; position: relative;
        }

        /* CONTENTOR DE BALÕES - Ocupa todo o ecrã abaixo do header */
        #balloon-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none; z-index: 10;
        }

        .balloon {
            position: absolute; bottom: -120px;
            width: 75px; height: 95px;
            background-color: #ff9f43;
            border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.8rem; font-weight: bold;
            cursor: pointer; pointer-events: auto;
            box-shadow: inset -5px -8px rgba(0,0,0,0.15);
            animation: floatUp 7s linear forwards;
        }

        /* O "nó" do balão */
        .balloon::after {
            content: "▼"; position: absolute; bottom: -10px;
            left: 50%; transform: translateX(-50%);
            color: inherit; font-size: 12px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-110vh) rotate(15deg); }
        }

        /* MODAIS */
        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 85%; max-width: 320px;
            background: white; padding: 25px; border-radius: 20px;
            z-index: 400; text-align: center; border: 3px solid #ff9f43;
        }

        footer {
            width: 100%; padding: 12px; background-color: white;
            text-align: center; color: #95a5a6; font-size: 0.8rem;
            border-top: 1px solid #eee; z-index: 100;
        }

        .correct-anim { border-color: #2ecc71 !important; transform: scale(1.05); transition: 0.3s; }
        .wrong-anim { border-color: #e74c3c !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div style="font-size: 1.4rem;">🎈</div>
            <h1>Somar10 - 1º Ano</h1>
        </div>
        <a href="#" class="btn-voltar-3d" onclick="location.reload()">🔄 REINICIAR</a>
    </header>

    <main>
        <div id="score">Pontos: 0</div>
        <div id="question-box">A carregar...</div>
        <div id="balloon-area"></div>
    </main>

    <div id="final-modal" class="modal-custom">
        <h2 style="color: #2ecc71;">🏆 EXCELENTE!</h2>
        <p style="margin: 15px 0;">Completaste o desafio das somas!</p>
        <button class="btn-voltar-3d" style="width: 100%;" onclick="location.reload()">JOGAR NOVO</button>
    </div>

    <footer>Recursos Digitais Covão • Professor Luís</footer>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let canClick = true;
        let currentLevel = 1;
        const colors = ['#ff9f43', '#ee5253', '#10ac84', '#5f27cd', '#2e86de', '#f368e0'];

        function createBalloon(value) {
            const area = document.getElementById('balloon-area');
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.innerText = value;
            
            // Cor aleatória
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // Posição horizontal aleatória (entre 5% e 85% da largura)
            const randomX = 5 + (Math.random() * 80);
            balloon.style.left = randomX + '%';
            
            // Velocidade aleatória
            const duration = 6 + Math.random() * 3;
            balloon.style.animationDuration = duration + 's';

            balloon.onclick = (e) => {
                e.stopPropagation();
                checkAnswer(value, balloon);
            };

            area.appendChild(balloon);

            // Remove do DOM quando a animação acaba
            balloon.addEventListener('animationend', () => {
                balloon.remove();
            });
        }

        function nextQuestion() {
            if (score >= 20) {
                document.getElementById('final-modal').style.display = 'block';
                return;
            }

            canClick = true;
            const qBox = document.getElementById('question-box');
            qBox.classList.remove('correct-anim', 'wrong-anim');

            let n1, n2, res;
            if (score < 10) {
                // Nível 1: Soma simples
                n1 = Math.floor(Math.random() * 8); 
                n2 = Math.floor(Math.random() * (11 - n1));
                correctAnswer = n1 + n2;
                qBox.innerHTML = `${n1} + ${n2} = ?`;
            } else {
                // Nível 2: Parcela em falta
                res = Math.floor(Math.random() * 8) + 2;
                n1 = Math.floor(Math.random() * res);
                correctAnswer = res - n1;
                qBox.innerHTML = `${n1} + __ = ${res}`;
            }

            // Criar opções (balões)
            let choices = [correctAnswer];
            while(choices.length < 4) {
                let r = Math.floor(Math.random() * 11);
                if(!choices.includes(r)) choices.push(r);
            }
            
            // Baralhar e lançar balões com pequenos atrasos
            choices.sort(() => Math.random() - 0.5);
            choices.forEach((val, i) => {
                setTimeout(() => {
                    if (canClick) createBalloon(val);
                }, i * 1200);
            });
        }

        function checkAnswer(selected, balloonEl) {
            if (!canClick) return;
            const qBox = document.getElementById('question-box');

            if (selected === correctAnswer) {
                canClick = false;
                score++;
                document.getElementById('score').innerText = `Pontos: ${score}`;
                qBox.classList.add('correct-anim');
                qBox.innerText = "MUITO BEM!";
                
                // Remove todos os balões da área
                document.getElementById('balloon-area').innerHTML = '';
                
                setTimeout(nextQuestion, 1500);
            } else {
                qBox.classList.add('wrong-anim');
                balloonEl.style.backgroundColor = '#e74c3c';
                setTimeout(() => qBox.classList.remove('wrong-anim'), 500);
            }
        }

        // Iniciar
        window.onload = nextQuestion;
    </script>
</body>
</html>
