<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Soma10</title>
    <style>
        /* Reset e Estilo Geral - Template_1 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: #fff4e6; /* Laranja Suave */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* HEADER */
        header {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }
        .icon-header { font-size: 1.4rem; filter: brightness(0); opacity: 0.8; }

        /* Botão Voltar 3D Laranja */
        .btn-voltar-3d {
            text-decoration: none;
            color: #ffffff;
            background-color: #e67e22;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #d35400;
            box-shadow: 0 3px 0 #d35400;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #d35400; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 25px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #e67e22; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ffcc80; }

        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 14px; border-radius: 15px; background: #fdfdfd;
            display: flex; align-items: center; gap: 15px; margin-bottom: 8px;
            border: 1px solid #eee; transition: all 0.2s ease;
        }
        .sidebar-item:hover { background-color: #fff4e6; color: #e67e22; border-color: #ffcc80; transform: translateX(5px); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA PRINCIPAL DO JOGO */
        main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly; padding: 20px;
        }

        #score {
            font-size: 1.1rem; font-weight: bold; color: #e67e22;
            background: white; padding: 8px 25px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #question-box {
            font-size: clamp(2.5rem, 15vw, 4rem); font-weight: bold;
            color: #2c3e50; border: 6px solid #e67e22; padding: 25px;
            width: 95%; max-width: 450px; border-radius: 30px;
            background: white; text-align: center;
            box-shadow: 0 15px 35px rgba(230,126,34,0.15);
        }

        .options-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 400px;
        }

        .option-btn {
            background-color: #e67e22; color: white; border: none;
            border-radius: 20px; padding: 18px; font-size: 2rem;
            font-weight: bold; box-shadow: 0 6px 0 #d35400;
            cursor: pointer; transition: 0.1s;
        }
        .option-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #d35400; }

        /* MODAIS */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 244, 230, 0.98); z-index: 300;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .btn-info {
            background-color: #e67e22; color: white; width: 38px; height: 38px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem; border: 1px solid #d35400;
            box-shadow: 0 3px 0 #d35400; cursor: pointer;
        }

        /* ANIMAÇÕES */
        .wrong-anim { color: #e74c3c !important; border-color: #e74c3c !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .correct-anim { border-color: #2ecc71 !important; }
        .fill-number { color: #2ecc71; text-decoration: underline; }

        footer {
            width: 100%; padding: 12px; background-color: white;
            text-align: center; color: #95a5a6; font-size: 0.8rem;
            border-top: 1px solid #eee; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Menu Escolar</h3>
        <nav>
            <a href="/jogos/" class="sidebar-item">🏠 Início</a>
            <a href="/jogos/pre/" class="sidebar-item">🦒 Pré-Escolar</a>
            <a href="/jogos/1/" class="sidebar-item">🐥 1º Ano</a>
            <a href="/jogos/2/" class="sidebar-item">🐢 2º Ano</a>
            <a href="/jogos/3/" class="sidebar-item">🦊 3º Ano</a>
            <a href="/jogos/4/" class="sidebar-item">👨‍🚀 4º Ano</a>
        </nav>
    </div>

    <div id="next-level-modal" class="modal">
        <h1 style="font-size: 3rem; color: #e67e22;">🌟 NÍVEL 2!</h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px; color: #2c3e50;">Chegaste aos 10 pontos!</p>
        <button class="option-btn" style="min-width: 250px;" onclick="startLevel2()">AVANÇAR 🚀</button>
    </div>

    <div id="final-modal" class="modal">
        <h2 style="font-size: 2.5rem; color: #2ecc71;">🏆 CONCLUÍDO!</h2>
        <div style="background:white; color:#333; padding:20px; border-radius:20px; margin: 20px 0; width:100%; max-width: 350px; border: 2px solid #eee;">
            <p>Nível 1: <span id="s1"></span>✅ | <span id="e1"></span>❌</p>
            <p>Nível 2: <span id="s2"></span>✅ | <span id="e2"></span>❌</p>
        </div>
        <button class="option-btn" style="background:#2c3e50; box-shadow: 0 6px 0 #1a252f; margin-bottom:20px; min-width: 250px;" onclick="location.reload()">REPETIR 🔄</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <div class="icon-header">➕</div> 
            <h1>Soma10</h1>
        </div>
        <a href="/jogos/1/" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main>
        <div id="score">Pontos: 0</div>
        <div id="question-box"></div>
        <div class="options-container" id="options"></div>
        
        <div style="margin-top: 20px;">
            <button class="btn-info" onclick="alert('Resolve a soma! No Nível 1 falta o resultado, no Nível 2 falta uma parcela.')">i</button>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão • <strong>Professor Luís</strong>
    </footer>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let canClick = true;
        let currentLevel = 1;
        let stats = { l1_hits: 0, l1_errors: 0, l2_hits: 0, l2_errors: 0 };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function nextQuestion() {
            if (score >= 10 && currentLevel === 1) {
                document.getElementById('next-level-modal').style.display = 'flex';
                return;
            }
            if (score >= 20) {
                showFinalReport();
                return;
            }

            canClick = true;
            const optionsDiv = document.getElementById('options');
            const qBox = document.getElementById('question-box');
            optionsDiv.innerHTML = ''; 
            qBox.classList.remove('correct-anim', 'wrong-anim');

            let n1, n2, res;

            if (currentLevel === 1) {
                // Soma até 10
                correctAnswer = Math.floor(Math.random() * 10) + 1; // Resultado (max 10)
                n1 = Math.floor(Math.random() * correctAnswer); // Parcela 1
                n2 = correctAnswer - n1; // Parcela 2
                qBox.innerHTML = `${n1} + ${n2} = <span id="gap">?</span>`;
            } else {
                // Parcela em falta (Soma até 10)
                res = Math.floor(Math.random() * 9) + 2; // Resultado (min 2, max 10)
                n1 = Math.floor(Math.random() * res); // Parcela fixa
                correctAnswer = res - n1; // Parcela em falta
                qBox.innerHTML = `${n1} + <span id="gap">__</span> = ${res}`;
            }

            // Gerar opções próximas do resultado
            let choices = [correctAnswer];
            while(choices.length < 4) {
                let r = Math.floor(Math.random() * 11);
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = val;
                btn.onclick = () => check(val);
                optionsDiv.appendChild(btn);
            });
        }

        function check(selected) {
            if (!canClick) return;
            const qBox = document.getElementById('question-box');
            const gap = document.getElementById('gap');

            if(selected === correctAnswer) {
                canClick = false;
                score++;
                currentLevel === 1 ? stats.l1_hits++ : stats.l2_hits++;
                document.getElementById('score').innerText = `Pontos: ${score}`;
                gap.innerHTML = selected;
                gap.className = "fill-number";
                qBox.classList.add('correct-anim');
                setTimeout(nextQuestion, 1000);
            } else {
                if(score > 0) score--; 
                currentLevel === 1 ? stats.l1_errors++ : stats.l2_errors++;
                document.getElementById('score').innerText = `Pontos: ${score}`;
                qBox.classList.add('wrong-anim');
                setTimeout(() => qBox.classList.remove('wrong-anim'), 500);
            }
        }

        function startLevel2() {
            currentLevel = 2;
            document.getElementById('next-level-modal').style.display = 'none';
            nextQuestion();
        }

        function showFinalReport() {
            document.getElementById('s1').innerText = stats.l1_hits;
            document.getElementById('e1').innerText = stats.l1_errors;
            document.getElementById('s2').innerText = stats.l2_hits;
            document.getElementById('e2').innerText = stats.l2_errors;
            document.getElementById('final-modal').style.display = 'flex';
        }

        nextQuestion();
    </script>
</body>
</html>
