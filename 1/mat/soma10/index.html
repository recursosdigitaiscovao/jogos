<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma10 - 1º Ano</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <!-- React & Babel (para processar JSX no browser) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion (Animações) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #fff4e6;
            font-family: 'Segoe UI', Roboto, 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Animação de erro */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* Estilo 3D dos botões */
        .btn-3d {
            transition: all 0.1s;
            box-shadow: 0 4px 0 #e67e22;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #e67e22;
        }
        
        .btn-3d-dark {
            box-shadow: 0 4px 0 #1a252f;
        }
        .btn-3d-dark:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a252f;
        }

        /* Balão */
        .balloon {
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Componente de Ícone Simples (já que Lucide-React é complexo via CDN)
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [level, setLevel] = useState(1);
            const [score, setScore] = useState(0);
            const [question, setQuestion] = useState(null);
            const [options, setOptions] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [showSidebar, setShowSidebar] = useState(false);
            const [showInfo, setShowInfo] = useState(false);
            const [isGameOver, setIsGameOver] = useState(false);
            const [stats, setStats] = useState({ l1_hits: 0, l1_errors: 0, l2_hits: 0, l2_errors: 0 });

            const generateQuestion = () => {
                const target = 10;
                const n1 = Math.floor(Math.random() * 11);
                const n2 = target - n1;
                const missing = level === 1 ? 'target' : (Math.random() > 0.5 ? 'n1' : 'n2');
                const correctAnswer = missing === 'target' ? target : (missing === 'n1' ? n1 : n2);

                const wrongOptions = new Set();
                while (wrongOptions.size < 3) {
                    const val = Math.floor(Math.random() * 11);
                    if (val !== correctAnswer) wrongOptions.add(val);
                }

                const allOptions = Array.from(wrongOptions);
                allOptions.push(correctAnswer);
                
                setQuestion({ n1, n2, target, missing });
                setOptions(allOptions.sort(() => Math.random() - 0.5));
                setFeedback(null);
            };

            useEffect(() => { generateQuestion(); }, [level]);

            const handleAnswer = (answer) => {
                if (feedback) return;
                const correctAnswer = question.missing === 'target' ? question.target : (question.missing === 'n1' ? question.n1 : question.n2);

                if (answer === correctAnswer) {
                    setFeedback('correct');
                    setScore(s => s + 10);
                    setStats(p => ({ ...p, [level === 1 ? 'l1_hits' : 'l2_hits']: p[level === 1 ? 'l1_hits' : 'l2_hits'] + 1 }));
                    setTimeout(() => {
                        if (score + 10 >= 100 && level === 1) setLevel(2);
                        else if (score + 10 >= 200) setIsGameOver(true);
                        else generateQuestion();
                    }, 2000);
                } else {
                    setFeedback('incorrect');
                    setStats(p => ({ ...p, [level === 1 ? 'l1_errors' : 'l2_errors']: p[level === 1 ? 'l1_errors' : 'l2_errors'] + 1 }));
                    setTimeout(() => setFeedback(null), 1500);
                }
            };

            const balloonColors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fab1a0'];

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* Sidebar */}
                    <AnimatePresence>
                        {showSidebar && (
                            <>
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setShowSidebar(false)} className="fixed inset-0 bg-black/30 z-50" />
                                <motion.aside initial={{ x: '-100%' }} animate={{ x: 0 }} exit={{ x: '-100%' }} className="fixed left-0 top-0 bottom-0 w-64 bg-white z-[60] p-6 shadow-xl">
                                    <h3 className="text-xl font-bold text-orange-500 mb-6 border-b-2 border-orange-100 pb-2">Menu Escolar</h3>
                                    <div className="space-y-3">
                                        {['Início', 'Pré-Escolar', '1º Ano', '2º Ano', '3º Ano', '4º Ano'].map((label, i) => (
                                            <div key={i} className={`p-3 rounded-xl font-bold cursor-pointer transition-all ${label === '1º Ano' ? 'bg-orange-50 text-orange-600 border border-orange-200' : 'text-gray-500 hover:bg-orange-50'}`}>
                                                {label}
                                            </div>
                                        ))}
                                    </div>
                                </motion.aside>
                            </>
                        )}
                    </AnimatePresence>

                    {/* Header */}
                    <header className="bg-white px-5 py-3 flex items-center justify-between border-b border-gray-100 shrink-0 z-40">
                        <div className="flex items-center gap-3">
                            <div className="text-2xl cursor-pointer text-gray-800" onClick={() => setShowSidebar(true)}>☰</div>
                            <span className="text-xl grayscale opacity-70">➕</span>
                            <h1 className="text-lg font-bold text-gray-800">Soma10 - 1º Ano</h1>
                        </div>
                        <button className="btn-3d bg-[#ff9f43] text-white font-bold text-xs px-5 py-2 rounded-lg border border-[#e67e22] uppercase">
                            ⬅ VOLTAR
                        </button>
                    </header>

                    {/* Jogo */}
                    <main className="flex-1 flex flex-col items-center justify-evenly p-5">
                        <div className="flex items-center gap-4">
                            <div className="bg-white px-6 py-2 rounded-full shadow-sm font-bold text-orange-600">Pontos: {score}</div>
                            <button onClick={() => setShowInfo(true)} className="btn-3d bg-[#ff9f43] text-white w-10 h-10 rounded-full font-bold text-xl border border-[#e67e22]">i</button>
                        </div>

                        <motion.div className="bg-white p-10 rounded-[40px] shadow-lg border-b-8 border-orange-100 text-center">
                            <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Nível {level}</div>
                            <div className="text-6xl font-black text-gray-800 flex items-center gap-4">
                                <span>{question?.missing === 'n1' ? '?' : question?.n1}</span>
                                <span className="text-orange-400">+</span>
                                <span>{question?.missing === 'n2' ? '?' : question?.n2}</span>
                                <span className="text-orange-400">=</span>
                                <span>{question?.missing === 'target' ? '?' : question?.target}</span>
                            </div>
                        </motion.div>

                        <div className="relative w-full max-w-2xl h-72 bg-sky-50/50 rounded-[40px] border-2 border-white overflow-hidden shadow-inner flex items-center justify-center gap-6">
                            <AnimatePresence mode="wait">
                                {!feedback && options.map((opt, i) => (
                                    <motion.div
                                        key={opt}
                                        initial={{ y: 200, opacity: 0 }}
                                        animate={{ y: [0, -15, 0], opacity: 1 }}
                                        transition={{ y: { duration: 2 + i * 0.5, repeat: Infinity, ease: "easeInOut" } }}
                                        onClick={() => handleAnswer(opt)}
                                        className="relative cursor-pointer"
                                    >
                                        <div className="w-20 h-24 balloon flex items-center justify-center text-3xl font-black text-white shadow-lg" style={{ backgroundColor: balloonColors[i % balloonColors.length] }}>
                                            {opt}
                                        </div>
                                        <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-2 bg-black/10 rounded-sm"></div>
                                        <div className="absolute -bottom-8 left-1/2 -translate-x-1/2 w-0.5 h-8 bg-gray-300"></div>
                                    </motion.div>
                                ))}
                            </AnimatePresence>

                            {feedback && (
                                <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className={`absolute inset-0 flex flex-col items-center justify-center gap-2 ${feedback === 'correct' ? 'text-green-500' : 'text-red-500'}`}>
                                    <Icon name={feedback === 'correct' ? 'check-circle' : 'x-circle'} className="w-24 h-24" />
                                    <span className="text-2xl font-black uppercase">{feedback === 'correct' ? 'Boa!' : 'Tenta de novo'}</span>
                                </motion.div>
                            )}
                        </div>
                    </main>

                    <footer className="bg-white p-3 text-center text-gray-400 text-xs border-t border-gray-50">
                        Recursos Digitais Covão • Professor Luís
                    </footer>

                    {/* Modais */}
                    {showInfo && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl border-4 border-orange-400 text-center max-w-xs">
                                <h2 className="text-2xl font-bold text-orange-500 mb-4">Como Jogar</h2>
                                <p className="text-gray-600 mb-6">Resolve a conta para somar 10! <br/> Clica no balão correto.</p>
                                <button onClick={() => setShowInfo(false)} className="btn-3d w-full bg-orange-400 text-white py-3 rounded-xl font-bold">OK!</button>
                            </div>
                        </div>
                    )}

                    {isGameOver && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl border-4 border-green-400 text-center max-w-xs">
                                <h2 className="text-2xl font-bold text-green-600 mb-4">🏆 Parabéns!</h2>
                                <p className="text-gray-600 mb-6">Completaste todos os desafios da Soma 10!</p>
                                <button onClick={() => window.location.reload()} className="btn-3d-dark w-full bg-[#2c3e50] text-white py-3 rounded-xl font-bold">REPETIR 🔄</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
