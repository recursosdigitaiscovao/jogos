<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soma10 - 1º Ano</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            /* Laranja suave sólido (15% opacidade) */
            background-color: rgba(255, 159, 67, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* HEADER */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: #2c3e50;
        }

        header h1 {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 800;
        }

        /* BOTÃO VOLTAR 3D */
        .btn-voltar-3d {
            text-decoration: none;
            color: #000000;
            background-color: #ff9f43;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e67e22;
            box-shadow: 0 2px 0 #e67e22;
            transition: all 0.1s ease;
        }

        .btn-voltar-3d:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #e67e22;
        }

        /* SIDEBAR - LINKS CORRIGIDOS (../../../) */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar h3 { 
            color: #2c3e50; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            border-bottom: 2px solid #ff9f43; 
        }

        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }

        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px;
        }

        .sidebar-item:hover { background: #ff9f43; color: white; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA PRINCIPAL DO JOGO */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 20px;
        }

        #score {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d35400;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #question-box {
            font-size: clamp(2.5rem, 15vw, 4rem);
            font-weight: bold;
            color: #2c3e50;
            border: 6px solid #ff9f43;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            border-radius: 30px;
            background: white;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255,159,67,0.2);
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .option-btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 2.2rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #e67e22;
            cursor: pointer;
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #e67e22;
        }

        /* FOOTER */
        footer {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* MODAIS E ANIMAÇÕES */
        .wrong-anim { color: #e74c3c !important; border-color: #e74c3c !important; }
        .correct-anim { border-color: #2ecc71 !important; }
        .fill-number { color: #2ecc71; text-decoration: underline; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,159,67,0.98);
            z-index: 300;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; color: white;
        }

        @media (min-width: 600px) {
            .options-container { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../../../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../../../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../../../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <div id="next-level-modal" class="modal">
        <h1 style="font-size: 3rem;">🌟 NÍVEL 2!</h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">Incrível! Chegaste aos 10 pontos!</p>
        <button class="option-btn" style="background: white; color: #ff9f43; min-width: 250px;" onclick="startLevel2()">AVANÇAR 🚀</button>
    </div>

    <div id="final-modal" class="modal" style="background: #2ecc71;">
        <h2 style="font-size: 2.5rem;">🏆 JOGO CONCLUÍDO!</h2>
        <div style="background:white; color:#333; padding:20px; border-radius:20px; margin: 20px 0; width:100%; max-width: 350px;">
            <p>Nível 1: <span id="s1"></span>✅ | <span id="e1"></span>❌</p>
            <p>Nível 2: <span id="s2"></span>✅ | <span id="e2"></span>❌</p>
        </div>
        <button class="option-btn" style="background:#2c3e50; margin-bottom:20px; min-width: 250px;" onclick="location.reload()">REPETIR 🔄</button>
        <a href="../" style="color:white; font-weight:bold; text-decoration:underline;">Sair para o Menu</a>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>➕ Soma10</h1>
        </div>
        <a href="../" class="btn-voltar-3d">
            <span>⬅</span> 1º ANO
        </a>
    </header>

    <main>
        <div id="score">Pontos: 0</div>
        <div id="question-box"></div>
        <div class="options-container" id="options"></div>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let canClick = true;
        let currentLevel = 1;
        let stats = { l1_hits: 0, l1_errors: 0, l2_hits: 0, l2_errors: 0 };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function nextQuestion() {
            if (score >= 10 && currentLevel === 1) {
                document.getElementById('next-level-modal').style.display = 'flex';
                return;
            }
            if (score >= 20) {
                showFinalReport();
                return;
            }

            canClick = true;
            const optionsDiv = document.getElementById('options');
            const qBox = document.getElementById('question-box');
            optionsDiv.innerHTML = ''; 
            qBox.classList.remove('correct-anim', 'wrong-anim');

            let n1, n2, res;

            if (currentLevel === 1) {
                n1 = Math.floor(Math.random() * 6) + 1;
                n2 = Math.floor(Math.random() * 5) + 1;
                correctAnswer = n1 + n2;
                qBox.innerHTML = `${n1} + ${n2} = <span id="gap">?</span>`;
            } else {
                n1 = Math.floor(Math.random() * 6) + 4;
                correctAnswer = Math.floor(Math.random() * 5) + 1;
                res = n1 + correctAnswer;
                qBox.innerHTML = `${n1} + <span id="gap">__</span> = ${res}`;
            }

            let choices = [correctAnswer];
            while(choices.length < 4) {
                let r = Math.floor(Math.random() * 15) + 1;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = val;
                btn.onclick = () => check(val);
                optionsDiv.appendChild(btn);
            });
        }

        function check(selected) {
            if (!canClick) return;
            const qBox = document.getElementById('question-box');
            const gap = document.getElementById('gap');

            if(selected === correctAnswer) {
                canClick = false;
                score++;
                currentLevel === 1 ? stats.l1_hits++ : stats.l2_hits++;
                document.getElementById('score').innerText = `Pontos: ${score}`;
                gap.innerHTML = selected;
                gap.className = "fill-number";
                qBox.classList.add('correct-anim');
                setTimeout(nextQuestion, 1000);
            } else {
                if(score > 0) score--; 
                currentLevel === 1 ? stats.l1_errors++ : stats.l2_errors++;
                document.getElementById('score').innerText = `Pontos: ${score}`;
                qBox.classList.add('wrong-anim');
                setTimeout(() => qBox.classList.remove('wrong-anim'), 500);
            }
        }

        function startLevel2() {
            currentLevel = 2;
            document.getElementById('next-level-modal').style.display = 'none';
            nextQuestion();
        }

        function showFinalReport() {
            document.getElementById('s1').innerText = stats.l1_hits;
            document.getElementById('e1').innerText = stats.l1_errors;
            document.getElementById('s2').innerText = stats.l2_hits;
            document.getElementById('e2').innerText = stats.l2_errors;
            document.getElementById('final-modal').style.display = 'flex';
        }

        nextQuestion();
    </script>
</body>
</html>
