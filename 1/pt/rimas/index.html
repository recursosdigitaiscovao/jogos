<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Foguetão das Rimas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-space: #0b0e1b; --primary-blue: #5ba4e5; --accent-yellow: #f1c40f; --white: #ffffff; --text-grey: #a0a0b0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-space); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; color: white; }
        
        header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(20, 25, 45, 0.9); z-index: 1000; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5); position: relative; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-center { display: flex; align-items: center; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }
        .logo-center img { height: 48px; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        .menu-dropdown { position: absolute; top: 60px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 2000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); cursor: pointer; min-width: 180px; text-decoration: none; color: #444; font-weight: 700; font-size: 0.85rem; }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }

        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 7px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        .game-card { width: 100%; max-width: 1000px; height: 100%; border-radius: 40px; display: flex; flex-direction: column; padding: 15px; position: relative; }
        
        .status-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 10px; z-index: 10; }
        .dots-container { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); }
        .dot.active { background: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); transform: scale(1.2); }
        .dot.done { background: var(--primary-blue); }

        .screen { flex: 1; display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .screen.active { display: flex; }

        .btn-jogar-stretch { background: var(--primary-blue); color: white; border: none; border-radius: 20px; padding: 16px 40px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); transition: 0.1s; }
        
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1a1f35; z-index: 2100; padding: 20px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; color: white; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: flex; flex-direction: column; gap: 15px; }
        .cat-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; }
        .level-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-lvl { background: rgba(255,255,255,0.1); border: 1px solid var(--primary-blue); color: white; padding: 8px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .btn-lvl:hover { background: var(--primary-blue); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; color: #6a7a9a; font-size: 11px; font-weight: 700; }

        @media (max-width: 650px) { .btn-voltar-header { display: none !important; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1></div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar-header" class="btn-voltar-header">
                <img id="header-back-icon" src="" width="16"> <span id="txt-voltar-header"></span>
            </a>
        </div>
    </header>

    <div class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:var(--accent-yellow); font-size:14px;">00:00</div>
                <div class="dots-container" id="dots-container"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:28px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <!-- ECRÃ 1: INTRO -->
            <div class="screen active" id="scr-intro">
                <div id="intro-animation-container" style="margin-bottom: 30px;"></div>
                <h2 id="main-game-title" style="color:var(--accent-yellow); font-size:32px; margin-bottom:10px; text-align:center;"></h2>
                <p id="intro-instr" style="color:var(--text-grey); text-align:center; max-width:300px; margin-bottom: 30px; font-weight: 700;"></p>
                <button class="btn-jogar-stretch" onclick="goToGame()">DECOLAR!</button>
            </div>

            <!-- ECRÃ 2: JOGO -->
            <div class="screen" id="scr-game">
                <div id="game-main-content" style="width:100%; height:100%; position:relative; overflow:visible;">
                    <!-- O jogo será injetado aqui -->
                </div>
            </div>

            <!-- ECRÃ 3: RESULTADOS -->
            <div class="screen" id="scr-result">
                <img id="res-taca" style="width:140px; margin-bottom:20px;">
                <h2 id="res-tit" style="font-size:32px; color: var(--accent-yellow); margin-bottom:20px;"></h2>
                <div style="display:flex; gap:20px; margin-bottom:30px;">
                    <div style="background:rgba(255,255,255,0.1); padding:15px 25px; border-radius:20px; text-align:center; border:1px solid var(--primary-blue);">
                        <span id="res-pts" style="font-size:24px; font-weight:900;">0</span><br><small>PONTOS</small>
                    </div>
                    <div style="background:rgba(255,255,255,0.1); padding:15px 25px; border-radius:20px; text-align:center; border:1px solid var(--primary-blue);">
                        <span id="res-tim" style="font-size:24px; font-weight:900;">00:00</span><br><small>TEMPO</small>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px;">
                    <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                    <button class="btn-jogar-stretch" style="background:transparent; border:2px solid var(--primary-blue); box-shadow:none;" onclick="openRDMenu(event)">MUDAR NÍVEL</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="mainFooter"></footer>

    <div id="rdMenu" class="rd-panel">
        <div style="width:40px; height:4px; background:rgba(255,255,255,0.2); border-radius:10px; margin: 0 auto 15px;" onclick="closeMenus()"></div>
        <h3 style="text-align:center; color:var(--accent-yellow); margin-bottom:20px;">Missões Espaciais</h3>
        <div id="rd-list"></div>
    </div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
        function initUI() {
            const conf = JOGO_CONFIG;
            document.getElementById('tit-l1').innerText = "FOGUETÃO";
            document.getElementById('tit-l2').innerText = "DAS RIMAS";
            document.getElementById('main-game-title').innerText = conf.nomeJogo;
            document.getElementById('intro-instr').innerText = conf.textos.instrucao;
            document.getElementById('mainFooter').innerHTML = conf.textos.rodape;
            document.getElementById('head-logo').src = conf.caminhoIcons + "icon1.png";
            document.getElementById('header-back-icon').src = conf.caminhoIcons + "voltar.png";
            document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
            document.getElementById('link-voltar-header').href = conf.linkVoltar;
            document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
            
            const menuBox = document.getElementById('dropdownMenu');
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
                a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}" width="20"> <span>${k}</span>`;
                menuBox.appendChild(a);
            });

            if(window.startLogic) window.startLogic();
        }

        function goToGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-game').classList.add('active');
            document.getElementById('status-bar').style.display = 'flex';
            if(window.initGame) window.initGame();
        }

        function goToResult() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-result').classList.add('active');
            document.getElementById('status-bar').style.display = 'none';
        }

        function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        function openRDMenu(e) { e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
        window.onload = initUI;
    </script>
</body>
</html>
