<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foguetão das Rimas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-space: #0b0e1b; --primary-blue: #5ba4e5; --accent-yellow: #f1c40f; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-space); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; color: white; }
        
        header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(20, 25, 45, 0.9); z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        .logo-center { display: flex; align-items: center; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }
        .logo-center img { height: 45px; }
        .logo-text h1 { font-size: 16px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 1; }

        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        .menu-dropdown { position: absolute; top: 60px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 2000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: white; border-radius: 12px; cursor: pointer; min-width: 180px; text-decoration: none; color: #333; font-weight: 700; font-size: 0.9rem; }

        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 8px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 13px; }
        
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; }
        .game-card { width: 100%; max-width: 1000px; height: 100%; border-radius: 40px; display: flex; flex-direction: column; padding: 15px; position: relative; }
        
        .status-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 10px; z-index: 100; }
        .dots-container { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.active { background: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); }
        .dot.done { background: var(--primary-blue); }

        .screen { flex: 1; display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        .btn-jogar-stretch { background: var(--primary-blue); color: white; border: none; border-radius: 20px; padding: 16px 40px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #3d7db8; }
        
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1a1f35; z-index: 2100; padding: 20px; border-radius: 30px 30px 0 0; transition: 0.4s; max-height: 85vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        .cat-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .level-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-lvl { background: rgba(255,255,255,0.1); border: 1px solid var(--primary-blue); color: white; padding: 10px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #6a7a9a; font-size: 11px; font-weight: 700; }
        @media (max-width: 650px) { .btn-voltar-header { display: none !important; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text"><h1>Foguetão</h1><h1>Das Rimas</h1></div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar-header" class="btn-voltar-header">VOLTAR</a>
        </div>
    </header>

    <div class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:var(--accent-yellow);">00:00</div>
                <div class="dots-container" id="dots-container"></div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span id="score-val" style="font-weight:900; color:var(--primary-blue);">0</span>
                    <img id="rd-game-btn" src="" style="height:28px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <div class="screen active" id="scr-intro">
                <h2 id="intro-title" style="color:var(--accent-yellow); font-size:32px; margin-bottom:20px;">FOGUETÃO DAS RIMAS</h2>
                <p id="intro-instr" style="max-width:300px; margin-bottom:30px; color:#a0a0b0; font-weight:700;"></p>
                <button class="btn-jogar-stretch" onclick="goToGame()">DECOLAR!</button>
            </div>

            <div class="screen" id="scr-game">
                <div id="game-main-content" style="width:100%; height:100%; position:relative;"></div>
            </div>

            <div class="screen" id="scr-result">
                <img id="res-taca" style="width:130px; margin-bottom:20px;">
                <h2 id="res-tit" style="font-size:30px; color:var(--accent-yellow); margin-bottom:20px;"></h2>
                <div style="display:flex; gap:15px; margin-bottom:30px;">
                    <div style="background:rgba(255,255,255,0.1); padding:15px 25px; border-radius:20px; border:1px solid var(--primary-blue);">
                        <span id="res-pts" style="font-size:24px; font-weight:900;">0</span><br><small>PONTOS</small>
                    </div>
                </div>
                <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
            </div>
        </div>
    </div>

    <footer id="mainFooter"></footer>

    <div id="rdMenu" class="rd-panel">
        <div id="rd-list"></div>
    </div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
        function initUI() {
            const conf = JOGO_CONFIG;
            document.getElementById('intro-instr').innerText = conf.textos.instrucao;
            document.getElementById('mainFooter').innerHTML = conf.textos.rodape;
            document.getElementById('head-logo').src = conf.caminhoIcons + "icon1.png";
            document.getElementById('link-voltar-header').href = conf.linkVoltar;
            document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
            
            const menuBox = document.getElementById('dropdownMenu');
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
                a.innerHTML = `<span>${k.toUpperCase()}</span>`;
                menuBox.appendChild(a);
            });
            if(window.startLogic) window.startLogic();
        }
        function goToGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-game').classList.add('active');
            document.getElementById('status-bar').style.display = 'flex';
            if(window.initGame) window.initGame();
        }
        function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        function openRDMenu(e) { e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
        window.onload = initUI;
    </script>
</body>
</html>
