<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qual é a Letra? - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --success: #7ed321;
            --error: #ff4d4d;
            --text-dark: #445566;
            --outer-shadow: 10px 10px 20px #b0c4d9, -10px -10px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; z-index: 1000; position: relative; }
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 10px; }
        .header-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem; }
        .header-center img { height: 30px; }
        .btn-voltar { background: var(--primary-blue); color: white; padding: 8px 16px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark); }

        /* MENU HAMBÚRGUER (PÁGINAS) */
        .menu-dropdown { 
            position: absolute; top: 60px; left: 20px; 
            background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; flex-direction: column; padding: 10px; gap: 5px; z-index: 2000; min-width: 180px;
        }
        .menu-link { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: #555; font-weight: 700; border-radius: 12px; transition: 0.2s; }
        .menu-link:hover { background: var(--bg-page); color: var(--primary-blue); }
        .menu-link img { height: 20px; width: 20px; object-fit: contain; }

        /* JOGO WRAPPER */
        .game-wrapper { flex: 1; display: flex; justify-content: center; padding: 5px 20px 15px 20px; overflow: hidden; }
        .game-card { background: var(--bg-page); width: 100%; max-width: 600px; height: 100%; border-radius: 40px; box-shadow: var(--outer-shadow); display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* STATUS BAR */
        .status { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        #dots-container { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #cbd9e6; }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }
        .dot.completed { background: var(--success); }
        .rd-btn { height: 35px; cursor: pointer; transition: transform 0.2s; }
        .rd-btn:hover { transform: scale(1.1); }

        /* ÁREA DE JOGO */
        main { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 10px; }
        .img-box { background: white; padding: 15px; border-radius: 30px; box-shadow: 5px 5px 15px #c5d4e3; width: 60%; max-width: 200px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
        #target-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .word-row { display: flex; align-items: center; justify-content: center; font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 900; gap: 10px; color: var(--text-dark); }
        .drop-zone { width: 70px; height: 90px; border: 4px dashed var(--primary-blue); border-radius: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .drop-zone.hover { background: #d0e0f0; border-style: solid; transform: scale(1.1); }
        .drop-zone.correct { border: 5px solid var(--success); color: var(--success); background: white; border-style: solid; }
        .drop-zone.wrong { border: 5px solid var(--error); color: var(--error); border-style: solid; animation: shake 0.4s; }

        .options-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 450px; padding: 10px; }
        .letter-card { aspect-ratio: 1; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; box-shadow: 0 6px 0 #cbd9e6; cursor: grab; touch-action: none; }

        /* PAINEL RD (CATEGORIAS) */
        .rd-panel { position: absolute; bottom: 0; left: 0; width: 100%; background: white; z-index: 2500; border-radius: 35px 35px 0 0; padding: 25px 20px; display: flex; flex-direction: column; gap: 10px; transform: translateY(101%); transition: transform 0.4s ease; }
        .rd-panel.active { transform: translateY(0); box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        .cat-item { display: flex; align-items: center; gap: 15px; padding: 12px 20px; background: #f8fafc; border-radius: 18px; cursor: pointer; font-weight: 700; color: var(--text-dark); }

        /* OUTROS */
        #intro-overlay { position: absolute; inset: 0; background: var(--bg-page); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .btn-jogar { padding: 15px 60px; background: var(--primary-blue); color: white; border: none; border-radius: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); font-size: 1.3rem; }
        #drag-proxy { position: fixed; pointer-events: none; z-index: 3000; width: 70px; height: 70px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMainMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º ANO</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            <section class="status">
                <div id="timer-display" style="font-weight: 800; color: #678;">00:00</div>
                <div id="dots-container"></div>
                <div class="status-right">
                    <img id="rd-status-btn" class="rd-btn" src="" alt="Categorias" onclick="toggleCategoryMenu(event)">
                </div>
            </section>

            <div id="intro-overlay">
                <h1 style="color:var(--primary-blue); font-weight:900; font-size: 2rem;">Qual é a Letra?</h1>
                <button onclick="iniciarJogo()" class="btn-jogar">JOGAR</button>
            </div>

            <main id="game-area">
                <div class="img-box"><img id="target-img" src=""></div>
                <div class="word-row">
                    <div class="drop-zone" id="main-drop">?</div>
                    <span id="word-rest"></span>
                </div>
                <div class="options-grid" id="options-box"></div>
            </main>

            <div id="rdDropdownMenu" class="rd-panel">
                <div style="width:50px; height:5px; background:#ddd; margin:0 auto 10px; border-radius:10px;" onclick="toggleCategoryMenu(event)"></div>
                <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:10px;">ESCOLHER LETRA</h3>
                <div id="categories-list"></div>
            </div>
        </div>
    </div>

    <div id="drag-proxy"></div>

    <script src="dados.js"></script>
    <script>
        let round = 0, points = 0, timer = 0, timerInt, currentCat = 'letra_a', items = [], correctL = "";
        const sndAcerto = new Audio(JOGO_CONFIG.sons.acerto);
        const sndErro = new Audio(JOGO_CONFIG.sons.erro);
        const sndVitoria = new Audio(JOGO_CONFIG.sons.vitoria);

        // NAVEGAÇÃO ENTRE PÁGINAS (HAMBÚRGUER)
        function toggleMainMenu(e) {
            e.stopPropagation();
            closeCategoryMenu();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        // ESCOLHA DE CATEGORIAS (RD)
        function toggleCategoryMenu(e) {
            e.stopPropagation();
            document.getElementById('dropdownMenu').style.display = 'none';
            document.getElementById('rdDropdownMenu').classList.toggle('active');
        }

        function closeCategoryMenu() { document.getElementById('rdDropdownMenu').classList.remove('active'); }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
            closeCategoryMenu();
        };

        function iniciarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            if(!timerInt) timerInt = setInterval(() => {
                timer++;
                const m = Math.floor(timer/60).toString().padStart(2,'0'), s = (timer%60).toString().padStart(2,'0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }, 1000);
            items = [...JOGO_CONFIG.categorias[currentCat].itens].sort(() => 0.5 - Math.random()).slice(0, 5);
            round = 0; points = 0; proximaRonda();
        }

        function proximaRonda() {
            if(round >= 5) { finalizar(); return; }
            updateDots();
            const item = items[round];
            correctL = item.nome.toUpperCase().charAt(0);
            document.getElementById('target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('word-rest').innerText = item.nome.toUpperCase().substring(1);
            const dz = document.getElementById('main-drop');
            dz.innerText = "?"; dz.className = "drop-zone";
            gerarLetras(correctL);
        }

        function gerarLetras(correta) {
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            let opts = [correta];
            const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            while(opts.length < 4) {
                let r = abc[Math.floor(Math.random() * abc.length)];
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => 0.5 - Math.random()).forEach(l => {
                const btn = document.createElement('div');
                btn.className = 'letter-card'; btn.innerText = l;
                initDrag(btn); box.appendChild(btn);
            });
        }

        function initDrag(el) {
            const start = (e) => {
                activeEl = el; const p = e.touches ? e.touches[0] : e;
                const prx = document.getElementById('drag-proxy');
                prx.innerText = el.innerText; prx.style.display = 'flex';
                prx.style.left = (p.clientX - 35) + 'px'; prx.style.top = (p.clientY - 35) + 'px';
                el.style.opacity = "0.2";
            };
            const move = (e) => {
                if(!activeEl) return; const p = e.touches ? e.touches[0] : e;
                const prx = document.getElementById('drag-proxy');
                prx.style.left = (p.clientX - 35) + 'px'; prx.style.top = (p.clientY - 35) + 'px';
                const dz = document.getElementById('main-drop'), r = dz.getBoundingClientRect();
                if(p.clientX > r.left && p.clientX < r.right && p.clientY > r.top && p.clientY < r.bottom) dz.classList.add('hover');
                else dz.classList.remove('hover');
            };
            const end = (e) => {
                if(!activeEl) return; const p = e.changedTouches ? e.changedTouches[0] : e;
                const dz = document.getElementById('main-drop'), r = dz.getBoundingClientRect();
                document.getElementById('drag-proxy').style.display = 'none'; el.style.opacity = "1";
                dz.classList.remove('hover');
                if(p.clientX > r.left && p.clientX < r.right && p.clientY > r.top && p.clientY < r.bottom) valida(activeEl.innerText);
                activeEl = null;
            };
            el.addEventListener('mousedown', start); el.addEventListener('touchstart', start, {passive: false});
            window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive: false});
            window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
        }

        function valida(l) {
            const dz = document.getElementById('main-drop');
            if(l === correctL) {
                sndAcerto.play(); points += 100;
                dz.innerText = l; dz.classList.add('correct');
                setTimeout(() => { round++; proximaRonda(); }, 1200);
            } else {
                sndErro.play(); points = Math.max(0, points - 50);
                dz.innerText = l; dz.classList.add('wrong');
                setTimeout(() => { dz.innerText = "?"; dz.classList.remove('wrong'); }, 800);
            }
        }

        function updateDots() {
            const c = document.getElementById('dots-container');
            c.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const d = document.createElement('div');
                d.className = 'dot' + (i < round ? ' completed' : (i === round ? ' active' : ''));
                c.appendChild(d);
            }
        }

        function finalizar() {
            clearInterval(timerInt); sndVitoria.play();
            const rel = JOGO_CONFIG.relatorios.find(r => points >= r.min) || JOGO_CONFIG.relatorios[3];
            document.getElementById('game-area').innerHTML = `<div style="text-align:center;"><h2>${rel.titulo}</h2><p>${points} Pontos</p><button onclick="location.reload()" class="btn-jogar">REPETIR</button></div>`;
        }

        window.onload = () => {
            const pathI = JOGO_CONFIG.caminhoIcons, pathImg = JOGO_CONFIG.caminhoImg;
            document.getElementById('header-icon').src = pathI + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('rd-status-btn').src = pathImg + "rd.png";

            // Preencher Menu Hambúrguer (Páginas)
            const menuBox = document.getElementById('dropdownMenu');
            const menuLinks = [{k:'home',n:'Início'},{k:'pre',n:'Pré-Escolar'},{k:'ano1',n:'1º Ano'},{k:'ano2',n:'2º Ano'},{k:'ano3',n:'3º Ano'},{k:'ano4',n:'4º Ano'}];
            menuLinks.forEach(item => {
                const a = document.createElement('a');
                a.className = 'menu-link'; a.href = JOGO_CONFIG.links[item.k];
                a.innerHTML = `<img src="${pathI}${JOGO_CONFIG.iconesMenu[item.k]}"><span>${item.n}</span>`;
                menuBox.appendChild(a);
            });

            // Preencher Menu RD (Categorias do Jogo)
            const catList = document.getElementById('categories-list');
            Object.keys(JOGO_CONFIG.categorias).forEach(key => {
                const cat = JOGO_CONFIG.categorias[key];
                const div = document.createElement('div');
                div.className = 'cat-item';
                div.innerHTML = `<img src="${pathImg}${cat.imgCapa}" style="height:30px;"><span>${cat.nome}</span>`;
                div.onclick = () => { currentCat = key; closeCategoryMenu(); iniciarJogo(); };
                catList.appendChild(div);
            });
            updateDots();
        };
    </script>
</body>
</html>
