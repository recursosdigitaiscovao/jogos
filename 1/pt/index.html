<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Jogos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --text-grey: #5d7082;
            --outer-shadow: 0px 0px 20px #b0c4d9, 0px 0px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            display: flex; flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER */
        header { 
            background: var(--bg-page);
            width: 100%; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center; 
            flex-shrink: 0; 
            z-index: 1000;
            min-height: 100px;
        }

        .header-left { padding: 15px; display: flex; justify-content: center; position: relative; }
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; transition: transform 0.2s; }

        .header-center-content { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #header-icon { height: 70px; width: auto; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); }
        
        .header-titles { display: flex; flex-direction: column; line-height: 1; }
        .title-main { color: var(--primary-blue); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        .title-sub { color: var(--text-grey); font-weight: 400; font-size: 0.75rem; margin-top: 2px; }

        .header-right { width: 80px; }

        /* ÁREA CENTRAL (GRELHA) */
        main {
            flex: 1; 
            overflow-y: auto; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        .game-wrapper { 
            width: 100%;
            max-width: 1200px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            justify-items: center; 
            padding: 10px 10px 30px 10px;
        }

        .intro-text {
            grid-column: 1 / -1; 
            text-align: center; 
            color: var(--text-grey);
            font-weight: 800;
            font-size: 0.9rem; 
            margin: 15px 0;
        }

        /* CARD DOS JOGOS */
        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 160px; min-height: 150px;
            border-radius: 25px; 
            box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; padding: 15px; text-align: center;
            transition: all 0.2s ease;
        }
        .game-card:hover { transform: translateY(-5px); background: #f8fbff; }

        .card-img-container { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .card-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .game-card h2 { color: var(--primary-blue); font-size: 0.8rem; font-weight: 900; margin-top: auto; text-transform: uppercase; }

        /* MENU HAMBURGUER */
        .menu-dropdown { 
            position: absolute; top: 70px; left: 15px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 10px; padding: 12px 18px; 
            background: white; border-radius: 15px; box-shadow: 4px 4px 10px rgba(176, 196, 217, 0.4);
            cursor: pointer; min-width: 200px; text-decoration: none; 
            color: var(--text-grey); font-weight: 700; font-size: 0.9rem;
        }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        .menu-item img { height: 22px; width: 22px; object-fit: contain; }

        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }
        .menu-item-voltar:hover { background: white !important; color: var(--primary-blue) !important; }
        .menu-item-voltar:hover img { filter: none; }

        .menu-divider { height: 1px; background-color: rgba(176, 196, 217, 0.4); margin: 2px 10px; }

        /* FOOTER */
        footer { padding: 15px; text-align: center; color: var(--text-grey); font-weight: 700; font-size: 0.75rem; border-top: 1px solid rgba(176, 196, 217, 0.2); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:transparent; display:none; z-index:1500; }

        @media (min-width: 768px) {
            header { grid-template-columns: 110px 1fr 110px; min-height: 120px; }
            #header-icon { height: 90px; }
            .title-main { font-size: 1.4rem; }
            .game-wrapper { gap: 30px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center-content">
            <img id="header-icon" src="" alt="Ícone">
            <div class="header-titles">
                <div id="txt-titulo1" class="title-main"></div>
                <div id="txt-titulo2" class="title-main"></div>
                <div id="txt-subtitulo" class="title-sub"></div>
            </div>
        </div>
        <div class="header-right"></div>
    </header>

    <main>
        <div id="txt-intro" class="intro-text"></div>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            const overlay = document.getElementById('overlay');
            const isVisible = menu.style.display === 'flex';
            menu.style.display = isVisible ? 'none' : 'flex';
            overlay.style.display = isVisible ? 'none' : 'block';
        }

        function initHub() {
            const config = JOGO_CONFIG;
            
            // 1. Preencher Textos
            document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
            document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
            document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
            document.getElementById('txt-intro').innerText = config.textos.intro;
            document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
            document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

            // 2. Gerar Menu Lateral
            const menuBox = document.getElementById('dropdownMenu');
            const niveis = [
                { label: 'Início', key: 'home' },
                { label: 'Pré-Escolar', key: 'pre' },
                { label: '1º Ano', key: 'ano1' },
                { label: '2º Ano', key: 'ano2' },
                { label: '3º Ano', key: 'ano3' },
                { label: '4º Ano', key: 'ano4' }
            ];

            niveis.forEach(n => {
                if(config.links[n.key]) {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = config.links[n.key];
                    a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[n.key]}"><span>${n.label}</span>`;
                    menuBox.appendChild(a);
                }
            });

            const divider = document.createElement('div');
            divider.className = 'menu-divider';
            menuBox.appendChild(divider);

            const btnVoltar = document.createElement('a');
            btnVoltar.className = 'menu-item menu-item-voltar'; 
            btnVoltar.href = config.links.voltar; 
            btnVoltar.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu.voltar}"><span>VOLTAR</span>`;
            menuBox.appendChild(btnVoltar);

            // 3. Gerar Grelha de Jogos
            const grid = document.getElementById('gamesGrid');
            config.listaJogos.forEach(jogo => {
                const card = document.createElement('a');
                card.className = 'game-card';
                card.href = jogo.link;
                card.innerHTML = `
                    <div class="card-img-container">
                        <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                    </div>
                    <h2>${jogo.nome}</h2>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = initHub;
    </script>
</body>
</html>
