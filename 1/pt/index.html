<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Português</title>
    <style>
        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: #3498db; /* Azul suave para Português */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
            color: white;
        }

        /* HEADER PADRONIZADO */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: #2c3e50;
        }

        header h1 {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 800;
        }

        .btn-voltar-3d {
            text-decoration: none;
            color: #ffffff;
            background-color: #3498db;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2980b9;
            box-shadow: 0 2px 0 #2980b9;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* CONTEÚDO */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            padding: 30px 20px;
            overflow-y: auto;
        }

        .emoji-principal {
            font-size: 5rem;
            margin-bottom: 5px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitulo {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        .menu-jogos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .btn-jogo {
            background-color: white;
            text-decoration: none;
            color: #2c3e50;
            padding: 20px 10px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            box-shadow: 0 6px 0 #2980b9;
            transition: all 0.2s;
        }

        .btn-jogo span { font-size: 2.5rem; }

        .btn-jogo:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2980b9;
        }

        /* FOOTER */
        footer {
            width: 100%;
            padding: 15px;
            background-color: #ffffff;
            text-align: center;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* Mobile ajuste */
        @media (max-width: 400px) {
            .menu-jogos { grid-template-columns: 1fr; }
            .btn-jogo { padding: 15px; flex-direction: row; justify-content: flex-start; gap: 20px; padding-left: 30px;}
            .btn-jogo span { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="../../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../../1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="../../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Português</h1>
        </div>
        <a href="../" class="btn-voltar-3d">
            <span>⬅</span> Voltar
        </a>
    </header>

    <main>
        <div class="emoji-principal">🐥</div>
        <h2>Leitura e Escrita</h2>
        <p class="subtitulo">Qual desafio queres aceitar?</p>

        <nav class="menu-jogos">
            <a href="forca/" class="btn-jogo">
                <span style="color: #e74c3c;">😵</span>
                Jogo da Forca
            </a>
            <a href="sl00/" class="btn-jogo">
                <span style="color: #f1c40f;">🔍</span>
                Sopa de Letras
            </a>
        </nav>
    </main>

    <footer>
        Recursos Digitais Covão - <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
