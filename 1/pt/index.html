<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --text-grey: #5d7082;
            --outer-shadow: 0px 8px 20px rgba(176, 196, 217, 0.5);
            --transition: all 0.3s ease;
        }

        /* RESET E BASE */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Nunito', sans-serif; 
        }

        html { font-size: 16px; } /* Base para rem */

        body { 
            background-color: var(--bg-page); 
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            color: var(--text-grey);
        }

        /* HEADER MOBILE-FIRST */
        header { 
            background: var(--bg-page);
            width: 100%; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center; 
            position: sticky;
            top: 0;
            z-index: 1000;
            min-height: 80px;
            padding: 0 10px;
        }

        .header-left { display: flex; justify-content: center; position: relative; }
        
        .hamburger-btn { 
            font-size: 1.75rem; 
            color: var(--primary-blue); 
            cursor: pointer; 
            padding: 10px; /* Área de toque aumentada */
            min-width: 48px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-center-content { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            padding: 5px 0;
        }

        #header-icon { 
            height: 50px; 
            width: auto; 
            max-width: 60px;
            object-fit: contain;
            filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); 
        }
        
        .header-titles { display: flex; flex-direction: column; line-height: 1.1; }
        .title-main { color: var(--primary-blue); font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }
        .title-sub { color: var(--text-grey); font-weight: 400; font-size: 0.7rem; }

        /* ÁREA CENTRAL */
        main {
            flex: 1; 
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-text {
            width: 100%;
            text-align: center; 
            color: var(--text-grey);
            font-size: 0.85rem; 
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .game-wrapper { 
            width: 100%;
            display: grid; 
            /* Grid fluída: mínimo 140px por card no mobile */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 1.25rem; 
            justify-items: center; 
            padding-bottom: 2rem;
        }

        /* CARD DOS JOGOS */
        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            border-radius: 18px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            text-decoration: none; 
            padding: 1rem; 
            text-align: center;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .game-card:active { transform: scale(0.95); }

        .card-img-container { 
            width: 100%; 
            height: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 0.75rem; 
        }
        .card-img-container img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
        
        .game-card h2 { 
            color: var(--primary-blue); 
            font-size: 0.85rem; 
            font-weight: 900; 
            margin-top: auto;
            line-height: 1.2;
        }

        /* MENU HAMBURGUER */
        .menu-dropdown { 
            position: absolute; 
            top: 70px; 
            left: 0; 
            display: none; 
            flex-direction: column; 
            gap: 0.5rem; 
            z-index: 2000; 
            width: 240px;
        }

        .menu-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 0.75rem 1.25rem; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 4px 4px 10px rgba(176, 196, 217, 0.4);
            cursor: pointer; 
            text-decoration: none; 
            color: var(--text-grey); 
            font-weight: 700; 
            font-size: 0.95rem;
            min-height: 48px; /* Touch target */
            transition: var(--transition);
        }

        .menu-item img { height: 24px; width: 24px; object-fit: contain; }

        .menu-item-voltar { 
            background: var(--primary-blue); 
            color: white; 
        }
        .menu-item-voltar img { filter: brightness(0) invert(1); }

        .menu-divider { 
            height: 1px; 
            background-color: rgba(176, 196, 217, 0.4); 
            margin: 5px 10px; 
        }

        /* FOOTER */
        footer {
            background: var(--bg-page);
            width: 100%;
            padding: 1rem;
            text-align: center;
            border-top: 1px solid rgba(176, 196, 217, 0.3);
            font-weight: 700;
            font-size: 0.75rem;
        }

        /* MEDIA QUERIES - TABLET (481px a 1024px) */
        @media (min-width: 481px) {
            header { grid-template-columns: 80px 1fr 80px; min-height: 100px; }
            #header-icon { height: 70px; max-width: 90px; }
            .title-main { font-size: 1.1rem; }
            .game-wrapper { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
            .card-img-container { height: 90px; }
        }

        /* MEDIA QUERIES - DESKTOP (Acima de 1024px) */
        @media (min-width: 1025px) {
            header { grid-template-columns: 110px 1fr 110px; min-height: 120px; }
            #header-icon { height: 90px; max-width: 120px; }
            .title-main { font-size: 1.4rem; }
            .title-sub { font-size: 0.85rem; }
            .game-card:hover { transform: translateY(-8px); border-color: var(--primary-blue); }
            .menu-item:hover { background: var(--primary-blue); color: white; }
            .menu-item:hover img { filter: brightness(0) invert(1); }
            .game-wrapper { gap: 2rem; }
        }

        /* AJUSTE PARA ORIENTAÇÃO HORIZONTAL EM MOBILE */
        @media (max-height: 500px) and (orientation: landscape) {
            header { min-height: 70px; }
            #header-icon { height: 40px; }
            .game-wrapper { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="hamburger-btn" onclick="toggleMenu(event)" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </div>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center-content">
            <img id="header-icon" src="" alt="Ícone">
            <div class="header-titles">
                <div id="txt-titulo1" class="title-main"></div>
                <div id="txt-titulo2" class="title-main"></div>
                <div id="txt-subtitulo" class="title-sub"></div>
            </div>
        </div>
        <div class="header-right"></div>
    </header>

    <main>
        <div id="txt-intro" class="intro-text"></div>
        <div class="game-wrapper" id="gamesGrid">
            <!-- Cards gerados via JS -->
        </div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => { 
            const menu = document.getElementById('dropdownMenu');
            if(menu) menu.style.display = 'none'; 
        };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // 1. CARREGAR TEXTOS
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;

                // Ícone do Header
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                // 2. GERAR MENU
                const menuBox = document.getElementById('dropdownMenu');
                const niveis = [
                    { label: 'Início', key: 'home' },
                    { label: 'Pré-Escolar', key: 'pre' },
                    { label: '1º Ano', key: 'ano1' },
                    { label: '2º Ano', key: 'ano2' },
                    { label: '3º Ano', key: 'ano3' },
                    { label: '4º Ano', key: 'ano4' }
                ];

                niveis.forEach(n => {
                    if(config.links[n.key]) {
                        const a = document.createElement('a');
                        a.className = 'menu-item';
                        a.href = config.links[n.key];
                        const iconFile = config.iconesMenu[n.key]; 
                        a.innerHTML = `<img src="${config.caminhoIconsMenu}${iconFile}" alt=""><span>${n.label}</span>`;
                        menuBox.appendChild(a);
                    }
                });

                const divider = document.createElement('div');
                divider.className = 'menu-divider';
                menuBox.appendChild(divider);

                // Lógica especial para o botão VOLTAR conforme pedido
                const btnVoltar = document.createElement('a');
                btnVoltar.className = 'menu-item menu-item-voltar'; 
                btnVoltar.href = '../index.html'; 
                
                // Verificação de largura para o ícone do botão voltar
                const isMobile = window.innerWidth <= 480;
                const voltarIcon = isMobile ? 'voltar_az.png' : config.iconesMenu.voltar;
                
                btnVoltar.innerHTML = `<img src="${config.caminhoIconsMenu}${voltarIcon}" alt=""><span>VOLTAR</span>`;
                menuBox.appendChild(btnVoltar);

                // 3. GERAR JOGOS
                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}" loading="lazy">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
