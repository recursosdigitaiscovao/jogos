<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================================
           ÁREA 1: CSS GLOBAL (UI ESTRUTURAL) - NÃO MUDAR
           ========================================================= */
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --highlight-green: #7ed321;
            --error-red: #ff5e5e;
            --text-grey: #5d7082;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER REFORMULADO */
        header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: #f0f7ff; z-index: 1000; flex-shrink: 0;
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4); position: relative;
        }
        .header-left { min-width: 100px; display: flex; align-items: center; z-index: 2005; }
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; }

        .logo-center { 
            display: flex; align-items: center; gap: 10px; 
            position: absolute; left: 50%; transform: translateX(-50%); 
            pointer-events: none; white-space: nowrap; z-index: 10;
        }
        .logo-center img { height: 45px; }
        .logo-text h1 { font-size: 16px; color: var(--primary-blue); font-weight: 900; line-height: 0.9; }
        .logo-text p { font-size: 10px; color: #88a; font-weight: 700; }

        .header-right { min-width: 100px; display: flex; justify-content: flex-end; z-index: 2005; }
        .btn-voltar-header { 
            background: var(--primary-blue); color: white; padding: 8px 16px; border-radius: 12px; 
            text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 14px;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* MENUS */
        .menu-dropdown { 
            position: absolute; top: 65px; left: 15px; display: none; flex-direction: column; 
            gap: 5px; z-index: 3000; background: white; padding: 12px; border-radius: 15px;
            box-shadow: 5px 5px 25px rgba(0,0,0,0.15); min-width: 200px;
        }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px; text-decoration: none; color: var(--text-grey); font-weight: 800; font-size: 14px; border-radius: 10px; }
        .menu-item:hover { background: #f0f7ff; color: var(--primary-blue); }
        .menu-item img { width: 22px; height: 22px; object-fit: contain; }

        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 25px; border-radius: 30px 30px 0 0; transition: 0.4s ease-out; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 2000; }

        /* =========================================================
           ÁREA 2: COMPONENTES DO JOGO (SOPA DE LETRAS)
           ========================================================= */
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 950px; height: 100%; max-height: calc(100dvh - 130px); border-radius: 40px; box-shadow: 0 15px 35px rgba(176,196,217,0.5); display: flex; flex-direction: column; position: relative; padding: 20px; }

        .status-bar { display: none; align-items: center; justify-content: space-between; padding-bottom: 10px; border-bottom: 2px solid rgba(0,0,0,0.03); margin-bottom: 15px; flex-shrink: 0; }
        .screen { flex: 1; display: none; flex-direction: column; width: 100%; min-height: 0; }
        .screen.active { display: flex; }

        .game-main-content { display: flex; justify-content: center; align-items: center; gap: 20px; margin: auto; }
        
        .hint-banner { background: white; padding: 15px; border-radius: 20px; border: 3px dashed #d0e0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; width: clamp(130px, 20vw, 160px); height: clamp(130px, 20vw, 160px); transition: 0.3s; }
        .hint-banner img { width: 85%; height: 85%; object-fit: contain; }
        .hint-banner.feedback-correct { border-color: var(--highlight-green); background: #f1f9ec; }
        .hint-banner.feedback-wrong { border-color: var(--error-red); background: #fff5f5; }

        .grid-wrapper { background: #cbd9e6; padding: 6px; border-radius: 18px; touch-action: none; position: relative; user-select: none; }
        .grid { display: grid; gap: 4px; grid-template-columns: repeat(8, 1fr); }
        .cell { width: clamp(32px, 6vh, 48px); height: clamp(32px, 6vh, 48px); background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: clamp(18px, 3vh, 24px); color: #445; cursor: pointer; }
        .cell.highlight { background: var(--highlight-green); color: white; }
        .cell.selecting { background: #bbdefb; color: var(--primary-dark); transform: scale(1.05); }

        .action-container { position: absolute; bottom: 15px; left: 20px; right: 20px; display: flex; align-items: center; gap: 15px; }
        .btn-jogar-stretch { flex: 1; background: var(--primary-blue); color: white; border: none; border-radius: 20px; padding: 18px; font-size: 24px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); }

        @media (max-width: 650px) {
            .btn-voltar-header { display: none; }
            .game-main-content { flex-direction: column; gap: 15px; }
            .logo-center img { height: 38px; }
            .grid-wrapper { padding: 4px; }
            .cell { width: clamp(30px, 10vw, 40px); height: clamp(30px, 10vw, 40px); }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text">
                <h1>PEQUENOS LEITORES</h1>
                <p>Português | 1º Ano</p>
            </div>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar-header">
                <img id="header-back-icon" src="" alt=""> VOLTAR
            </a>
        </div>
    </header>

    <div class="game-container">
        <div class="game-card">
            
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:#667; font-size:18px;">⏳ 00:00</div>
                <div id="dots" style="display:flex; gap:8px;"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px;">
                    <span id="score-val" style="font-size:20px;">0</span>
                    <img id="rd-game-btn" src="" style="height:30px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <h2 id="main-title" style="text-align:center; color:var(--primary-blue); font-size:28px; font-weight:900; margin-bottom:15px;">SOPA DE LETRAS</h2>

            <!-- ECRÃ 1 -->
            <div class="screen active" id="scr-intro">
                <div class="game-main-content">
                    <div class="hint-banner">
                        <img id="intro-img" src="">
                        <span id="intro-name-label" style="font-weight:900; color:#333; margin-top:5px;">...</span>
                    </div>
                    <div style="text-align:center; color:#5d7082; font-weight:700;">
                        <p>Encontra a palavra na sopa de letras!</p>
                        <p style="font-size:12px; margin-top:5px;">(Desliza o dedo ou o rato)</p>
                    </div>
                </div>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="startGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" style="height:60px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <!-- ECRÃ 2 -->
            <div class="screen" id="scr-game">
                <div class="game-main-content">
                    <div class="hint-banner" id="game-banner">
                        <img id="game-img" src="">
                        <span id="game-name" style="font-weight:900; color:#333;">...</span>
                    </div>
                    <div class="grid-wrapper" id="grid-container">
                        <div class="grid" id="game-grid"></div>
                    </div>
                </div>
            </div>

            <!-- ECRÃ 3 -->
            <div class="screen" id="scr-result" style="justify-content:center; align-items:center; text-align:center;">
                <img id="res-taca" style="width:150px; margin-bottom:15px;" src="">
                <h2 id="res-tit" style="font-size:32px; color: var(--primary-blue); font-weight:900;">MUITO BEM!</h2>
                <div style="display:flex; gap:20px; margin:20px 0;">
                    <div style="background:white; padding:15px 30px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                        <span id="res-pts" style="font-size:28px; font-weight:900; color:var(--primary-blue);">0</span><br><small>PONTOS</small>
                    </div>
                    <div style="background:white; padding:15px 30px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                        <span id="res-tim" style="font-size:28px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small>TEMPO</small>
                    </div>
                </div>
                <button class="btn-jogar-stretch" style="max-width:320px;" onclick="location.reload()">REPETIR JOGO</button>
            </div>
        </div>
    </div>

    <div id="rdMenu" class="rd-panel">
        <h3 style="color:var(--primary-blue); text-align:center; margin-bottom:20px; font-size:22px;">Escolher Tema</h3>
        <div id="rd-list" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:15px;"></div>
    </div>

    <footer id="mainFooter" style="height:45px; display:flex; align-items:center; justify-content:center; color:#89a; font-size:12px; font-weight:700;">
        © Pequenos Leitores - Recursos Educativos
    </footer>

    <script src="dados.js"></script>
    <script>
        /* =========================================================
           ÁREA 3: LÓGICA JS (CORRIGIDA)
           ========================================================= */
        let category = 'animais';
        let roundGlobal = 0;
        let score = 0;
        let timer = 0;
        let timerInt;
        let itemsGame = [];
        let word = "";
        let isDragging = false;
        let selectedCells = [];

        function init() {
            const pI = JOGO_CONFIG.caminhoIcons;
            const pImg = JOGO_CONFIG.caminhoImg;
            
            document.getElementById('head-logo').src = pI + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('header-back-icon').src = pI + "voltar.png";
            document.getElementById('rd-game-btn').src = pImg + "rd.png";
            document.getElementById('rd-intro-btn').src = pImg + "rd.png";

            // Popular Menu Hamburguer
            const m = document.getElementById('dropdownMenu');
            m.innerHTML = '';
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                const label = k === 'home' ? 'Início' : (k === 'pre' ? 'Pré-Escolar' : k.replace('ano', '') + 'º Ano');
                m.innerHTML += `<a href="${JOGO_CONFIG.links[k]}" class="menu-item"><img src="${pI}${JOGO_CONFIG.iconesMenu[k]}"><span>${label}</span></a>`;
            });

            // Popular Temas RD
            const rd = document.getElementById('rd-list');
            rd.innerHTML = '';
            Object.keys(JOGO_CONFIG.categorias).forEach(k => {
                const c = JOGO_CONFIG.categorias[k];
                rd.innerHTML += `<div onclick="selectCat('${k}')" style="background:#f8faff; padding:15px; border-radius:20px; text-align:center; cursor:pointer; border:1px solid #eef2f6;">
                    <img src="${pImg}${c.imgCapa}" style="width:50px; margin-bottom:8px;"><br>
                    <span style="font-weight:800; font-size:14px; color:#5d7082;">${c.nome}</span>
                </div>`;
            });

            updateIntro();
        }

        function toggleHamburger(e) {
            e.stopPropagation();
            const m = document.getElementById('dropdownMenu');
            const over = document.getElementById('overlay');
            const isVisible = m.style.display === 'flex';
            m.style.display = isVisible ? 'none' : 'flex';
            over.style.display = isVisible ? 'none' : 'block';
        }

        function openRDMenu(e) {
            e.stopPropagation();
            document.getElementById('rdMenu').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeMenus() {
            document.getElementById('dropdownMenu').style.display = 'none';
            document.getElementById('rdMenu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        function updateIntro() {
            const item = JOGO_CONFIG.categorias[category].itens[0];
            document.getElementById('intro-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('intro-name-label').innerText = item.nome;
        }

        function selectCat(k) {
            category = k; roundGlobal = 0; score = 0; timer = 0;
            if(timerInt) clearInterval(timerInt);
            closeMenus(); updateIntro(); show('scr-intro');
        }

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            show('scr-game');
            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            const all = [...JOGO_CONFIG.categorias[category].itens];
            itemsGame = all.sort(() => 0.5 - Math.random()).slice(0, 10);
            
            timerInt = setInterval(() => {
                timer++;
                let m = Math.floor(timer/60).toString().padStart(2,'0');
                let s = (timer%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `⏳ ${m}:${s}`;
            }, 1000);
            loadRound();
        }

        function loadRound() {
            const it = itemsGame[roundGlobal];
            word = it.nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            updateDots(5, roundGlobal % 5);
            document.getElementById('game-banner').classList.remove('feedback-correct', 'feedback-wrong');
            document.getElementById('game-name').innerText = it.nome;
            document.getElementById('game-img').src = JOGO_CONFIG.caminhoImg + it.img;
            genGrid();
        }

        function genGrid() {
            const el = document.getElementById('game-grid'); el.innerHTML = '';
            let cells = Array(64).fill('');
            const isH = Math.random() > 0.5;
            const start = isH ? Math.floor(Math.random()*8)*8 + Math.floor(Math.random()*(8-word.length)) : Math.floor(Math.random()*(8-word.length))*8 + Math.floor(Math.random()*8);
            for(let i=0; i<word.length; i++) cells[isH ? start+i : start+(i*8)] = word[i];
            const abc = "ABCDEFGHJKLMNOPQRSTUVWXYZ";
            cells.forEach(c => {
                const d = document.createElement('div'); d.className = 'cell';
                d.innerText = c || abc[Math.floor(Math.random()*abc.length)];
                d.onmousedown = (e) => { e.preventDefault(); startSel(d); };
                d.onmouseenter = () => contSel(d);
                d.ontouchstart = (e) => { e.preventDefault(); startSel(d); };
                el.appendChild(d);
            });
            window.onmouseup = window.ontouchend = endSel;
            document.getElementById('grid-container').ontouchmove = (e) => {
                let t = e.touches[0];
                let target = document.elementFromPoint(t.clientX, t.clientY);
                if (target && target.classList.contains('cell')) contSel(target);
            };
        }

        function startSel(el) { isDragging = true; selectedCells = [el]; el.classList.add('selecting'); }
        function contSel(el) { if (isDragging && !selectedCells.includes(el)) { selectedCells.push(el); el.classList.add('selecting'); } }
        function endSel() {
            if (!isDragging) return; isDragging = false;
            const res = selectedCells.map(c => c.innerText).join('');
            if (res === word) {
                document.getElementById('game-banner').classList.add('feedback-correct');
                selectedCells.forEach(c => { c.classList.remove('selecting'); c.classList.add('highlight'); });
                score += 150; document.getElementById('score-val').innerText = score;
                setTimeout(() => { roundGlobal++; if(roundGlobal >= 10) finish(); else loadRound(); }, 800);
            } else {
                document.getElementById('game-banner').classList.add('feedback-wrong');
                setTimeout(() => document.getElementById('game-banner').classList.remove('feedback-wrong'), 600);
                selectedCells.forEach(c => c.classList.remove('selecting'));
            }
            selectedCells = [];
        }

        function finish() {
            clearInterval(timerInt);
            show('scr-result');
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('res-pts').innerText = score;
            document.getElementById('res-tim').innerText = document.getElementById('timer').innerText.replace('⏳ ','');
            document.getElementById('res-taca').src = JOGO_CONFIG.caminhoIcons + "trofeu.png";
        }

        function updateDots(total, current) {
            const c = document.getElementById('dots'); c.innerHTML = '';
            for(let i=0; i<total; i++) {
                c.innerHTML += `<div style="width:12px; height:12px; border-radius:50%; background:${i <= current ? 'var(--primary-blue)' : '#d0e0f0'}; ${i===current?'transform:scale(1.3)':''}"></div>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
