<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --highlight-green: #7ed321;
            --error-red: #ff5e5e;
            --white: #ffffff;
            --text-grey: #5d7082;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: #f0f7ff; z-index: 1000; flex-shrink: 0;
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
        }
        .header-left { position: relative; }
        .hamburger-btn { font-size: 32px; color: var(--primary-blue); cursor: pointer; padding: 5px; transition: transform 0.2s; }
        .hamburger-btn:hover { transform: scale(1.1); }
        
        .logo-center { display: flex; align-items: center; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); text-align: left; pointer-events: none;}
        .logo-center img { height: 50px; }
        .logo-text h1 { font-size: 18px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 10px; color: #88a; font-weight: 700; }

        /* MENU DROPDOWN */
        .menu-dropdown { position: absolute; top: 60px; left: 0; display: none; flex-direction: column; gap: 8px; z-index: 2000; }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: white; border-radius: 15px; box-shadow: 4px 4px 10px rgba(176, 196, 217, 0.4); cursor: pointer; min-width: 190px; text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.9rem; transition: all 0.2s ease; }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        .menu-item img { height: 20px; width: 20px; object-fit: contain; }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }
        .menu-divider { height: 1px; background-color: rgba(176, 196, 217, 0.4); margin: 2px 10px; }

        /* CONTENTOR JOGO */
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 950px; height: 100%; max-height: calc(100dvh - 130px); border-radius: 40px; box-shadow: 0 15px 35px rgba(176, 196, 217, 0.5); display: flex; flex-direction: column; position: relative; padding: 15px 20px; }

        .status-bar { display: none; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 2px solid rgba(0,0,0,0.03); margin-bottom: 10px; flex-shrink: 0; }
        .dots-container { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #d0e0f0; transition: 0.3s; }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }
        .dot.done { background: var(--primary-blue); }

        .screen { flex: 1; display: none; flex-direction: column; width: 100%; min-height: 0; }
        .screen.active { display: flex; }

        .game-main-content { display: flex; justify-content: center; align-items: center; gap: clamp(15px, 4vw, 50px); width: 100%; flex: 1; min-height: 0; }
        
        /* BANNER */
        .hint-banner { background: white; padding: 10px; border-radius: 10px; border: 2px dashed #d0e0f0; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: clamp(110px, 20vw, 150px); height: clamp(110px, 20vh, 150px); transition: 0.3s; flex-shrink: 0; }
        .hint-banner img { width: 85%; height: 85%; object-fit: contain; }
        .hint-banner span { font-weight: 900; font-size: 18px; color: #333; margin-top: 5px; }
        .hint-banner.feedback-correct { background-color: #e8f5e9 !important; border-color: var(--highlight-green); }
        .hint-banner.feedback-wrong { background-color: #ffebee !important; border-color: var(--error-red); }

        /* GRELHA */
        .grid-wrapper { background: #cbd9e6; padding: 5px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); touch-action: none; position: relative; user-select: none; }
        .grid { display: grid; gap: 3px; grid-template-columns: repeat(8, 1fr); }
        .cell { width: clamp(28px, 5.8vh, 42px); height: clamp(28px, 5.8vh, 42px); background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: clamp(16px, 2.5vh, 22px); color: #445; cursor: pointer; box-shadow: 0 2px 0 #cbd9e6; }
        .cell.highlight { background: var(--highlight-green); color: white; box-shadow: none; }
        .cell.selecting { background: #bbdefb; }

        /* TUTORIAL E SLOTS (ECRÃ 1) */
        .hand-tutorial { position: absolute; color: #f1c40f; font-size: 35px; z-index: 50; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.3); animation: handDrag 3.5s infinite; }
        @keyframes handDrag { 0% { transform: translate(45px, 60px); opacity: 0; } 10% { opacity: 1; } 50% { transform: translate(180px, 60px); opacity: 1; } 65% { opacity: 0; } 100% { opacity: 0; } }

        .slots-area { display: flex; gap: 8px; margin: 15px 0; justify-content: center; min-height: 50px; flex-shrink: 0; }
        .slot { width: clamp(40px, 7vh, 55px); height: clamp(40px, 7vh, 55px); background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; box-shadow: 0 4px 8px rgba(0,0,0,0.05); color: #333; }

        .action-container { position: absolute; bottom: 10px; left: 20px; right: 20px; display: flex; align-items: center; gap: 15px; }
        .btn-jogar-stretch { flex: 1; background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 15px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); }
        
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2100; padding: 20px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 20px rgba(0,0,0,0.1); }
        .rd-panel.active { bottom: 0; }

        /* FEEDBACK */
        #scr-result { justify-content: center; align-items: center; padding-bottom: 25px; }
        .result-trophy { width: clamp(100px, 20vh, 150px); margin-bottom: 5px; }
        .result-tit { font-size: 28px; color: var(--primary-blue); font-weight: 900; }
        .result-msg { color: #667; font-weight: 700; font-size: 14px; margin-bottom: 15px; text-align: center; max-width: 300px; }
        .result-stats-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .stat-item { background: white; padding: 10px 20px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--primary-blue); display: block; }
        .stat-lbl { font-size: 11px; font-weight: 800; color: #89a; }
        .btn-group-final { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
        .btn-final { width: 100%; padding: 12px; border-radius: 15px; border: none; font-weight: 900; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-repeat { background: var(--primary-blue); color: white; box-shadow: 0 4px 0 var(--primary-dark); }
        .btn-themes { background: #fff; color: var(--primary-blue); border: 2px solid var(--primary-blue); }
        .btn-back-games { background: #cbd9e6; color: #445; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 1500; }
        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #89a; font-size: 11px; font-weight: 700; flex-shrink: 0; }

        /* RESPONSIVIDADE MOBILE: Ajuste Grelha + Padding 5px */
        @media (max-width: 650px) {
            .logo-center { position: relative; left: 0; transform: none; margin-left: 5px; }
            .game-main-content { flex-direction: column; gap: 10px; }
            #scr-intro .slots-area { margin-bottom: 75px; }
            
            /* Grelha encostada aos 5px do limite */
            .game-card { padding-left: 5px !important; padding-right: 5px !important; }
            .grid-wrapper { width: calc(100% - 10px); margin: 0 auto; padding: 3px; }
            .grid { gap: 2px; }
            .cell { 
                width: calc((100vw - 30px) / 8); /* Cálculo para forçar 8 colunas no ecrã */
                height: calc((100vw - 30px) / 8); 
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text">
                <h1>PEQUENOS LEITORES</h1>
                <p>Português | 1º Ano</p>
            </div>
        </div>
        <div class="header-right"></div>
    </header>

    <div class="game-container">
        <div class="game-card">
            
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:#667; min-width:80px;">⏳ 00:00</div>
                <div class="dots-container" id="dots"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px; min-width:80px; justify-content:flex-end;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:25px; cursor:pointer;" onclick="openRDMenu()">
                </div>
            </div>

            <h2 class="game-title" id="main-title" style="text-align:center; color:var(--primary-blue); font-size:26px; font-weight:900; margin-bottom:10px;">SOPA DE LETRAS</h2>

            <!-- ECRÃ 1 -->
            <div class="screen active" id="scr-intro">
                <div class="game-main-content">
                    <div class="hint-banner">
                        <img id="intro-img" src="">
                        <span>Gato</span>
                    </div>
                    <div class="grid-wrapper">
                        <i class="fas fa-hand-pointer hand-tutorial"></i>
                        <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
                            <div class="cell">A</div><div class="cell">T</div><div class="cell">M</div><div class="cell">H</div>
                            <div class="cell highlight">G</div><div class="cell highlight">A</div><div class="cell highlight">T</div><div class="cell highlight">O</div>
                            <div class="cell">G</div><div class="cell">S</div><div class="cell">O</div><div class="cell">L</div>
                            <div class="cell">R</div><div class="cell">T</div><div class="cell">O</div><div class="cell">P</div>
                        </div>
                    </div>
                </div>
                <div class="slots-area" style="margin-bottom:80px">
                    <div class="slot" style="border:3px solid #b8d9a7;">G</div><div class="slot" style="border:3px solid #b8d9a7;">A</div><div class="slot" style="border:3px solid #b8d9a7;">T</div><div class="slot" style="border:3px solid #b8d9a7;">O</div>
                </div>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="startGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" style="height:50px; cursor:pointer;" onclick="openRDMenu()">
                </div>
            </div>

            <!-- ECRÃ 2 -->
            <div class="screen" id="scr-game">
                <div class="game-main-content">
                    <div class="hint-banner" id="game-banner">
                        <img id="game-img" src="">
                        <span id="game-name">...</span>
                    </div>
                    <div class="grid-wrapper" id="grid-container">
                        <div class="grid" id="game-grid"></div>
                    </div>
                </div>
            </div>

            <!-- ECRÃ 3 -->
            <div class="screen" id="scr-result">
                <img id="res-taca" class="result-trophy" src="">
                <h2 id="res-tit" class="result-tit"></h2>
                <p id="res-msg" class="result-msg"></p>
                <div class="result-stats-row">
                    <div class="stat-item"><span class="stat-val" id="res-pts">0</span><span class="stat-lbl">Pontos</span></div>
                    <div class="stat-item"><span class="stat-val" id="res-tim">00:00</span><span class="stat-lbl">Tempo</span></div>
                </div>
                <div class="btn-group-final">
                    <button class="btn-final btn-repeat" onclick="location.reload()"><i class="fas fa-redo"></i> REPETIR</button>
                    <button class="btn-final btn-themes" onclick="openRDMenu()"><i class="fas fa-th-large"></i> ESCOLHER TEMA</button>
                    <button class="btn-final btn-back-games" id="btn-back-link"><i class="fas fa-arrow-left"></i> OUTROS JOGOS</button>
                </div>
            </div>
        </div>
    </div>

    <div id="rdMenu" class="rd-panel">
        <div style="width:40px; height:4px; background:#e0e6ed; border-radius:10px; margin: 0 auto 15px;" onclick="closeMenus()"></div>
        <h3 style="color:var(--primary-blue); text-align:center; margin-bottom:15px;">Escolher Tema</h3>
        <div id="rd-list" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>

    <footer>© Pequenos Leitores - Recursos Educativos</footer>

    <script src="dados.js"></script>
    <script>
        let category = 'animais';
        let roundGlobal = 0;
        let score = 0;
        let timer = 0;
        let timerInt;
        let word = "";
        let isDragging = false;
        let selectedCells = [];
        let itemsGame = [];

        function init() {
            const pI = JOGO_CONFIG.caminhoIcons;
            const pImg = JOGO_CONFIG.caminhoImg;
            document.getElementById('head-logo').src = pI + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('rd-game-btn').src = pImg + "rd.png";
            document.getElementById('rd-intro-btn').src = pImg + "rd.png";
            document.getElementById('intro-img').src = pImg + JOGO_CONFIG.categorias.animais.itens[1].img;
            document.getElementById('btn-back-link').onclick = () => window.location.href = JOGO_CONFIG.links.home;

            const menuBox = document.getElementById('dropdownMenu');
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                const label = k === 'home' ? 'Início' : (k === 'pre' ? 'Pré' : k.replace('ano', '') + 'º Ano');
                const a = document.createElement('a'); a.className = 'menu-item'; a.href = JOGO_CONFIG.links[k];
                a.innerHTML = `<img src="${pI}${JOGO_CONFIG.iconesMenu[k]}"><span>${label}</span>`; menuBox.appendChild(a);
            });
            const divider = document.createElement('div'); divider.className = 'menu-divider'; menuBox.appendChild(divider);
            const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = '../index.html'; 
            btnV.innerHTML = `<img src="${pI}voltar.png"><span>VOLTAR</span>`; menuBox.appendChild(btnV);

            const rd = document.getElementById('rd-list');
            Object.keys(JOGO_CONFIG.categorias).forEach(k => {
                const c = JOGO_CONFIG.categorias[k];
                const d = document.createElement('div'); d.className = 'menu-item'; d.style.minWidth = "100%";
                d.innerHTML = `<img src="${pImg}${c.imgCapa}"><span>${c.nome}</span>`;
                d.onclick = () => { selectCat(k); closeMenus(); }; rd.appendChild(d);
            });
        }

        function toggleHamburger(e) { e.stopPropagation(); document.getElementById('dropdownMenu').style.display = (document.getElementById('dropdownMenu').style.display === 'flex') ? 'none' : 'flex'; }
        function openRDMenu() { document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('rdMenu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
        window.onclick = () => closeMenus();

        function startGame() {
            show('scr-game'); document.getElementById('status-bar').style.display = 'flex'; document.getElementById('main-title').style.display = 'none';
            const all = [...JOGO_CONFIG.categorias[category].itens];
            const l1 = all.sort(() => 0.5 - Math.random()).slice(0, 5);
            const l2 = all.sort(() => 0.5 - Math.random()).slice(0, 5);
            itemsGame = [...l1, ...l2];
            timerInt = setInterval(() => {
                timer++; let m = Math.floor(timer/60).toString().padStart(2,'0'); let s = (timer%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `⏳ ${m}:${s}`;
            }, 1000);
            loadRound();
        }

        function loadRound() {
            const it = itemsGame[roundGlobal]; word = it.nome.toUpperCase(); updateDots(5, roundGlobal % 5);
            document.getElementById('game-banner').classList.remove('feedback-correct', 'feedback-wrong');
            document.getElementById('game-name').innerText = it.nome;
            document.getElementById('game-name').style.visibility = roundGlobal >= 5 ? 'hidden' : 'visible';
            document.getElementById('game-img').src = JOGO_CONFIG.caminhoImg + it.img;
            genGrid();
        }

        function genGrid() {
            const el = document.getElementById('game-grid'); el.innerHTML = ''; let cells = Array(64).fill(''); const isH = Math.random() > 0.5;
            const start = isH ? Math.floor(Math.random()*8)*8 + Math.floor(Math.random()*(8-word.length)) : Math.floor(Math.random()*(8-word.length))*8 + Math.floor(Math.random()*8);
            for(let i=0; i<word.length; i++) cells[isH ? start+i : start+(i*8)] = word[i];
            const abc = "ABCDEFGHJKLMNOPQRSTUVWXYZ";
            cells.forEach(c => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c || abc[Math.floor(Math.random()*abc.length)];
                d.onmousedown = (e) => { e.preventDefault(); startSelection(d); }; d.onmouseenter = () => continueSelection(d); d.ontouchstart = (e) => { e.preventDefault(); startSelection(d); }; el.appendChild(d);
            });
            window.onmouseup = window.ontouchend = endSelection;
            document.getElementById('grid-container').ontouchmove = (e) => {
                e.preventDefault(); let touch = e.touches[0]; let target = document.elementFromPoint(touch.clientX, touch.clientY);
                if (target && target.classList.contains('cell')) continueSelection(target);
            };
        }

        function startSelection(el) { if (el.classList.contains('highlight')) return; isDragging = true; selectedCells = [el]; el.classList.add('selecting'); }
        function continueSelection(el) {
            if (!isDragging || el.classList.contains('highlight')) return;
            if (selectedCells.length > 1 && el === selectedCells[selectedCells.length - 2]) { let last = selectedCells.pop(); last.classList.remove('selecting'); return; }
            if (!selectedCells.includes(el)) { selectedCells.push(el); el.classList.add('selecting'); }
        }

        function endSelection() {
            if (!isDragging) return; isDragging = false; const res = selectedCells.map(c => c.innerText).join('');
            const banner = document.getElementById('game-banner');
            if (res === word) {
                banner.classList.add('feedback-correct');
                selectedCells.forEach(el => { el.classList.remove('selecting'); el.classList.add('highlight'); });
                score += 150; document.getElementById('score-val').innerText = score; playSound('acerto');
                setTimeout(() => { roundGlobal++; if(roundGlobal >= 10) finish(); else loadRound(); }, 800);
            } else {
                if(selectedCells.length > 0) { banner.classList.add('feedback-wrong'); playSound('erro'); score = Math.max(0, score - 20); document.getElementById('score-val').innerText = score; setTimeout(() => banner.classList.remove('feedback-wrong'), 800); }
                selectedCells.forEach(el => el.classList.remove('selecting'));
            }
            selectedCells = [];
        }

        function finish() {
            clearInterval(timerInt); playSound('vitoria'); show('scr-result'); document.getElementById('status-bar').style.display = 'none';
            const rep = JOGO_CONFIG.relatorios.find(r => score >= r.min) || JOGO_CONFIG.relatorios[3];
            document.getElementById('res-taca').src = JOGO_CONFIG.caminhoIcons + rep.img;
            document.getElementById('res-tit').innerText = rep.titulo; document.getElementById('res-msg').innerText = rep.msg;
            document.getElementById('res-pts').innerText = score; document.getElementById('res-tim').innerText = document.getElementById('timer').innerText.replace('⏳ ','');
        }

        function updateDots(total, current) {
            const c = document.getElementById('dots'); c.innerHTML = '';
            for(let i=0; i<total; i++) {
                const d = document.createElement('div'); d.className = 'dot' + (i < current ? ' done' : (i === current ? ' active' : '')); c.appendChild(d);
            }
        }

        function selectCat(k) { category = k; roundGlobal = 0; score = 0; timer = 0; closeMenus(); if(document.getElementById('scr-game').classList.contains('active')) startGame(); }
        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function playSound(t) { new Audio(JOGO_CONFIG.sons[t]).play().catch(()=>{}); }
        window.onload = init;
    </script>
</body>
</html>
