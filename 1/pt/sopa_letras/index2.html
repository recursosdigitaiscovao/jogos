<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --highlight-green: #c6e8ba;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* HEADER */
        header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: #f0f7ff; z-index: 1000; flex-shrink: 0;
        }
        .hamburger-btn { font-size: 32px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        
        .logo-center { display: flex; align-items: center; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); text-align: left; }
        .logo-center img { height: 50px; }
        .logo-text h1 { font-size: 18px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 10px; color: #88a; font-weight: 700; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 18px; border-radius: 14px; 
            text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 14px;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* CONTENTOR DO JOGO */
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        
        .game-card { 
            background: #f0f7ff; width: 100%; max-width: 900px; height: 100%; 
            max-height: calc(100dvh - 130px);
            border-radius: 40px; box-shadow: 0 10px 30px rgba(176, 196, 217, 0.4);
            display: flex; flex-direction: column; position: relative; padding: 15px 20px;
        }

        /* STATUS BAR (Sempre visível no PC e Mobile quando no jogo) */
        .status-bar { 
            display: none; /* Ativado via JS no startGame */
            align-items: center; 
            justify-content: space-between; 
            padding: 5px 10px 15px; 
            border-bottom: 2px solid rgba(0,0,0,0.03);
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .dots-container { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #d0e0f0; transition: 0.3s; }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }
        .dot.done { background: var(--highlight-green); }

        /* ECRÃS */
        .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 0; }
        .screen.active { display: flex; }

        /* JOGO OCUPA O RESTO DO CONTENTOR */
        .game-main-content { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: clamp(20px, 4vw, 50px); 
            width: 100%; 
            flex: 1; /* Isto faz com que ocupe o espaço restante */
            min-height: 0; 
        }

        .hint-banner {
            background: white; padding: 12px; border-radius: 5px; border: 2px dashed #d0e0f0; 
            position: relative; display: flex; flex-direction: column; align-items: center; width: clamp(120px, 20vw, 150px);
        }
        .hint-banner img { width: 80%; height: auto; object-fit: contain; }
        .hint-banner span { font-weight: 900; font-size: 20px; color: #333; margin-top: 5px; }

        .grid-wrapper { background: #b2b2b2; padding: 2px; }
        .grid { display: grid; gap: 2px; }
        .cell { 
            width: clamp(38px, 7vh, 48px); 
            height: clamp(38px, 7vh, 48px); 
            background: white; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 22px; color: #333; cursor: pointer;
        }
        .cell.highlight { background: var(--highlight-green); }

        /* SLOTS AREA */
        .slots-area { display: flex; gap: 12px; margin: 15px 0; position: relative; height: clamp(50px, 8vh, 65px); flex-shrink: 0; }
        .slot { width: clamp(50px, 8vh, 65px); height: clamp(50px, 8vh, 65px); background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .slot.active { border: 3px solid #b8d9a7; }

        /* BOTÕES NO FUNDO (ECRÃ 1) */
        .action-container { 
            position: absolute; bottom: 10px; left: 20px; right: 20px; 
            display: flex; align-items: center; gap: 15px; 
        }
        .btn-jogar-stretch { flex: 1; background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); }
        .rd-icon-btn { height: 55px; cursor: pointer; }

        .badge-ano {
            position: absolute; top: 15px; right: 20px; background: #e1edf8; padding: 5px 12px; 
            border-radius: 10px; display: flex; align-items: center; gap: 6px; font-weight: 900; color: var(--primary-blue); font-size: 13px;
        }

        /* FOOTER */
        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #89a; font-size: 11px; font-weight: 700; flex-shrink: 0; }

        @media (max-width: 600px) {
            .btn-voltar, .badge-ano { display: none; }
            .logo-center { position: relative; left: 0; transform: none; margin-left: 5px; }
            .game-main-content { flex-direction: column; gap: 15px; }
            .game-card { padding-bottom: 75px; } /* Espaço para botões no mobile */
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <div id="sideMenu" style="position:fixed; left:-280px; width:280px; height:100%; background:white; z-index:2000; transition:0.3s; padding:20px;">
        <h2 style="color:var(--primary-blue); margin-bottom:15px;">Jogos</h2>
        <div id="side-list"></div>
    </div>
    
    <div id="rdMenu" class="rd-panel" style="position:fixed; bottom:-100%; left:0; width:100%; background:white; z-index:2100; padding:20px; border-radius:30px 30px 0 0; transition:0.4s;">
        <div style="width:40px; height:4px; background:#e0e6ed; border-radius:10px; margin: 0 auto 15px;" onclick="closeMenus()"></div>
        <div id="rd-list"></div>
    </div>

    <header>
        <i class="fas fa-bars hamburger-btn" onclick="openMenu('sideMenu')"></i>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text">
                <h1>PEQUENOS LEITORES</h1>
                <p>Português | 1º Ano</p>
            </div>
        </div>
        <a href="../index.html" class="btn-voltar">
            <img id="back-icon" src="" style="height:20px"> VOLTAR
        </a>
    </header>

    <div class="game-container">
        <div class="game-card">
            
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:#667; min-width:80px;">⏳ 00:00</div>
                <div class="dots-container" id="dots"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px; min-width:80px; justify-content: flex-end;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:25px; cursor:pointer;" onclick="openMenu('rdMenu')">
                </div>
            </div>

            <div class="badge-ano" id="badge-top">
                <img id="badge-icon" src="" style="height:22px"> 1º Ano
            </div>

            <h2 class="game-title" id="main-title">SOPA DE LETRAS</h2>

            <!-- ECRÃ 1 -->
            <div class="screen active" id="scr-intro">
                <div class="game-main-content">
                    <div class="hint-banner">
                        <img id="intro-img" src="">
                        <span>Gato</span>
                    </div>
                    <div class="grid-wrapper">
                        <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
                            <div class="cell">A</div><div class="cell">T</div><div class="cell">M</div><div class="cell">H</div>
                            <div class="cell highlight">G</div><div class="cell highlight">A</div><div class="cell highlight">T</div><div class="cell highlight">O</div>
                            <div class="cell">G</div><div class="cell">S</div><div class="cell">O</div><div class="cell">L</div>
                            <div class="cell">R</div><div class="cell">T</div><div class="cell">O</div><div class="cell">P</div>
                        </div>
                    </div>
                </div>
                <div class="slots-area">
                    <div class="slot active">G</div><div class="slot active">A</div><div class="slot">T</div>
                    <i class="fas fa-hand-pointer" style="position:absolute; color:#f1c40f; font-size:32px; bottom:-10px; left:50%; transform:translateX(-50%); animation: hMove 2s infinite ease-in-out;"></i>
                </div>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="startGame()">JOGAR</button>
                    <img id="rd-intro-btn" class="rd-icon-btn" onclick="openMenu('rdMenu')">
                </div>
            </div>

            <!-- ECRÃ 2 -->
            <div class="screen" id="scr-game">
                <div class="game-main-content">
                    <div class="hint-banner">
                        <img id="game-img" src="">
                        <span id="game-name">...</span>
                    </div>
                    <div class="grid-wrapper">
                        <div class="grid" id="game-grid"></div>
                    </div>
                </div>
                <div class="slots-area" id="game-slots"></div>
            </div>

            <!-- ECRÃ 3 -->
            <div class="screen" id="scr-result">
                <div style="text-align:center;">
                    <h2 id="res-tit" style="font-size:38px; color:var(--primary-blue);">BOM TRABALHO!</h2>
                    <div style="margin: 20px 0; font-size:50px; font-weight:900; color:var(--primary-blue);" id="res-pts">0</div>
                    <p id="res-tim" style="font-weight:800; color:#89a; font-size:18px;"></p>
                    <div class="action-container">
                        <button class="btn-jogar-stretch" onclick="location.reload()">REPETIR</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer>© Pequenos Leitores - Recursos Educativos</footer>

    <script src="dados.js"></script>
    <script>
        let category = 'animais';
        let round = 0;
        let score = 0;
        let timer = 0;
        let timerInt;
        let word = "";
        let progress = "";

        function init() {
            const pI = JOGO_CONFIG.caminhoIcons;
            const pImg = JOGO_CONFIG.caminhoImg;
            
            document.getElementById('head-logo').src = pI + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('badge-icon').src = pI + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('back-icon').src = pI + "voltar.png";
            document.getElementById('rd-game-btn').src = pImg + "rd.png";
            document.getElementById('rd-intro-btn').src = pImg + "rd.png";
            document.getElementById('intro-img').src = pImg + JOGO_CONFIG.categorias.animais.itens[1].img;

            const side = document.getElementById('side-list');
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                side.innerHTML += `<a href="${JOGO_CONFIG.links[k]}" style="display:flex; align-items:center; gap:12px; padding:12px; text-decoration:none; color:#445; font-weight:800;"><img src="${pI}${JOGO_CONFIG.iconesMenu[k]}" style="width:28px;"><span>${k.toUpperCase()}</span></a>`;
            });

            const rd = document.getElementById('rd-list');
            Object.keys(JOGO_CONFIG.categorias).forEach(k => {
                const c = JOGO_CONFIG.categorias[k];
                rd.innerHTML += `<div style="display:flex; align-items:center; gap:12px; padding:12px; cursor:pointer;" onclick="selectCat('${k}')"><img src="${pImg}${c.imgCapa}" style="width:28px;"><span>${c.nome}</span></div>`;
            });
        }

        function startGame() {
            show('scr-game');
            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('badge-top').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            
            timerInt = setInterval(() => {
                timer++;
                let m = Math.floor(timer/60).toString().padStart(2,'0');
                let s = (timer%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `⏳ ${m}:${s}`;
            }, 1000);
            loadRound();
        }

        function loadRound() {
            const it = JOGO_CONFIG.categorias[category].itens[round];
            word = it.nome.toUpperCase();
            progress = "";
            updateDots();
            document.getElementById('game-img').src = JOGO_CONFIG.caminhoImg + it.img;
            document.getElementById('game-name').innerText = it.nome;
            const slots = document.getElementById('game-slots');
            slots.innerHTML = '';
            for(let i=0; i<word.length; i++) slots.innerHTML += `<div class="slot" id="sl-${i}"></div>`;
            genGrid();
        }

        function genGrid() {
            const el = document.getElementById('game-grid');
            const size = 6;
            el.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            el.innerHTML = '';
            let cells = Array(size * size).fill('');
            const isH = Math.random() > 0.5;
            const start = isH 
                ? Math.floor(Math.random()*size)*size + Math.floor(Math.random()*(size-word.length))
                : Math.floor(Math.random()*(size-word.length))*size + Math.floor(Math.random()*size);
            for(let i=0; i<word.length; i++) cells[isH ? start+i : start+(i*size)] = word[i];
            const abc = "ABCDEFGHJKLMNOPQRSTUVWXYZ";
            cells.forEach(c => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c || abc[Math.floor(Math.random()*abc.length)];
                d.onclick = () => selectCell(d); el.appendChild(d);
            });
        }

        function selectCell(el) {
            const target = word[progress.length];
            if(el.innerText === target && !el.classList.contains('highlight')) {
                el.classList.add('highlight');
                document.getElementById(`sl-${progress.length}`).innerText = target;
                document.getElementById(`sl-${progress.length}`).classList.add('active');
                progress += target;
                playSound('acerto');
                if(progress === word) {
                    score += 150; document.getElementById('score-val').innerText = score;
                    setTimeout(() => { round++; if(round >= 5) finish(); else loadRound(); }, 800);
                }
            } else { playSound('erro'); score = Math.max(0, score - 20); document.getElementById('score-val').innerText = score; }
        }

        function finish() {
            clearInterval(timerInt); playSound('vitoria'); show('scr-result');
            document.getElementById('status-bar').style.display = 'none';
            const rep = JOGO_CONFIG.relatorios.find(r => score >= r.min);
            document.getElementById('res-tit').innerText = rep.titulo;
            document.getElementById('res-pts').innerText = score;
            document.getElementById('res-tim').innerText = "Tempo: " + document.getElementById('timer').innerText.replace('⏳','');
        }

        function updateDots() {
            const c = document.getElementById('dots'); c.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div'); d.className = 'dot' + (i < round ? ' done' : (i === round ? ' active' : ''));
                c.appendChild(d);
            }
        }

        function selectCat(k) { category = k; round = 0; score = 0; timer = 0; closeMenus(); if(document.getElementById('scr-game').classList.contains('active')) loadRound(); }
        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function openMenu(id) { document.getElementById(id).style.left = id === 'sideMenu' ? '0' : ''; if(id === 'rdMenu') document.getElementById(id).style.bottom = '0'; document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('sideMenu').style.left = '-280px'; document.getElementById('rdMenu').style.bottom = '-100%'; document.getElementById('overlay').style.display = 'none'; }
        function playSound(t) { new Audio(JOGO_CONFIG.sons[t]).play().catch(()=>{}); }
        window.onload = init;
    </script>
    <style>
        @keyframes hMove { 0%, 100% { transform: translate(-30px, 0); } 50% { transform: translate(30px, 0); } }
    </style>
</body>
</html>
