<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --highlight-green: #c6e8ba;
            --error-red: #ffb3b3;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #f0f7ff; z-index: 1000; flex-shrink: 0; }
        .hamburger-btn { font-size: 32px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        .logo-center { display: flex; align-items: center; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); text-align: left; }
        .logo-center img { height: 50px; }
        .logo-text h1 { font-size: 18px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 10px; color: #88a; font-weight: 700; }
        .btn-voltar { background: var(--primary-blue); color: white; padding: 8px 18px; border-radius: 14px; text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 14px; box-shadow: 0 4px 0 var(--primary-dark); }

        /* CARD */
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 900px; height: 100%; max-height: calc(100dvh - 130px); border-radius: 40px; box-shadow: 0 10px 30px rgba(176, 196, 217, 0.4); display: flex; flex-direction: column; position: relative; padding: 20px; }

        /* STATUS BAR */
        .status-bar { display: none; align-items: center; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 10px; flex-shrink: 0; }
        .dots-container { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #d0e0f0; transition: 0.3s; }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }
        .dot.done { background: var(--primary-blue); }

        /* ECRÃS */
        .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 0; }
        .screen.active { display: flex; }

        /* BANNER */
        .hint-banner { background: white; padding: 12px; border-radius: 5px; border: 2px dashed #d0e0f0; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 135px; height: 140px; transition: 0.3s; flex-shrink: 0; }
        .hint-banner.feedback-correct { background-color: var(--highlight-green) !important; border-color: #8dbd7b; }
        .hint-banner.feedback-wrong { background-color: var(--error-red) !important; border-color: #d68a8a; }
        .hint-banner img { width: 85px; height: 85px; object-fit: contain; margin-bottom: 5px; }
        .hint-banner span { font-weight: 900; font-size: 18px; color: #333; }
        .hint-banner::before, .hint-banner::after { content: ''; position: absolute; top: 50%; height: 20px; background: #f0f7ff; transform: translateY(-50%); width: 10px;}
        .hint-banner::before { left: -7px; border-radius: 0 50px 50px 0; border-right: 2px dashed #d0e0f0; }
        .hint-banner::after { right: -7px; border-radius: 50px 0 0 50px; border-left: 2px dashed #d0e0f0; }

        /* GRELHA */
        .game-main-content { display: flex; justify-content: center; align-items: center; gap: clamp(20px, 5vw, 40px); width: 100%; flex: 1; min-height: 0; }
        .grid-wrapper { background: #b2b2b2; padding: 2px; touch-action: none; user-select: none; }
        .grid { display: grid; gap: 2px; }
        .cell { width: clamp(35px, 6vh, 44px); height: clamp(35px, 6vh, 44px); background: white; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 19px; color: #333; cursor: pointer; }
        .cell.highlight { background: var(--highlight-green); }
        .cell.selecting { background: #e1edf8; border: 1px solid var(--primary-blue); }

        /* SLOTS */
        .slots-area { display: flex; gap: 10px; margin: 10px 0; position: relative; }
        .slot { width: 50px; height: 50px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }

        /* BOTÕES FIXOS */
        .action-container { position: absolute; bottom: 10px; left: 20px; right: 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        .btn-jogar-stretch { flex: 1; background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); }
        .rd-icon-btn { height: 55px; cursor: pointer; }
        
        /* RESULTADOS */
        .result-trophy { width: clamp(100px, 15vh, 140px); margin-bottom: 10px; }
        .result-points-card { background: white; padding: 15px 30px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }

        #scr-intro .slots-area { margin-bottom: 80px; }
        .badge-ano { position: absolute; top: 20px; right: 20px; background: #e1edf8; padding: 5px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; font-weight: 900; color: var(--primary-blue); font-size: 13px; }

        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #89a; font-size: 11px; font-weight: 700; flex-shrink: 0; }

        @media (max-width: 600px) {
            .btn-voltar, .badge-ano { display: none; }
            .logo-center { position: relative; left: 0; transform: none; margin-left: 5px; }
            .game-main-content { flex-direction: column; gap: 10px; }
            #scr-intro .slots-area { margin-bottom: 70px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.2); display:none; z-index:1500;"></div>

    <div id="sideMenu" style="position:fixed; left:-280px; width:280px; height:100%; background:white; z-index:2000; transition:0.3s; padding:20px;">
        <h2 style="color:var(--primary-blue); margin-bottom:15px;">Jogos</h2>
        <div id="side-list"></div>
    </div>
    <div id="rdMenu" style="position:fixed; bottom:-100%; left:0; width:100%; background:white; z-index:2100; padding:20px; border-radius:30px 30px 0 0; transition:0.4s;">
        <div style="width:40px; height:4px; background:#e0e6ed; border-radius:10px; margin: 0 auto 15px;" onclick="closeMenus()"></div>
        <div id="rd-list"></div>
    </div>

    <header>
        <i class="fas fa-bars hamburger-btn" onclick="openMenu('sideMenu')"></i>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text">
                <h1>PEQUENOS LEITORES</h1>
                <p>Português | 1º Ano</p>
            </div>
        </div>
        <a href="../index.html" class="btn-voltar">
            <img id="back-icon" src="" style="height:20px"> VOLTAR
        </a>
    </header>

    <div class="game-container">
        <div class="game-card">
            
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:#667; min-width:80px;">⏳ 00:00</div>
                <div class="dots-container" id="dots"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px; min-width:80px; justify-content:flex-end;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:25px; cursor:pointer;" onclick="openMenu('rdMenu')">
                </div>
            </div>

            <div class="badge-ano" id="top-badge">
                <img id="badge-icon" src="" style="height:22px"> 1º Ano
            </div>

            <h2 class="game-title" id="main-title" style="text-align:center; color:var(--primary-blue); font-size:28px; font-weight:900; margin-bottom:10px;">SOPA DE LETRAS</h2>

            <!-- ECRÃ 1 -->
            <div class="screen active" id="scr-intro">
                <div class="game-main-content">
                    <div class="hint-banner">
                        <img id="intro-img" src="">
                        <span>Gato</span>
                    </div>
                    <div class="grid-wrapper">
                        <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
                            <div class="cell">A</div><div class="cell">T</div><div class="cell">M</div><div class="cell">H</div>
                            <div class="cell highlight">G</div><div class="cell highlight">A</div><div class="cell highlight">T</div><div class="cell highlight">O</div>
                            <div class="cell">G</div><div class="cell">S</div><div class="cell">O</div><div class="cell">L</div>
                            <div class="cell">R</div><div class="cell">T</div><div class="cell">O</div><div class="cell">P</div>
                        </div>
                    </div>
                </div>
                <div class="slots-area">
                    <div class="slot active" style="border:3px solid #b8d9a7;">G</div><div class="slot active" style="border:3px solid #b8d9a7;">A</div><div class="slot">T</div>
                    <i class="fas fa-hand-pointer" style="position:absolute; color:#f1c40f; font-size:32px; bottom:-10px; left:50%; transform:translateX(-50%); animation: hMove 2s infinite ease-in-out;"></i>
                </div>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="startGame()">JOGAR</button>
                    <img id="rd-intro-btn" class="rd-icon-btn" onclick="openMenu('rdMenu')">
                </div>
            </div>

            <!-- ECRÃ 2 -->
            <div class="screen" id="scr-game">
                <div class="game-main-content">
                    <div class="hint-banner" id="game-banner">
                        <img id="game-img" src="">
                        <span id="game-name">...</span>
                    </div>
                    <div class="grid-wrapper">
                        <div class="grid" id="game-grid"></div>
                    </div>
                </div>
                <div class="slots-area" id="game-slots"></div>
            </div>

            <!-- ECRÃ 3 -->
            <div class="screen" id="scr-result">
                <div style="text-align:center;">
                    <img id="res-taca" class="result-trophy" src="">
                    <h2 id="res-tit" style="font-size:30px; color:var(--primary-blue); margin-bottom:5px;"></h2>
                    <p id="res-msg" style="color:#667; font-weight:700; margin-bottom:15px; font-size:14px; padding: 0 10px;"></p>
                    
                    <div class="result-points-card">
                        <div style="font-size:42px; font-weight:900; color:var(--primary-blue); line-height:1;" id="res-pts">0</div>
                        <p style="color:#89a; font-weight:800; font-size:12px; margin-top:5px;">PONTOS</p>
                    </div>
                    
                    <p id="res-tim" style="font-weight:800; color:#89a; font-size:14px;"></p>

                    <div class="action-container">
                        <button class="btn-jogar-stretch" onclick="location.reload()">REPETIR</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer>© Pequenos Leitores - Recursos Educativos</footer>

    <script src="dados.js"></script>
    <script>
        let category = 'animais';
        let round = 0;
        let score = 0;
        let timer = 0;
        let timerInt;
        let word = "";
        let isDragging = false;
        let selectedCells = [];

        function init() {
            const pI = JOGO_CONFIG.caminhoIcons;
            const pImg = JOGO_CONFIG.caminhoImg;
            document.getElementById('head-logo').src = pI + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('badge-icon').src = pI + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('back-icon').src = pI + "voltar.png";
            document.getElementById('rd-game-btn').src = pImg + "rd.png";
            document.getElementById('rd-intro-btn').src = pImg + "rd.png";
            document.getElementById('intro-img').src = pImg + JOGO_CONFIG.categorias.animais.itens[1].img;

            const side = document.getElementById('side-list');
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                side.innerHTML += `<a href="${JOGO_CONFIG.links[k]}" class="menu-item" style="display:flex; align-items:center; gap:12px; padding:12px; text-decoration:none; color:#445; font-weight:800;"><img src="${pI}${JOGO_CONFIG.iconesMenu[k]}" style="width:28px;"><span>${k.toUpperCase()}</span></a>`;
            });

            const rd = document.getElementById('rd-list');
            Object.keys(JOGO_CONFIG.categorias).forEach(k => {
                const c = JOGO_CONFIG.categorias[k];
                rd.innerHTML += `<div class="menu-item" style="display:flex; align-items:center; gap:12px; padding:12px; cursor:pointer;" onclick="selectCat('${k}')"><img src="${pImg}${c.imgCapa}" style="width:28px;"><span>${c.nome}</span></div>`;
            });
        }

        function startGame() {
            show('scr-game');
            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('top-badge').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            if(!timerInt) {
                timerInt = setInterval(() => {
                    timer++;
                    let m = Math.floor(timer/60).toString().padStart(2,'0');
                    let s = (timer%60).toString().padStart(2,'0');
                    document.getElementById('timer').innerText = `⏳ ${m}:${s}`;
                }, 1000);
            }
            loadRound();
        }

        function loadRound() {
            const cat = JOGO_CONFIG.categorias[category];
            const it = cat.itens[round];
            word = it.nome.toUpperCase();
            updateDots(cat.itens.length);
            
            const banner = document.getElementById('game-banner');
            banner.classList.remove('feedback-correct', 'feedback-wrong');
            document.getElementById('game-img').src = JOGO_CONFIG.caminhoImg + it.img;
            document.getElementById('game-name').innerText = it.nome;
            const slots = document.getElementById('game-slots');
            slots.innerHTML = '';
            for(let i=0; i<word.length; i++) slots.innerHTML += `<div class="slot" id="sl-${i}"></div>`;
            genGrid();
        }

        function genGrid() {
            const el = document.getElementById('game-grid');
            const size = 6;
            el.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            el.innerHTML = '';
            let cells = Array(size * size).fill('');
            const isH = Math.random() > 0.5;
            const start = isH 
                ? Math.floor(Math.random()*size)*size + Math.floor(Math.random()*(size-word.length))
                : Math.floor(Math.random()*(size-word.length))*size + Math.floor(Math.random()*size);
            for(let i=0; i<word.length; i++) cells[isH ? start+i : start+(i*size)] = word[i];
            const abc = "ABCDEFGHJKLMNOPQRSTUVWXYZ";
            cells.forEach(c => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c || abc[Math.floor(Math.random()*abc.length)];
                d.onmousedown = () => startSelection(d);
                d.onmouseenter = () => continueSelection(d);
                d.ontouchstart = (e) => { e.preventDefault(); startSelection(d); };
                el.appendChild(d);
            });
            window.onmouseup = endSelection;
            el.ontouchmove = (e) => {
                e.preventDefault();
                let t = e.touches[0];
                let target = document.elementFromPoint(t.clientX, t.clientY);
                if (target && target.classList.contains('cell')) continueSelection(target);
            };
            el.ontouchend = endSelection;
        }

        function startSelection(el) { if (el.classList.contains('highlight')) return; isDragging = true; selectedCells = [el]; el.classList.add('selecting'); }
        function continueSelection(el) { if (!isDragging || selectedCells.includes(el) || el.classList.contains('highlight')) return; selectedCells.push(el); el.classList.add('selecting'); }

        function endSelection() {
            if (!isDragging) return;
            isDragging = false;
            const res = selectedCells.map(c => c.innerText).join('');
            const banner = document.getElementById('game-banner');
            const catItems = JOGO_CONFIG.categorias[category].itens;
            
            if (res === word) {
                banner.classList.add('feedback-correct');
                selectedCells.forEach((el, i) => {
                    el.classList.remove('selecting'); el.classList.add('highlight');
                    document.getElementById(`sl-${i}`).innerText = word[i];
                    document.getElementById(`sl-${i}`).style.border = "3px solid #b8d9a7";
                });
                score += 150; document.getElementById('score-val').innerText = score;
                playSound('acerto');
                setTimeout(() => { 
                    round++; 
                    if(round >= catItems.length) finish(); 
                    else loadRound(); 
                }, 800);
            } else {
                if(selectedCells.length > 0) {
                    banner.classList.add('feedback-wrong'); playSound('erro');
                    score = Math.max(0, score - 20); document.getElementById('score-val').innerText = score;
                    setTimeout(() => banner.classList.remove('feedback-wrong'), 800);
                }
                selectedCells.forEach(el => el.classList.remove('selecting'));
            }
            selectedCells = [];
        }

        function finish() {
            clearInterval(timerInt); 
            playSound('vitoria'); 
            show('scr-result');
            document.getElementById('status-bar').style.display = 'none';
            
            // Encontrar o relatório correto baseado no score
            const rep = JOGO_CONFIG.relatorios.find(r => score >= r.min) || JOGO_CONFIG.relatorios[JOGO_CONFIG.relatorios.length - 1];
            
            document.getElementById('res-taca').src = JOGO_CONFIG.caminhoIcons + rep.img;
            document.getElementById('res-tit').innerText = rep.titulo;
            document.getElementById('res-msg').innerText = rep.msg;
            document.getElementById('res-pts').innerText = score;
            document.getElementById('res-tim').innerText = "Tempo Total: " + document.getElementById('timer').innerText.replace('⏳','');
        }

        function updateDots(total) {
            const c = document.getElementById('dots'); c.innerHTML = '';
            for(let i=0; i<total; i++) {
                const d = document.createElement('div'); d.className = 'dot' + (i < round ? ' done' : (i === round ? ' active' : ''));
                c.appendChild(d);
            }
        }

        function selectCat(k) { category = k; round = 0; score = 0; timer = 0; closeMenus(); if(document.getElementById('scr-game').classList.contains('active')) loadRound(); }
        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function openMenu(id) { if(id === 'sideMenu') document.getElementById(id).style.left = '0'; if(id === 'rdMenu') document.getElementById(id).style.bottom = '0'; document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('sideMenu').style.left = '-280px'; document.getElementById('rdMenu').style.bottom = '-100%'; document.getElementById('overlay').style.display = 'none'; }
        function playSound(t) { new Audio(JOGO_CONFIG.sons[t]).play().catch(()=>{}); }
        window.onload = init;
    </script>
    <style> @keyframes hMove { 0%, 100% { transform: translate(-30px, 0); } 50% { transform: translate(30px, 0); } } </style>
</body>
</html>
