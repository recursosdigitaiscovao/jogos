<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Template</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Importar o CSS do Jogo aqui (ou colocar o fixo aqui) -->
    <style>
        /* [COPIAR A ÁREA 1 E 2 DO CSS DO CÓDIGO ANTERIOR AQUI] */
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text"><h1>PEQUENOS LEITORES</h1><p>Português | 1º Ano</p></div>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar-header"><img id="header-back-icon" src=""> VOLTAR</a>
        </div>
    </header>

    <div class="game-container">
        <div class="game-card">
            <!-- Barra de Status Comum -->
            <div class="status-bar" id="status-bar" style="display:none;">
                <div id="timer">⏳ 00:00</div>
                <div id="dots"></div>
                <div id="score"><span id="score-val">0</span> <img id="rd-game-btn" src=""></div>
            </div>

            <!-- ÁREA ONDE O JOGO VAI SER INJETADO PELO JOGO.JS -->
            <div id="game-screens-wrapper">
                <!-- Os ecrãs scr-intro, scr-game e scr-result vivem aqui -->
            </div>
        </div>
    </div>

    <div id="rdMenu" class="rd-panel"></div>

    <!-- ORDEM DAS SCRIPTS É IMPORTANTE -->
    <script src="dados.js"></script> <!-- 1. Os dados -->
    <script src="jogo.js"></script>  <!-- 2. A lógica do jogo -->
    
    <script>
        // Lógica de interface comum (Menus, etc) fica aqui
        // O jogo.js deve ter uma função init() que é chamada aqui
        window.onload = () => {
            initInterface(); // Função no template para menus
            initJogo();      // Função dentro do jogo.js
        };
    </script>
</body>
</html>
