<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Sopa de Letras</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --highlight-green: #c6e8ba;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: #f8fbff; border-bottom: 1px solid #d0e0f0;
        }
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 10px; }
        .logo-container { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; margin-right: -40px; }
        .logo-container img { height: 50px; }
        .logo-text h1 { font-size: 18px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 1; }
        .logo-text p { font-size: 11px; color: #88a; font-weight: 700; }
        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; border-radius: 12px; 
            text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 14px;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* MENU LATERAL HAMBURGUER */
        #sideMenu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: white; z-index: 3000; transition: 0.4s; padding: 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        #sideMenu.active { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 2999; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 15px; text-decoration: none; color: #556; font-weight: 800; border-radius: 10px; margin-bottom: 5px; }
        .menu-item:hover { background: #f0f7ff; color: var(--primary-blue); }
        .menu-item img { width: 24px; }

        /* GAME LAYOUT */
        .game-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px 20px 20px 20px; }
        .game-card { 
            background: #f8fbff; width: 100%; max-width: 900px; height: 100%; max-height: 550px;
            border-radius: 35px; box-shadow: 0 10px 25px rgba(176, 196, 217, 0.4);
            display: flex; flex-direction: column; position: relative; padding: 20px 40px;
        }

        .badge-ano {
            position: absolute; top: 20px; right: 20px; background: #e1edf8; padding: 4px 12px; 
            border-radius: 10px; display: flex; align-items: center; gap: 6px; font-weight: 900; color: var(--primary-blue); font-size: 14px;
        }

        .game-title { text-align: center; color: var(--primary-blue); font-size: 32px; font-weight: 900; margin-bottom: 20px; letter-spacing: 1px; }

        .game-main-area { display: flex; justify-content: center; align-items: center; gap: 50px; flex: 1; }

        /* BANNER DO ANIMAL */
        .hint-banner {
            background: white; padding: 15px; border-radius: 5px; border: 2px dashed #d0e0f0; 
            position: relative; display: flex; flex-direction: column; align-items: center; width: 160px;
        }
        .hint-banner::before, .hint-banner::after {
            content: ''; position: absolute; top: 50%; width: 12px; height: 24px; background: #f8fbff; transform: translateY(-50%);
        }
        .hint-banner::before { left: -8px; border-radius: 0 50px 50px 0; border-right: 2px dashed #d0e0f0; }
        .hint-banner::after { right: -8px; border-radius: 50px 0 0 50px; border-left: 2px dashed #d0e0f0; }
        .hint-banner img { width: 90px; height: 90px; object-fit: contain; margin-bottom: 5px; }
        .hint-banner span { font-weight: 900; font-size: 18px; color: #444; }

        /* GRELHA SOPA */
        .grid-container { background: #b0c4d9; padding: 2px; }
        .grid { display: grid; gap: 2px; }
        .cell { 
            width: 48px; height: 48px; background: white; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 20px; color: #333; cursor: pointer; user-select: none;
        }
        .cell.selected { background: var(--highlight-green); }

        /* SLOTS DE BAIXO */
        .slots-row { display: flex; justify-content: center; gap: 12px; margin: 20px 0; position: relative; min-height: 60px; }
        .slot {
            width: 55px; height: 55px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .slot.filled { border: 2px solid #b8d9a7; }

        /* BOTÃO JOGAR */
        .btn-jogar-grande {
            width: 100%; background: var(--primary-blue); color: white; border: none; border-radius: 18px; 
            padding: 15px; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark);
        }

        /* MENU RD CATEGORIAS */
        .rd-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 3000;
            border-radius: 30px 30px 0 0; padding: 25px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px;
        }
        .rd-panel.active { bottom: 0; }
        .rd-header-handle { width: 50px; height: 5px; background: #e0e6ed; border-radius: 10px; margin: -10px auto 15px auto; }

        /* FOOTER */
        .game-footer { padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; color: #89a; font-size: 12px; font-weight: 700; }
        .settings-btn { font-size: 28px; color: #a0b0c0; cursor: pointer; }

        /* TUTORIAL MÃO */
        .hand-tutorial {
            position: absolute; color: #f1c40f; font-size: 30px; bottom: -10px; pointer-events: none;
            animation: moveHand 2s infinite ease-in-out; display: none;
        }
        @keyframes moveHand { 0% { transform: translate(-20px, 0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(40px, 0); opacity: 0; } }

        @media (max-width: 600px) {
            .game-main-area { flex-direction: column; gap: 15px; }
            .game-card { padding: 15px; height: auto; max-height: 95vh; }
            .cell { width: 40px; height: 40px; font-size: 18px; }
            .slot { width: 45px; height: 45px; font-size: 22px; }
        }
    </style>
</head>
<body>

    <!-- Overlay p/ fechar menus -->
    <div class="menu-overlay" id="overlay" onclick="closeAllMenus()"></div>

    <!-- Menu Lateral Hamburguer -->
    <div id="sideMenu">
        <h2 style="color:var(--primary-blue); margin-bottom:20px;">Menu</h2>
        <div id="sideMenuItems"></div>
    </div>

    <!-- Menu Inferior RD -->
    <div id="rdMenu" class="rd-panel">
        <div class="rd-header-handle" onclick="closeAllMenus()"></div>
        <h3 style="color:var(--primary-blue); text-align:center; margin-bottom:10px;">Escolher Categoria</h3>
        <div id="rdMenuItems"></div>
    </div>

    <header>
        <i class="fas fa-bars hamburger-btn" onclick="toggleMenu('sideMenu')"></i>
        <div class="logo-container">
            <img id="logo-img" src="" alt="🦒">
            <div class="logo-text">
                <h1>Pequenos Leitores</h1>
                <p>Português | 1º Ano</p>
            </div>
        </div>
        <a href="#" class="btn-voltar">
            <img id="voltar-icon" src="" alt="" style="height:20px">
            VOLTAR
        </a>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            <div class="badge-ano">
                <img id="badge-icon" src="" alt="" style="height:22px">
                1º Ano
            </div>

            <h2 class="game-title">SOPA DE LETRAS</h2>

            <div class="game-main-area">
                <div class="hint-banner">
                    <img id="target-img" src="" alt="">
                    <span id="target-label">...</span>
                </div>

                <div class="grid-container">
                    <div class="grid" id="game-grid"></div>
                </div>
            </div>

            <div class="slots-row" id="word-slots">
                <i class="fas fa-hand-pointer hand-tutorial" id="tutorial-hand"></i>
            </div>

            <button class="btn-jogar-grande" onclick="checkWin()">JOGAR</button>
            
            <i class="fas fa-cog settings-btn" style="position:absolute; bottom:20px; right:25px;" onclick="toggleMenu('rdMenu')"></i>
        </div>
    </div>

    <div class="game-footer">
        <span>© Pequenos Leitores - Recursos Educativos</span>
    </div>

    <script src="dados.js"></script>
    <script>
        let currentCategory = 'animais';
        let currentItemIndex = 0;
        let selectedWord = "";
        let foundWord = "";
        let cellsSelected = [];

        function initApp() {
            // Configuração de Icons/Imagens
            const pIcons = JOGO_CONFIG.caminhoIcons;
            const pImg = JOGO_CONFIG.caminhoImg;
            
            document.getElementById('logo-img').src = pIcons + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('badge-icon').src = pIcons + JOGO_CONFIG.iconesMenu.ano1;
            document.getElementById('voltar-icon').src = pIcons + "voltar.png"; // Verifique se voltar.png existe nesta pasta

            // Menu Hambúrguer
            const sideBox = document.getElementById('sideMenuItems');
            const items = [
                {k:'home', l:'Início'}, {k:'pre', l:'Pré-Escolar'}, {k:'ano1', l:'1º Ano'}, 
                {k:'ano2', l:'2º Ano'}, {k:'ano3', l:'3º Ano'}, {k:'ano4', l:'4º Ano'}
            ];
            items.forEach(it => {
                sideBox.innerHTML += `
                    <a href="${JOGO_CONFIG.links[it.k]}" class="menu-item">
                        <img src="${pIcons}${JOGO_CONFIG.iconesMenu[it.k]}"> <span>${it.l}</span>
                    </a>`;
            });

            // Menu RD (Categorias)
            const rdBox = document.getElementById('rdMenuItems');
            Object.keys(JOGO_CONFIG.categorias).forEach(key => {
                const cat = JOGO_CONFIG.categorias[key];
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.style.cursor = 'pointer';
                div.innerHTML = `<img src="${pImg}${cat.imgCapa}"> <span>${cat.nome}</span>`;
                div.onclick = () => { changeCategory(key); closeAllMenus(); };
                rdBox.appendChild(div);
            });

            loadRound();
        }

        function changeCategory(catKey) {
            currentCategory = catKey;
            currentItemIndex = 0;
            loadRound();
        }

        function loadRound() {
            const cat = JOGO_CONFIG.categorias[currentCategory];
            const item = cat.itens[currentItemIndex];
            selectedWord = item.nome.toUpperCase();
            foundWord = "";
            cellsSelected = [];
            
            document.getElementById('target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('target-label').innerText = item.nome.charAt(0).toUpperCase() + item.nome.slice(1).toLowerCase();

            setupSlots();
            generateGrid();
            
            // Tutorial só na primeira vez
            document.getElementById('tutorial-hand').style.display = (currentItemIndex === 0) ? 'block' : 'none';
        }

        function setupSlots() {
            const container = document.getElementById('word-slots');
            container.innerHTML = '<i class="fas fa-hand-pointer hand-tutorial" id="tutorial-hand"></i>';
            for(let i=0; i < selectedWord.length; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.id = `slot-${i}`;
                container.appendChild(s);
            }
        }

        function generateGrid() {
            const gridEl = document.getElementById('game-grid');
            const size = selectedWord.length > 4 ? 6 : 4; // Ajusta tamanho da grelha se a palavra for grande
            gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridEl.innerHTML = '';

            let cells = Array(size * size).fill('');
            const isHorizontal = Math.random() > 0.5;
            const startPos = isHorizontal 
                ? Math.floor(Math.random() * size) * size + Math.floor(Math.random() * (size - selectedWord.length))
                : Math.floor(Math.random() * (size - selectedWord.length)) * size + Math.floor(Math.random() * size);

            for(let i=0; i < selectedWord.length; i++) {
                cells[isHorizontal ? startPos + i : startPos + (i * size)] = selectedWord[i];
            }

            const abc = "ABCDEFGHJKLMNOPQRSTUVWXYZ";
            cells.forEach((char, idx) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = char || abc[Math.floor(Math.random() * abc.length)];
                div.onclick = () => selectCell(div, idx);
                gridEl.appendChild(div);
            });
        }

        function selectCell(el, idx) {
            if (el.classList.contains('selected')) return;
            
            const nextChar = selectedWord[foundWord.length];
            if (el.innerText === nextChar) {
                el.classList.add('selected');
                document.getElementById(`slot-${foundWord.length}`).innerText = nextChar;
                document.getElementById(`slot-${foundWord.length}`).classList.add('filled');
                foundWord += nextChar;
                
                if (foundWord === selectedWord) {
                    new Audio(JOGO_CONFIG.sons.acerto).play();
                }
            } else {
                new Audio(JOGO_CONFIG.sons.erro).play();
            }
        }

        function checkWin() {
            if (foundWord === selectedWord) {
                currentItemIndex++;
                if (currentItemIndex >= JOGO_CONFIG.categorias[currentCategory].itens.length) {
                    new Audio(JOGO_CONFIG.sons.vitoria).play();
                    alert("Parabéns! Completaste a categoria!");
                    currentItemIndex = 0;
                }
                loadRound();
            }
        }

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            const overlay = document.getElementById('overlay');
            const isActive = menu.classList.contains('active');
            
            closeAllMenus();
            if (!isActive) {
                menu.classList.add('active');
                overlay.style.display = 'block';
            }
        }

        function closeAllMenus() {
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('rdMenu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = initApp;
    </script>
</body>
</html>
