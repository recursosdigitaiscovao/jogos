<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-page: #e9f0f8; --primary-blue: #5ba4e5; --primary-dark: #3d7db8; --highlight-green: #7ed321; --error-red: #ff5e5e; --white: #ffffff; --text-grey: #5d7082; --header-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        header { height: var(--header-h); background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 2500; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); position: relative; }
        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 48px; width: auto; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 8px; color: #88a; font-weight: 700; text-transform: uppercase; }
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        .btn-voltar-mobile { display: none; text-decoration: none; padding: 5px; z-index: 3001; }
        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 7px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 0 var(--primary-dark); }
        .menu-dropdown { position: absolute; top: 65px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 3000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 166px; background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.85rem; min-width: 180px; padding: 10px 15px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 2000; }
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 1000px; height: 100%; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; padding: 20px; position: relative; overflow: hidden; }
        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 13px; color: white; }
        .badge-timer { background: #cbd9e6; color: var(--text-grey); }
        .badge-round { background: var(--primary-blue); box-shadow: 0 3px 0 var(--primary-dark); }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; flex: 1; }
        .screen.active { display: flex !important; }
        #game-main-content { flex: 1; width: 100%; background: var(--white); border: 3px dashed rgba(91, 164, 229, 0.4); border-radius: 30px; display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .btn-jogar-stretch { background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); transition: 0.1s; display: flex; align-items: center; justify-content: center; width: 100%; text-decoration: none; }
        .btn-jogar-stretch:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--primary-dark); }
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 25px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .rd-item { background: #f8f9fa; border: 2px solid #eef5ff; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .rd-item img { width: 60px; height: 60px; object-fit: contain; }
        @media (max-width: 650px) { .btn-voltar-header { display: none !important; } .btn-voltar-mobile { display: flex; align-items: center; } }
        @media (max-height: 500px) and (orientation: landscape) { header { display: none !important; } .game-card { border-radius: 15px; height: 98dvh; } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    <header>
        <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src=""><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
        <div class="header-right"><a href="#" id="link-voltar-header" class="btn-voltar-header"><img id="header-back-icon" src="" width="16"> <span id="txt-voltar-header"></span></a><a href="#" id="link-voltar-mobile" class="btn-voltar-mobile"><img id="header-back-mobile" src="" alt="Voltar" style="height:32px;"></a></div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div style="display:flex; gap:10px;"><div class="badge badge-timer">⏳ <span id="timer-val">00:00</span></div><div class="badge badge-round"><span id="round-val">1 / 10</span></div></div>
                <div style="display:flex; gap:10px;"><div class="badge" style="background:var(--highlight-green);"><i class="fas fa-check"></i> <span id="hits-val">0</span></div><div class="badge" style="background:var(--error-red);"><i class="fas fa-times"></i> <span id="miss-val">0</span></div><img id="rd-game-btn" src="" style="height:28px; cursor:pointer;" onclick="openRDMenu(event)"></div>
            </div>

            <section class="screen active" id="scr-intro">
                <div id="intro-animation-container" style="flex:1; width:100%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.5); border-radius:30px; margin-bottom:15px; border:3px dashed rgba(0,0,0,0.05);"></div>
                <p id="intro-instr" style="font-weight: 800; color: var(--text-grey); text-align: center; margin-bottom: 20px;"></p>
                <div style="display:flex; width:100%; gap:15px; align-items:center;">
                    <button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" onclick="openRDMenu(event)" style="height:55px; cursor:pointer;">
                </div>
            </section>

            <section class="screen" id="scr-game"><div id="game-main-content"></div></section>
            
            <section class="screen" id="scr-result">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
                    <img id="res-taca" style="width:120px; margin-bottom:10px;"><h2 id="res-tit" style="font-size:28px; color: var(--primary-blue); font-weight:900; margin-bottom:15px; text-align:center;"></h2>
                    <div style="display:flex; gap:12px; margin-bottom:20px;">
                        <div style="background:white; padding:10px 20px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.05); min-width:110px;"><span id="res-pts" style="font-size:24px; font-weight:900; color:var(--primary-blue);">0</span><br><small style="font-weight:900; color:#88a;">ACERTOS</small></div>
                        <div style="background:white; padding:10px 20px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.05); min-width:110px;"><span id="res-tim" style="font-size:24px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small style="font-weight:900; color:#88a;">TEMPO</small></div>
                    </div>
                    <div style="display:flex; flex-direction: column; width: 100%; max-width: 400px; gap: 10px;">
                        <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                        <button class="btn-jogar-stretch" style="background:white; color:var(--primary-blue); border:2px solid var(--primary-blue); box-shadow:none; font-size:15px;" onclick="openRDMenu(event)">OUTRO TEMA / NÍVEL</button>
                        <a href="#" id="btn-outro-jogo" class="btn-jogar-stretch" style="background:#cbd9e6; color:#445; box-shadow:none; border:none; font-size:14px;">ESCOLHER OUTRO JOGO</a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel"><h3 style="text-align:center; color:var(--primary-blue); margin-bottom:15px; font-weight: 900;">Escolher Tema</h3><div id="rd-list"></div></div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
    function initUI() {
        const setup = CONFIG_MESTRE; const tema = BIBLIOTECA_TEMAS[setup.area]; const cont = BIBLIOTECA_CONTEUDO[setup.ano][setup.area]; const conf = JOGO_CONFIG;
        document.documentElement.style.setProperty('--primary-blue', tema.corPrimaria);
        document.documentElement.style.setProperty('--primary-dark', tema.corEscura);
        document.documentElement.style.setProperty('--bg-page', tema.corPagina);
        document.getElementById('tit-l1').innerText = cont.t1; document.getElementById('tit-l2').innerText = cont.t2;
        document.getElementById('sub-tit').innerText = cont.sub; document.getElementById('intro-instr').innerText = cont.intro;
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu[setup.ano];
        document.getElementById('header-back-icon').src = conf.caminhoIcons + "voltar.png";
        document.getElementById('header-back-mobile').src = conf.caminhoIcons + tema.voltarMobile;
        document.getElementById('rd-intro-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('link-voltar-header').href = conf.linkVoltar; document.getElementById('link-voltar-mobile').href = conf.linkVoltar;
        document.getElementById('btn-outro-jogo').href = conf.linkVoltar; document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
        const menuBox = document.getElementById('dropdownMenu'); menuBox.innerHTML = '';
        Object.keys(conf.links).forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}" width="20"> <span>${k.toUpperCase()}</span>`;
            menuBox.appendChild(a);
        });
        const rdBox = document.getElementById('rd-list'); rdBox.innerHTML = '';
        Object.keys(conf.categorias).forEach(key => {
            const c = conf.categorias[key]; const div = document.createElement('div'); div.className = 'rd-item';
            div.innerHTML = `<img src="${conf.caminhoImg}${c.imgCapa}"><span>${c.nome}</span>`;
            div.onclick = () => { selecionarCategoria(key); closeMenus(); goToGame(); };
            rdBox.appendChild(div);
        });
        if(window.startLogic) window.startLogic();
    }
    function goToGame() { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-game').classList.add('active');
        document.getElementById('status-bar').style.display = 'flex';
        if(window.initGame) window.initGame();
    }
    window.mostrarResultados = function(acertos, tempo) { 
        const conf = JOGO_CONFIG; let feedback = conf.relatorios.find(p => acertos >= p.min && acertos <= (p.max || 10));
        document.getElementById('res-taca').src = conf.caminhoIcons + feedback.img;
        document.getElementById('res-tit').innerText = feedback.titulo;
        document.getElementById('res-pts').innerText = acertos; document.getElementById('res-tim').innerText = tempo;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-result').classList.add('active');
        document.getElementById('status-bar').style.display = 'none';
    }
    function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); const ov = document.getElementById('overlay'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; ov.style.display = m.style.display; }
    function openRDMenu(e) { if(e) e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    window.onload = initUI;
    </script>
</body>
</html>
