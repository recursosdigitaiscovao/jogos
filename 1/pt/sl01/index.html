<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - 1º Ano</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: rgba(255, 165, 0, 0.1); /* Laranja suave */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: none;
        }

        /* HEADER LARANJA - TEMPLATE_1 */
        header {
            width: 100%; background: #ffffff; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #ff9800; flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #e67e22; }
        .game-icon { font-size: 1.5rem; }
        header h1 { font-size: 1.1rem; color: #e67e22; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #ffffff; background: #ff9800;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; display: flex; align-items: center; gap: 8px;
            border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22;
            transition: 0.1s;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #e67e22; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; 
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #e67e22; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ff9800; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #fff4e5;
            display: flex; align-items: center; gap: 15px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DO JOGO */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        #grid {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; 
            background: white; padding: 10px; border-radius: 15px; 
            border: 3px solid #ff9800; user-select: none; margin-bottom: 15px;
        }
        .cell {
            width: clamp(35px, 10vw, 45px); height: clamp(35px, 10vw, 45px);
            display: flex; align-items: center; justify-content: center;
            background: #fff; border-radius: 8px; font-weight: bold;
            font-size: 1.2rem; cursor: pointer; border: 1px solid #ffe0b2;
        }
        .cell.selected { background: #ff9800; color: white; }
        .cell.found { background: #4caf50; color: white; border-color: #388e3c; cursor: default; }

        /* LISTA DE PALAVRAS */
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 600px; }
        .word-item {
            padding: 8px 15px; background: white; border-radius: 20px;
            border: 2px solid #ffcc80; font-weight: bold; color: #e67e22;
        }
        .word-item.found { opacity: 0.3; text-decoration: line-through; }

        .progresso { margin-top: 15px; font-weight: bold; color: #a67c00; }

        /* MODAL FINAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 152, 0, 0.95); z-index: 300;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        footer { 
            width: 100%; padding: 12px; background: #ffffff; text-align: center; 
            color: #7f8c8d; border-top: 1px solid #ddd; font-size: 0.9rem; flex-shrink: 0; 
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav class="sidebar-menu">
            <a href="/" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="/pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="/1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="/2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="/3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="/4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span class="game-icon">🦁</span>
            <h1>Sopa de Animais</h1>
        </div>
        <a href="../" class="btn-voltar-3d"><span>⬅</span> Voltar</a>
    </header>

    <main>
        <div id="grid"></div>
        <div id="word-list"></div>
        <p class="progresso">Ronda <span id="ronda-atual">1</span> de 5</p>
    </main>

    <div id="modal-next" class="modal">
        <div style="font-size: 5rem; margin-bottom: 20px;">🎉</div>
        <h1 id="modal-title" style="color: white; margin-bottom: 30px;">MUITO BEM!</h1>
        <button class="btn-voltar-3d" style="background:white; color:#ff9800; padding: 15px 40px; font-size: 1.2rem; border:none;" onclick="proximaRonda()">PRÓXIMA RONDA ➡️</button>
    </div>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const animaisPool = ["GATO", "CAO", "PATO", "RATO", "LEAO", "VACA", "URSO", "LOBO", "ZEBRA", "COBRA", "PEIXE", "SAPO", "GALO", "PERU"];
        let ronda = 1;
        let palavrasRonda = [];
        let encontradas = [];
        const tamanhoGrid = 8;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function sortearPalavras() {
            // Sorteia 4 palavras aleatórias do pool
            return [...animaisPool].sort(() => 0.5 - Math.random()).slice(0, 4);
        }

        function initRonda() {
            document.getElementById('ronda-atual').innerText = ronda;
            palavrasRonda = sortearPalavras();
            encontradas = [];
            
            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            
            let matrix = Array(tamanhoGrid).fill().map(() => Array(tamanhoGrid).fill(''));

            // Inserir as 4 palavras sorteadas
            palavrasRonda.forEach(word => {
                let placed = false;
                while(!placed) {
                    let r = Math.floor(Math.random() * tamanhoGrid);
                    let c = Math.floor(Math.random() * (tamanhoGrid - word.length));
                    let spaceOk = true;
                    for(let i=0; i<word.length; i++) if(matrix[r][c+i] !== '') spaceOk = false;
                    
                    if(spaceOk) {
                        for(let i=0; i<word.length; i++) matrix[r][c+i] = word[i];
                        placed = true;
                    }
                }
            });

            // Renderizar Grelha
            for(let r=0; r<tamanhoGrid; r++) {
                for(let c=0; c<tamanhoGrid; c++) {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.innerText = matrix[r][c] !== '' ? matrix[r][c] : "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
                    div.onclick = () => {
                        if(!div.classList.contains('found')) {
                            div.classList.toggle('selected');
                            verificarSelecao();
                        }
                    };
                    gridContainer.appendChild(div);
                }
            }
            renderLista();
        }

        function verificarSelecao() {
            const cells = Array.from(document.querySelectorAll('.cell.selected'));
            if(cells.length < 2) return;

            const palavra = cells.map(c => c.innerText).join('');
            if(palavrasRonda.includes(palavra) && !encontradas.includes(palavra)) {
                encontradas.push(palavra);
                cells.forEach(c => {
                    c.classList.remove('selected');
                    c.classList.add('found');
                });
                renderLista();
                
                if(encontradas.length === palavrasRonda.length) {
                    setTimeout(() => document.getElementById('modal-next').style.display = 'flex', 500);
                }
            }
        }

        function renderLista() {
            const list = document.getElementById('word-list');
            list.innerHTML = palavrasRonda.map(w => 
                `<span class="word-item ${encontradas.includes(w) ? 'found' : ''}">${w}</span>`
            ).join('');
        }

        function proximaRonda() {
            ronda++;
            document.getElementById('modal-next').style.display = 'none';
            if(ronda > 5) {
                ronda = 1;
                alert("Parabéns! Completaste as 5 rondas.");
            }
            initRonda();
        }

        initRonda();
    </script>
</body>
</html>
