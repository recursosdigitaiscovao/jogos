<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - 1º Ano</title>
    <style>
        :root {
            --primary-black: #000000;
            --bg-light: #f4f4f4;
            --white: #ffffff;
            --btn-3d-shadow: #b3b3b3;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-light);
        }

        /* Sidebar */
        aside {
            width: 200px;
            background-color: #333;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Header Ajustado */
        header {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--white);
            position: absolute;
            top: 0;
            left: 200px;
            right: 0;
            border-bottom: none; /* Remoção da linha laranja */
        }

        header .menu-icon {
            font-size: 24px;
            color: var(--primary-black); /* Ícone em preto */
            margin-right: 15px;
            cursor: pointer;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            color: var(--primary-black); /* Título em preto */
        }

        /* Área Principal */
        main {
            flex-grow: 1;
            margin-top: 80px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Botão 3D de Voltar */
        .back-btn {
            background-color: var(--white);
            border: 2px solid var(--primary-black);
            border-bottom: 5px solid var(--btn-3d-shadow);
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            text-decoration: none;
            color: var(--primary-black);
            margin-bottom: 20px;
        }

        .back-btn:active {
            border-bottom-width: 2px;
            transform: translateY(3px);
        }

        /* Jogo - Sopa de Letras */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            gap: 5px;
            margin-bottom: 20px;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: white;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .cell.selected {
            background-color: #ffeb3b;
        }

        /* Rodapé Personalizado */
        footer {
            position: absolute;
            bottom: 0;
            left: 200px;
            right: 0;
            padding: 10px;
            background-color: #eee;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <aside>
        <h3>Níveis</h3>
        <div>Nível 1 (4 Palavras)</div>
        <div>Nível 2 (6 Palavras)</div>
    </aside>

    <header>
        <span class="menu-icon">☰</span>
        <h1>Sopa de Letras</h1>
    </header>

    <main>
        <button class="back-btn">⬅ VOLTAR</button>
        
        <div id="game-info">
            <h2 id="level-title">Nível 1</h2>
            <p>Encontra as palavras escondidas!</p>
        </div>

        <div class="grid" id="letter-grid">
            </div>

        <div id="word-list">
            </div>
    </main>

    <footer>
        Recurso Educativo - 1º Ano de Escolaridade
    </footer>

    <script>
        // Lógica simples para demonstrar os níveis
        const levels = {
            1: ["CASA", "BOLA", "PATO", "DADO"],
            2: ["ESCOLA", "AMIGO", "LIVRO", "CANETA", "LÁPIS", "ALUNO"]
        };

        function generateGrid() {
            const gridElement = document.getElementById('letter-grid');
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = alphabet[Math.floor(Math.random() * alphabet.length)];
                cell.onclick = () => cell.classList.toggle('selected');
                gridElement.appendChild(cell);
            }
        }

        generateGrid();
    </script>
</body>
</html>
