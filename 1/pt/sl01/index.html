<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - 1º Ano</title>
    <style>
        /* [ESTILOS DO TEMPLATE_1 MANTIDOS] */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: rgba(255, 159, 67, 0.15); font-family: 'Segoe UI', sans-serif; height: 100vh; height: 100svh; display: flex; flex-direction: column; overflow: hidden; }
        header { width: 100%; background: #fff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        header h1 { font-size: 1.1rem; color: #2c3e50; font-weight: 800; }
        .btn-voltar-3d { text-decoration: none; color: #000; background: #ff9f43; font-weight: bold; padding: 8px 18px; border-radius: 8px; display: flex; align-items: center; gap: 8px; border: 1px solid #e67e22; box-shadow: 0 2px 0 #e67e22; }
        
        /* ESTILOS ESPECÍFICOS DO JOGO */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; overflow-y: auto; }
        .game-container { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 95%; }
        .grid { display: grid; gap: 5px; margin-bottom: 20px; user-select: none; }
        .cell { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border: 2px solid #ddd; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .cell.selected { background: #ff9f43; color: white; border-color: #e67e22; }
        .cell.found { background: #2ecc71; color: white; border-color: #27ae60; }
        .word-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
        .word-item { padding: 5px 12px; background: #eee; border-radius: 15px; font-weight: bold; color: #7f8c8d; }
        .word-item.found { text-decoration: line-through; background: #2ecc71; color: white; }
        .level-info { margin-bottom: 10px; font-weight: bold; color: #ff9f43; }

        /* SIDEBAR & OVERLAY (TEMPLATE_1) */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2); transition: 0.3s; z-index: 200; padding: 20px; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }
        footer { width: 100%; padding: 12px; background: #fff; text-align: center; border-top: 1px solid #ddd; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>Navegação</h3>
        <nav style="display: flex; flex-direction: column; gap: 10px;">
            <a href="#" class="sidebar-item" style="text-decoration:none; color:#444; padding:10px; background:#f8f9fa; border-radius:8px;">🏠 Início</a>
            <a href="#" class="sidebar-item" style="text-decoration:none; color:#444; padding:10px; background:#f8f9fa; border-radius:8px;">🐥 1º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#eee; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span style="font-size:1.5rem">🔍</span>
            <h1>Sopa de Letras</h1>
        </div>
        <a href="../" class="btn-voltar-3d"><span>⬅</span> Voltar</a>
    </header>

    <main>
        <div class="level-info" id="level-display">Nível 1: Animais</div>
        <div class="game-container">
            <div id="grid" class="grid"></div>
            <div id="word-list" class="word-list"></div>
        </div>
        <button id="next-level" style="display:none; margin-top:20px; padding:10px 20px; background:#2ecc71; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Próximo Nível! 🚀</button>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const levels = [
            { name: "Nível 1: Animais", words: ["GATO", "PATO", "LEÃO", "COEL"], size: 8 },
            { name: "Nível 2: Frutas", words: ["MAÇÃ", "PERA", "UVA", "BANAN", "MELÃO", "KIWI"], size: 10 }
        ];

        let currentLevel = 0;
        let selectedCells = [];
        let wordsFound = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function initGame() {
            const level = levels[currentLevel];
            wordsFound = 0;
            document.getElementById('level-display').innerText = level.name;
            document.getElementById('next-level').style.display = 'none';
            renderGrid(level);
            renderWords(level);
        }

        function renderGrid(level) {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${level.size}, 35px)`;
            gridEl.innerHTML = '';
            
            // Criar matriz vazia
            let matrix = Array(level.size).fill().map(() => Array(level.size).fill(''));

            // Inserir palavras (simplificado para 1º ano: horizontal ou vertical)
            level.words.forEach(word => {
                let placed = false;
                while(!placed) {
                    let isVert = Math.random() > 0.5;
                    let row = Math.floor(Math.random() * (isVert ? level.size - word.length : level.size));
                    let col = Math.floor(Math.random() * (isVert ? level.size : level.size - word.length));
                    
                    let canPlace = true;
                    for(let i=0; i<word.length; i++) {
                        let r = isVert ? row + i : row;
                        let c = isVert ? col : col + i;
                        if(matrix[r][c] !== '' && matrix[r][c] !== word[i]) { canPlace = false; break; }
                    }

                    if(canPlace) {
                        for(let i=0; i<word.length; i++) {
                            let r = isVert ? row + i : row;
                            let c = isVert ? col : col + i;
                            matrix[r][c] = word[i];
                        }
                        placed = true;
                    }
                }
            });

            // Preencher com letras aleatórias e renderizar
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let r=0; r<level.size; r++) {
                for(let c=0; c<level.size; c++) {
                    if(matrix[r][c] === '') matrix[r][c] = alphabet[Math.floor(Math.random()*26)];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = matrix[r][c];
                    cell.dataset.r = r; cell.dataset.c = c;
                    cell.onclick = () => selectCell(cell);
                    gridEl.appendChild(cell);
                }
            }
        }

        function renderWords(level) {
            const listEl = document.getElementById('word-list');
            listEl.innerHTML = '';
            level.words.forEach(word => {
                const item = document.createElement('span');
                item.className = 'word-item';
                item.innerText = word;
                item.id = `word-${word}`;
                listEl.appendChild(item);
            });
        }

        function selectCell(cell) {
            if(cell.classList.contains('found')) return;
            cell.classList.toggle('selected');
            checkSelection();
        }

        function checkSelection() {
            const selected = Array.from(document.querySelectorAll('.cell.selected'));
            const word = selected.map(c => c.innerText).join('');
            const reversedWord = word.split('').reverse().join('');
            
            const currentWords = levels[currentLevel].words;
            if(currentWords.includes(word) || currentWords.includes(reversedWord)) {
                const foundWord = currentWords.includes(word) ? word : reversedWord;
                selected.forEach(c => {
                    c.classList.remove('selected');
                    c.classList.add('found');
                });
                const item = document.getElementById(`word-${foundWord}`);
                if(!item.classList.contains('found')) {
                    item.classList.add('found');
                    wordsFound++;
                }
                if(wordsFound === currentWords.length) {
                    if(currentLevel < levels.length - 1) {
                        document.getElementById('next-level').style.display = 'block';
                    } else {
                        alert("Parabéns! Completaste todos os níveis!");
                    }
                }
            }
        }

        document.getElementById('next-level').onclick = () => {
            currentLevel++;
            initGame();
        };

        initGame();
    </script>
</body>
</html>
