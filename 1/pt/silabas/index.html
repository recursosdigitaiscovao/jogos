<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sílaba a Sílaba - Pré-Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-principal: #e691a7; 
            --cor-vibrante: #d47a92;  
            --cor-fundo: #fff5f7;      
            --cor-texto: #e691a7;      
            --cor-vermelho: #ff4757; 
            --header-height: 70px;
            --cor-jogo-verde: #e691a7;  
            --cor-erro: #ff4757;
            --cor-acerto: #2ed573;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; -webkit-user-select: none; user-select: none; }
        body { background: var(--cor-fundo); font-family: 'Fredoka', sans-serif; display: flex; flex-direction: column; }

        /* Navbar */
        .nav-bar { background: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 15px rgba(0,0,0,0.05); height: var(--header-height); z-index: 1000; flex-shrink: 0; }
        .back-btn { background: var(--cor-principal); color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .back-btn:hover { background: var(--cor-vibrante); transform: scale(1.05); }
        
        /* Novo Menu Lateral Hamburguer */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: white; box-shadow: 10px 0 30px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 30px 20px; background: var(--cor-principal); color: white; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-content { flex: 1; padding: 10px 0; overflow-y: auto; }
        .menu-link { display: flex; align-items: center; padding: 15px 25px; color: #555; text-decoration: none; font-weight: 600; border-left: 5px solid transparent; transition: 0.3s; }
        .menu-link:hover { background: var(--cor-fundo); border-left-color: var(--cor-principal); color: var(--cor-principal); }
        .menu-link img { width: 30px; height: 30px; margin-right: 15px; }

        /* Sidebar Categorias (Rodapé) */
        .sidebar-rd { position: fixed; bottom: -350px; left: 0; width: 100%; height: 320px; background: white; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; border-radius: 40px 40px 0 0; padding: 25px; box-sizing: border-box; }
        .sidebar-rd.active { bottom: 0; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        /* Container do Jogo */
        .main-content { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        .game-card { background: white; border-radius: 40px; padding: 20px; border: 5px solid var(--cor-jogo-verde); display: flex; flex-direction: column; width: 100%; max-width: 950px; height: 100%; box-sizing: border-box; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        /* Top Bar Jogo */
        .game-top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; margin-bottom: 15px; }
        .stars-container { display: flex; gap: 8px; }
        .star-dot { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; }
        
        /* Área Central (Sem fundo branco nas imagens) */
        .game-main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .game-title-header { width: 100%; background: white; border: 4px solid #000; text-align: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 20px; padding: 12px; box-sizing: border-box; letter-spacing: 5px; text-transform: uppercase; }
        .img-display { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .img-display img { max-width: 90%; max-height: 320px; object-fit: contain; }

        /* Bottom Interaction */
        .game-footer { width: 100%; margin-top: 15px; }

        /* Estilos dos Botões de Sílabas */
        .contar-container { display: flex; width: 100%; border: 5px solid #000; border-radius: 12px; overflow: hidden; box-shadow: 0 6px 0 #000; }
        .btn-num { flex: 1; height: 95px; background: white; border-right: 5px solid #000; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-num:last-child { border-right: none; }
        .btn-num:hover { background: #fefefe; transform: translateY(-2px); }

        .slots-area { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .slot { width: 80px; height: 75px; border: 4px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; border-radius: 10px; }
        .slot.filled { background: var(--cor-acerto); color: white; border-color: #000; }
        
        .syllable-options { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .syllable-btn { min-width: 80px; height: 75px; border: 4px solid #000; background: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; cursor: pointer; padding: 0 15px; box-shadow: 6px 6px 0 #000; border-radius: 10px; transition: 0.1s; }
        .syllable-btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0 #000; }
        .syllable-btn.used { visibility: hidden; }

        /* Botões Base */
        .btn-play { background: var(--cor-vermelho); color: white; border: none; font-size: 1.6rem; font-weight: bold; padding: 18px; border-radius: 25px; cursor: pointer; flex: 1; font-family: 'Fredoka'; box-shadow: 0 6px 0 #d63031; transition: 0.2s; }
        .btn-play:active { transform: translateY(3px); box-shadow: 0 3px 0 #d63031; }
        .btn-rd-ui { width: 50px; height: 48px; border-radius: 15px; border: 3px solid var(--cor-principal); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-rd-ui:hover { transform: rotate(15deg); }
        .btn-rd-ui img { width: 28px; height: 28px; object-fit: contain; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: white; padding: 40px; border-radius: 40px; text-align: center; border: 6px solid var(--cor-acerto); width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    
    <!-- Novo Menu lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span style="font-size: 1.5rem; font-weight: bold;">MENU</span>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <div class="sidebar-content">
            <a href="#" class="menu-link">🏠 Início</a>
            <a href="#" class="menu-link"><img class="menu-pre" src=""> Pré-Escolar</a>
            <a href="#" class="menu-link"><img class="menu-1" src=""> 1º Ano</a>
            <a href="#" class="menu-link"><img class="menu-2" src=""> 2º Ano</a>
            <a href="#" class="menu-link"><img class="menu-3" src=""> 3º Ano</a>
            <a href="#" class="menu-link"><img class="menu-4" src=""> 4º Ano</a>
        </div>
    </div>

    <!-- Sidebar RD -->
    <div class="sidebar-rd" id="sidebar-rd">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0; color:var(--cor-principal); font-size: 1.4rem;">Mudar Atividade</h3>
            <button onclick="toggleRD()" style="border:none; background:none; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <div id="categorias-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;"></div>
    </div>

    <header class="nav-bar">
        <button onclick="toggleMenu()" style="background:none; border:none; font-size:32px; color:var(--cor-principal); cursor:pointer;">☰</button>
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="header-icon" src="" style="height:38px;">
            <span style="font-weight: bold; color: var(--cor-principal); font-size: 1.2rem;">Sílabas</span>
        </div>
        <a href="#" class="back-btn">⬅ Sair</a>
    </header>

    <main class="main-content">
        <!-- Tela Inicial -->
        <section id="intro-screen" class="screen active">
            <div class="game-card">
                <div class="game-main-area" style="text-align: center;">
                    <img id="intro-cat-img" src="" style="max-height: 220px; margin-bottom: 25px;">
                    <h2 id="intro-cat-title" style="color:var(--cor-principal); font-size: 2.8rem; margin: 0;"></h2>
                    <p style="color:#888; font-size: 1.2rem; margin-top: 10px;">Vamos descobrir as sílabas das palavras?</p>
                </div>
                
                <div class="intro-btns" style="display:flex; gap:15px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #f0f0f0;">
                    <button class="btn-play" onclick="startGame()">JOGAR</button>
                    <button class="btn-rd-ui" style="width:75px; height:70px; border-radius:25px;" onclick="toggleRD()">
                        <img class="btn-rd-img-ref" src="" style="width:40px; height:40px;">
                    </button>
                </div>
            </div>
        </section>

        <!-- Tela de Jogo -->
        <section id="game-screen" class="screen">
            <div class="game-card">
                <div class="game-top-bar">
                    <div style="font-size: 1.2rem;">⏳ <span id="timer">00:00</span></div>
                    <div class="stars-container" id="stars-bar"></div>
                    <div style="display:flex; align-items:center; gap:15px; font-size: 1.2rem;">
                        PTS: <span id="points">0</span>
                        <button class="btn-rd-ui" onclick="toggleRD()"><img class="btn-rd-img-ref" src=""></button>
                    </div>
                </div>

                <div class="game-main-area">
                    <div id="word-header" class="game-title-header"></div>
                    <div class="img-display">
                        <img id="current-img" src="">
                    </div>
                </div>

                <div class="game-footer" id="game-interaction-area"></div>
            </div>
        </section>
    </main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color:var(--cor-acerto); font-size: 2rem;">Incrível!</h2>
            <div id="modal-msg" style="margin: 25px 0; font-size: 1.3rem;"></div>
            <button class="btn-play" onclick="location.reload()" style="background:var(--cor-acerto); box-shadow: 0 6px 0 #219d53;">Recomeçar</button>
        </div>
    </div>

    <script src="dados.js"></script>
    <script>
        let currentQuestion = 0, points = 0, seconds = 0, timerInterval;
        let currentCatKey = "contar";
        let userSyllables = [];

        window.onload = () => {
            const p = JOGO_CONFIG.caminhoIcons;
            document.getElementById('header-icon').src = p + JOGO_CONFIG.iconesMenu.pre;
            document.querySelector('.menu-pre').src = p + JOGO_CONFIG.iconesMenu.pre;
            document.querySelector('.menu-1').src = p + JOGO_CONFIG.iconesMenu.ano1;
            document.querySelector('.menu-2').src = p + JOGO_CONFIG.iconesMenu.ano2;
            document.querySelector('.menu-3').src = p + JOGO_CONFIG.iconesMenu.ano3;
            document.querySelector('.menu-4').src = p + JOGO_CONFIG.iconesMenu.ano4;
            
            document.querySelectorAll('.btn-rd-img-ref').forEach(img => img.src = JOGO_CONFIG.caminhoImg + "rd.png");
            setupRDMenu();
            updateIntro();
        };

        function setupRDMenu() {
            const container = document.getElementById('categorias-list');
            container.innerHTML = '';
            Object.keys(JOGO_CONFIG.categorias).forEach(key => {
                const cat = JOGO_CONFIG.categorias[key];
                const item = document.createElement('div');
                item.className = 'menu-link';
                item.style.padding = '10px';
                item.style.background = '#f9f9f9';
                item.style.borderRadius = '15px';
                item.style.cursor = 'pointer';
                item.innerHTML = `<img src="${JOGO_CONFIG.caminhoImg + cat.img}"> <span style="font-size:0.9rem">${cat.nome}</span>`;
                item.onclick = () => { currentCatKey = key; closeMenus(); updateIntro(); resetGame(); };
                container.appendChild(item);
            });
        }

        function updateIntro() {
            const cat = JOGO_CONFIG.categorias[currentCatKey];
            document.getElementById('intro-cat-title').innerText = cat.nome;
            document.getElementById('intro-cat-img').src = JOGO_CONFIG.caminhoImg + cat.img;
        }

        function startGame() {
            document.getElementById('intro-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            startTimer();
            initStars();
            loadRound();
        }

        function initStars() {
            const bar = document.getElementById('stars-bar');
            bar.innerHTML = '';
            // Fixado em 5 rondas
            for(let i=0; i<5; i++) {
                const dot = document.createElement('div');
                dot.className = 'star-dot';
                bar.appendChild(dot);
            }
        }

        function loadRound() {
            const cat = JOGO_CONFIG.categorias[currentCatKey];
            const item = cat.itens[currentQuestion];
            const footer = document.getElementById('game-interaction-area');
            const header = document.getElementById('word-header');
            
            // Rigor: Não aparece o nome se for Ordenar
            if(cat.tipo === 'ordenar') {
                header.style.display = 'none';
            } else {
                header.style.display = 'block';
                header.innerText = item.nome;
            }

            document.getElementById('current-img').src = JOGO_CONFIG.caminhoImg + item.img;
            footer.innerHTML = '';
            userSyllables = [];

            if(cat.tipo === 'contar') {
                const grid = document.createElement('div');
                grid.className = 'contar-container';
                [1,2,3,4].forEach(n => {
                    const b = document.createElement('div');
                    b.className = 'btn-num';
                    b.innerText = n;
                    b.onclick = () => checkContar(n);
                    grid.appendChild(b);
                });
                footer.appendChild(grid);
            } else {
                const slotsArea = document.createElement('div');
                slotsArea.className = 'slots-area';
                const syllaArray = item.divisao.split('-');
                
                syllaArray.forEach(() => {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slotsArea.appendChild(slot);
                });
                footer.appendChild(slotsArea);

                const optsArea = document.createElement('div');
                optsArea.className = 'syllable-options';
                const shuffled = [...syllaArray].sort(() => Math.random() - 0.5);
                shuffled.forEach(syl => {
                    const btn = document.createElement('div');
                    btn.className = 'syllable-btn';
                    btn.innerText = syl;
                    btn.onclick = () => {
                        if(userSyllables.length < syllaArray.length && !btn.classList.contains('used')) {
                            btn.classList.add('used');
                            const slots = document.querySelectorAll('.slot');
                            slots[userSyllables.length].innerText = syl;
                            slots[userSyllables.length].classList.add('filled');
                            userSyllables.push(syl);
                            if(userSyllables.length === syllaArray.length) checkOrder(syllaArray);
                        }
                    };
                    optsArea.appendChild(btn);
                });
                footer.appendChild(optsArea);
            }
        }

        function checkContar(val) {
            const correct = JOGO_CONFIG.categorias.contar.itens[currentQuestion].divisao.split('-').length;
            processStep(val === correct);
        }

        function checkOrder(correctArray) {
            const isOk = userSyllables.every((v, i) => v === correctArray[i]);
            processStep(isOk);
        }

        function processStep(isCorrect) {
            const dots = document.querySelectorAll('.star-dot');
            if(isCorrect) {
                points++;
                document.getElementById('points').innerText = points;
                dots[currentQuestion].style.background = "var(--cor-acerto)";
                dots[currentQuestion].style.borderColor = "var(--cor-acerto)";
                dots[currentQuestion].innerText = "✔";
            } else {
                dots[currentQuestion].style.background = "var(--cor-erro)";
                dots[currentQuestion].style.borderColor = "var(--cor-erro)";
                dots[currentQuestion].innerText = "X";
            }

            currentQuestion++;
            setTimeout(() => {
                if(currentQuestion < 5) loadRound();
                else endGame();
            }, 600);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = `${Math.floor(seconds/60).toString().padStart(2,'0')}:${(seconds%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            const rel = JOGO_CONFIG.relatorio;
            document.getElementById('modal-msg').innerHTML = `<p>${rel.pontosTotal} <span style="font-size:2rem; color:var(--cor-acerto)">${points}</span>/5</p><p>${rel.tempoTotal} <b>${document.getElementById('timer').innerText}</b></p>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function resetGame() {
            currentQuestion = 0; points = 0; seconds = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('points').innerText = "0";
            document.getElementById('intro-screen').classList.add('active');
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('modal').style.display = 'none';
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function toggleRD() { document.getElementById('sidebar-rd').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function closeMenus() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('sidebar-rd').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
    </script>
</body>
</html>
