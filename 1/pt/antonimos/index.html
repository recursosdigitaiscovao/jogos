<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carregando...</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-page: #e9f0f8; --bg-header: #ffffff; --bg-container: #e9f0f8; 
            --bg-card: #ffffff; --cor-borda-card: transparent; --sombra-card: 0 15px 35px rgba(0,0,0,0.1);
            --bg-espaco-jogo: #ffffff; --borda-espaco-jogo: 3px dashed #ccc;
            --primary-blue: #5ba4e5; --primary-dark: #3d7db8; --white: #ffffff; --text-grey: #5d7082; --header-h: 70px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.15s ease-in; }
        
        header { height: var(--header-h); background: var(--bg-header); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 2500; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); position: relative; }
        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 45px; width: auto; }
        .logo-text h1 { font-size: 16px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 8px; color: #88a; font-weight: 700; text-transform: uppercase; }

        .btn-voltar-mobile { display: flex; align-items: center; text-decoration: none; padding: 5px; z-index: 3001; }
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 5px; }

        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; background-color: var(--bg-container); overflow: hidden; }
        .game-card { background: var(--bg-card); width: 100%; max-width: 1000px; height: 100%; border-radius: 35px; box-shadow: var(--sombra-card); border: 4px solid var(--cor-borda-card); display: flex; flex-direction: column; padding: 12px; position: relative; overflow: hidden; }

        .screen-box { flex: 1; width: 100%; background: var(--bg-espaco-jogo); border: var(--borda-espaco-jogo); border-radius: 25px; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-shrink: 0; padding: 0 10px; }
        .badge { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 11px; color: white; }
        .badge-round { background: var(--primary-blue); }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex !important; }

        /* AJUSTES LANDSCAPE */
        @media screen and (max-height: 550px) and (orientation: landscape) {
            body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
            header { display: none !important; }
            .game-container { padding: 5px; height: auto !important; min-height: 100vh; overflow: visible; }
            .game-card { border-radius: 15px; padding: 10px; height: auto !important; min-height: 95vh; overflow: visible; }
            .screen-box { height: auto !important; min-height: 400px; overflow: visible; border-radius: 20px; }
            .screen { height: auto !important; overflow: visible; }
        }

        /* ECRÃ RESULTADOS DISTRIBUÍDO */
        .res-inner { display: flex; flex-direction: column; align-items: center; justify-content: space-around; width: 100%; height: 100%; padding: 15px; text-align: center; }
        .res-trophy { height: clamp(80px, 15vh, 120px); filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        .res-title { color: var(--primary-blue); font-weight: 900; font-size: 1.8rem; margin: 5px 0; }
        
        .res-grid { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .res-card { background: white; flex: 1; border-radius: 22px; padding: 15px 5px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(0,0,0,0.03); }
        .res-card .num { font-size: 2rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .res-card .label { font-size: 0.65rem; font-weight: 800; color: #88a; text-transform: uppercase; }
        .res-card i { font-size: 1.1rem; margin-top: 8px; opacity: 0.4; }

        .res-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 350px; }
        .btn-res { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 15px; border-radius: 22px; font-weight: 900; font-size: 1.05rem; text-transform: uppercase; cursor: pointer; border: none; text-decoration: none; transition: 0.1s; width: 100%; }
        .btn-res-play { background: var(--primary-blue); color: white; box-shadow: 0 6px 0 var(--primary-dark); }
        .btn-res-levels { background: white; color: var(--primary-blue); border: 3px solid var(--primary-blue); box-shadow: 0 6px 0 var(--primary-blue); }
        .btn-res-exit { background: #dce4ee; color: #5d7082; box-shadow: 0 6px 0 #b8c5d4; }
        .btn-res:active { transform: translateY(3px); box-shadow: none; }

        /* Menu RD Panel */
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 20px; border-radius: 25px 25px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .rd-item { background: #f8f9fa; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; font-weight: 700; color: var(--text-grey); font-size: 0.85rem; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    
    <header>
        <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src=""><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
        <div class="header-right"><a href="#" id="link-voltar-mobile" class="btn-voltar-mobile"><img id="header-back-mobile" src="" alt="Voltar" style="height:30px;"></a></div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div class="status-group" style="display:flex; gap:12px; align-items:center;">
                    <img id="help-btn" src="" onclick="darAjuda()" style="height:38px; width:38px; cursor:pointer; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));">
                    <div class="badge badge-round"><span id="round-val">1 / 10</span></div>
                </div>
                <div class="status-group" style="display:flex; gap:10px; align-items:center;">
                    <div class="badge" style="background:#7ed321;">✓ <span id="hits-val">0</span></div>
                    <div class="badge" style="background:#ff5e5e;">✗ <span id="miss-val">0</span></div>
                    <img id="rd-game-btn" src="" style="height:30px; width:30px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <section class="screen active" id="scr-intro">
                <div class="screen-box" style="justify-content: space-around; align-items: center; padding: 25px;">
                    <div id="intro-animation-container" style="flex: 1; display: flex; align-items: center; justify-content: center; width: 100%;"></div>
                    <p id="intro-instr" style="font-weight: 800; color: var(--text-grey); text-align: center; margin-bottom: 20px; font-size: 1.1rem; max-width: 400px;"></p>
                    <div style="display: flex; width: 100%; gap: 15px; align-items: center; max-width: 450px;">
                        <button style="background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 18px; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); flex: 1;" onclick="goToGame()">JOGAR</button>
                        <img id="rd-intro-btn" src="" onclick="openRDMenu(event)" style="height:60px; width:60px; cursor:pointer; flex-shrink: 0;">
                    </div>
                </div>
            </section>

            <section class="screen" id="scr-game"><div class="screen-box" id="game-main-content"></div></section>
            <section class="screen" id="scr-result"></section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel">
        <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:15px; font-weight: 900; font-size: 1.2rem;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <script src="categorias.js"></script><script src="dados.js"></script><script src="jogo.js"></script>

    <script>
    function initUI() {
        const setup = CONFIG_MESTRE; const tema = BIBLIOTECA_TEMAS[setup.area]; const conf = JOGO_CONFIG;
        const cont = (BIBLIOTECA_CONTEUDO[setup.ano] && BIBLIOTECA_CONTEUDO[setup.ano][setup.area]) ? BIBLIOTECA_CONTEUDO[setup.ano][setup.area] : {};
        document.title = setup.nomeJogo;
        const root = document.documentElement;
        root.style.setProperty('--primary-blue', tema.corPrimaria); root.style.setProperty('--primary-dark', tema.corEscura); root.style.setProperty('--bg-page', tema.corPagina);
        root.style.setProperty('--bg-header', cont.corHeader || tema.corHeader || '#ffffff');
        root.style.setProperty('--bg-container', cont.corContainer || tema.corContainer || tema.corPagina);
        root.style.setProperty('--bg-card', cont.corCard || tema.corCard || '#ffffff');
        root.style.setProperty('--cor-borda-card', cont.bordaCard || tema.bordaCard || 'transparent');
        root.style.setProperty('--bg-espaco-jogo', cont.corEspacoJogo || tema.corEspacoJogo || '#ffffff');
        root.style.setProperty('--borda-espaco-jogo', cont.bordaEspacoJogo || tema.bordaEspacoJogo || '3px dashed #ccc');
        document.body.style.opacity = '1';
        document.getElementById('tit-l1').innerText = cont.t1 || ""; document.getElementById('tit-l2').innerText = cont.t2 || ""; document.getElementById('sub-tit').innerText = cont.sub || ""; 
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu[setup.ano];
        document.getElementById('link-voltar-mobile').href = conf.linkVoltar;
        document.getElementById('header-back-mobile').src = conf.caminhoIcons + tema.voltarMobile;
        document.getElementById('rd-intro-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('help-btn').src = conf.caminhoImg + "lampada.png";
        if(window.gerarIntroJogo) document.getElementById('intro-instr').innerText = window.gerarIntroJogo();
        
        const menuBox = document.getElementById('dropdownMenu'); menuBox.innerHTML = '';
        ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}" width="20"><span>${k}</span>`; menuBox.appendChild(a);
        });
        if(window.startLogic) window.startLogic();
    }
    function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); const ov = document.getElementById('overlay'); const isOpen = m.style.display === 'flex'; m.style.display = isOpen ? 'none' : 'flex'; ov.style.display = isOpen ? 'none' : 'block'; }
    function openRDMenu(e) { if(e) e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { if(document.getElementById('dropdownMenu')) document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('rdMenu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    function goToIntro() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-intro').classList.add('active'); document.getElementById('status-bar').style.display = 'none'; }
    function goToGame() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-game').classList.add('active'); document.getElementById('status-bar').style.display = 'flex'; if(window.initGame) window.initGame(); }
    window.onload = initUI;
    </script>
</body>
</html>
