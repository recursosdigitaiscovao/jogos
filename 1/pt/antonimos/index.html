<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fábrica de Palavras</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-page: #e9f0f8; --bg-header: #ffffff; --bg-container: #e9f0f8; 
            --bg-card: #ffffff; --cor-borda-card: transparent; --sombra-card: 0 15px 35px rgba(0,0,0,0.1);
            --bg-espaco-jogo: #ffffff; --borda-espaco-jogo: 3px dashed #5ba4e5;
            --primary-blue: #5ba4e5; --primary-dark: #3d7db8; --white: #ffffff; --text-grey: #5d7082; --header-h: 70px; 
            --cor-acerto: #7ed321; --cor-erro: #ff5e5e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.15s ease-in; }
        
        header { height: var(--header-h); background: var(--bg-header); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 2500; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); position: relative; }
        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 45px; width: auto; }
        .logo-text h1 { font-size: 16px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 8px; color: #88a; font-weight: 700; text-transform: uppercase; }

        /* MENU HAMBURGUER UNIFORME */
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 5px; z-index: 3001; }
        .menu-dropdown { position: absolute; top: 65px; left: 15px; display: none; flex-direction: column; gap: 8px; z-index: 3000; width: 220px; }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 0 15px; 
            background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); 
            text-decoration: none; color: var(--text-grey); font-weight: 700; 
            font-size: 0.9rem; border: 1px solid #eee; height: 50px; width: 100%;
        }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }

        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; background-color: var(--bg-container); overflow: hidden; }
        .game-card { background: var(--bg-card); width: 100%; max-width: 1100px; height: 100%; border-radius: 35px; box-shadow: var(--sombra-card); display: flex; flex-direction: column; padding: 15px; position: relative; overflow: hidden; }

        .screen-box { flex: 1; width: 100%; background: var(--bg-espaco-jogo); border: var(--borda-espaco-jogo); border-radius: 30px; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* BARRA DE STATUS (IGUAL À IMAGEM) */
        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; padding: 0 5px; }
        .status-left, .status-right { display: flex; align-items: center; gap: 10px; }
        .badge { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 14px; border-radius: 12px; font-weight: 900; font-size: 13px; color: white; }
        .badge-round { background: var(--primary-blue); }
        .badge-hits { background: var(--cor-acerto); }
        .badge-miss { background: var(--cor-erro); }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex !important; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 2000; }
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 25px; border-radius: 30px 30px 0 0; transition: 0.4s; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .rd-item { background: #f8f9fa; border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; font-weight: 800; border: 2px solid #eee; }

        @media screen and (max-height: 550px) and (orientation: landscape) {
            header { display: none !important; }
            .game-card { border-radius: 15px; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    <header>
        <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src=""><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
        <div class="header-right"><a href="#" id="link-voltar-mobile" class="btn-voltar-mobile"><img id="header-back-mobile" src="" style="height:35px;"></a></div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div class="status-left">
                    <img id="help-btn" src="" onclick="darAjuda()" style="height:45px; width:45px; cursor:pointer;">
                    <div class="badge badge-round"><span id="round-val">1 / 10</span></div>
                </div>
                <div class="status-right">
                    <div class="badge badge-hits">✓ <span id="hits-val">0</span></div>
                    <div class="badge badge-miss">✗ <span id="miss-val">0</span></div>
                    <img id="rd-game-btn" src="" style="height:35px; width:35px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <section class="screen active" id="scr-intro">
                <div class="screen-box" style="justify-content: space-around; align-items: center; padding: 30px;">
                    <div id="intro-animation-container" style="flex: 1; display: flex; align-items: center; justify-content: center;"></div>
                    <p id="intro-instr" style="font-weight: 800; color: var(--text-grey); text-align: center; font-size: 1.2rem;"></p>
                    <button style="background: var(--primary-blue); color: white; border: none; border-radius: 20px; padding: 20px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); width: 80%; max-width: 400px;" onclick="goToGame()">JOGAR</button>
                </div>
            </section>

            <section class="screen" id="scr-game"><div class="screen-box" id="game-main-content"></div></section>
            <section class="screen" id="scr-result"></section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel">
        <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:20px; font-weight: 900;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <script src="categorias.js"></script><script src="dados.js"></script><script src="jogo.js"></script>

    <script>
    function initUI() {
        const setup = CONFIG_MESTRE; const tema = BIBLIOTECA_TEMAS[setup.area]; const conf = JOGO_CONFIG;
        const cont = (BIBLIOTECA_CONTEUDO[setup.ano] && BIBLIOTECA_CONTEUDO[setup.ano][setup.area]) ? BIBLIOTECA_CONTEUDO[setup.ano][setup.area] : {};
        const root = document.documentElement;
        root.style.setProperty('--primary-blue', tema.corPrimaria); root.style.setProperty('--primary-dark', tema.corEscura); root.style.setProperty('--bg-page', tema.corPagina);
        root.style.setProperty('--borda-espaco-jogo', `3px dashed ${tema.corPrimaria}`);
        document.body.style.opacity = '1';
        document.getElementById('tit-l1').innerText = cont.t1 || ""; document.getElementById('tit-l2').innerText = cont.t2 || ""; document.getElementById('sub-tit').innerText = cont.sub || ""; 
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu[setup.ano];
        document.getElementById('header-back-mobile').src = conf.caminhoIcons + tema.voltarMobile;
        document.getElementById('rd-intro-btn')?.remove(); // Limpeza de versões antigas
        document.getElementById('help-btn').src = conf.caminhoImg + "lampada.png";
        document.getElementById('rd-game-btn').src = conf.caminhoIcons + "engrenagem.png"; // Usando ícone de engrenagem da imagem

        const menuBox = document.getElementById('dropdownMenu'); menuBox.innerHTML = '';
        const labels = { home: "Início", pre: "Pré-Escolar", ano1: "1º Ano", ano2: "2º Ano", ano3: "3º Ano", ano4: "4º Ano" };
        ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}" width="24"><span>${labels[k]}</span>`;
            menuBox.appendChild(a);
        });

        const rdBox = document.getElementById('rd-list'); rdBox.innerHTML = '';
        Object.keys(conf.categorias).forEach(key => {
            const c = conf.categorias[key]; const div = document.createElement('div'); div.className = 'rd-item';
            div.innerHTML = `<img src="${conf.caminhoImg}${c.imgCapa}" width="50"><span>${c.nome}</span>`;
            div.onclick = () => { selecionarCategoria(key); closeMenus(); goToIntro(); }; rdBox.appendChild(div);
        });
        if(window.startLogic) window.startLogic();
    }
    function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); const ov = document.getElementById('overlay'); const isOpen = m.style.display === 'flex'; m.style.display = isOpen ? 'none' : 'flex'; ov.style.display = isOpen ? 'none' : 'block'; }
    function openRDMenu(e) { if(e) e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('rdMenu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    function goToIntro() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-intro').classList.add('active'); document.getElementById('status-bar').style.display = 'none'; }
    function goToGame() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-game').classList.add('active'); document.getElementById('status-bar').style.display = 'flex'; if(window.initGame) window.initGame(); }
    window.onload = initUI;
    </script>
</body>
</html>
