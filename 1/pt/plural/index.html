<!DOCTYPE html>
<html lang="pt-pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1º Ano - Jogo do Plural</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: #f0f7ff;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    background: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
}

main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.card-exercicio {
    background: white;
    width: 100%;
    max-width: 600px;
    padding: 25px;
    border-radius: 20px;
    border: 2px solid #dfe6e9;
}

.zona-frase {
    font-size: 1.4rem;
    margin-bottom: 20px;
}

.input-plural {
    font-size: 1.3rem;
    padding: 10px;
    width: 180px;
    text-align: center;
    border-radius: 10px;
    border: 2px solid #ccc;
}

.correto {
    border-color: green;
    background: #eafaf1;
}

.errado {
    border-color: red;
    background: #fff5f5;
}

.btn-proximo {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    background: #2ecc71;
    color: white;
    border: none;
    cursor: pointer;
}

.topo {
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    align-items: center;
}

.mensagem {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>✍️ Passe para o Plural</h1>
</header>

<main>

<div class="topo">
    ⭐ Pontos: <span id="pontos">0</span>

    <select id="nivel" onchange="mudarNivel()">
        <option value="facil">Fácil</option>
        <option value="medio">Médio</option>
        <option value="dificil">Difícil</option>
    </select>
</div>

<div class="card-exercicio">

    <div class="zona-frase">
        <p id="frase-singular"></p>
    </div>

    <div class="zona-frase" id="content-plural"></div>

    <button class="btn-proximo" onclick="verificar()">VERIFICAR</button>

    <div class="mensagem" id="mensagem"></div>

</div>

</main>

<audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
<audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>

// LISTAS BASE
const facil = [
{ singText: "O <b>gato</b> dorme.", pluInicio: "Os ", pluFim: " dormem.", correto: "gatos" },
{ singText: "A <b>bola</b> rola.", pluInicio: "As ", pluFim: " rolam.", correto: "bolas" },
{ singText: "O <b>pato</b> nada.", pluInicio: "Os ", pluFim: " nadam.", correto: "patos" },
{ singText: "A <b>casa</b> é grande.", pluInicio: "As ", pluFim: " são grandes.", correto: "casas" },
{ singText: "O <b>cão</b> ladra.", pluInicio: "Os ", pluFim: " ladram.", correto: "cães" }
];

const medio = [
{ singText: "O <b>caracol</b> é lento.", pluInicio: "Os ", pluFim: " são lentos.", correto: "caracóis" },
{ singText: "O <b>papel</b> voa.", pluInicio: "Os ", pluFim: " voam.", correto: "papéis" },
{ singText: "O <b>animal</b> corre.", pluInicio: "Os ", pluFim: " correm.", correto: "animais" }
];

const dificil = [
{ singText: "O <b>pão</b> é fresco.", pluInicio: "Os ", pluFim: " são frescos.", correto: "pães" },
{ singText: "O <b>capitão</b> manda.", pluInicio: "Os ", pluFim: " mandam.", correto: "capitães" },
{ singText: "O <b>leão</b> ruge.", pluInicio: "Os ", pluFim: " rugem.", correto: "leões" }
];

// FUNÇÃO PARA BARALHAR
function baralhar(array) {
    return array.sort(() => Math.random() - 0.5);
}

// GERAR LISTA POR NÍVEL
function obterLista(nivel) {
    if (nivel === "facil") return baralhar([...facil]);
    if (nivel === "medio") return baralhar([...facil, ...medio]);
    if (nivel === "dificil") return baralhar([...facil, ...medio, ...dificil]);
}

let listaAtual = [];
let indice = 0;
let pontos = 0;

// carregar
function carregar() {
    const d = listaAtual[indice];

    document.getElementById('frase-singular').innerHTML = d.singText;

    document.getElementById('content-plural').innerHTML =
        `${d.pluInicio}
        <input id="input-resp" class="input-plural">
        ${d.pluFim}`;

    document.getElementById("mensagem").innerText = "";
}

// verificar
function verificar() {

    const input = document.getElementById("input-resp");
    const tentativa = input.value.trim();
    const correta = listaAtual[indice].correto;

    if (tentativa === correta) {

        input.classList.add("correto");

        document.getElementById("mensagem").innerText = "Muito bem! 🎉";
        document.getElementById("som-acerto").play();

        pontos++;
        document.getElementById("pontos").innerText = pontos;

        setTimeout(proximo, 1200);

    } else {

        input.classList.add("errado");
        document.getElementById("mensagem").innerText = "Tenta outra vez!";
        document.getElementById("som-erro").play();

        setTimeout(() => input.classList.remove("errado"), 500);
    }
}

// próximo
function proximo() {
    indice++;

    if (indice >= listaAtual.length) {
        listaAtual = baralhar(listaAtual);
        indice = 0;
    }

    carregar();
}

// mudar nível
function mudarNivel() {
    const nivel = document.getElementById("nivel").value;
    listaAtual = obterLista(nivel);
    indice = 0;
    carregar();
}

// iniciar
listaAtual = obterLista("facil");
carregar();

</script>

</body>
</html>
