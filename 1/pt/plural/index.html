<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Plural de Palavras</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ESTILO BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: #fff2e6;
            font-family: 'Quicksand', sans-serif; /* Fonte mais engraçada */
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid rgba(0,0,0,0.05); flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2d3436; }
        header h1 { font-size: 1.2rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 15px;
            border-radius: 12px; border: 1px solid #e67e22; box-shadow: 0 4px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #e67e22; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 500; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { font-weight: 900; color: #ff9f43; margin-bottom: 20px; font-size: 1.2rem; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600; padding: 12px 15px;
            border-radius: 10px; background: #fcfcfc; display: flex; align-items: center; 
            gap: 12px; margin-bottom: 8px; border: 1px solid #eee;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 400;
        }
        .overlay.active { display: block; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 20px; }
        
        .instrucao-topo {
            font-size: 1.5rem; font-weight: 700; color: #e67e22;
            margin-bottom: 25px; /* Mais espaço abaixo do título */
            text-align: center;
        }

        /* PONTUAÇÃO AO CENTRO */
        .status-container {
            width: 100%; max-width: 500px; display: flex; 
            justify-content: center; align-items: center; position: relative;
            margin-bottom: 15px; background: white; 
            padding: 12px; border-radius: 20px; border: 2px solid #ffecdb;
        }
        .nivel-badge { position: absolute; left: 15px; color: #ff9f43; font-weight: 700; }
        .pontos-center { font-size: 1.4rem; display: flex; align-items: center; gap: 8px; }
        .info-btn-right { position: absolute; right: 15px; }

        .btn-info-circle {
            background: #3498db; color: white; border: none; width: 30px; height: 30px;
            border-radius: 50%; font-weight: bold; cursor: pointer;
        }

        .card {
            background: white; padding: 35px 20px; border-radius: 30px;
            width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 15px 35px rgba(230, 126, 34, 0.1); border: 2px solid #fff;
        }

        .palavra-alvo { font-size: 3rem; font-weight: 700; color: #2d3436; margin-bottom: 25px; letter-spacing: 1px; }
        
        input#resposta {
            width: 90%; font-size: 1.6rem; padding: 15px; text-align: center; font-family: 'Quicksand', sans-serif;
            border: 3px solid #dfe6e9; border-radius: 20px; outline: none; text-transform: uppercase;
            transition: 0.3s;
        }
        .correto { border-color: #2ecc71 !important; background: #eafaf1; color: #27ae60; }
        .errado { border-color: #ff7675 !important; background: #fff5f5; }

        /* MODAIS */
        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 30px; z-index: 1000;
            text-align: center; width: 85%; max-width: 400px; border: 5px solid #ff9f43;
        }

        footer { padding: 12px; text-align: center; font-size: 0.85rem; color: #95a5a6; background: white; border-top: 1px solid #eee; }

        @media (max-width: 480px) {
            .palavra-alvo { font-size: 2.5rem; }
            .instrucao-topo { font-size: 1.2rem; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="fecharTodosModais()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">MENU ESCOLAR</div>
        <a href="/jogos" class="sidebar-item">🏠 Início</a>
        <a href="/jogos/pre" class="sidebar-item">🎒 Pré-Escolar</a>
        <a href="/jogos/1" class="sidebar-item">🐥 1º Ano</a>
        <a href="/jogos/2" class="sidebar-item">🦁 2º Ano</a>
        <a href="/jogos/3" class="sidebar-item">🐘 3º Ano</a>
        <a href="/jogos/4" class="sidebar-item">🦒 4º Ano</a>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Plural</h1>
        </div>
        <a href="/jogos/1/pt" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main>
        <h2 class="instrucao-topo">Faz o plural das palavras!</h2>

        <div class="status-container">
            <div class="nivel-badge">Nível <span id="txt-nivel">1</span></div>
            <div class="pontos-center">
                <span>⭐</span>
                <span id="pontos">0</span>
            </div>
            <div class="info-btn-right">
                <button class="btn-info-circle" onclick="abrirModal('modal-info')">i</button>
            </div>
        </div>

        <div class="card">
            <div class="palavra-alvo" id="display-palavra">---</div>
            <input type="text" id="resposta" placeholder="Escreve aqui..." autocomplete="off">
            <button class="btn-voltar-3d" style="width:100%; margin-top:25px; justify-content:center; background:#2ecc71; border-color:#27ae60; box-shadow: 0 5px 0 #27ae60; color:white; padding:18px; font-size:1.2rem;" onclick="verificar()">VERIFICAR</button>
        </div>
        
        <div id="progresso-txt" style="margin-top:20px; font-weight:700; color:#636e72; font-size:1rem;">Palavra 1 de 10</div>
    </main>

    <div id="modal-info" class="modal-custom">
        <h2 style="color:#3498db; margin-bottom:15px;">Dicas</h2>
        <p id="info-texto" style="margin-bottom:25px; line-height:1.6; color: #2d3436; font-size: 1rem;"></p>
        <button class="btn-voltar-3d" style="width:100%; justify-content:center;" onclick="fecharModal('modal-info')">VAMOS JOGAR!</button>
    </div>

    <div id="modal-erro" class="modal-custom" style="border-color: #ff7675;">
        <div style="font-size:3.5rem; margin-bottom: 10px;">✨</div>
        <h2 style="color:#d63031; margin-bottom:10px;">Quase lá!</h2>
        <p style="margin-bottom:8px; color:#636e72;">O plural de <b id="err-singular">---</b> é:</p>
        <p id="err-correto" style="font-size:2.2rem; font-weight:700; color:#2ecc71; margin-bottom:25px;">---</p>
        <button class="btn-voltar-3d" style="width:100%; justify-content:center; background:#ff7675; border-color:#d63031; box-shadow: 0 4px 0 #d63031; color:white;" onclick="proximaAposErro()">CONTINUAR</button>
    </div>

    <div id="modal-nivel" class="modal-custom">
        <div style="font-size:4.5rem; margin-bottom: 15px;">🏆</div>
        <h2 id="modal-titulo" style="margin:10px 0; color: #2d3436;">Incrível!</h2>
        <p id="modal-msg" style="margin-bottom:25px; font-size:1.1rem; color: #636e72;"></p>
        <button id="btn-next" class="btn-voltar-3d" style="width:100%; justify-content:center; background:#2ecc71; border-color:#27ae60; padding:15px;" onclick="proximoNivel()">AVANÇAR ➜</button>
    </div>

    <footer>Recursos Digitais • Professor Luís</footer>

    <audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
    <audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

    <script>
        const dadosNiveis = {
            1: [ {s:"CASA", p:"CASAS"}, {s:"CARRO", p:"CARROS"}, {s:"ÁRVORE", p:"ÁRVORES"}, {s:"MESA", p:"MESAS"}, {s:"BOLA", p:"BOLAS"}, {s:"LIVRO", p:"LIVROS"}, {s:"CHAVE", p:"CHAVES"}, {s:"ESCOLA", p:"ESCOLAS"}, {s:"MENINO", p:"MENINOS"}, {s:"PERA", p:"PERAS"} ],
            2: [ {s:"FLOR", p:"FLORES"}, {s:"RAPAZ", p:"RAPAZES"}, {s:"ANIMAL", p:"ANIMAIS"}, {s:"HOTEL", p:"HOTÉIS"}, {s:"FÁCIL", p:"FÁCEIS"}, {s:"MAR", p:"MARES"}, {s:"NARIZ", p:"NARIZES"}, {s:"LUZ", p:"LUZES"}, {s:"PAPEL", p:"PAPÉIS"}, {s:"AZUL", p:"AZUIS"} ],
            3: [ {s:"BALÃO", p:"BALÕES"}, {s:"PÃO", p:"PÃES"}, {s:"CÃO", p:"CÃES"}, {s:"MÃO", p:"MÃOS"}, {s:"BOTÃO", p:"BOTÕES"}, {s:"AVIÃO", p:"AVIÕES"}, {s:"CORAÇÃO", p:"CORAÇÕES"}, {s:"LEÃO", p:"LEÕES"}, {s:"CIDADÃO", p:"CIDADÃOS"} ]
        };

        const dicas = {
            1: "Para palavras terminadas em <b>a, e, o</b>, basta juntar o <b>-s</b>!",
            2: "Para <b>-r</b> ou <b>-z</b>, junta <b>-es</b>. Se terminar em <b>-l</b>, vira <b>-is</b>!",
            3: "Cuidado com o <b>-ão</b>! Pode virar <b>-ões, -ães</b> ou <b>-ãos</b>."
        };

        let nivel = 1, indice = 0, pontos = 0, lista = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function abrirModal(id) { 
            if(id === 'modal-info') document.getElementById('info-texto').innerHTML = dicas[nivel];
            document.getElementById(id).style.display = 'block'; 
            document.getElementById('overlay').classList.add('active'); 
        }
        
        function fecharModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            document.getElementById('overlay').classList.remove('active'); 
        }

        function fecharTodosModais() {
            document.querySelectorAll('.modal-custom').forEach(m => m.style.display = 'none');
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }

        function iniciar() {
            let pool = [];
            if (nivel === 1) pool = [...dadosNiveis[1]];
            else if (nivel === 2) pool = [...dadosNiveis[1], ...dadosNiveis[2]];
            else pool = [...dadosNiveis[1], ...dadosNiveis[2], ...dadosNiveis[3]];

            lista = pool.sort(() => Math.random() - 0.5).slice(0, 10);
            indice = 0;
            carregar();
        }

        function carregar() {
            document.getElementById('display-palavra').innerText = lista[indice].s;
            document.getElementById('resposta').value = "";
            document.getElementById('resposta').className = "";
            document.getElementById('progresso-txt').innerText = `Palavra ${indice + 1} de 10`;
            document.getElementById('txt-nivel').innerText = nivel;
            document.getElementById('resposta').focus();
        }

        function verificar() {
            const input = document.getElementById('resposta');
            const resU = input.value.trim().toUpperCase();
            const resC = lista[indice].p.toUpperCase();

            if(resU === resC) {
                input.className = "correto";
                document.getElementById('som-acerto').play();
                pontos += 10; 
                document.getElementById('pontos').innerText = pontos;
                setTimeout(() => {
                    indice++;
                    if(indice >= 10) finalizarNivel();
                    else carregar();
                }, 800);
            } else {
                input.className = "errado";
                document.getElementById('som-erro').play();
                document.getElementById('err-singular').innerText = lista[indice].s;
                document.getElementById('err-correto').innerText = lista[indice].p;
                abrirModal('modal-erro');
            }
        }

        function proximaAposErro() {
            fecharModal('modal-erro');
            indice++;
            if(indice >= 10) finalizarNivel();
            else carregar();
        }

        function finalizarNivel() {
            document.getElementById('modal-msg').innerText = `Ganhaste ${pontos} pontos!`;
            if(nivel === 3) {
                document.getElementById('modal-titulo').innerText = "Super Campeão!";
                document.getElementById('btn-next').innerText = "JOGAR NOVAMENTE";
            }
            abrirModal('modal-nivel');
        }

        function proximoNivel() {
            fecharModal('modal-nivel');
            if(nivel < 3) { nivel++; iniciar(); }
            else { nivel = 1; pontos = 0; document.getElementById('pontos').innerText = 0; iniciar(); }
        }

        document.getElementById('resposta').addEventListener('keypress', (e) => { if(e.key === 'Enter') verificar(); });

        iniciar();
    </script>
</body>
</html>
