<!DOCTYPE html>
<html lang="pt-pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo do Plural</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, sans-serif;
    background: #f0f7ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

h1 { margin-bottom: 10px; }

.topo {
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    align-items: center;
}

select {
    padding: 8px;
    font-size: 1rem;
}

.pontos {
    font-weight: bold;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 500px;
    text-align: center;
}

.zona {
    font-size: 1.5rem;
    margin-bottom: 20px;
}

input {
    font-size: 1.4rem;
    padding: 10px;
    width: 180px;
    text-align: center;
    border-radius: 10px;
    border: 2px solid #ccc;
}

input.correto {
    border-color: green;
    background: #eafaf1;
}

input.errado {
    border-color: red;
    background: #fff5f5;
}

button {
    margin-top: 20px;
    padding: 12px 30px;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    background: #2ecc71;
    color: white;
    cursor: pointer;
}

.mensagem {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>✍️ Jogo do Plural</h1>

<div class="topo">
    <div class="pontos">⭐ Pontos: <span id="pontos">0</span></div>

    <select id="nivel" onchange="mudarNivel()">
        <option value="facil">Fácil</option>
        <option value="medio">Médio</option>
        <option value="dificil">Difícil</option>
    </select>
</div>

<div class="card">
    <div class="zona" id="frase"></div>

    <input type="text" id="resposta" placeholder="..." autocomplete="off">

    <br>
    <button onclick="verificar()">Verificar</button>

    <div class="mensagem" id="mensagem"></div>
</div>

<!-- Sons -->
<audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
<audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>

// NÍVEIS
const niveis = {

    facil: [
        { frase: "O patim", correta: "patins" },
        { frase: "O gato", correta: "gatos" },
        { frase: "A bola", correta: "bolas" }
    ],

    medio: [
        { frase: "O caracol", correta: "caracóis" },
        { frase: "O papel", correta: "papéis" },
        { frase: "O animal", correta: "animais" }
    ],

    dificil: [
        { frase: "O pão", correta: "pães" },
        { frase: "O alemão", correta: "alemães" },
        { frase: "O capitão", correta: "capitães" }
    ]
};

let nivelAtual = "facil";
let indice = 0;
let pontos = 0;

// carregar exercício
function carregar() {
    const d = niveis[nivelAtual][indice];
    document.getElementById("frase").innerHTML =
        `Escreve no plural: <b>${d.frase}</b> →`;

    document.getElementById("resposta").value = "";
    document.getElementById("mensagem").innerText = "";
}

// verificar resposta
function verificar() {

    const input = document.getElementById("resposta");
    const tentativa = input.value.trim();
    const correta = niveis[nivelAtual][indice].correta;

    if (tentativa === correta) {

        input.classList.add("correto");

        document.getElementById("mensagem").innerText = "Muito bem! 🎉";
        document.getElementById("som-acerto").play();

        pontos++;
        document.getElementById("pontos").innerText = pontos;

        setTimeout(proximo, 1200);

    } else {

        input.classList.add("errado");
        document.getElementById("mensagem").innerText = "Tenta outra vez!";
        document.getElementById("som-erro").play();

        setTimeout(() => input.classList.remove("errado"), 500);
    }
}

// próximo exercício
function proximo() {
    indice++;

    if (indice >= niveis[nivelAtual].length) {
        indice = 0;
    }

    carregar();
}

// mudar nível
function mudarNivel() {
    nivelAtual = document.getElementById("nivel").value;
    indice = 0;
    carregar();
}

// iniciar
carregar();

</script>

</body>
</html>
