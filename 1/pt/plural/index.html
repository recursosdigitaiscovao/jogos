<!DOCTYPE html>
<html lang="pt-pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jogo do Plural Responsivo</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: #fff4e6;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    background: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.2rem;
}

main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 15px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 18px;
    width: 95%;
    max-width: 550px;
    text-align: center;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.frase {
    font-size: 1.4rem;
    margin-bottom: 15px;
    line-height: 1.6;
}

#resposta {
    font-size: 1.2rem;
    padding: 10px;
    width: 80%;
    max-width: 250px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    background: #2ecc71;
    border: none;
    color: white;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
}

.topo {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.topo select {
    padding: 8px;
    font-size: 1rem;
}

.mensagem { margin-top: 10px; font-weight: bold; font-size: 1.1rem; }

.correto { border: 2px solid green; background:#eafaf1; }
.errado { border: 2px solid red; background:#fff5f5; }

/* PROGRESSO */
#progresso {
    margin-top: 10px;
    font-weight: bold;
    color: #34495e;
}

/* RESPONSIVO */
@media (max-width: 600px) {
    .frase { font-size: 1.2rem; }
    #resposta { width: 100%; font-size: 1.1rem; }
    button { width: 100%; font-size: 1.1rem; }
    header { font-size: 1rem; flex-direction: column; gap: 5px; }
}
</style>
</head>

<body>

<header>
<h2>✍️ Passe para o Plural</h2>
<span>⭐ Pontos: <span id="pontos">0</span></span>
</header>

<main>

<div class="topo">
<select id="nivel" onchange="mudarNivel()">
<option value="facil">Fácil</option>
<option value="medio">Médio</option>
<option value="dificil">Difícil</option>
</select>
</div>

<div class="card">
<div id="frase" class="frase"></div>
<div id="resposta-container" class="frase"></div>
<button onclick="verificar()">VERIFICAR</button>
<div id="mensagem" class="mensagem"></div>
</div>

<div id="progresso"></div>

</main>

<audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
<audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
// ---------------- FRASES ----------------
const facil = [
{ frase:"O <b>gato</b> dorme no sofá.", inicio:"Os ", fim:" dormem no sofá.", correta:"gatos" },
{ frase:"A <b>bola</b> rola no chão.", inicio:"As ", fim:" rolam no chão.", correta:"bolas" },
// ... (continua com as 20 frases do nível fácil)
];

const medio = [
{ frase:"O <b>caracol</b> anda devagar.", inicio:"Os ", fim:" andam devagar.", correta:"caracóis" },
// ... (continua com as 20 frases do nível médio)
];

const dificil = [
{ frase:"O <b>pão</b> está quente.", inicio:"Os ", fim:" estão quentes.", correta:"pães" },
// ... (continua com as 20 frases do nível difícil)
];

// ---------------- LÓGICA ----------------
function baralhar(a){ return a.sort(()=>Math.random()-0.5); }

function obterLista(n){
    if(n==="facil") return baralhar([...facil]);
    if(n==="medio") return baralhar([...facil,...medio]);
    if(n==="dificil") return baralhar([...facil,...medio,...dificil]);
}

let lista = obterLista("facil");
let i=0;
let pontos=0;

function carregar(){
    let d = lista[i];
    document.getElementById("frase").innerHTML = d.frase;
    document.getElementById("resposta-container").innerHTML = d.inicio +
        "<input id='resposta'>" +
        d.fim;
    document.getElementById("mensagem").innerText="";
    document.getElementById("progresso").innerText=(i+1)+" / "+lista.length;
}

function verificar(){
    let r=document.getElementById("resposta").value.trim();
    let c=lista[i].correta;
    if(r===c){
        document.getElementById("resposta").className="correto";
        document.getElementById("mensagem").innerText="Muito bem!";
        document.getElementById("som-acerto").play();
        pontos++;
        document.getElementById("pontos").innerText=pontos;
        setTimeout(proximo,1000);
    } else {
        document.getElementById("resposta").className="errado";
        document.getElementById("mensagem").innerText="Tenta outra vez!";
        document.getElementById("som-erro").play();
    }
}

function proximo(){
    i++;
    if(i>=lista.length){
        lista=baralhar(lista);
        i=0;
    }
    carregar();
}

function mudarNivel(){
    let n=document.getElementById("nivel").value;
    lista=obterLista(n);
    i=0;
    carregar();
}

carregar();
</script>

</body>
</html>
