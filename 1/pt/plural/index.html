<!DOCTYPE html>
<html lang="pt-pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo do Plural</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: #fff4e6;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: white;
    padding: 12px;
    display: flex;
    justify-content: space-between;
}

main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 550px;
    text-align: center;
}

.frase {
    font-size: 1.4rem;
    margin-bottom: 20px;
    line-height: 1.8;
}

input {
    font-size: 1.3rem;
    padding: 10px;
    width: 180px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #2ecc71;
    border: none;
    color: white;
    border-radius: 10px;
}

.topo { margin-bottom: 15px; }

.mensagem { margin-top: 10px; font-weight: bold; }

.correto { border: 2px solid green; background:#eafaf1; }
.errado { border: 2px solid red; background:#fff5f5; }

</style>
</head>

<body>

<header>
<h2>✍️ Passe para o Plural</h2>
</header>

<main>

<div class="topo">
⭐ Pontos: <span id="pontos">0</span>

<select id="nivel" onchange="mudarNivel()">
<option value="facil">Fácil</option>
<option value="medio">Médio</option>
<option value="dificil">Difícil</option>
</select>
</div>

<div class="card">
<div id="frase" class="frase"></div>

<input id="resposta">

<br>
<button onclick="verificar()">VERIFICAR</button>

<div id="mensagem" class="mensagem"></div>
</div>

<div id="progresso"></div>

</main>

<audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
<audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>

{ frase:"A <b>cadeira</b> é confortável.", inicio:"As ", fim:" são confortáveis.", correta:"cadeiras" },
{ frase:"O <b>urso</b> dorme na caverna.", inicio:"Os ", fim:" dormem na caverna.", correta:"ursos" },

{ frase:"O <b>peixe</b> nada rápido.", inicio:"Os ", fim:" nadam rápido.", correta:"peixes" },
{ frase:"A <b>estrela</b> brilha no céu.", inicio:"As ", fim:" brilham no céu.", correta:"estrelas" },

{ frase:"A <b>mala</b> está pesada.", inicio:"As ", fim:" estão pesadas.", correta:"malas" }
];

// MÉDIO
const medio = [
{ frase:"O <b>caracol</b> anda devagar.", inicio:"Os ", fim:" andam devagar.", correta:"caracóis" },
{ frase:"O <b>papel</b> voa com o vento.", inicio:"Os ", fim:" voam com o vento.", correta:"papéis" },
{ frase:"O <b>animal</b> corre na floresta.", inicio:"Os ", fim:" correm na floresta.", correta:"animais" },

{ frase:"O <b>girassol</b> gira com o sol.", inicio:"Os ", fim:" giram com o sol.", correta:"girassóis" }
];

// DIFÍCIL
const dificil = [
{ frase:"O <b>pão</b> está quente.", inicio:"Os ", fim:" estão quentes.", correta:"pães" },
{ frase:"O <b>alemão</b> fala português.", inicio:"Os ", fim:" falam português.", correta:"alemães" },
{ frase:"O <b>capitão</b> comanda o barco.", inicio:"Os ", fim:" comandam o barco.", correta:"capitães" },
{ frase:"O <b>coração</b> bate forte.", inicio:"Os ", fim:" batem forte.", correta:"corações" },
{ frase:"O <b>leão</b> ruge na savana.", inicio:"Os ", fim:" rugem na savana.", correta:"leões" },
{ frase:"O <b>avião</b> levanta voo.", inicio:"Os ", fim:" levantam voo.", correta:"aviões" },

{ frase:"O <b>leão</b> corre rápido.", inicio:"Os ", fim:" correm rápido.", correta:"leões" },
{ frase:"O <b>avião</b> parte cedo.", inicio:"Os ", fim:" partem cedo.", correta:"aviões" },
{ frase:"O <b>capitão</b> chega ao porto.", inicio:"Os ", fim:" chegam ao porto.", correta:"capitães" },
{ frase:"O <b>irmão</b> chama a mãe.", inicio:"Os ", fim:" chamam a mãe.", correta:"irmãos" },
{ frase:"O <b>balão</b> cai no chão.", inicio:"Os ", fim:" caem no chão.", correta:"balões" },
{ frase:"O <b>fogão</b> liga depressa.", inicio:"Os ", fim:" ligam depressa.", correta:"fogões" },
{ frase:"O <b>coração</b> sente emoções.", inicio:"Os ", fim:" sentem emoções.", correta:"corações" },
{ frase:"O <b>trovão</b> ecoa na montanha.", inicio:"Os ", fim:" ecoam na montanha.", correta:"trovões" }
];

// -------- LÓGICA --------

function baralhar(a){ return a.sort(()=>Math.random()-0.5); }

function obterLista(n){
if(n==="facil") return baralhar([...facil]);
if(n==="medio") return baralhar([...facil,...medio]);
if(n==="dificil") return baralhar([...facil,...medio,...dificil]);
}

let lista = obterLista("facil");
let i=0;
let pontos=0;

function carregar(){
let d = lista[i];

document.getElementById("frase").innerHTML = d.frase;

document.getElementById("frase").innerHTML +=
"<br><br>"+d.inicio+
"<input id='resposta'>"+
d.fim;

document.getElementById("mensagem").innerText="";
document.getElementById("progresso").innerText=(i+1)+" / "+lista.length;
}

function verificar(){
let r=document.getElementById("resposta").value.trim();
let c=lista[i].correta;

if(r===c){
document.getElementById("resposta").className="correto";
document.getElementById("mensagem").innerText="Muito bem!";
document.getElementById("som-acerto").play();
pontos++;
document.getElementById("pontos").innerText=pontos;
setTimeout(proximo,1000);
}else{
document.getElementById("resposta").className="errado";
document.getElementById("mensagem").innerText="Tenta outra vez!";
document.getElementById("som-erro").play();
}
}

function proximo(){
i++;
if(i>=lista.length){
lista=baralhar(lista);
i=0;
}
carregar();
}

function mudarNivel(){
let n=document.getElementById("nivel").value;
lista=obterLista(n);
i=0;
carregar();
}

carregar();

</script>

</body>
</html>
