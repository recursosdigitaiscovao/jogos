<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Plural de Palavras</title>
    <style>
        /* ESTILO BASE TEMPLATE_1 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: #fff2e6; /* Laranja Suave 1º Ano */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid rgba(0,0,0,0.05); flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2d3436; display: flex; align-items: center; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 15px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 4px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #e67e22; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 500; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { font-weight: 900; color: #ff9f43; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f5f5f5; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600; padding: 12px 15px;
            border-radius: 10px; background: #fcfcfc; display: flex; align-items: center; 
            gap: 12px; margin-bottom: 8px; border: 1px solid #eee; font-size: 0.95rem;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 400;
        }
        .overlay.active { display: block; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 20px; }
        
        .instrucao-topo {
            font-size: 1.3rem; font-weight: 800; color: #e67e22;
            margin-bottom: 10px; text-align: center; text-transform: uppercase;
        }

        .status-container {
            width: 100%; max-width: 500px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px; background: rgba(255,255,255,0.9); 
            padding: 10px 20px; border-radius: 12px; font-weight: bold;
        }

        .btn-info-circle {
            background: #3498db; color: white; border: none; width: 28px; height: 28px;
            border-radius: 50%; font-weight: bold; cursor: pointer; font-family: serif; font-style: italic;
        }

        .card {
            background: white; padding: 30px 20px; border-radius: 25px;
            width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid #fff;
            margin-top: 5px;
        }

        .palavra-alvo { font-size: 2.8rem; font-weight: 900; color: #2d3436; margin-bottom: 20px; letter-spacing: 2px; }
        
        input#resposta {
            width: 90%; font-size: 1.5rem; padding: 12px; text-align: center;
            border: 3px solid #dfe6e9; border-radius: 15px; outline: none; text-transform: uppercase;
        }
        .correto { border-color: #2ecc71 !important; background: #eafaf1; color: #27ae60; }
        .errado { border-color: #ff7675 !important; background: #fff5f5; }

        /* POPUPS */
        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 25px; z-index: 1000;
            text-align: center; width: 85%; max-width: 380px; border: 4px solid #ff9f43;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        footer { padding: 10px; text-align: center; font-size: 0.8rem; color: #95a5a6; background: white; border-top: 1px solid #eee; }

        @media (max-width: 480px) {
            .palavra-alvo { font-size: 2.2rem; }
            .card { padding: 20px 15px; }
            .instrucao-topo { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">MENU ESCOLAR</div>
        <a href="/jogos" class="sidebar-item">🏠 Início</a>
        <a href="/jogos/pre" class="sidebar-item">🎒 Pré-Escolar</a>
        <a href="/jogos/1" class="sidebar-item">🐥 1º Ano</a>
        <a href="/jogos/2" class="sidebar-item">🦁 2º Ano</a>
        <a href="/jogos/3" class="sidebar-item">🐘 3º Ano</a>
        <a href="/jogos/4" class="sidebar-item">🦒 4º Ano</a>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Plural</h1>
        </div>
        <a href="/jogos/1/pt" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main>
        <h2 class="instrucao-topo">Faz o plural das palavras!</h2>

        <div class="status-container">
            <div>Nível: <span id="txt-nivel" style="color:#ff9f43">1</span></div>
            <div style="display:flex; align-items:center; gap:10px;">
                <span>⭐ <span id="pontos">0</span></span>
                <button class="btn-info-circle" onclick="abrirModal('modal-info')">i</button>
            </div>
        </div>

        <div class="card">
            <div class="palavra-alvo" id="display-palavra">---</div>
            <input type="text" id="resposta" placeholder="ESCREVE AQUI..." autocomplete="off">
            <button class="btn-voltar-3d" style="width:100%; margin-top:25px; justify-content:center; background:#2ecc71; border-color:#27ae60; box-shadow: 0 4px 0 #27ae60; color:white; padding:15px; font-size:1.1rem;" onclick="verificar()">VERIFICAR</button>
        </div>
        
        <div id="progresso-txt" style="margin-top:15px; font-weight:bold; color:#636e72;">Palavra 1 de 10</div>
    </main>

    <div id="modal-info" class="modal-custom">
        <h2 style="color:#3498db; margin-bottom:15px;">Dicas de Plural</h2>
        <p id="info-texto" style="margin-bottom:20px; line-height:1.5; color: #2d3436; text-align: left; font-size: 0.9rem;">
            </p>
        <button class="btn-voltar-3d" style="width:100%; justify-content:center;" onclick="fecharModal('modal-info')">ENTENDI!</button>
    </div>

    <div id="modal-nivel" class="modal-custom">
        <div id="emoji-result" style="font-size:4rem; margin-bottom: 10px;">🏆</div>
        <h2 id="modal-titulo" style="margin:10px 0; color: #2d3436;">Muito Bem!</h2>
        <p id="modal-msg" style="margin-bottom:20px; color: #636e72;"></p>
        <button id="btn-next" class="btn-voltar-3d" style="width:100%; justify-content:center; background:#2ecc71; border-color:#27ae60;" onclick="proximoNivel()">AVANÇAR ➜</button>
    </div>

    <footer>Recursos Digitais • Professor Luís</footer>

    <audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
    <audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

    <script>
        const dados = {
            1: [ // Vogais a, e, o
                {s:"CASA", p:"CASAS"}, {s:"CARRO", p:"CARROS"}, {s:"ÁRVORE", p:"ÁRVORES"},
                {s:"MESA", p:"MESAS"}, {s:"BOLA", p:"BOLAS"}, {s:"LIVRO", p:"LIVROS"},
                {s:"CHAVE", p:"CHAVES"}, {s:"ESCOLA", p:"ESCOLAS"}, {s:"MENINO", p:"MENINOS"},
                {s:"CADERNO", p:"CADERNOS"}, {s:"PERA", p:"PERAS"}, {s:"TOMATE", p:"TOMATES"}
            ],
            2: [ // Consoantes r, z, n e l
                {s:"FLOR", p:"FLORES"}, {s:"RAPAZ", p:"RAPAZES"}, {s:"ANIMAL", p:"ANIMAIS"},
                {s:"HOTEL", p:"HOTÉIS"}, {s:"FÁCIL", p:"FÁCEIS"}, {s:"MAR", p:"MARES"},
                {s:"NARIZ", p:"NARIZES"}, {s:"LUZ", p:"LUZES"}, {s:"PAPEL", p:"PAPÉIS"},
                {s:"PAREDE", p:"PAREDES"}, {s:"COLHER", p:"COLHERES"}, {s:"PINCEL", p:"PINCÉIS"},
                {s:"PAZ", p:"PAZES"}, {s:"AZUL", p:"AZUIS"}, {s:"COR", p:"CORES"}
            ],
            3: [ // Terminados em -ão
                {s:"BALÃO", p:"BALÕES"}, {s:"PÃO", p:"PÃES"}, {s:"CÃO", p:"CÃES"},
                {s:"MÃO", p:"MÃOS"}, {s:"BOTÃO", p:"BOTÕES"}, {s:"CIDADÃO", p:"CIDADÃOS"},
                {s:"AVIÃO", p:"AVIÕES"}, {s:"REFRÃO", p:"REFRÃOS"}, {s:"CORAÇÃO", p:"CORAÇÕES"},
                {s:"CAPITÃO", p:"CAPITÃES"}, {s:"GRÃO", p:"GRÃOS"}, {s:"LEÃO", p:"LEÕES"}
            ]
        };

        const dicas = {
            1: "<b>Regra:</b> Para palavras terminadas em vogal (a, e, o), basta adicionar um <b>-s</b> no final.<br><br>Ex: Casa → Casas",
            2: "<b>Regra:</b> Para palavras com <b>-r</b> ou <b>-z</b>, junta <b>-es</b>. Se terminar em <b>-l</b>, troca por <b>-is</b> ou <b>-éis</b>.<br><br>Ex: Flor → Flores",
            3: "<b>Regra:</b> Palavras com <b>-ão</b> podem mudar para <b>-ões</b>, <b>-ães</b> ou apenas <b>-ãos</b>.<br><br>Ex: Pão → Pães"
        };

        let nivel = 1, indice = 0, pontos = 0, lista = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function abrirModal(id) { 
            document.getElementById('info-texto').innerHTML = dicas[nivel];
            document.getElementById(id).style.display = 'block'; 
            document.getElementById('overlay').classList.add('active'); 
        }
        
        function fecharModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            document.getElementById('overlay').classList.remove('active'); 
        }

        function iniciar() {
            let banco = [...dados[nivel]];
            lista = banco.sort(() => Math.random() - 0.5).slice(0, 10);
            indice = 0;
            carregar();
        }

        function carregar() {
            document.getElementById('display-palavra').innerText = lista[indice].s;
            document.getElementById('resposta').value = "";
            document.getElementById('resposta').className = "";
            document.getElementById('progresso-txt').innerText = `Palavra ${indice + 1} de 10`;
            document.getElementById('txt-nivel').innerText = nivel;
            document.getElementById('resposta').focus();
        }

        function verificar() {
            const input = document.getElementById('resposta');
            const resUtilizador = input.value.trim().toUpperCase();
            const resCorreta = lista[indice].p.toUpperCase();

            if(resUtilizador === resCorreta) {
                input.className = "correto";
                document.getElementById('som-acerto').play();
                pontos += 10; 
                document.getElementById('pontos').innerText = pontos;
                setTimeout(() => {
                    indice++;
                    if(indice >= 10) {
                        document.getElementById('modal-msg').innerText = `Concluíste o Nível ${nivel} com sucesso!`;
                        if(nivel === 3) {
                            document.getElementById('modal-titulo').innerText = "Super Campeão!";
                            document.getElementById('btn-next').innerText = "RECOMEÇAR JOGO";
                        }
                        abrirModal('modal-nivel');
                    } else carregar();
                }, 1000);
            } else {
                input.className = "errado";
                document.getElementById('som-erro').play();
                setTimeout(() => input.className = "", 800);
            }
        }

        function proximoNivel() {
            fecharModal('modal-nivel');
            if(nivel < 3) { 
                nivel++; 
                iniciar(); 
            } else { 
                window.location.reload(); 
            }
        }

        document.getElementById('resposta').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') verificar();
        });

        iniciar();
    </script>
</body>
</html>
