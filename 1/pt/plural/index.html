<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Plural de Palavras</title>
    <style>
        /* ESTILO BASE TEMPLATE_1 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: #fff2e6; /* Laranja suave do 1º Ano */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%; background: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 4px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #e67e22; }

        /* SIDEBAR COMPLETA */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 200; padding: 25px;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; color: #ff9f43; font-weight: bold; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 14px; border-radius: 12px; background: #fdfdfd;
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 1px solid #eee;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; justify-content: center; }
        
        .info-container {
            width: 100%; max-width: 500px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px; background: white; 
            padding: 12px 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-ajuda {
            background: #3498db; color: white; border: none; width: 32px; height: 32px;
            border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
        }

        .card {
            background: white; padding: 45px 20px; border-radius: 30px;
            width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 3px solid #fff;
        }

        .palavra-alvo { font-size: 3rem; font-weight: 900; color: #2d3436; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        input#resposta {
            width: 90%; font-size: 1.6rem; padding: 15px; text-align: center;
            border: 3px solid #dfe6e9; border-radius: 18px; outline: none; text-transform: uppercase;
        }
        .correto { border-color: #2ecc71 !important; background: #eafaf1; }
        .errado { border-color: #ff7675 !important; background: #fff5f5; }

        /* POPUP PERSONALIZADO */
        .modal-plural {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 35px; border-radius: 30px; z-index: 1000;
            text-align: center; width: 85%; max-width: 400px;
            border: 5px solid #ff9f43; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
        }

        footer { padding: 12px; text-align: center; font-size: 0.8rem; color: #95a5a6; background: white; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">MENU PRINCIPAL</div>
        <a href="../" class="sidebar-item">🏠 Início</a>
        <a href="../pre" class="sidebar-item">🎒 Pré-Escolar</a>
        <a href="../1ano" class="sidebar-item">🐥 1º Ano</a>
        <a href="../2ano" class="sidebar-item">🦁 2º Ano</a>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <span>⭐</span>
            <h1>Plural de Palavras</h1>
        </div>
        <button class="btn-voltar-3d" onclick="window.history.back()">⬅ VOLTAR</button>
    </header>

    <main>
        <div class="info-container">
            <div style="font-weight: bold; font-size: 1.1rem;">Nível: <span id="txt-nivel" style="color:#ff9f43">Fácil</span></div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-weight: bold; font-size: 1.1rem;">Pontos: <span id="pontos">0</span></span>
                <button class="btn-ajuda" onclick="alert('Escreve o PLURAL da palavra que aparece no cartão!')">?</button>
            </div>
        </div>

        <div class="card">
            <div class="palavra-alvo" id="display-palavra">---</div>
            <input type="text" id="resposta" placeholder="ESCREVE AQUI..." autocomplete="off">
            <button class="btn-voltar-3d" style="width:100%; margin-top:30px; justify-content:center; background:#2ecc71; border-color:#27ae60; box-shadow: 0 5px 0 #27ae60; color:white; font-size: 1.2rem; padding: 18px;" onclick="verificar()">VERIFICAR</button>
        </div>
        
        <div id="progresso-txt" style="margin-top: 25px; font-weight: 700; color: #636e72; background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 20px;">Palavra 1 de 10</div>
    </main>

    <div id="modal-nivel" class="modal-plural">
        <div style="font-size: 4.5rem; margin-bottom: 10px;">🏆</div>
        <h2 id="modal-titulo" style="margin: 10px 0; color: #2d3436;">Parabéns!</h2>
        <p id="modal-msg" style="margin-bottom: 25px; font-size: 1.2rem; color: #636e72;"></p>
        <button class="btn-voltar-3d" style="width:100%; justify-content:center; font-size: 1.1rem; padding: 15px;" onclick="proximoNivel()">AVANÇAR PARA NÍVEL 2 ➜</button>
    </div>

    <footer>Recursos Digitais Covão • Professor Luís</footer>

    <audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
    <audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

    <script>
        const niveis = {
            1: [
                {s: "GATO", p: "GATOS"}, {s: "MESA", p: "MESAS"}, {s: "CASA", p: "CASAS"}, {s: "BOLA", p: "BOLAS"},
                {s: "PATO", p: "PATOS"}, {s: "DADO", p: "DADOS"}, {s: "COPO", p: "COPOS"}, {s: "LIVRO", p: "LIVROS"},
                {s: "BOLO", p: "BOLOS"}, {s: "CARRO", p: "CARROS"}
            ],
            2: [
                {s: "CARACOL", p: "CARACOIS"}, {s: "JARDIM", p: "JARDINS"}, {s: "ANIMAL", p: "ANIMAIS"}, {s: "FUNIL", p: "FUNIS"},
                {s: "PUDIM", p: "PUDINS"}, {s: "PAPEL", p: "PAPEIS"}, {s: "BOMBOM", p: "BOMBONS"}, {s: "AZUL", p: "AZUIS"},
                {s: "PASTEL", p: "PASTEIS"}, {s: "SOL", p: "SOIS"}
            ]
        };

        let nivelAtual = 1;
        let indice = 0;
        let pontos = 0;
        let lista = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function iniciarNivel(n) {
            nivelAtual = n;
            indice = 0;
            lista = [...niveis[n]].sort(() => Math.random() - 0.5);
            document.getElementById('txt-nivel').innerText = n === 1 ? "Fácil" : "Médio";
            carregarPalavra();
        }

        function carregarPalavra() {
            document.getElementById('display-palavra').innerText = lista[indice].s;
            document.getElementById('resposta').value = "";
            document.getElementById('resposta').className = "";
            document.getElementById('progresso-txt').innerText = `Palavra ${indice + 1} de 10`;
            document.getElementById('resposta').focus();
        }

        function verificar() {
            const input = document.getElementById('resposta');
            const resp = input.value.trim().toUpperCase();
            const correta = lista[indice].p;

            if (resp === correta) {
                input.classList.add('correto');
                document.getElementById('som-acerto').play();
                pontos += 10;
                document.getElementById('pontos').innerText = pontos;
                
                setTimeout(() => {
                    indice++;
                    if (indice >= 10) finalizarFase();
                    else carregarPalavra();
                }, 1000);
            } else {
                input.classList.add('errado');
                document.getElementById('som-erro').play();
                setTimeout(() => input.classList.remove('errado'), 800);
            }
        }

        function finalizarFase() {
            const modal = document.getElementById('modal-nivel');
            document.getElementById('modal-msg').innerText = `Muito bem! Conseguiste ${pontos} pontos no Nível ${nivelAtual}.`;
            modal.style.display = 'block';
        }

        function proximoNivel() {
            document.getElementById('modal-nivel').style.display = 'none';
            if(nivelAtual < 2) iniciarNivel(2);
            else {
                alert("Parabéns! Completaste todos os níveis!");
                window.location.reload();
            }
        }

        // Permitir usar a tecla Enter para verificar
        document.getElementById('resposta').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verificar();
        });

        // Início
        iniciarNivel(1);
    </script>
</body>
</html>
