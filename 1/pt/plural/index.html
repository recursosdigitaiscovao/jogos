<!DOCTYPE html>
<html lang="pt-pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo do Plural</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: #fff4e6;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: white;
    padding: 12px;
    display: flex;
    justify-content: space-between;
}

main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    text-align: center;
}

.frase {
    font-size: 1.5rem;
    margin-bottom: 20px;
}

input {
    font-size: 1.3rem;
    padding: 10px;
    width: 180px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #2ecc71;
    border: none;
    color: white;
    border-radius: 10px;
}

.topo {
    margin-bottom: 15px;
}

.mensagem { margin-top: 10px; font-weight: bold; }

.correto { border: 2px solid green; background:#eafaf1; }
.errado { border: 2px solid red; background:#fff5f5; }

</style>
</head>

<body>

<header>
<h2>✍️ Jogo do Plural</h2>
</header>

<main>

<div class="topo">
⭐ Pontos: <span id="pontos">0</span>

<select id="nivel" onchange="mudarNivel()">
<option value="facil">Fácil</option>
<option value="medio">Médio</option>
<option value="dificil">Difícil</option>
</select>
</div>

<div class="card">
<div id="frase" class="frase"></div>

<input id="resposta">

<br>
<button onclick="verificar()">Verificar</button>

<div id="mensagem" class="mensagem"></div>
</div>

<div id="progresso"></div>

</main>

<audio id="som-acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b1d.mp3"></audio>
<audio id="som-erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>

// -------- FRASES --------

const facil = [
{ frase:"O gato", correta:"gatos" },
{ frase:"A bola", correta:"bolas" },
{ frase:"O pato", correta:"patos" },
{ frase:"A casa", correta:"casas" },
{ frase:"O menino", correta:"meninos" },
{ frase:"A menina", correta:"meninas" },
{ frase:"O livro", correta:"livros" },
{ frase:"A mesa", correta:"mesas" },
{ frase:"O sapato", correta:"sapatos" },
{ frase:"A flor", correta:"flores" },
{ frase:"O carro", correta:"carros" },
{ frase:"A porta", correta:"portas" },
{ frase:"O copo", correta:"copos" },
{ frase:"A cadeira", correta:"cadeiras" },
{ frase:"O urso", correta:"ursos" },
{ frase:"A janela", correta:"janelas" },
{ frase:"O peixe", correta:"peixes" },
{ frase:"A estrela", correta:"estrelas" },
{ frase:"O cão", correta:"cães" },
{ frase:"A mala", correta:"malas" }
];

const medio = [
{ frase:"O caracol", correta:"caracóis" },
{ frase:"O papel", correta:"papéis" },
{ frase:"O animal", correta:"animais" },
{ frase:"O farol", correta:"faróis" },
{ frase:"O lençol", correta:"lençóis" },
{ frase:"O anzol", correta:"anzóis" },
{ frase:"O girassol", correta:"girassóis" },
{ frase:"O funil", correta:"funis" },
{ frase:"O fóssil", correta:"fósseis" },
{ frase:"O perfil", correta:"perfis" },
{ frase:"O hotel", correta:"hotéis" },
{ frase:"O jornal", correta:"jornais" },
{ frase:"O canal", correta:"canais" },
{ frase:"O animal", correta:"animais" },
{ frase:"O farol", correta:"faróis" },
{ frase:"O hotel", correta:"hotéis" },
{ frase:"O funil", correta:"funis" },
{ frase:"O papel", correta:"papéis" },
{ frase:"O lençol", correta:"lençóis" },
{ frase:"O girassol", correta:"girassóis" }
];

const dificil = [
{ frase:"O pão", correta:"pães" },
{ frase:"O alemão", correta:"alemães" },
{ frase:"O capitão", correta:"capitães" },
{ frase:"O coração", correta:"corações" },
{ frase:"O leão", correta:"leões" },
{ frase:"O avião", correta:"aviões" },
{ frase:"O irmão", correta:"irmãos" },
{ frase:"O cidadão", correta:"cidadãos" },
{ frase:"O trovão", correta:"trovões" },
{ frase:"O balão", correta:"balões" },
{ frase:"O fogão", correta:"fogões" },
{ frase:"O verão", correta:"verões" },
{ frase:"O leão", correta:"leões" },
{ frase:"O avião", correta:"aviões" },
{ frase:"O capitão", correta:"capitães" },
{ frase:"O irmão", correta:"irmãos" },
{ frase:"O balão", correta:"balões" },
{ frase:"O fogão", correta:"fogões" },
{ frase:"O coração", correta:"corações" },
{ frase:"O trovão", correta:"trovões" }
];

// -------- LÓGICA --------

function baralhar(a){ return a.sort(()=>Math.random()-0.5); }

function obterLista(n){
if(n==="facil") return baralhar([...facil]);
if(n==="medio") return baralhar([...facil,...medio]);
if(n==="dificil") return baralhar([...facil,...medio,...dificil]);
}

let lista = obterLista("facil");
let i=0;
let pontos=0;

function carregar(){
document.getElementById("frase").innerHTML="Plural: <b>"+lista[i].frase+"</b>";
document.getElementById("resposta").value="";
document.getElementById("mensagem").innerText="";
document.getElementById("progresso").innerText=(i+1)+" / "+lista.length;
}

function verificar(){
let r=document.getElementById("resposta").value.trim();
let c=lista[i].correta;

if(r===c){
document.getElementById("resposta").className="correto";
document.getElementById("mensagem").innerText="Muito bem!";
document.getElementById("som-acerto").play();
pontos++;
document.getElementById("pontos").innerText=pontos;
setTimeout(proximo,1000);
}else{
document.getElementById("resposta").className="errado";
document.getElementById("mensagem").innerText="Tenta outra vez!";
document.getElementById("som-erro").play();
}
}

function proximo(){
i++;
if(i>=lista.length){
lista=baralhar(lista);
i=0;
}
carregar();
}

function mudarNivel(){
let n=document.getElementById("nivel").value;
lista=obterLista(n);
i=0;
carregar();
}

carregar();

</script>

</body>
</html>
