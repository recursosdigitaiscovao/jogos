<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Jogo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-page: #e9f0f8; --primary-blue: #5ba4e5; --primary-dark: #3d7db8; --highlight-green: #7ed321; --error-red: #ff5e5e; --white: #ffffff; --text-grey: #5d7082; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #f0f7ff; z-index: 1000; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4); position: relative; }
        .logo-center { display: flex; align-items: center; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 48px; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 9px; color: #88a; font-weight: 700; }
        
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        .menu-dropdown { position: absolute; top: 60px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 2000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); cursor: pointer; min-width: 180px; text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.85rem; transition: background 0.2s; }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        .menu-item img { height: 20px; width: 20px; object-fit: contain; }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }

        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 7px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 13px; box-shadow: 0 4px 0 var(--primary-dark); }
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 1000px; height: 100%; border-radius: 40px; box-shadow: 0 15px 35px rgba(176,196,217,0.5); display: flex; flex-direction: column; padding: 15px; position: relative; }
        
        body.with-footer .game-card { max-height: calc(100dvh - 130px); }
        body.no-footer footer { display: none; }
        body.no-footer .game-card { max-height: calc(100dvh - 90px); }

        .status-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-shrink: 0; }
        .dots-container { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #d0e0f0; transition: 0.3s; }
        .dot.active { background: var(--primary-blue); transform: scale(1.2); }
        .dot.done { background: var(--primary-blue); }

        .screen { flex: 1; display: none; width: 100%; min-height: 0; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        .action-container { position: absolute; bottom: 15px; left: 15px; right: 15px; display: flex; align-items: center; gap: 12px; }
        .btn-jogar-stretch { flex: 1; background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 14px; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); transition: 0.1s; text-align: center; }
        .dynamic-game-content { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 85px; }

        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2100; padding: 20px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 1500; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; color: #89a; font-size: 11px; font-weight: 700; flex-shrink: 0; }

        @media (max-width: 650px) { .btn-voltar-header { display: none !important; } }
    </style>
</head>
<body class="with-footer">

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text">
                <h1 id="tit-l1"></h1>
                <h1 id="tit-l2"></h1>
                <p id="sub-tit"></p>
            </div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar-header" class="btn-voltar-header">
                <img id="header-back-icon" src="" width="16"> <span id="txt-voltar-header"></span>
            </a>
        </div>
    </header>

    <div class="game-container">
        <div class="game-card">
            <!-- STATUS BAR -->
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:var(--text-grey); font-size:14px;">⏳ 00:00</div>
                <div class="dots-container" id="dots-container"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:24px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <h2 id="main-game-title" style="text-align:center; color:var(--primary-blue); font-weight:900; font-size:24px; margin-top:10px;">---</h2>

            <!-- ECRÃ 1: INTRO -->
            <div class="screen active" id="scr-intro" style="justify-content:center;">
                <div id="intro-animation-container" style="width:100%; display:flex; justify-content:center; margin-bottom:20px;"></div>
                <p id="intro-instr" style="font-weight:800; color:var(--text-grey); text-align:center; max-width:300px; margin-bottom: 20px; font-size: 1.1rem;"></p>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" style="height:55px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <!-- ECRÃ 2: JOGO -->
            <div class="screen" id="scr-game">
                <div id="game-main-content" class="dynamic-game-content"></div>
            </div>

            <!-- ECRÃ 3: RESULTADOS -->
            <div class="screen" id="scr-result" style="justify-content:center;">
                <img id="res-taca" style="width:110px; margin-bottom:10px;" src="">
                <h2 id="res-tit" style="font-size:26px; color: var(--primary-blue); font-weight:900; margin-bottom:15px;"></h2>
                <div style="display:flex; gap:12px; margin-bottom:20px;">
                    <div style="background:white; padding:10px 20px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
                        <span id="res-pts" style="font-size:20px; font-weight:900; color:var(--primary-blue);">0</span><br><small>PONTOS</small>
                    </div>
                    <div style="background:white; padding:10px 20px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
                        <span id="res-tim" style="font-size:20px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small>TEMPO</small>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; gap:8px; width:100%; max-width:320px; padding-bottom: 20px;">
                    <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                    <button class="btn-jogar-stretch" style="background:white; color:var(--primary-blue); border:2px solid var(--primary-blue); box-shadow:none;" onclick="openRDMenu(event)">OUTRA CATEGORIA</button>
                    <button class="btn-jogar-stretch" style="background:#cbd9e6; color:#445; box-shadow:none;" id="btn-outro-jogo">OUTRO JOGO</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="mainFooter"></footer>

    <!-- PAINEL DE SELEÇÃO DE CATEGORIAS (RD) -->
    <div id="rdMenu" class="rd-panel">
        <div style="width:40px; height:4px; background:#eee; border-radius:10px; margin: 0 auto 15px;" onclick="closeMenus()"></div>
        <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:15px;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
        function initUI() {
            if (typeof JOGO_CONFIG === 'undefined') {
                console.error("Erro: JOGO_CONFIG não encontrado. Verifica o dados.js.");
                return;
            }

            const conf = JOGO_CONFIG;
            
            // Textos do Header e Intro
            document.title = conf.textos.tituloPagina;
            document.getElementById('main-game-title').innerText = conf.nomeJogo;
            document.getElementById('tit-l1').innerText = conf.textos.tituloLinha1;
            document.getElementById('tit-l2').innerText = conf.textos.tituloLinha2;
            document.getElementById('sub-tit').innerText = conf.textos.subtitulo;
            document.getElementById('intro-instr').innerText = conf.textos.instrucao;
            document.getElementById('mainFooter').innerHTML = conf.textos.rodape;

            // Ícones e Links
            document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu.ano1;
            document.getElementById('header-back-icon').src = conf.caminhoIcons + "voltar.png";
            document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
            document.getElementById('btn-outro-jogo').onclick = () => window.location.href = conf.linkVoltar;
            document.getElementById('link-voltar-header').href = conf.linkVoltar;
            document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
            document.getElementById('rd-intro-btn').src = conf.caminhoImg + "rd.png";

            // Montar Menu Hamburguer
            const menuBox = document.getElementById('dropdownMenu');
            menuBox.innerHTML = '';
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                const a = document.createElement('a'); 
                a.className = 'menu-item'; 
                a.href = conf.links[k];
                a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}"><span>${k==='home'?'Início':k.replace('ano',' ')+'º Ano'}</span>`;
                menuBox.appendChild(a);
            });
            
            const div = document.createElement('div'); div.className = 'menu-divider'; menuBox.appendChild(div);
            const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = conf.linkVoltar;
            btnV.innerHTML = `<img src="${conf.caminhoIcons}voltar.png"><span>${conf.textoVoltar}</span>`;
            menuBox.appendChild(btnV);

            // Iniciar lógica adicional definida no jogo.js (como a roleta de temas)
            if(window.startLogic) window.startLogic();
        }

        function goToGame() {
            document.body.classList.remove('with-footer');
            document.body.classList.add('no-footer');
            document.getElementById('scr-intro').classList.remove('active'); 
            document.getElementById('scr-game').classList.add('active'); 
            document.getElementById('status-bar').style.display = 'flex'; 
            document.getElementById('main-game-title').style.display = 'none';
            if(window.initGame) window.initGame(); 
        }

        function goToResult() {
            document.body.classList.remove('with-footer');
            document.body.classList.add('no-footer');
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-result').classList.add('active');
            document.getElementById('status-bar').style.display = 'none';
        }

        function toggleHamburger(e) { 
            e.stopPropagation(); 
            const m = document.getElementById('dropdownMenu'); 
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; 
        }
        
        function openRDMenu(e) { 
            e.stopPropagation(); 
            document.getElementById('rdMenu').classList.add('active'); 
            document.getElementById('overlay').style.display = 'block'; 
        }
        
        function closeMenus() { 
            document.getElementById('dropdownMenu').style.display = 'none'; 
            document.getElementById('rdMenu').classList.remove('active'); 
            document.getElementById('overlay').style.display = 'none'; 
        }

        window.onload = initUI;
    </script>
</body>
</html>
