<style>
    /* ... (restante do CSS igual ao anterior) ... */

    /* CONTENTOR DO ARMÁRIO */
    .armario-side { 
        flex: 1.5; 
        position: relative; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        height: 100%;
        max-height: 600px;
    }

    .armario-img-container {
        position: relative;
        height: 100%;
        /* Ajusta a proporção para manter o armário fiel à imagem */
        aspect-ratio: 350 / 520; 
    }

    .armario-img { 
        width: 100%; 
        height: 100%; 
        object-fit: contain; 
        display: block;
    }

    /* GRELHA DE DROP RIGOROSA */
    /* Estes valores (top, left, width, height) isolam APENAS a zona das cores */
    .armario-grid { 
        position: absolute; 
        top: 26.5%;    /* Começa exatamente no topo do quadrado 1 (azul) */
        left: 10.5%;   /* Alinhado à margem esquerda das cores */
        width: 79%;    /* Largura total das duas colunas de cores */
        height: 63.5%; /* Altura total das três linhas de cores */
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        grid-template-rows: 1fr 1fr 1fr; 
        /* Gaps ajustados para a "madeira" entre as prateleiras */
        column-gap: 8%; 
        row-gap: 4.5%;
        pointer-events: none; /* Deixa o drop passar para os slots */
    }

    .drop-slot { 
        pointer-events: auto; /* Reativa para aceitar o drop */
        display: flex; 
        align-items: center; 
        justify-content: center;
        border-radius: 8px;
        /* Debug: retira o comentário abaixo para ver as caixas se não estiverem centradas */
        /* background: rgba(0,0,0,0.1); */
    }

    /* ETIQUETA DENTRO DO ARMÁRIO */
    .label-in-slot {
        width: 90%; 
        height: 85%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .label-in-slot span {
        font-weight: 900;
        font-size: clamp(1.4rem, 5vw, 2.2rem); /* Letra grande e centrada */
        color: white; /* Cor da letra para contrastar com os fundos coloridos */
        text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        margin-top: -5px; /* Ajuste fino para o centro visual da etiqueta */
    }

    /* POOL DE ETIQUETAS (Lado Direito) */
    .pool-side { 
        flex: 0.8; 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 10px; 
        align-content: center; 
        padding-left: 15px;
        border-left: 3px dashed var(--cor-azul-tema);
    }

    .label-btn { 
        width: 100%; 
        height: 70px; 
        background-size: contain; 
        background-repeat: no-repeat; 
        background-position: center;
        display: flex; 
        align-items: center; 
        justify-content: center;
        cursor: grab;
    }

    .label-btn span { 
        font-weight: 900; 
        font-size: 1.6rem; 
        color: #333; 
        text-transform: uppercase;
        pointer-events: none;
    }
</style>

<!-- ... (O HTML do Game Screen permanece similar, mas com as novas classes) ... -->

<script>
    // ... (Lógica de carregar níveis igual) ...

    function renderGame(items) {
        const grid = document.getElementById('armario-grid');
        const pool = document.getElementById('pool-list');
        grid.innerHTML = ''; pool.innerHTML = '';

        // Cria os 6 slots transparentes sobre as cores
        for (let i = 0; i < 6; i++) {
            const slot = document.createElement('div');
            slot.className = 'drop-slot';
            slot.dataset.slotId = i;
            slot.addEventListener('dragover', e => e.preventDefault());
            slot.addEventListener('drop', handleDrop);
            grid.appendChild(slot);
        }

        // Embaralha e cria as etiquetas
        [...items].sort(() => 0.5 - Math.random()).forEach(txt => {
            const btn = document.createElement('div');
            btn.className = 'label-btn';
            btn.draggable = true;
            btn.style.backgroundImage = `url(${JOGO_CONFIG.caminhoImg}etiquetas_letras.png)`;
            btn.innerHTML = `<span>${txt}</span>`;
            
            btn.addEventListener('dragstart', () => { draggedText = txt; btn.classList.add('dragging'); });
            btn.addEventListener('dragend', () => btn.classList.remove('dragging'));
            
            // Touch para Tablets/Telemóveis
            btn.addEventListener('touchstart', (e) => { draggedText = txt; }, {passive:true});
            btn.addEventListener('touchend', e => {
                const t = e.changedTouches[0];
                const target = document.elementFromPoint(t.clientX, t.clientY);
                const slot = target ? target.closest('.drop-slot') : null;
                if (slot) placeInSlot(slot, txt, btn);
            });

            pool.appendChild(btn);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const slot = e.currentTarget;
        const originalBtn = document.querySelector('.label-btn.dragging');
        placeInSlot(slot, draggedText, originalBtn);
    }

    function placeInSlot(slot, text, originalBtn) {
        // Se já houver algo no slot, limpamos (ou podes fazer lógica de troca)
        slot.innerHTML = `
            <div class="label-in-slot" style="background-image: url(${JOGO_CONFIG.caminhoImg}etiquetas_letras.png);">
                <span>${text}</span>
            </div>`;
        if(originalBtn) originalBtn.remove();
    }

    function verifyOrder() {
        const slots = Array.from(document.querySelectorAll('.drop-slot'));
        const words = slots.map(s => s.innerText.trim()).filter(t => t !== "");
        
        if(words.length < 6) {
            alert("Tens de preencher todas as cores primeiro!");
            return;
        }

        const correct = [...words].sort((a, b) => a.localeCompare(b, 'pt', {sensitivity: 'base'}));
        let errors = 0;

        slots.forEach((s, i) => {
            const span = s.querySelector('span');
            if (span.innerText === correct[i]) {
                span.style.color = "#2ed573"; // Verde se estiver na ordem certa
            } else {
                span.style.color = "#ff4757"; // Vermelho se estiver errado
                errors++;
            }
        });

        if (errors === 0) {
            clearInterval(timerInterval);
            document.getElementById('modal').style.display = 'flex';
        }
    }
</script>
