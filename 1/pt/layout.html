<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --text-grey: #5d7082;
            --outer-shadow: 0px 0px 20px #b0c4d9, 0px 0px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* HEADER */
        header { 
            background: var(--bg-page);
            width: 100%;
            margin: 0;
            padding: 0;
            border-radius: 0;
            box-shadow: 0px 4px 10px rgba(176, 196, 217, 0.3);
            display: grid;
            grid-template-columns: 110px 1fr 110px; /* Colunas laterais largas para os paddings */
            align-items: start;
            flex-shrink: 0;
            z-index: 1000;
            min-height: 120px;
        }

        /* MENU HAMBÚRGUER */
        .header-left {
            padding: 20px; /* Padding Desktop */
            display: flex;
            justify-content: flex-start;
        }
        .hamburger-btn { 
            font-size: 32px; 
            color: var(--primary-blue); 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .hamburger-btn:hover {
            color: var(--primary-dark);
            transform: scale(1.1);
        }

        /* CONTEÚDO CENTRAL */
        .header-center-content {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 12px;
            padding-top: 5px;
        }
        #header-icon {
            height: 100px;
            width: auto;
            filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1));
        }
        .header-titles {
            display: flex;
            flex-direction: column;
            line-height: 0.95;
            padding-top: 15px;
        }
        .title-main {
            color: var(--primary-blue);
            font-weight: 900;
            font-size: 1.4rem;
            text-transform: uppercase;
        }
        .title-sub {
            color: var(--text-grey);
            font-weight: 400;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* BOTÃO VOLTAR */
        .header-right {
            padding-top: 20px;
            padding-right: 20px;
            display: flex;
            justify-content: flex-end;
        }
        .btn-voltar { 
            background: var(--primary-blue); 
            color: white; 
            padding: 8px 16px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.8rem; 
            box-shadow: 0 4px 0 var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .btn-voltar:hover { transform: translateY(-2px); }
        .btn-voltar i { display: none; } /* Esconde a seta no desktop */

        /* TEXTO DE INTRODUÇÃO */
        .intro-text {
            grid-column: 1 / -1; 
            text-align: center;
            color: var(--text-grey);
            font-size: 0.85rem;
            font-weight: 400;
            margin: 10px 0 20px 0;
            padding: 0 20px;
        }

        /* GRID DE JOGOS */
        .game-wrapper { 
            flex: 1; 
            padding: 10px 80px; 
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 25px;
            justify-items: center;
            align-content: start;
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; max-width: 180px; min-height: 160px;
            border-radius: 35px; box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; transition: all 0.2s ease;
            padding: 15px; text-align: center;
        }
        .game-card:hover { transform: translateY(-3px); }

        .card-img-container {
            width: 100%; height: 90px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 5px;
        }
        .card-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.12)); }
        .game-card h2 { color: var(--primary-blue); font-size: 0.8rem; font-weight: 900; margin-top: auto; }

        footer { height: 35px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.8rem; }

        /* MENU DROPDOWN */
        .menu-dropdown { 
            position: absolute; top: 70px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; color: #555; font-weight: 700;
        }
        .menu-item:hover { background: var(--primary-blue); color: white; }

        /* --- CONFIGURAÇÕES PARA TELEMÓVEL --- */
        @media (max-width: 600px) { 
            header { 
                grid-template-columns: 80px 1fr 80px; /* Colunas laterais para telemóvel */
                min-height: 110px; 
            }
            
            /* PADDING MAIOR PARA OS BOTÕES NO TELEMÓVEL */
            .header-left { padding: 30px 0 0 25px; }
            .header-right { padding: 25px 25px 0 0; }

            /* BOTÃO VOLTAR - FORMATO QUADRADO COM SETA */
            .btn-voltar {
                width: 50px; /* Mais estreito */
                height: 50px;
                padding: 0;
                border-radius: 15px; /* Mantém cantos arredondados do estilo */
                font-size: 22px;
            }
            .btn-voltar span { display: none; } /* Esconde o texto "VOLTAR" */
            .btn-voltar i { display: block; }  /* Mostra a seta */

            .hamburger-btn { font-size: 35px; } /* Hambúrguer maior no telemóvel */
            
            #header-icon { height: 75px; }
            .title-main { font-size: 1rem; }
            .title-sub { font-size: 0.75rem; }
            .game-wrapper { grid-template-columns: repeat(2, 1fr); padding: 10px; }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .game-wrapper { grid-template-columns: repeat(3, 1fr); padding: 10px 40px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>

        <div class="header-center-content">
            <img id="header-icon" src="" alt="Girafa">
            <div class="header-titles">
                <div class="title-main">Pequenos</div>
                <div class="title-main">Leitores</div>
                <div class="title-sub">Português | 1º Ano</div>
            </div>
        </div>

        <div class="header-right">
            <a href="../index.html" class="btn-voltar">
                <i class="fas fa-arrow-left"></i>
                <span>VOLTAR</span>
            </a>
        </div>
    </header>

    <div class="game-wrapper" id="gamesGrid">
        <div class="intro-text">
            Explora as letras, as palavras e diverte-te a ler!
        </div>
    </div>

    <footer>2026</footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = () => { document.getElementById('dropdownMenu').style.display = 'none'; };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                const menuBox = document.getElementById('dropdownMenu');
                const niveis = [
                    { l: 'Pré-Escolar', k: 'pre' }, { l: '1º Ano', k: 'ano1' },
                    { l: '2º Ano', k: 'ano2' }, { l: '3º Ano', k: 'ano3' }, { l: '4º Ano', k: 'ano4' }
                ];
                niveis.forEach(n => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = `../${n.k}/index.html`;
                    a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[n.k]}" style="height:20px;"><span>${n.l}</span>`;
                    menuBox.appendChild(a);
                });

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
