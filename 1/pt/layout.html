<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8; 
            --text-grey: #5d7082;
            --outer-shadow: 0px 0px 20px #b0c4d9, 0px 0px 20px #ffffff;
        }

        /* RESET E ESTRUTURA FIXA */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        html, body { 
            height: 100vh; 
            height: 100dvh; /* Para mobile ignorar barras do browser */
            width: 100vw; 
            margin: 0;
            overflow: hidden; /* Impede scroll na página toda */
        }

        body { 
            background-color: var(--bg-page); 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER FIXO */
        header { 
            background: var(--bg-page);
            width: 100%; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            display: grid;
            grid-template-columns: 80px 1fr 80px; /* Alinhamento equilibrado */
            align-items: center; 
            flex-shrink: 0; /* Não deixa o header encolher */
            z-index: 1000;
            min-height: 110px;
            padding: 0 20px;
        }

        .hamburger-btn { 
            font-size: 32px; 
            color: var(--primary-blue); 
            cursor: pointer;
            transition: 0.2s ease;
        }
        .hamburger-btn:hover { transform: scale(1.1); color: var(--primary-dark); }

        .header-center-content {
            display: flex; align-items: center; justify-content: center;
            gap: 15px;
        }
        #header-icon { height: 85px; width: auto; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); }

        .header-titles { display: flex; flex-direction: column; line-height: 1; }
        .title-main { color: var(--primary-blue); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; }
        .title-sub { color: var(--text-grey); font-weight: 400; font-size: 0.9rem; margin-top: 5px; }

        /* AREA DE JOGOS (SCROLL APENAS AQUI) */
        .game-wrapper { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px 50px; 
            display: grid; 
            /* Grelha responsiva automática */
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 30px; 
            justify-items: center; 
            align-content: start;
            -webkit-overflow-scrolling: touch; /* Scroll suave em iOS */
        }

        .intro-text {
            grid-column: 1 / -1; text-align: center; color: var(--text-grey);
            font-size: 1rem; margin-bottom: 10px;
        }

        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 190px; min-height: 170px;
            border-radius: 35px; box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; transition: 0.2s ease;
            padding: 20px; text-align: center;
        }
        .game-card:hover { transform: translateY(-5px); }

        .card-img-container { width: 100%; height: 85px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .card-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .game-card h2 { color: var(--primary-blue); font-size: 0.85rem; font-weight: 900; margin-top: auto; }

        /* FOOTER SEMPRE NO FUNDO */
        footer {
            background: var(--bg-page);
            width: 100%; 
            padding: 15px; 
            text-align: center; 
            flex-shrink: 0; /* Garante que o footer não é esmagado */
            border-top: 1px solid rgba(176, 196, 217, 0.3);
            color: var(--text-grey); 
            font-weight: 700; 
            font-size: 0.8rem;
        }

        /* DROPDOWN MENU */
        .menu-dropdown { 
            position: absolute; top: 80px; left: 20px; 
            display: none; flex-direction: column; gap: 5px; z-index: 2000; 
            background: white; padding: 12px; border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px 15px; 
            border-radius: 12px; cursor: pointer; min-width: 200px; 
            text-decoration: none; color: #555; font-weight: 700; transition: 0.2s;
        }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        .menu-item img { width: 24px; height: 24px; object-fit: contain; }
        
        .menu-divider { height: 1px; background-color: #eee; margin: 8px 10px; border: none; }

        /* AJUSTES MOBILE */
        @media (max-width: 600px) { 
            header { grid-template-columns: 60px 1fr; min-height: 90px; }
            .header-titles .title-main { font-size: 1.1rem; }
            .game-wrapper { padding: 15px; grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .game-card { min-height: 150px; padding: 15px; border-radius: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center-content">
            <img id="header-icon" src="" alt="">
            <div class="header-titles">
                <div class="title-main">Pequenos Leitores</div>
                <div class="title-sub">Português | 1º Ano</div>
            </div>
        </div>
        <div></div> <!-- Espaçador para manter centro -->
    </header>

    <div class="game-wrapper" id="gamesGrid">
        <div class="intro-text">Explora as letras, as palavras e diverte-te a ler!</div>
        <!-- Injeção automática de jogos aqui -->
    </div>

    <footer>
        &copy; Pequenos Leitores - Recursos Educativos
    </footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = () => { 
            document.getElementById('dropdownMenu').style.display = 'none'; 
        };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // 1. Icone do Cabeçalho
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                // 2. Construir Menu Lateral
                const menuBox = document.getElementById('dropdownMenu');
                const niveis = [
                    { l: 'Início', k: 'home' },
                    { l: 'Pré-Escolar', k: 'pre' },
                    { l: '1º Ano', k: 'ano1' },
                    { l: '2º Ano', k: 'ano2' },
                    { l: '3º Ano', k: 'ano3' },
                    { l: '4º Ano', k: 'ano4' }
                ];

                niveis.forEach(n => {
                    if(config.links[n.k]) {
                        const a = document.createElement('a');
                        a.className = 'menu-item';
                        a.href = config.links[n.k];
                        const iconFile = (n.k === 'home') ? config.iconesMenu.ano1 : config.iconesMenu[n.k];
                        a.innerHTML = `<img src="${config.caminhoIconsMenu}${iconFile}"><span>${n.l}</span>`;
