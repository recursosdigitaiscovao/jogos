<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --text-grey: #5d7082;
            --outer-shadow: 0px 0px 20px #b0c4d9, 0px 0px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER */
        header { 
            background: var(--bg-page);
            width: 100%; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            display: grid;
            grid-template-columns: 110px 1fr 110px;
            align-items: start; 
            flex-shrink: 0; 
            z-index: 1000;
            min-height: 120px;
        }

        .header-left { padding: 20px; display: flex; justify-content: flex-start; }
        
        .hamburger-btn { 
            font-size: 32px; 
            color: var(--primary-blue); 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .hamburger-btn:hover { 
            color: var(--primary-dark); 
            transform: scale(1.1); 
        }

        .header-center-content {
            display: flex; align-items: flex-start; justify-content: center;
            gap: 12px; padding-top: 5px;
        }
        #header-icon { height: 100px; width: auto; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); }

        .header-titles { display: flex; flex-direction: column; line-height: 0.95; padding-top: 15px; }
        .title-main { color: var(--primary-blue); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; }
        .title-sub { color: var(--text-grey); font-weight: 400; font-size: 0.85rem; margin-top: 6px; }

        .header-right { padding-top: 20px; padding-right: 20px; }

        /* ÁREA CENTRAL */
        .game-wrapper { 
            flex: 1; 
            padding: 20px 80px; 
            overflow-y: auto; 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 25px; 
            justify-items: center; 
            align-content: start;
            -webkit-overflow-scrolling: touch;
        }

        .intro-text {
            grid-column: 1 / -1; text-align: center; color: var(--text-grey);
            font-size: 0.85rem; font-weight: 400; margin: 10px 0 20px 0; padding: 0 20px;
        }

        /* CARD DOS JOGOS - Cantos em 18px */
        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 180px; min-height: 160px;
            border-radius: 18px; 
            box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; transition: all 0.2s ease;
            padding: 15px; text-align: center;
        }
        .game-card:hover { transform: translateY(-3px); }

        .card-img-container { width: 100%; height: 90px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .card-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .game-card h2 { color: var(--primary-blue); font-size: 0.8rem; font-weight: 900; margin-top: auto; }

        /* FOOTER */
        footer {
            background: var(--bg-page);
            width: 100%;
            padding: 15px;
            text-align: center;
            flex-shrink: 0; 
            border-top: 1px solid rgba(176, 196, 217, 0.3);
            color: var(--text-grey);
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 1000;
        }

        /* MENU HAMBURGUER / DROPDOWN */
        .menu-dropdown { 
            position: absolute; top: 70px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 200px; text-decoration: none; color: #555; font-weight: 700;
            transition: all 0.2s;
        }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        
        .menu-divider {
            height: 2px;
            background-color: rgba(176, 196, 217, 0.4);
            margin: 5px 10px;
            border-radius: 2px;
        }

        /* MOBILE */
        @media (max-width: 600px) { 
            header { grid-template-columns: 80px 1fr 80px; min-height: 110px; }
            .header-left { padding: 30px 0 0 25px; }
            .game-wrapper { grid-template-columns: repeat(2, 1fr); padding: 10px; }
            #header-icon { height: 75px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center-content">
            <img id="header-icon" src="" alt="Ícone">
            <div class="header-titles">
                <div class="title-main">Pequenos</div>
                <div class="title-main">Leitores</div>
                <div class="title-sub">Português | 1º Ano</div>
            </div>
        </div>
        <div class="header-right"></div>
    </header>

    <div class="game-wrapper" id="gamesGrid">
        <div class="intro-text">Explora as letras, as palavras e diverte-te a ler!</div>
    </div>

    <footer>
        &copy; Pequenos Leitores - Recursos Educativos
    </footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        // Fecha o menu ao clicar fora
        window.onclick = () => { 
            const menu = document.getElementById('dropdownMenu');
            if(menu) menu.style.display = 'none'; 
        };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // Define o ícone do header (Ano 1)
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                const menuBox = document.getElementById('dropdownMenu');

                // 1. GERAÇÃO DINÂMICA DOS ITENS DE NÍVEL (Incluindo Home com home.png)
                const niveis = [
                    { label: 'Início', key: 'home' },
                    { label: 'Pré-Escolar', key: 'pre' },
                    { label: '1º Ano', key: 'ano1' },
                    { label: '2º Ano', key: 'ano2' },
                    { label: '3º Ano', key: 'ano3' },
                    { label: '4º Ano', key: 'ano4' }
                ];

                niveis.forEach(n => {
                    if(config.links[n.key]) {
                        const a = document.createElement('a');
                        a.className = 'menu-item';
                        a.href = config.links[n.key];
                        
                        // Busca o ícone dinamicamente do objeto iconesMenu no dados.js
                        const iconFile = config.iconesMenu[n.key]; 
                        
                        a.innerHTML = `
                            <img src="${config.caminhoIconsMenu}${iconFile}" style="height:22px; width:22px; object-fit:contain;">
                            <span>${n.label}</span>
                        `;
                        menuBox.appendChild(a);
                    }
                });

                // 2. ADICIONA O SEPARADOR
                const divider = document.createElement('div');
                divider.className = 'menu-divider';
                menuBox.appendChild(divider);

                // 3. ADICIONA O BOTÃO VOLTAR (Último item)
                const btnVoltar = document.createElement('a');
                btnVoltar.className = 'menu-item';
                btnVoltar.href = '../index.html'; // Caminho fixo para sair da pasta do ano
                btnVoltar.innerHTML = `
                    <img src="${config.caminhoIconsMenu}${config.iconesMenu.voltar}" style="height:22px; width:22px; object-fit:contain;">
                    <span>VOLTAR</span>
                `;
                menuBox.appendChild(btnVoltar);

                // 4. GERAÇÃO DA GRID DE JOGOS
                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
