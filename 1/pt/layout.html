<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Jogos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { 
            font-size: 26px; color: var(--primary-blue); cursor: pointer; 
            padding: 8px; display: flex; align-items: center; justify-content: center;
            z-index: 2001;
        }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* MENU HAMBÚRGUER (DROPDOWN) */
        .menu-dropdown { 
            position: absolute; top: 65px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; 
            color: #555; font-weight: 700; transition: 0.2s;
        }
        .menu-item:hover { background: var(--primary-blue); color: white; }

        /* CONTENTOR DE JOGOS (GRID) */
        .game-wrapper { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; /* Permite scroll se houver muitos jogos */
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            justify-items: center;
            align-content: start;
        }

        /* ESTILO DO GAME CARD (TRANSFORMADO EM BOTÃO) */
        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 350px;
            aspect-ratio: 1/1; /* Mantém o card quadrado */
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: none;
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0px 10px 30px #b0c4d9;
        }

        .game-card:active {
            transform: scale(0.98);
        }

        .card-img-container {
            width: 120px; height: 120px;
            background: var(--bg-page);
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--outer-shadow);
            margin-bottom: 20px;
        }
        
        .card-img-container img { height: 70px; width: auto; }

        .game-card h2 {
            color: var(--primary-blue);
            font-size: 1.4rem;
            font-weight: 900;
            margin: 0;
            line-height: 1.2;
        }

        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; flex-shrink: 0; }

        /* Scrollbar estilizada */
        .game-wrapper::-webkit-scrollbar { width: 8px; }
        .game-wrapper::-webkit-scrollbar-track { background: transparent; }
        .game-wrapper::-webkit-scrollbar-thumb { background: #cbd9e6; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown">
                <!-- Menu preenchido via JS -->
            </div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <!-- Contentor onde os jogos serão inseridos -->
    <div class="game-wrapper" id="gamesGrid">
        <!-- Os cartões (game-card) entrarão aqui -->
    </div>

    <footer>2026</footer>

    <script src="dados.js"></script>
    <script>
        // FUNÇÃO PARA ABRIR/FECHAR O MENU
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        // FECHAR MENU AO CLICAR FORA
        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
        };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;

                // 1. Preencher Ícone do Header
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                // 2. Criar Menu Hamburguer Dinâmico
                const menuBox = document.getElementById('dropdownMenu');
                const links = [
                    { label: 'Pré-Escolar', key: 'pre' },
                    { label: '1º Ano', key: 'ano1' },
                    { label: '2º Ano', key: 'ano2' },
                    { label: '3º Ano', key: 'ano3' },
                    { label: '4º Ano', key: 'ano4' }
                ];

                links.forEach(item => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = `../${item.key}/index.html`; // Ajuste conforme a sua estrutura de pastas
                    a.innerHTML = `
                        <img src="${config.caminhoIconsMenu}${config.iconesMenu[item.key]}" style="height:24px;">
                        <span>${item.label}</span>
                    `;
                    menuBox.appendChild(a);
                });

                // 3. Gerar Cartões de Jogos de acordo com a listaJogos
                const grid = document.getElementById('gamesGrid');
                
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link; // Direciona para a pasta do jogo

                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
