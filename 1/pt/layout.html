<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 5px 30px 15px 30px; 
            min-height: 0;
            overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 900px; 
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        .status { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px;
        }
        
        #dots-container { display: flex; gap: 8px; align-items: center; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #cbd9e6; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1); }

        /* INTRO OVERLAY COMO BOTÃO */
        #intro-overlay {
            position: absolute; top: 0; left: 0; right: 0; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
            text-align: center;
            cursor: pointer; /* Transforma em botão */
            transition: transform 0.2s ease;
        }

        #intro-overlay:hover {
            transform: scale(1.01);
        }

        #intro-overlay:active {
            transform: scale(0.98);
        }

        .intro-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            pointer-events: none; /* Garante que o clique passe para o overlay */
        }

        .intro-img-container {
            width: 160px; height: 160px;
            background: var(--bg-page);
            border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--outer-shadow);
        }
        
        #intro-img { height: 90px; width: auto; }

        .intro-content h1 {
            color: var(--primary-blue);
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
        }

        main { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }
        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; }

        @media (max-width: 450px) { 
            .game-wrapper { padding: 5px 20px 15px 20px; } 
            .intro-content h1 { font-size: 1.8rem; }
            .intro-img-container { width: 130px; height: 130px; }
            #intro-img { height: 70px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" style="font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 8px;"></i>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div id="dots-container"></div>
                <div style="font-weight: 900; color: var(--primary-blue);">
                    <span id="points-label">0</span>
                </div>
            </section>

            <!-- O CARD INTEIRO É UM BOTÃO -->
            <div id="intro-overlay" onclick="mostrarJogo()">
                <div class="intro-content">
                    <div class="intro-img-container">
                        <img id="intro-img" src="" alt="Ícone do Jogo">
                    </div>
                    <h1 id="game-title">Carregando...</h1>
                </div>
            </div>

            <main id="game-area">
                <!-- O conteúdo do jogo aparece aqui após o clique -->
                <h2 style="color: var(--primary-blue);">O Jogo Começou!</h2>
            </main>
        </div>
    </div>

    <footer id="main-footer">2026</footer>

    <script src="dados.js"></script>
    <script>
        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            // Aqui você iniciaria a lógica real do jogo
            console.log("Jogo iniciado!");
        }

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // 1. Define o ícone do cabeçalho (ex: icon1.png)
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;
                
                // 2. Carrega os dados do PRIMEIRO jogo da lista como exemplo
                // Em um cenário real, você poderia identificar qual jogo carregar via URL ou ID
                const jogoAtual = config.listaJogos[0]; 
                
                if (jogoAtual) {
                    document.getElementById('game-title').innerText = jogoAtual.nome;
                    document.getElementById('intro-img').src = config.caminhoIconsJogos + jogoAtual.icon;
                }

                // 3. Inicializa os dots de progresso
                const container = document.getElementById('dots-container');
                for (let i = 0; i < 5; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    container.appendChild(dot);
                }
            }
        };
    </script>
</body>
</html>
