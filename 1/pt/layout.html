<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8; 
            --white: #ffffff;
            --text-grey: #5d7082;
            --outer-shadow: 0px 0px 20px #b0c4d9, 0px 0px 20px #ffffff;
        }

        /* RESET E ESTRUTURA FIXA */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* Impede o scroll na página inteira */
        }

        body { 
            background-color: var(--bg-page); 
            display: flex; 
            flex-direction: column; 
            /* 100dvh garante que em telemóveis o footer não fique tapado pela barra do browser */
            height: 100dvh; 
        }

        /* HEADER FIXO */
        header { 
            background: var(--bg-page);
            width: 100%; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Centralização perfeita */
            align-items: center; 
            flex-shrink: 0; /* Impede o header de encolher */
            z-index: 1000;
            padding: 10px 20px;
            min-height: 100px;
        }

        .header-left { display: flex; justify-content: flex-start; }
        
        .hamburger-btn { 
            font-size: 32px; 
            color: var(--primary-blue); 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .hamburger-btn:hover { color: var(--primary-dark); transform: scale(1.1); }

        .header-center-content {
            display: flex; align-items: center; justify-content: center;
            gap: 15px;
        }
        #header-icon { height: 80px; width: auto; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); }

        .header-titles { display: flex; flex-direction: column; line-height: 1; }
        .title-main { color: var(--primary-blue); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; }
        .title-sub { color: var(--text-grey); font-weight: 400; font-size: 0.9rem; margin-top: 4px; }

        .header-right { display: flex; justify-content: flex-end; }

        /* ÁREA DE JOGOS (Única parte que faz scroll) */
        .game-wrapper { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            display: grid; 
            /* Grid responsiva: ajusta colunas conforme a largura */
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 30px; 
            justify-items: center; 
            align-content: start;
            max-width: 1200px; /* Limita largura em monitores gigantes */
            margin: 0 auto;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .intro-text {
            grid-column: 1 / -1; text-align: center; color: var(--text-grey);
            font-size: 1rem; margin-bottom: 10px; padding: 0 20px;
        }

        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 200px; min-height: 180px;
            border-radius: 35px; box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; transition: all 0.2s ease;
            padding: 20px; text-align: center;
        }
        .game-card:hover { transform: translateY(-5px); }

        .card-img-container { width: 100%; height: 90px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .card-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .game-card h2 { color: var(--primary-blue); font-size: 0.9rem; font-weight: 900; margin-top: auto; }

        /* FOOTER SEMPRE VISÍVEL */
        footer {
            background: var(--bg-page);
            width: 100%; 
            padding: 15px; 
            text-align: center; 
            flex-shrink: 0; /* Importante para não sumir */
            border-top: 1px solid rgba(176, 196, 217, 0.3);
            color: var(--text-grey); 
            font-weight: 700; 
            font-size: 0.85rem;
            z-index: 1000;
        }

        /* DROPDOWN MENU */
        .menu-dropdown { 
            position: absolute; top: 70px; left: 20px; 
            display: none; flex-direction: column; gap: 4px; z-index: 2000; 
            background: white; padding: 12px; border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px 15px; 
            border-radius: 12px; cursor: pointer; min-width: 200px; 
            text-decoration: none; color: #555; font-weight: 700; transition: 0.2s;
        }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        .menu-item img { width: 24px; height: 24px; object-fit: contain; }
        
        .menu-divider { height: 1px; background-color: #eee; margin: 8px 10px; border: none; }

        /* AJUSTES PARA MONITORES MUITO PEQUENOS / MOBILE */
        @media (max-width: 600px) { 
            header { min-height: 80px; grid-template-columns: 60px 1fr; }
            .header-right { display: none; } /* Esconde espaço vazio no mobile */
            #header-icon { height: 60px; }
            .title-main { font-size: 1.1rem; }
            .title-sub { font-size: 0.75rem; }
            .game-wrapper { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; }
            .game-card { min-height: 150px; padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center-content">
            <img id="header-icon" src="" alt="Ícone">
            <div class="header-titles">
                <div class="title-main">Pequenos</div>
                <div class="title-main">Leitores</div>
                <div class="title-sub">Português | 1º Ano</div>
            </div>
        </div>
        <div class="header-right"></div>
    </header>

    <div class="game-wrapper" id="gamesGrid">
        <div class="intro-text">Explora as letras, as palavras e diverte-te a ler!</div>
        <!-- Os jogos entram aqui via JS -->
    </div>

    <footer>
        &copy; Pequenos Leitores - Recursos Educativos
    </footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = () => { 
            document.getElementById('dropdownMenu').style.display = 'none'; 
        };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                const menuBox = document.getElementById('dropdownMenu');
                const niveis = [
                    { l: 'Início', k: 'home' },
                    { l: 'Pré-Escolar', k: 'pre' },
                    { l: '1º Ano', k: 'ano1' },
                    { l: '2º Ano', k: 'ano2' },
                    { l: '3º Ano', k: 'ano3' },
                    { l: '4º Ano', k: 'ano4' }
                ];

                niveis.forEach(n => {
                    if(config.links[n.k]) {
                        const a = document.createElement('a');
                        a.className = 'menu-item';
                        a.href = config.links[n.k];
                        const iconFile = (n.k === 'home') ? config.iconesMenu.ano1 : config.iconesMenu[n.k];
                        a.innerHTML = `<img src="${config.caminhoIconsMenu}${iconFile}"><span>${n.l}</span>`;
                        menuBox.appendChild(a);
                    }
                });

                // Linha de quebra
                const hr = document.createElement('hr');
                hr.className = 'menu-divider';
                menuBox.appendChild(hr);

                // Item Voltar
                const btnVoltar = document.createElement('a');
                btnVoltar.className = 'menu-item';
                btnVoltar.href = "../";
                btnVoltar.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu.voltar}"><span>Voltar</span>`;
                menuBox.appendChild(btnVoltar);

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
