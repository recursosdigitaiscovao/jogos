<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Jogo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --text-color: #4a5a6a;
            --outer-shadow: 0px 15px 35px rgba(176, 196, 217, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }

        .header-center { 
            display: flex; align-items: center; gap: 12px; 
            color: var(--primary-blue); font-weight: 900; font-size: 1.4rem;
        }
        .header-center img { height: 35px; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1)); }

        .btn-voltar { 
            background: var(--white); color: var(--primary-blue); padding: 8px 18px; 
            border-radius: 15px; text-decoration: none; font-weight: 900; 
            font-size: 0.85rem; border: 2px solid var(--primary-blue);
        }

        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 10px 25px 30px 25px; 
            min-height: 0;
        }

        .game-card { 
            background: var(--white); 
            width: 100%; 
            max-width: 850px; 
            height: 100%; 
            border-radius: 45px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
            border: 8px solid var(--white);
        }

        /* BARRA DE STATUS */
        .status { 
            height: 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 25px;
            z-index: 10;
        }
        
        #dots-container { display: flex; gap: 10px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: #e0e7ee; }

        /* --- PRIMEIRO ECRÃ (APENAS ÍCONE E TÍTULO) --- */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .intro-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px; /* Espaço entre imagem e texto */
        }

        .intro-img-container {
            width: 180px; height: 180px;
            background: white;
            border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border: 4px solid #f0f7ff;
        }
        #intro-img { height: 100px; width: auto; object-fit: contain; }

        .intro-content h1 {
            color: var(--text-color);
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1.1;
            max-width: 90%;
        }

        main { flex: 1; display: none; }
        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; }

        @media (max-width: 450px) { 
            .intro-content h1 { font-size: 2rem; }
            .intro-img-container { width: 140px; height: 140px; }
            #intro-img { height: 75px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn"></i>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div id="dots-container"></div>
                <div style="font-weight: 900; color: var(--primary-blue); font-size: 1.2rem;">
                    <span id="points-label">0</span>
                </div>
            </section>

            <!-- PRIMEIRO ECRÃ SIMPLIFICADO -->
            <div id="intro-overlay">
                <div class="intro-content">
                    <div class="intro-img-container">
                        <img id="intro-img" src="" alt="Ícone do Jogo">
                    </div>
                    <h1 id="game-title">Título do Jogo</h1>
                </div>
            </div>

            <main id="game-area">
                <!-- O jogo será inserido aqui pelo JS -->
            </main>
        </div>
    </div>

    <footer id="main-footer">© 2026 - Plataforma Educativa</footer>

    <script src="dados.js"></script>
    <script>
        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                document.getElementById('header-icon').src = config.caminhoIcons + config.iconesMenu.ano1;
                document.getElementById('intro-img').src = config.caminhoIcons + config.iconesMenu.ano1;
                document.getElementById('game-title').innerText = config.titulo || "Nome do Jogo";
                
                // Inicializa os dots de progresso
                const container = document.getElementById('dots-container');
                for (let i = 0; i < 5; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    container.appendChild(dot);
                }
            }
        };
    </script>
</body>
</html>
