<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { 
            font-size: 26px; 
            color: var(--primary-blue); 
            cursor: pointer; 
            padding: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        /* BOTÃO VOLTAR - ESTILO ORIGINAL */
        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 5px 30px 15px 30px; 
            min-height: 0;
            overflow: hidden;
        }

        /* GAME CARD - ESTILO ORIGINAL */
        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 900px; 
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        .status { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px;
        }
        
        #dots-container {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #cbd9e6;
            transition: all 0.3s ease;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* PRIMEIRO ECRÃ - SIMPLIFICADO DENTRO DO CARD */
        #intro-overlay {
            position: absolute; top: 0; left: 0; right: 0; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .intro-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .intro-img-container {
            width: 160px; height: 160px;
            background: var(--bg-page);
            border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--outer-shadow); /* Mesma sombra do card para consistência */
        }
        
        #intro-img { height: 90px; width: auto; }

        .intro-content h1 {
            color: var(--primary-blue);
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
        }

        main { flex: 1; display: none; }
        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; }

        @media (max-width: 450px) { 
            .game-wrapper { padding: 5px 20px 15px 20px; } 
            .intro-content h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn"></i>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div id="dots-container"></div>
                <div style="font-weight: 900; color: var(--primary-blue);">
                    <span id="points-label">0</span>
                </div>
            </section>

            <!-- PRIMEIRO ECRÃ (APENAS ÍCONE E TÍTULO) -->
            <div id="intro-overlay">
                <div class="intro-content">
                    <div class="intro-img-container">
                        <img id="intro-img" src="" alt="Ícone">
                    </div>
                    <h1 id="game-title">Título do Jogo</h1>
                </div>
            </div>

            <main id="game-area"></main>
        </div>
    </div>

    <footer id="main-footer">2026</footer>

    <script src="dados.js"></script>
    <script>
        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                document.getElementById('header-icon').src = config.caminhoIcons + config.iconesMenu.ano1;
                document.getElementById('intro-img').src = config.caminhoIcons + config.iconesMenu.ano1;
                document.getElementById('game-title').innerText = config.titulo || "Título do Jogo";
                
                // Inicializa progresso vazio
                const container = document.getElementById('dots-container');
                for (let i = 0; i < 5; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    container.appendChild(dot);
                }
            }
        };
    </script>
</body>
</html>
