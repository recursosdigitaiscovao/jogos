<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Jogo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --text-color: #4a5a6a;
            --outer-shadow: 0px 15px 35px rgba(176, 196, 217, 0.4);
            --inner-shadow: inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* HEADER ESTILIZADO */
        header { 
            height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }

        .header-center { 
            display: flex; align-items: center; gap: 12px; 
            color: var(--primary-blue); font-weight: 900; font-size: 1.4rem;
        }
        .header-center img { height: 35px; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1)); }

        .btn-voltar { 
            background: var(--white); color: var(--primary-blue); padding: 8px 18px; 
            border-radius: 15px; text-decoration: none; font-weight: 900; 
            font-size: 0.85rem; border: 2px solid var(--primary-blue);
            transition: all 0.2s ease;
        }

        /* CONTAINER DO CARTÃO */
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 10px 25px 30px 25px; 
            min-height: 0;
        }

        .game-card { 
            background: var(--white); 
            width: 100%; 
            max-width: 850px; 
            height: 100%; 
            border-radius: 45px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
            border: 8px solid var(--white);
        }

        /* STATUS BAR (TOP DENTRO DO CARD) */
        .status { 
            height: 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 25px;
            z-index: 10;
        }
        
        #dots-container { display: flex; gap: 10px; }
        .dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: #e0e7ee; transition: all 0.3s ease;
        }
        .dot.active { background: var(--primary-blue); transform: scale(1.2); box-shadow: 0 0 10px rgba(91,164,229,0.5); }
        .dot.completed { background: #a8d5ff; }

        /* --- PRIMEIRO ECRÃ (INTRO OVERLAY) --- */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 40px 20px;
            text-align: center;
        }

        .intro-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .intro-badge {
            background: #e1f0ff;
            color: var(--primary-blue);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .intro-img-container {
            width: 140px; height: 140px;
            background: white;
            border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 10px;
            border: 4px solid #f0f7ff;
        }
        #intro-img { height: 80px; width: auto; object-fit: contain; }

        .intro-content h1 {
            color: var(--text-color);
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.2;
            max-width: 80%;
        }

        /* AÇÕES DO INTRO */
        .intro-actions { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            width: 100%; 
            max-width: 400px;
            padding-bottom: 20px;
        }

        .btn-jogar {
            flex: 1; 
            height: 65px;
            background: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-weight: 900; 
            font-size: 1.4rem;
            cursor: pointer; 
            box-shadow: 0 8px 0 var(--primary-dark); 
            transition: all 0.1s active;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-jogar:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        .rd-intro-btn { 
            height: 65px; width: 65px; 
            background: #f0f4f8;
            border-radius: 25px;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .rd-intro-btn:hover { transform: rotate(5deg); }
        .rd-intro-btn img { height: 35px; }

        /* OUTROS ELEMENTOS */
        main { flex: 1; display: none; }
        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; }

        /* MENU RD PANEL */
        .rd-panel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: white; z-index: 2500;
            border-radius: 35px 35px 0 0;
            padding: 25px; display: flex; flex-direction: column; gap: 12px;
            transform: translateY(101%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .rd-panel.active { transform: translateY(0); }
        .rd-panel-header { width: 40px; height: 6px; background: #e0e6ed; border-radius: 10px; margin: -10px auto 15px auto; }

        @media (max-width: 450px) { 
            .intro-content h1 { font-size: 1.6rem; }
            .intro-img-container { width: 110px; height: 110px; }
            .game-wrapper { padding: 5px 15px 20px 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMainMenu(event)"></i>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <!-- Barra de Status (Fica por baixo do overlay quando oculto, ou visível no jogo) -->
            <section class="status">
                <div id="dots-container"></div>
                <div style="font-weight: 900; color: var(--primary-blue); font-size: 1.2rem;">
                    <span id="points-label">0</span>
                </div>
            </section>

            <!-- PRIMEIRO ECRÃ (INTRODUÇÃO) -->
            <div id="intro-overlay">
                <div class="intro-content">
                    <div class="intro-badge">VAMOS APRENDER?</div>
                    <div class="intro-img-container">
                        <img id="intro-img" src="" alt="Ícone do Jogo">
                    </div>
                    <h1 id="game-title">Título do Jogo Aqui</h1>
                    <p style="color: #8899aa; font-weight: 600;">Desbloqueia os níveis e ganha pontos!</p>
                </div>
                
                <div class="intro-actions">
                    <button onclick="mostrarJogo()" class="btn-jogar">
                        <span>JOGAR</span>
                        <i class="fas fa-play"></i>
                    </button>
                    <div class="rd-intro-btn" onclick="toggleRDMenu(event)" title="Configurações">
                        <img id="intro-rd-img" src="" alt="RD">
                    </div>
                </div>
            </div>

            <!-- MENU RD (NÍVEIS) -->
            <div id="rdDropdownMenu" class="rd-panel">
                <div class="rd-panel-header" onclick="toggleRDMenu(event)"></div>
                <h3 style="text-align:center; color:var(--text-color); margin-bottom:10px;">Escolher Nível</h3>
                <!-- Níveis injetados via JS -->
            </div>

            <main id="game-area">
                <!-- Conteúdo do Jogo aqui -->
            </main>
        </div>
    </div>

    <footer id="main-footer">© 2024 - Plataforma Educativa</footer>

    <script src="dados.js"></script>
    <script>
        // Funções de Menu (idênticas à lógica anterior, mas com design novo)
        function toggleRDMenu(e) {
            if(e) e.stopPropagation();
            const rdPanel = document.getElementById('rdDropdownMenu');
            rdPanel.classList.toggle('active');
        }

        function closeRDMenu() {
            document.getElementById('rdDropdownMenu').classList.remove('active');
        }

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            atualizarProgressao(5, 1);
        }

        function atualizarProgressao(total, atual) {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i < atual ? ' completed' : (i === atual ? ' active' : ''));
                container.appendChild(dot);
            }
        }

        window.onclick = () => closeRDMenu();

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                document.getElementById('header-icon').src = config.caminhoIcons + config.iconesMenu.ano1;
                document.getElementById('intro-img').src = config.caminhoIcons + config.iconesMenu.ano1;
                document.getElementById('intro-rd-img').src = config.caminhoImg + "rd.png";
                document.getElementById('game-title').innerText = config.titulo || "Atividade de Português";
                
                // Preencher Menu RD
                const rdBox = document.getElementById('rdDropdownMenu');
                ['Nível 1', 'Nível 2', 'Nível 3'].forEach(nv => {
                    const div = document.createElement('div');
                    div.style.cssText = "padding:15px; background:#f8fbfe; border-radius:15px; font-weight:700; color:#5ba4e5; cursor:pointer; text-align:center; border:2px solid #eef4fa;";
                    div.innerHTML = nv;
                    rdBox.appendChild(div);
                });
            }
        };
    </script>
</body>
</html>
