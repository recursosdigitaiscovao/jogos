<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Jogos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 20px #b0c4d9, 0px 0px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 8px; }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        .menu-dropdown { 
            position: absolute; top: 65px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; 
            color: #555; font-weight: 700; transition: 0.2s;
        }

        .game-wrapper { 
            flex: 1; 
            padding: 10px 30px; 
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px;
            justify-items: center;
            align-content: start;
        }

        /* GAME CARD */
        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 200px;
            min-height: 170px; /* Aumentado ligeiramente para acomodar o icon maior */
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            text-decoration: none;
            transition: all 0.2s ease;
            /* Margens de 20px garantidas pelo padding */
            padding: 20px 20px 15px 20px; 
            text-align: center;
        }

        .game-card:hover { transform: translateY(-3px); }

        /* CONTAINER DO ÍCONE - MAIOR */
        .card-img-container {
            width: 100%; 
            height: 100px; /* Aumentado de 70px para 100px */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .card-img-container img { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.12)); 
        }

        .game-card h2 {
            color: var(--primary-blue);
            font-size: 0.9rem; 
            font-weight: 900;
            margin: 0;
            line-height: 1.1;
            margin-top: auto; /* Empurra o texto para o fundo */
        }

        footer { height: 35px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.8rem; }

        @media (max-width: 1100px) { .game-wrapper { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 850px) { .game-wrapper { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { 
            .game-wrapper { grid-template-columns: repeat(2, 1fr); padding: 10px; gap: 12px; } 
            .game-card { min-height: 150px; padding: 15px; }
            .card-img-container { height: 80px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper" id="gamesGrid"></div>

    <footer>2026</footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = () => { document.getElementById('dropdownMenu').style.display = 'none'; };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                const menuBox = document.getElementById('dropdownMenu');
                const niveis = [
                    { l: 'Pré-Escolar', k: 'pre' }, { l: '1º Ano', k: 'ano1' },
                    { l: '2º Ano', k: 'ano2' }, { l: '3º Ano', k: 'ano3' }, { l: '4º Ano', k: 'ano4' }
                ];
                niveis.forEach(n => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = `../${n.k}/index.html`;
                    a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[n.k]}" style="height:20px;"><span>${n.l}</span>`;
                    menuBox.appendChild(a);
                });

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
