<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Sopa: 1º Ano</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER */
        header {
            width: 100%; background-color: #ffffff; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        header h1 { font-size: 1.1rem; color: #2c3e50; font-weight: 800; }

        /* MENU DE SELEÇÃO DE TEMAS */
        #theme-selection {
            flex: 1; display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 20px; align-content: center;
        }
        .theme-card {
            background: white; border-radius: 20px; padding: 20px;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; transition: transform 0.2s; border: 2px solid transparent;
        }
        .theme-card:active { transform: scale(0.95); border-color: #ff9f43; }
        .theme-card span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .theme-card p { font-weight: bold; color: #2c3e50; }

        /* ÁREA DO JOGO (Escondida inicialmente) */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        /* ELEMENTOS DO JOGO */
        .level-tag { background: #ff9f43; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }
        .grid { display: grid; gap: 5px; background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cell {
            width: 32px; height: 32px; background: #fff; border: 2px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer;
        }
        .cell.selected { background: #ff9f43; color: white; border-color: #e67e22; }
        .cell.found { background: #2ecc71; color: white; border-color: #27ae60; }

        .word-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 15px; max-width: 350px; }
        .word-box { padding: 5px 10px; background: white; border-radius: 8px; font-weight: bold; color: #95a5a6; border: 1px solid #ddd; font-size: 0.8rem; }
        .word-box.found { background: #2ecc71; color: white; text-decoration: line-through; }

        .btn-action {
            margin-top: 15px; padding: 10px 20px; background: #3498db; 
            color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        footer { width: 100%; padding: 10px; background: #fff; text-align: center; border-top: 1px solid #ddd; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span id="back-to-menu" onclick="showMenu()" style="display:none; cursor:pointer; font-size: 1.2rem;">⬅️</span>
            <h1 id="main-title">Escolhe um Tema</h1>
        </div>
        <div style="font-weight: bold; color: #ff9f43;">1º ANO</div>
    </header>

    <div id="theme-selection">
        <div class="theme-card" onclick="startGame('animais')"><span>🦁</span><p>Animais</p></div>
        <div class="theme-card" onclick="startGame('frutas')"><span>🍎</span><p>Frutas</p></div>
        <div class="theme-card" onclick="startGame('cores')"><span>🎨</span><p>Cores</p></div>
        <div class="theme-card" onclick="startGame('escola')"><span>🎒</span><p>Escola</p></div>
    </div>

    <main id="game-area">
        <div class="level-tag" id="level-info">Nível 1</div>
        <div id="grid" class="grid"></div>
        <div id="word-list" class="word-list"></div>
        <button class="btn-action" onclick="showMenu()">Mudar Tema 🏠</button>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            animais: ["GATO", "CÃO", "RATO", "PATO", "LEÃO", "ZEBRA", "VACA", "SAPO", "LOBO", "PEIXE"],
            frutas: ["MAÇÃ", "PERA", "UVA", "BANANA", "FIGO", "KIWI", "MANGA", "MELÃO", "AMORA", "LIMÃO"],
            cores: ["AZUL", "ROSA", "AMARELO", "VERDE", "VERMELHO", "PRETO", "BRANCO", "ROXO", "LILÁS", "CINZA"],
            escola: ["LAPIS", "GOMA", "COLA", "REGUA", "LIVRO", "PAPEL", "TINTA", "ESTOJO", "PASTA", "CANETA"]
        };

        let currentTheme = [];
        let selectedWords = [];
        let foundCount = 0;

        function showMenu() {
            document.getElementById('theme-selection').style.display = 'grid';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('back-to-menu').style.display = 'none';
            document.getElementById('main-title').innerText = "Escolhe um Tema";
        }

        function startGame(themeKey) {
            currentTheme = themes[themeKey];
            selectedWords = [...currentTheme].sort(() => 0.5 - Math.random()).slice(0, 5);
            foundCount = 0;

            document.getElementById('theme-selection').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('back-to-menu').style.display = 'block';
            document.getElementById('main-title').innerText = "Sopa de " + themeKey.charAt(0).toUpperCase() + themeKey.slice(1);

            generateGrid(10, selectedWords);
            renderWords(selectedWords);
        }

        function generateGrid(size, words) {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${size}, 32px)`;
            gridEl.innerHTML = '';
            let matrix = Array(size).fill().map(() => Array(size).fill(''));

            words.forEach(word => {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 200) {
                    const isVert = Math.random() > 0.5;
                    const row = Math.floor(Math.random() * (isVert ? size - word.length : size));
                    const col = Math.floor(Math.random() * (isVert ? size : size - word.length));
                    
                    let canPlace = true;
                    for (let i = -1; i <= (isVert ? word.length : 1); i++) {
                        for (let j = -1; j <= (isVert ? 1 : word.length); j++) {
                            let r = row + i, c = col + j;
                            if (r >= 0 && r < size && c >= 0 && c < size && matrix[r][c] !== '') { canPlace = false; break; }
                        }
                    }

                    if (canPlace) {
                        for (let i = 0; i < word.length; i++) {
                            matrix[isVert ? row + i : row][isVert ? col : col + i] = word[i];
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });

            const alphabet = "ABCDEFGJKLMNOPQRSTUVX";
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (matrix[r][c] === '') matrix[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = matrix[r][c];
                    cell.onclick = () => handleSelect(cell);
                    gridEl.appendChild(cell);
                }
            }
        }

        function renderWords(words) {
            const listEl = document.getElementById('word-list');
            listEl.innerHTML = '';
            words.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-box';
                div.innerText = word;
                div.id = 'word-' + word;
                listEl.appendChild(div);
            });
        }

        function handleSelect(cell) {
            if (cell.classList.contains('found')) return;
            cell.classList.toggle('selected');
            
            const selected = Array.from(document.querySelectorAll('.cell.selected'));
            const str = selected.map(c => c.innerText).join('');
            const rev = str.split('').reverse().join('');
            const foundWord = selectedWords.find(w => w === str || w === rev);

            if (foundWord) {
                const el = document.getElementById('word-' + foundWord);
                if (el && !el.classList.contains('found')) {
                    selected.forEach(c => { c.classList.remove('selected'); c.classList.add('found'); });
                    el.classList.add('found');
                    foundCount++;
                    if (foundCount === selectedWords.length) {
                        setTimeout(() => alert("Muito bem! Completaste o tema! 🎉"), 300);
                    }
                }
            }
        }
    </script>
</body>
</html>
