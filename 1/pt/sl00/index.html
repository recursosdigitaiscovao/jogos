<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras: 1º Ano - Português</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.1); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER */
        header {
            width: 100%; background-color: #ffffff; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        .game-icon { font-size: 1.5rem; }
        header h1 { font-size: 1rem; color: #2c3e50; font-weight: 800; }

        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; display: flex; align-items: center; gap: 8px;
            border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22; transition: all 0.1s;
            cursor: pointer;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #e67e22; }

        /* SIDEBAR ATUALIZADA - NEUTRA */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #2c3e50; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #ff9f43; font-size: 1.2rem; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 14px; border-radius: 12px; background: #f8f9fa;
            display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .sidebar-item:hover, .sidebar-item:active { background: #ffeaa7; color: #d35400; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay-bg.active { display: block; }

        /* MODAL DE AJUDA */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 85%; max-width: 400px; 
            border-radius: 25px; padding: 25px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-content h2 { color: #3498db; margin-bottom: 15px; font-size: 1.4rem; }
        .btn-fechar-modal {
            background: #2ecc71; color: white; border: none; padding: 12px 30px;
            border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #27ae60;
        }

        /* CONTEÚDO DO JOGO */
        #menu-container { flex: 1; overflow-y: auto; padding: 10px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
        .theme-card {
            background: #e0f7fa; border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid #4dd0e1; position: relative; top: 0;
            transition: all 0.2s ease; box-shadow: 0 6px 0 #4dd0e1;
        }
        .theme-card:active { top: 4px; box-shadow: 0 2px 0 #4dd0e1; }
        .theme-card span { font-size: 2.5rem; margin-bottom: 8px; }
        .theme-card p { font-size: 0.85rem; font-weight: 800; color: #006064; text-transform: uppercase; }

        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .grid { display: grid; gap: 4px; background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #ff9f43; }
        .cell {
            width: 34px; height: 34px; background: #fff; border: 1px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem; border-radius: 6px; cursor: pointer;
        }
        .cell.selected { background: #ff9f43; color: white; }
        .cell.found { background: #2ecc71; color: white; }

        footer { width: 100%; padding: 12px; background: #fff; text-align: center; border-top: 2px solid #eee; font-size: 0.85rem; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="modal-ajuda">
        <div class="modal-content">
            <h2>Como Jogar</h2>
            <p style="margin-bottom:20px; color:#2c3e50; line-height:1.6;">Encontra as palavras escondidas na grelha clicando nas letras!</p>
            <button class="btn-fechar-modal" onclick="fecharAjuda()">Entendi!</button>
        </div>
    </div>

    <div class="overlay-bg" id="overlay-bg" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Menu de Navegação</h3>
        <nav class="sidebar-menu">
            <a href="/jogos/" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="/jogos/pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="/jogos/1" class="sidebar-item"><span>🐥</span> 1º Ano</a>
            <a href="/jogos/2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="/jogos/3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="/jogos/4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:12px; color:#2c3e50;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span class="game-icon">🔍</span>
            <h1 id="header-title">Sopa de Letras</h1>
        </div>
        <button class="btn-voltar-3d" onclick="handleBackAction()">
            <span>⬅</span> Voltar
        </button>
    </header>

    <div id="menu-container">
        <div style="padding: 20px 0 10px 0;"><button class="btn-voltar-3d" style="background:#3498db; border-color:#2980b9; box-shadow: 0 3px 0 #2980b9; color:white;" onclick="abrirAjuda()">ℹ️ Como Jogar</button></div>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div style="background:#2ecc71; color:white; padding:5px 15px; border-radius:20px; font-weight:bold; margin-bottom:10px;" id="level-indicator">Nível 1</div>
        <div id="grid" class="grid"></div>
        <div id="word-list" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:15px; max-width:360px;"></div>
        <button id="btn-next" style="display:none; margin-top:20px; padding:12px 30px; background:#2ecc71; color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 #27ae60;" onclick="startLevel2()">Próximo Nível! 🚀</button>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Escola": { icon: "🎒", words: ["LÁPIS", "COLA", "LIVRO", "PASTA"] },
            "Frutas": { icon: "🍎", words: ["MAÇÃ", "PERA", "UVA", "FIGO"] }
        };

        let activeCategory = "";
        let currentLevel = 1;
        let selectedWords = [];
        let foundCount = 0;
        let isGameActive = false;

        function abrirAjuda() { document.getElementById('modal-ajuda').style.display = 'flex'; }
        function fecharAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay-bg').classList.toggle('active');
        }

        function createMenu() {
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = '';
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startCategory(key);
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function handleBackAction() {
            if (isGameActive) { showMenu(); } 
            else { window.location.href = '/jogos/1/pt'; }
        }

        function showMenu() {
            isGameActive = false;
            document.getElementById('menu-container').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('header-title').innerText = "Sopa de Letras";
        }

        function startCategory(key) {
            activeCategory = key;
            currentLevel = 1;
            setupLevel();
        }

        function setupLevel() {
            isGameActive = true;
            selectedWords = themes[activeCategory].words;
            foundCount = 0;
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('header-title').innerText = activeCategory;
            generateGrid(9, selectedWords);
        }

        function generateGrid(size, words) {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${size}, 34px)`;
            gridEl.innerHTML = '';
            for (let i=0; i<size*size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                gridEl.appendChild(cell);
            }
        }

        createMenu();
    </script>
</body>
</html>
