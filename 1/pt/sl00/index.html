<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras: 1º Ano</title>
    <style>
        /* Reset e Estilo Geral - Template_1 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: #fff4e6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER */
        header {
            width: 100%; background: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none; color: #000000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.1s;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #e67e22; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 200; padding: 25px;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 14px; border-radius: 15px; background: #fdfdfd;
            display: flex; align-items: center; gap: 15px; margin-bottom: 8px; 
            border: 1px solid #eee; transition: all 0.2s;
        }
        .sidebar-item:hover { background-color: #ff9f43; color: #000000; border-color: #e67e22; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* CONTEÚDO PRINCIPAL */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }

        /* BOTÕES DE CATEGORIA EXTENSÍVEIS */
        #menu-container { width: 100%; max-width: 450px; padding: 0 20px; }
        
        .theme-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        
        .theme-card {
            background: white; 
            padding: 18px 25px; 
            border-radius: 15px; 
            border: 1px solid #ddd;
            box-shadow: 0 5px 0 #ddd; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 20px;
            transition: 0.1s;
            width: 100%;
        }
        .theme-card:active { transform: translateY(3px); box-shadow: 0 2px 0 #ddd; }
        .theme-card span { font-size: 1.8rem; }
        .theme-card p { font-weight: bold; color: black; font-size: 1.1rem; }

        /* BOTÃO INFO REDONDO */
        .btn-info-round {
            background-color: #ff9f43; color: #000000; width: 32px; height: 32px;
            border-radius: 50%; border: none; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 2px 0 #e67e22; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }

        /* GRELHA DO JOGO */
        .grid { 
            display: grid; gap: 4px; background: white; padding: 10px; 
            border-radius: 15px; border: 3px solid #ff9f43; 
            user-select: none; touch-action: none;
        }
        .cell {
            width: 35px; height: 35px; background: #f9f9f9; border: 1px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem; border-radius: 6px;
        }
        .cell.selected { background: #ff9f43; color: white; }
        .cell.found { background: #2ecc71 !important; color: white !important; }

        .word-tag {
            background: white; padding: 6px 14px; border-radius: 10px;
            font-weight: bold; border: 1px solid #ddd; color: #7f8c8d; font-size: 0.85rem;
        }
        .word-tag.done { background: #2ecc71; color: white; border-color: #27ae60; text-decoration: line-through; }

        /* MODAIS */
        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 85%; max-width: 350px;
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 400; text-align: center;
        }

        footer { width: 100%; padding: 10px; background: white; text-align: center; color: #95a5a6; font-size: 0.75rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="fecharModais()"></div>
    
    <div id="modal-info" class="modal-custom">
        <h2 style="color: #e67e22; margin-bottom: 10px;">Como Jogar</h2>
        <p style="color: #636e72;">Encontra as palavras escondidas na horizontal e vertical! Clica nas letras para marcar a palavra.</p>
        <button class="btn-voltar-3d" style="width: 100%; margin-top: 20px; justify-content: center;" onclick="fecharModais()">ENTENDI!</button>
    </div>

    <div id="end-modal" class="modal-custom">
        <div style="font-size: 3.5rem;">🏆</div>
        <h2 style="margin: 10px 0;">Muito bem!</h2>
        <p style="margin-bottom: 20px; color: #636e72; font-weight: bold;">Encontraste todas as palavras!</p>
        <div style="display: flex; gap: 10px;">
            <button class="btn-voltar-3d" style="flex: 1; justify-content: center;" onclick="restartLevel()">DE NOVO</button>
            <button class="btn-voltar-3d" style="flex: 1; justify-content: center; background-color: #bdc3c7; border-color: #7f8c8d; box-shadow: 0 3px 0 #7f8c8d;" onclick="showMenu()">MENU</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom: 15px; color: #e67e22;">Menu</h3>
        <nav>
            <a href="../../../" class="sidebar-item">🏠 Início</a>
            <a href="../../../1" class="sidebar-item">🐥 1º Ano</a>
        </nav>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <span style="font-size:1.4rem">🔍</span>
            <h1 id="header-title">Sopa de Letras</h1>
        </div>
        <button class="btn-voltar-3d" onclick="handleBack()">⬅ VOLTAR</button>
    </header>

    <main>
        <div id="menu-container">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px;">
                <h2 style="color: #e67e22; font-size: 1.3rem;">Escolhe um tema</h2>
                <button class="btn-info-round" onclick="abrirAjuda()">i</button>
            </div>
            <div class="theme-list" id="theme-list"></div>
        </div>

        <div id="game-area" style="display: none; flex-direction: column; align-items: center;">
            <div id="grid" class="grid"></div>
            <div id="word-list" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:20px; max-width:350px;"></div>
        </div>
    </main>

    <footer>Recursos Digitais Covão • Professor Luís</footer>

    <script>
        const themes = {
            "Escola": { icon: "🎒", pool: ["LÁPIS", "COLA", "LIVRO", "PASTA", "MESA", "GIZ", "MAPA", "AULA", "RÉGUA", "CANETA"] },
            "Frutas": { icon: "🍎", pool: ["MAÇÃ", "PERA", "UVA", "FIGO", "KIWI", "COCO", "BANANA", "MELÃO", "AMORA", "LIMÃO"] },
            "Animais": { icon: "🐶", pool: ["GATO", "CÃO", "PATO", "LEÃO", "RATO", "VACA", "SAPO", "ZEBRA", "URSO", "LOBO"] }
        };

        let activeCategory = "";
        let selectedCells = [];
        let foundWords = [];
        let currentWords = [];
        let gridData = [];
        const gridSize = 9;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function fecharModais() {
            document.getElementById('modal-info').style.display = 'none';
            document.getElementById('end-modal').style.display = 'none';
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }

        function abrirAjuda() {
            document.getElementById('modal-info').style.display = 'block';
            document.getElementById('overlay').classList.add('active');
        }

        function handleBack() {
            if (document.getElementById('game-area').style.display === 'flex') showMenu();
            else window.location.href = "../";
        }

        function showMenu() {
            fecharModais();
            document.getElementById('menu-container').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('header-title').innerText = "Sopa de Letras";
        }

        function initThemes() {
            const list = document.getElementById('theme-list');
            list.innerHTML = '';
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startGame(key);
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                list.appendChild(card);
            });
        }

        function restartLevel() {
            fecharModais();
            startGame(activeCategory);
        }

        function startGame(key) {
            activeCategory = key;
            foundWords = [];
            selectedCells = [];
            
            const pool = [...themes[key].pool];
            currentWords = pool.sort(() => 0.5 - Math.random()).slice(0, 4);

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('header-title').innerText = key;
            generateGrid();
            renderWordList();
        }

        function generateGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${gridSize}, 35px)`;
            gridEl.innerHTML = '';
            gridData = Array(gridSize * gridSize).fill(null);

            currentWords.forEach(word => {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 100) {
                    const direction = Math.random() > 0.5 ? 1 : gridSize; 
                    const start = Math.floor(Math.random() * gridData.length);
                    if (canPlace(word, start, direction)) {
                        for (let i = 0; i < word.length; i++) {
                            gridData[start + i * direction] = { letter: word[i], word: word };
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });

            for (let i = 0; i < gridData.length; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = gridData[i] ? gridData[i].letter : String.fromCharCode(65 + Math.floor(Math.random() * 26));
                cell.dataset.index = i;
                cell.onclick = () => selectCell(cell, i);
                gridEl.appendChild(cell);
            }
        }

        function canPlace(word, start, direction) {
            for (let i = 0; i < word.length; i++) {
                const idx = start + i * direction;
                if (idx >= gridSize * gridSize || gridData[idx] !== null) return false;
                if (direction === 1 && Math.floor(idx / gridSize) !== Math.floor(start / gridSize)) return false;
            }
            return true;
        }

        function renderWordList() {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            currentWords.forEach(w => {
                const span = document.createElement('span');
                span.className = 'word-tag';
                span.id = 'word-' + w;
                span.innerText = w;
                list.appendChild(span);
            });
        }

        function selectCell(el, idx) {
            if (el.classList.contains('found')) return;

            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                selectedCells = selectedCells.filter(c => c !== idx);
            } else {
                el.classList.add('selected');
                selectedCells.push(idx);
            }
            checkSelection();
        }

        function checkSelection() {
            const currentString = selectedCells.map(idx => document.querySelector(`.cell[data-index='${idx}']`).innerText).join('');
            const reversedString = currentString.split('').reverse().join('');

            currentWords.forEach(word => {
                if ((currentString === word || reversedString === word) && !foundWords.includes(word)) {
                    foundWords.push(word);
                    selectedCells.forEach(idx => {
                        document.querySelector(`.cell[data-index='${idx}']`).classList.add('found');
                        document.querySelector(`.cell[data-index='${idx}']`).classList.remove('selected');
                    });
                    document.getElementById('word-' + word).classList.add('done');
                    selectedCells = [];
                    
                    if (foundWords.length === currentWords.length) {
                        setTimeout(() => {
                            document.getElementById('end-modal').style.display = 'block';
                            document.getElementById('overlay').classList.add('active');
                        }, 500);
                    }
                }
            });
        }

        initThemes();
    </script>
</body>
</html>
