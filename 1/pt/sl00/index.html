<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras: 1º Ano - Completo</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER PADRONIZADO TEMPLATE_1 */
        header {
            width: 100%; background-color: #ffffff; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #2c3e50; }
        header h1 { font-size: 1rem; color: #2c3e50; font-weight: 800; }
        .game-icon { font-size: 1.5rem; }

        /* BOTÃO VOLTAR 3D - POSICIONADO À DIREITA NO HEADER */
        .btn-voltar-3d {
            text-decoration: none; color: #000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; display: flex; align-items: center; gap: 8px;
            border: 1px solid #e67e22; box-shadow: 0 2px 0 #e67e22; transition: all 0.1s;
            cursor: pointer;
        }
        .btn-voltar-3d:active { transform: translateY(1px); box-shadow: 0 1px 0 #e67e22; }

        /* SIDEBAR COMPLETA */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #2c3e50; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ff9f43; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 8px; }
        .sidebar-item {
            text-decoration: none; color: #444; font-weight: bold;
            padding: 12px; border-radius: 10px; background: #f8f9fa;
            display: flex; align-items: center; gap: 12px; font-size: 0.9rem;
        }
        .sidebar-item:hover { background: #ff9f43; color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* MENU DE SELEÇÃO */
        #menu-container { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .instrucao {
            background: #ff9f43; color: white; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; margin-bottom: 20px;
            display: inline-block; box-shadow: 0 4px 0 #e67e22;
        }
        .theme-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            max-width: 600px; margin: 15px auto; padding-bottom: 30px;
        }
        .theme-card {
            background: white; border-radius: 15px; padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer;
            border: 2px solid transparent; transition: 0.2s;
        }
        .theme-card:active { transform: scale(0.95); border-color: #ff9f43; }
        .theme-card span { font-size: 1.8rem; display: block; margin-bottom: 5px; }
        .theme-card p { font-size: 0.8rem; font-weight: bold; color: #2c3e50; }

        /* ÁREA DO JOGO */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .level-tag { background: #2ecc71; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }
        .grid { display: grid; gap: 4px; background: white; padding: 8px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cell {
            width: 32px; height: 32px; background: #fff; border: 1px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem; border-radius: 5px; cursor: pointer;
        }
        .cell.selected { background: #ff9f43; color: white; }
        .cell.found { background: #2ecc71; color: white; }

        .word-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 15px; max-width: 350px; }
        .word-box { padding: 5px 10px; background: white; border-radius: 8px; font-weight: bold; color: #95a5a6; border: 1px solid #ddd; font-size: 0.75rem; }
        .word-box.found { background: #2ecc71; color: white; text-decoration: line-through; }

        .btn-next {
            display: none; margin-top: 15px; padding: 12px 25px; background: #2ecc71; 
            color: white; border: none; border-radius: 12px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 4px 0 #27ae60;
        }

        footer { width: 100%; padding: 12px; background: #fff; text-align: center; border-top: 1px solid #ddd; font-size: 0.8rem; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Menu Global</h3>
        <nav class="sidebar-menu">
            <a href="#" class="sidebar-item" onclick="showMenu(); toggleMenu();"><span>🏠</span> Menu Temas</a>
            <a href="/jogos/pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="/jogos/1" class="sidebar-item" style="background: #ff9f43; color: white;"><span>🐥</span> 1º Ano</a>
            <a href="/jogos/2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="/jogos/3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="/jogos/4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f0f0f0; cursor:pointer; font-weight:bold; border-radius:10px;">Fechar ×</button>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <span class="game-icon">🔍</span>
            <h1 id="header-title">Sopa de Letras</h1>
        </div>
        <button class="btn-voltar-3d" id="btn-back-global" onclick="handleBackAction()">
            <span>⬅</span> Voltar
        </button>
    </header>

    <div id="menu-container">
        <div class="instrucao">Escolhe a categoria:</div>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div class="level-tag" id="level-indicator">Nível 1</div>
        <div id="grid" class="grid"></div>
        <div id="word-list" class="word-list"></div>
        <button id="btn-next" class="btn-next" onclick="startLevel2()">Próximo Nível! 🚀</button>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Escola": { icon: "🎒", words: ["LÁPIS", "CANETA", "COLA", "RÉGUA", "LIVRO", "CADERNO", "ESTOJO", "PASTA"] },
            "Família": { icon: "🏠", words: ["MÃE", "PAI", "FILHO", "AVÓ", "AVÔ", "TIU", "TIA", "PRIMO","IRMÃO","MADRINHA","NETO", "PADRINHO","NETA"] },
            "Verbos": { icon: "🏃", words: ["LER", "CORRER", "COMER", "SALTAR", "DORMIR", "CANTAR", "BRINCAR"] },
            "Animais Domésticos": { icon: "🐶", words: ["CÃO", "GATO", "PEIXE", "COELHO", "PÁSSARO", "TARTARUGA"] },
            "Animais da Quinta": { icon: "🐷", words: ["VACA", "PORCO", "GALINHA", "OVELHA", "CABRA", "PATO", "BURRO"] },
            "Animais Selvagens": { icon: "🦁", words: ["LEÃO", "ZEBRA", "GIRAFA", "TIGRE", "MACACO", "ELEFANTE"] },
            "Frutas": { icon: "🍎", words: ["MAÇÃ", "PERA", "UVA", "BANANA", "FIGO", "KIWI", "MANGA", "LARANJA"] },
            "Legumes": { icon: "🥦", words: ["ALFACE", "CENOURA", "TOMATE", "PEPINO", "BATATA", "CEBOLA"] },
            "Comida": { icon: "🍝", words: ["SOPA", "ARROZ", "MASSA", "PEIXE", "CARNE", "OVOS", "PÃO"] },
            "Cores": { icon: "🎨", words: ["AZUL", "ROSA", "VERDE", "AMARELO", "PRETO", "BRANCO", "ROXO", "CINZA"] },
            "Vestuário": { icon: "👕", words: ["CAMISA", "CALÇAS", "SAIA", "MEIAS", "SAPATOS", "CASACO"] },
            "Corpo": { icon: "💪", words: ["MÃO", "PÉ", "BOCA", "NARIZ", "OLHOS", "CABELO", "BRAÇO", "PERNA"] },
            "Plantas": { icon: "🌿", words: ["FLOR", "ÁRVORE", "FOLHA", "RAIZ", "TRONCO", "FRUTO", "ERVA"] },
            "Transporte": { icon: "🚀", words: ["CARRO", "MOTO", "BARCO", "AVIÃO", "TREM", "METRO", "BUS"] }
        };

        let activeCategory = "";
        let currentLevel = 1;
        let selectedWords = [];
        let foundCount = 0;
        let isGameActive = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function createMenu() {
            const grid = document.getElementById('theme-grid');
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startCategory(key);
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        // Gere a ação do botão Voltar dependendo de onde o utilizador está
        function handleBackAction() {
            if (isGameActive) {
                showMenu();
            } else {
                window.location.href = '/jogos/1'; // Volta para o índice do 1º ano
            }
        }

        function showMenu() {
            isGameActive = false;
            document.getElementById('menu-container').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('header-title').innerText = "Sopa de Letras";
        }

        function startCategory(key) {
            activeCategory = key;
            currentLevel = 1;
            setupLevel();
        }

        function startLevel2() {
            currentLevel = 2;
            setupLevel();
        }

        function setupLevel() {
            isGameActive = true;
            const wordCount = currentLevel === 1 ? 4 : 6;
            const gridSize = currentLevel === 1 ? 9 : 11;
            selectedWords = [...themes[activeCategory].words].sort(() => 0.5 - Math.random()).slice(0, wordCount);
            foundCount = 0;

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('header-title').innerText = activeCategory;
            document.getElementById('level-indicator').innerText = "Nível " + currentLevel;

            generateGrid(gridSize, selectedWords);
            renderWords(selectedWords);
        }

        function generateGrid(size, words) {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${size}, 32px)`;
            gridEl.innerHTML = '';
            let matrix = Array(size).fill().map(() => Array(size).fill(''));

            words.forEach(word => {
                let placed = false, attempts = 0;
                while (!placed && attempts < 300) {
                    const isVert = Math.random() > 0.5;
                    const r = Math.floor(Math.random() * (isVert ? size - word.length : size));
                    const c = Math.floor(Math.random() * (isVert ? size : size - word.length));
                    let canPlace = true;
                    for (let i = -1; i <= (isVert ? word.length : 1); i++) {
                        for (let j = -1; j <= (isVert ? 1 : word.length); j++) {
                            let cr = r+i, cc = c+j;
                            if (cr>=0 && cr<size && cc>=0 && cc<size && matrix[cr][cc] !== '') { canPlace = false; break; }
                        }
                    }
                    if (canPlace) {
                        for (let i=0; i<word.length; i++) matrix[isVert ? r+i : r][isVert ? c : c+i] = word[i];
                        placed = true;
                    }
                    attempts++;
                }
            });

            const alpha = "ABCDEFGJKLMNOPQRSTUVX";
            for (let r=0; r<size; r++) {
                for (let c=0; c<size; c++) {
                    if (matrix[r][c] === '') matrix[r][c] = alpha[Math.floor(Math.random() * alpha.length)];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = matrix[r][c];
                    cell.onclick = () => handleSelect(cell);
                    gridEl.appendChild(cell);
                }
            }
        }

        function renderWords(words) {
            const listEl = document.getElementById('word-list');
            listEl.innerHTML = '';
            words.forEach(w => {
                const div = document.createElement('div');
                div.className = 'word-box';
                div.innerText = w;
                div.id = 'word-' + w;
                listEl.appendChild(div);
            });
        }

        function handleSelect(cell) {
            if (cell.classList.contains('found')) return;
            cell.classList.toggle('selected');
            const sel = Array.from(document.querySelectorAll('.cell.selected'));
            const str = sel.map(c => c.innerText).join('');
            const rev = str.split('').reverse().join('');
            const word = selectedWords.find(w => w === str || w === rev);

            if (word) {
                const el = document.getElementById('word-' + word);
                if (el && !el.classList.contains('found')) {
                    sel.forEach(c => { c.classList.remove('selected'); c.classList.add('found'); });
                    el.classList.add('found');
                    foundCount++;
                    if (foundCount === selectedWords.length) {
                        if (currentLevel === 1) document.getElementById('btn-next').style.display = 'block';
                        else setTimeout(() => alert("Parabéns! Completaste o tema! 🏆"), 300);
                    }
                }
            }
        }
        createMenu();
    </script>
</body>
</html>
