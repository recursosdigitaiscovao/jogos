<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras: Super Menu - 1º Ano</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: rgba(255, 159, 67, 0.15); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER PADRONIZADO TEMPLATE_1 */
        header {
            width: 100%; background-color: #ffffff; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: #ff9f43; }
        header h1 { font-size: 1.1rem; color: #2c3e50; font-weight: 800; }

        /* MENU DE SELEÇÃO */
        #menu-container {
            flex: 1; overflow-y: auto; padding: 20px; text-align: center;
        }
        .instrucao {
            background: #ff9f43; color: white; padding: 10px; 
            border-radius: 15px; font-weight: bold; margin-bottom: 20px;
            display: inline-block; box-shadow: 0 4px 0 #e67e22;
        }
        .theme-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            max-width: 600px; margin: 0 auto;
        }
        .theme-card {
            background: white; border-radius: 15px; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
            transition: 0.2s; border: 2px solid transparent;
        }
        .theme-card:active { transform: scale(0.95); border-color: #ff9f43; }
        .theme-card span { font-size: 2rem; display: block; margin-bottom: 5px; }
        .theme-card p { font-size: 0.9rem; font-weight: bold; color: #2c3e50; }

        /* ÁREA DO JOGO */
        #game-area { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .grid { display: grid; gap: 4px; background: white; padding: 8px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cell {
            width: 32px; height: 32px; background: #fff; border: 1px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem; border-radius: 5px; cursor: pointer;
        }
        .cell.selected { background: #ff9f43; color: white; }
        .cell.found { background: #2ecc71; color: white; }

        .word-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 15px 0; max-width: 350px; }
        .word-box { padding: 4px 8px; background: white; border-radius: 8px; font-weight: bold; color: #95a5a6; border: 1px solid #ddd; font-size: 0.75rem; }
        .word-box.found { background: #2ecc71; color: white; text-decoration: line-through; }

        .btn-voltar {
            padding: 10px 20px; background: #34495e; color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        footer { width: 100%; padding: 10px; background: #fff; text-align: center; border-top: 1px solid #ddd; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="showMenu()">🏠</span>
            <h1 id="header-title">Sopa de Letras</h1>
        </div>
        <div style="font-weight: bold; color: #ff9f43;">1º ANO</div>
    </header>

    <div id="menu-container">
        <div class="instrucao">Escolhe uma categoria para jogar:</div>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <main id="game-area">
        <div id="grid" class="grid"></div>
        <div id="word-list" class="word-list"></div>
        <button class="btn-voltar" onclick="showMenu()">Voltar ao Menu</button>
    </main>

    <footer>Recursos Digitais Covão - <strong>Professor Luís</strong></footer>

    <script>
        const themes = {
            "Escola": { icon: "🎒", words: ["LAPIS", "GOMA", "COLA", "REGUA", "LIVRO", "CADERNO", "ESTOJO", "PASTA"] },
            "Família": { icon: "🏠", words: ["MÃE", "PAI", "FILHO", "AVÓ", "AVÔ", "TIU", "TIA", "PRIMO"] },
            "Membros": { icon: "👪", words: ["IRMÃO", "IRMÃ", "BEBÉ", "PADRINHO", "MADRINHA", "NETO", "NETA"] },
            "Verbos": { icon: "🏃", words: ["LER", "CORRER", "COMER", "SALTAR", "DORMIR", "CANTAR", "BRINCAR", "ESTUDAR"] },
            "Domésticos": { icon: "🐶", words: ["CÃO", "GATO", "PEIXE", "COELHO", "HAMSTER", "PÁSSARO", "TARTARUGA"] },
            "Quinta": { icon: "🐷", words: ["VACA", "PORCO", "GALINHA", "OVELHA", "CABRA", "PATO", "BURRO", "CAVALO"] },
            "Selvagens": { icon: "🦁", words: ["LEÃO", "ZEBRA", "GIRAFA", "TIGRE", "MACACO", "ELEFANTE", "COBRA"] },
            "Frutas": { icon: "🍎", words: ["MAÇÃ", "PERA", "UVA", "BANANA", "FIGO", "KIWI", "MANGA", "LARANJA"] },
            "Legumes": { icon: "🥦", words: ["ALFACE", "CENOURA", "TOMATE", "PEPINO", "BATATA", "CEBOLA", "FEIJÃO"] },
            "Comida": { icon: "🍝", words: ["SOPA", "ARROZ", "MASSA", "PEIXE", "CARNE", "OVOS", "PÃO", "LEITE"] },
            "Cores": { icon: "🎨", words: ["AZUL", "ROSA", "VERDE", "AMARELO", "PRETO", "BRANCO", "ROXO", "CINZA"] },
            "Vestuário": { icon: "👕", words: ["CAMISA", "CALÇAS", "SAIA", "MEIAS", "SAPATOS", "CASACO", "GORRO"] },
            "Corpo": { icon: "💪", words: ["MÃO", "PÉ", "BOCA", "NARIZ", "OLHOS", "CABELO", "BRAÇO", "PERNA"] },
            "Plantas": { icon: "🌿", words: ["FLOR", "ÁRVORE", "FOLHA", "RAIZ", "TRONCO", "FRUTO", "ERVA"] },
            "Transporte": { icon: "🚀", words: ["CARRO", "MOTO", "BARCO", "AVIÃO", "TREM", "METRO", "BUS"] },
            "Emoções": { icon: "😊", words: ["FELIZ", "TRISTE", "ZANGADO", "MEDO", "CALMO", "ALEGRE", "SURPRESA"] }
        };

        let selectedWords = [];
        let foundCount = 0;

        function createMenu() {
            const grid = document.getElementById('theme-grid');
            for (const [key, value] of Object.entries(themes)) {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startGame(key);
                card.innerHTML = `<span>${value.icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            }
        }

        function showMenu() {
            document.getElementById('menu-container').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('header-title').innerText = "Sopa de Letras";
        }

        function startGame(themeKey) {
            const theme = themes[themeKey];
            selectedWords = [...theme.words].sort(() => 0.5 - Math.random()).slice(0, 5);
            foundCount = 0;

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('header-title').innerText = theme.icon + " " + themeKey;

            generateGrid(10, selectedWords);
            renderWords(selectedWords);
        }

        function generateGrid(size, words) {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${size}, 32px)`;
            gridEl.innerHTML = '';
            let matrix = Array(size).fill().map(() => Array(size).fill(''));

            words.forEach(word => {
                let placed = false, attempts = 0;
                while (!placed && attempts < 200) {
                    const isVert = Math.random() > 0.5;
                    const r = Math.floor(Math.random() * (isVert ? size - word.length : size));
                    const c = Math.floor(Math.random() * (isVert ? size : size - word.length));
                    
                    let canPlace = true;
                    for (let i = -1; i <= (isVert ? word.length : 1); i++) {
                        for (let j = -1; j <= (isVert ? 1 : word.length); j++) {
                            let currR = r + i, currC = c + j;
                            if (currR >= 0 && currR < size && currC >= 0 && currC < size && matrix[currR][currC] !== '') {
                                canPlace = false; break;
                            }
                        }
                    }

                    if (canPlace) {
                        for (let i = 0; i < word.length; i++) {
                            matrix[isVert ? r + i : r][isVert ? c : c + i] = word[i];
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });

            const alphabet = "ABCDEFGJKLMNOPQRSTUVX";
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (matrix[r][c] === '') matrix[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = matrix[r][c];
                    cell.onclick = () => handleSelect(cell);
                    gridEl.appendChild(cell);
                }
            }
        }

        function renderWords(words) {
            const listEl = document.getElementById('word-list');
            listEl.innerHTML = '';
            words.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-box';
                div.innerText = word;
                div.id = 'word-' + word;
                listEl.appendChild(div);
            });
        }

        function handleSelect(cell) {
            if (cell.classList.contains('found')) return;
            cell.classList.toggle('selected');
            
            const selected = Array.from(document.querySelectorAll('.cell.selected'));
            const str = selected.map(c => c.innerText).join('');
            const rev = str.split('').reverse().join('');
            const foundWord = selectedWords.find(w => w === str || w === rev);

            if (foundWord) {
                const el = document.getElementById('word-' + foundWord);
                if (el && !el.classList.contains('found')) {
                    selected.forEach(c => { c.classList.remove('selected'); c.classList.add('found'); });
                    el.classList.add('found');
                    foundCount++;
                    if (foundCount === selectedWords.length) {
                        setTimeout(() => alert("Parabéns! Encontraste todas as palavras! 🎉"), 300);
                    }
                }
            }
        }

        createMenu();
    </script>
</body>
</html>
