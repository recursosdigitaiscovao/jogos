<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Jogo do Enforcado</title>
    <style>
        /* Reset e Estilo Geral - Template_1 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: #fff4e6; /* Cor padrão 1º Ano */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER PADRONIZADO */
        header {
            width: 100%; background: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }

        /* BOTÃO VOLTAR 3D */
        .btn-voltar-3d {
            text-decoration: none; color: white; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.1s ease;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #e67e22; }

        /* SIDEBAR COMPLETA */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 25px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #e67e22; margin-bottom: 20px; border-bottom: 2px solid #ffcc80; padding-bottom: 10px; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 14px; border-radius: 15px; background: #fdfdfd;
            display: flex; align-items: center; gap: 15px; margin-bottom: 8px;
            border: 1px solid #eee;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 15px; }

        /* MENU DE TEMAS */
        #menu-container { width: 100%; max-width: 500px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .theme-card {
            background: white; border-radius: 20px; padding: 20px;
            cursor: pointer; border: 1px solid #ddd; box-shadow: 0 5px 0 #ddd;
            transition: 0.1s;
        }
        .theme-card:active { transform: translateY(3px); box-shadow: 0 2px 0 #ddd; }
        .theme-card span { font-size: 2.5rem; display: block; }
        .theme-card p { font-weight: bold; color: #2d3436; margin-top: 5px; }

        /* VISUAL DO JOGO */
        #game-area { display: none; width: 100%; flex-direction: column; align-items: center; gap: 15px; }
        
        .visual-row { display: flex; align-items: center; gap: 20px; background: white; padding: 15px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* FORCA SIMPLIFICADA */
        .hangman-box { width: 100px; height: 100px; position: relative; border-right: 2px solid #eee; padding-right: 15px; }
        .part { position: absolute; background: #2c3e50; display: none; }
        .base { width: 40px; height: 3px; bottom: 5px; left: 10px; display: block; }
        .pole { width: 3px; height: 80px; bottom: 5px; left: 10px; display: block; }
        .gallows-top { width: 45px; height: 3px; top: 15px; left: 10px; display: block; }
        .rope { width: 2px; height: 10px; top: 15px; left: 53px; display: block; }
        .head { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #2c3e50; top: 25px; left: 44px; background: white; }
        .body-v { width: 2px; height: 25px; top: 45px; left: 53px; }
        .l-arm { width: 15px; height: 2px; top: 50px; left: 39px; transform: rotate(-30deg); }
        .r-arm { width: 15px; height: 2px; top: 50px; left: 53px; transform: rotate(30deg); }
        .l-leg { width: 15px; height: 2px; top: 70px; left: 40px; transform: rotate(-45deg); }
        .r-leg { width: 15px; height: 2px; top: 70px; left: 53px; transform: rotate(45deg); }

        #word-hint { font-size: 3.5rem; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        #color-blot { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #7f8c8d; display: none; }

        .word-display { font-size: 2.2rem; font-weight: 800; letter-spacing: 8px; color: #2c3e50; }
        
        /* TECLADO */
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; max-width: 450px; }
        .key { 
            background: white; border: 1.5px solid #7f8c8d; border-radius: 10px;
            padding: 12px 0; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 3px 0 #7f8c8d; transition: 0.1s;
        }
        .key.used { opacity: 0.4; box-shadow: none; transform: translateY(2px); pointer-events: none; }

        /* MODAIS */
        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 85%; max-width: 380px;
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 400; text-align: center;
        }

        footer { width: 100%; padding: 12px; background: white; text-align: center; color: #95a5a6; font-size: 0.8rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Menu</h3>
        <nav>
            <a href="../../../" class="sidebar-item">🏠 Início</a>
            <a href="../../../pre" class="sidebar-item">🦒 Pré-Escolar</a>
            <a href="../../../1" class="sidebar-item">🐥 1º Ano</a>
            <a href="../../../2" class="sidebar-item">🐢 2º Ano</a>
            <a href="../../../3" class="sidebar-item">🦊 3º Ano</a>
            <a href="../../../4" class="sidebar-item">👨‍🚀 4º Ano</a>
        </nav>
    </div>

    <div id="end-modal" class="modal-custom">
        <div id="end-icon" style="font-size: 3.5rem;">🏆</div>
        <h2 id="end-title" style="margin: 15px 0;">Boa!</h2>
        <p id="end-msg" style="margin-bottom: 25px; color: #636e72;"></p>
        <button class="btn-voltar-3d" style="width: 100%; justify-content: center;" onclick="showMenu()">JOGAR NOVAMENTE</button>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <span style="font-size:1.4rem">📝</span>
            <h1 id="header-title">Enforcado</h1>
        </div>
        <button class="btn-voltar-3d" onclick="handleBack()">⬅ VOLTAR</button>
    </header>

    <main>
        <div id="menu-container">
            <h2 style="color: #e67e22; margin-bottom: 5px;">Escolhe um tema:</h2>
            <div class="theme-grid" id="theme-grid"></div>
        </div>

        <div id="game-area">
            <div class="visual-row">
                <div class="hangman-box">
                    <div class="part base"></div><div class="part pole"></div><div class="part gallows-top"></div><div class="part rope"></div>
                    <div class="part head" id="h-head"></div><div class="part body-v" id="h-body"></div>
                    <div class="part l-arm" id="h-larm"></div><div class="part r-arm" id="h-rarm"></div>
                    <div class="part l-leg" id="h-lleg"></div><div class="part r-leg" id="h-rleg"></div>
                </div>
                <div id="word-hint">❓</div>
                <div id="color-blot"></div>
            </div>

            <div class="word-display" id="word-display">_ _ _ _</div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <footer>Recursos Digitais Covão • Professor Luís</footer>

    <script>
        const themes = {
            "Animais": {icon:"🐶", words:[{p:"GATO",i:"🐱"},{p:"PATO",i:"🦆"},{p:"VACA",i:"🐮"},{p:"URSO",i:"🐻"},{p:"RATO",i:"🐭"},{p:"SAPO",i:"🐸"}]},
            "Cores": {icon:"🎨", words:[{p:"AZUL", c:"#0000FF"},{p:"ROSA", c:"#FFC0CB"},{p:"VERDE", c:"#008000"},{p:"AMARELO", c:"#FFFF00"}]},
            "Escola": {icon:"🎒", words:[{p:"COLA",i:"🧪"},{p:"PASTA",i:"🎒"},{p:"LIVRO",i:"📚"},{p:"ALUNO",i:"🧑‍🎓"}]}
        };

        let activeTheme = "", secretWord = "", guessed = [], mistakes = 0, isPlaying = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function handleBack() {
            if (isPlaying) showMenu();
            else window.location.href = "../";
        }

        function showMenu() {
            isPlaying = false;
            document.getElementById('menu-container').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('end-modal').style.display = 'none';
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('header-title').innerText = "Enforcado";
        }

        function initThemes() {
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = '';
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startGame(key);
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function startGame(themeKey) {
            isPlaying = true;
            activeTheme = themeKey;
            const theme = themes[themeKey];
            const data = theme.words[Math.floor(Math.random() * theme.words.length)];
            
            secretWord = data.p;
            guessed = [];
            mistakes = 0;

            // Interface
            document.getElementById('header-title').innerText = themeKey;
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            // Dica Visual
            const hint = document.getElementById('word-hint');
            const blot = document.getElementById('color-blot');
            if (themeKey === "Cores") {
                hint.style.display = 'none'; blot.style.display = 'block';
                blot.style.backgroundColor = data.c;
            } else {
                hint.style.display = 'flex'; blot.style.display = 'none';
                hint.innerText = data.i;
            }

            resetHangman();
            createKeyboard();
            updateDisplay();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = l;
                btn.onclick = () => makeGuess(l, btn);
                kb.appendChild(btn);
            });
        }

        function makeGuess(letter, btn) {
            btn.classList.add('used');
            if (secretWord.includes(letter)) {
                guessed.push(letter);
                if (secretWord.split("").every(l => guessed.includes(l))) endGame(true);
            } else {
                mistakes++;
                drawHangman();
                if (mistakes === 6) endGame(false);
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('word-display').innerText = 
                secretWord.split("").map(l => guessed.includes(l) ? l : "_").join(" ");
        }

        function drawHangman() {
            const parts = ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"];
            if (mistakes > 0) document.getElementById(parts[mistakes-1]).style.display = 'block';
        }

        function resetHangman() {
            ["h-head", "h-body", "h-larm", "h-rarm", "h-lleg", "h-rleg"].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        function endGame(won) {
            const modal = document.getElementById('end-modal');
            document.getElementById('overlay').classList.add('active');
            modal.style.display = 'block';
            
            if (won) {
                document.getElementById('end-icon').innerText = "🏆";
                document.getElementById('end-title').innerText = "Parabéns!";
                document.getElementById('end-msg').innerText = "Acertaste na palavra!";
            } else {
                document.getElementById('end-icon').innerText = "❌";
                document.getElementById('end-title').innerText = "Oh não!";
                document.getElementById('end-msg').innerText = "A palavra era: " + secretWord;
            }
        }

        initThemes();
    </script>
</body>
</html>
