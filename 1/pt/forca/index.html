<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Jogo das Palavras</title>
    <style>
        /* Reset e Estilo Geral - Template_1 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: #fff4e6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; height: 100svh;
            display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* HEADER */
        header {
            width: 100%; background: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }

        .btn-voltar-3d {
            text-decoration: none; color: #000000; background-color: #ff9f43;
            font-weight: bold; font-size: 0.8rem; padding: 8px 18px;
            border-radius: 8px; border: 1px solid #e67e22; box-shadow: 0 3px 0 #e67e22;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.1s;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #e67e22; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease; z-index: 200; padding: 25px;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 14px; border-radius: 15px; background: #fdfdfd;
            display: flex; align-items: center; gap: 15px; margin-bottom: 8px; 
            border: 1px solid #eee; transition: all 0.2s;
        }
        .sidebar-item:hover { background-color: #ff9f43; color: #000000; border-color: #e67e22; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ESTRUTURA DO MENU */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px 15px; overflow-y: auto; }

        .menu-header {
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin-bottom: 30px; width: 100%;
        }
        .menu-header h2 { color: #e67e22; font-size: 1.4rem; font-weight: 800; }
        
        .btn-info-round {
            background-color: #ff9f43; color: white; width: 28px; height: 28px;
            border-radius: 50%; border: none; font-weight: bold; font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #menu-container { width: 100%; max-width: 800px; }
        
        .theme-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 100%; 
        }
        
        .theme-card {
            background: white; 
            padding: 25px 15px; 
            border-radius: 25px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 0 #e0e0e0; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            gap: 10px;
            transition: 0.1s;
        }
        .theme-card:active { transform: translateY(3px); box-shadow: 0 1px 0 #e0e0e0; }
        .theme-card span { font-size: 2.2rem; } 
        .theme-card p { font-weight: 800; color: #000; font-size: 1rem; }

        /* ÁREA DE JOGO */
        #game-area { width: 100%; max-width: 450px; display: none; flex-direction: column; align-items: center; gap: 15px; }

        .visual-container {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: white; padding: 15px; border-radius: 25px;
            border: 2px solid #ffcc80; width: 95%;
        }

        .balloons-row { display: flex; gap: 8px; justify-content: center; min-height: 45px; }
        .balloon { font-size: 1.8rem; transition: 0.3s; }

        .hint-and-img { display: flex; align-items: center; gap: 20px; }
        #word-hint { font-size: 3.5rem; }
        #color-blot { width: 60px; height: 60px; border-radius: 50%; border: 1.5px solid #7f8c8d; display: none; }

        .word-display { font-size: 2.2rem; font-weight: 800; letter-spacing: 8px; color: #2c3e50; }

        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; }
        .key { 
            background: white; border: 1.5px solid #7f8c8d; border-radius: 8px;
            padding: 12px 0; font-weight: bold; font-size: 1rem; cursor: pointer;
            box-shadow: 0 3px 0 #7f8c8d;
        }
        .key.used { opacity: 0.2; box-shadow: none; transform: translateY(2px); pointer-events: none; }

        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 85%; max-width: 350px;
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 400; text-align: center;
        }

        footer { width: 100%; padding: 10px; background: white; text-align: center; color: #95a5a6; font-size: 0.75rem; border-top: 1px solid #eee; margin-top: auto; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="fecharModais()"></div>
    
    <div id="modal-info" class="modal-custom">
        <h2 style="color: #e67e22; margin-bottom: 10px;">Como Jogar</h2>
        <p style="color: #636e72;">Observa a imagem e tenta descobrir a palavra! Se errares uma letra, um balão rebenta. Não deixes os 6 balões rebentarem!</p>
        <button class="btn-voltar-3d" style="width: 100%; margin-top: 20px; justify-content: center;" onclick="fecharModais()">ENTENDI!</button>
    </div>

    <div id="end-modal" class="modal-custom">
        <div id="end-icon" style="font-size: 3.5rem;">🏆</div>
        <h2 id="end-title" style="margin: 10px 0;">Muito bem!</h2>
        <p id="end-msg" style="margin-bottom: 20px; color: #636e72; font-weight: bold;"></p>
        <div style="display: flex; gap: 10px;">
            <button class="btn-voltar-3d" style="flex: 1; justify-content: center;" onclick="startGame(activeTheme)">DE NOVO</button>
            <button class="btn-voltar-3d" style="flex: 1; justify-content: center; background-color: #bdc3c7; border-color: #7f8c8d; box-shadow: 0 3px 0 #7f8c8d;" onclick="showMenu()">MENU</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom: 15px; color: #e67e22;">Menu</h3>
        <nav>
            <a href="../../../" class="sidebar-item">🏠 Início</a>
            <a href="../../../1" class="sidebar-item">🐥 1º Ano</a>
        </nav>
    </div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="toggleMenu()">☰</span>
            <span style="font-size:1.4rem">📝</span>
            <h1 id="header-title">Jogo das Palavras</h1>
        </div>
        <button class="btn-voltar-3d" onclick="handleBack()">⬅ VOLTAR</button>
    </header>

    <main>
        <div id="menu-container">
            <div class="menu-header">
                <h2>Escolhe um tema</h2>
                <button class="btn-info-round" onclick="mostrarInfo()">i</button>
            </div>
            <div id="theme-grid" class="theme-grid"></div>
        </div>

        <div id="game-area">
            <div class="visual-container">
                <div class="balloons-row" id="balloons-container"></div>
                <div class="hint-and-img">
                    <div id="word-hint">❓</div>
                    <div id="color-blot"></div>
                </div>
            </div>
            <div class="word-display" id="word-display">_ _ _ _</div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <footer>Recursos Digitais Covão • Professor Luís</footer>

    <script>
        // PALAVRAS ATUALIZADAS: Todas sem acentos ou cedilhas
        const themes = {
            "Animais": {icon:"🐶", words:[{p:"GATO",i:"🐱"},{p:"PATO",i:"🦆"},{p:"VACA",i:"🐮"},{p:"SAPO",i:"🐸"},{p:"RATO",i:"🐭"},{p:"ZEBRA",i:"🦓"},{p:"TIGRE",i:"🐯"}]},
            "Cores": {icon:"🎨", words:[{p:"AZUL", c:"#0000FF"},{p:"ROSA", c:"#FFC0CB"},{p:"VERDE", c:"#008000"},{p:"PRETO", c:"#000000"}]},
            "Escola": {icon:"🎒", words:[{p:"COLA",i:"🧪"},{p:"PASTA",i:"🎒"},{p:"LIVRO",i:"📚"},{p:"MESA",i:"🪑"},{p:"GIZ",i:"🖍️"}]},
            "Frutas": {icon:"🍎", words:[{p:"UVA",i:"🍇"},{p:"BANANA",i:"🍌"},{p:"KIWI",i:"🥝"},{p:"FIGO",i:"🫐"}]}
        };

        let activeTheme = "", secretWord = "", guessed = [], mistakes = 0, isPlaying = false, lastWord = "";

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function fecharModais() {
            document.getElementById('modal-info').style.display = 'none';
            document.getElementById('end-modal').style.display = 'none';
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }

        function mostrarInfo() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('modal-info').style.display = 'block';
        }

        function handleBack() {
            if (isPlaying) showMenu(); else window.location.href = "../";
        }

        function showMenu() {
            isPlaying = false;
            document.getElementById('menu-container').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            fecharModais();
            document.getElementById('header-title').innerText = "Jogo das Palavras";
        }

        function initThemes() {
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = '';
            Object.keys(themes).forEach(key => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.onclick = () => startGame(key);
                card.innerHTML = `<span>${themes[key].icon}</span><p>${key}</p>`;
                grid.appendChild(card);
            });
        }

        function startGame(themeKey) {
            isPlaying = true;
            activeTheme = themeKey;
            fecharModais();
            const words = themes[themeKey].words;
            let data;
            do { data = words[Math.floor(Math.random() * words.length)]; } while (data.p === lastWord && words.length > 1);
            secretWord = data.p; lastWord = secretWord; guessed = []; mistakes = 0;
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('header-title').innerText = themeKey;
            const hint = document.getElementById('word-hint');
            const blot = document.getElementById('color-blot');
            if (themeKey === "Cores") { hint.style.display = 'none'; blot.style.display = 'block'; blot.style.backgroundColor = data.c; }
            else { hint.style.display = 'block'; blot.style.display = 'none'; hint.innerText = data.i; }
            renderBalloons(); createKeyboard(); updateDisplay();
        }

        function renderBalloons() {
            const container = document.getElementById('balloons-container');
            container.innerHTML = '';
            for(let i=0; i<6; i++) {
                const b = document.createElement('span'); b.className = 'balloon'; b.id = 'bal-' + i; b.innerText = '🎈';
                container.appendChild(b);
            }
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement('button'); b.className = 'key'; b.innerText = l;
                b.onclick = () => {
                    b.classList.add('used');
                    if (secretWord.includes(l)) {
                        guessed.push(l); if (secretWord.split("").every(x => guessed.includes(x))) endGame(true);
                    } else {
                        const bal = document.getElementById('bal-' + mistakes);
                        if(bal) { bal.style.opacity = '0'; bal.innerText = '💥'; setTimeout(() => bal.style.display = 'none', 300); }
                        mistakes++; if (mistakes === 6) endGame(false);
                    }
                    updateDisplay();
                };
                kb.appendChild(b);
            });
        }

        function updateDisplay() {
            document.getElementById('word-display').innerText = secretWord.split("").map(l => guessed.includes(l) ? l : "_").join(" ");
        }

        function endGame(won) {
            const modal = document.getElementById('end-modal');
            document.getElementById('overlay').classList.add('active');
            modal.style.display = 'block';
            if (won) {
                document.getElementById('end-icon').innerText = "🏆";
                document.getElementById('end-title').innerText = "Muito bem!";
                document.getElementById('end-msg').innerText = "Acertaste na palavra!";
            } else {
                document.getElementById('end-icon').innerText = "💥🎈";
                document.getElementById('end-title').innerText = "Fica para a próxima!";
                document.getElementById('end-msg').innerText = "A palavra era: " + secretWord;
            }
        }

        initThemes();
    </script>
</body>
</html>
