<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Template 1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --selected: #ffcc00;
            --correct: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* ==========================================================================
           1. HEADER
           ========================================================================== */
        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; flex-shrink: 0; 
            z-index: 10;
        }
        .header-left { width: 100px; position: relative; }
        .header-right { width: 100px; text-align: right; }
        .header-center { display: flex; align-items: center; gap: 10px; color: var(--primary-blue); font-weight: 900; }
        .header-center img { width: 30px; height: 30px; }
        
        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }
        .btn-voltar { 
            background-color: var(--primary-blue); color: white; padding: 6px 14px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 0.75rem; 
            box-shadow: 0 3px 0 #3d7db8; 
        }

        .menu-dropdown { 
            position: absolute; top: 50px; left: 0; 
            display: none; flex-direction: column; gap: 5px; 
            z-index: 1000; 
        }
        .menu-dropdown.active { display: flex; }
        .menu-item { 
            display: flex; align-items: center; gap: 10px; 
            padding: 8px 15px; background: white; border-radius: 15px; 
            box-shadow: 4px 4px 10px #c5d4e3; cursor: pointer; 
            min-width: 170px; text-decoration: none; color: inherit;
        }
        /* Ajuste: Ícones menos largos */
        .menu-item img { width: auto; height: 18px; max-width: 18px; object-fit: contain; }
        .menu-item span { font-size: 0.85rem; font-weight: 700; color: #555; }

        /* CARD PRINCIPAL */
        .game-wrapper { 
            flex-grow: 1; display: flex; justify-content: center; align-items: center; 
            padding: 5px 10px 10px 10px; min-height: 0; 
        }
        
        .game-card {
            background: var(--bg-page); width: 100%; max-width: 1200px; height: 100%; 
            border-radius: 35px; box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ==========================================================================
           2. STATUS
           ========================================================================== */
        .status {
            height: 55px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px;
        }
        .status-timer { font-weight: 900; color: #666; font-size: 0.8rem; min-width: 50px; }
        .status-dots { display: flex; gap: 5px; }
        .status-rd-points {
            display: flex; align-items: center; 
            background: rgba(255,255,255,0.4); padding: 4px 10px; 
            border-radius: 15px; box-shadow: var(--inner-shadow);
        }
        .points-val { font-weight: 900; color: var(--primary-blue); font-size: 0.95rem; margin-right: 10px; }
        .status-rd-points img { height: 25px; width: auto; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        /* ==========================================================================
           3. MAIN
           ========================================================================== */
        main {
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; 
            padding: 0 10px 10px 10px; min-height: 0; overflow: hidden;
        }

        .target-display { 
            text-align: center; padding-top: 25px; 
            margin-bottom: 20px; flex-shrink: 0;
        }

        @media (min-width: 768px) and (orientation: landscape) {
            main { flex-direction: row; justify-content: center; padding: 0 8%; gap: 5vw; }
            .target-display { padding-top: 0; margin-bottom: 0; flex: 1; }
            .grid-container { flex: 1.2; margin: 0; }
        }

        .target-display img { height: clamp(50px, 12vh, 110px); object-fit: contain; }
        .target-display h2 { font-size: clamp(1.4rem, 4vmin, 2.2rem); font-weight: 900; letter-spacing: 4px; color: #333; margin-top: 5px; }

        .grid-container {
            display: grid; grid-template-columns: repeat(8, 1fr); 
            gap: 1vmin; padding: 1.5vmin;
            background: var(--bg-page); border-radius: 20px; box-shadow: var(--inner-shadow);
            width: 100%; max-width: 550px; margin: 0 auto;
        }
        
        .cell {
            width: 100%; aspect-ratio: 1 / 1; 
            background: var(--bg-page); border-radius: clamp(5px, 1.2vmin, 10px); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: clamp(0.9rem, 4vw, 1.4rem);
            box-shadow: 3px 3px 6px #c5d4e3, -3px -3px 6px #ffffff; 
            cursor: pointer; user-select: none;
        }

        @media (orientation: landscape) {
            .cell { 
                width: clamp(35px, 7.5vh, 62px); 
                height: clamp(35px, 7.5vh, 62px); 
                font-size: clamp(1.1rem, 3.5vh, 1.6rem);
            }
            .grid-container { width: auto; }
        }

        .cell.selected { background: var(--selected); color: white; box-shadow: var(--inner-shadow); }
        .cell.correct { background: var(--correct); color: white; pointer-events: none; box-shadow: none; }
    </style>
</head>
<body>

    <header id="header">
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu()"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span id="header-title">Português - 1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            <section id="status" class="status">
                <div class="status-timer">⏳ <span id="timer-label">00:00</span></div>
                <div id="dots-container" class="status-dots"></div>
                <div class="status-rd-points">
                    <div>
                        <span id="points-label" class="points-val">0</span>
                        <span style="font-weight:900; color:var(--primary-blue); font-size:0.6rem; margin-left:-8px;">PTS</span>
                    </div>
                    <img id="status-rd-img" src="">
                </div>
            </section>

            <main id="main">
                <div class="target-display">
                    <img id="main-target-img" src="" alt="">
                    <h2 id="main-target-word"></h2>
                </div>
                <div id="game-grid" class="grid-container"></div>
            </main>
        </div>
    </div>

    <script src="dados.js"></script>
    <script>
        let currentRound = 0, points = 0, seconds = 0, selected = [], wordToFind = "";

        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }

        function init() {
            const icons = JOGO_CONFIG.iconesMenu;
            const pathI = JOGO_CONFIG.caminhoIcons;
            const links = JOGO_CONFIG.links; // Acede aos links do dados.js

            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = JOGO_CONFIG.caminhoImg + "rd.png";

            // Mapeamento dinâmico baseado no dados.js
            const menuItens = [
                { id: 'pre', label: 'Pré-Escolar' },
                { id: 'ano1', label: '1º Ano' },
                { id: 'ano2', label: '2º Ano' },
                { id: 'ano3', label: '3º Ano' },
                { id: 'ano4', label: '4º Ano' }
            ];

            menuItens.forEach(item => {
                const a = document.createElement('a');
                a.className = 'menu-item';
                a.href = links[item.id]; // Usa o link definido no dados.js
                a.innerHTML = `<img src="${pathI}${icons[item.id]}"><span>${item.label}</span>`;
                document.getElementById('dropdownMenu').appendChild(a);
            });

            setInterval(() => {
                seconds++;
                const m = Math.floor(seconds/60).toString().padStart(2,'0');
                const s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer-label').innerText = `${m}:${s}`;
            }, 1000);

            loadRound();
        }

        function loadRound() {
            const dots = document.getElementById('dots-container');
            dots.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                d.style.cssText = `background:${i <= currentRound ? '#2ecc71' : '#e9f0f8'}; box-shadow: ${i <= currentRound ? 'none' : 'inset 2px 2px 4px #c5d4e3'}; border: ${i <= currentRound ? '2px solid white' : 'none'}`;
                dots.appendChild(d);
            }

            const item = JOGO_CONFIG.categorias.animais.itens[currentRound];
            wordToFind = item.nome.toUpperCase();
            document.getElementById('main-target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('main-target-word').innerText = wordToFind;

            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let cells = Array(64).fill('').map(() => letters[Math.floor(Math.random()*letters.length)]);
            const start = Math.floor(Math.random() * (64 - wordToFind.length));
            for(let i=0; i<wordToFind.length; i++) cells[start+i] = wordToFind[i];

            cells.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = l;
                div.onclick = () => {
                    div.classList.toggle('selected');
                    if(div.classList.contains('selected')) selected.push({el:div, l});
                    else selected = selected.filter(x => x.el !== div);
                    
                    if(selected.map(x=>x.l).join('').replace(/[^A-Z]/g, '') === wordToFind.replace(/[^A-Z]/g, '')) {
                        selected.forEach(x => { x.el.classList.add('correct'); x.el.classList.remove('selected'); });
                        points += 10; 
                        document.getElementById('points-label').innerText = points;
                        selected = [];
                        setTimeout(() => { if(currentRound < 4) { currentRound++; loadRound(); } }, 600);
                    }
                };
                grid.appendChild(div);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
