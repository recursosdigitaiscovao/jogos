<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Template 1 - Visibilidade Total</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
        }

        /* Reset e Garantia de Ocupação Total */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; /* Impede scroll na página inteira */
            display: flex; 
            flex-direction: column; 
        }

        /* ==========================================================================
           1. HEADER (Sempre Visível)
           ========================================================================== */
        header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 10px; 
            flex-shrink: 0; /* IMPEDE QUE O HEADER DESAPAREÇA */
            z-index: 1000;
        }
        
        .header-left, .header-right { display: flex; align-items: center; min-width: 80px; }
        .header-right { justify-content: flex-end; }

        .header-center { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            color: var(--primary-blue); 
            font-weight: 900; 
        }
        .header-center img { width: 28px; height: 28px; }

        .btn-voltar { 
            background: var(--primary-blue); 
            color: white; 
            padding: 6px 14px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.75rem; 
            box-shadow: 0 3px 0 #3d7db8;
            transition: transform 0.1s;
        }
        .btn-voltar:active { transform: translateY(2px); box-shadow: 0 1px 0 #3d7db8; }

        /* ==========================================================================
           2. GAME WRAPPER (Ajusta-se ao espaço entre Header e Footer)
           ========================================================================== */
        .game-wrapper { 
            flex: 1; /* Ocupa todo o espaço disponível */
            display: flex; 
            justify-content: center; 
            padding: 10px; /* Padding de 10px em relação ao Header, Footer e Laterais */
            min-height: 0; /* Essencial para o flex-grow funcionar corretamente em overflow */
            overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 1200px; 
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        /* ==========================================================================
           3. ÁREA DE CONTEÚDO (MAIN)
           ========================================================================== */
        .status { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px; 
        }

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            min-height: 0; 
        }

        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ==========================================================================
           4. FOOTER (Sempre Visível no Fundo)
           ========================================================================== */
        footer {
            height: 35px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #8899aa;
            font-size: 0.85rem;
            font-weight: 800;
            flex-shrink: 0; /* IMPEDE QUE O FOOTER DESAPAREÇA */
            background: transparent;
        }

        /* Responsividade de Títulos */
        .title-desktop { display: inline; }
        .title-mobile { display: none; }
        @media (max-width: 480px) {
            .title-desktop { display: none; }
            .title-mobile { display: inline; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left"></div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span class="title-desktop">Português - 1º Ano</span>
            <span class="title-mobile">1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ <span id="timer-label">00:00</span></div>
                <div id="dots-container" style="display:flex; gap:5px;"></div>
                <div style="font-weight: 900; color: var(--primary-blue);">
                    Pontos: <span id="points-label">0</span>
                </div>
            </section>

            <div id="intro-overlay">
                <img id="intro-img" src="" style="height:15vh; max-height:90px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:25px; font-size: 2rem;">Sopa de Letras</h1>
                <button onclick="mostrarJogo()" style="padding:15px 45px; background:#2ecc71; color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; box-shadow: 0 5px 0 #27ae60; font-size: 1.1rem;">JOGAR</button>
            </div>

            <main id="game-area">
                </main>
        </div>
    </div>

    <footer>2026</footer>

    <script src="dados.js"></script>
    <script>
        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
        }

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const pathI = JOGO_CONFIG.caminhoIcons;
                const icons = JOGO_CONFIG.iconesMenu;

                document.getElementById('header-icon').src = pathI + icons.ano1;
                document.getElementById('intro-img').src = pathI + icons.ano1;
            }
        };
    </script>
</body>
</html>
