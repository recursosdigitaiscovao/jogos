<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Português - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --white: #ffffff;
            --soft-shadow: rgba(174, 190, 205, 0.5);
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --primary-blue: #5ba4e5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }

        body {
            background-color: var(--bg-page);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: #444;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 70px;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid rgba(255,255,255,0.3);
        }

        .hamburger-menu { font-size: 24px; color: var(--primary-blue); cursor: pointer; }

        /* --- CONTENT --- */
        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-blue);
            font-weight: 800;
            font-size: 1.5rem;
        }

        .header-title img { width: 40px; }

        .btn-voltar {
            background-color: var(--primary-blue);
            color: white;
            padding: 8px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 900;
            box-shadow: 0 4px 0 #3d7db8;
            font-size: 0.9rem;
        }

        /* --- JOGO (IGUAL À IMAGEM) --- */
        .game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-card {
            background: var(--bg-page);
            width: 100%;
            max-width: 1000px;
            height: 100%;
            border-radius: 40px;
            box-shadow: 20px 20px 60px #c5d4e3, -20px -20px 60px #ffffff;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Status Bar */
        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .dots { display: flex; gap: 8px; }
        .dot { 
            width: 20px; height: 20px; border-radius: 50%; 
            background: var(--bg-page); box-shadow: var(--inner-shadow);
        }
        .dot.active { background: #50d080; box-shadow: none; }

        /* Alvo */
        .target-box { text-align: center; margin-bottom: 20px; }
        .target-box img { width: 110px; filter: drop-shadow(5px 5px 10px var(--soft-shadow)); }
        .target-box h2 { font-size: 2.2rem; font-weight: 900; letter-spacing: 3px; margin-top: 10px; }

        /* Grade Neomórfica */
        .grid-frame {
            background: var(--bg-page);
            padding: 20px;
            border-radius: 30px;
            box-shadow: var(--inner-shadow); /* Efeito afundado da imagem */
            display: grid;
            gap: 8px;
        }

        .cell {
            width: 45px;
            height: 45px;
            background: var(--bg-page);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 4px 4px 8px #c5d4e3, -4px -4px 8px #ffffff;
            cursor: pointer;
            user-select: none;
        }

        .cell.selected { background: #d0f0d0; color: #2d8a4e; }

        /* Footer */
        .game-footer {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
        }

        .settings-btn {
            background: var(--bg-page);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-shadow: 4px 4px 8px #c5d4e3, -4px -4px 8px #ffffff;
            color: #777;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="hamburger-menu"><i class="fas fa-bars"></i></div>
    </aside>

    <div class="main-wrapper">
        <header>
            <div class="header-title">
                <img src="https://img.icons8.com/color/96/giraffe.png" alt="Icon">
                Português - 1º Ano
            </div>
            <a href="#" class="btn-voltar">← Voltar</a>
        </header>

        <main class="game-area">
            <div class="game-card">
                <div class="status-bar">
                    <div>⏳ 01:31</div>
                    <div class="dots">
                        <div class="dot active"></div>
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                    <div>0 PTS</div>
                </div>

                <div class="target-box">
                    <img id="target-img" src="" alt="Imagem">
                    <h2 id="target-word"></h2>
                </div>

                <div class="grid-frame" id="grid"></div>

                <div class="game-footer">
                    <button class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="dados.js"></script>
    <script>
        function carregarNivel(n) {
            const dados = jogoDados.niveis[n];
            document.getElementById('target-img').src = dados.imagem;
            document.getElementById('target-word').innerText = dados.palavraAlvo;
            
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${dados.gridTamanho}, 1fr)`;
            
            const letras = "ABCDEfGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i < (dados.gridTamanho * dados.gridTamanho); i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = letras.charAt(Math.floor(Math.random() * letras.length));
                grid.appendChild(div);
            }
        }
        window.onload = () => carregarNivel(0);
    </script>
</body>
</html>
