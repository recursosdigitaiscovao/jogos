<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Template 1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --selected: #ffcc00;
            --correct: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* ==========================================================================
           HEADER (Ajustado com 10px de padding fixo)
           ========================================================================== */
        header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 10px; /* 10px das bordas laterais */
            flex-shrink: 0; 
            z-index: 1000;
        }
        
        .header-left, .header-right { 
            display: flex; 
            align-items: center; 
            min-width: 50px; 
        }

        .header-center { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            color: var(--primary-blue); 
            font-weight: 900; 
        }
        .header-center img { width: 28px; height: 28px; }

        .title-desktop { display: inline; }
        .title-mobile { display: none; }

        @media (max-width: 480px) {
            .title-desktop { display: none; }
            .title-mobile { display: inline; font-size: 1.1rem; }
        }

        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; }
        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 6px 12px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.75rem; box-shadow: 0 3px 0 #3d7db8;
        }

        /* MENUS */
        .menu-dropdown, #rd-menu-container { 
            position: absolute; top: 55px; display: none; flex-direction: column; 
            gap: 8px; z-index: 2000; 
        }
        .menu-dropdown { left: 10px; }
        #rd-menu-container { right: 10px; }

        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px 18px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; color: inherit;
        }

        /* ==========================================================================
           ESTRUTURA DO CARD E MAIN (10px de margem total)
           ========================================================================== */
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 10px; /* Margem de 10px em relação ao header e ao fundo do monitor */
            min-height: 0; 
            overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 1200px; 
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        /* STATUS DENTRO DO CARD */
        .status { 
            height: 55px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 15px; 
        }

        .status-rd-trigger { 
            display: flex; 
            align-items: center; 
            background: rgba(255,255,255,0.4); 
            padding: 4px 10px; 
            border-radius: 15px; 
            box-shadow: var(--inner-shadow);
            cursor: pointer; 
            height: 38px;
        }

        /* ÁREA DE JOGO (MAIN) */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-evenly; 
            padding: 10px; /* 10px das bordas internas do card */
            min-height: 0; 
            width: 100%;
        }

        /* RESPONSIVIDADE DA GRELHA */
        .target-display { text-align: center; flex-shrink: 0; }
        .target-display img { height: 18vh; max-height: 110px; object-fit: contain; }
        .target-display h2 { font-size: clamp(1.2rem, 4vh, 1.8rem); font-weight: 900; letter-spacing: 4px; }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 1vh; 
            padding: 1.5vh; 
            background: var(--bg-page); 
            border-radius: 20px; 
            box-shadow: var(--inner-shadow); 
            max-height: 50vh; /* Garante que cabe em qualquer ecrã */
        }

        .cell { 
            width: clamp(28px, 6vh, 50px); 
            height: clamp(28px, 6vh, 50px); 
            background: var(--bg-page); 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: clamp(0.8rem, 2.5vh, 1.3rem); 
            box-shadow: 2px 2px 4px #c5d4e3, -2px -2px 4px #ffffff; 
            cursor: pointer;
        }

        @media (min-width: 768px) and (orientation: landscape) {
            main { flex-direction: row; justify-content: center; gap: 40px; }
        }

        /* INTRO OVERLAY */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu('dropdownMenu', event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span class="title-desktop">Português - 1º Ano</span>
            <span class="title-mobile">1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ <span id="timer-label">00:00</span></div>
                <div id="dots-container" class="status-dots"></div>
                <div class="status-rd-trigger" onclick="toggleMenu('rd-menu-container', event)">
                    <span id="points-label" class="points-val">0</span>
                    <img id="status-rd-img" src="">
                    <div id="rd-menu-container">
                        <div class="custom-menu-item" onclick="changeCategory('animais')"><span>🐾 Animais</span></div>
                    </div>
                </div>
            </section>

            <div id="intro-overlay">
                <img src="" id="intro-img" style="height:20vh; max-height:120px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:20px;">Sopa de Letras</h1>
                <button onclick="startGame()" style="padding:15px 40px; background:var(--correct); color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; box-shadow: 0 5px 0 #27ae60;">JOGAR</button>
            </div>

            <main id="main">
                <div class="target-display">
                    <img id="main-target-img" src="" alt="">
                    <h2 id="main-target-word"></h2>
                </div>
                <div id="game-grid" class="grid-container"></div>
            </main>
        </div>
    </div>

    <script src="dados.js"></script>
    <script>
        let currentRound = 0, points = 0, seconds = 0, selected = [], wordToFind = "", gameStarted = false;

        function toggleMenu(menuId, e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById(menuId);
            const isVisible = menu.style.display === 'flex';
            document.querySelectorAll('.menu-dropdown, #rd-menu-container').forEach(m => m.style.display = 'none');
            if(!isVisible) menu.style.display = 'flex';
        }

        window.onclick = () => {
            document.querySelectorAll('.menu-dropdown, #rd-menu-container').forEach(m => m.style.display = 'none');
        };

        function startGame() {
            document.getElementById('intro-overlay').style.display = 'none';
            gameStarted = true;
            setInterval(() => {
                if(gameStarted) {
                    seconds++;
                    const m = Math.floor(seconds/60).toString().padStart(2,'0');
                    const s = (seconds%60).toString().padStart(2,'0');
                    document.getElementById('timer-label').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function init() {
            const icons = JOGO_CONFIG.iconesMenu;
            const pathI = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;

            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('intro-img').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = pathImg + "rd.png";

            const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
            const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];

            menuKeys.forEach((key, index) => {
                const a = document.createElement('a');
                a.className = 'custom-menu-item';
                a.href = JOGO_CONFIG.links[key];
                a.innerHTML = `<img src="${pathI}${icons[key]}"><span>${menuLabels[index]}</span>`;
                document.getElementById('dropdownMenu').appendChild(a);
            });
            loadRound();
        }

        function loadRound() {
            const item = JOGO_CONFIG.categorias.animais.itens[currentRound];
            wordToFind = item.nome.toUpperCase();
            document.getElementById('main-target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('main-target-word').innerText = wordToFind;

            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let cells = Array(64).fill(null).map(() => letters[Math.floor(Math.random() * letters.length)]);
            const startPos = Math.floor(Math.random() * (64 - wordToFind.length));
            for(let i=0; i<wordToFind.length; i++) cells[startPos + i] = wordToFind[i];

            cells.forEach((l) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = l;
                div.onclick = (e) => {
                    if(!gameStarted) return;
                    div.classList.toggle('selected');
                    if(div.classList.contains('selected')) selected.push({el: div, char: l});
                    else selected = selected.filter(item => item.el !== div);
                    
                    if(selected.map(s => s.char).join('') === wordToFind) {
                        selected.forEach(s => s.el.classList.add('correct'));
                        points += 10;
                        document.getElementById('points-label').innerText = points;
                        selected = [];
                        setTimeout(() => { if(currentRound < 4) { currentRound++; loadRound(); } }, 600);
                    }
                };
                grid.appendChild(div);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
