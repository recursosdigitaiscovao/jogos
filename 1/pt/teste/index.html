<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Português - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --white: #ffffff;
            --primary-blue: #5ba4e5;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }

        body {
            background-color: var(--bg-page);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 70px;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        /* --- CONTENT WRAPPER --- */
        .main-wrapper { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            min-width: 0; /* Evita que o flexbox quebre em ecrãs pequenos */
        }

        /* --- HEADER --- */
        header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-blue);
            font-weight: 800;
            font-size: clamp(1rem, 4vw, 1.5rem);
        }

        .header-title img { width: clamp(30px, 5vw, 45px); }

        .btn-voltar {
            background-color: var(--primary-blue);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 900;
            box-shadow: 0 4px 0 #3d7db8;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            white-space: nowrap;
        }

        /* --- ÁREA DO JOGO --- */
        .game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }

        .game-card {
            background: var(--bg-page);
            width: 95%;
            max-width: 1000px;
            height: 90%;
            max-height: 800px;
            border-radius: clamp(20px, 5vw, 40px);
            box-shadow: var(--outer-shadow);
            padding: clamp(15px, 3vw, 30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Status Bar */
        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
        }

        .dots { display: flex; gap: clamp(4px, 1.5vw, 8px); }
        .dot { 
            width: clamp(12px, 2.5vw, 20px); 
            height: clamp(12px, 2.5vw, 20px); 
            border-radius: 50%; 
            background: var(--bg-page); box-shadow: var(--inner-shadow);
        }
        .dot.active { background: #50d080; box-shadow: none; border: 2px solid white; }

        /* Alvo */
        .target-box { text-align: center; margin-bottom: 10px; flex-shrink: 0; }
        .target-box img { height: clamp(60px, 15vh, 110px); width: auto; }
        .target-box h2 { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; letter-spacing: 2px; }

        /* Grade Neomórfica */
        .grid-frame {
            background: var(--bg-page);
            padding: clamp(8px, 2vw, 20px);
            border-radius: 20px;
            box-shadow: var(--inner-shadow);
            display: grid;
            gap: clamp(4px, 1vw, 8px);
            max-height: 55vh; /* Impede que a grade saia do ecrã no telemóvel */
            overflow: hidden;
        }

        .cell {
            aspect-ratio: 1/1;
            width: clamp(25px, 8vw, 45px);
            background: var(--bg-page);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            box-shadow: 3px 3px 6px #c5d4e3, -3px -3px 6px #ffffff;
            cursor: pointer;
            user-select: none;
        }

        /* Footer */
        .game-footer {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
        }

        .settings-btn {
            background: var(--bg-page);
            border: none;
            width: clamp(35px, 6vw, 50px);
            height: clamp(35px, 6vw, 50px);
            border-radius: 50%;
            box-shadow: 4px 4px 8px #c5d4e3, -4px -4px 8px #ffffff;
            color: #777;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* AJUSTES PARA MOBILE */
        @media (max-width: 600px) {
            .sidebar { width: 50px; }
            header { height: 60px; padding: 0 10px; }
            .game-card { padding: 15px; border-radius: 25px; height: 95%; }
            .target-box h2 { margin-top: 5px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="hamburger-menu"><i class="fas fa-bars"></i></div>
    </aside>

    <div class="main-wrapper">
        <header>
            <div class="header-title">
                <img src="https://img.icons8.com/color/96/giraffe.png" alt="Icon">
                Português - 1º Ano
            </div>
            <a href="#" class="btn-voltar">← Voltar</a>
        </header>

        <main class="game-area">
            <div class="game-card">
                <div class="status-bar">
                    <div>⏳ 01:31</div>
                    <div class="dots">
                        <div class="dot active"></div>
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                    <div>0 PTS</div>
                </div>

                <div class="target-box">
                    <img id="target-img" src="" alt="Imagem">
                    <h2 id="target-word"></h2>
                </div>

                <div class="grid-frame" id="grid"></div>

                <div class="game-footer">
                    <button class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="dados.js"></script>
    <script>
        function carregarNivel(n) {
            const dados = jogoDados.niveis[n];
            document.getElementById('target-img').src = dados.imagem;
            document.getElementById('target-word').innerText = dados.palavraAlvo;
            
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; // Limpa grid anterior
            grid.style.gridTemplateColumns = `repeat(${dados.gridTamanho}, 1fr)`;
            
            const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i < (dados.gridTamanho * dados.gridTamanho); i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = letras.charAt(Math.floor(Math.random() * letras.length));
                grid.appendChild(div);
            }
        }
        window.onload = () => carregarNivel(0);
    </script>
</body>
</html>
