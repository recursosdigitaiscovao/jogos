<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* ==========================================================================
           1. HEADER (Hambúrguer e Voltar a 20px dos limites)
           ========================================================================== */
        header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; /* 20px de padding nas extremidades */
            flex-shrink: 0; 
            z-index: 1000;
        }
        
        .header-left, .header-right { 
            display: flex; 
            align-items: center; 
            min-width: 60px; 
        }
        .header-right { justify-content: flex-end; }

        .hamburger-btn { 
            font-size: 26px; 
            color: var(--primary-blue); 
            cursor: pointer;
        }

        .header-center { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            color: var(--primary-blue); 
            font-weight: 900; 
            font-size: 1.2rem;
        }
        .header-center img { height: 30px; width: auto; }

        .btn-voltar { 
            background: var(--primary-blue); 
            color: white; 
            padding: 8px 16px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.8rem; 
            box-shadow: 0 4px 0 #3d7db8;
        }

        /* ==========================================================================
           2. GAME WRAPPER (Ajuste para visibilidade total em Telemóvel)
           ========================================================================== */
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 10px; 
            overflow: hidden;
            /* Garante que o main nunca exceda o espaço entre header e footer */
            max-height: calc(100vh - 100px); 
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 1200px; 
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        /* STATUS */
        .status { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px; 
        }

        /* ÁREA DE JOGO (MAIN) */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            min-height: 0; /* Permite que o flexbox encolha o conteúdo se necessário */
        }

        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ==========================================================================
           3. FOOTER
           ========================================================================== */
        footer {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8899aa;
            font-size: 0.85rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* MENU DROPDOWN */
        .menu-dropdown { 
            position: absolute; 
            top: 60px; 
            left: 20px; /* Alinhado com o botão hamburguer a 20px */
            display: none; 
            flex-direction: column; 
            gap: 8px; 
            z-index: 2000; 
        }
        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; color: #555;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu('dropdownMenu', event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ 00:00</div>
                <div id="dots-container" style="display:flex; gap:5px;"></div>
                <div style="font-weight: 900; color: var(--primary-blue);">Pontos: 0</div>
            </section>

            <div id="intro-overlay">
                <img id="intro-img" src="" style="height:100px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:20px;">Título do Jogo</h1>
                <button onclick="mostrarJogo()" style="padding:15px 40px; background:#2ecc71; color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; box-shadow: 0 5px 0 #27ae60;">JOGAR</button>
            </div>

            <main id="game-area">
                </main>
        </div>
    </div>

    <footer>2026</footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(menuId, e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById(menuId);
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
        };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
        }

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const icons = JOGO_CONFIG.iconesMenu;
                const pathI = JOGO_CONFIG.caminhoIcons;
                
                document.getElementById('header-icon').src = pathI + icons.ano1;
                document.getElementById('intro-img').src = pathI + icons.ano1;

                const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
                const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];
                const menuBox = document.getElementById('dropdownMenu');
                
                menuKeys.forEach((key, i) => {
                    const a = document.createElement('a');
                    a.className = 'custom-menu-item';
                    a.href = JOGO_CONFIG.links[key];
                    a.innerHTML = `<img src="${pathI}${icons[key]}" style="height:20px;"><span>${menuLabels[i]}</span>`;
                    menuBox.appendChild(a);
                });
            }
        };
    </script>
</body>
</html>
