<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Template 1 - Ajuste Total</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* ==========================================================================
           1. HEADER (Hambúrguer a 10px da borda)
           ========================================================================== */
        header { 
            height: 8vh; /* Altura relativa ao monitor */
            min-height: 50px;
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 10px; flex-shrink: 0; z-index: 1000;
        }
        
        .header-left, .header-right { width: 60px; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; 
            color: var(--primary-blue); font-weight: 900; 
        }
        .header-center img { height: 4vh; max-height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 5px 10px; 
            border-radius: 10px; text-decoration: none; font-weight: 900; 
            font-size: 0.7rem; box-shadow: 0 3px 0 #3d7db8;
        }

        /* ==========================================================================
           2. GAME WRAPPER (Padding 10px de todos os lados)
           ========================================================================== */
        .game-wrapper { 
            flex: 1; display: flex; justify-content: center; 
            padding: 0 10px 10px 10px; /* 10px das laterais e do fundo */
            min-height: 0; overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 1200px; height: 100%; 
            border-radius: 30px; box-shadow: var(--outer-shadow); display: flex; 
            flex-direction: column; position: relative; overflow: hidden;
        }

        /* STATUS */
        .status { 
            height: 6vh; min-height: 40px; flex-shrink: 0; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; 
        }

        /* ==========================================================================
           3. MAIN (Área do Jogo)
           ========================================================================== */
        main { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 10px; min-height: 0; 
        }

        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ==========================================================================
           4. FOOTER (Fixo no fundo)
           ========================================================================== */
        footer {
            height: 4vh; min-height: 25px;
            display: flex; align-items: center; justify-content: center; 
            color: #8899aa; font-size: 0.8rem; font-weight: 800; flex-shrink: 0;
        }

        /* MENU DROPDOWN */
        .menu-dropdown { 
            position: absolute; top: 60px; left: 10px; display: none; 
            flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px 15px; 
            background: white; border-radius: 15px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 170px; text-decoration: none; color: #555;
            font-weight: 800; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu('dropdownMenu', event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span class="title-desktop">Português - 1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ 00:00</div>
                <div style="font-weight: 900; color: var(--primary-blue);">Pontos: 0</div>
            </section>

            <div id="intro-overlay">
                <img id="intro-img" src="" style="height:12vh; max-height:80px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:20px;">Título do Jogo</h1>
                <button onclick="mostrarJogo()" style="padding:12px 35px; background:#2ecc71; color:white; border:none; border-radius:15px; font-weight:900; cursor:pointer; box-shadow: 0 4px 0 #27ae60;">JOGAR</button>
            </div>

            <main id="game-area">
                </main>
        </div>
    </div>

    <footer>2026</footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(menuId, e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById(menuId);
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
        };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
        }

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const icons = JOGO_CONFIG.iconesMenu;
                const pathI = JOGO_CONFIG.caminhoIcons;
                
                document.getElementById('header-icon').src = pathI + icons.ano1;
                document.getElementById('intro-img').src = pathI + icons.ano1;

                // Preencher menu
                const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
                const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];
                const menuBox = document.getElementById('dropdownMenu');
                
                menuKeys.forEach((key, i) => {
                    const a = document.createElement('a');
                    a.className = 'custom-menu-item';
                    a.href = JOGO_CONFIG.links[key];
                    a.innerHTML = `<img src="${pathI}${icons[key]}" style="height:18px;"><span>${menuLabels[i]}</span>`;
                    menuBox.appendChild(a);
                });
            }
        };
    </script>
</body>
</html>
