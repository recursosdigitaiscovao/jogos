<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
            --selected: #ffcc00;
            --correct: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); height: 100vh; width: 100vw; overflow: hidden; }

        /* --- HEADER --- */
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .nav-section, .back-section { width: 150px; }
        .back-section { display: flex; justify-content: flex-end; }
        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }
        .header-title { display: flex; align-items: center; gap: 8px; color: var(--primary-blue); font-weight: 900; font-size: 1.1rem; }
        .header-title img { width: 28px; height: 28px; }
        .btn-voltar { background-color: var(--primary-blue); color: white; padding: 5px 15px; border-radius: 15px; text-decoration: none; font-weight: 900; font-size: 0.75rem; box-shadow: 0 3px 0 #3d7db8; }

        /* --- STATUS BAR ALINHADA --- */
        .status-bar {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr; /* Alinhamento proporcional */
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        .status-item { font-weight: 900; color: #555; display: flex; align-items: center; gap: 5px; }
        .rounds-dots { display: flex; gap: 8px; justify-content: center; }
        .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--bg-page); box-shadow: var(--inner-shadow); transition: 0.3s; }
        .dot.active { background: var(--correct); border: 2px solid white; box-shadow: none; }
        .rd-image { height: 35px; justify-self: end; }

        /* --- GAME CARD --- */
        .game-area { display: flex; justify-content: center; align-items: center; height: calc(100vh - 60px); padding: 10px; }
        .game-card { background: var(--bg-page); width: 95%; max-width: 850px; border-radius: 40px; box-shadow: var(--outer-shadow); padding: 25px; display: flex; flex-direction: column; align-items: center; }

        .target-box { text-align: center; margin-bottom: 15px; }
        .target-box img { height: 90px; margin-bottom: 5px; }
        .target-box h2 { font-size: 2rem; font-weight: 900; letter-spacing: 4px; color: #333; }

        /* --- GRID --- */
        .grid-frame { background: var(--bg-page); padding: 15px; border-radius: 25px; box-shadow: var(--inner-shadow); display: grid; gap: 10px; }
        .cell {
            width: clamp(35px, 5vw, 45px); height: clamp(35px, 5vw, 45px);
            background: var(--bg-page); border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.2rem; cursor: pointer;
            box-shadow: 4px 4px 8px #c5d4e3, -4px -4px 8px #ffffff; transition: 0.2s;
            user-select: none;
        }
        .cell.selected { background: var(--selected); color: white; transform: scale(0.95); box-shadow: var(--inner-shadow); }
        .cell.correct { background: var(--correct); color: white; }

        /* --- MENU --- */
        .menu-dropdown { position: absolute; top: 55px; left: 20px; display: none; flex-direction: column; gap: 8px; z-index: 1000; }
        .menu-dropdown.active { display: flex; }
        .menu-row-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--white); border-radius: 20px; box-shadow: 4px 4px 10px #c5d4e3; width: 180px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="nav-section">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu()"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-title">
            <img id="header-icon" src="" alt="">
            <span>Português - 1º Ano</span>
        </div>
        <div class="back-section"><a href="#" class="btn-voltar">← Voltar</a></div>
    </header>

    <main class="game-area">
        <div class="game-card">
            <div class="status-bar">
                <div class="status-item">⏳ <span id="timer">00:00</span></div>
                <div class="rounds-dots" id="rounds-container"></div>
                <div class="status-item"><span id="points-display">0</span> PTS</div>
                <img id="img-rd" src="" class="rd-image">
            </div>

            <div class="target-box">
                <img id="target-img" src="" alt="">
                <h2 id="target-word"></h2>
            </div>

            <div id="game-grid" class="grid-frame"></div>
        </div>
    </main>

    <script src="dados.js"></script>
    <script>
        let currentRound = 0;
        let points = 0;
        let seconds = 0;
        let selectedLetters = [];
        let currentWord = "";
        let timerInterval;

        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }

        function init() {
            const dropdown = document.getElementById('dropdownMenu');
            const icons = JOGO_CONFIG.iconesMenu;
            const pathIcons = JOGO_CONFIG.caminhoIcons;
            
            document.getElementById('img-rd').src = JOGO_CONFIG.caminhoImg + "rd.png";
            document.getElementById('header-icon').src = pathIcons + icons.ano1;

            // Criar Menu
            const mapping = [{k:'pre', l:'Pré-Escolar'}, {k:'ano1', l:'1º Ano'}, {k:'ano2', l:'2º Ano'}, {k:'ano3', l:'3º Ano'}, {k:'ano4', l:'4º Ano'}];
            mapping.forEach(m => {
                const row = document.createElement('div');
                row.className = 'menu-row-item';
                row.innerHTML = `<img src="${pathIcons}${icons[m.k]}"><span>${m.l}</span>`;
                dropdown.appendChild(row);
            });

            startTimer();
            loadRound();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function loadRound() {
            const roundContainer = document.getElementById('rounds-container');
            roundContainer.innerHTML = '';
            for(let i=0; i<5; i++) {
                const dot = document.createElement('div');
                dot.className = i <= currentRound ? 'dot active' : 'dot';
                roundContainer.appendChild(dot);
            }

            const items = JOGO_CONFIG.categorias.animais.itens;
            const item = items[currentRound % items.length];
            currentWord = item.nome.toUpperCase();
            
            document.getElementById('target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('target-word').innerText = currentWord;

            generateGrid(currentWord);
        }

        function generateGrid(word) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            
            const totalCells = 64;
            let cells = Array(totalCells).fill('');

            // Colocar a palavra na horizontal aleatoriamente
            const startPos = Math.floor(Math.random() * (totalCells - word.length));
            for(let i=0; i < word.length; i++) {
                cells[startPos + i] = word[i];
            }

            // Preencher o resto com letras aleatórias
            const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            cells = cells.map(c => c === '' ? abc[Math.floor(Math.random() * abc.length)] : c);

            cells.forEach((letter, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = letter;
                cell.onclick = () => selectCell(cell, letter);
                grid.appendChild(cell);
            });
        }

        function selectCell(cell, letter) {
            if (cell.classList.contains('correct')) return;

            cell.classList.toggle('selected');
            
            if (cell.classList.contains('selected')) {
                selectedLetters.push({element: cell, letter: letter});
            } else {
                selectedLetters = selectedLetters.filter(item => item.element !== cell);
            }

            checkWord();
        }

        function checkWord() {
            const wordFormed = selectedLetters.map(l => l.letter).join('');
            
            if (wordFormed === currentWord) {
                selectedLetters.forEach(item => {
                    item.element.classList.remove('selected');
                    item.element.classList.add('correct');
                });
                
                points += 10;
                document.getElementById('points-display').innerText = points;
                selectedLetters = [];

                setTimeout(() => {
                    if (currentRound < 4) {
                        currentRound++;
                        loadRound();
                    } else {
                        alert("Parabéns! Terminaste o jogo!");
                        clearInterval(timerInterval);
                    }
                }, 1000);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
