<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --highlight-green: #7ed321;
            --error-red: #ff5e5e;
            --white: #ffffff;
            --text-grey: #5d7082;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: #f0f7ff; z-index: 1000; flex-shrink: 0;
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            position: relative;
        }
        .header-left { position: relative; z-index: 10; }
        .hamburger-btn { font-size: 32px; color: var(--primary-blue); cursor: pointer; padding: 5px; transition: transform 0.2s; }
        
        .logo-center { 
            display: flex; align-items: center; gap: 10px; 
            position: absolute; left: 50%; transform: translateX(-50%); 
            text-align: left; pointer-events: none; white-space: nowrap;
        }
        .logo-center img { height: 50px; }
        .logo-text h1 { font-size: 18px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; margin: 0; }
        .logo-text p { font-size: 10px; color: #88a; font-weight: 700; margin: 0; }

        .header-right { min-width: 120px; display: flex; justify-content: flex-end; z-index: 10; }
        .btn-voltar-header { 
            background: var(--primary-blue); color: white; padding: 8px 18px; border-radius: 14px; 
            text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 14px;
            box-shadow: 0 4px 0 var(--primary-dark); transition: all 0.2s;
        }
        .btn-voltar-header img { height: 20px; width: 20px; object-fit: contain; }

        .menu-dropdown { position: absolute; top: 60px; left: 0; display: none; flex-direction: column; gap: 8px; z-index: 2000; }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: white; border-radius: 15px; box-shadow: 4px 4px 10px rgba(176, 196, 217, 0.4); cursor: pointer; min-width: 190px; text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.9rem; transition: all 0.2s ease; }
        .menu-item img { height: 22px; width: 22px; object-fit: contain; }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }
        .menu-divider { height: 1px; background-color: rgba(176, 196, 217, 0.4); margin: 2px 10px; }

        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 1100px; height: 100%; max-height: calc(100dvh - 130px); border-radius: 40px; box-shadow: 0 15px 35px rgba(176, 196, 217, 0.5); display: flex; flex-direction: column; position: relative; padding: 15px; }

        .status-bar { display: none; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 2px solid rgba(0,0,0,0.03); margin-bottom: 10px; flex-shrink: 0; }
        
        .screen { flex: 1; display: none; width: 100%; min-height: 0; }
        .screen.active { display: flex; flex-direction: column; }

        /* ÁREA ESPECÍFICA DA SOPA DE LETRAS */
        .sopa-layout { display: flex; gap: 20px; flex: 1; min-height: 0; justify-content: center; align-items: center; }
        
        /* GRELHA DE LETRAS */
        .sopa-grid-container { 
            background: white; border-radius: 20px; padding: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: grid;
            gap: 5px;
            user-select: none;
            touch-action: none;
        }
        .sopa-cell { 
            width: clamp(30px, 6vh, 45px); height: clamp(30px, 6vh, 45px);
            background: #f8fbff; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.2rem; color: var(--text-grey);
            cursor: pointer; transition: 0.1s;
        }
        .sopa-cell.selected { background: var(--primary-blue); color: white; }
        .sopa-cell.found { background: var(--highlight-green); color: white; }

        /* PAINEL DE PALAVRAS (IMAGENS) */
        .word-panel { 
            display: flex; flex-direction: column; gap: 10px; 
            width: 180px; overflow-y: auto; padding: 5px; 
        }
        .word-card { 
            background: white; padding: 8px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center;
            border: 2px solid transparent; transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .word-card img { width: 50px; height: 50px; object-fit: contain; }
        .word-card span { font-size: 11px; font-weight: 900; color: var(--text-grey); margin-top: 5px; }
        .word-card.found { border-color: var(--highlight-green); opacity: 0.6; }
        .word-card.found span { color: var(--highlight-green); }

        /* BOTÕES DE AÇÃO */
        .action-container { display: flex; align-items: center; gap: 15px; margin-top: 15px; justify-content: center; }
        .btn-jogar-stretch { flex: 1; background: var(--primary-blue); color: white; border: none; border-radius: 20px; padding: 16px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); max-width: 400px; }

        /* OUTROS PAINÉIS */
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2100; padding: 20px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .category-card { background: white; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 4px 12px rgba(176,196,217,0.4); cursor: pointer; }
        .category-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 1500; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; color: #89a; font-size: 12px; font-weight: 700; flex-shrink: 0; }

        @media (max-width: 768px) {
            .sopa-layout { flex-direction: column; }
            .word-panel { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; height: 100px; }
            .word-card { width: 80px; }
            .btn-voltar-header { display: none; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text">
                <h1 id="tit-l1"></h1>
                <h1 id="tit-l2"></h1>
                <p id="sub-tit"></p>
            </div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar" class="btn-voltar-header">
                <img id="header-back-icon" src="" alt="">
                VOLTAR
            </a>
        </div>
    </header>

    <div class="game-container">
        <div class="game-card">
            
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:#667;">⏳ 00:00</div>
                <div id="score" style="font-weight:900; color:var(--primary-blue);">✨ <span id="score-val">0</span></div>
                <img id="rd-game-btn" src="" style="height:25px; cursor:pointer;" onclick="openRDMenu(event)">
            </div>

            <h2 id="main-title" style="text-align:center; color:var(--primary-blue); font-size:26px; font-weight:900; margin-bottom:10px;">SOPA DE LETRAS</h2>

            <!-- ECRÃ 1: INTRO -->
            <div class="screen active" id="scr-intro">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
                    <div style="background:white; padding:30px; border-radius:30px; border:4px dashed var(--primary-blue);">
                        <i class="fas fa-search-plus" style="font-size:80px; color:var(--primary-blue);"></i>
                    </div>
                    <div id="intro-instr" style="font-weight:800; color:var(--primary-blue); font-size:1.2rem; text-align:center;"></div>
                </div>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="startGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" style="height:55px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <!-- ECRÃ 2: JOGO -->
            <div class="screen" id="scr-game">
                <div class="sopa-layout">
                    <!-- Grelha de Letras (JS vai gerar) -->
                    <div id="sopa-grid" class="sopa-grid-container"></div>
                    
                    <!-- Painel Lateral de Palavras/Imagens -->
                    <div id="word-panel" class="word-panel"></div>
                </div>
            </div>

            <!-- ECRÃ 3: RESULTADOS -->
            <div class="screen" id="scr-result" style="justify-content:center; align-items:center;">
                <img id="res-taca" style="width:140px; margin-bottom:15px;" src="">
                <h2 id="res-tit" style="font-size:30px; color: var(--primary-blue); font-weight:900;"></h2>
                <div style="display:flex; gap:15px; margin:20px 0;">
                    <div style="background:white; padding:15px 25px; border-radius:20px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                        <span id="res-pts" style="font-size:24px; font-weight:900; color:var(--primary-blue);">0</span><br><small>PONTOS</small>
                    </div>
                    <div style="background:white; padding:15px 25px; border-radius:20px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                        <span id="res-tim" style="font-size:24px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small>TEMPO</small>
                    </div>
                </div>
                <button class="btn-jogar-stretch" onclick="location.reload()">REPETIR</button>
            </div>

        </div>
    </div>

    <footer id="mainFooter"></footer>

    <!-- MENU RD (TEMAS) -->
    <div id="rdMenu" class="rd-panel">
        <div style="width:50px; height:5px; background:#e0e6ed; border-radius:10px; margin: 0 auto 15px;" onclick="closeMenus()"></div>
        <h3 style="color:var(--primary-blue); text-align:center; margin-bottom:15px;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <script src="dados.js"></script>
    <script>
        // INICIALIZAÇÃO DA ESTRUTURA (UI)
        function initUI() {
            const conf = JOGO_CONFIG;
            const pI = conf.caminhoIcons;
            const pImg = conf.caminhoImg;

            // Header e Logo
            document.getElementById('head-logo').src = pI + conf.iconesMenu.ano1;
            document.getElementById('tit-l1').innerText = conf.textos.tituloLinha1;
            document.getElementById('tit-l2').innerText = conf.textos.tituloLinha2;
            document.getElementById('sub-tit').innerText = conf.textos.subtitulo;
            document.getElementById('intro-instr').innerText = conf.textos.instrucao;
            document.getElementById('mainFooter').innerHTML = conf.textos.rodape;

            // Botões e Icons
            document.getElementById('header-back-icon').src = pI + "voltar.png";
            document.getElementById('rd-game-btn').src = pImg + "rd.png";
            document.getElementById('rd-intro-btn').src = pImg + "rd.png";
            document.getElementById('link-voltar').href = conf.linkVoltar;

            // Hamburger Menu Completo
            const menuBox = document.getElementById('dropdownMenu');
            menuBox.innerHTML = '';
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                const a = document.createElement('a'); 
                a.className = 'menu-item'; 
                a.href = conf.links[k];
                a.innerHTML = `<img src="${pI}${conf.iconesMenu[k]}"><span>${k==='home'?'Início':k.replace('ano',' ')+'º Ano'}</span>`;
                menuBox.appendChild(a);
            });
            const div = document.createElement('div'); div.className = 'menu-divider'; menuBox.appendChild(div);
            const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = conf.linkVoltar;
            btnV.innerHTML = `<img src="${pI}voltar.png"><span>${conf.textoVoltar}</span>`;
            menuBox.appendChild(btnV);

            // Lista RD (Temas)
            const rdList = document.getElementById('rd-list');
            rdList.innerHTML = '';
            Object.keys(conf.categorias).forEach(k => {
                const cat = conf.categorias[k];
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `<img src="${pImg}${cat.imgCapa}"><span>${cat.nome}</span>`;
                card.onclick = () => { alert("Tema selecionado: " + cat.nome); closeMenus(); };
                rdList.appendChild(card);
            });
        }

        function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function openRDMenu(e) { e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('rdMenu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
        
        function startGame() {
            document.getElementById('scr-intro').classList.remove('active');
            document.getElementById('scr-game').classList.add('active');
            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('main-title').style.display = 'none';
            // Aqui entrará o motor da Sopa de Letras
        }

        window.onload = initUI;
    </script>
</body>
</html>
