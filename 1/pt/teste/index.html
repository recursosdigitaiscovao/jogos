<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Template 1 - Estrutura Base</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* ==========================================================================
           1. HEADER (Padding 10px das bordas do monitor)
           ========================================================================== */
        header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 10px; 
            flex-shrink: 0; 
            z-index: 1000;
        }
        
        .header-left, .header-right { 
            display: flex; 
            align-items: center; 
            min-width: 50px; 
        }
        .header-right { justify-content: flex-end; }

        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; }

        .header-center { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            color: var(--primary-blue); 
            font-weight: 900; 
        }
        .header-center img { width: 28px; height: 28px; }

        .title-desktop { display: inline; }
        .title-mobile { display: none; }

        @media (max-width: 480px) {
            .title-desktop { display: none; }
            .title-mobile { display: inline; font-size: 1.1rem; }
        }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 6px 12px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.75rem; box-shadow: 0 3px 0 #3d7db8;
        }

        /* ==========================================================================
           2. WRAPPER & CARD
           ========================================================================== */
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 0 10px 0 10px; /* Removido padding bottom para dar lugar ao footer */
            min-height: 0; 
            overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 1200px; 
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        .status { 
            height: 55px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 15px; 
        }

        .status-rd-trigger { 
            display: flex; 
            align-items: center; 
            background: rgba(255,255,255,0.4); 
            padding: 4px 10px; 
            border-radius: 15px; 
            box-shadow: var(--inner-shadow);
            cursor: pointer; 
            height: 38px;
        }
        .points-val { font-weight: 900; color: var(--primary-blue); font-size: 0.95rem; margin-right: 10px; }
        .status-rd-trigger img { height: 26px; }

        /* ==========================================================================
           3. ECRÃS
           ========================================================================== */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            min-height: 0; 
        }

        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        #game-area { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }

        /* ==========================================================================
           4. FOOTER
           ========================================================================== */
        footer {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8899aa;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* MENUS */
        .menu-dropdown, #rd-menu-container { 
            position: absolute; top: 55px; display: none; flex-direction: column; 
            gap: 8px; z-index: 2000; 
        }
        .menu-dropdown { left: 10px; }
        #rd-menu-container { right: 10px; }

        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px 18px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; color: inherit;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu('dropdownMenu', event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span class="title-desktop">Português - 1º Ano</span>
            <span class="title-mobile">1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ <span id="timer-label">00:00</span></div>
                <div id="dots-container" style="display:flex; gap:5px;"></div>
                <div class="status-rd-trigger" onclick="toggleMenu('rd-menu-container', event)">
                    <span id="points-label" class="points-val">0</span>
                    <img id="status-rd-img" src="">
                    <div id="rd-menu-container"></div>
                </div>
            </section>

            <div id="intro-overlay">
                <img id="intro-img" src="" style="height:15vh; max-height:100px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:20px;">Título do Jogo</h1>
                <button onclick="mostrarJogo()" style="padding:15px 40px; background:#2ecc71; color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; box-shadow: 0 5px 0 #27ae60;">JOGAR</button>
            </div>

            <main id="game-area">
                </main>
        </div>
    </div>

    <footer>2026</footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(menuId, e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById(menuId);
            const isVisible = menu.style.display === 'flex';
            document.querySelectorAll('.menu-dropdown, #rd-menu-container').forEach(m => m.style.display = 'none');
            if(!isVisible) menu.style.display = 'flex';
        }

        window.onclick = () => {
            document.querySelectorAll('.menu-dropdown, #rd-menu-container').forEach(m => m.style.display = 'none');
        };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
        }

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const icons = JOGO_CONFIG.iconesMenu;
                const pathI = JOGO_CONFIG.caminhoIcons;
                const pathImg = JOGO_CONFIG.caminhoImg;

                document.getElementById('header-icon').src = pathI + icons.ano1;
                document.getElementById('intro-img').src = pathI + icons.ano1;
                document.getElementById('status-rd-img').src = pathImg + "rd.png";
            }
        };
    </script>
</body>
</html>
