<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* --- HEADER ALINHADO --- */
        header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .nav-section { width: 120px; display: flex; align-items: center; }
        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }

        .header-title { 
            display: flex; align-items: center; gap: 8px; 
            color: var(--primary-blue); font-weight: 900; font-size: 1.1rem;
        }
        .header-title img { width: 28px; height: 28px; object-fit: contain; }

        .back-section { width: 120px; display: flex; justify-content: flex-end; }
        .btn-voltar {
            background-color: var(--primary-blue); color: white; padding: 5px 15px;
            border-radius: 15px; text-decoration: none; font-weight: 900; font-size: 0.75rem; 
            box-shadow: 0 3px 0 #3d7db8;
        }

        /* --- ÁREA DO JOGO --- */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 10px; }
        
        .game-card {
            background: var(--bg-page); width: 95%; max-width: 850px; height: 92%; 
            border-radius: 35px; box-shadow: var(--outer-shadow); padding: 15px 25px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- BARRA DE STATUS (NOVO) --- */
        .status-bar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 900;
            color: #555;
            font-size: 0.9rem;
        }

        .status-item { display: flex; align-items: center; gap: 8px; }
        
        .rounds-dots { display: flex; gap: 5px; }
        .dot { 
            width: 14px; height: 14px; border-radius: 50%; 
            background: var(--bg-page); box-shadow: var(--inner-shadow); 
        }
        .dot.active { background: #2ecc71; border: 2px solid white; box-shadow: none; }

        .rd-image { height: 30px; object-fit: contain; }

        /* --- CONTEÚDO DO JOGO --- */
        .target-box { text-align: center; margin-bottom: 10px; }
        .target-box img { height: 85px; margin-bottom: 5px; }
        .target-box h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; color: #333; }

        .grid-frame {
            background: var(--bg-page); padding: 12px; border-radius: 25px;
            box-shadow: var(--inner-shadow); display: grid; gap: 8px; margin: auto;
        }
        
        .cell {
            width: clamp(30px, 4vw, 42px); height: clamp(30px, 4vw, 42px); background: var(--bg-page); 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.1rem; box-shadow: 3px 3px 6px #c5d4e3, -3px -3px 6px #ffffff;
        }

        /* --- DROPDOWN --- */
        .menu-dropdown {
            position: absolute; top: 55px; left: 20px;
            display: none; flex-direction: column; gap: 6px; z-index: 1000;
        }
        .menu-dropdown.active { display: flex; }
        .menu-row-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px;
            background: var(--white); border-radius: 20px; box-shadow: 4px 4px 10px #c5d4e3; width: 170px;
        }
        .menu-row-item img { width: 22px; height: 22px; }
        .menu-row-item span { color: var(--primary-blue); font-weight: 800; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-section">
            <div class="hamburger-btn" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>

        <div class="header-title">
            <img id="header-icon" src="" alt="">
            <span>Português - 1º Ano</span>
        </div>

        <div class="back-section">
            <a href="#" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <main class="game-area">
        <div class="game-card">
            <div class="status-bar">
                <div class="status-item" id="timer">⏳ 00:00</div>
                
                <div class="rounds-dots" id="rounds">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

                <div class="status-item" id="points">0 PTS</div>
                
                <img id="img-rd" src="" alt="ronda" class="rd-image">
            </div>

            <div class="target-box">
                <img id="target-img" src="" alt="">
                <h2 id="target-word"></h2>
            </div>

            <div id="game-grid" class="grid-frame"></div>
        </div>
    </main>

    <script src="dados.js"></script>
    <script>
        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }

        function init() {
            const dropdown = document.getElementById('dropdownMenu');
            const icons = JOGO_CONFIG.iconesMenu;
            const pathIcons = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;

            // Configurar imagem rd.png no topo do card
            document.getElementById('img-rd').src = pathImg + "rd.png";

            // Gerar Dropdown
            const mapping = [
                { key: 'pre', label: 'Pré-Escolar' },
                { key: 'ano1', label: '1º Ano' },
                { key: 'ano2', label: '2º Ano' },
                { key: 'ano3', label: '3º Ano' },
                { key: 'ano4', label: '4º Ano' }
            ];

            mapping.forEach(item => {
                const row = document.createElement('div');
                row.className = 'menu-row-item';
                row.innerHTML = `<img src="${pathIcons}${icons[item.key]}"><span>${item.label}</span>`;
                dropdown.appendChild(row);
            });

            document.getElementById('header-icon').src = `${pathIcons}${icons.ano1}`;
            carregarPrimeiraPalavra();
        }

        function carregarPrimeiraPalavra() {
            const animal = JOGO_CONFIG.categorias.animais.itens[0]; // VACA
            document.getElementById('target-img').src = JOGO_CONFIG.caminhoImg + animal.img;
            document.getElementById('target-word').innerText = animal.nome;

            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            for(let i=0; i<64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                grid.appendChild(cell);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
