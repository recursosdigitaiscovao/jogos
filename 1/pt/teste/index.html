<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Sopa de Letras</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { 
            font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        .game-wrapper { 
            flex: 1; display: flex; justify-content: center; 
            padding: 5px 30px 15px 30px; min-height: 0; overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 900px; 
            height: 100%; border-radius: 35px; box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .status { 
            height: 50px; flex-shrink: 0; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 20px;
        }
        
        #dots-container { display: flex; gap: 8px; align-items: center; justify-content: center; }

        .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #cbd9e6; transition: all 0.3s ease;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); box-shadow: 0 0 8px var(--primary-blue); }
        .dot.completed { background: #a8d5ff; transform: scale(1); }

        .status-timer { font-weight: 700; color: #667788; min-width: 60px; }
        .status-right { display: flex; align-items: center; gap: 12px; min-width: 60px; justify-content: flex-end; }
        .rd-menu-btn { height: 24px; cursor: pointer; }

        main { 
            flex: 1; display: none; flex-direction: column; 
            align-items: center; justify-content: center; position: relative;
            width: 100%; height: 100%;
        }

        #intro-overlay {
            position: absolute; top: 0; left: 0; right: 0; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; padding-bottom: 20px;
        }
        .intro-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .intro-actions { display: flex; align-items: center; gap: 15px; width: 100%; padding: 0 25px; }
        .btn-jogar {
            flex: 1; padding: 15px; background: var(--primary-blue); 
            color: white; border: none; border-radius: 20px; 
            font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); 
            font-size: 1.1rem;
        }
        .rd-intro-btn { height: 50px; width: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .rd-intro-btn img { height: 40px; }

        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; }

        .menu-dropdown { 
            position: absolute; top: 60px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }

        .rd-panel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: white; z-index: 2500; border-radius: 35px 35px 0 0;
            padding: 25px 20px; display: flex; flex-direction: column; gap: 12px;
            transform: translateY(101%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .rd-panel.active { transform: translateY(0); box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }
        .rd-panel-header { width: 50px; height: 5px; background: #ccd6e0; border-radius: 10px; margin: -10px auto 15px auto; cursor: pointer;}

        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 220px; text-decoration: none; 
            color: #555; font-weight: 700; transition: all 0.2s ease;
        }
        .custom-menu-item:hover { background: var(--primary-blue); color: white; transform: translateY(-2px); }
        .custom-menu-item:hover span { color: white; }

        /* JOGO INTERNO */
        #word-container {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly; padding: 10px;
        }
        .image-hint { height: 100px; border-radius: 20px; }
        .word-slots { font-size: 1.8rem; font-weight: 900; color: var(--primary-blue); letter-spacing: 4px; }
        .grid-sopa {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
            background: #d0e0f0; padding: 10px; border-radius: 20px;
        }
        .letter-cell {
            width: 38px; height: 38px; background: white;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; font-size: 1.2rem;
            color: #445566; cursor: pointer; box-shadow: 0 3px 0 #cbd9e6;
        }
        .letter-cell.selected { background: var(--primary-blue); color: white; box-shadow: none; transform: translateY(2px); }
        .letter-cell.found { background: #7ed321; color: white; box-shadow: none; }

        @media (max-width: 450px) { 
            .letter-cell { width: 32px; height: 32px; font-size: 1rem; }
            .image-hint { height: 75px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMainMenu(event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            <section class="status">
                <div class="status-timer">⏳ <span id="timer-txt">00:00</span></div>
                <div id="dots-container"></div>
                <div class="status-right">
                    <div style="font-weight: 900; color: var(--primary-blue);"><span id="points-label">0</span></div>
                    <img id="status-rd-img" class="rd-menu-btn" src="" alt="RD" onclick="toggleRDMenu(event)">
                </div>
            </section>

            <div id="intro-overlay">
                <div class="intro-content">
                    <img id="intro-img" src="" style="height:80px; margin-bottom:20px;">
                    <h1 id="intro-titulo" style="color:var(--primary-blue); font-weight:900;">Sopa de Letras</h1>
                    <p style="color:#667788; font-weight:700;">Encontra as palavras!</p>
                </div>
                <div class="intro-actions">
                    <button onclick="mostrarJogo()" class="btn-jogar">JOGAR</button>
                    <div class="rd-intro-btn" onclick="toggleRDMenu(event)">
                        <img id="intro-rd-img" src="" alt="RD">
                    </div>
                </div>
            </div>

            <div id="rdDropdownMenu" class="rd-panel">
                <div class="rd-panel-header" onclick="toggleRDMenu(event)"></div>
            </div>

            <main id="game-area">
                <div id="word-container">
                    <img id="game-image" class="image-hint" src="">
                    <div id="game-slots" class="word-slots"></div>
                    <div id="game-grid" class="grid-sopa"></div>
                </div>
            </main>
        </div>
    </div>

    <footer id="main-footer">2026</footer>

    <script src="dados.js"></script>
    <script>
        let roundAtual = 1;
        const totalRondas = 5;
        let pontos = 0;
        let segundos = 0;
        let cronometro;
        let palavraAlvo = "";
        let selecaoAtual = [];
        let listaJogo = [];
        let categoriaAtual = 'animais';
        let nivelAtual = 1; // 1: Nome visível, 2: Traços

        function atualizarProgressao(total, atual) {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i < atual ? ' completed' : (i === atual ? ' active' : ''));
                container.appendChild(dot);
            }
        }

        function toggleMainMenu(e) {
            if(e) e.stopPropagation();
            closeRDMenu();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleRDMenu(e) {
            if(e) e.stopPropagation();
            document.getElementById('dropdownMenu').style.display = 'none';
            document.getElementById('rdDropdownMenu').classList.toggle('active');
        }

        function closeRDMenu() { document.getElementById('rdDropdownMenu').classList.remove('active'); }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
            closeRDMenu();
        };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            pontos = 0;
            roundAtual = 1;
            segundos = 0;
            document.getElementById('points-label').innerText = "0";
            
            const itensCat = JOGO_CONFIG.categorias[categoriaAtual].itens;
            listaJogo = [...itensCat].sort(() => 0.5 - Math.random()).slice(0, 5);

            if(!cronometro) iniciarCronometro();
            carregarRonda();
        }

        function iniciarCronometro() {
            cronometro = setInterval(() => {
                segundos++;
                let m = Math.floor(segundos / 60).toString().padStart(2, '0');
                let s = (segundos % 60).toString().padStart(2, '0');
                document.getElementById('timer-txt').innerText = `${m}:${s}`;
            }, 1000);
        }

        function carregarRonda() {
            if (roundAtual > totalRondas) {
                finalizarJogo();
                return;
            }
            atualizarProgressao(totalRondas, roundAtual);
            const item = listaJogo[roundAtual - 1];
            palavraAlvo = item.nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            document.getElementById('game-image').src = JOGO_CONFIG.caminhoImg + item.img;
            
            // LÓGICA DE NÍVEIS
            if(nivelAtual === 1) {
                document.getElementById('game-slots').innerText = item.nome.toUpperCase();
            } else {
                document.getElementById('game-slots').innerText = "_ ".repeat(palavraAlvo.length);
            }
            
            criarGrelha(palavraAlvo);
            selecaoAtual = [];
        }

        function criarGrelha(palavra) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const size = 8;
            let cells = Array(size * size).fill('');
            const horizontal = Math.random() > 0.5;
            const startPos = horizontal 
                ? Math.floor(Math.random() * size) * size + Math.floor(Math.random() * (size - palavra.length))
                : Math.floor(Math.random() * (size - palavra.length)) * size + Math.floor(Math.random() * size);

            for (let i = 0; i < palavra.length; i++) {
                const pos = horizontal ? startPos + i : startPos + (i * size);
                cells[pos] = palavra[i];
            }

            const letras = "ABCDEFGJKLMNOPQRSTUVXYZ";
            cells = cells.map(c => c === '' ? letras[Math.floor(Math.random() * letras.length)] : c);

            cells.forEach(letra => {
                const div = document.createElement('div');
                div.className = 'letter-cell';
                div.innerText = letra;
                div.onclick = () => {
                    if (div.classList.contains('found')) return;
                    div.classList.toggle('selected');
                    if(div.classList.contains('selected')) selecaoAtual.push(div);
                    else selecaoAtual = selecaoAtual.filter(d => d !== div);
                    
                    if(selecaoAtual.map(d => d.innerText).join('') === palavraAlvo) {
                        selecaoAtual.forEach(d => { d.classList.remove('selected'); d.classList.add('found'); });
                        pontos += 10;
                        document.getElementById('points-label').innerText = pontos;
                        document.getElementById('game-slots').innerText = itemNomeOriginal(palavraAlvo);
                        setTimeout(() => { roundAtual++; carregarRonda(); }, 800);
                    }
                };
                grid.appendChild(div);
            });
        }

        function itemNomeOriginal(limpo) {
            return listaJogo[roundAtual-1].nome.toUpperCase();
        }

        function finalizarJogo() {
            const main = document.getElementById('game-area');
            main.innerHTML = `
                <div style="text-align:center;">
                    <h2 style="color:var(--primary-blue); font-size:2.2rem; margin-bottom:15px;">MUITO BEM!</h2>
                    <p style="font-weight:700; color:#555; margin-bottom:30px; font-size:1.2rem;">Concluíste o nível!</p>
                    <button onclick="location.reload()" class="btn-jogar">REPETIR</button>
                </div>
            `;
        }

        function mudarCategoria(cat, nivel) {
            categoriaAtual = cat;
            nivelAtual = nivel;
            document.getElementById('intro-titulo').innerText = JOGO_CONFIG.categorias[cat].nome + " N" + nivel;
            closeRDMenu();
            // Se já estiver no jogo, reinicia
            if(document.getElementById('game-area').style.display === 'flex') mostrarJogo();
        }

        window.onload = () => {
            const pathI = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;
            const icons = JOGO_CONFIG.iconesMenu;
            
            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('intro-img').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = pathImg + "rd.png";
            document.getElementById('intro-rd-img').src = pathImg + "rd.png";

            // Menu Hambúrguer
            const menuBox = document.getElementById('dropdownMenu');
            const menuItems = [
                { k: 'home', l: 'Início' }, { k: 'pre', l: 'Pré' }, { k: 'ano1', l: '1º Ano' },
                { k: 'ano2', l: '2º Ano' }, { k: 'ano3', l: '3º Ano' }, { k: 'ano4', l: '4º Ano' }
            ];
            menuItems.forEach(item => {
                const a = document.createElement('a');
                a.className = 'custom-menu-item';
                a.href = JOGO_CONFIG.links[item.k];
                a.innerHTML = `<img src="${pathI}${icons[item.k]}" style="height:20px;"><span>${item.l}</span>`;
                menuBox.appendChild(a);
            });

            // Menu RD (Categorias e Níveis)
            const rdBox = document.getElementById('rdDropdownMenu');
            Object.keys(JOGO_CONFIG.categorias).forEach(key => {
                const cat = JOGO_CONFIG.categorias[key];
                [1, 2].forEach(nivel => {
                    const div = document.createElement('div');
                    div.className = 'custom-menu-item';
                    div.innerHTML = `<img src="${pathImg}${cat.imgCapa}" style="height:22px; width:22px; object-fit:cover; border-radius:5px;"><span>${cat.nome} (Nív. ${nivel})</span>`;
                    div.onclick = () => mudarCategoria(key, nivel);
                    rdBox.appendChild(div);
                });
            });

            atualizarProgressao(5, 0);
        };
    </script>
</body>
</html>
