<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Sopa de Letras</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 8px; }
        .header-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem; }
        .header-center img { height: 30px; }
        .btn-voltar { background: var(--primary-blue); color: white; padding: 8px 16px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark); }

        .game-wrapper { flex: 1; display: flex; justify-content: center; padding: 5px 30px 15px 30px; overflow: hidden; }
        .game-card { background: var(--bg-page); width: 100%; max-width: 900px; height: 100%; border-radius: 35px; box-shadow: var(--outer-shadow); display: flex; flex-direction: column; position: relative; overflow: hidden; }

        .status { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        #dots-container { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd9e6; }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }
        .dot.completed { background: #a8d5ff; }

        .status-timer { font-weight: 700; color: #667788; min-width: 60px; }
        .rd-menu-btn { height: 24px; cursor: pointer; }

        main { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; }

        /* TUTORIAL ANIMATION */
        .tutorial-box { position: relative; width: 120px; height: 120px; background: #d0e0f0; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .hand-icon { position: absolute; font-size: 30px; color: #f1c40f; animation: dragHand 2s infinite; }
        @keyframes dragHand {
            0% { transform: translate(-30px, 0); opacity: 0; }
            20% { opacity: 1; }
            80% { transform: translate(30px, 0); opacity: 1; }
            100% { transform: translate(30px, 0); opacity: 0; }
        }

        #intro-overlay { position: absolute; top: 0; left: 0; right: 0; height: 100%; background: var(--bg-page); z-index: 100; display: flex; flex-direction: column; align-items: center; }
        .intro-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-jogar { width: 200px; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); font-size: 1.1rem; }

        .menu-dropdown, .rd-panel { position: absolute; z-index: 2000; display: none; flex-direction: column; gap: 8px; }
        .menu-dropdown { top: 60px; left: 20px; }
        .rd-panel { bottom: 0; left: 0; width: 100%; background: white; border-radius: 35px 35px 0 0; padding: 25px 20px; transform: translateY(101%); transition: 0.4s; display: flex; }
        .rd-panel.active { transform: translateY(0); box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }
        
        .custom-menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; cursor: pointer; text-decoration: none; color: #555; font-weight: 700; }
        .custom-menu-item:hover { background: var(--primary-blue); color: white; }
        .custom-menu-item:hover span { color: white; }

        /* GRID SOPA */
        #game-container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; }
        .word-slots { font-size: 1.8rem; font-weight: 900; color: var(--primary-blue); letter-spacing: 4px; height: 40px; }
        .grid-sopa { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; background: #d0e0f0; padding: 10px; border-radius: 20px; touch-action: none; position: relative; }
        .letter-cell { width: 38px; height: 38px; background: white; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; font-size: 1.2rem; color: #445566; box-shadow: 0 3px 0 #cbd9e6; pointer-events: none; }
        .letter-cell.highlight { background: var(--primary-blue); color: white; }
        .letter-cell.found { background: #7ed321; color: white; box-shadow: none; }

        @media (max-width: 450px) { .letter-cell { width: 33px; height: 33px; font-size: 1rem; } }
    </style>
</head>
<body>

    <header>
        <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleMainMenu(event)"></i><div class="menu-dropdown" id="dropdownMenu"></div></div>
        <div class="header-center"><img id="header-icon" src=""><span>1º Ano</span></div>
        <div class="header-right"><a href="../index.html" class="btn-voltar">VOLTAR</a></div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            <section class="status">
                <div class="status-timer">⏳ <span id="timer-txt">00:00</span></div>
                <div id="dots-container"></div>
                <div class="status-right"><img id="status-rd-img" class="rd-menu-btn" onclick="toggleRDMenu(event)"></div>
            </section>

            <div id="intro-overlay">
                <div class="intro-content">
                    <div class="tutorial-box"><i class="fas fa-hand-pointer hand-icon"></i><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px;"><div class="letter-cell" style="width:25px;height:25px;font-size:0.6rem">A</div><div class="letter-cell" style="width:25px;height:25px;font-size:0.6rem">B</div><div class="letter-cell" style="width:25px;height:25px;font-size:0.6rem">C</div></div></div>
                    <h1 id="intro-titulo" style="color:var(--primary-blue); font-weight:900; margin-bottom:20px;">Sopa de Letras</h1>
                    <button onclick="mostrarJogo()" class="btn-jogar">JOGAR</button>
                </div>
            </div>

            <div id="rdDropdownMenu" class="rd-panel"><div style="width:50px; height:5px; background:#ccd6e0; border-radius:10px; margin:-10px auto 15px auto;"></div></div>

            <main id="game-area">
                <div id="game-container">
                    <img id="game-image" style="height:100px; border-radius:20px;">
                    <div id="game-slots" class="word-slots"></div>
                    <div id="game-grid" class="grid-sopa"></div>
                </div>
            </main>
        </div>
    </div>

    <footer id="main-footer">2026</footer>

    <script src="dados.js"></script>
    <script>
        let roundAtual = 1;
        const totalRondas = 10;
        let segundos = 0;
        let cronometro;
        let palavraAlvo = "";
        let listaJogo = [];
        let categoriaAtual = 'animais';
        
        // Drag logic variables
        let isDragging = false;
        let startCellIdx = null;
        let currentCells = [];

        function atualizarProgressao(total, atual) {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i < atual ? ' completed' : (i === atual ? ' active' : ''));
                container.appendChild(dot);
            }
        }

        function toggleMainMenu(e) { if(e) e.stopPropagation(); closeRDMenu(); const m = document.getElementById('dropdownMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function toggleRDMenu(e) { if(e) e.stopPropagation(); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('rdDropdownMenu').classList.toggle('active'); }
        function closeRDMenu() { document.getElementById('rdDropdownMenu').classList.remove('active'); }
        window.onclick = () => { document.getElementById('dropdownMenu').style.display = 'none'; closeRDMenu(); };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            roundAtual = 1; segundos = 0;
            
            // Gerar 10 itens (5 para Nivel 1, 5 para Nivel 2)
            const itensCat = [...JOGO_CONFIG.categorias[categoriaAtual].itens];
            listaJogo = itensCat.sort(() => 0.5 - Math.random()).slice(0, 5);
            listaJogo = [...listaJogo, ...[...itensCat].sort(() => 0.5 - Math.random()).slice(0, 5)];

            if(!cronometro) cronometro = setInterval(() => {
                segundos++;
                document.getElementById('timer-txt').innerText = `${Math.floor(segundos/60).toString().padStart(2,'0')}:${(segundos%60).toString().padStart(2,'0')}`;
            }, 1000);
            carregarRonda();
        }

        function carregarRonda() {
            if (roundAtual > totalRondas) { finalizarJogo(); return; }
            atualizarProgressao(totalRondas, roundAtual);
            const item = listaJogo[roundAtual - 1];
            palavraAlvo = item.nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/Ç/g, "C");
            
            document.getElementById('game-image').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('game-slots').innerText = (roundAtual <= 5) ? item.nome.toUpperCase() : "_ ".repeat(palavraAlvo.length);
            
            criarGrelha(palavraAlvo);
        }

        function criarGrelha(palavra) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const size = 8;
            let cells = Array(size * size).fill('');
            const horizontal = Math.random() > 0.5;
            const startPos = horizontal 
                ? Math.floor(Math.random() * size) * size + Math.floor(Math.random() * (size - palavra.length))
                : Math.floor(Math.random() * (size - palavra.length)) * size + Math.floor(Math.random() * size);

            for (let i = 0; i < palavra.length; i++) {
                cells[horizontal ? startPos + i : startPos + (i * size)] = palavra[i];
            }

            const abc = "ABCDEFGJKLMNOPQRSTUVXYZ";
            cells.forEach((letra, idx) => {
                const div = document.createElement('div');
                div.className = 'letter-cell';
                div.innerText = letra || abc[Math.floor(Math.random()*abc.length)];
                div.dataset.index = idx;
                grid.appendChild(div);
            });

            // Handlers para Seleção por Arrasto
            grid.onmousedown = grid.ontouchstart = (e) => startDrag(e);
            window.onmousemove = window.ontouchmove = (e) => doDrag(e);
            window.onmouseup = window.ontouchend = () => endDrag();
        }

        function getIdx(e) {
            const touch = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            return el && el.classList.contains('letter-cell') ? parseInt(el.dataset.index) : null;
        }

        function startDrag(e) {
            const idx = getIdx(e);
            if (idx !== null) { isDragging = true; startCellIdx = idx; currentCells = [idx]; updateHighlight(); }
        }

        function doDrag(e) {
            if (!isDragging) return;
            const idx = getIdx(e);
            if (idx !== null && !currentCells.includes(idx)) {
                currentCells.push(idx);
                updateHighlight();
            }
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            const tentativa = currentCells.map(i => document.querySelector(`[data-index="${i}"]`).innerText).join('');
            if (tentativa === palavraAlvo) {
                currentCells.forEach(i => document.querySelector(`[data-index="${i}"]`).classList.add('found'));
                document.getElementById('game-slots').innerText = listaJogo[roundAtual-1].nome.toUpperCase();
                setTimeout(() => { roundAtual++; carregarRonda(); }, 800);
            } else {
                document.querySelectorAll('.letter-cell').forEach(c => c.classList.remove('highlight'));
            }
            currentCells = [];
        }

        function updateHighlight() {
            document.querySelectorAll('.letter-cell').forEach(c => c.classList.remove('highlight'));
            currentCells.forEach(i => document.querySelector(`[data-index="${i}"]`).classList.add('highlight'));
        }

        function finalizarJogo() {
            clearInterval(cronometro);
            document.getElementById('game-area').innerHTML = `<div style="text-align:center;"><h2 style="color:var(--primary-blue); font-size:2.2rem; margin-bottom:15px;">MUITO BEM!</h2><p style="font-weight:700; color:#555; margin-bottom:30px;">Completaste as 10 rondas em ${document.getElementById('timer-txt').innerText}!</p><button onclick="location.reload()" class="btn-jogar">REPETIR</button></div>`;
        }

        function mudarCategoria(cat) {
            categoriaAtual = cat;
            document.getElementById('intro-titulo').innerText = "Sopa de: " + JOGO_CONFIG.categorias[cat].nome;
            closeRDMenu();
            if(document.getElementById('game-area').style.display === 'flex') mostrarJogo();
        }

        window.onload = () => {
            const pathI = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;
            const icons = JOGO_CONFIG.iconesMenu;
            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = pathImg + "rd.png";

            // Menu Hambúrguer
            const menuBox = document.getElementById('dropdownMenu');
            [{k:'home',l:'Início'},{k:'pre',l:'Pré'},{k:'ano1',l:'1º Ano'},{k:'ano2',l:'2º Ano'},{k:'ano3',l:'3º Ano'},{k:'ano4',l:'4º Ano'}].forEach(item => {
                const a = document.createElement('a'); a.className = 'custom-menu-item'; a.href = JOGO_CONFIG.links[item.k];
                a.innerHTML = `<img src="${pathI}${icons[item.k]}" style="height:20px;"><span>${item.l}</span>`;
                menuBox.appendChild(a);
            });

            // Menu RD
            const rdBox = document.getElementById('rdDropdownMenu');
            Object.keys(JOGO_CONFIG.categorias).forEach(key => {
                const cat = JOGO_CONFIG.categorias[key];
                const div = document.createElement('div'); div.className = 'custom-menu-item';
                div.innerHTML = `<img src="${pathImg}${cat.imgCapa}" style="height:22px; width:22px; object-fit:cover; border-radius:5px;"><span>${cat.nome}</span>`;
                div.onclick = () => mudarCategoria(key);
                rdBox.appendChild(div);
            });
            atualizarProgressao(10, 0);
        };
    </script>
</body>
</html>
