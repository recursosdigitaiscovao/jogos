<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --highlight-green: #7ed321;
            --error-red: #ff5e5e;
            --white: #ffffff;
            --text-grey: #5d7082;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: #f0f7ff; z-index: 1000; flex-shrink: 0;
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4); position: relative;
        }
        
        .logo-center { 
            display: flex; align-items: center; gap: 10px; 
            position: absolute; left: 50%; transform: translateX(-50%); 
            pointer-events: none; white-space: nowrap;
        }
        .logo-center img { height: 50px; }
        .logo-text h1 { font-size: 18px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 10px; color: #88a; font-weight: 700; }

        /* MENU HAMBURGUER */
        .menu-dropdown { position: absolute; top: 65px; left: 20px; display: none; flex-direction: column; gap: 8px; z-index: 2000; }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 18px; 
            background: white; border-radius: 15px; border: none;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.1); cursor: pointer; 
            min-width: 210px; text-decoration: none; color: var(--text-grey); 
            font-weight: 700; transition: background 0.2s ease;
        }
        /* Hover: Apenas o fundo muda para azul, texto e imagem mantêm a cor */
        .menu-item:hover { background: var(--primary-blue); }

        /* Item Voltar no Menu: Estilo Específico */
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }
        .menu-item-voltar:hover { background: white !important; color: var(--primary-blue) !important; }
        .menu-item-voltar:hover img { filter: none; }

        .menu-divider { height: 1px; background-color: rgba(0,0,0,0.05); margin: 2px 10px; }

        /* BOTÃO VOLTAR HEADER */
        .btn-voltar-header { 
            background: var(--primary-blue); color: white; padding: 8px 18px; border-radius: 14px; 
            text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; 
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* CARD PRINCIPAL */
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { 
            background: #f0f7ff; width: 100%; max-width: 1000px; height: 100%; 
            max-height: calc(100dvh - 130px); border-radius: 40px; 
            box-shadow: 0 15px 35px rgba(176,196,217,0.5); 
            display: flex; flex-direction: column; padding: 20px; 
            position: relative;
        }

        /* STATUS BAR (COM 5 RONDAS) */
        .status-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-shrink: 0; }
        .dots-container { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #d0e0f0; transition: 0.3s; }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }
        .dot.done { background: var(--primary-blue); }

        .screen { flex: 1; display: none; width: 100%; min-height: 0; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        /* POSICIONAMENTO BOTÕES FUNDO (5px) */
        .action-container { 
            position: absolute; 
            bottom: 5px; 
            left: 20px; 
            right: 20px;
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding-bottom: 5px;
        }
        .btn-jogar-stretch { 
            flex: 1; 
            background: var(--primary-blue); color: white; border: none; border-radius: 20px; 
            padding: 16px; font-size: 22px; font-weight: 900; cursor: pointer; 
            box-shadow: 0 6px 0 var(--primary-dark); transition: 0.1s;
        }
        .btn-jogar-stretch:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--primary-dark); }

        /* SOPA DE LETRAS GRELHA */
        .sopa-layout { display: flex; gap: 20px; flex: 1; min-height: 0; align-items: center; justify-content: center; padding-bottom: 75px; width: 100%; }
        .sopa-grid { background: white; border-radius: 20px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: grid; gap: 5px; }

        /* RESULTADOS */
        #scr-result .btn-jogar-stretch { margin-bottom: 10px; padding: 12px; font-size: 18px; }

        /* OUTROS */
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2100; padding: 20px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 1500; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; color: #89a; font-size: 12px; font-weight: 700; }

        @media (max-width: 650px) {
            .btn-voltar-header { display: none; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenus()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" style="font-size:30px; color:var(--primary-blue); cursor:pointer;" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="">
            <div class="logo-text">
                <h1 id="tit-l1"></h1>
                <h1 id="tit-l2"></h1>
                <p id="sub-tit"></p>
            </div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar" class="btn-voltar-header">
                <img id="header-back-icon" src="" width="20">
                VOLTAR
            </a>
        </div>
    </header>

    <div class="game-container">
        <div class="game-card" id="gameCard">
            
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:var(--text-grey); min-width:80px;">⏳ 00:00</div>
                <div class="dots-container" id="dots">
                    <!-- 5 Rondas -->
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:10px; min-width:80px; justify-content:flex-end;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:28px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <h2 id="main-title" style="text-align:center; color:var(--primary-blue); font-weight:900; font-size:26px; margin-bottom:10px;">SOPA DE LETRAS</h2>

            <!-- ECRÃ 1: INTRO / ANIMAÇÃO -->
            <div class="screen active" id="scr-intro" style="justify-content:center;">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding-bottom: 80px;">
                    <div id="intro-animation" style="background:white; padding:40px; border-radius:30px; border:4px dashed var(--primary-blue); position:relative;">
                        <i class="fas fa-search" style="font-size:70px; color:var(--primary-blue); animation: moveSearch 3s infinite ease-in-out;"></i>
                    </div>
                    <p id="intro-instr" style="font-weight:800; color:var(--text-grey); text-align:center; max-width:320px; font-size:1.1rem;"></p>
                </div>
                
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="startGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" style="height:60px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <!-- ECRÃ 2: JOGO -->
            <div class="screen" id="scr-game">
                <div class="sopa-layout">
                    <div id="grid-container" class="sopa-grid"></div>
                    <div id="words-list" style="display:flex; flex-direction:column; gap:10px; max-height:100%; overflow-y:auto;">
                        <!-- Imagens das palavras a encontrar -->
                    </div>
                </div>
            </div>

            <!-- ECRÃ 3: RESULTADOS -->
            <div class="screen" id="scr-result" style="justify-content:center;">
                <img id="res-taca" style="width:140px; margin-bottom:15px;" src="">
                <h2 id="res-tit" style="font-size:30px; color: var(--primary-blue); font-weight:900; margin-bottom:20px;"></h2>
                
                <div style="display:flex; gap:15px; margin-bottom:30px;">
                    <div style="background:white; padding:15px 25px; border-radius:20px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                        <span id="res-pts" style="font-size:24px; font-weight:900; color:var(--primary-blue);">0</span><br><small style="font-weight:800; color:#89a;">PONTOS</small>
                    </div>
                    <div style="background:white; padding:15px 25px; border-radius:20px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                        <span id="res-tim" style="font-size:24px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small style="font-weight:800; color:#89a;">TEMPO</small>
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:350px;">
                    <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                    <button class="btn-jogar-stretch" style="background:white; color:var(--primary-blue); border:2px solid var(--primary-blue); box-shadow:none;" onclick="openRDMenu(event)">JOGAR OUTRA CATEGORIA</button>
                    <button class="btn-jogar-stretch" style="background:#cbd9e6; color:#445; box-shadow:none;" id="btn-outro-jogo">ESCOLHER OUTRO JOGO</button>
                </div>
            </div>

        </div>
    </div>

    <footer id="mainFooter"></footer>

    <div id="rdMenu" class="rd-panel">
        <div style="width:50px; height:5px; background:#eee; border-radius:10px; margin: 0 auto 20px;" onclick="closeMenus()"></div>
        <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:20px;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <style>
        @keyframes moveSearch {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            25% { transform: translate(15px, -15px) rotate(10deg); }
            50% { transform: translate(-15px, 15px) rotate(-10deg); }
            75% { transform: translate(15px, 15px) rotate(5deg); }
        }
    </style>

    <script src="dados.js"></script>
    <script>
        function initUI() {
            const conf = JOGO_CONFIG;
            const pI = conf.caminhoIcons;
            const pImg = conf.caminhoImg;

            document.getElementById('head-logo').src = pI + conf.iconesMenu.ano1;
            document.getElementById('header-back-icon').src = pI + "voltar.png";
            document.getElementById('tit-l1').innerText = conf.textos.tituloLinha1;
            document.getElementById('tit-l2').innerText = conf.textos.tituloLinha2;
            document.getElementById('sub-tit').innerText = conf.textos.subtitulo;
            document.getElementById('intro-instr').innerText = conf.textos.instrucao;
            document.getElementById('mainFooter').innerHTML = conf.textos.rodape;
            document.getElementById('rd-game-btn').src = pImg + "rd.png";
            document.getElementById('rd-intro-btn').src = pImg + "rd.png";
            document.getElementById('btn-outro-jogo').onclick = () => window.location.href = conf.linkVoltar;
            document.getElementById('link-voltar').href = conf.linkVoltar;

            // Menu Hambúrguer
            const menuBox = document.getElementById('dropdownMenu');
            menuBox.innerHTML = '';
            ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
                const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
                a.innerHTML = `<img src="${pI}${conf.iconesMenu[k]}"><span>${k==='home'?'Início':k.replace('ano',' ')+'º Ano'}</span>`;
                menuBox.appendChild(a);
            });
            const div = document.createElement('div'); div.className = 'menu-divider'; menuBox.appendChild(div);
            const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = conf.linkVoltar;
            btnV.innerHTML = `<img src="${pI}voltar.png"><span>${conf.textoVoltar}</span>`;
            menuBox.appendChild(btnV);

            // Categorias RD
            const rdList = document.getElementById('rd-list');
            Object.keys(conf.categorias).forEach(k => {
                const cat = conf.categorias[k];
                const card = document.createElement('div');
                card.style.cssText = "background:#f8fbff; border-radius:20px; padding:15px; text-align:center; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.05);";
                card.innerHTML = `<img src="${pImg}${cat.imgCapa}" style="width:50px; height:50px; margin-bottom:10px;"><br><span style="font-weight:800; font-size:14px; color:var(--text-grey);">${cat.nome}</span>`;
                card.onclick = () => closeMenus();
                rdList.appendChild(card);
            });
        }

        function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function openRDMenu(e) { e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeMenus() { document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('rdMenu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }

        function startGame() {
            document.getElementById('scr-intro').classList.remove('active');
            document.getElementById('scr-game').classList.add('active');
            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('main-title').style.display = 'none';
        }

        window.onload = initUI;
    </script>
</body>
</html>
