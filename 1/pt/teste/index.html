<header>
    <div class="header-left">
        <i class="fas fa-bars hamburger-btn" onclick="toggleMainMenu(event)"></i>
        <div class="menu-dropdown" id="dropdownMenu"></div>
    </div>
    <div class="header-center">
        <img id="header-icon" src="" alt="">
        <span>1º Ano</span>
    </div>
    <div class="header-right">
        <a href="../index.html" class="btn-voltar">VOLTAR</a>
    </div>
</header>

<div class="game-wrapper">
    <div class="game-card">
        
        <section class="status">
            <div class="status-timer">⏳ 00:00</div>
            <div id="dots-container" style="display:flex; gap:5px;"></div>
            <div class="status-right">
                <div style="font-weight: 900; color: var(--primary-blue);"><span id="points-label">0</span></div>
                <img id="status-rd-img" class="rd-menu-btn" src="" alt="RD" onclick="toggleRDMenu(event)">
            </div>
        </section>

        <div id="intro-overlay">
            <div class="intro-content">
                <img id="intro-img" src="" style="height:80px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:25px;">Título do Jogo</h1>
            </div>
            
            <div class="intro-actions">
                <button onclick="mostrarJogo()" class="btn-jogar">JOGAR</button>
                <div class="rd-intro-btn" onclick="toggleRDMenu(event)">
                    <img id="intro-rd-img" src="" alt="RD">
                </div>
            </div>
        </div>

        <!-- PAINEL RD (EXPANDE PARA CIMA) -->
        <div id="rdDropdownMenu" class="rd-panel">
            <div class="rd-panel-header" onclick="toggleRDMenu(event)"></div>
            <!-- Categorias inseridas via JS -->
        </div>

        <main id="game-area"></main>
    </div>
</div>

<footer id="main-footer">2026</footer>

<script src="dados.js"></script>
<script>
    function toggleMainMenu(e) {
        if(e) e.stopPropagation();
        closeRDMenu();
        const menu = document.getElementById('dropdownMenu');
        menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
    }

    function toggleRDMenu(e) {
        if(e) e.stopPropagation();
        // Fecha menu lateral se estiver aberto
        document.getElementById('dropdownMenu').style.display = 'none';
        
        const rdPanel = document.getElementById('rdDropdownMenu');
        rdPanel.classList.toggle('active');
    }

    function closeRDMenu() {
        document.getElementById('rdDropdownMenu').classList.remove('active');
    }

    window.onclick = () => {
        document.getElementById('dropdownMenu').style.display = 'none';
        closeRDMenu();
    };

    function mostrarJogo() {
        document.getElementById('intro-overlay').style.display = 'none';
        document.getElementById('main-footer').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
    }

    window.onload = () => {
        if (typeof JOGO_CONFIG !== 'undefined') {
            const pathI = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;
            const icons = JOGO_CONFIG.iconesMenu;
            
            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('intro-img').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = pathImg + "rd.png";
            document.getElementById('intro-rd-img').src = pathImg + "rd.png";

            const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
            const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];
            const menuBox = document.getElementById('dropdownMenu');
            
            menuKeys.forEach((key, i) => {
                const a = document.createElement('a');
                a.className = 'custom-menu-item';
                a.href = JOGO_CONFIG.links[key];
                a.innerHTML = `<img src="${pathI}${icons[key]}" style="height:20px;"><span>${menuLabels[i]}</span>`;
                menuBox.appendChild(a);
            });

            const rdBox = document.getElementById('rdDropdownMenu');
            const niveis = ['Nível 1', 'Nível 2', 'Nível 3'];
            niveis.forEach(nv => {
                const div = document.createElement('div');
                div.className = 'custom-menu-item';
                div.innerHTML = `<span>${nv}</span>`;
                rdBox.appendChild(div);
            });
        }
    };
</script>
