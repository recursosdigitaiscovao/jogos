<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
            --selected: #ffcc00;
            --correct: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* --- HEADER (TÍTULO E ICON SEMPRE VISÍVEIS) --- */
        header {
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            flex-shrink: 0;
        }

        .header-left, .header-right { width: 120px; }
        .header-right { display: flex; justify-content: flex-end; }
        
        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }

        .header-center { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            color: var(--primary-blue); 
            font-weight: 900; 
            font-size: 1.1rem;
        }

        .header-center img { 
            width: 32px; 
            height: 32px; 
            object-fit: contain;
        }

        .btn-voltar {
            background-color: var(--primary-blue); 
            color: white; 
            padding: 6px 18px; 
            border-radius: 20px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.8rem; 
            box-shadow: 0 3px 0 #3d7db8;
        }

        /* --- STATUS BAR (ALINHAMENTO PRECISO) --- */
        .status-bar {
            width: 100%;
            display: grid;
            grid-template-columns: 100px 1fr 100px 50px; /* Colunas bem definidas */
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .timer-box { font-weight: 900; color: #555; font-size: 0.9rem; }
        .dots-box { display: flex; gap: 6px; justify-content: center; }
        .points-box { font-weight: 900; color: #555; font-size: 0.9rem; text-align: right; }
        .rd-box { display: flex; justify-content: flex-end; }
        .rd-box img { height: 35px; }

        .dot { 
            width: 15px; height: 15px; border-radius: 50%; 
            background: var(--bg-page); box-shadow: var(--inner-shadow); 
        }
        .dot.active { background: var(--correct); border: 2px solid white; box-shadow: none; }

        /* --- ÁREA DO JOGO --- */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 10px; }
        
        .game-card {
            background: var(--bg-page); width: 95%; max-width: 850px; height: 95%; 
            border-radius: 40px; box-shadow: var(--outer-shadow); padding: 20px 30px;
            display: flex; flex-direction: column; align-items: center;
        }

        .target-box { text-align: center; margin-bottom: 10px; }
        .target-box img { height: clamp(60px, 12vh, 90px); margin-bottom: 5px; }
        .target-box h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; color: #333; }

        /* --- GRADE --- */
        .grid-frame {
            background: var(--bg-page); padding: 12px; border-radius: 25px;
            box-shadow: var(--inner-shadow); display: grid; gap: 8px; margin: auto;
        }
        
        .cell {
            width: clamp(32px, 4.5vw, 45px); height: clamp(32px, 4.5vw, 45px);
            background: var(--bg-page); border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; font-size: 1.2rem; cursor: pointer;
            box-shadow: 4px 4px 8px #c5d4e3, -4px -4px 8px #ffffff;
            user-select: none; transition: 0.2s;
        }
        .cell.selected { background: var(--selected); color: white; transform: scale(0.9); }
        .cell.correct { background: var(--correct); color: white; box-shadow: none; }

        /* --- MENU DROPDOWN --- */
        .menu-dropdown {
            position: absolute; top: 60px; left: 20px;
            display: none; flex-direction: column; gap: 8px; z-index: 9999;
        }
        .menu-dropdown.active { display: flex; }
        .menu-row-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 15px;
            background: var(--white); border-radius: 25px; box-shadow: 4px 4px 10px #c5d4e3;
            width: 190px; cursor: pointer;
        }
        .menu-row-item img { width: 25px; height: 25px; }
        .menu-row-item span { color: var(--primary-blue); font-weight: 800; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu()"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>

        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span id="header-text">Português - 1º Ano</span>
        </div>

        <div class="header-right">
            <a href="#" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <main class="game-area">
        <div class="game-card">
            <div class="status-bar">
                <div class="timer-box">⏳ <span id="timer-display">00:00</span></div>
                <div class="dots-box" id="dots-container"></div>
                <div class="points-box"><span id="points-display">0</span> PTS</div>
                <div class="rd-box"><img id="img-rd" src=""></div>
            </div>

            <div class="target-box">
                <img id="target-img" src="" alt="">
                <h2 id="target-word"></h2>
            </div>

            <div id="game-grid" class="grid-frame"></div>
        </div>
    </main>

    <script src="dados.js"></script>
    <script>
        let currentRound = 0;
        let points = 0;
        let timerSeconds = 0;
        let selectedLetters = [];
        let wordToFind = "";

        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }

        function init() {
            const dropdown = document.getElementById('dropdownMenu');
            const icons = JOGO_CONFIG.iconesMenu;
            const pathIcons = JOGO_CONFIG.caminhoIcons;

            // Header e RD
            document.getElementById('header-icon').src = pathIcons + icons.ano1;
            document.getElementById('img-rd').src = JOGO_CONFIG.caminhoImg + "rd.png";

            // Menu
            const anos = [{k:'pre', l:'Pré-Escolar'}, {k:'ano1', l:'1º Ano'}, {k:'ano2', l:'2º Ano'}, {k:'ano3', l:'3º Ano'}, {k:'ano4', l:'4º Ano'}];
            anos.forEach(a => {
                const div = document.createElement('div');
                div.className = 'menu-row-item';
                div.innerHTML = `<img src="${pathIcons}${icons[a.k]}"><span>${a.l}</span>`;
                dropdown.appendChild(div);
            });

            startTimer();
            loadRound();
        }

        function startTimer() {
            setInterval(() => {
                timerSeconds++;
                const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
                const s = (timerSeconds%60).toString().padStart(2,'0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }, 1000);
        }

        function loadRound() {
            // Atualizar Bolas
            const dots = document.getElementById('dots-container');
            dots.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = i <= currentRound ? 'dot active' : 'dot';
                dots.appendChild(d);
            }

            // Pegar palavra
            const itens = JOGO_CONFIG.categorias.animais.itens;
            const item = itens[currentRound % itens.length];
            wordToFind = item.nome.toUpperCase();
            
            document.getElementById('target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('target-word').innerText = wordToFind;

            generateGrid(wordToFind);
        }

        function generateGrid(word) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            
            let cells = Array(64).fill('');
            const startIdx = Math.floor(Math.random() * (64 - word.length));
            
            // Colocar palavra
            for(let i=0; i<word.length; i++) cells[startIdx + i] = word[i];
            
            // Preencher resto
            const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            cells = cells.map(c => c === '' ? abc[Math.floor(Math.random()*26)] : c);

            cells.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = l;
                div.onclick = () => {
                    if(div.classList.contains('correct')) return;
                    div.classList.toggle('selected');
                    updateSelection(div, l);
                };
                grid.appendChild(div);
            });
        }

        function updateSelection(el, letter) {
            if(el.classList.contains('selected')) {
                selectedLetters.push({el, letter});
            } else {
                selectedLetters = selectedLetters.filter(x => x.el !== el);
            }
            
            const formed = selectedLetters.map(x => x.letter).join('');
            if(formed === wordToFind) {
                selectedLetters.forEach(x => {
                    x.el.classList.remove('selected');
                    x.el.classList.add('correct');
                });
                points += 10;
                document.getElementById('points-display').innerText = points;
                selectedLetters = [];
                setTimeout(() => {
                    if(currentRound < 4) {
                        currentRound++;
                        loadRound();
                    } else {
                        alert("Jogo Terminado!");
                    }
                }, 800);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
