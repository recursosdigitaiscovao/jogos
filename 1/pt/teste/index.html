<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - Template 1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* --- NOVO MENU HAMBÚRGUER FLUTUANTE --- */
        .nav-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 9999; /* Garante que fica por cima de tudo */
        }

        .hamburger-btn {
            font-size: 32px;
            color: var(--primary-blue);
            cursor: pointer;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: transform 0.3s;
        }

        .menu-dropdown {
            display: none; /* Escondido por padrão */
            flex-direction: column;
            gap: 12px;
            padding-top: 10px;
        }

        .menu-dropdown.active {
            display: flex; /* Mostra ao clicar */
        }

        .menu-icon-item {
            width: 55px;
            height: 55px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 10px #c5d4e3, -4px -4px 10px #ffffff;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-icon-item:hover { transform: scale(1.1); }
        .menu-icon-item img { width: 32px; height: 32px; object-fit: contain; }

        /* --- CONTEÚDO --- */
        .main-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px 0 100px; /* Recuo para não bater no menu */
        }

        .header-title { display: flex; align-items: center; gap: 12px; color: var(--primary-blue); font-weight: 900; font-size: 1.6rem; }
        .header-title img { width: 45px; }

        .btn-voltar {
            background-color: var(--primary-blue); color: white; padding: 10px 30px;
            border-radius: 25px; text-decoration: none; font-weight: 900; box-shadow: 0 5px 0 #3d7db8;
        }

        /* --- CARD DO JOGO --- */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .game-card {
            background: var(--bg-page); width: 100%; max-width: 950px; height: 95%; max-height: 780px;
            border-radius: 40px; box-shadow: var(--outer-shadow); padding: 25px;
            display: flex; flex-direction: column; align-items: center;
        }

        .status-bar { width: 100%; display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 10px; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-page); box-shadow: var(--inner-shadow); }
        .dot.active { background: #2ecc71; border: 2px solid white; }

        .target-box { text-align: center; margin-bottom: 15px; }
        .target-box img { height: clamp(80px, 15vh, 120px); margin-bottom: 5px; }
        .target-box h2 { font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; color: #333; }

        /* Grade Neomórfica */
        .grid-frame {
            background: var(--bg-page); padding: 15px; border-radius: 30px;
            box-shadow: var(--inner-shadow); display: grid; gap: 10px; margin: auto;
        }
        
        .cell {
            width: clamp(35px, 4.5vw, 48px); height: clamp(35px, 4.5vw, 48px); background: var(--bg-page); 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.3rem; cursor: pointer; box-shadow: 5px 5px 10px #c5d4e3, -5px -5px 10px #ffffff;
        }

        .game-footer { width: 100%; display: flex; justify-content: flex-end; }
        .settings-btn {
            background: var(--bg-page); border: none; width: 50px; height: 50px;
            border-radius: 50%; box-shadow: var(--outer-shadow); color: #888; font-size: 24px; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="hamburger-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <div class="menu-dropdown" id="dropdownMenu">
            </div>
    </nav>

    <div class="main-content">
        <header>
            <div class="header-title">
                <img id="header-icon" src="" alt="">
                Português - 1º Ano
            </div>
            <a href="#" class="btn-voltar">← Voltar</a>
        </header>

        <main class="game-area">
            <div class="game-card">
                <div class="status-bar">
                    <div>⏳ 01:31</div>
                    <div class="dots" id="dots-progress"></div>
                    <div>0 PTS</div>
                </div>

                <div class="target-box">
                    <img id="main-img" src="" alt="">
                    <h2 id="main-word"></h2>
                </div>

                <div id="game-grid" class="grid-frame"></div>

                <div class="game-footer">
                    <button class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="dados.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('active');
        }

        function initApp() {
            const dropdown = document.getElementById('dropdownMenu');
            const icons = JOGO_CONFIG.iconesMenu;
            const pathIcons = JOGO_CONFIG.caminhoIcons;

            // Criar a lista de icons debaixo do hambúrguer
            const keys = ['pre', 'ano1', 'ano2', 'ano3', 'ano4'];
            keys.forEach(key => {
                const div = document.createElement('div');
                div.className = 'menu-icon-item';
                div.innerHTML = `<img src="${pathIcons}${icons[key]}" alt="${key}">`;
                dropdown.appendChild(div);
            });

            // Ícone do topo (header)
            document.getElementById('header-icon').src = `${pathIcons}${icons.ano1}`;

            // Carregar o primeiro item (VACA) da categoria animais
            const cat = JOGO_CONFIG.categorias.animais;
            const item = cat.itens[0];
            
            document.getElementById('main-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('main-word').innerText = item.nome;

            // Gerar Grade
            const grid = document.getElementById('game-grid');
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i<64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = letras.charAt(Math.floor(Math.random() * letras.length));
                grid.appendChild(cell);
            }

            // Bolinhas de progresso
            const dots = document.getElementById('dots-progress');
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = i === 0 ? 'dot active' : 'dot';
                dots.appendChild(d);
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
