<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Template 1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --selected: #ffcc00;
            --correct: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* ==========================================================================
           HEADER (Ajustado para não cortar no mobile)
           ========================================================================== */
        header { 
            height: 65px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; flex-shrink: 0; z-index: 1000; width: 100%;
        }
        .header-left, .header-right { display: flex; align-items: center; min-width: 40px; }
        .header-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--primary-blue); font-weight: 900; }
        .header-center img { width: clamp(24px, 5vw, 30px); height: auto; }
        
        .title-desktop { display: inline; }
        .title-mobile { display: none; }

        @media (max-width: 480px) {
            .title-desktop { display: none; }
            .title-mobile { display: inline; font-size: 1.1rem; }
            header { padding: 0 10px; }
        }

        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }
        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 6px 10px; 
            border-radius: 10px; text-decoration: none; font-weight: 900; 
            font-size: 0.7rem; box-shadow: 0 3px 0 #3d7db8; white-space: nowrap;
        }

        /* MENUS */
        .menu-dropdown, #rd-menu-container, #rd-menu-intro { 
            position: absolute; top: 50px; display: none; flex-direction: column; 
            gap: 8px; z-index: 2000; 
        }
        .menu-dropdown { left: 10px; }
        #rd-menu-container { right: 10px; }

        .custom-menu-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 15px; 
            background: white; border-radius: 15px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 170px; text-decoration: none; color: inherit;
        }
        .custom-menu-item img { height: 20px; }
        .custom-menu-item span { font-size: 0.85rem; font-weight: 800; color: #555; }

        /* ==========================================================================
           ESTRUTURA PRINCIPAL (10px do fundo garantidos)
           ========================================================================== */
        .game-wrapper { 
            flex: 1; display: flex; justify-content: center; 
            padding: 0 10px 10px 10px; min-height: 0; overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 1200px; height: 100%; 
            border-radius: 30px; box-shadow: var(--outer-shadow); display: flex; 
            flex-direction: column; position: relative; overflow: hidden;
        }

        /* STATUS */
        .status { height: 50px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .status-timer { font-weight: 900; color: #666; font-size: 0.75rem; width: 60px; }
        .status-dots { display: flex; gap: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        .status-rd-trigger { 
            display: flex; align-items: center; background: rgba(255,255,255,0.4); 
            padding: 4px 8px; border-radius: 12px; box-shadow: var(--inner-shadow);
            cursor: pointer; height: 34px; position: relative;
        }
        .points-val { font-weight: 900; color: var(--primary-blue); font-size: 0.85rem; margin-right: 6px; }
        .status-rd-trigger img { height: 22px; }

        /* MAIN AJUSTADO */
        main { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-evenly; padding: 5px 10px; min-height: 0; width: 100%;
        }

        /* INTRO OVERLAY */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .intro-img { height: 20vh; max-height: 120px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        .intro-title { color: var(--primary-blue); font-weight: 900; font-size: clamp(1.4rem, 5vh, 2rem); margin-bottom: 10px; }
        .btn-jogar { background: var(--correct); color: white; box-shadow: 0 4px 0 #27ae60; }
        .btn-rd-intro { background: white; color: var(--primary-blue); box-shadow: 0 4px 0 #cbd5e0; position: relative; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* DISPLAY E GRELHA */
        .target-display { text-align: center; flex-shrink: 0; }
        .target-display img { height: 18vh; max-height: 110px; object-fit: contain; }
        .target-display h2 { font-size: clamp(1.2rem, 4vh, 1.8rem); font-weight: 900; letter-spacing: 3px; color: #333; }

        @media (min-width: 768px) and (orientation: landscape) {
            main { flex-direction: row; justify-content: center; gap: 40px; }
        }

        .grid-container { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 1vh; 
            padding: 1.5vh; background: var(--bg-page); border-radius: 15px; 
            box-shadow: var(--inner-shadow); width: fit-content; max-height: 55vh;
        }

        .cell { 
            width: clamp(30px, 6vh, 50px); height: clamp(30px, 6vh, 50px); 
            background: var(--bg-page); border-radius: 8px; display: flex; 
            align-items: center; justify-content: center; font-weight: 900; 
            font-size: clamp(0.9rem, 3vh, 1.3rem); box-shadow: 2px 2px 4px #c5d4e3, -2px -2px 4px #ffffff; 
            cursor: pointer; user-select: none; 
        }

        .cell.selected { background: var(--selected); color: white; box-shadow: none; }
        .cell.correct { background: var(--correct); color: white; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu('dropdownMenu', event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span class="title-desktop">Português - 1º Ano</span>
            <span class="title-mobile">1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ <span id="timer-label">00:00</span></div>
                <div id="dots-container" class="status-dots"></div>
                <div class="status-rd-trigger" onclick="toggleMenu('rd-menu-container', event)">
                    <span id="points-label" class="points-val">0</span>
                    <img id="status-rd-img" src="">
                    <div id="rd-menu-container">
                        <div class="custom-menu-item" onclick="changeCategory('animais')"><span>🐾 Animais</span></div>
                        <div class="custom-menu-item" onclick="changeCategory('objetos')"><span>🎒 Objetos</span></div>
                    </div>
                </div>
            </section>

            <div id="intro-overlay">
                <div class="intro-content">
                    <img src="" id="intro-img" class="intro-img">
                    <h1 class="intro-title">Sopa de Letras</h1>
                    <div class="btn-group" style="display:flex; gap:15px; justify-content:center">
                        <button class="btn-main btn-rd-intro" onclick="toggleMenu('rd-menu-intro', event)" style="padding: 10px 20px; border-radius: 15px; border:none; font-weight:900; cursor:pointer;">
                            <img src="" id="intro-rd-icon" style="height:18px; vertical-align:middle;"> RD
                            <div id="rd-menu-intro" style="position:absolute; top:45px; left:0; display:none; flex-direction:column; gap:8px;">
                                <div class="custom-menu-item"><span>🐾 Animais</span></div>
                            </div>
                        </button>
                        <button class="btn-main btn-jogar" onclick="startGame()" style="padding: 10px 25px; border-radius: 15px; border:none; font-weight:900; cursor:pointer;">
                            <i class="fas fa-play"></i> JOGAR
                        </button>
                    </div>
                </div>
            </div>

            <main id="main">
                <div class="target-display">
                    <img id="main-target-img" src="" alt="">
                    <h2 id="main-target-word"></h2>
                </div>
                <div id="game-grid" class="grid-container"></div>
            </main>
        </div>
    </div>

    <script src="dados.js"></script>
    <script>
        let currentRound = 0, points = 0, seconds = 0, selected = [], wordToFind = "", gameStarted = false;

        function toggleMenu(menuId, e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById(menuId);
            const isVisible = menu.style.display === 'flex';
            document.querySelectorAll('.menu-dropdown, #rd-menu-container, #rd-menu-intro').forEach(m => m.style.display = 'none');
            if(!isVisible) menu.style.display = 'flex';
        }

        window.onclick = () => {
            document.querySelectorAll('.menu-dropdown, #rd-menu-container, #rd-menu-intro').forEach(m => m.style.display = 'none');
        };

        function startGame() {
            document.getElementById('intro-overlay').style.display = 'none';
            gameStarted = true;
            setInterval(() => {
                if(gameStarted) {
                    seconds++;
                    const m = Math.floor(seconds/60).toString().padStart(2,'0');
                    const s = (seconds%60).toString().padStart(2,'0');
                    document.getElementById('timer-label').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function init() {
            const icons = JOGO_CONFIG.iconesMenu;
            const pathI = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;

            document.getElementById('intro-img').src = pathI + icons.ano1;
            document.getElementById('intro-rd-icon').src = pathImg + "rd.png";
            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = pathImg + "rd.png";

            const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
            const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];

            menuKeys.forEach((key, index) => {
                const a = document.createElement('a');
                a.className = 'custom-menu-item';
                a.href = JOGO_CONFIG.links[key];
                a.innerHTML = `<img src="${pathI}${icons[key]}"><span>${menuLabels[index]}</span>`;
                document.getElementById('dropdownMenu').appendChild(a);
            });

            loadRound();
        }

        function loadRound() {
            const dots = document.getElementById('dots-container');
            dots.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                d.style.cssText = `background:${i <= currentRound ? '#2ecc71' : '#d1d9e2'};`;
                dots.appendChild(d);
            }

            const item = JOGO_CONFIG.categorias.animais.itens[currentRound];
            wordToFind = item.nome.toUpperCase();
            document.getElementById('main-target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('main-target-word').innerText = wordToFind;

            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let cells = Array(64).fill(null).map(() => letters[Math.floor(Math.random() * letters.length)]);
            const startPos = Math.floor(Math.random() * (64 - wordToFind.length));
            for(let i=0; i<wordToFind.length; i++) cells[startPos + i] = wordToFind[i];

            cells.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = l;
                div.onclick = (e) => {
                    e.stopPropagation();
                    if(!gameStarted) return;
                    div.classList.toggle('selected');
                    if(div.classList.contains('selected')) selected.push({el: div, char: l});
                    else selected = selected.filter(item => item.el !== div);
                    
                    const currentString = selected.map(s => s.char).join('');
                    if(currentString === wordToFind) {
                        selected.forEach(s => { s.el.classList.add('correct'); s.el.classList.remove('selected'); });
                        points += 10;
                        document.getElementById('points-label').innerText = points;
                        selected = [];
                        setTimeout(() => { if(currentRound < 4) { currentRound++; loadRound(); } }, 600);
                    }
                };
                grid.appendChild(div);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
