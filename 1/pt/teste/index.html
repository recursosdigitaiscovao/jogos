<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
        }

        /* 1. HEADER */
        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { 
            font-size: 26px; 
            color: #8899aa; 
            cursor: pointer; 
            transition: all 0.2s ease;
            padding: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        /* Cor alterada para a cor do botão jogar no hover */
        .hamburger-btn:hover { 
            color: var(--primary-blue); 
            transform: scale(1.1);
        }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* 2. WRAPPER */
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 5px 15px; 
            min-height: 0;
            overflow: hidden;
        }

        /* GAME CARD COM PADDING LATERAL DE 15PX */
        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 900px; 
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
            padding: 0 15px; /* PADDING SOLICITADO */
        }

        /* STATUS AREA */
        .status { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            /* Padding removido aqui pois o card já tem 15px */
        }

        /* MAIN / GAME AREA */
        main { 
            flex: 1; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            position: relative;
        }

        /* INTRO OVERLAY - Ajustado para respeitar o padding do card */
        #intro-overlay {
            position: absolute; 
            top: 0; 
            left: 15px; /* Ajustado ao padding do card */
            right: 15px; /* Ajustado ao padding do card */
            height: 100%;
            background: var(--bg-page); 
            z-index: 100;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .btn-jogar {
            padding: 15px 45px; background: var(--primary-blue); 
            color: white; border: none; border-radius: 20px; 
            font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); 
            font-size: 1.1rem;
        }
        .btn-jogar:active { transform: translateY(2px); box-shadow: 0 3px 0 var(--primary-dark); }

        .rd-intro-btn {
            height: 50px; width: 50px; background: white; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--outer-shadow);
        }

        /* FOOTER */
        footer {
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #8899aa; 
            font-size: 0.85rem; 
            flex-shrink: 0;
        }

        .menu-dropdown { 
            position: absolute; top: 60px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; color: #555;
        }

        @media (max-width: 450px) {
            .game-wrapper { padding: 5px 10px 5px 10px; }
            #intro-img { height: 60px !important; }
            h1 { font-size: 1.2rem; text-align: center; margin-bottom: 15px !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu('dropdownMenu', event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ 00:00</div>
                <div id="dots-container" style="display:flex; gap:5px;"></div>
                <div class="status-right">
                    <div style="font-weight: 900; color: var(--primary-blue);"><span id="points-label">0</span></div>
                    <img id="status-rd-img" class="rd-icon-btn" src="" alt="RD" style="height: 24px; cursor:pointer;">
                </div>
            </section>

            <div id="intro-overlay">
                <img id="intro-img" src="" style="height:80px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:25px;">Título do Jogo</h1>
                
                <div class="intro-actions" style="display:flex; align-items:center; gap:20px;">
                    <button onclick="mostrarJogo()" class="btn-jogar">JOGAR</button>
                    <div class="rd-intro-btn">
                        <img id="intro-rd-img" src="" alt="RD" style="height:30px;">
                    </div>
                </div>
            </div>

            <main id="game-area"></main>
        </div>
    </div>

    <footer id="main-footer">2026</footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(menuId, e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById(menuId);
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
        };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            // Ajuste do padding para preencher o espaço do footer
            document.querySelector('.game-wrapper').style.paddingBottom = '15px';
        }

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const pathI = JOGO_CONFIG.caminhoIcons;
                const pathImg = JOGO_CONFIG.caminhoImg;
                const icons = JOGO_CONFIG.iconesMenu;
                
                document.getElementById('header-icon').src = pathI + icons.ano1;
                document.getElementById('intro-img').src = pathI + icons.ano1;
                document.getElementById('status-rd-img').src = pathImg + "rd.png";
                document.getElementById('intro-rd-img').src = pathImg + "rd.png";

                const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
                const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];
                const menuBox = document.getElementById('dropdownMenu');
                
                menuKeys.forEach((key, i) => {
                    const a = document.createElement('a');
                    a.className = 'custom-menu-item';
                    a.href = JOGO_CONFIG.links[key];
                    a.innerHTML = `<img src="${pathI}${icons[key]}" style="height:20px;"><span>${menuLabels[i]}</span>`;
                    menuBox.appendChild(a);
                });
            }
        };
    </script>
</body>
</html>
