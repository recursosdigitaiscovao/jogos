<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* --- HEADER COM ALINHAMENTO TOTAL --- */
        header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Distribui os 3 blocos */
            padding: 0 25px;
            position: relative;
        }

        /* Bloco 1: Menu */
        .nav-section {
            display: flex;
            align-items: center;
            width: 150px; /* Largura fixa para ajudar na centralização do título */
        }

        .hamburger-btn {
            font-size: 26px;
            color: var(--primary-blue);
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* Bloco 2: Título e Ícone (Centralizado) */
        .header-title { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 10px; 
            color: var(--primary-blue); 
            font-weight: 900; 
            font-size: 1.1rem;
            flex-grow: 1; /* Ocupa o centro */
        }

        .header-title img { 
            width: 30px; 
            height: 30px;
            object-fit: contain;
        }

        /* Bloco 3: Voltar */
        .back-section {
            width: 150px; /* Mesma largura da nav-section para equilíbrio */
            display: flex;
            justify-content: flex-end;
        }

        .btn-voltar {
            background-color: var(--primary-blue); 
            color: white; 
            padding: 6px 18px; 
            border-radius: 20px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.8rem; 
            box-shadow: 0 4px 0 #3d7db8;
            transition: 0.1s;
        }

        .btn-voltar:active { transform: translateY(2px); box-shadow: 0 2px 0 #3d7db8; }

        /* --- MENU DROPDOWN --- */
        .menu-dropdown {
            position: absolute;
            top: 60px;
            left: 20px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }
        .menu-dropdown.active { display: flex; }

        .menu-row-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: var(--white);
            border-radius: 25px;
            box-shadow: 4px 4px 10px #c5d4e3;
            cursor: pointer;
            width: 180px;
        }
        .menu-row-item img { width: 25px; height: 25px; }
        .menu-row-item span { color: var(--primary-blue); font-weight: 800; font-size: 0.9rem; }

        /* --- JOGO --- */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .game-card {
            background: var(--bg-page); width: 95%; max-width: 850px; height: 90%; 
            border-radius: 40px; box-shadow: var(--outer-shadow); padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .grid-frame {
            background: var(--bg-page); padding: 12px; border-radius: 25px;
            box-shadow: var(--inner-shadow); display: grid; gap: 8px; margin: auto;
        }
        .cell {
            width: clamp(30px, 4vw, 42px); height: clamp(30px, 4vw, 42px); background: var(--bg-page); 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.1rem; box-shadow: 3px 3px 6px #c5d4e3, -3px -3px 6px #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-section">
            <div class="hamburger-btn" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>

        <div class="header-title">
            <img id="header-icon" src="" alt="">
            <span>Português - 1º Ano</span>
        </div>

        <div class="back-section">
            <a href="#" class="btn-voltar">← Voltar</a>
        </div>
    </header>

    <main class="game-area">
        <div class="game-card">
            <div id="game-grid" class="grid-frame"></div>
        </div>
    </main>

    <script src="dados.js"></script>
    <script>
        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }

        function init() {
            const dropdown = document.getElementById('dropdownMenu');
            const icons = JOGO_CONFIG.iconesMenu;
            const pathIcons = JOGO_CONFIG.caminhoIcons;

            const mapping = [
                { key: 'pre', label: 'Pré-Escolar' },
                { key: 'ano1', label: '1º Ano' },
                { key: 'ano2', label: '2º Ano' },
                { key: 'ano3', label: '3º Ano' },
                { key: 'ano4', label: '4º Ano' }
            ];

            mapping.forEach(item => {
                const row = document.createElement('div');
                row.className = 'menu-row-item';
                row.innerHTML = `<img src="${pathIcons}${icons[item.key]}"><span>${item.label}</span>`;
                dropdown.appendChild(row);
            });

            document.getElementById('header-icon').src = `${pathIcons}${icons.ano1}`;
            
            // Gerar Grid (Simulação rápida)
            const grid = document.getElementById('game-grid');
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            for(let i=0; i<64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = "A";
                grid.appendChild(cell);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
