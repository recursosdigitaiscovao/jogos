<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* --- MENU DROPDOWN FLUTUANTE --- */
        .nav-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 9999;
        }

        .hamburger-btn {
            font-size: 28px;
            color: var(--primary-blue);
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-dropdown {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding-top: 10px;
            width: 200px;
        }

        .menu-dropdown.active { display: flex; }

        .menu-row-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: var(--white);
            border-radius: 25px;
            box-shadow: 4px 4px 8px #c5d4e3, -4px -4px 8px #ffffff;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-row-item:hover { transform: translateX(8px); }
        .menu-row-item img { width: 28px; height: 28px; object-fit: contain; }
        .menu-row-item span { color: var(--primary-blue); font-weight: 800; font-size: 0.95rem; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { width: 100%; height: 100%; display: flex; flex-direction: column; }

        header {
            height: 60px; /* Reduzido de 80px */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px 0 80px;
        }

        .header-title { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            color: var(--primary-blue); 
            font-weight: 900; 
            font-size: 1.2rem; /* Texto do título mais pequeno */
        }

        .header-title img { 
            width: 32px; /* Imagem do título mais pequena */
            height: 32px;
        }

        .btn-voltar {
            background-color: var(--primary-blue); 
            color: white; 
            padding: 6px 20px; /* Botão mais pequeno */
            border-radius: 18px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.85rem; 
            box-shadow: 0 4px 0 #3d7db8;
        }

        /* --- CARD DO JOGO --- */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        
        .game-card {
            background: var(--bg-page); width: 100%; max-width: 900px; height: 95%; max-height: 720px;
            border-radius: 35px; box-shadow: var(--outer-shadow); padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .status-bar { width: 100%; display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 8px; font-size: 0.9rem; }
        .dots { display: flex; gap: 6px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: var(--bg-page); box-shadow: var(--inner-shadow); }
        .dot.active { background: #2ecc71; border: 2px solid white; }

        .target-box { text-align: center; margin-bottom: 10px; }
        .target-box img { height: clamp(60px, 10vh, 90px); margin-bottom: 5px; }
        .target-box h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; color: #333; }

        /* Grade Centralizada */
        .grid-frame {
            background: var(--bg-page); padding: 12px; border-radius: 25px;
            box-shadow: var(--inner-shadow); display: grid; gap: 6px; margin: auto;
        }
        
        .cell {
            width: clamp(30px, 4vw, 42px); height: clamp(30px, 4vw, 42px); background: var(--bg-page); 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 3px 3px 6px #c5d4e3, -3px -3px 6px #ffffff;
        }

        .game-footer { width: 100%; display: flex; justify-content: flex-end; }
        .settings-btn {
            background: var(--bg-page); border: none; width: 40px; height: 40px;
            border-radius: 50%; box-shadow: var(--outer-shadow); color: #888; font-size: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="hamburger-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <div class="menu-dropdown" id="dropdownMenu">
            </div>
    </nav>

    <div class="main-content">
        <header>
            <div class="header-title">
                <img id="header-icon" src="" alt="">
                Português - 1º Ano
            </div>
            <a href="#" class="btn-voltar">← Voltar</a>
        </header>

        <main class="game-area">
            <div class="game-card">
                <div class="status-bar">
                    <div>⏳ 01:31</div>
                    <div class="dots" id="dots-progress"></div>
                    <div>0 PTS</div>
                </div>

                <div class="target-box">
                    <img id="main-img" src="" alt="">
                    <h2 id="main-word"></h2>
                </div>

                <div id="game-grid" class="grid-frame"></div>

                <div class="game-footer">
                    <button class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="dados.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('dropdownMenu').classList.toggle('active');
        }

        function init() {
            const dropdown = document.getElementById('dropdownMenu');
            const icons = JOGO_CONFIG.iconesMenu;
            const pathIcons = JOGO_CONFIG.caminhoIcons;

            const mapping = [
                { key: 'pre', label: 'Pré-Escolar' },
                { key: 'ano1', label: '1º Ano' },
                { key: 'ano2', label: '2º Ano' },
                { key: 'ano3', label: '3º Ano' },
                { key: 'ano4', label: '4º Ano' }
            ];

            mapping.forEach(item => {
                const row = document.createElement('div');
                row.className = 'menu-row-item';
                row.innerHTML = `<img src="${pathIcons}${icons[item.key]}"><span>${item.label}</span>`;
                dropdown.appendChild(row);
            });

            document.getElementById('header-icon').src = `${pathIcons}${icons.ano1}`;
            carregarJogo('animais', 0);
        }

        function carregarJogo(catKey, idx) {
            const item = JOGO_CONFIG.categorias[catKey].itens[idx];
            document.getElementById('main-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('main-word').innerText = item.nome;

            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i<64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = letras.charAt(Math.floor(Math.random() * letras.length));
                grid.appendChild(cell);
            }

            const dots = document.getElementById('dots-progress');
            dots.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = i === 0 ? 'dot active' : 'dot';
                dots.appendChild(d);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
