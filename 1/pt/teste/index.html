<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --white: #ffffff;
            --primary-blue: #5ba4e5;
            --inner-shadow: inset 6px 6px 12px #c5d4e3, inset -6px -6px 12px #ffffff;
            --outer-shadow: 10px 10px 20px #c5d4e3, -10px -10px 20px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-page); display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* --- MENU HAMBÚRGUER VERTICAL (SEM BARRA BRANCA) --- */
        .menu-container-vertical {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hamburger-icon {
            font-size: 32px;
            color: var(--primary-blue);
            cursor: pointer;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        /* Dropdown de Icons */
        .menu-dropdown {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .menu-dropdown.open {
            max-height: 500px;
            opacity: 1;
        }

        .menu-item {
            width: 55px;
            height: 55px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 8px #c5d4e3, -4px -4px 8px #ffffff;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-item:hover { transform: scale(1.1); }
        .menu-item img { width: 30px; height: 30px; object-fit: contain; }

        /* --- LAYOUT PRINCIPAL --- */
        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px 0 100px; /* Espaço para o menu à esquerda */
        }

        .header-title { display: flex; align-items: center; gap: 12px; color: var(--primary-blue); font-weight: 900; font-size: 1.6rem; }
        .header-title img { width: 45px; }

        .btn-voltar {
            background-color: var(--primary-blue); color: white; padding: 10px 30px;
            border-radius: 25px; text-decoration: none; font-weight: 900; box-shadow: 0 5px 0 #3d7db8;
        }

        /* --- ÁREA DO JOGO (CARD) --- */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .game-card {
            background: var(--bg-page); width: 100%; max-width: 950px; height: 100%; max-height: 780px;
            border-radius: 40px; box-shadow: var(--outer-shadow); padding: 25px 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .status-bar { width: 100%; display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 10px; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-page); box-shadow: var(--inner-shadow); }
        .dot.active { background: #2ecc71; border: 2px solid white; box-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }

        .target-box { text-align: center; margin-bottom: 15px; }
        .target-box img { height: clamp(80px, 12vh, 120px); margin-bottom: 5px; }
        .target-box h2 { font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; color: #333; }

        /* Grade Neomórfica Centralizada */
        .grid-frame {
            background: var(--bg-page); padding: 15px; border-radius: 30px;
            box-shadow: var(--inner-shadow); display: grid; gap: 10px; margin: auto;
        }
        
        .cell {
            width: clamp(35px, 4.5vw, 48px); height: clamp(35px, 4.5vw, 48px); background: var(--bg-page); 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.3rem; cursor: pointer; box-shadow: 5px 5px 10px #c5d4e3, -5px -5px 10px #ffffff;
        }

        .game-footer { width: 100%; display: flex; justify-content: flex-end; }
        .settings-btn {
            background: var(--bg-page); border: none; width: 50px; height: 50px;
            border-radius: 50%; box-shadow: var(--outer-shadow); color: #888; font-size: 24px; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="menu-container-vertical">
        <div class="hamburger-icon" onclick="toggleDropdown()">
            <i class="fas fa-bars"></i>
        </div>
        <div class="menu-dropdown" id="dropdownMenu">
            </div>
    </nav>

    <div class="main-wrapper">
        <header>
            <div class="header-title">
                <img id="header-icon" src="" alt="">
                Português - 1º Ano
            </div>
            <a href="#" class="btn-voltar">← Voltar</a>
        </header>

        <main class="game-area">
            <div class="game-card">
                <div class="status-bar">
                    <div id="tempo">⏳ 01:31</div>
                    <div class="dots" id="dots-container"></div>
                    <div id="pts">0 PTS</div>
                </div>

                <div class="target-box">
                    <img id="main-img" src="" alt="">
                    <h2 id="main-word"></h2>
                </div>

                <div class="grid-frame" id="game-grid"></div>

                <div class="game-footer">
                    <button class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="dados.js"></script>
    <script>
        function toggleDropdown() {
            document.getElementById('dropdownMenu').classList.toggle('open');
        }

        function init() {
            const dropdown = document.getElementById('dropdownMenu');
            const icons = JOGO_CONFIG.iconesMenu;
            const pathIcons = JOGO_CONFIG.caminhoIcons;

            // Criar ícones do dropdown (Pré ao 4º Ano)
            const keys = ['pre', 'ano1', 'ano2', 'ano3', 'ano4'];
            keys.forEach(key => {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.innerHTML = `<img src="${pathIcons}${icons[key]}" title="${key}">`;
                dropdown.appendChild(item);
            });

            // Definir ícone do header
            document.getElementById('header-icon').src = `${pathIcons}${icons.ano1}`;
            
            // Iniciar Jogo (Exemplo com PATO)
            carregarJogo('animais', 2);
        }

        function carregarJogo(cat, idx) {
            const item = JOGO_CONFIG.categorias[cat].itens[idx];
            document.getElementById('main-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('main-word').innerText = item.nome;

            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(8, 1fr)`;
            
            const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i<64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = letras.charAt(Math.floor(Math.random() * letras.length));
                grid.appendChild(cell);
            }

            const dots = document.getElementById('dots-container');
            dots.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = i === 0 ? 'dot active' : 'dot';
                dots.appendChild(d);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
