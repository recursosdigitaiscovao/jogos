<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Sopa de Letras</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { 
            font-size: 26px; color: var(--primary-blue); cursor: pointer; 
            padding: 8px; display: flex; align-items: center; justify-content: center;
        }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        /* Container Principal */
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 10px 20px; 
            min-height: 0;
            overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 1100px; /* Aumentado para monitores maiores */
            height: 100%; 
            border-radius: 35px; 
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        /* Status Bar */
        .status { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px;
        }
        
        #dots-container { display: flex; gap: 8px; align-items: center; }
        .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #cbd9e6; transition: all 0.3s ease;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); box-shadow: 0 0 8px var(--primary-blue); }
        .dot.completed { background: #a8d5ff; }

        .status-timer { font-weight: 700; color: #667788; min-width: 60px; }
        .status-right { display: flex; align-items: center; gap: 12px; min-width: 60px; justify-content: flex-end; }
        .rd-menu-btn { height: 26px; cursor: pointer; }

        /* Área do Jogo Responsiva */
        main { flex: 1; display: none; position: relative; overflow: hidden; }

        #inner-game {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly;
            padding: 15px;
        }

        /* Layout para Monitores/Horizontal */
        @media (orientation: landscape) and (min-height: 400px) {
            #inner-game { flex-direction: row; justify-content: space-evenly; padding: 20px; }
            .hint-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        }

        .hint-img { 
            height: clamp(70px, 18vh, 140px); 
            border-radius: 20px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
            object-fit: contain;
            background: white;
            padding: 5px;
        }

        .slots { 
            font-size: clamp(1.3rem, 4vw, 2.2rem); 
            font-weight: 900; color: var(--primary-blue); 
            letter-spacing: 4px; margin: 10px 0; text-align: center;
        }

        /* Grelha Dinâmica */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: clamp(4px, 1vw, 8px); 
            background: #d0e0f0; 
            padding: clamp(8px, 2vw, 15px); 
            border-radius: 25px; 
            touch-action: none;
            /* Tamanho inteligente: 85% da largura ou 65% da altura (o que for menor) */
            width: min(85vw, 65vh); 
            height: min(85vw, 65vh);
            max-width: 550px;
            max-height: 550px;
        }

        .cell { 
            width: 100%; height: 100%;
            background: white; border-radius: clamp(5px, 1.5vw, 12px); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; 
            font-size: clamp(1rem, 3.5vmin, 1.6rem); 
            color: #445566; cursor: pointer; 
            box-shadow: 0 4px 0 #cbd9e6; 
            user-select: none; transition: all 0.15s;
        }
        .cell.selected { background: var(--primary-blue); color: white; transform: translateY(2px); box-shadow: none; }
        .cell.correct { background: #7ed321 !important; color: white !important; box-shadow: none; transform: scale(0.95); }

        /* Intro Overlay */
        #intro-overlay {
            position: absolute; top: 0; left: 0; right: 0; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-jogar {
            width: 200px; padding: 18px; background: var(--primary-blue); 
            color: white; border: none; border-radius: 25px; 
            font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); 
            font-size: 1.3rem; transition: transform 0.2s;
        }
        .btn-jogar:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--primary-dark); }

        /* Menus */
        .menu-dropdown { 
            position: absolute; top: 65px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .rd-panel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: white; z-index: 2500; border-radius: 35px 35px 0 0;
            padding: 25px 20px; display: flex; flex-direction: column; gap: 12px;
            transform: translateY(101%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .rd-panel.active { transform: translateY(0); box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }

        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; text-decoration: none; color: #555; font-weight: 700;
        }

        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; }

        /* Tutorial Anim */
        @keyframes moveHand { 
            0% { transform: translate(0,0); opacity: 0; } 
            10% { opacity: 1; }
            50% { transform: translate(-60px, 0); opacity: 1; } 
            90% { opacity: 1; }
            100% { transform: translate(0,0); opacity: 0; } 
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMainMenu(event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div id="timer-display" class="status-timer">⏳ 00:00</div>
                <div id="dots-container"></div>
                <div class="status-right">
                    <div style="font-weight: 900; color: var(--primary-blue); margin-right:5px;"><span id="points-label">0</span></div>
                    <img id="status-rd-img" class="rd-menu-btn" src="" alt="RD" onclick="toggleRDMenu(event)">
                </div>
            </section>

            <!-- INTRO -->
            <div id="intro-overlay">
                <div style="position:relative; margin-bottom:30px; background:#dbe9f7; padding:20px; border-radius:25px;">
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">
                        <div style="width:40px;height:40px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;">G</div>
                        <div style="width:40px;height:40px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;">A</div>
                        <div style="width:40px;height:40px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;">T</div>
                    </div>
                    <i class="fas fa-hand-pointer" style="position:absolute; color:#f1c40f; font-size:30px; bottom:5px; right:5px; animation: moveHand 2s infinite;"></i>
                </div>
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:30px; font-size: 2rem;">Sopa de Letras</h1>
                <button onclick="mostrarJogo()" class="btn-jogar">JOGAR</button>
            </div>

            <!-- RD PANEL -->
            <div id="rdDropdownMenu" class="rd-panel">
                <div style="width:50px; height:5px; background:#ccd6e0; border-radius:10px; margin:-10px auto 15px auto; cursor:pointer;" onclick="toggleRDMenu(event)"></div>
            </div>

            <!-- ÁREA REAL DO JOGO -->
            <main id="game-area">
                <div id="inner-game">
                    <div class="hint-container">
                        <img id="target-img" class="hint-img" src="">
                        <div id="target-slots" class="slots"></div>
                    </div>
                    <div id="letter-grid" class="grid"></div>
                </div>
            </main>
        </div>
    </div>

    <footer id="main-footer">© 2024 EDUCAÇÃO DIVERTIDA</footer>

    <!-- Carrega os dados externos -->
    <script src="dados.js"></script>

    <script>
        let roundGlobal = 1;
        let currentCategory = 'animais';
        let itemsForGame = [];
        let timer = 0;
        let timerInt;
        let selectedCells = [];
        let targetWord = "";
        let isDragging = false;

        // Configuração fallback caso o dados.js falhe
        if (typeof JOGO_CONFIG === 'undefined') {
            window.JOGO_CONFIG = {
                caminhoImg: "", caminhoIcons: "", links: {}, iconesMenu: {},
                relatorio: { titulo: "Muito Bem!" },
                categorias: { animais: { nome: "Animais", imgCapa: "", itens: [{nome:"GATO", img:""}, {nome:"CÃO", img:""}] } }
            };
        }

        function atualizarProgressao(total, atual) {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            let visualAtual = atual > 5 ? atual - 5 : atual;
            if(atual === 0) visualAtual = 0;

            for (let i = 1; i <= 5; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                if (i < visualAtual) dot.classList.add('completed');
                else if (i === visualAtual) dot.classList.add('active');
                container.appendChild(dot);
            }
        }

        function toggleMainMenu(e) {
            if(e) e.stopPropagation();
            closeRDMenu();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleRDMenu(e) {
            if(e) e.stopPropagation();
            document.getElementById('dropdownMenu').style.display = 'none';
            document.getElementById('rdDropdownMenu').classList.toggle('active');
        }

        function closeRDMenu() {
            document.getElementById('rdDropdownMenu').classList.remove('active');
        }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
            closeRDMenu();
        };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            if(!timerInt) {
                timerInt = setInterval(() => {
                    timer++;
                    const m = Math.floor(timer/60).toString().padStart(2,'0');
                    const s = (timer%60).toString().padStart(2,'0');
                    document.getElementById('timer-display').innerText = `⏳ ${m}:${s}`;
                }, 1000);
            }

            if(roundGlobal === 1) prepararRondas();
            loadRound();
        }

        function prepararRondas() {
            const catData = JOGO_CONFIG.categorias[currentCategory].itens;
            // Embaralha e pega 10 itens
            itemsForGame = [...catData].sort(() => 0.5 - Math.random()).slice(0, 10);
        }

        function loadRound() {
            if(roundGlobal > 10) { finalizarJogo(); return; }
            
            atualizarProgressao(5, roundGlobal);
            const item = itemsForGame[roundGlobal - 1];
            
            // Normalizar palavra (remover acentos)
            targetWord = item.nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/Ç/g, "C");
            
            document.getElementById('target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            
            // Se for nível 1 (rounds 1-5), mostra a palavra. Nível 2 (6-10), mostra traços.
            document.getElementById('target-slots').innerText = (roundGlobal <= 5) ? item.nome.toUpperCase() : "_ ".repeat(targetWord.length);
            
            generateGrid(targetWord);
            selectedCells = [];
        }

        function generateGrid(word) {
            const gridEl = document.getElementById('letter-grid');
            gridEl.innerHTML = '';
            const size = 8;
            let cells = Array(size * size).fill('');
            
            const isHorizontal = Math.random() > 0.5;
            let start;

            if(isHorizontal) {
                const row = Math.floor(Math.random() * size);
                const col = Math.floor(Math.random() * (size - word.length));
                start = row * size + col;
            } else {
                const row = Math.floor(Math.random() * (size - word.length));
                const col = Math.floor(Math.random() * size);
                start = row * size + col;
            }

            for(let i=0; i<word.length; i++) {
                cells[isHorizontal ? start + i : start + (i * size)] = word[i];
            }

            const abc = "ABCDEFGHJKLMNOPQRSTUVWXYZ";
            cells.forEach((l, idx) => {
                const d = document.createElement('div');
                d.className = 'cell';
                d.innerText = l || abc[Math.floor(Math.random()*abc.length)];
                
                // Eventos Mouse
                d.onmousedown = () => startSelection(d);
                d.onmouseenter = () => moveSelection(d);
                
                // Eventos Touch
                d.ontouchstart = (e) => { e.preventDefault(); startSelection(d); };
                
                gridEl.appendChild(d);
            });

            gridEl.ontouchmove = (e) => {
                e.preventDefault();
                let touch = e.touches[0];
                let target = document.elementFromPoint(touch.clientX, touch.clientY);
                if(target && target.classList.contains('cell')) moveSelection(target);
            };
        }

        function startSelection(el) { isDragging = true; clearSelection(); selectCell(el); }
        function moveSelection(el) { if(isDragging) selectCell(el); }
        function endSelection() { if(!isDragging) return; isDragging = false; checkWord(); }

        window.onmouseup = window.ontouchend = endSelection;

        function selectCell(el) {
            if(el.classList.contains('correct') || selectedCells.includes(el)) return;
            el.classList.add('selected');
            selectedCells.push(el);
            
            // Verificação instantânea
            const currentString = selectedCells.map(x => x.innerText).join('');
            if(currentString === targetWord) { isDragging = false; checkWord(); }
        }

        function clearSelection() {
            selectedCells.forEach(el => el.classList.remove('selected'));
            selectedCells = [];
        }

        function checkWord() {
            const currentString = selectedCells.map(x => x.innerText).join('');
            if(currentString === targetWord) {
                selectedCells.forEach(x => x.classList.add('correct'));
                document.getElementById('target-slots').innerText = itemsForGame[roundGlobal-1].nome.toUpperCase();
                document.getElementById('points-label').innerText = roundGlobal * 10;
                
                setTimeout(() => {
                    roundGlobal++;
                    loadRound();
                }, 1000);
            } else {
                clearSelection();
            }
        }

        function finalizarJogo() {
            clearInterval(timerInt);
            const main = document.getElementById('game-area');
            main.innerHTML = `
                <div style="text-align:center; width:100%;">
                    <h2 style="color:var(--primary-blue); font-size:2.5rem; margin-bottom:10px;">${JOGO_CONFIG.relatorio.titulo}</h2>
                    <p style="font-weight:700; color:#667; margin-bottom:30px; font-size:1.2rem;">
                        Tempo Total: ${document.getElementById('timer-display').innerText.replace('⏳','')}
                    </p>
                    <button onclick="location.reload()" class="btn-jogar">REPETIR</button>
                </div>
            `;
        }

        function restartWithCategory(cat) {
            currentCategory = cat;
            roundGlobal = 1;
            timer = 0;
            if(timerInt) { clearInterval(timerInt); timerInt = null; }
            mostrarJogo();
            closeRDMenu();
        }

        window.onload = () => {
            const pathI = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;
            const icons = JOGO_CONFIG.iconesMenu;
            
            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = pathImg + "rd.png";

            // Menu Principal
            const menuBox = document.getElementById('dropdownMenu');
            const menuData = [{k:'home',l:'Início'},{k:'pre',l:'Pré'},{k:'ano1',l:'1º Ano'},{k:'ano2',l:'2º Ano'},{k:'ano3',l:'3º Ano'},{k:'ano4',l:'4º Ano'}];
            menuData.forEach(m => {
                const a = document.createElement('a');
                a.className = 'custom-menu-item';
                a.href = JOGO_CONFIG.links[m.k] || "#";
                a.innerHTML = `<img src="${pathI}${icons[m.k]}" style="height:20px;"><span>${m.l}</span>`;
                menuBox.appendChild(a);
            });

            // Menu RD Categorias
            const rdBox = document.getElementById('rdDropdownMenu');
            Object.keys(JOGO_CONFIG.categorias).forEach(key => {
                const cat = JOGO_CONFIG.categorias[key];
                const div = document.createElement('div');
                div.className = 'custom-menu-item';
                div.innerHTML = `<img src="${pathImg}${cat.imgCapa}" style="height:25px; width:25px; object-fit:contain;"><span>${cat.nome}</span>`;
                div.onclick = () => restartWithCategory(key);
                rdBox.appendChild(div);
            });

            atualizarProgressao(5, 0);
        };
    </script>
</body>
</html>
