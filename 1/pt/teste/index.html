<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --white: #ffffff;
            --inner-shadow: inset 4px 4px 8px #c5d4e3, inset -4px -4px 8px #ffffff;
            --outer-shadow: 8px 8px 16px #c5d4e3, -8px -8px 16px #ffffff;
            --selected: #ffcc00;
            --correct: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
            align-items: center; /* Centraliza o header e a área principal */
        }

        /* --- HEADER --- */
        header { 
            width: 100%; height: 50px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; 
        }
        .header-center { display: flex; align-items: center; gap: 8px; color: var(--primary-blue); font-weight: 900; }
        .header-center img { width: 28px; height: 28px; }
        .btn-voltar { background-color: var(--primary-blue); color: white; padding: 4px 12px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 0.75rem; box-shadow: 0 3px 0 #3d7db8; }
        .hamburger-btn { font-size: 20px; color: var(--primary-blue); cursor: pointer; }

        /* --- ÁREA DO JOGO --- */
        .game-area { 
            width: 100%; flex-grow: 1; 
            display: flex; justify-content: center; align-items: center; 
            padding: 10px; min-height: 0; 
        }
        
        .game-card {
            background: var(--bg-page); 
            width: 98%; max-width: 950px; 
            height: 98%; max-height: 85vh;
            border-radius: 35px; box-shadow: var(--outer-shadow); 
            padding: 20px;
            display: flex; flex-direction: column;
            justify-content: center; /* Centraliza tudo verticalmente no card */
            align-items: center; /* Centraliza tudo horizontalmente no card */
        }

        /* --- STATUS BAR --- */
        .status-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; max-width: 800px; margin-bottom: 15px; flex-shrink: 0; 
        }
        .rd-points-combined {
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255,255,255,0.4); padding: 5px 12px; 
            border-radius: 15px; box-shadow: var(--inner-shadow);
        }
        .rd-points-combined img { height: 22px; }

        /* --- CONTEÚDO CENTRALIZADO --- */
        .game-content {
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            width: 100%; gap: 15px; min-height: 0;
        }

        /* Layout Horizontal para Desktops */
        @media (min-width: 768px) and (orientation: landscape) {
            .game-content { flex-direction: row; gap: 40px; }
            .target-box { margin-bottom: 0; }
        }

        .target-box { 
            display: flex; flex-direction: column; align-items: center; 
            text-align: center; flex-shrink: 0;
        }
        .target-box img { 
            height: clamp(40px, 10vh, 75px); /* Imagem mais contida */
            width: auto; margin-bottom: 5px;
        }
        .target-box h2 { font-size: clamp(1.2rem, 3vmin, 1.6rem); font-weight: 900; letter-spacing: 3px; color: #333; }

        /* --- GRADE AUTO-SCALE --- */
        .grid-frame {
            display: grid; grid-template-columns: repeat(8, 1fr); 
            gap: 0.8vmin; padding: 1vmin;
            background: var(--bg-page); border-radius: 20px; box-shadow: var(--inner-shadow);
        }
        
        .cell {
            width: clamp(28px, 6.5vmin, 55px); 
            height: clamp(28px, 6.5vmin, 55px);
            background: var(--bg-page); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: clamp(0.8rem, 2.5vmin, 1.2rem);
            box-shadow: 3px 3px 6px #c5d4e3, -3px -3px 6px #ffffff; 
            cursor: pointer; user-select: none;
        }
        .cell.selected { background: var(--selected); color: white; box-shadow: var(--inner-shadow); }
        .cell.correct { background: var(--correct); color: white; pointer-events: none; box-shadow: none; }

        /* --- MENU --- */
        .menu-dropdown { position: absolute; top: 55px; left: 20px; display: none; flex-direction: column; gap: 8px; z-index: 1000; }
        .menu-dropdown.active { display: flex; }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: white; border-radius: 15px; box-shadow: 4px 4px 10px #c5d4e3; cursor: pointer; min-width: 160px; }
    </style>
</head>
<body>

    <header>
        <div style="width: 80px;"><i class="fas fa-bars hamburger-btn" onclick="toggleMenu()"></i></div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>Português - 1º Ano</span>
        </div>
        <div style="width: 80px; text-align: right;"><a href="#" class="btn-voltar">← Voltar</a></div>
        <div class="menu-dropdown" id="dropdownMenu"></div>
    </header>

    <main class="game-area">
        <div class="game-card">
            <div class="status-bar">
                <div class="timer-box" style="font-weight:900;">⏳ <span id="timer">00:00</span></div>
                <div class="dots-box" id="dots-container" style="display:flex; gap:5px;"></div>
                <div class="rd-points-combined">
                    <span id="points" style="font-weight:900; color:#5ba4e5;">0</span><span style="font-weight:900; color:#5ba4e5; font-size:0.7rem;">PTS</span>
                    <img id="img-rd" src="">
                </div>
            </div>

            <div class="game-content">
                <div class="target-box">
                    <img id="target-img" src="" alt="">
                    <h2 id="target-word"></h2>
                </div>

                <div id="game-grid" class="grid-frame"></div>
            </div>
        </div>
    </main>

    <script src="dados.js"></script>
    <script>
        let currentRound = 0, points = 0, seconds = 0, selected = [], wordToFind = "";

        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }

        function init() {
            const icons = JOGO_CONFIG.iconesMenu;
            const pathI = JOGO_CONFIG.caminhoIcons;
            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('img-rd').src = JOGO_CONFIG.caminhoImg + "rd.png";

            const anos = [{k:'pre', l:'Pré-Escolar'}, {k:'ano1', l:'1º Ano'}, {k:'ano2', l:'2º Ano'}, {k:'ano3', l:'3º Ano'}, {k:'ano4', l:'4º Ano'}];
            anos.forEach(a => {
                const d = document.createElement('div');
                d.className = 'menu-item';
                d.innerHTML = `<img src="${pathI}${icons[a.k]}" style="width:20px;"><span>${a.l}</span>`;
                document.getElementById('dropdownMenu').appendChild(d);
            });

            setInterval(() => {
                seconds++;
                const m = Math.floor(seconds/60).toString().padStart(2,'0');
                const s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);

            loadRound();
        }

        function loadRound() {
            const dots = document.getElementById('dots-container');
            dots.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                d.style.cssText = `width:12px; height:12px; border-radius:50%; background:${i <= currentRound ? '#2ecc71' : '#e9f0f8'}; box-shadow: ${i <= currentRound ? 'none' : 'inset 2px 2px 4px #c5d4e3'}; border: ${i <= currentRound ? '2px solid white' : 'none'}`;
                dots.appendChild(d);
            }

            const item = JOGO_CONFIG.categorias.animais.itens[currentRound];
            wordToFind = item.nome.toUpperCase();
            document.getElementById('target-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('target-word').innerText = wordToFind;

            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            let cells = Array(64).fill('').map(() => "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)]);
            const start = Math.floor(Math.random() * (64 - wordToFind.length));
            for(let i=0; i<wordToFind.length; i++) cells[start+i] = wordToFind[i];

            cells.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = l;
                div.onclick = () => {
                    div.classList.toggle('selected');
                    if(div.classList.contains('selected')) selected.push({el:div, l});
                    else selected = selected.filter(x => x.el !== div);
                    
                    if(selected.map(x=>x.l).join('') === wordToFind) {
                        selected.forEach(x => { x.el.classList.add('correct'); x.el.classList.remove('selected'); });
                        points += 10; document.getElementById('points').innerText = points;
                        selected = [];
                        setTimeout(() => { if(currentRound < 4) { currentRound++; loadRound(); } }, 600);
                    }
                };
                grid.appendChild(div);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
