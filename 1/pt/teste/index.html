<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - 1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .hamburger-btn { font-size: 26px; color: var(--primary-blue); cursor: pointer; padding: 8px; }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
        }

        .game-wrapper { 
            flex: 1; display: flex; justify-content: center; 
            padding: 5px 30px 15px 30px; min-height: 0; overflow: hidden;
        }

        .game-card { 
            background: var(--bg-page); width: 100%; max-width: 900px; 
            height: 100%; border-radius: 35px; box-shadow: var(--outer-shadow); 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .status { height: 50px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        
        #dots-container { display: flex; gap: 8px; align-items: center; justify-content: center; }

        .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #cbd9e6; transition: all 0.3s ease;
        }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }
        .dot.completed { background: #a8d5ff; }

        .status-timer { font-weight: 700; color: #667788; min-width: 60px; }
        .status-right { display: flex; align-items: center; gap: 12px; min-width: 60px; justify-content: flex-end; }
        .rd-menu-btn { height: 24px; cursor: pointer; }

        main { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        #intro-overlay {
            position: absolute; top: 0; left: 0; right: 0; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; padding-bottom: 20px;
        }
        .intro-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .intro-actions { display: flex; align-items: center; gap: 15px; width: 100%; padding: 0 25px; }
        .btn-jogar {
            flex: 1; padding: 15px; background: var(--primary-blue); 
            color: white; border: none; border-radius: 20px; 
            font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); 
            font-size: 1.1rem;
        }
        .rd-intro-btn { height: 50px; width: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .rd-intro-btn img { height: 40px; }

        footer { height: 40px; display: flex; align-items: center; justify-content: center; color: #8899aa; font-size: 0.85rem; }

        .menu-dropdown { position: absolute; top: 60px; left: 20px; display: none; flex-direction: column; gap: 8px; z-index: 2000; }
        .rd-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; background: white; z-index: 2500;
            border-radius: 35px 35px 0 0; padding: 25px 20px; display: flex; flex-direction: column; gap: 12px;
            transform: translateY(101%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .rd-panel.active { transform: translateY(0); box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }
        .rd-panel-header { width: 50px; height: 5px; background: #ccd6e0; border-radius: 10px; margin: -10px auto 15px auto; }

        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; text-decoration: none; color: #555; font-weight: 700;
        }

        /* ESTILOS ESPECÍFICOS DO JOGO SOPA DE LETRAS */
        #game-container {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly; padding: 10px;
        }

        .word-hint {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        .word-hint img { height: 80px; object-fit: contain; border-radius: 15px; }
        .word-hint span { font-size: 1.5rem; font-weight: 900; color: var(--primary-blue); letter-spacing: 2px; }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            background: #d0e0f0;
            padding: 8px;
            border-radius: 15px;
            touch-action: none;
        }

        .letter {
            width: 35px; height: 35px;
            background: white;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-weight: 900; font-size: 1.1rem;
            color: #445566; cursor: pointer;
            user-select: none; transition: all 0.2s;
            box-shadow: 0 2px 0 #cbd9e6;
        }

        .letter.selected { background: var(--primary-blue); color: white; transform: scale(0.95); }
        .letter.found { background: #7ed321; color: white; }

        @media (max-width: 400px) {
            .letter { width: 30px; height: 30px; font-size: 0.9rem; }
            .word-hint img { height: 60px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMainMenu(event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ <span id="timer-val">00:00</span></div>
                <div id="dots-container"></div>
                <div class="status-right">
                    <div style="font-weight: 900; color: var(--primary-blue);"><span id="points-label">0</span></div>
                    <img id="status-rd-img" class="rd-menu-btn" src="" alt="RD" onclick="toggleRDMenu(event)">
                </div>
            </section>

            <div id="intro-overlay">
                <div class="intro-content">
                    <img id="intro-img" src="" style="height:80px; margin-bottom:20px;">
                    <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:10px;">Sopa de Letras</h1>
                    <p style="color:#667788; font-weight:700;">Encontra o nome da imagem!</p>
                </div>
                <div class="intro-actions">
                    <button onclick="mostrarJogo()" class="btn-jogar">JOGAR</button>
                    <div class="rd-intro-btn" onclick="toggleRDMenu(event)">
                        <img id="intro-rd-img" src="" alt="RD">
                    </div>
                </div>
            </div>

            <div id="rdDropdownMenu" class="rd-panel">
                <div class="rd-panel-header" onclick="toggleRDMenu(event)"></div>
            </div>

            <main id="game-area">
                <div id="game-container">
                    <div class="word-hint">
                        <img id="hint-img" src="" alt="">
                        <span id="hint-name">----</span>
                    </div>
                    <div id="grid" class="word-grid"></div>
                </div>
            </main>
        </div>
    </div>

    <footer id="main-footer">2026</footer>

    <script src="dados.js"></script>
    <script>
        let currentRound = 1;
        const totalRounds = 5;
        let points = 0;
        let timerSeconds = 0;
        let timerInterval;
        let selectedWord = "";
        let currentSelection = [];
        let itemsParaOdispose = [];

        function atualizarProgressao(total, atual) {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i < atual ? ' completed' : (i === atual ? ' active' : ''));
                container.appendChild(dot);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timerSeconds++;
                const min = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                const sec = (timerSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer-val').innerText = `${min}:${sec}`;
            }, 1000);
        }

        function toggleMainMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleRDMenu(e) {
            if(e) e.stopPropagation();
            const rdPanel = document.getElementById('rdDropdownMenu');
            rdPanel.classList.toggle('active');
        }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
            document.getElementById('rdDropdownMenu').classList.remove('active');
        };

        function mostrarJogo() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            // Selecionar 5 itens aleatórios das categorias
            const allItems = [];
            Object.values(JOGO_CONFIG.categorias).forEach(cat => allItems.push(...cat.itens));
            itemsParaOdispose = allItems.sort(() => 0.5 - Math.random()).slice(0, 5);
            
            startTimer();
            loadRound();
        }

        function loadRound() {
            if(currentRound > totalRounds) {
                finalizarJogo();
                return;
            }
            
            atualizarProgressao(totalRounds, currentRound);
            const item = itemsParaOdispose[currentRound - 1];
            selectedWord = item.nome.toUpperCase().replace(/\s/g, '');
            
            document.getElementById('hint-img').src = JOGO_CONFIG.caminhoImg + item.img;
            document.getElementById('hint-name').innerText = "_ ".repeat(selectedWord.length);
            
            generateGrid(selectedWord);
            currentSelection = [];
        }

        function generateGrid(word) {
            const size = 8;
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            
            const grid = Array(size).fill().map(() => Array(size).fill(''));
            
            // Direção: 0 = Horizontal, 1 = Vertical
            const direction = Math.floor(Math.random() * 2);
            let row, col;

            if (direction === 0) { // Horizontal
                row = Math.floor(Math.random() * size);
                col = Math.floor(Math.random() * (size - word.length));
                for (let i = 0; i < word.length; i++) grid[row][col + i] = word[i];
            } else { // Vertical
                row = Math.floor(Math.random() * (size - word.length));
                col = Math.floor(Math.random() * size);
                for (let i = 0; i < word.length; i++) grid[row + i][col] = word[i];
            }

            // Preencher com letras aleatórias
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] === '') grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
                    
                    const div = document.createElement('div');
                    div.className = 'letter';
                    div.innerText = grid[r][c];
                    div.dataset.row = r;
                    div.dataset.col = c;
                    div.onclick = () => selectLetter(div);
                    gridElement.appendChild(div);
                }
            }
        }

        function selectLetter(el) {
            if (el.classList.contains('found')) return;

            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                currentSelection = currentSelection.filter(item => item !== el);
            } else {
                el.classList.add('selected');
                currentSelection.push(el);
            }

            checkSelection();
        }

        function checkSelection() {
            const formedWord = currentSelection.map(el => el.innerText).join('');
            
            // Como é para o 1º ano, vamos verificar se as letras selecionadas 
            // contêm todas as letras da palavra na ordem certa ou apenas se são as corretas
            if (formedWord === selectedWord) {
                currentSelection.forEach(el => {
                    el.classList.remove('selected');
                    el.classList.add('found');
                });
                
                points += 10;
                document.getElementById('points-label').innerText = points;
                document.getElementById('hint-name').innerText = selectedWord;

                setTimeout(() => {
                    currentRound++;
                    loadRound();
                }, 1000);
            }
        }

        function finalizarJogo() {
            clearInterval(timerInterval);
            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <h2 style="color:var(--primary-blue); font-size:2rem; margin-bottom:20px;">${JOGO_CONFIG.relatorio.titulo}</h2>
                    <p style="font-size:1.2rem; margin-bottom:10px;">${JOGO_CONFIG.relatorio.pontosTotal} ${points} pontos</p>
                    <p style="font-size:1.2rem; margin-bottom:30px;">${JOGO_CONFIG.relatorio.tempoTotal} ${document.getElementById('timer-val').innerText}</p>
                    <button onclick="location.reload()" class="btn-jogar" style="max-width:200px; margin:0 auto;">REPETIR</button>
                </div>
            `;
        }

        window.onload = () => {
            const pathI = JOGO_CONFIG.caminhoIcons;
            const pathImg = JOGO_CONFIG.caminhoImg;
            const icons = JOGO_CONFIG.iconesMenu;
            
            document.getElementById('header-icon').src = pathI + icons.ano1;
            document.getElementById('intro-img').src = pathI + icons.ano1;
            document.getElementById('status-rd-img').src = pathImg + "rd.png";
            document.getElementById('intro-rd-img').src = pathImg + "rd.png";

            const menuBox = document.getElementById('dropdownMenu');
            const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
            const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];
            
            menuKeys.forEach((key, i) => {
                const a = document.createElement('a');
                a.className = 'custom-menu-item';
                a.href = JOGO_CONFIG.links[key];
                a.innerHTML = `<img src="${pathI}${icons[key]}" style="height:20px;"><span>${menuLabels[i]}</span>`;
                menuBox.appendChild(a);
            });

            const rdBox = document.getElementById('rdDropdownMenu');
            ['Nível 1', 'Nível 2', 'Nível 3'].forEach(nv => {
                const div = document.createElement('div');
                div.className = 'custom-menu-item';
                div.innerHTML = `<span>${nv}</span>`;
                rdBox.appendChild(div);
            });

            atualizarProgressao(totalRounds, 0);
        };
    </script>
</body>
</html>
