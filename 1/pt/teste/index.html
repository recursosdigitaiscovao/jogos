<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #e9f0f8;
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8;
            --white: #ffffff;
            --outer-shadow: 0px 0px 25px #b0c4d9, 0px 0px 25px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* 1. HEADER */
        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; flex-shrink: 0; z-index: 1000;
        }
        
        .header-left, .header-right { display: flex; align-items: center; min-width: 80px; }
        .header-right { justify-content: flex-end; }

        /* AJUSTE: HOVER NO MENU */
        .hamburger-btn { 
            font-size: 26px; 
            color: var(--primary-blue); 
            cursor: pointer; 
            transition: transform 0.2s, color 0.2s;
            padding: 5px;
        }
        .hamburger-btn:hover { 
            color: var(--primary-dark); 
            transform: scale(1.1); 
        }
        .hamburger-btn:active { transform: scale(0.9); }

        .header-center { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: var(--primary-blue); font-weight: 900; font-size: 1.2rem;
        }
        .header-center img { height: 30px; }

        .btn-voltar { 
            background: var(--primary-blue); color: white; padding: 8px 16px; 
            border-radius: 12px; text-decoration: none; font-weight: 900; 
            font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark);
            transition: background 0.2s;
        }
        .btn-voltar:hover { background: var(--primary-dark); }

        /* 2. WRAPPER - Adaptado para ecrãs verticais */
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 10px; /* Reduzido para ganhar espaço em mobile */
            overflow: hidden;
            min-height: 0;
        }

        .game-card { 
            background: var(--bg-page); 
            width: 100%; 
            max-width: 900px; 
            height: 100%; 
            border-radius: 30px; /* Ligeiramente menor para mobile */
            box-shadow: var(--outer-shadow); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        /* STATUS AREA */
        .status { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px; 
        }
        .status-right { display: flex; align-items: center; gap: 12px; }
        .rd-icon-btn { height: 24px; cursor: pointer; transition: opacity 0.2s; }
        .rd-icon-btn:hover { opacity: 0.8; }

        /* MAIN */
        main { 
            flex: 1; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            min-height: 0; 
            position: relative;
        }

        /* INTRO OVERLAY */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-page); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .intro-actions { display: flex; align-items: center; gap: 20px; margin-top: 10px; }

        .btn-jogar {
            padding: 15px 40px; background: var(--primary-blue); 
            color: white; border: none; border-radius: 20px; 
            font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 var(--primary-dark); 
            font-size: 1.1rem; transition: transform 0.1s, background 0.2s;
        }
        .btn-jogar:hover { background: var(--primary-dark); }
        .btn-jogar:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--primary-dark); }

        .rd-intro-btn {
            height: 50px; width: 50px; background: white; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--outer-shadow); cursor: pointer;
            transition: transform 0.2s;
        }
        .rd-intro-btn:hover { transform: scale(1.05); }
        .rd-intro-btn img { height: 30px; }

        /* FOOTER - Ajustado para ecrãs verticais */
        footer {
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #8899aa; 
            font-size: 0.85rem; 
            font-weight: 400; 
            flex-shrink: 0;
            padding-bottom: 5px;
        }

        .menu-dropdown { 
            position: absolute; top: 60px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .custom-menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 18px; box-shadow: 4px 4px 10px #c5d4e3; 
            cursor: pointer; min-width: 180px; text-decoration: none; color: #555;
            font-weight: 400; transition: background 0.2s;
        }
        .custom-menu-item:hover { background: #f0f7ff; }

        /* AJUSTES PARA ECRÃS MUITO PEQUENOS (VERTICAL) */
        @media (max-height: 650px) {
            .header-center span { display: none; }
            #intro-img { height: 60px !important; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" title="Menu" onclick="toggleMenu('dropdownMenu', event)"></i>
            <div class="menu-dropdown" id="dropdownMenu"></div>
        </div>
        <div class="header-center">
            <img id="header-icon" src="" alt="">
            <span>1º Ano</span>
        </div>
        <div class="header-right">
            <a href="../../index.html" class="btn-voltar">VOLTAR</a>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-card">
            
            <section class="status">
                <div class="status-timer">⏳ 00:00</div>
                <div id="dots-container" style="display:flex; gap:5px;"></div>
                <div class="status-right">
                    <div style="font-weight: 900; color: var(--primary-blue);"><span id="points-label">0</span></div>
                    <img id="status-rd-img" class="rd-icon-btn" src="" alt="RD">
                </div>
            </section>

            <div id="intro-overlay">
                <img id="intro-img" src="" style="height:80px; margin-bottom:20px;">
                <h1 style="color:var(--primary-blue); font-weight:900; margin-bottom:25px;">Título do Jogo</h1>
                
                <div class="intro-actions">
                    <button onclick="mostrarJogo()" class="btn-jogar">JOGAR</button>
                    <div class="rd-intro-btn">
                        <img id="intro-rd-img" src="" alt="RD">
                    </div>
                </div>
            </div>

            <main id="game-area"></main>
        </div>
    </div>

    <!-- Visível no ecrã inicial -->
    <footer id="main-footer">2026</footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(menuId, e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById(menuId);
            const isVisible = menu.style.display === 'flex';
            menu.style.display = isVisible ? 'none' : 'flex';
        }

        window.onclick = () => {
            document.getElementById('dropdownMenu').style.display = 'none';
        };

        function mostrarJogo() {
            // Esconde a intro
            document.getElementById('intro-overlay').style.display = 'none';
            // Mostra o jogo
            document.getElementById('game-area').style.display = 'flex';
            // ESCONDE O FOOTER no 2º ecrã
            document.getElementById('main-footer').style.display = 'none';
        }

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const pathI = JOGO_CONFIG.caminhoIcons;
                const pathImg = JOGO_CONFIG.caminhoImg;
                const icons = JOGO_CONFIG.iconesMenu;
                
                document.getElementById('header-icon').src = pathI + icons.ano1;
                document.getElementById('intro-img').src = pathI + icons.ano1;
                document.getElementById('status-rd-img').src = pathImg + "rd.png";
                document.getElementById('intro-rd-img').src = pathImg + "rd.png";

                const menuKeys = ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'];
                const menuLabels = ['Início', 'Pré', '1º Ano', '2º Ano', '3º Ano', '4º Ano'];
                const menuBox = document.getElementById('dropdownMenu');
                
                menuKeys.forEach((key, i) => {
                    const a = document.createElement('a');
                    a.className = 'custom-menu-item';
                    a.href = JOGO_CONFIG.links[key] || '#';
                    a.innerHTML = `<img src="${pathI}${icons[key]}" style="height:20px;"><span>${menuLabels[i]}</span>`;
                    menuBox.appendChild(a);
                });
            }
        };
    </script>
</body>
</html>
