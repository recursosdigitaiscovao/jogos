<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequenos Leitores</title>
    <link rel="stylesheet" href="style.css"> <!-- O teu CSS com as tuas cores -->
</head>
<body>

    <!-- 1. MENU DE NAVEGAÇÃO SUPERIOR (Home, Ano 1, 2, 3, 4) -->
    <nav class="navbar">
        <div id="container-nav-icons" class="nav-icons">
            <!-- Gerado pelo jogo.js -->
        </div>
    </nav>

    <!-- 2. CABEÇALHO DO JOGO -->
    <header class="game-header">
        <div class="header-top">
            <a href="javascript:void(0)" id="btn-voltar" class="btn-voltar-estilo">
                <!-- Texto do botão virá dos dados -->
            </a>
        </div>
        <div class="header-titulos">
            <h1 id="txt-titulo1"></h1>
            <h2 id="txt-titulo2"></h2>
            <p id="txt-subtitulo"></p>
        </div>
    </header>

    <!-- 3. CONTEÚDO DINÂMICO (Menu de Categorias / Jogo / Relatório) -->
    <main id="ecra-jogo">
        <!-- O jogo.js vai "escrever" aqui dentro -->
    </main>

    <!-- 4. RODAPÉ -->
    <footer class="game-footer">
        <div id="txt-rodape"></div>
    </footer>

    <!-- SCRIPTS -->
    <script src="dados.js"></script>
    <script src="jogo.js"></script>
</body>
</html>
