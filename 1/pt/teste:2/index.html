<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequenos Leitores - Jogo Educativo</title>
    <link rel="stylesheet" href="style.css"> <!-- O teu CSS aqui -->
</head>
<body>

    <div id="app">
        <!-- CABEÇALHO DO TEMPLATE -->
        <header id="main-header">
            <div class="header-container">
                <button id="btn-voltar" class="btn-top">
                    <!-- O texto virá de JOGO_CONFIG.textoVoltar -->
                </button>
                
                <div class="titulos-jogo">
                    <h1 id="titulo-linha1"></h1>
                    <h2 id="titulo-linha2"></h2>
                    <p id="subtitulo-jogo"></p>
                </div>
            </div>
        </header>

        <!-- CONTAINER PRINCIPAL (Onde o jogo acontece) -->
        <main id="game-screen">
            <!-- Este container será limpo e preenchido pelo jogo.js para mostrar:
                 1. O Menu de Categorias
                 2. A Área de Jogo 
                 3. O Relatório Final -->
        </main>

        <!-- RODAPÉ DO TEMPLATE -->
        <footer id="main-footer">
            <div id="texto-rodape"></div>
        </footer>
    </div>

    <!-- CARREGAMENTO DOS SCRIPTS -->
    <!-- Primeiro os dados, depois a lógica do jogo -->
    <script src="dados.js"></script>
    <script src="jogo.js"></script>
</body>
</html>
