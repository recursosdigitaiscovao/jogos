<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Corta-Sílabas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-page: #e9f0f8; 
            --primary-blue: #5ba4e5; 
            --primary-dark: #3d7db8; 
            --highlight-green: #7ed321; 
            --error-red: #ff5e5e; 
            --white: #ffffff; 
            --text-grey: #5d7082;
            --header-height: 70px;
            --footer-height: 45px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-page); 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            font-size: 16px;
        }

        /* HEADER RESPONSIVO */
        header { 
            height: var(--header-height); 
            display: grid;
            grid-template-columns: 50px 1fr 50px; /* Layout em grelha para evitar sobreposições */
            align-items: center; 
            padding: 0 1rem; 
            background: #f0f7ff; 
            z-index: 1000; 
            flex-shrink: 0; 
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
        }

        .header-left { display: flex; align-items: center; }
        
        .logo-center { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px; 
            text-align: center;
        }
        .logo-center img { height: clamp(35px, 8vw, 48px); width: auto; }
        .logo-text h1 { font-size: clamp(0.8rem, 4vw, 1.1rem); color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 1; }
        .logo-text p { font-size: 0.6rem; color: #88a; font-weight: 700; }

        .header-right { display: flex; justify-content: flex-end; }

        /* MENU HAMBURGER */
        .hamburger-btn { font-size: 1.75rem; color: var(--primary-blue); cursor: pointer; padding: 10px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        
        .menu-dropdown { 
            position: absolute; 
            top: 75px; 
            left: 15px; 
            display: none; 
            flex-direction: column; 
            gap: 6px; 
            z-index: 2000; 
            width: calc(100% - 30px);
            max-width: 250px;
        }
        .menu-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 12px 16px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1); 
            text-decoration: none; 
            color: var(--text-grey); 
            font-weight: 700; 
            font-size: 0.9rem; 
            min-height: 48px;
        }

        /* CONTAINER DO JOGO */
        .game-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px; 
            overflow: hidden; 
            position: relative;
        }

        .game-card { 
            background: #f0f7ff; 
            width: 100%; 
            max-width: 1000px; 
            height: 100%; 
            max-height: 800px; /* Limita altura em ecrãs gigantes */
            border-radius: clamp(20px, 5vw, 40px); 
            box-shadow: 0 15px 35px rgba(176,196,217,0.5); 
            display: flex; 
            flex-direction: column; 
            padding: clamp(10px, 4vw, 25px); 
            position: relative;
            overflow-y: auto; /* Permite scroll interno se o conteúdo crescer demais */
        }

        /* STATUS BAR */
        .status-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 15px; flex-shrink: 0; }
        .dots-container { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #d0e0f0; }

        /* TELAS (SCREENS) */
        .screen { 
            flex: 1; 
            display: none; 
            width: 100%; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 20px;
        }
        .screen.active { display: flex; }

        /* ELEMENTOS DO INTRO */
        #intro-animation-container { width: 100%; max-width: 250px; height: auto; }
        #intro-instr { font-size: clamp(0.9rem, 4vw, 1.1rem); line-height: 1.4; padding: 0 10px; }

        /* BOTOES E AÇÕES */
        .action-container { 
            width: 100%;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 12px; 
            margin-top: auto;
            padding-top: 15px;
        }

        .btn-jogar-stretch { 
            width: 100%;
            max-width: 400px;
            background: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            padding: 16px 20px; 
            font-size: 1.2rem; 
            font-weight: 900; 
            cursor: pointer; 
            box-shadow: 0 5px 0 var(--primary-dark); 
            transition: transform 0.1s; 
            text-align: center; 
            text-decoration: none;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-jogar-stretch:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--primary-dark); }

        #rd-intro-btn { height: 55px; width: 55px; object-fit: contain; cursor: pointer; }

        /* PAINEL TEMA (RD) */
        .rd-panel { 
            position: fixed; 
            bottom: -100%; 
            left: 0; 
            width: 100%; 
            background: white; 
            z-index: 2100; 
            padding: 20px; 
            border-radius: 30px 30px 0 0; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15); 
            max-height: 85vh; 
            overflow-y: auto; 
        }
        .rd-panel.active { bottom: 0; }
        #rd-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; 
            padding-bottom: 20px;
        }

        /* FOOTER */
        footer { height: var(--footer-height); display: none; align-items: center; justify-content: center; color: #89a; font-size: 0.7rem; font-weight: 700; text-align: center; padding: 0 10px; }

        /* MEDIA QUERIES E AJUSTES DE RESOLUÇÃO */
        
        /* TABLETS (481px a 1024px) */
        @media (min-width: 481px) {
            .action-container { flex-direction: row; justify-content: center; }
            .btn-jogar-stretch { width: auto; min-width: 250px; }
            .logo-text h1 { font-size: 1.2rem; }
            .logo-text p { font-size: 0.75rem; }
            header { grid-template-columns: 1fr auto 1fr; padding: 0 2rem; }
        }

        /* DESKTOP (Acima de 1024px) */
        @media (min-width: 1025px) {
            .game-card { padding: 40px; }
            .logo-text h1 { font-size: 1.4rem; }
            .btn-jogar-stretch:hover { filter: brightness(1.05); }
        }

        /* ORIENTAÇÃO LANDSCAPE EM TELEMÓVEIS (Evita quebrar o layout) */
        @media (max-height: 500px) and (orientation: landscape) {
            header { height: 50px; }
            .logo-center img { height: 30px; }
            .logo-text p { display: none; }
            .game-card { border-radius: 15px; padding: 10px; }
            #intro-animation-container { max-width: 120px; }
            .screen { gap: 10px; }
        }

        /* UTILITÁRIOS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; backdrop-filter: blur(2px); }
        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 8px 16px; border-radius: 12px; text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; box-shadow: 0 4px 0 var(--primary-dark); }
        
        @media (max-width: 650px) { 
            .header-right .btn-voltar-header { display: none; } 
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    
    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)" aria-label="Menu"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="" alt="Logo">
            <div class="logo-text">
                <h1 id="tit-l1"></h1>
                <h1 id="tit-l2"></h1>
                <p id="sub-tit"></p>
            </div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar-header" class="btn-voltar-header">
                <img id="header-back-icon" src="" width="16" alt=""> <span id="txt-voltar-header"></span>
            </a>
        </div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <!-- Barra de Status (Tempo, Pontos, etc) -->
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:var(--text-grey); font-size:14px;">⏳ 00:00</div>
                <div class="dots-container" id="dots-container"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:32px; width:32px; cursor:pointer;" onclick="openRDMenu(event)" alt="Temas">
                </div>
            </div>

            <h2 id="main-game-title" style="text-align:center; color:var(--primary-blue); font-weight:900; font-size: clamp(1.2rem, 5vw, 1.8rem); margin-bottom: 10px;">---</h2>

            <!-- Tela de Introdução -->
            <section class="screen active" id="scr-intro">
                <div id="intro-animation-container"></div>
                <p id="intro-instr" style="font-weight:800; color:var(--text-grey); text-align:center; max-width:450px;"></p>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" onclick="openRDMenu(event)" alt="Escolher Tema">
                </div>
            </section>

            <!-- Tela de Jogo Principal -->
            <section class="screen" id="scr-game">
                <div id="game-main-content" style="width:100%; flex:1; display:flex; align-items:center; justify-content:center;"></div>
            </section>

            <!-- Tela de Resultados -->
            <section class="screen" id="scr-result">
                <img id="res-taca" style="width:clamp(80px, 20vw, 110px); margin-bottom:10px;">
                <h2 id="res-tit" style="font-size:clamp(1.5rem, 6vw, 2rem); color: var(--primary-blue); font-weight:900; text-align:center;"></h2>
                
                <div style="display:flex; gap:12px; margin: 10px 0;">
                    <div style="background:white; padding:15px; border-radius:15px; text-align:center; min-width:100px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
                        <span id="res-pts" style="font-size:24px; font-weight:900; color:var(--primary-blue);">0</span><br>
                        <small style="font-weight:700; color:#88a;">PONTOS</small>
                    </div>
                    <div style="background:white; padding:15px; border-radius:15px; text-align:center; min-width:100px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
                        <span id="res-tim" style="font-size:24px; font-weight:900; color:var(--primary-blue);">00:00</span><br>
                        <small style="font-weight:700; color:#88a;">TEMPO</small>
                    </div>
                </div>

                <div class="action-container" style="max-width:400px;">
                    <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                    <button class="btn-jogar-stretch" style="background:white; color:var(--primary-blue); border:2px solid var(--primary-blue); box-shadow:none;" onclick="openRDMenu(event)">OUTRA CATEGORIA</button>
                    <a href="#" id="btn-outro-jogo" class="btn-jogar-stretch" style="background:#cbd9e6; color:#445; box-shadow:none; font-size: 0.9rem;">OUTRO JOGO</a>
                </div>
            </section>
        </div>
    </main>

    <footer id="mainFooter"></footer>

    <!-- Menu de Seleção de Temas -->
    <div id="rdMenu" class="rd-panel">
        <div style="width:50px; height:6px; background:#eee; border-radius:10px; margin: 0 auto 20px; cursor:pointer;" onclick="closeMenus()"></div>
        <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:20px; font-weight: 900; font-size: 1.4rem;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <!-- Scripts de Lógica (Preservados) -->
    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
    function initUI() {
        const conf = JOGO_CONFIG;
        document.getElementById('tit-l1').innerText = conf.textos.tituloLinha1;
        document.getElementById('tit-l2').innerText = conf.textos.tituloLinha2;
        document.getElementById('sub-tit').innerText = conf.textos.subtitulo;
        document.getElementById('main-game-title').innerText = conf.nomeJogo;
        document.getElementById('intro-instr').innerText = conf.textos.instrucao;
        document.getElementById('mainFooter').innerHTML = conf.textos.rodape;
        document.getElementById('mainFooter').style.display = 'flex';
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu.ano1;
        document.getElementById('header-back-icon').src = conf.caminhoIcons + "voltar.png";
        document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
        document.getElementById('link-voltar-header').href = conf.linkVoltar;
        document.getElementById('btn-outro-jogo').href = conf.linkVoltar;
        document.getElementById('rd-intro-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
        
        const menuBox = document.getElementById('dropdownMenu');
        menuBox.innerHTML = '';
        ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}" width="24" height="24"><span>${k==='home'?'Início':k.replace('ano',' ')+'º Ano'}</span>`;
            menuBox.appendChild(a);
        });
        const div = document.createElement('div'); div.className = 'menu-divider'; menuBox.appendChild(div);
        const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = conf.linkVoltar;
        btnV.style.background = "var(--primary-blue)"; btnV.style.color = "white";
        btnV.innerHTML = `<img src="${conf.caminhoIcons}voltar.png" style="filter:brightness(0) invert(1)" width="20"> <span>${conf.textoVoltar}</span>`;
        menuBox.appendChild(btnV);
        if(window.startLogic) window.startLogic();
    }

    function goToGame() {
        document.getElementById('scr-result').classList.remove('active');
        document.getElementById('scr-intro').classList.remove('active');
        document.getElementById('scr-game').classList.add('active');
        document.getElementById('status-bar').style.display = 'flex';
        document.getElementById('main-game-title').style.display = 'none';
        document.getElementById('mainFooter').style.display = 'none';
        if(window.initGame) window.initGame();
    }

    function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    function openRDMenu(e) { e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    window.onload = initUI;
    </script>
</body>
</html>
