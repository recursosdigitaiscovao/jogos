<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Corta-Sílabas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-page: #e9f0f8; 
            --primary-blue: #5ba4e5; 
            --primary-dark: #3d7db8; 
            --white: #ffffff; 
            --text-grey: #5d7082;
            --shadow-soft: 0 10px 25px rgba(176, 196, 217, 0.5);
            --header-h: 70px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-page); 
            height: 100dvh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column; 
        }

        /* --- HEADER & LOGO --- */
        header { 
            height: var(--header-h); background: #f0f7ff; 
            display: grid; grid-template-columns: 60px 1fr 60px; align-items: center;
            padding: 0 15px; z-index: 1000; box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.3);
            position: relative;
        }

        .header-left { display: flex; align-items: center; }
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; transition: 0.2s; }
        .hamburger-btn:hover { transform: scale(1.1); }

        .logo-center { display: flex; align-items: center; justify-content: center; gap: 10px; pointer-events: none; }
        .logo-center img { height: clamp(35px, 10vw, 48px); width: auto; }
        .logo-text h1 { font-size: clamp(0.85rem, 4vw, 1.1rem); color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: clamp(0.6rem, 2.5vw, 0.7rem); color: #88a; font-weight: 700; }

        .header-right { display: flex; justify-content: flex-end; }
        .btn-voltar-header { 
            background: var(--primary-blue); color: white; padding: 8px 15px; border-radius: 12px; 
            text-decoration: none; font-weight: 900; font-size: 13px; display: flex; align-items: center; 
            gap: 8px; box-shadow: 0 4px 0 var(--primary-dark); transition: 0.2s;
        }
        .btn-voltar-header:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--primary-dark); }

        /* --- MENU DROPDOWN (HAMBURGUER) --- */
        .menu-dropdown { 
            position: absolute; top: 75px; left: 15px; display: none; 
            flex-direction: column; gap: 8px; z-index: 2000; width: 250px;
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
            background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* Efeito Hover nos itens normais */
        .menu-item:not(.menu-item-voltar):hover {
            background: var(--primary-blue); color: white !important;
            transform: translateX(10px);
        }
        .menu-item:hover img { filter: brightness(0) invert(1); }
        .menu-item img { width: 22px; height: 22px; object-fit: contain; }

        /* Estilo especial para o Voltar dentro do Menu */
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }
        .menu-item-voltar:hover { 
            background: white !important; color: var(--primary-blue) !important; 
            transform: translateX(10px); border: 2px solid var(--primary-blue);
        }
        .menu-item-voltar:hover img { filter: none; }

        /* --- GAME LAYOUT --- */
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { 
            background: #f0f7ff; width: 100%; max-width: 900px; height: 100%; max-height: 750px;
            border-radius: clamp(20px, 8vw, 40px); box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column; padding: clamp(15px, 4vw, 30px); position: relative;
        }

        .status-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .dots-container { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #d0e0f0; }
        .dot.active { background: var(--primary-blue); transform: scale(1.2); }

        /* --- SCREENS --- */
        .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; }
        .screen.active { display: flex; }

        /* --- BOTAO JOGAR (EXPANSIVEL & PULSANTE) --- */
        @keyframes bounce-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .action-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: auto; }
        
        .btn-jogar-stretch { 
            width: 100%; max-width: 320px; background: var(--primary-blue); color: white;
            border: none; border-radius: 20px; padding: 16px 25px; font-size: 1.25rem; font-weight: 900;
            box-shadow: 0 6px 0 var(--primary-dark); cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            animation: bounce-pulse 2s infinite ease-in-out; transition: 0.2s;
        }
        .btn-jogar-stretch:hover { 
            transform: scale(1.1); animation: none; 
            background: #6ab5f2; box-shadow: 0 8px 0 var(--primary-dark);
        }
        .btn-jogar-stretch:active { transform: scale(0.95); box-shadow: 0 2px 0 var(--primary-dark); }

        /* --- RD PANEL --- */
        .rd-panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2100;
            padding: 25px; border-radius: 30px 30px 0 0; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15); max-height: 80vh; overflow-y: auto;
        }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 1500; backdrop-filter: blur(3px); }

        footer { height: 45px; display: none; align-items: center; justify-content: center; color: #89a; font-size: 11px; font-weight: 700; }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 650px) {
            .btn-voltar-header { display: none; }
        }
        @media (min-width: 768px) {
            .action-container { flex-direction: row; justify-content: center; }
            .btn-jogar-stretch { width: 280px; }
        }
        @media (max-height: 500px) and (orientation: landscape) {
            header { height: 50px; }
            .logo-center img { height: 30px; }
            .game-card { padding: 10px; border-radius: 15px; }
            .screen { gap: 10px; }
            .btn-jogar-stretch { padding: 10px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    
    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="" alt="Logo">
            <div class="logo-text">
                <h1 id="tit-l1"></h1>
                <h1 id="tit-l2"></h1>
                <p id="sub-tit"></p>
            </div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar-header" class="btn-voltar-header">
                <img id="header-back-icon" src="" width="16"> <span id="txt-voltar-header"></span>
            </a>
        </div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div id="timer" style="font-weight:900; color:var(--text-grey); font-size:14px;">⏳ 00:00</div>
                <div class="dots-container" id="dots-container"></div>
                <div style="font-weight:900; color:var(--primary-blue); display:flex; align-items:center; gap:8px;">
                    <span id="score-val">0</span>
                    <img id="rd-game-btn" src="" style="height:28px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>

            <h2 id="main-game-title" style="color:var(--primary-blue); font-weight:900; font-size: clamp(1.2rem, 5vw, 1.6rem);">---</h2>

            <!-- INTRO -->
            <section class="screen active" id="scr-intro">
                <div id="intro-animation-container" style="width:100%; max-width:250px;"></div>
                <p id="intro-instr" style="font-weight:800; color:var(--text-grey); max-width:400px; font-size: 1.1rem;"></p>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" style="height:60px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </section>

            <!-- GAME -->
            <section class="screen" id="scr-game">
                <div id="game-main-content" style="width:100%; flex:1; display:flex; align-items:center; justify-content:center;"></div>
            </section>

            <!-- RESULT -->
            <section class="screen" id="scr-result">
                <img id="res-taca" style="width:100px; margin-bottom:5px;">
                <h2 id="res-tit" style="font-size:1.8rem; color: var(--primary-blue); font-weight:900;"></h2>
                <div style="display:flex; gap:15px;">
                    <div style="background:white; padding:15px; border-radius:15px; min-width:90px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <span id="res-pts" style="font-size:22px; font-weight:900; color:var(--primary-blue);">0</span><br><small>PONTOS</small>
                    </div>
                    <div style="background:white; padding:15px; border-radius:15px; min-width:90px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <span id="res-tim" style="font-size:22px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small>TEMPO</small>
                    </div>
                </div>
                <div class="action-container" style="max-width:350px;">
                    <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                    <button class="btn-jogar-stretch" style="background:white; color:var(--primary-blue); border:2px solid var(--primary-blue); box-shadow:none;" onclick="openRDMenu(event)">TEMAS</button>
                    <a href="#" id="btn-outro-jogo" class="btn-jogar-stretch" style="background:#cbd9e6; color:#445; box-shadow:none; font-size: 0.9rem;">OUTRO JOGO</a>
                </div>
            </section>
        </div>
    </main>

    <footer id="mainFooter"></footer>

    <div id="rdMenu" class="rd-panel">
        <div style="width:40px; height:5px; background:#eee; border-radius:10px; margin: 0 auto 15px; cursor:pointer;" onclick="closeMenus()"></div>
        <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:15px; font-weight:900;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
    function initUI() {
        const conf = JOGO_CONFIG;
        document.getElementById('tit-l1').innerText = conf.textos.tituloLinha1;
        document.getElementById('tit-l2').innerText = conf.textos.tituloLinha2;
        document.getElementById('sub-tit').innerText = conf.textos.subtitulo;
        document.getElementById('main-game-title').innerText = conf.nomeJogo;
        document.getElementById('intro-instr').innerText = conf.textos.instrucao;
        document.getElementById('mainFooter').innerHTML = conf.textos.rodape;
        document.getElementById('mainFooter').style.display = 'flex';
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu.ano1;
        document.getElementById('header-back-icon').src = conf.caminhoIcons + "voltar.png";
        document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
        document.getElementById('link-voltar-header').href = conf.linkVoltar;
        document.getElementById('btn-outro-jogo').href = conf.linkVoltar;
        document.getElementById('rd-intro-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
        
        const menuBox = document.getElementById('dropdownMenu');
        menuBox.innerHTML = '';
        ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}"><span>${k==='home'?'Início':k.replace('ano',' ')+'º Ano'}</span>`;
            menuBox.appendChild(a);
        });
        
        const btnV = document.createElement('a'); 
        btnV.className = 'menu-item menu-item-voltar'; 
        btnV.href = conf.linkVoltar;
        btnV.innerHTML = `<img src="${conf.caminhoIcons}voltar.png"> <span>${conf.textoVoltar}</span>`;
        menuBox.appendChild(btnV);
        
        if(window.startLogic) window.startLogic();
    }

    function goToGame() {
        document.getElementById('scr-result').classList.remove('active');
        document.getElementById('scr-intro').classList.remove('active');
        document.getElementById('scr-game').classList.add('active');
        document.getElementById('status-bar').style.display = 'flex';
        document.getElementById('main-game-title').style.display = 'none';
        document.getElementById('mainFooter').style.display = 'none';
        if(window.initGame) window.initGame();
    }

    function toggleHamburger(e) { 
        e.stopPropagation(); 
        const m = document.getElementById('dropdownMenu'); 
        const isOpen = m.style.display === 'flex';
        m.style.display = isOpen ? 'none' : 'flex'; 
        document.getElementById('overlay').style.display = isOpen ? 'none' : 'block';
    }

    function openRDMenu(e) { 
        e.stopPropagation(); 
        document.getElementById('rdMenu').classList.add('active'); 
        document.getElementById('overlay').style.display = 'block'; 
    }

    function closeMenus() { 
        document.getElementById('rdMenu').classList.remove('active'); 
        document.getElementById('dropdownMenu').style.display = 'none'; 
        document.getElementById('overlay').style.display = 'none'; 
    }
    
    window.onload = initUI;
    </script>
</body>
</html>
