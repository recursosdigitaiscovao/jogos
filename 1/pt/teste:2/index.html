<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contar Sílabas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-page: #e9f0f8; --primary-blue: #5ba4e5; --primary-dark: #3d7db8; 
            --highlight-green: #7ed321; --error-red: #ff5e5e; --white: #ffffff; 
            --text-grey: #5d7082; --header-h: 70px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-page); height: 100dvh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column; 
        }

        /* --- HEADER --- */
        header { 
            height: var(--header-h); background: #f0f7ff; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 2500; flex-shrink: 0;
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4); position: relative;
        }
        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 48px; width: auto; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 9px; color: #88a; font-weight: 700; }

        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; position: relative; z-index: 2601; }
        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 7px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 0 var(--primary-dark); }
        .btn-voltar-mobile { display: none; text-decoration: none; padding: 5px; position: relative; z-index: 2601; }
        .btn-voltar-mobile img { height: 32px; width: auto; display: block; }

        /* --- MENUS --- */
        .menu-dropdown { position: absolute; top: 65px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 2600; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.85rem; min-width: 180px; transition: background 0.2s; border: 2px solid transparent; }
        .menu-item:not(.menu-item-voltar):hover { background: var(--primary-blue); }
        .menu-item img { height: 20px; width: 20px; object-fit: contain; }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .menu-item-voltar img { filter: brightness(0) invert(1); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 1500; }

        /* --- GAME CONTAINER --- */
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; z-index: 1; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 1000px; height: 100%; border-radius: 40px; box-shadow: 0 15px 35px rgba(176,196,217,0.5); display: flex; flex-direction: column; padding: 15px; position: relative; overflow: hidden; }

        /* --- STATUS BAR --- */
        .status-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-shrink: 0; gap: 10px; }
        .status-group { display: flex; align-items: center; gap: 8px; }
        .badge { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 12px; font-weight: 900; font-size: 13px; color: white; min-width: 65px; justify-content: center; }
        .badge-timer { background: #cbd9e6; color: var(--text-grey); min-width: 80px; }
        .badge-round { background: var(--primary-blue); box-shadow: 0 3px 0 var(--primary-dark); }
        .badge-hit { background: var(--highlight-green); box-shadow: 0 3px 0 #6ab51c; }
        .badge-miss { background: var(--error-red); box-shadow: 0 3px 0 #e04a4a; }

        .dots-container { display: flex; gap: 6px; justify-content: center; width: 100%; margin-bottom: 8px; flex-shrink: 0; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #d0e0f0; transition: 0.3s; }
        .dot.active { background: var(--primary-blue); transform: scale(1.3); }

        /* --- ÁREA DE JOGO --- */
        #game-main-content {
            flex: 1; width: 100%; background: var(--white);
            border: 3px dashed rgba(91, 164, 229, 0.4);
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            padding: clamp(10px, 3vw, 20px); box-shadow: inset 0 2px 10px rgba(0,0,0,0.03);
            position: relative; overflow: hidden;
        }

        /* --- SCREENS --- */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; flex: 1; }
        .screen.active { display: flex !important; }
        #scr-intro { justify-content: center; }
        #intro-instr { font-weight: 800; color: var(--text-grey); text-align: center; max-width: 400px; margin-bottom: 20px; padding: 0 10px; }

        /* --- BOTÕES --- */
        .action-container { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-top: auto; padding-bottom: 5px; flex-shrink: 0; }
        .btn-jogar-stretch { flex: 1; background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); transition: all 0.1s ease; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; user-select: none; }
        .btn-jogar-stretch:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--primary-dark); }
        #rd-intro-btn { flex-shrink: 0; height: 55px; cursor: pointer; }

        /* --- RESULTADOS --- */
        .res-badge-group { display: flex; gap: 12px; margin-bottom: 20px; }
        .res-badge { background: white; padding: 10px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-width: 110px; }
        .res-badge span { font-size: 22px; font-weight: 900; color: var(--primary-blue); }
        .res-badge small { display: block; font-weight: 900; color: #88a; }

        /* --- RD PANEL --- */
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 3000; padding: 25px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .rd-item { background: #f8f9fa; border: 2px solid #eef5ff; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .rd-item img { width: 60px; height: 60px; object-fit: contain; }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 650px) { .btn-voltar-header { display: none !important; } .btn-voltar-mobile { display: flex; align-items: center; } .logo-text p, .dots-container { display: none; } .badge { min-width: 55px; padding: 4px 8px; font-size: 11px; } }
        @media (max-height: 500px) and (orientation: landscape) { header { display: none !important; } .game-card { border-radius: 15px; height: 98dvh; padding: 8px; } #game-main-content { border-radius: 10px; padding: 5px; } #main-game-title { display: none; } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    
    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        <div class="logo-center">
            <img id="head-logo" src="" alt="Logo">
            <div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div>
        </div>
        <div class="header-right">
            <a href="#" id="link-voltar-header" class="btn-voltar-header"><img id="header-back-icon" src="" width="16"> <span id="txt-voltar-header"></span></a>
            <a href="#" id="link-voltar-mobile" class="btn-voltar-mobile"><img id="header-back-mobile" src="" alt="Voltar"></a>
        </div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div class="status-group">
                    <div class="badge badge-timer">⏳ <span id="timer-val">00:00</span></div>
                    <div class="badge badge-round"><span id="round-val">1 / 10</span></div>
                </div>
                <div class="status-group">
                    <div class="badge badge-hit"><i class="fas fa-check"></i> <span id="hits-val">0</span></div>
                    <div class="badge badge-miss"><i class="fas fa-times"></i> <span id="miss-val">0</span></div>
                    <img id="rd-game-btn" src="" style="height:28px; cursor:pointer;" onclick="openRDMenu(event)">
                </div>
            </div>
            <div class="dots-container" id="dots-container"></div>
            <h2 id="main-game-title" style="text-align:center; color:var(--primary-blue); font-weight:900; font-size:24px; margin: 10px 0;">---</h2>

            <!-- ECRÃ 1: INTRO -->
            <section class="screen active" id="scr-intro">
                <div id="intro-animation-container" style="width:100%; display:flex; justify-content:center;"></div>
                <p id="intro-instr"></p>
                <div class="action-container">
                    <button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" onclick="openRDMenu(event)">
                </div>
            </section>

            <!-- ECRÃ 2: JOGO -->
            <section class="screen" id="scr-game">
                <div id="game-main-content"></div>
            </section>

            <!-- ECRÃ 3: RESULTADOS -->
            <section class="screen" id="scr-result">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
                    <img id="res-taca" style="width:110px; margin-bottom:10px;" src="">
                    <h2 id="res-tit" style="font-size:26px; color: var(--primary-blue); font-weight:900; margin-bottom:5px; text-align:center;"></h2>
                    <div class="res-badge-group">
                        <div class="res-badge"><span id="res-pts">0</span><small>ACERTOS</small></div>
                        <div class="res-badge"><span id="res-tim">00:00</span><small>TEMPO</small></div>
                    </div>
                    <div class="action-container" style="flex-direction: column; width: 100%; max-width: 400px; gap: 10px; padding:0;">
                        <button class="btn-jogar-stretch" onclick="location.reload()" style="width: 100%;">JOGAR DE NOVO</button>
                        
                        <!-- BOTÃO UNIFICADO TEMA / NÍVEL -->
                        <button class="btn-jogar-stretch" style="background:white; color:var(--primary-blue); border:2px solid var(--primary-blue); box-shadow:none; width: 100%; font-size:15px;" onclick="openRDMenu(event)">OUTRO TEMA / NÍVEL</button>
                        
                        <a href="#" id="btn-outro-jogo" class="btn-jogar-stretch" style="background:#cbd9e6; color:#445; box-shadow:none; border:none; width: 100%; font-size:14px;">ESCOLHER OUTRO JOGO</a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel">
        <div style="width:40px; height:4px; background:#eee; border-radius:10px; margin: 0 auto 15px;" onclick="closeMenus()"></div>
        <h3 style="text-align:center; color:var(--primary-blue); margin-bottom:15px; font-weight: 900;">Escolher Tema</h3>
        <div id="rd-list"></div>
    </div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
    function initUI() {
        const conf = JOGO_CONFIG;
        document.title = conf.nomeJogo;
        document.getElementById('main-game-title').innerText = conf.nomeJogo;
        document.getElementById('tit-l1').innerText = conf.textos.tituloLinha1;
        document.getElementById('tit-l2').innerText = conf.textos.tituloLinha2;
        document.getElementById('sub-tit').innerText = conf.textos.subtitulo;
        document.getElementById('intro-instr').innerText = conf.textos.instrucao;
        
        const pathIcons = conf.caminhoIcons;
        const pathImg = conf.caminhoImg;

        document.getElementById('head-logo').src = pathIcons + conf.iconesMenu.ano1;
        document.getElementById('header-back-icon').src = pathIcons + "voltar.png";
        document.getElementById('header-back-mobile').src = pathIcons + "voltar_az.png";
        document.getElementById('rd-intro-btn').src = pathImg + "rd.png";
        document.getElementById('rd-game-btn').src = pathImg + "rd.png";
        
        document.getElementById('link-voltar-header').href = conf.linkVoltar;
        document.getElementById('link-voltar-mobile').href = conf.linkVoltar;
        document.getElementById('btn-outro-jogo').href = conf.linkVoltar;
        document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
        
        const menuBox = document.getElementById('dropdownMenu');
        menuBox.innerHTML = '';
        ['home', 'pre', 'ano1', 'ano2', 'ano3', 'ano4'].forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${pathIcons}${conf.iconesMenu[k]}"><span>${k==='home'?'Início':k.replace('ano',' ')+'º Ano'}</span>`;
            menuBox.appendChild(a);
        });
        const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = conf.linkVoltar;
        btnV.innerHTML = `<img src="${pathIcons}voltar.png"> <span>${conf.textoVoltar}</span>`;
        menuBox.appendChild(btnV);

        const rdBox = document.getElementById('rd-list');
        rdBox.innerHTML = '';
        Object.keys(conf.categorias).forEach(key => {
            const cat = conf.categorias[key];
            const item = document.createElement('div');
            item.className = 'rd-item';
            item.innerHTML = `<img src="${pathImg}${cat.imgCapa}"><span>${cat.nome}</span>`;
            item.onclick = () => { if (window.selecionarCategoria) window.selecionarCategoria(key); closeMenus(); goToGame(); };
            rdBox.appendChild(item);
        });
        if(window.startLogic) window.startLogic();
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function goToGame() {
        switchScreen('scr-game');
        document.getElementById('status-bar').style.display = 'flex';
        document.getElementById('main-game-title').style.display = 'none';
        if(window.initGame) window.initGame();
    }

    window.mostrarResultados = function(acertos, tempo) {
        const conf = JOGO_CONFIG;
        let feedback = conf.relatorios.find(p => acertos >= p.min && acertos <= (p.max || 10));
        
        // Taças lidas da pasta Icons
        document.getElementById('res-taca').src = conf.caminhoIcons + feedback.img;
        document.getElementById('res-tit').innerText = feedback.titulo;
        document.getElementById('res-pts').innerText = acertos;
        document.getElementById('res-tim').innerText = tempo;
        
        switchScreen('scr-result');
        document.getElementById('status-bar').style.display = 'none';
    }

    function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); const ov = document.getElementById('overlay'); if(m.style.display === 'flex') { m.style.display = 'none'; ov.style.display = 'none'; } else { m.style.display = 'flex'; ov.style.display = 'block'; } }
    function openRDMenu(e) { e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    window.onload = initUI;
    </script>
</body>
</html>
