<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-page: #e9f0f8; --primary-blue: #5ba4e5; --primary-dark: #3d7db8; --highlight-green: #7ed321; --error-red: #ff5e5e; --white: #ffffff; --text-grey: #5d7082; --header-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        header { height: var(--header-h); background: #f0f7ff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 2500; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4); position: relative; }
        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 48px; width: auto; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 8px; color: #88a; font-weight: 700; text-transform: uppercase; }

        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 7px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 0 var(--primary-dark); }
        
        /* MENU HAMBURGUER (RESTAURADO) */
        .menu-dropdown { position: absolute; top: 60px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 3000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.85rem; min-width: 180px; transition: 0.2s; }
        .menu-item:hover { background-color: var(--primary-blue); color: white; }
        .menu-item img { height: 20px; width: 20px; }
        .menu-item-voltar { background: var(--primary-blue) !important; color: white !important; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 2000; }

        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 1000px; height: 100%; border-radius: 40px; box-shadow: 0 15px 35px rgba(176,196,217,0.5); display: flex; flex-direction: column; padding: 20px; position: relative; }

        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 13px; color: white; }
        .badge-timer { background: #cbd9e6; color: var(--text-grey); }
        .badge-round { background: var(--primary-blue); box-shadow: 0 3px 0 var(--primary-dark); }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; flex: 1; }
        .screen.active { display: flex !important; }
        #game-main-content { flex: 1; width: 100%; background: var(--white); border: 3px dashed rgba(91, 164, 229, 0.4); border-radius: 30px; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; }

        /* ANIMAÇÃO MELHORADA DAS CARTAS */
        .memory-grid { display: grid; gap: 10px; width: 100%; height: 100%; align-content: center; justify-content: center; }
        .memory-card { perspective: 1000px; cursor: pointer; width: 100%; height: 100%; max-height: 140px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .memory-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-back { background: var(--primary-blue); color: white; font-size: 2.5rem; font-weight: 900; }
        .card-front { background: white; transform: rotateY(180deg); }
        .card-front img { width: 75%; height: 65%; object-fit: contain; }
        .card-front span { font-size: 10px; font-weight: 900; color: var(--text-grey); margin-top: 5px; }
        
        /* FEEDBACK DE ACERTO */
        .memory-card.matched { animation: pulse 0.5s ease; cursor: default; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* PAINEL RD */
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 25px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .rd-col-title { font-size: 11px; font-weight: 900; color: #bbb; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
        .rd-item { background: #f8f9fa; border: 3px solid #eee; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s; }
        .rd-item.selected { border-color: var(--primary-blue); background: #f0f7ff; transform: scale(1.02); }
        .rd-item img { width: 35px; height: 35px; }
        .rd-item span { font-size: 12px; font-weight: 800; color: var(--text-grey); }

        .btn-jogar-stretch { background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); width: 100%; }
        .btn-jogar-stretch:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--primary-dark); }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    <header>
        <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src=""><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
        <div class="header-right"><a href="#" id="link-voltar-header" class="btn-voltar-header"><img id="header-back-icon" src="" width="16"> <span id="txt-voltar-header"></span></a></div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div class="badge badge-timer">⏳ <span id="timer-val">00:00</span></div>
                <div class="badge badge-round" id="round-label">NÍVEL 1</div>
                <img id="rd-game-btn" src="" style="height:35px; cursor:pointer;" onclick="openRDMenu(event)">
            </div>

            <section class="screen active" id="scr-intro">
                <div style="flex:1; display:flex; align-items:center; justify-content:center;">
                    <img id="img-capa-intro" src="" style="width:160px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));">
                </div>
                <p id="intro-instr" style="font-weight: 800; color: var(--text-grey); text-align: center; margin-bottom: 20px;"></p>
                <div style="display:flex; width:100%; gap:15px;">
                    <button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" onclick="openRDMenu(event)" style="height:55px; cursor:pointer;">
                </div>
            </section>

            <section class="screen" id="scr-game"><div id="game-main-content"></div></section>
            
            <section class="screen" id="scr-result">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    <img id="res-taca" style="width:120px; margin-bottom:15px;">
                    <h2 id="res-tit" style="font-size:26px; color: var(--primary-blue); font-weight:900; margin-bottom:20px; text-align:center;"></h2>
                    <div style="display:flex; gap:15px; margin-bottom:25px;">
                        <div style="background:white; padding:15px; border-radius:20px; text-align:center; min-width:100px; box-shadow: 0 4px 0 #eee;"><span id="res-pts" style="font-size:24px; font-weight:900; color:var(--primary-blue);">0</span><br><small style="font-weight:900; color:#88a;">ERROS</small></div>
                        <div style="background:white; padding:15px; border-radius:20px; text-align:center; min-width:100px; box-shadow: 0 4px 0 #eee;"><span id="res-tim" style="font-size:24px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small style="font-weight:900; color:#88a;">TEMPO</small></div>
                    </div>
                    <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                </div>
            </section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel">
        <div style="width:40px; height:4px; background:#eee; border-radius:10px; margin: 0 auto 20px;" onclick="closeMenus()"></div>
        <div id="rd-list">
            <div><div class="rd-col-title">ESCOLHER TEMA</div><div id="lista-temas"></div></div>
            <div><div class="rd-col-title">ESCOLHER NÍVEL</div><div id="lista-niveis"></div></div>
        </div>
    </div>

    <script src="dados.js"></script>
    <script src="jogo.js"></script>
    <script>
    function initUI() {
        const setup = CONFIG_MESTRE; const tema = BIBLIOTECA_TEMAS[setup.area]; const cont = BIBLIOTECA_CONTEUDO[setup.ano][setup.area]; const conf = JOGO_CONFIG;
        document.documentElement.style.setProperty('--primary-blue', tema.corPrimaria); document.documentElement.style.setProperty('--primary-dark', tema.corEscura); document.documentElement.style.setProperty('--bg-page', tema.corPagina);
        document.getElementById('tit-l1').innerText = cont.t1; document.getElementById('tit-l2').innerText = cont.t2; document.getElementById('sub-tit').innerText = cont.sub; document.getElementById('intro-instr').innerText = cont.intro;
        document.getElementById('head-logo').src = conf.caminhoIcons + conf.iconesMenu[setup.ano];
        document.getElementById('header-back-icon').src = conf.caminhoIcons + "voltar.png";
        document.getElementById('rd-intro-btn').src = conf.caminhoImg + "rd.png"; document.getElementById('rd-game-btn').src = conf.caminhoImg + "rd.png";
        document.getElementById('link-voltar-header').href = conf.linkVoltar; document.getElementById('txt-voltar-header').innerText = conf.textoVoltar;
        
        const menuBox = document.getElementById('dropdownMenu'); menuBox.innerHTML = '';
        ['home', 'pre', 'ano1'].forEach(k => {
            const a = document.createElement('a'); a.className = 'menu-item'; a.href = conf.links[k];
            a.innerHTML = `<img src="${conf.caminhoIcons}${conf.iconesMenu[k]}"><span>${k.toUpperCase()}</span>`;
            menuBox.appendChild(a);
        });
        const divider = document.createElement('div'); divider.style.height = '1px'; divider.style.background = '#eee'; menuBox.appendChild(divider);
        const btnV = document.createElement('a'); btnV.className = 'menu-item menu-item-voltar'; btnV.href = conf.linkVoltar;
        btnV.innerHTML = `<img src="${conf.caminhoIcons}voltar.png"><span>VOLTAR</span>`;
        menuBox.appendChild(btnV);

        if(window.startLogic) window.startLogic();
    }
    function goToIntro() { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById('scr-intro').classList.add('active'); 
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('img-capa-intro').src = JOGO_CONFIG.caminhoImg + JOGO_CONFIG.categorias[categoriaAtual].imgCapa;
    }
    function goToGame() { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById('scr-game').classList.add('active'); 
        document.getElementById('status-bar').style.display = 'flex'; 
        if(window.initGame) window.initGame(); 
    }
    function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); const ov = document.getElementById('overlay'); if(m.style.display === 'flex') { closeMenus(); } else { m.style.display = 'flex'; ov.style.display = 'block'; } }
    function openRDMenu(e) { if(e) e.stopPropagation(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    window.onload = initUI;
    </script>
</body>
</html>
