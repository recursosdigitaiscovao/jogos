<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores - Jogo de Memória</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-page: #e9f0f8; --primary-blue: #5ba4e5; --primary-dark: #3d7db8; --highlight-green: #7ed321; --error-red: #ff5e5e; --white: #ffffff; --text-grey: #5d7082; --header-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        header { height: var(--header-h); background: #f0f7ff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 2500; flex-shrink: 0; box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4); position: relative; }
        .logo-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; }
        .logo-center img { height: 48px; width: auto; }
        .logo-text h1 { font-size: 17px; color: var(--primary-blue); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        .logo-text p { font-size: 8px; color: #88a; font-weight: 700; text-transform: uppercase; }

        /* TABULEIRO RESPONSIVO */
        #game-main-content { 
            flex: 1; width: 100%; background: var(--white); 
            border: 3px dashed rgba(91, 164, 229, 0.4); border-radius: 30px; 
            display: grid; 
            /* Ajuste automático de colunas conforme o espaço disponível */
            grid-template-columns: repeat(auto-fit, minmax(clamp(70px, 18vw, 110px), 1fr));
            gap: clamp(8px, 2vw, 15px); 
            padding: clamp(10px, 3vw, 20px);
            justify-content: center; align-content: center; 
            perspective: 1000px; overflow-y: auto;
        }

        /* ESTILO DA CARTA E ANIMAÇÃO */
        .carta { 
            aspect-ratio: 3/4; /* Mantém a proporção vertical */
            position: relative; 
            transform-style: preserve-3d; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
            width: 100%;
        }
        .carta.virada { transform: rotateY(180deg); }

        .face { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: clamp(8px, 2vw, 15px); 
            border: 3px solid white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        /* Cérebro nas costas da carta */
        .frente { background: var(--primary-blue); color: white; }
        .frente img { width: 60%; height: auto; opacity: 0.8; }

        .verso { background: #fff; transform: rotateY(180deg); padding: 5px; flex-direction: column; }
        .verso img { max-width: 90%; max-height: 80%; object-fit: contain; }
        .texto-carta { 
            font-size: clamp(10px, 2.5vw, 14px); 
            font-weight: 900; color: var(--primary-dark); 
            text-align: center; text-transform: uppercase; 
        }

        /* Outros estilos de UI */
        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; padding: 5px; }
        .btn-voltar-header { background: var(--primary-blue); color: white; padding: 7px 15px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 0 var(--primary-dark); }
        .btn-voltar-mobile { display: none; text-decoration: none; padding: 5px; z-index: 3001; }
        .menu-dropdown { position: absolute; top: 60px; left: 15px; display: none; flex-direction: column; gap: 6px; z-index: 3000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: white; border-radius: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1); text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.85rem; min-width: 180px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 2000; }

        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .game-card { background: #f0f7ff; width: 100%; max-width: 1000px; height: 100%; border-radius: 40px; box-shadow: 0 15px 35px rgba(176,196,217,0.5); display: flex; flex-direction: column; padding: 15px; position: relative; overflow: hidden; }

        .status-bar { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
        .badge { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 12px; color: white; }
        .badge-timer { background: #cbd9e6; color: var(--text-grey); }
        .badge-round { background: var(--primary-blue); box-shadow: 0 3px 0 var(--primary-dark); }
        .badge-hit { background: var(--highlight-green); box-shadow: 0 3px 0 #6ab51c; }
        .badge-miss { background: var(--error-red); box-shadow: 0 3px 0 #e04a4a; }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; flex: 1; }
        .screen.active { display: flex !important; }

        .btn-jogar-stretch { background: var(--primary-blue); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary-dark); display: flex; align-items: center; justify-content: center; width: 100%; text-decoration: none; }
        .btn-jogar-stretch:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--primary-dark); }
        
        .rd-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 4000; padding: 25px; border-radius: 30px 30px 0 0; transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto; }
        .rd-panel.active { bottom: 0; }
        #rd-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .rd-item { background: #f8f9fa; border: 2px solid #eef5ff; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; font-weight: 700; color: var(--text-grey); }
        .rd-item img { width: 60px; height: 60px; object-fit: contain; }

        @media (max-width: 650px) { .btn-voltar-header { display: none !important; } .btn-voltar-mobile { display: flex; align-items: center; } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenus()"></div>
    
    <header>
        <div class="header-left"><i class="fas fa-bars hamburger-btn" onclick="toggleHamburger(event)"></i><div id="dropdownMenu" class="menu-dropdown"></div></div>
        <div class="logo-center"><img id="head-logo" src=""><div class="logo-text"><h1 id="tit-l1"></h1><h1 id="tit-l2"></h1><p id="sub-tit"></p></div></div>
        <div class="header-right">
            <a href="#" id="link-voltar-header" class="btn-voltar-header"><img id="header-back-icon" src="" width="16"> <span id="txt-voltar-header"></span></a>
            <a href="#" id="link-voltar-mobile" class="btn-voltar-mobile"><img id="header-back-mobile" src="" style="height:32px;"></a>
        </div>
    </header>

    <main class="game-container">
        <div class="game-card">
            <div class="status-bar" id="status-bar">
                <div class="status-group"><div class="badge badge-timer">⏳ <span id="timer-val">00:00</span></div><div class="badge badge-round"><span id="round-val">1 / 10</span></div></div>
                <div class="status-group"><div class="badge badge-hit"><i class="fas fa-check"></i> <span id="hits-val">0</span></div><div class="badge badge-miss"><i class="fas fa-times"></i> <span id="miss-val">0</span></div><img id="rd-game-btn" src="" style="height:32px; cursor:pointer;" onclick="openRDMenu(event)"></div>
            </div>

            <section class="screen active" id="scr-intro">
                <div id="intro-animation-container" style="flex:1; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(255,255,255,0.5); border-radius:30px; margin-bottom:15px; border:3px dashed rgba(0,0,0,0.05);">
                    <!-- O ícone do cérebro aqui também para consistência -->
                    <img id="brain-icon-intro" src="" style="width: 100px; height: auto;">
                    <p id="tema-selecionado-txt" style="margin-top:15px; font-weight:900; color:var(--primary-dark);"></p>
                </div>
                <p id="intro-instr" style="font-weight: 800; color: var(--text-grey); text-align: center; margin-bottom: 20px; padding: 0 10px;"></p>
                <div style="display:flex; width:100%; gap:15px; align-items:center;">
                    <button class="btn-jogar-stretch" onclick="goToGame()">JOGAR</button>
                    <img id="rd-intro-btn" src="" onclick="openRDMenu(event)" style="height:55px; cursor:pointer;">
                </div>
            </section>

            <section class="screen" id="scr-game"><div id="game-main-content"></div></section>
            
            <section class="screen" id="scr-result">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
                    <img id="res-taca" style="width:120px; margin-bottom:10px;"><h2 id="res-tit" style="font-size:28px; color: var(--primary-blue); font-weight:900; margin-bottom:15px; text-align:center;"></h2>
                    <div style="display:flex; gap:12px; margin-bottom:20px;">
                        <div style="background:white; padding:10px 20px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.05); min-width:110px;"><span id="res-pts" style="font-size:24px; font-weight:900; color:var(--primary-blue);">0</span><br><small style="font-weight:900; color:#88a;">ACERTOS</small></div>
                        <div style="background:white; padding:10px 20px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.05); min-width:110px;"><span id="res-tim" style="font-size:24px; font-weight:900; color:var(--primary-blue);">00:00</span><br><small style="font-weight:900; color:#88a;">TEMPO</small></div>
                    </div>
                    <button class="btn-jogar-stretch" onclick="location.reload()">JOGAR DE NOVO</button>
                </div>
            </section>
        </div>
    </main>

    <div id="rdMenu" class="rd-panel"><h3 id="rd-title" style="text-align:center; color:var(--primary-blue); margin-bottom:15px; font-weight: 900;">Escolher Tema</h3><div id="rd-list"></div></div>

    <script src="dados.js"></script>
    <script>
    let jogoEstado = {
        categoria: 'animais', nivelID: 1, nivelDados: null,
        ronda: 1, acertosRonda: 0, totalAcertos: 0, erros: 0, tempo: 0,
        timerInterval: null, cartasViradas: [], bloquear: false
    };

    function initUI() {
        const conf = JOGO_CONFIG; const setup = CONFIG_MESTRE;
        const tema = BIBLIOTECA_TEMAS[setup.area];
        const cont = BIBLIOTECA_CONTEUDO[setup.ano][setup.area];

        document.documentElement.style.setProperty('--primary-blue', tema.corPrimaria);
        document.documentElement.style.setProperty('--primary-dark', tema.corEscura);
        document.documentElement.style.setProperty('--bg-page', tema.corPagina);

        document.getElementById('tit-l1').innerText = cont.t1;
        document.getElementById('tit-l2').innerText = cont.t2;
        document.getElementById('sub-tit').innerText = cont.sub;
        document.getElementById('intro-instr').innerText = cont.intro;
        
        // Caminhos de Icons
        const pathIcons = conf.caminhoIcons;
        const pathImg = conf.caminhoImg;
        
        document.getElementById('head-logo').src = pathIcons + conf.iconesMenu[setup.ano];
        document.getElementById('header-back-icon').src = pathIcons + "voltar.png";
        document.getElementById('header-back-mobile').src = pathIcons + tema.voltarMobile;
        document.getElementById('rd-intro-btn').src = pathImg + "rd.png";
        document.getElementById('rd-game-btn').src = pathImg + "rd.png";
        document.getElementById('brain-icon-intro').src = pathImg + "brain.png"; // Icone do cérebro

        jogoEstado.nivelDados = conf.niveis[1];
        atualizarIntroTexto();
        gerarMenuRDTemas();
    }

    function gerarMenuRDTemas() {
        document.getElementById('rd-title').innerText = "Escolher Tema";
        const rdBox = document.getElementById('rd-list'); rdBox.innerHTML = '';
        Object.keys(JOGO_CONFIG.categorias).forEach(key => {
            const c = JOGO_CONFIG.categorias[key];
            const div = document.createElement('div'); div.className = 'rd-item';
            div.innerHTML = `<img src="${JOGO_CONFIG.caminhoImg}${c.imgCapa}"><span>${c.nome}</span>`;
            div.onclick = () => gerarMenuRDNiveis(key);
            rdBox.appendChild(div);
        });
    }

    function gerarMenuRDNiveis(catKey) {
        jogoEstado.categoria = catKey;
        document.getElementById('rd-title').innerText = "Escolher Nível";
        const rdBox = document.getElementById('rd-list'); rdBox.innerHTML = '';
        
        [1, 2, 3].forEach(n => {
            const niv = JOGO_CONFIG.niveis[n];
            const div = document.createElement('div'); div.className = 'rd-item';
            // Caminho para os icons dos níveis na pasta iconjogos
            const iconNivel = `${JOGO_CONFIG.caminhoIcons}iconjogos/nivel${n}.png`;
            div.innerHTML = `<img src="${iconNivel}" style="width:50px;"><span>${niv.nome}</span><small>${niv.cartas} Cartas</small>`;
            div.onclick = () => {
                jogoEstado.nivelID = n;
                jogoEstado.nivelDados = niv;
                atualizarIntroTexto();
                closeMenus();
                goToIntro();
            }; 
            rdBox.appendChild(div);
        });
    }

    function prepararRonda() {
        jogoEstado.acertosRonda = 0; jogoEstado.cartasViradas = []; jogoEstado.bloquear = false;
        document.getElementById('round-val').innerText = `${jogoEstado.ronda} / ${jogoEstado.nivelDados.rondas}`;
        
        const container = document.getElementById('game-main-content'); container.innerHTML = '';
        
        const cat = JOGO_CONFIG.categorias[jogoEstado.categoria];
        const sorteados = [...cat.itens].sort(() => 0.5 - Math.random()).slice(0, jogoEstado.nivelDados.pares);

        let deck = [];
        sorteados.forEach(item => {
            // Lógica de imagem: tenta usar cat.pastaImg se existir, senão usa o nome
            const pasta = cat.pastaImg ? cat.pastaImg + "/" : "";
            const imgFile = item.img ? item.img : item.nome.toLowerCase() + ".png";
            
            deck.push({ nome: item.nome, tipo: 'img', content: `<img src="${JOGO_CONFIG.caminhoImg}${pasta}${imgFile}">` });
            deck.push({ nome: item.nome, tipo: 'txt', content: `<div class="texto-carta">${item.nome}</div>` });
        });
        deck.sort(() => 0.5 - Math.random());

        deck.forEach(item => {
            const card = document.createElement('div'); 
            card.className = 'carta'; 
            card.dataset.nome = item.nome;
            // Face da frente tem o cérebro, face de trás (verso) tem o conteúdo
            card.innerHTML = `
                <div class="face frente"><img src="${JOGO_CONFIG.caminhoImg}brain.png"></div>
                <div class="face verso">${item.content}</div>
            `;
            card.onclick = () => virarCarta(card);
            container.appendChild(card);
        });
    }

    function virarCarta(card) {
        if(jogoEstado.bloquear || card.classList.contains('virada')) return;
        tocarSom('pop');
        card.classList.add('virada');
        jogoEstado.cartasViradas.push(card);

        if(jogoEstado.cartasViradas.length === 2) {
            jogoEstado.bloquear = true;
            verificarPar();
        }
    }

    function verificarPar() {
        const [c1, c2] = jogoEstado.cartasViradas;
        if(c1.dataset.nome === c2.dataset.nome) {
            tocarSom('acerto');
            jogoEstado.acertosRonda++; jogoEstado.totalAcertos++;
            document.getElementById('hits-val').innerText = jogoEstado.totalAcertos;
            jogoEstado.cartasViradas = []; jogoEstado.bloquear = false;
            if(jogoEstado.acertosRonda === jogoEstado.nivelDados.pares) setTimeout(proximaRonda, 1000);
        } else {
            tocarSom('erro');
            jogoEstado.erros++; document.getElementById('miss-val').innerText = jogoEstado.erros;
            setTimeout(() => {
                c1.classList.remove('virada'); c2.classList.remove('virada');
                jogoEstado.cartasViradas = []; jogoEstado.bloquear = false;
            }, 1000);
        }
    }

    // Funções de Apoio (Mantidas do original)
    function atualizarIntroTexto() {
        const catNome = JOGO_CONFIG.categorias[jogoEstado.categoria].nome;
        document.getElementById('tema-selecionado-txt').innerText = `${catNome} | Nível ${jogoEstado.nivelID}`;
    }
    function goToIntro() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-intro').classList.add('active'); document.getElementById('status-bar').style.display = 'none'; }
    function goToGame() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-game').classList.add('active'); document.getElementById('status-bar').style.display = 'flex'; iniciarMotorJogo(); }
    function iniciarMotorJogo() { jogoEstado.ronda = 1; jogoEstado.totalAcertos = 0; jogoEstado.erros = 0; jogoEstado.tempo = 0; iniciarTimer(); prepararRonda(); }
    function iniciarTimer() { clearInterval(jogoEstado.timerInterval); jogoEstado.timerInterval = setInterval(() => { jogoEstado.tempo++; const m = Math.floor(jogoEstado.tempo/60).toString().padStart(2,'0'); const s = (jogoEstado.tempo%60).toString().padStart(2,'0'); document.getElementById('timer-val').innerText = `${m}:${s}`; }, 1000); }
    function proximaRonda() { if(jogoEstado.ronda < jogoEstado.nivelDados.rondas) { jogoEstado.ronda++; prepararRonda(); } else { finalizarJogo(); } }
    function finalizarJogo() { clearInterval(jogoEstado.timerInterval); const tempoFinal = document.getElementById('timer-val').innerText; const perc = Math.round((jogoEstado.totalAcertos / (jogoEstado.totalAcertos + jogoEstado.erros)) * 100) || 0; let rank = JOGO_CONFIG.relatorios.find(r => perc >= r.min && perc <= r.max); document.getElementById('res-taca').src = JOGO_CONFIG.caminhoIcons + rank.img; document.getElementById('res-tit').innerText = rank.titulo; document.getElementById('res-pts').innerText = `${jogoEstado.totalAcertos} Pares`; document.getElementById('res-tim').innerText = tempoFinal; document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr-result').classList.add('active'); document.getElementById('status-bar').style.display = 'none'; tocarSom('vitoria'); }
    function toggleHamburger(e) { e.stopPropagation(); const m = document.getElementById('dropdownMenu'); const ov = document.getElementById('overlay'); m.style.display = (m.style.display==='flex')?'none':'flex'; ov.style.display = m.style.display==='flex'?'block':'none'; }
    function openRDMenu(e) { if(e) e.stopPropagation(); gerarMenuRDTemas(); document.getElementById('rdMenu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenus() { document.getElementById('rdMenu').classList.remove('active'); document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function tocarSom(s) { const a = new Audio(JOGO_CONFIG.sons[s]); a.play().catch(()=>{}); }
    
    window.onload = initUI;
    </script>
</body>
</html>
