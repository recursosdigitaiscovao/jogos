<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Template Jogo</title>
    <style>
        /* Reset e Estilo Geral */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: #fff4e6; /* Laranja Suave */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.6rem; cursor: pointer; color: #2d3436; }
        header h1 { font-size: 1.1rem; color: #2d3436; font-weight: 700; }
        
        .icon-header { font-size: 1.4rem; filter: brightness(0); opacity: 0.8; }

        /* Botão Voltar 3D Laranja */
        .btn-voltar-3d {
            text-decoration: none;
            color: #ffffff;
            background-color: #e67e22;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #d35400;
            box-shadow: 0 3px 0 #d35400;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .btn-voltar-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #d35400; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 25px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: #e67e22; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ffcc80; }

        .sidebar-item {
            text-decoration: none; color: #636e72; font-weight: 600;
            padding: 14px; border-radius: 15px; background: #fdfdfd;
            display: flex; align-items: center; gap: 15px; margin-bottom: 8px;
            border: 1px solid #eee; transition: all 0.2s ease;
        }
        .sidebar-item:hover { background-color: #fff4e6; color: #e67e22; border-color: #ffcc80; transform: translateX(5px); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA PRINCIPAL */
        main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .grid-cartoes {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 320px;
        }

        .card-template {
            background: white; border: 2px solid #f0f0f0; border-radius: 18px;
            aspect-ratio: 1/1; display: flex; align-items: center;
            justify-content: center; font-size: 3.5rem;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
            cursor: pointer; transition: all 0.1s ease;
        }
        .card-template:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* CONTROLES INFERIORES */
        .barra-info-footer {
            margin-top: 30px; display: flex; align-items: center;
            justify-content: center; gap: 15px;
        }

        .progresso-texto { color: #7f8c8d; font-weight: 700; font-size: 1rem; }

        .btn-info {
            background-color: #e67e22; color: white; width: 38px; height: 38px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem; border: 1px solid #d35400;
            box-shadow: 0 3px 0 #d35400; cursor: pointer; transition: all 0.1s ease;
        }

        /* MODAL */
        .modal-custom {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 85%; max-width: 320px;
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 400;
            text-align: center; border: 3px solid #e67e22;
        }

        /* FOOTER MINIMALISTA */
        footer {
            width: 100%; padding: 12px; background-color: white;
            text-align: center; color: #95a5a6; font-size: 0.8rem;
            border-top: 1px solid #eee; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="fecharMenu()"></div>
    
    <div id="modal-info" class="modal-custom">
        <h2 style="color: #e67e22; margin-bottom: 15px;">Ajuda</h2>
        <p style="color: #636e72; margin-bottom: 20px; font-weight: 500;">Explicação do jogo do 1º ano aqui.</p>
        <button class="btn-voltar-3d" style="width: 100%; justify-content: center;" onclick="fecharMenu()">ENTENDI!</button>
    </div>

    <div class="sidebar" id="sidebar">
        <h3>Menu Escolar</h3>
        <nav>
            <a href="/jogos/" class="sidebar-item">🏠 Início</a>
            <a href="/jogos/pre/" class="sidebar-item">🦒 Pré-Escolar</a>
            <a href="/jogos/1/" class="sidebar-item">🐥 1º Ano</a>
            <a href="/jogos/2/" class="sidebar-item">🐢 2º Ano</a>
            <a href="/jogos/3/" class="sidebar-item">🦊 3º Ano</a>
            <a href="/jogos/4/" class="sidebar-item">👨‍🚀 4º Ano</a>
        </nav>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <div class="icon-header">🎯</div> 
            <h1>Título do Jogo - 1º Ano</h1>
        </div>
        <a href="/jogos/1/" class="btn-voltar-3d">⬅ VOLTAR</a>
    </header>

    <main>
        <div class="grid-cartoes">
            <div class="card-template">🦁</div>
            <div class="card-template">🦒</div>
            <div class="card-template">🐼</div>
            <div class="card-template">🐸</div>
        </div>

        <div class="barra-info-footer">
            <div class="progresso-texto">Ronda 1 / 5</div>
            <button class="btn-info" onclick="mostrarInfo()">i</button>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão • Professor Luís
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function fecharMenu() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('modal-info').style.display = 'none';
        }

        function mostrarInfo() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('modal-info').style.display = 'block';
        }
    </script>

</body>
</html>
