<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teia Matemática - Nível 2 Dinâmico</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #ff9f43;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h2 { margin: 0; font-size: 1.5rem; }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 10px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #level-indicator { font-size: 1.2rem; color: #ff9f43; font-weight: bold; margin-bottom: 5px; }
        #score { font-size: 1.5rem; color: #7f8c8d; margin-bottom: 20px; font-weight: bold; }

        #question-box {
            font-size: 4.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 50px;
            border: 6px solid #ff9f43;
            padding: 40px 60px;
            border-radius: 30px;
            background: #fffaf5;
            transition: all 0.3s ease;
            min-width: 350px;
            text-align: center;
        }

        /* Destaque para o número que preenche a lacuna */
        .fill-number { color: #2ecc71; text-decoration: underline; }

        .wrong-anim { color: #e74c3c !important; border-color: #e74c3c !important; }
        .correct-anim { border-color: #2ecc71 !important; }

        .options-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            padding-bottom: 60px;
        }

        .option-btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 20px 40px;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #e67e22;
            min-width: 100px;
        }

        .option-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #e67e22; }

        #next-level-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,159,67,0.95);
            z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
    </style>
</head>
<body>

    <div id="next-level-modal">
        <h1>🌟 EXCELENTE! 🌟</h1>
        <p style="font-size: 1.5rem;">Chegaste aos 10 pontos!</p>
        <button style="background: white; color: #ff9f43; padding: 20px 40px; border-radius: 50px; font-size: 1.5rem; border: none; cursor: pointer; font-weight: bold;" onclick="startLevel2()">Ir para o Nível 2 🚀</button>
    </div>

    <header>
        <h2>🕸️ Teia Matemática</h2>
        <a href="../" class="btn-topo">⬅ 1º Ano</a>
    </header>

    <main>
        <div id="level-indicator">NÍVEL 1</div>
        <div id="score">Pontos: 0</div>
        <div id="question-box"></div>
        <div class="options-container" id="options"></div>
    </main>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let canClick = true;
        let currentLevel = 1;
        let num1, resultTotal;

        function nextQuestion() {
            if (score >= 10 && currentLevel === 1) {
                document.getElementById('next-level-modal').style.display = 'flex';
                return;
            }

            canClick = true;
            const optionsDiv = document.getElementById('options');
            const qBox = document.getElementById('question-box');
            optionsDiv.innerHTML = ''; 
            qBox.classList.remove('correct-anim', 'wrong-anim');

            if (currentLevel === 1) {
                num1 = Math.floor(Math.random() * 6) + 1;
                let num2 = Math.floor(Math.random() * 5) + 1;
                correctAnswer = num1 + num2;
                qBox.innerHTML = `${num1} + ${num2} = <span id="gap">?</span>`;
            } else {
                num1 = Math.floor(Math.random() * 7) + 1;
                correctAnswer = Math.floor(Math.random() * 5) + 1;
                resultTotal = num1 + correctAnswer;
                qBox.innerHTML = `${num1} + <span id="gap">__</span> = ${resultTotal}`;
            }

            let choices = [correctAnswer];
            while(choices.length < 4) {
                let r = Math.floor(Math.random() * 12) + 1;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = val;
                btn.onclick = () => check(val);
                optionsDiv.appendChild(btn);
            });
        }

        function check(selected) {
            if (!canClick) return;
            const qBox = document.getElementById('question-box');
            const gap = document.getElementById('gap');

            if(selected === correctAnswer) {
                canClick = false;
                score++;
                updateScore();
                
                // Preencher a lacuna com o número correto e mudar cor
                gap.innerHTML = selected;
                gap.className = "fill-number";
                qBox.classList.add('correct-anim');
                
                setTimeout(nextQuestion, 1200); // Espera um pouco mais para a criança ver o resultado
            } else {
                if(score > 0) score--; 
                updateScore();
                qBox.classList.add('wrong-anim');
                setTimeout(() => qBox.classList.remove('wrong-anim'), 500);
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = `Pontos: ${score}`;
        }

        function startLevel2() {
            currentLevel = 2;
            document.getElementById('next-level-modal').style.display = 'none';
            document.getElementById('level-indicator').innerText = "NÍVEL 2";
            document.getElementById('level-indicator').style.color = "#9b59b6";
            nextQuestion();
        }

        nextQuestion();
    </script>
</body>
</html>
