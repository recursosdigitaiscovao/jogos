<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teia Matemática - 1º Ano</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #question {
            font-size: 3rem;
            background: rgba(0,0,0,0.5);
            padding: 20px 40px;
            border-radius: 50px;
            border: 4px solid #ff9f43;
            margin-bottom: 20px;
            z-index: 10;
        }

        .spider {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ff9f43;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,159,67,0.5);
        }

        .spider:hover { transform: scale(1.1); }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
        }

        .btn-voltar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: white;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score">Pontos: 0</div>
    <div id="question">A carregar...</div>
    
    <div id="options-container"></div>

    <a href="../" class="btn-voltar">⬅ Voltar</a>
</div>

<script>
    let score = 0;
    let correctAnswer = 0;

    function generateGame() {
        const container = document.getElementById('options-container');
        container.innerHTML = ''; // Limpar opções anteriores
        
        // Gerar conta simples (números até 10 para o 1º ano)
        let n1 = Math.floor(Math.random() * 10);
        let n2 = Math.floor(Math.random() * 10);
        correctAnswer = n1 + n2;
        
        document.getElementById('question').innerText = `${n1} + ${n2} = ?`;

        // Criar 4 opções (uma correta e 3 erradas)
        let answers = [correctAnswer];
        while(answers.length < 4) {
            let wrong = Math.floor(Math.random() * 20);
            if(!answers.includes(wrong)) answers.push(wrong);
        }

        // Baralhar as respostas
        answers.sort(() => Math.random() - 0.5);

        // Posicionar as aranhas no ecrã
        answers.forEach((val, index) => {
            const spider = document.createElement('div');
            spider.className = 'spider';
            spider.innerText = val;
            
            // Posições aleatórias fugindo do centro
            const angle = (index / 4) * Math.PI * 2;
            const dist = 200;
            spider.style.left = `calc(50% - 40px + ${Math.cos(angle) * dist}px)`;
            spider.style.top = `calc(50% - 40px + ${Math.sin(angle) * dist}px)`;

            spider.onclick = () => checkAnswer(val);
            container.appendChild(spider);
        });
    }

    function checkAnswer(selected) {
        if(selected === correctAnswer) {
            score++;
            document.getElementById('score').innerText = `Pontos: ${score}`;
            alert("Correto! 🕸️");
            generateGame();
        } else {
            alert("Ups! Tenta outra vez. 🕷️");
        }
    }

    // Iniciar o jogo
    generateGame();
</script>

</body>
</html>
