<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teia Matemática - 1º Ano</title>
    <style>
        /* Estrutura Limpa */
        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Barra do Topo (Cor do 1º Ano) */
        header {
            background-color: #ff9f43;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h2 { margin: 0; font-size: 1.5rem; }

        .btn-topo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-topo:hover { background: rgba(0,0,0,0.3); }

        /* Área do Jogo */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #score {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        #question-box {
            font-size: 5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 50px;
            border: 6px solid #ff9f43;
            padding: 40px 80px;
            border-radius: 30px;
            background: #fffaf5;
            transition: color 0.3s;
        }

        /* Menu de Respostas em baixo */
        .options-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            padding-bottom: 60px;
        }

        .option-btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 25px 45px;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #e67e22;
            min-width: 120px;
        }

        /* Estilo de Erro (Vermelho) */
        .option-btn.error {
            background-color: #e74c3c !important;
            box-shadow: 0 6px 0 #c0392b !important;
            transform: translate(0, 0);
        }

        /* Estilo de Sucesso (Verde) */
        .option-btn.success {
            background-color: #2ecc71 !important;
            box-shadow: 0 6px 0 #27ae60 !important;
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #e67e22;
        }

        @media (max-width: 600px) {
            .options-container { flex-wrap: wrap; gap: 10px; }
            #question-box { font-size: 3rem; padding: 20px 40px; }
        }
    </style>
</head>
<body>

    <header>
        <h2>🕸️ Teia Matemática</h2>
        <a href="../" class="btn-topo">⬅ 1º Ano</a>
    </header>

    <main>
        <div id="score">Pontos: 0</div>
        <div id="question-box">...</div>

        <div class="options-container" id="options">
            </div>
    </main>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let canClick = true; // Evita cliques múltiplos durante a animação

        function nextQuestion() {
            canClick = true;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = ''; 

            let n1 = Math.floor(Math.random() * 6) + 1; // Números mais baixos para 1º ano
            let n2 = Math.floor(Math.random() * 5) + 1;
            correctAnswer = n1 + n2;

            document.getElementById('question-box').innerText = `${n1} + ${n2}`;
            document.getElementById('question-box').style.color = '#2c3e50';

            let choices = [correctAnswer];
            while(choices.length < 4) {
                let r = Math.floor(Math.random() * 11) + 1;
                if(!choices.includes(r)) choices.push(r);
            }

            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = val;
                btn.onclick = () => check(val, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function check(selected, btnElement) {
            if (!canClick) return;

            if(selected === correctAnswer) {
                canClick = false;
                score++;
                document.getElementById('score').innerText = `Pontos: ${score}`;
                
                // Feedback Verde
                btnElement.classList.add('success');
                document.getElementById('question-box').style.color = '#2ecc71';
                
                setTimeout(nextQuestion, 800);
            } else {
                // Feedback Vermelho (sem alert)
                btnElement.classList.add('error');
                setTimeout(() => {
                    btnElement.classList.remove('error');
                }, 500);
            }
        }

        nextQuestion();
    </script>

</body>
</html>
