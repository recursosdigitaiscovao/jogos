<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teia Matemática - 1º Ano</title>
    <style>
        /* Estrutura Limpa */
        body {
            background-color: #ffffff; /* Fundo Branco */
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Barra do Topo (Cor do 1º Ano) */
        header {
            background-color: #ff9f43; /* Laranja do 1º Ano */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h2 { margin: 0; font-size: 1.5rem; }

        .btn-voltar {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-voltar:hover { background: rgba(0,0,0,0.3); }

        /* Área do Jogo (Centro) */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #score {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        #question-box {
            font-size: 4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 50px;
            border: 5px solid #ff9f43;
            padding: 30px 60px;
            border-radius: 25px;
            background: #fffaf5;
        }

        /* Menu de Respostas (Alinhado em baixo) */
        .options-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            padding-bottom: 50px;
        }

        .option-btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 20px 40px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #e67e22; /* Sombra para parecer botão real */
            min-width: 100px;
        }

        .option-btn:hover {
            transform: translateY(-5px);
            background-color: #f39c12;
        }

        .option-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #e67e22;
        }

        /* Responsividade */
        @media (max-width: 500px) {
            .options-container { flex-wrap: wrap; }
            #question-box { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h2>🕸️ Teia Matemática</h2>
        <a href="../" class="btn-voltar">⬅ Voltar ao Menu</a>
    </header>

    <main>
        <div id="score">Pontos: 0</div>
        
        <div id="question-box">...</div>

        <div class="options-container" id="options">
            </div>
    </main>

    <script>
        let score = 0;
        let correctAnswer = 0;

        function nextQuestion() {
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = ''; // Limpa botões anteriores

            // Gera números simples para o 1º ano
            let n1 = Math.floor(Math.random() * 10) + 1;
            let n2 = Math.floor(Math.random() * 10) + 1;
            correctAnswer = n1 + n2;

            document.getElementById('question-box').innerText = `${n1} + ${n2}`;

            // Criar lista de opções (1 certa e 3 erradas)
            let choices = [correctAnswer];
            while(choices.length < 4) {
                let r = Math.floor(Math.random() * 20) + 1;
                if(!choices.includes(r)) choices.push(r);
            }

            // Baralhar opções
            choices.sort(() => Math.random() - 0.5);

            // Criar botões
            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = val;
                btn.onclick = () => check(val);
                optionsDiv.appendChild(btn);
            });
        }

        function check(selected) {
            if(selected === correctAnswer) {
                score++;
                document.getElementById('score').innerText = `Pontos: ${score}`;
                // Feedback visual rápido
                document.getElementById('question-box').style.color = '#10ac84';
                setTimeout(() => {
                    document.getElementById('question-box').style.color = '#2c3e50';
                    nextQuestion();
                }, 500);
            } else {
                alert("Tenta outra vez! 🕷️");
            }
        }

        // Iniciar
        nextQuestion();
    </script>

</body>
</html>
