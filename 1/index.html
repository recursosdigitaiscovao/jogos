<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light-blue: #e9f1f8;
            --white: #ffffff;
            --text-dark: #002d58;
            --orange-btn: #ff7043;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-light-blue); 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            background: var(--white);
            width: 100%; 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center; 
            padding: 10px 20px;
            z-index: 1001;
        }

        .header-left { display: flex; justify-content: flex-start; }
        .hamburger-btn { font-size: 24px; color: #5ba4e5; cursor: pointer; }

        .header-center { text-align: center; }
        #header-icon { height: 50px; display: block; margin: 0 auto 5px; }
        .header-titles { line-height: 1.1; }
        .title-main { color: #5ba4e5; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; }
        .title-sub { color: #a5b4c4; font-weight: 700; font-size: 0.7rem; }

        .header-right { display: flex; justify-content: flex-end; }
        
        /* BOTÃO VOLTAR ESTILO IMAGEM */
        .btn-voltar-topo {
            background-color: var(--orange-btn);
            color: white;
            text-decoration: none;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s;
        }
        .btn-voltar-topo:hover { transform: scale(1.05); }

        /* FORMA BRANCA ARREDONDADA */
        .header-curve {
            background: var(--white);
            height: 40px;
            width: 100%;
            border-bottom-left-radius: 50% 100%;
            border-bottom-right-radius: 50% 100%;
            box-shadow: 0px 10px 15px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }

        /* ÁREA CENTRAL */
        main {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 40px;
        }

        .intro-text {
            text-align: center; 
            color: #5d7082;
            font-size: 0.9rem; 
            font-weight: 700;
            margin-bottom: 30px;
        }

        .game-wrapper { 
            width: 100%;
            max-width: 1100px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            justify-content: center;
        }

        /* CARD DOS JOGOS IGUAL À IMAGEM */
        .game-card { 
            background: var(--white);
            border-radius: 25px; 
            border: 6px solid #ccc; /* Cor será injetada por JS */
            display: flex; 
            flex-direction: column; 
            align-items: center;
            text-decoration: none; 
            padding: 20px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1/1;
        }
        .game-card:hover { transform: scale(1.03); }

        .card-img-container { 
            flex: 1;
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .card-img-container img { max-width: 85%; max-height: 85%; object-fit: contain; }
        
        .game-card h2 { 
            color: var(--text-dark); 
            font-size: 1.2rem; 
            font-weight: 900; 
            margin-top: 15px;
        }

        /* MENU DROPDOWN */
        .menu-dropdown { 
            position: absolute; top: 60px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 18px; 
            background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-decoration: none; color: #5d7082; font-weight: 700;
        }

        @media (max-width: 600px) {
            .game-wrapper { grid-template-columns: 1fr; }
            .title-main { font-size: 0.9rem; }
            header { grid-template-columns: 50px 1fr 50px; }
            .btn-voltar-topo span { display: none; } /* Esconde texto em mobile */
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>
        
        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="header-titles">
                <div class="title-main"><span id="txt-titulo1"></span> <span id="txt-titulo2" style="color:#a5b4c4"></span></div>
                <div id="txt-subtitulo" class="title-sub"></div>
            </div>
        </div>

        <div class="header-right">
            <a href="javascript:history.back()" class="btn-voltar-topo">
                <i class="fas fa-arrow-left"></i> <span>Voltar</span>
            </a>
        </div>
    </header>

    <div class="header-curve"></div>

    <main>
        <div id="txt-intro" class="intro-text"></div>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => document.getElementById('dropdownMenu').style.display = 'none';

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;

                // Logo da girafa (icon do ano 2 como exemplo)
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano2;

                // Menu Dropdown
                const menuBox = document.getElementById('dropdownMenu');
                Object.keys(config.links).forEach(key => {
                    const item = document.createElement('a');
                    item.className = 'menu-item';
                    item.href = config.links[key];
                    item.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[key]}" width="20"> <span>${key}</span>`;
                    menuBox.appendChild(item);
                });

                // Gerar Cartões como na imagem
                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    
                    // Definir cores dinâmicas baseadas no dados.js
                    card.style.borderColor = jogo.cor;
                    // Fundo suave baseado na cor da borda (opacidade baixa)
                    card.style.backgroundColor = jogo.cor + "10"; 

                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
