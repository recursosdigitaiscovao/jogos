<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores em tons de laranja vibrante */
            --laranja-principal: #FF8C00;
            --laranja-claro: #FFA500;
            --laranja-escuro: #FF4500;
            --fundo: #FFF8F0;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--fundo);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            width: 100%;
            padding: 30px 10px 50px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.15);
            flex-shrink: 0;
            z-index: 10;
        }

        h1 {
            white-space: nowrap;
            font-size: clamp(1.1rem, 5vh, 2.8rem);
            color: var(--laranja-escuro);
            text-shadow: 3px 3px 0px #FFD580;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-text {
            color: #8B4513; /* Castanho quente para combinar com laranja */
            font-size: clamp(0.9rem, 2.5vh, 1.3rem);
            margin-top: 5px;
            font-weight: 400;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 0 25px; 
            min-height: 0;
        }

        /* O container está vazio, pronto para novo conteúdo */
        .grid-container {
            display: grid;
            width: 100%;
            max-width: 1250px;
            gap: 15px;
        }

        footer {
            background: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1rem;
            color: var(--laranja-principal);
            font-weight: bold; 
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        @media (max-width: 800px) {
            h1 { font-size: clamp(1rem, 5.5vw, 1.5rem); }

            header { 
                padding: 20px 10px 35px 10px; 
                border-bottom-left-radius: 50% 10%;
                border-bottom-right-radius: 50% 10%;
            }
        }

        @media (max-height: 550px) {
            header { padding: 10px 0 20px 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1><span>🐥</span> Jogos do 1º Ano <span>✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="grid-container">
            <!-- Botões removidos -->
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
