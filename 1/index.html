<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Matemática</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vibrant-orange: #ff6b1a;
            --primary-orange: #ff9100;
            --soft-orange: #fff5e6;
            --cor-texto: #8a6436;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        /* --- Header Estilo Curvo --- */
        header {
            width: 100%;
            padding: 30px 10px 50px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }

        .btn-voltar {
            position: absolute;
            right: 20px;
            top: 25px;
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 107, 26, 0.3);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 20;
        }

        .btn-voltar:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        h1 {
            white-space: nowrap;
            font-size: clamp(1.1rem, 5vh, 2.5rem);
            color: var(--vibrant-orange);
            text-shadow: 3px 3px 0px #ffe0cc;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-text {
            color: var(--cor-texto);
            font-size: clamp(0.8rem, 2vh, 1.1rem);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- Main & Grid de Jogos --- */
        main {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 20px; 
            min-height: 0;
            overflow-y: auto;
        }

        .games-grid {
            display: grid;
            width: 100%;
            max-width: 900px;
            gap: 20px;
            grid-template-columns: repeat(3, 1fr); 
        }

        /* --- Estilo dos Cartões (do segundo código) --- */
        .game-card {
            background: white;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            border: 4px solid var(--vibrant-orange);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(255, 107, 26, 0.2);
        }

        .game-img {
            width: 100%; 
            height: clamp(80px, 15vh, 120px);
            background: var(--soft-orange);
            border-radius: 18px; 
            margin-bottom: 12px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 3rem;
        }

        h2 { 
            font-size: 1rem; 
            color: var(--cor-texto); 
            margin-bottom: 15px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            background: var(--vibrant-orange);
            color: white; 
            border: none; 
            padding: 12px 0;
            width: 100%; 
            border-radius: 15px;
            font-size: 0.9rem; 
            cursor: pointer; 
            font-family: 'Fredoka'; 
            font-weight: bold;
            transition: 0.2s;
            text-decoration: none;
            display: block;
        }

        .play-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        /* --- Footer (Intocado) --- */
        footer {
            background: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1rem;
            color: #777;
            font-weight: normal; 
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        /* --- Responsividade --- */
        @media (max-width: 800px) {
            h1 { font-size: 1.4rem; }
            
            .btn-voltar {
                padding: 6px 12px;
                font-size: 0.75rem;
                top: 15px;
                right: 10px;
            }

            header { 
                padding: 20px 10px 35px 10px; 
            }

            .games-grid {
                grid-template-columns: 1fr;
                max-width: 280px;
            }
            
            main {
                align-items: flex-start;
                padding-top: 30px;
            }
        }
    </style>
</head>
<body>

    <header>
        <!-- Botão Voltar para o diretório anterior -->
        <a href="../" class="btn-voltar">
            <span>⬅</span> Voltar
        </a>
        
        <!-- Título com ícones solicitados -->
        <h1><span>🐥</span> Jogos do 1º Ano <span style="font-size: 0.8em;">⭐</span><span>✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="games-grid">
            <!-- Jogo 1 -->
            <div class="game-card">
                <div class="game-img">➕</div>
                <h2>Português</h2>
                <a href="soma/index.html" class="play-btn">JOGAR</a>
            </div>

            <!-- Jogo 2 -->
            <div class="game-card">
                <div class="game-img">➖</div>
                <h2>Matemárica</h2>
                <a href="subtracao/index.html" class="play-btn">JOGAR</a>
            </div>

            <!-- Jogo 3 -->
            <div class="game-card">
                <div class="game-img">🔢</div>
                <h2>Estudo do meio</h2>
                <a href="sequencia/index.html" class="play-btn">JOGAR</a>
            </div>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
