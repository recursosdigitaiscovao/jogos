<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequenos Exploradores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f0f5fa;    
            --sub-header-bg: #ffffff; 
            --body-bg: #e9f1f8;       
            --primary-blue: #5ba4e5;
            --text-grey: #7a8b9a;
            --voltar-bg: #5ba4e5; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--body-bg); min-height: 100vh; display: flex; flex-direction: column; }

        header { 
            background: var(--header-bg);
            display: grid;
            grid-template-columns: 60px 1fr auto;
            align-items: center; 
            padding: 10px 20px;
            min-height: 100px; 
            position: relative;
        }

        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; background: none; border: none; }

        .header-center { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #header-icon { height: 60px; width: auto; }
        .title-group { text-align: left; line-height: 1.1; }
        .title-main { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; display: flex; flex-direction: column; }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.7rem; display: block; }

        .header-right { padding-left: 10px; }
        .btn-voltar-topo {
            display: flex; align-items: center; gap: 8px;
            background: var(--voltar-bg); color: white; text-decoration: none;
            padding: 10px 15px; border-radius: 15px; font-weight: 800; font-size: 0.8rem;
            transition: background 0.2s; cursor: pointer;
        }
        .btn-voltar-topo img { height: 16px; filter: brightness(0) invert(1); }

        .menu-dropdown { 
            position: absolute; top: 75px; left: 20px; display: none; 
            flex-direction: column; gap: 10px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 15px; box-shadow: 4px 4px 10px rgba(0,0,0,0.05);
            text-decoration: none; color: var(--text-grey); font-weight: 700; min-width: 190px;
        }

        .sub-header {
            background: var(--sub-header-bg); text-align: center; padding: 15px;
            border-bottom-left-radius: 50% 40px; border-bottom-right-radius: 50% 40px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.03); z-index: 5;
        }
        .intro-text { color: #5d7082; font-size: 0.9rem; font-weight: 700; }

        /* GRID CONFIGURADO PARA 3 COLUNAS SEMPRE */
        main { flex: 1; padding: 20px 10px; display: flex; justify-content: center; }
        .game-wrapper { 
            width: 100%; max-width: 1100px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* Força 3 colunas */
            gap: 10px; /* Gap reduzido para mobile */
        }

        .game-card { 
            background: white; 
            border-radius: 20px; 
            border: 3px solid #ccc; 
            text-decoration: none; 
            padding: 8px; /* Reduzido para caber no mobile */
            display: flex; flex-direction: column; align-items: center;
            aspect-ratio: 1 / 1.2; transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .game-card:hover { transform: translateY(-5px); }

        .card-img-container { 
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; 
            border-radius: 15px; 
            background-color: #f0f0f0; 
            margin-bottom: 8px;
        }
        .card-img-container img { max-width: 85%; max-height: 85%; object-fit: contain; }
        
        .game-card h2 { color: #002d58; font-size: 0.85rem; font-weight: 900; text-align: center; }

        footer { padding: 20px; text-align: center; color: var(--text-grey); font-size: 0.7rem; font-weight: 700; }

        /* AJUSTES PARA ECRÃS MAIORES */
        @media (min-width: 601px) {
            .game-wrapper { gap: 25px; }
            .game-card { border-radius: 35px; border-width: 5px; padding: 18px; }
            .game-card h2 { font-size: 1.4rem; }
            .card-img-container { border-radius: 25px; }
            .title-main { font-size: 1.3rem; }
            .btn-voltar-topo { font-size: 0.85rem; padding: 10px 18px; }
        }

        /* ESCONDER VOLTAR NO MOBILE */
        @media (max-width: 600px) {
            header { grid-template-columns: 60px 1fr; }
            .header-right { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="hamburger-btn" onclick="toggleMenu(event)">
                <i class="fas fa-bars"></i>
            </button>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>

        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1" style="color: var(--primary-blue);"></span> 
                    <span id="txt-titulo2" style="color: #a5b4c4;"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>

        <div class="header-right">
            <div onclick="voltarUmNivel()" class="btn-voltar-topo">
                <img id="icon-voltar-topo" src="" alt="Voltar">
                <span>VOLTAR</span>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        // Função para voltar um nível na hierarquia de pastas
        function voltarUmNivel() {
            let path = window.location.pathname;
            // Se terminar em /, remove para conseguir tirar a última pasta
            if (path.endsWith('/')) path = path.slice(0, -1);
            
            const lastIndex = path.lastIndexOf('/');
            if (lastIndex !== -1) {
                const newPath = path.substring(0, lastIndex) + '/';
                window.location.href = newPath;
            } else {
                window.location.href = '/'; // Fallback para a raiz
            }
        }

        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => document.getElementById('dropdownMenu').style.display = 'none';

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;
                document.getElementById('icon-voltar-topo').src = config.caminhoIconsMenu + config.iconesMenu.voltar;

                const menuBox = document.getElementById('dropdownMenu');
                const labels = { home: "Início", pre: "Pré-Escolar", ano1: "1º Ano", ano2: "2º Ano", ano3: "3º Ano", ano4: "4º Ano" };

                Object.keys(config.links).forEach(key => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = config.links[key];
                    a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[key]}"> <span>${labels[key] || key}</span>`;
                    menuBox.appendChild(a);
                });

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const tema = config.temaCores[jogo.tema] || { borda: "#ccc", fundo: "#f5f5f5" };
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.borderColor = tema.borda;
                    card.innerHTML = `
                        <div class="card-img-container" style="background-color: ${tema.fundo};">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
