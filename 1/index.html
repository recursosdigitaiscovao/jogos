<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Disciplinas</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ff9f43;
            background-image: radial-gradient(#ffb167 2px, transparent 2px);
            background-size: 30px 30px;
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .emoji-principal {
            font-size: 70px; /* Reduzi um pouco */
            margin-bottom: 5px;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.2rem; /* Mais pequeno para caber tudo */
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            font-weight: 900;
        }

        .subtitulo {
            font-size: 1.1rem;
            margin-bottom: 25px;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.1);
            padding: 8px 15px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        /* Contentor das Disciplinas */
        .menu-disciplinas {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaço entre botões reduzido */
            width: 100%;
            max-width: 400px;
        }

        .btn-disciplina {
            background-color: white;
            text-decoration: none;
            font-size: 1.5rem; /* Fonte mais pequena */
            font-weight: 800;
            padding: 18px; /* Padding mais compacto */
            border-radius: 25px;
            box-shadow: 0 6px 0 #e67e22, 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border: 3px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        /* Cores e Bordas */
        .portugues { color: #2980b9; border-color: #d1e9f7; } 
        .matematica { color: #c0392b; border-color: #f9d5d2; }
        .estudo-meio { color: #27ae60; border-color: #d4efdf; } /* Verde para Natureza/Estudo Meio */

        .btn-disciplina span {
            font-size: 1.8rem;
        }

        /* Efeitos */
        .btn-disciplina:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e67e22, 0 5px 10px rgba(0,0,0,0.1);
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 30px;
            text-decoration: none;
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 15px;
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            opacity: 0.9;
            font-size: 0.8rem;
        }

        /* Desktop/Tablets */
        @media (min-width: 700px) {
            .menu-disciplinas {
                flex-direction: row;
                max-width: 850px;
            }
            .btn-disciplina { 
                flex: 1; 
                flex-direction: column;
                padding: 30px 10px;
                font-size: 1.3rem;
            }
            .btn-disciplina span { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🐣</div>
    
    <h1>1º Ano</h1>
    <p class="subtitulo">Olá! O que vamos explorar hoje?</p>

    <div class="menu-disciplinas">
        <a href="pt/" class="btn-disciplina portugues">
            <span>📚</span> Português
        </a>

        <a href="mat/" class="btn-disciplina matematica">
            <span>🧮</span> Matemática
        </a>

        <a href="estudo/" class="btn-disciplina estudo-meio">
            <span>🌍</span> Estudo do Meio
        </a>
    </div>

    <a href="../" class="btn-voltar">⬅ Voltar</a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
