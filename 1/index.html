<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Recursos Digitais</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ff9f43; /* Laranja do 1º Ano */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .emoji-principal {
            font-size: 80px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitulo {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
            opacity: 0.9;
        }

        /* Contentor dos Botões */
        .menu-jogos {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .btn-jogo {
            background-color: white;
            color: #ff9f43;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 0 #e67e22, 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn-jogo:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #e67e22, 0 5px 10px rgba(0,0,0,0.1);
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 40px;
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 2px solid white;
            padding-bottom: 2px;
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* Ajuste para ecrãs maiores (Tablets/PC) */
        @media (min-width: 600px) {
            .menu-jogos {
                flex-direction: row;
                max-width: 600px;
            }
            .btn-jogo {
                flex: 1;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🐣</div>
    
    <h1>1º Ano</h1>
    <p class="subtitulo">Olá, pequenos exploradores! Escolham um desafio matemático:</p>

    <div class="menu-jogos">
        <a href="soma10/"" class="btn-jogo">
            <span>➕</span> Somar10
        </a>

        <href="subtrair10/" class="btn-jogo">
            <span>➖</span> Subtrair10
        </a>
    </div>

    <a href="../" class="btn-voltar">
        ⬅ Voltar ao Menu Principal
    </a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
