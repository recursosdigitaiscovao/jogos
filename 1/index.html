<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7f50;
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            width: 100%;
            padding: 30px 10px 50px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }

        /* Botão Voltar para o diretório anterior */
        .btn-voltar {
            position: absolute;
            right: 20px;
            top: 25px;
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 107, 26, 0.3);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 20;
        }

        .btn-voltar:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        h1 {
            white-space: nowrap;
            font-size: clamp(1.1rem, 5vh, 2.8rem);
            color: var(--vibrant-orange);
            text-shadow: 3px 3px 0px #ffe0cc;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-text {
            color: #8c5d40;
            font-size: clamp(0.8rem, 2vh, 1.1rem);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            padding: 20px 25px; 
            overflow-y: auto; /* Permite scroll se houver muitos jogos novos */
        }

        footer {
            background: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1rem;
            color: #777;
            font-weight: normal; 
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        @media (max-width: 800px) {
            h1 { font-size: clamp(1rem, 5.5vw, 1.5rem); }

            .btn-voltar {
                padding: 5px 10px;
                font-size: 0.75rem;
                top: 15px;
                right: 10px;
            }

            header { 
                padding: 20px 10px 35px 10px; 
                border-bottom-left-radius: 50% 10%;
                border-bottom-right-radius: 50% 10%;
            }
        }

        @media (max-height: 550px) {
            .header-text { display: none; }
            header { padding: 10px 0 20px 0; }
            .btn-voltar { top: 5px; }
        }
    </style>
</head>
<body>

    <header>
        <!-- Link para o diretório anterior -->
        <a href="../" class="btn-voltar">
            <span>⬅</span> Voltar
        </a>
        
        <h1><span>🐥</span> Jogos do 1º Ano <span style="font-size: 0.8em;">⭐</span><span>✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <!-- Os botões de seleção de ano foram removidos. 
             Podes colocar aqui os novos conteúdos ou jogos do 1º ano. -->
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
