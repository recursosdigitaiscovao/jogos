<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7f50;
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
            --cor-texto: #8c5d40;
            
            --azul-pt: #5ea2e6;
            --azul-pt-fundo: #ebf4ff;
            --verde-mat: #45cfa8;
            --verde-mat-fundo: #e8f9f4;
            --vermelho-em: #ff4757;
            --vermelho-em-fundo: #fff0f1;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            width: 100%;
            padding: 40px 10px 60px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }

        .btn-voltar {
            position: absolute;
            right: 20px;
            top: 25px;
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 107, 26, 0.3);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 20;
        }

        .btn-voltar:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        h1 {
            white-space: nowrap;
            font-size: clamp(1.1rem, 5vh, 2.8rem);
            color: var(--vibrant-orange);
            text-shadow: 3px 3px 0px #ffe0cc;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-text {
            color: #8c5d40;
            font-size: clamp(0.8rem, 2vh, 1.1rem);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 20px 25px; 
            overflow: hidden; /* Mantém os botões contidos */
        }

        .games-grid {
            display: grid;
            width: 100%;
            height: 100%; /* Ocupa o máximo do main */
            max-width: 1200px;
            gap: 20px;
            grid-template-columns: repeat(3, 1fr); 
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-decoration: none;
            height: 100%; /* Faz o card esticar na grelha */
        }

        .game-img-container {
            width: 100%; 
            height: 60%; /* Proporção para a imagem */
            border-radius: 18px; 
            margin-bottom: 12px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        .game-img-container img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        /* --- Estilos Específicos --- */
        .card-pt { border: 4px solid var(--azul-pt); }
        .card-pt .game-img-container { background: var(--azul-pt-fundo); }
        .card-pt h2 { color: var(--azul-pt); }

        .card-mat { border: 4px solid var(--verde-mat); }
        .card-mat .game-img-container { background: var(--verde-mat-fundo); }
        .card-mat h2 { color: var(--verde-mat); }

        .card-em { border: 4px solid var(--vermelho-em); }
        .card-em .game-img-container { background: var(--vermelho-em-fundo); }
        .card-em h2 { color: var(--vermelho-em); }

        h2 { 
            font-size: clamp(1rem, 3vh, 1.5rem); 
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        footer {
            background: white;
            padding: 10px 0; /* Reduzido conforme pedido */
            text-align: center;
            font-size: 0.9rem;
            color: #777;
            font-weight: normal; 
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        @media (max-width: 800px) {
            h1 { font-size: clamp(1rem, 5.5vw, 1.5rem); }

            .btn-voltar {
                padding: 5px 10px;
                font-size: 0.75rem;
                top: 15px;
                right: 10px;
            }

            header { 
                padding: 20px 10px 40px 10px; 
                border-bottom-left-radius: 50% 10%;
                border-bottom-right-radius: 50% 10%;
            }

            .games-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(3, 1fr); /* Divide o espaço em 3 partes iguais */
                gap: 12px;
            }
            
            main {
                padding: 20px; 
            }

            .game-card {
                padding: 10px;
            }

            .game-img-container {
                height: 50%;
                margin-bottom: 5px;
            }

            h2 {
                font-size: 1.1rem;
            }
        }

        @media (max-height: 600px) {
            .header-text { display: none; }
            header { padding: 10px 0 25px 0; }
            main { padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../" class="btn-voltar">
            <span>⬅</span> Voltar
        </a>
        
        <h1><span>🐥</span> Jogos do 1º Ano <span style="font-size: 0.8em;">✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="games-grid">
            <!-- Português -->
            <a href="pt" class="game-card card-pt">
                <div class="game-img-container">
                    <img src="img/pt.png" alt="Português">
                </div>
                <h2>Português</h2>
            </a>

            <!-- Matemática -->
            <a href="mat" class="game-card card-mat">
                <div class="game-img-container">
                    <img src="img/mat.png" alt="Matemática">
                </div>
                <h2>Matemática</h2>
            </a>

            <!-- Estudo do Meio -->
            <a href="em" class="game-card card-em">
                <div class="game-img-container">
                    <img src="img/em.png" alt="Estudo do Meio">
                </div>
                <h2>Estudo do Meio</h2>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
