<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7f50;
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
            --cor-texto: #8c5d40;
            --azul-pt: #5ea2e6;
            --azul-pt-fundo: #ebf4ff;
            --verde-mat: #45cfa8;
            --verde-mat-fundo: #e8f9f4;
            --vermelho-em: #ff4757;
            --vermelho-em-fundo: #fff0f1;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        /* HEADER AJUSTADO */
        header {
            width: 100%;
            padding: 20px 20px 40px 20px;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 5px 20px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            position: relative; /* Base para o botão absoluto */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* Garante que o conteúdo flex (h1, p) centre */
            min-height: 110px;
            text-align: center;
        }

        .btn-voltar {
            position: absolute;
            right: 20px; /* Alinhado à direita */
            top: 50%;
            transform: translateY(-50%); /* Centro vertical exato */
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s;
        }

        .btn-voltar:hover {
            transform: translateY(-50%) scale(1.05);
        }

        h1 {
            font-size: clamp(1.2rem, 4vh, 2.5rem);
            color: var(--vibrant-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0;
            width: 100%;
            padding: 0 100px; /* Margem interna para o texto nunca bater no botão */
        }

        .header-text {
            color: #8c5d40;
            font-size: clamp(0.7rem, 1.8vh, 1.1rem);
            margin-top: 5px;
            width: 100%;
            padding: 0 100px; /* Margem interna para manter o centro */
        }

        main {
            flex: 1;
            display: flex;
            padding: 20px;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        .games-grid {
            display: grid;
            width: 100%;
            height: 100%;
            max-width: 1100px;
            gap: 20px;
            grid-template-columns: repeat(3, 1fr);
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            height: 100%;
            min-height: 0;
            border-bottom: 8px solid rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .game-img-container {
            flex: 1;
            width: 100%;
            border-radius: 20px; 
            margin-bottom: 10px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 0;
        }

        .game-img-container img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        h2 { 
            font-size: clamp(1rem, 3vh, 1.6rem);
            color: inherit;
            margin: 10px 0;
            flex-shrink: 0;
        }

        /* Cores */
        .card-pt { border: 4px solid var(--azul-pt); color: var(--azul-pt); }
        .card-pt .game-img-container { background: var(--azul-pt-fundo); }
        .card-mat { border: 4px solid var(--verde-mat); color: var(--verde-mat); }
        .card-mat .game-img-container { background: var(--verde-mat-fundo); }
        .card-em { border: 4px solid var(--vermelho-em); color: var(--vermelho-em); }
        .card-em .game-img-container { background: var(--vermelho-em-fundo); }

        footer {
            background: white;
            padding: 10px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            flex-shrink: 0;
        }

        /* --- Ajustes para PC / Ecrãs Grandes --- */
        @media (min-width: 1024px) {
            header, footer {
                padding-left: 100px;
                padding-right: 100px;
            }
            .btn-voltar {
                right: 100px;
            }
            .games-grid {
                height: 75%;
                max-height: 700px;
            }
        }

        /* Telemóvel Vertical */
        @media (max-width: 650px) and (orientation: portrait) {
            .games-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(3, 1fr);
                height: 100%;
                gap: 12px;
            }
            header { padding: 20px 10px 35px 10px; }
            h1, .header-text { padding: 0 80px; } /* Ajuste para não sobrepor em telas muito estreitas */
            .btn-voltar { right: 10px; }
        }

        /* Telemóvel Deitado ou ecrãs baixos */
        @media (max-height: 550px) {
            header { min-height: 80px; padding: 10px 10px 25px 10px; }
            .header-text { display: none; }
            h1 { font-size: 1.2rem; padding: 0 90px; }
            .games-grid { height: 90%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../" class="btn-voltar">
            <span>⬅</span> Voltar
        </a>
        
        <h1><span>🐥</span>1º Ano <span>✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="games-grid">
            <a href="pt" class="game-card card-pt">
                <div class="game-img-container">
                    <img src="img/pt.png" alt="Português">
                </div>
                <h2>Português</h2>
            </a>

            <a href="mat" class="game-card card-mat">
                <div class="game-img-container">
                    <img src="img/mat.png" alt="Matemática">
                </div>
                <h2>Matemática</h2>
            </a>

            <a href="em" class="game-card card-em">
                <div class="game-img-container">
                    <img src="img/em.png" alt="Estudo do Meio">
                </div>
                <h2>Estudo do Meio</h2>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
