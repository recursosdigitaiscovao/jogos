<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Escola Divertida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7f50;
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
            
            /* Cores vibrantes para os novos cartões */
            --cor-soma: #ff9f43;
            --cor-subtrai: #ee5253;
            --cor-sequencia: #feca57;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            width: 100%;
            padding: 30px 10px 50px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }

        .btn-voltar {
            position: absolute;
            right: 20px;
            top: 25px;
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 107, 26, 0.3);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 20;
        }

        .btn-voltar:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        h1 {
            white-space: nowrap;
            font-size: clamp(1.1rem, 5vh, 2.8rem);
            color: var(--vibrant-orange);
            text-shadow: 3px 3px 0px #ffe0cc;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-text {
            color: #8c5d40;
            font-size: clamp(0.8rem, 2vh, 1.1rem);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 0 25px; 
            min-height: 0;
        }

        .grid-container {
            display: grid;
            width: 100%;
            height: 50%; 
            max-width: 1000px;
            gap: 20px;
            /* Definido para 3 colunas para os 3 novos cartões */
            grid-template-columns: repeat(3, 1fr); 
        }

        .card {
            text-decoration: none;
            color: white;
            height: 100%; 
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(211, 84, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid white;
            text-align: center;
            padding: 20px;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(211, 84, 0, 0.25);
        }

        .icon { 
            font-size: clamp(3rem, 10vh, 5.5rem); 
            margin-bottom: 15px; 
            display: block;
        }
        
        .soma { background-color: var(--cor-soma); }
        .subtrai { background-color: var(--cor-subtrai); }
        .sequencia { background-color: var(--cor-sequencia); }

        footer {
            background: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1rem;
            color: #777;
            font-weight: normal; 
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        @media (max-width: 800px) {
            h1 { font-size: clamp(1rem, 5.5vw, 1.5rem); }

            .btn-voltar {
                padding: 5px 10px;
                font-size: 0.75rem;
                top: 15px;
                right: 10px;
            }

            header { 
                padding: 20px 10px 35px 10px; 
                border-bottom-left-radius: 50% 10%;
                border-bottom-right-radius: 50% 10%;
            }

            .grid-container {
                height: 70%; 
                grid-template-columns: 1fr; /* Cartões em lista no telemóvel */
                max-width: 300px;
            }

            .icon {
                font-size: 3rem;
                margin-bottom: 5px;
            }
        }

        @media (max-height: 550px) {
            .header-text { display: none; }
            header { padding: 10px 0 20px 0; }
            .btn-voltar { top: 5px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../" class="btn-voltar">
            <span>⬅</span> Voltar
        </a>
        
        <h1><span>🐥</span> Jogos do 1º Ano <span style="font-size: 0.8em;">⭐</span><span>✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="grid-container">
            <!-- Cartão 1 -->
            <a href="somar.html" class="card soma">
                <span class="icon">➕</span>
                <span>Somar e Aprender</span>
            </a>
            
            <!-- Cartão 2 -->
            <a href="subtrair.html" class="card subtrai">
                <span class="icon">➖</span>
                <span>Subtrair a brincar</span>
            </a>
            
            <!-- Cartão 3 -->
            <a href="sequencia.html" class="card sequencia">
                <span class="icon">🔢</span>
                <span>Sequência Numérica</span>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
