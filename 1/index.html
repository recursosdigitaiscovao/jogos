<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Disciplinas</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ff9f43; /* Laranja Sólido */
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .emoji-principal {
            font-size: 70px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitulo {
            font-size: 1.1rem;
            margin-bottom: 25px;
            max-width: 450px;
            opacity: 0.9;
        }

        .menu-disciplinas {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-disciplina {
            background-color: white;
            text-decoration: none;
            font-size: 1.3rem; /* Fonte ajustada para caber em linha */
            font-weight: bold;
            padding: 18px 10px;
            border-radius: 20px;
            box-shadow: 0 6px 0 #e67e22;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            white-space: nowrap; /* Garante que o texto fica numa linha */
            -webkit-tap-highlight-color: transparent;
        }

        .portugues { color: #2980b9; } 
        .matematica { color: #c0392b; }
        .estudo-meio { color: #27ae60; }

        .btn-disciplina:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e67e22;
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 30px;
            text-decoration: none;
            font-size: 1rem;
            border-bottom: 2px solid white;
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            opacity: 0.8;
            font-size: 0.8rem;
        }

        @media (min-width: 700px) {
            .menu-disciplinas {
                flex-direction: row;
                max-width: 900px;
            }
            .btn-disciplina { 
                flex: 1; 
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🐣</div>
    
    <h1>1º Ano</h1>
    <p class="subtitulo">Olá! O que vamos explorar hoje?</p>

    <div class="menu-disciplinas">
        <a href="pt/" class="btn-disciplina portugues">
            <span>📚</span> Português
        </a>

        <a href="mat/" class="btn-disciplina matematica">
            <span>🧮</span> Matemática
        </a>

        <a href="em/" class="btn-disciplina estudo-meio">
            <span>🌍</span> Estudo do Meio
        </a>
    </div>

    <a href="../" class="btn-voltar">⬅ Voltar</a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
