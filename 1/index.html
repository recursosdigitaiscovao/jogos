<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovens Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f0f5fa;    
            --sub-header-bg: #ffffff; 
            --body-bg: #e9f1f8;       
            --primary-blue: #5ba4e5;
            --text-grey: #7a8b9a;
            --voltar-bg: #5ba4e5; /* Cor do botão voltar no menu */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { background-color: var(--body-bg); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* HEADER */
        header { 
            background: var(--header-bg);
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center; 
            padding: 10px 20px;
            min-height: 190px; 
            position: relative;
        }

        .hamburger-btn { 
            font-size: 28px; 
            color: var(--primary-blue); 
            cursor: pointer; 
            background: none; border: none;
        }

        /* TÍTULO COM IMAGEM JUNTO */
        .header-center { display: flex; align-items: center; justify-content: center; gap: 12px; }
        #header-icon { height: 60px; width: auto; }
        .title-group { text-align: left; line-height: 1.1; }
        .title-main { font-weight: 900; font-size: 1.3rem; text-transform: uppercase; display: block; }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.75rem; display: block; }

        /* --- ESTILO DO MENU HAMBURGUER (ESTILO "BOLHAS") --- */
        .menu-dropdown { 
            position: absolute; 
            top: 65px; 
            left: 20px; 
            display: none; 
            flex-direction: column; 
            gap: 10px; /* Espaço entre as bolhas */
            z-index: 2000; 
        }

        /* Cada item do menu é uma bolha branca */
        .menu-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 10px 20px; 
            background: white; 
            border-radius: 15px; /* Bem arredondado */
            box-shadow: 4px 4px 10px rgba(176, 196, 217, 0.4); /* Sombra suave */
            text-decoration: none; 
            color: var(--text-grey); 
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 190px;
            transition: transform 0.2s, background 0.2s;
        }
        .menu-item:hover { transform: translateX(5px); background: #f8fbff; }
        .menu-item img { height: 22px; width: 22px; object-fit: contain; }

        /* Item VOLTAR especial (Azul com texto branco) */
        .menu-item.btn-voltar-menu {
            background: var(--voltar-bg);
            color: white;
            margin-top: 5px; /* Separação extra do último item */
        }
        .menu-item.btn-voltar-menu img {
            filter: brightness(0) invert(1); /* Torna o ícone branco */
        }
        .menu-item.btn-voltar-menu:hover {
            background: #4a93d4;
        }

        /* SUB-HEADER BRANCO CURVO */
        .sub-header {
            background: var(--sub-header-bg);
            text-align: center;
            padding: 15px 10px 15px 10px;
            border-bottom-left-radius: 50% 35px;
            border-bottom-right-radius: 50% 35px;
            box-shadow: 0px 8px 15px rgba(0,0,0,0.03);
            z-index: 5;
        }
        .intro-text { color: #5d7082; font-size: 0.95rem; font-weight: 700; }

        /* ÁREA DOS CARDS */
        main { flex: 1; padding: 30px 20px; display: flex; justify-content: center; }
        .game-wrapper { 
            width: 100%; max-width: 1100px; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; 
        }

        .game-card { 
            background: white; border-radius: 35px; border: 6px solid #ccc; 
            text-decoration: none; padding: 25px; display: flex; flex-direction: column; align-items: center;
            aspect-ratio: 1.1 / 1.2; transition: transform 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }
        .game-card:hover { transform: translateY(-8px); }
        .card-img-container { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .card-img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .game-card h2 { color: #002d58; font-size: 1.3rem; font-weight: 900; margin-top: 15px; }

        footer { padding: 20px; text-align: center; color: var(--text-grey); font-size: 0.75rem; font-weight: 700; }

        @media (max-width: 600px) {
            .title-main { font-size: 1rem; }
            #header-icon { height: 45px; }
            .menu-item { min-width: 160px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="hamburger-btn" onclick="toggleMenu(event)">
                <i class="fas fa-bars"></i>
            </button>
            <!-- Menu Dropdown onde os itens serão injetados -->
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>

        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <span class="title-main">
                    <span id="txt-titulo1" style="color: var(--primary-blue);"></span> 
                    <span id="txt-titulo2" style="color: #a5b4c4;"></span>
                </span>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>
        <div class="header-right"></div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => document.getElementById('dropdownMenu').style.display = 'none';

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // 1. Textos e Ícone Header
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;

                // 2. Gerar Itens do Menu (Estilo Bolhas)
                const menuBox = document.getElementById('dropdownMenu');
                const labels = {
                    home: "Início", pre: "Pré-Escolar", ano1: "1º Ano",
                    ano2: "2º Ano", ano3: "3º Ano", ano4: "4º Ano"
                };

                // Itens Normais
                Object.keys(config.links).forEach(key => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = config.links[key];
                    a.innerHTML = `
                        <img src="${config.caminhoIconsMenu}${config.iconesMenu[key]}">
                        <span>${labels[key] || key}</span>
                    `;
                    menuBox.appendChild(a);
                });

                // Item VOLTAR (no fim do menu)
                const btnVoltar = document.createElement('a');
                btnVoltar.className = 'menu-item btn-voltar-menu';
                btnVoltar.href = "javascript:history.back()";
                btnVoltar.innerHTML = `
                    <img src="${config.caminhoIconsMenu}${config.iconesMenu.voltar}">
                    <span>VOLTAR</span>
                `;
                menuBox.appendChild(btnVoltar);

                // 3. Cartões de Jogos
                const grid = document.getElementById('gamesGrid');
                const cores = { "Português": "#5ba4e5", "Matemática": "#58bc8c", "Estudo do Meio": "#e85a5a" };

                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.borderColor = cores[jogo.nome] || "#cccccc";
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
