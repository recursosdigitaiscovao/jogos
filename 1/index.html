<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Mundo dos Jogos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7f50;
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
            --cor-texto: #8c5d40;
            --azul-pt: #5ea2e6;
            --azul-pt-fundo: #ebf4ff;
            --verde-mat: #45cfa8;
            --verde-mat-fundo: #e8f9f4;
            --vermelho-em: #ff4757;
            --vermelho-em-fundo: #fff0f1;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        /* --- Estilos do Menu Sidebar --- */
        .sidebar { 
            position: fixed; top: 0; left: -260px; width: 240px; height: 100%; 
            background: white; box-shadow: 5px 0 15px rgba(0,0,0,0.1); 
            transition: 0.3s; z-index: 2000; padding-top: 10px; 
        }
        .sidebar.active { left: 0; }
        
        .sidebar-item { 
            display: flex; align-items: center; padding: 15px 25px; 
            color: #555; text-decoration: none; border-bottom: 1px solid #f9f9f9;
            transition: 0.3s; font-weight: bold;
        }
        .sidebar-item:hover { background-color: var(--soft-orange); color: var(--vibrant-orange); }

        .img-icon-sidebar { height: 26px; width: auto; margin-right: 12px; }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.3); display: none; z-index: 1500; 
        }
        .overlay.active { display: block; }

        .menu-btn {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 28px; cursor: pointer;
            color: var(--vibrant-orange); z-index: 20;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 20px 10px 40px 10px; 
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 5px 20px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            position: relative; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; 
            min-height: 110px;
            text-align: center;
        }

        .img-icon-header {
            height: clamp(40px, 6vh, 60px);
            width: auto;
            vertical-align: middle;
        }

        .btn-voltar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background-color: var(--vibrant-orange); color: white;
            text-decoration: none; padding: 8px 16px; border-radius: 50px;
            font-weight: bold; font-size: 0.9rem; z-index: 20;
            display: flex; align-items: center; gap: 5px; transition: 0.2s;
            white-space: nowrap;
        }

        h1 {
            font-size: clamp(1.1rem, 3.5vh, 2.2rem); 
            color: var(--vibrant-orange);
            display: flex; align-items: center; justify-content: center;
            gap: 12px; margin: 0; width: 100%; padding: 0 110px; 
        }

        .header-text {
            color: #8c5d40; font-size: clamp(0.7rem, 1.8vh, 1rem);
            margin-top: 4px; width: 100%; padding: 0 110px;
        }

        main {
            flex: 1; display: flex; padding: 20px;
            justify-content: center; align-items: center; min-height: 0;
        }

        .games-grid {
            display: grid; width: 100%; height: 100%;
            max-width: 1100px; gap: 20px; grid-template-columns: repeat(3, 1fr);
        }

        .game-card {
            background: white; border-radius: 25px; padding: 15px;
            text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-decoration: none;
            height: 100%; border-bottom: 8px solid rgba(0,0,0,0.08); transition: 0.3s;
        }

        .game-img-container {
            flex: 1; width: 100%; border-radius: 20px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; min-height: 0;
        }

        .game-img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }

        h2 { font-size: clamp(0.9rem, 2.5vh, 1.5rem); color: inherit; margin: 10px 0; }

        .card-pt { border: 4px solid var(--azul-pt); color: var(--azul-pt); }
        .card-pt .game-img-container { background: var(--azul-pt-fundo); }
        .card-mat { border: 4px solid var(--verde-mat); color: var(--verde-mat); }
        .card-mat .game-img-container { background: var(--verde-mat-fundo); }
        .card-em { border: 4px solid var(--vermelho-em); color: var(--vermelho-em); }
        .card-em .game-img-container { background: var(--vermelho-em-fundo); }

        footer { background: white; padding: 10px 0; text-align: center; font-size: 0.85rem; color: #888; flex-shrink: 0; }

        @media (max-width: 650px) and (orientation: portrait) {
            .games-grid { grid-template-columns: 1fr; grid-template-rows: repeat(3, 1fr); height: 100%; gap: 12px; }
            header { padding: 20px 10px 35px 10px; }
            .btn-voltar { right: 10px; padding: 6px 10px; font-size: 0.75rem; }
            .menu-btn { left: 10px; }
            h1, .header-text { padding: 0 75px; } 
        }

        @media (max-height: 550px) {
            header { min-height: 75px; padding: 10px 10px 25px 10px; }
            .header-text { display: none; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- Estrutura do Menu Lateral -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--vibrant-orange);">MENU</span>
            <button onclick="toggleMenu()" style="border:none; background:none; cursor:pointer; font-size: 18px;">✕</button>
        </div>
        <a href="/" class="sidebar-item">🏠 Início</a>
        <a href="/jogos/pre/" class="sidebar-item"><img src="img/iconpre.png" class="img-icon-sidebar"> Pré-Escolar</a>
        <a href="/jogos/1/" class="sidebar-item"><img src="img/icon1.png" class="img-icon-sidebar"> 1º Ano</a>
        <a href="/jogos/2/" class="sidebar-item"><img src="img/icon2.png" class="img-icon-sidebar"> 2º Ano</a>
        <a href="/jogos/3/" class="sidebar-item"><img src="img/icon3.png" class="img-icon-sidebar"> 3º Ano</a>
        <a href="/jogos/4/" class="sidebar-item"><img src="img/icon4.png" class="img-icon-sidebar"> 4º Ano</a>
    </div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        
        <a href="../" class="btn-voltar">
            <span>⬅</span> Voltar
        </a>
        
        <h1>
            <img src="img/icon1.png" alt="1º Ano" class="img-icon-header"> 
            1º Ano 
            <span>✨</span>
        </h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="games-grid">
            <a href="pt" class="game-card card-pt">
                <div class="game-img-container">
                    <img src="img/pt.png" alt="Português">
                </div>
                <h2>Português</h2>
            </a>

            <a href="mat" class="game-card card-mat">
                <div class="game-img-container">
                    <img src="img/mat.png" alt="Matemática">
                </div>
                <h2>Matemática</h2>
            </a>

            <a href="em" class="game-card card-em">
                <div class="game-img-container">
                    <img src="img/em.png" alt="Estudo do Meio">
                </div>
                <h2>Estudo do Meio</h2>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>

</body>
</html>
