<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7f50;
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
            --cor-texto: #8c5d40;
            --azul-pt: #5ea2e6;
            --azul-pt-fundo: #ebf4ff;
            --verde-mat: #45cfa8;
            --verde-mat-fundo: #e8f9f4;
            --vermelho-em: #ff4757;
            --vermelho-em-fundo: #fff0f1;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; /* Impede scroll global */
        }

        header {
            width: 100%;
            padding: 2vh 10px 4vh 10px; /* Padding baseado na altura do ecrã */
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 15%;
            border-bottom-right-radius: 50% 15%;
            box-shadow: 0 5px 20px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            position: relative;
        }

        .btn-voltar {
            position: absolute;
            right: 15px;
            top: 15px;
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 20;
        }

        h1 {
            font-size: clamp(1.2rem, 4vh, 2.2rem);
            color: var(--vibrant-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-text {
            color: #8c5d40;
            font-size: clamp(0.7rem, 1.8vh, 1rem);
        }

        main {
            flex: 1;
            display: flex;
            padding: 15px;
            justify-content: center;
            align-items: center;
            min-height: 0; /* Importante para flexbox container */
        }

        .games-grid {
            display: grid;
            width: 100%;
            height: 100%;
            max-width: 1000px;
            gap: 15px;
            /* Layout padrão: 3 colunas */
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
            height: 100%;
            min-height: 0;
            border-bottom: 6px solid rgba(0,0,0,0.1);
        }

        .game-img-container {
            flex: 1; /* Ocupa o espaço disponível */
            width: 100%;
            border-radius: 15px; 
            margin-bottom: 8px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 0;
        }

        .game-img-container img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        h2 { 
            font-size: clamp(0.9rem, 2.5vh, 1.3rem);
            color: inherit;
            margin: 5px 0;
            flex-shrink: 0;
        }

        /* Cores */
        .card-pt { border: 3px solid var(--azul-pt); color: var(--azul-pt); }
        .card-pt .game-img-container { background: var(--azul-pt-fundo); }
        .card-mat { border: 3px solid var(--verde-mat); color: var(--verde-mat); }
        .card-mat .game-img-container { background: var(--verde-mat-fundo); }
        .card-em { border: 3px solid var(--vermelho-em); color: var(--vermelho-em); }
        .card-em .game-img-container { background: var(--vermelho-em-fundo); }

        footer {
            background: white;
            padding: 8px 0;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            flex-shrink: 0;
        }

        /* Ajuste para ecrãs verticais (Telemóvel em pé) */
        @media (max-width: 600px) and (orientation: portrait) {
            .games-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(3, 1fr);
            }
            header { padding: 3vh 10px; }
            h1 { font-size: 1.5rem; }
        }

        /* Ajuste para ecrãs muito pequenos ou Telemóveis deitados */
        @media (max-height: 500px) {
            header { padding: 5px; }
            .header-text { display: none; }
            h1 { font-size: 1.1rem; }
            .btn-voltar { top: 5px; padding: 4px 8px; font-size: 0.7rem; }
            main { padding: 8px; }
            .games-grid { gap: 8px; }
            footer { padding: 4px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../" class="btn-voltar">⬅ Voltar</a>
        <h1><span>🐥</span> 1º Ano <span>✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="games-grid">
            <a href="pt" class="game-card card-pt">
                <div class="game-img-container">
                    <img src="img/pt.png" alt="Português">
                </div>
                <h2>Português</h2>
            </a>

            <a href="mat" class="game-card card-mat">
                <div class="game-img-container">
                    <img src="img/mat.png" alt="Matemática">
                </div>
                <h2>Matemática</h2>
            </a>

            <a href="em" class="game-card card-em">
                <div class="game-img-container">
                    <img src="img/em.png" alt="Estudo do Meio">
                </div>
                <h2>Estudo do Meio</h2>
            </a>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
