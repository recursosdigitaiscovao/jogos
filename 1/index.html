<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-content: #ebf4f8; /* Azul muito claro de fundo */
            --white: #ffffff;
            --text-dark: #002d4b;
            --orange-btn: #ff7f27;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background-color: var(--bg-content); 
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
        }

        /* HEADER COM CURVA */
        .header-container {
            background-color: var(--white);
            padding-bottom: 40px;
            position: relative;
            z-index: 10;
            /* Efeito de curva no fundo */
            border-bottom-left-radius: 50% 20px;
            border-bottom-right-radius: 50% 20px;
        }

        header { 
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center; 
            padding: 20px;
        }

        .hamburger-btn { font-size: 24px; color: #7cb5d2; cursor: pointer; }

        .header-center { display: flex; align-items: center; gap: 15px; }
        #header-logo { height: 80px; width: auto; }
        
        .header-titles { display: flex; flex-direction: column; }
        .title-main { color: #52a2d4; font-weight: 900; font-size: 1.6rem; letter-spacing: 1px; line-height: 1.1; }
        .title-sub { color: #88a0b0; font-weight: 700; font-size: 0.9rem; }

        .btn-voltar {
            background-color: var(--orange-btn);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        /* ÁREA CENTRAL */
        main {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .intro-text {
            text-align: center; 
            color: var(--text-dark);
            font-size: 1.1rem; 
            font-weight: 700;
            margin: 20px 0 40px 0;
        }

        .game-grid { 
            width: 100%;
            max-width: 1100px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            justify-content: center;
        }

        /* ESTILO DOS CARDS IGUAL À IMAGEM */
        .game-card { 
            background: white; 
            border-radius: 30px; 
            padding: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
            border: 6px solid transparent; /* Reservado para a cor */
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        
        .game-card:hover { transform: translateY(-10px); }

        .card-inner-bg {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .card-inner-bg img { max-width: 85%; max-height: 85%; object-fit: contain; }

        .game-card h2 { 
            color: #002d4b; 
            font-size: 1.4rem; 
            font-weight: 900; 
            margin-bottom: 10px;
        }

        /* VARIAÇÕES DE CORES DOS CARDS */
        .card-blue { border-color: #52a2d4; }
        .card-blue .card-inner-bg { background-color: #e2f1f9; }

        .card-green { border-color: #5bc08f; }
        .card-green .card-inner-bg { background-color: #e6f6ee; }

        .card-red { border-color: #f16d6d; }
        .card-red .card-inner-bg { background-color: #fdeadc; } /* Cor pastel avermelhada */

        /* FOOTER */
        footer {
            padding: 20px;
            text-align: center;
            color: #88a0b0;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* MENU MOBILE */
        .menu-dropdown { 
            position: absolute; top: 70px; left: 20px; 
            display: none; flex-direction: column; gap: 5px; z-index: 2000; 
            background: white; padding: 10px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .menu-item { text-decoration: none; color: var(--text-dark); padding: 10px; font-weight: 700; display: block;}

        /* Responsividade */
        @media (max-width: 768px) {
            .title-main { font-size: 1.2rem; }
            .btn-voltar span { display: none; }
            .game-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <header>
            <div class="header-left">
                <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
                <div id="dropdownMenu" class="menu-dropdown">
                    <!-- Gerado por JS se necessário -->
                    <a href="#" class="menu-item">Início</a>
                    <a href="#" class="menu-item">1º Ano</a>
                </div>
            </div>

            <div class="header-center">
                <img id="header-logo" src="" alt="Logo">
                <div class="header-titles">
                    <div id="txt-titulo" class="title-main"></div>
                    <div id="txt-subtitulo" class="title-sub"></div>
                </div>
            </div>

            <a id="link-voltar" href="" class="btn-voltar">
                <i class="fas fa-arrow-left"></i>
                <span>Voltar</span>
            </a>
        </header>
    </div>

    <main>
        <div id="txt-intro" class="intro-text"></div>
        
        <div class="game-grid" id="gamesGrid">
            <!-- Os cards são injetados aqui -->
        </div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => { document.getElementById('dropdownMenu').style.display = 'none'; };

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // 1. Textos e Logo
                document.getElementById('txt-titulo').innerText = config.textos.titulo;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-logo').src = config.caminhoIconsMenu + config.iconesMenu.girafa;
                document.getElementById('link-voltar').href = config.links.voltar;

                // 2. Gerar Cards
                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    // Atribui a classe específica (card-blue, card-green, card-red)
                    card.className = `game-card ${jogo.classe}`;
                    card.href = jogo.link;
                    
                    card.innerHTML = `
                        <div class="card-inner-bg">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
