<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Leitores</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vibrant-orange: #ff6b1a;
            --cor-bg-pagina: #edf5fd; /* A cor de fundo azulada da imagem */
            
            --azul-card: #5ea2e6;
            --azul-fundo: #e3effd;
            
            --verde-card: #45cfa8;
            --verde-fundo: #e8f7f2;
            
            --vermelho-card: #ff4757;
            --vermelho-fundo: #fff1f2;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--cor-bg-pagina);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Cabeçalho com a curva da imagem --- */
        header {
            background: white;
            padding: 20px 40px 50px 40px;
            border-bottom-left-radius: 50% 25px; /* Curva suave nas pontas */
            border-bottom-right-radius: 50% 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            text-align: center;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
        }

        .menu-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--azul-card); }

        .logo-box { display: flex; align-items: center; gap: 12px; text-align: left; }
        .logo-img { height: 65px; width: auto; }
        .logo-text h1 { font-size: 1.4rem; color: var(--azul-card); line-height: 1; text-transform: uppercase; letter-spacing: 0.5px; }
        .logo-text span { font-size: 0.8rem; color: #999; display: block; margin-top: 3px; }

        .btn-voltar {
            background-color: var(--vibrant-orange);
            color: white; text-decoration: none;
            padding: 6px 18px; border-radius: 50px;
            font-weight: 600; font-size: 0.85rem;
            display: flex; align-items: center; gap: 6px;
        }

        .pergunta { margin-top: 25px; color: #555; font-size: 1.05rem; font-weight: 500; }

        /* --- Grid de Jogos --- */
        main { flex: 1; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; }

        .games-grid {
            display: grid;
            width: 100%;
            max-width: 1100px;
            gap: 20px;
            grid-template-columns: repeat(3, 1fr);
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 12px;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            border: 4px solid #eee; /* Cor base */
        }
        .game-card:hover { transform: translateY(-5px); }

        .game-img-box {
            width: 100%;
            height: 280px; /* Altura generosa para a imagem */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .game-img-box img { max-width: 80%; max-height: 80%; object-fit: contain; }

        .game-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            padding: 10px 0;
            color: #1a2a40; /* Cor do texto aproximada da imagem */
        }

        /* Cores dos Cards iguais à imagem */
        .card-0 { border-color: var(--azul-card); }
        .card-0 .game-img-box { background-color: var(--azul-fundo); }

        .card-1 { border-color: var(--verde-card); }
        .card-1 .game-img-box { background-color: var(--verde-fundo); }

        .card-2 { border-color: var(--vermelho-card); }
        .card-2 .game-img-box { background-color: var(--vermelho-fundo); }

        /* Sidebar e Overlay */
        .sidebar { position: fixed; top: 0; left: -260px; width: 240px; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding-top: 10px; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
        .sidebar.active { left: 0; }
        .sidebar-item { display: flex; align-items: center; padding: 15px 25px; color: #555; text-decoration: none; border-bottom: 1px solid #f5f5f5; }
        .sidebar-item:hover { background: var(--vibrant-orange); color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        footer { padding: 20px; text-align: center; color: #999; font-size: 0.8rem; }

        @media (max-width: 850px) {
            .games-grid { grid-template-columns: 1fr; max-width: 380px; }
            .btn-voltar span { display: none; }
            .logo-text h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding: 15px; text-align: right;"><button onclick="toggleMenu()" style="border:none; background:none; cursor:pointer; font-size:20px;">✕</button></div>
        <div id="side-links"></div>
    </div>

    <header>
        <div class="header-top">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="logo-box">
                <img id="logo-main" src="" class="logo-img">
                <div class="logo-text">
                    <h1 id="tit-1"></h1>
                    <h1 id="tit-2"></h1>
                    <span id="tit-sub"></span>
                </div>
            </div>
            <a href="../" class="btn-voltar">← <span>Voltar</span></a>
        </div>
        <p class="pergunta" id="tit-intro"></p>
    </header>

    <main>
        <div class="games-grid" id="grid"></div>
    </main>

    <footer id="rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        window.onload = () => {
            const d = JOGO_CONFIG;
            
            // Textos Header
            document.getElementById('tit-1').innerText = d.textos.tituloLinha1;
            document.getElementById('tit-2').innerText = d.textos.tituloLinha2;
            document.getElementById('tit-sub').innerText = d.textos.subtitulo;
            document.getElementById('tit-intro').innerText = d.textos.intro;
            document.getElementById('rodape').innerText = d.textos.rodape;
            document.getElementById('logo-main').src = d.caminhoIconsMenu + d.iconesMenu.ano1;

            // Sidebar
            const links = [
                {t: "Início", l: d.links.home, i: d.iconesMenu.home},
                {t: "1º Ano", l: d.links.ano1, i: d.iconesMenu.ano1},
                {t: "2º Ano", l: d.links.ano2, i: d.iconesMenu.ano2}
            ];
            document.getElementById('side-links').innerHTML = links.map(item => `
                <a href="${item.l}" class="sidebar-item">
                    <img src="${d.caminhoIconsMenu}${item.i}" style="height:22px; margin-right:10px;"> ${item.t}
                </a>
            `).join('');

            // Grid de Jogos
            document.getElementById('grid').innerHTML = d.listaJogos.map((j, idx) => `
                <a href="${j.link}" class="game-card card-${idx}">
                    <div class="game-img-box">
                        <img src="${d.caminhoIconsJogos}${j.icon}">
                    </div>
                    <h2>${j.nome}</h2>
                </a>
            `).join('');
        };
    </script>
</body>
</html>
