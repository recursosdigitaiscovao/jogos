<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Exploradores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f0f5fa;    
            --sub-header-bg: #ffffff; 
            --body-bg: #e9f1f8;       
            --primary-blue: #5ba4e5;
            --text-grey: #7a8b9a;
            --voltar-bg: #5ba4e5; 
        }

        /* CONFIGURAÇÃO PARA ECRÃ INTEIRO SEM SCROLL */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        html, body { 
            height: 100vh; 
            height: -webkit-fill-available; /* Ajuste para browsers mobile */
            overflow: hidden; 
        }

        body { 
            background-color: var(--body-bg); 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER (Altura Controlada) */
        header { 
            background: var(--header-bg);
            display: grid;
            grid-template-columns: 50px 1fr auto;
            align-items: center; 
            padding: 5px 15px;
            min-height: 70px; 
            position: relative;
            flex-shrink: 0;
        }

        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; background: none; border: none; }

        .header-center { display: flex; align-items: center; justify-content: center; gap: 8px; }
        #header-icon { height: 45px; width: auto; }
        .title-group { text-align: left; line-height: 1.1; }
        .title-main { font-weight: 900; font-size: 1rem; text-transform: uppercase; display: flex; flex-direction: column; }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.65rem; display: block; }

        .header-right { padding-left: 10px; }
        .btn-voltar-topo {
            display: flex; align-items: center; gap: 6px;
            background: var(--voltar-bg); color: white; text-decoration: none;
            padding: 8px 12px; border-radius: 12px; font-weight: 800; font-size: 0.75rem;
            cursor: pointer;
        }
        .btn-voltar-topo img { height: 14px; filter: brightness(0) invert(1); }

        /* MENU HAMBURGUER (ESTILO BOLHAS) */
        .menu-dropdown { 
            position: absolute; top: 60px; left: 15px; display: none; 
            flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 15px; 
            background: white; border-radius: 15px; box-shadow: 4px 4px 12px rgba(0,0,0,0.1);
            text-decoration: none; color: var(--text-grey); font-weight: 700; font-size: 0.85rem; min-width: 170px;
        }
        .menu-item img { height: 20px; width: 20px; }
        .menu-item.btn-voltar-menu { background: var(--voltar-bg); color: white; }
        .menu-item.btn-voltar-menu img { filter: brightness(0) invert(1); }

        /* SUB-HEADER (Reduzido no Mobile) */
        .sub-header {
            background: var(--sub-header-bg); text-align: center; padding: 8px;
            border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.03); z-index: 5;
            flex-shrink: 0;
        }
        .intro-text { color: #5d7082; font-size: 0.85rem; font-weight: 700; }

        /* ÁREA DOS JOGOS (Ocupa o espaço central) */
        main { 
            flex: 1; 
            padding: 10px 15px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .game-wrapper { 
            display: flex;
            flex-direction: column; /* Um por baixo do outro no mobile */
            gap: 8px; 
            height: 100%;
        }

        /* CARTÕES (Dividem a altura disponível em 3) */
        .game-card { 
            background: white; 
            border-radius: 20px; 
            border: 3px solid #ccc; 
            text-decoration: none; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            flex: 1; /* CADA CARTÃO OCUPA 1/3 DO ESPAÇO DISPONÍVEL */
            min-height: 0; /* Permite que o flex encolha o conteúdo */
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
        }

        .card-img-container { 
            flex: 1; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 15px; 
            background-color: #f0f0f0; 
            margin-bottom: 5px;
            min-height: 0; /* Crucial para o redimensionamento interno */
        }
        .card-img-container img { max-height: 90%; max-width: 80%; object-fit: contain; }
        
        .game-card h2 { color: #002d58; font-size: 0.9rem; font-weight: 900; flex-shrink: 0; }

        /* RODAPÉ (Fixo na base) */
        footer { 
            padding: 10px; 
            text-align: center; 
            color: var(--text-grey); 
            font-size: 0.65rem; 
            font-weight: 700; 
            flex-shrink: 0;
        }

        /* AJUSTES PARA DESKTOP / TABLET */
        @media (min-width: 768px) {
            header { padding: 10px 30px; min-height: 90px; }
            #header-icon { height: 60px; }
            .title-main { font-size: 1.3rem; }
            .sub-header { padding: 15px; border-bottom-left-radius: 50% 40px; border-bottom-right-radius: 50% 40px; }
            .intro-text { font-size: 1rem; }
            
            .game-wrapper { 
                flex-direction: row; /* Volta a ficar lado a lado */
                gap: 25px; 
                padding: 20px 0;
            }
            .game-card { border-radius: 30px; border-width: 5px; padding: 15px; }
            .game-card h2 { font-size: 1.4rem; margin-top: 10px; }
            footer { font-size: 0.8rem; padding: 15px; }
        }

        /* ESCONDER VOLTAR NO TOPO EM TELEMÓVEIS */
        @media (max-width: 600px) {
            header { grid-template-columns: 50px 1fr; }
            .header-right { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="hamburger-btn" onclick="toggleMenu(event)">
                <i class="fas fa-bars"></i>
            </button>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>

        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1" style="color: var(--primary-blue);"></span> 
                    <span id="txt-titulo2" style="color: #a5b4c4;"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>

        <div class="header-right">
            <div onclick="voltarUmNivel()" class="btn-voltar-topo">
                <img id="icon-voltar-topo" src="" alt="Voltar">
                <span>VOLTAR</span>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function voltarUmNivel() {
            window.location.href = "../";
        }

        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => document.getElementById('dropdownMenu').style.display = 'none';

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;
                document.getElementById('icon-voltar-topo').src = config.caminhoIconsMenu + config.iconesMenu.voltar;

                const menuBox = document.getElementById('dropdownMenu');
                const labels = { home: "Início", pre: "Pré-Escolar", ano1: "1º Ano", ano2: "2º Ano", ano3: "3º Ano", ano4: "4º Ano" };

                Object.keys(config.links).forEach(key => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = config.links[key];
                    a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[key]}"> <span>${labels[key] || key}</span>`;
                    menuBox.appendChild(a);
                });

                const btnVoltarMenu = document.createElement('a');
                btnVoltarMenu.className = 'menu-item btn-voltar-menu';
                btnVoltarMenu.href = "javascript:voltarUmNivel()";
                btnVoltarMenu.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu.voltar}"> <span>VOLTAR</span>`;
                menuBox.appendChild(btnVoltarMenu);

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const tema = config.temaCores[jogo.tema] || { borda: "#ccc", fundo: "#f5f5f5" };
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.borderColor = tema.borda;
                    card.innerHTML = `
                        <div class="card-img-container" style="background-color: ${tema.fundo};">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
