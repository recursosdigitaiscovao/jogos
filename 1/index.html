<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Disciplinas</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Fundo com gradiente e um padrão de bolinhas suave */
            background-color: #ff9f43;
            background-image: radial-gradient(#ffb167 2px, transparent 2px);
            background-size: 30px 30px;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Animação de entrada para o emoji principal */
        .emoji-principal {
            font-size: 90px;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            font-weight: 900;
        }

        .subtitulo {
            font-size: 1.3rem;
            margin-bottom: 40px;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        /* Contentor das Disciplinas */
        .menu-disciplinas {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 500px;
        }

        .btn-disciplina {
            background-color: white;
            text-decoration: none;
            font-size: 2rem;
            font-weight: 800;
            padding: 30px;
            border-radius: 35px;
            /* Sombra tipo 3D */
            box-shadow: 0 10px 0 #e67e22, 0 15px 25px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
            border: 4px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        /* Efeito de hover (passar o rato ou toque longo) */
        .btn-disciplina:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 0 #e67e22, 0 20px 30px rgba(0,0,0,0.15);
        }

        /* Cores e Bordas específicas */
        .portugues { 
            color: #2980b9; 
            border-color: #d1e9f7;
        } 
        
        .matematica { 
            color: #c0392b; 
            border-color: #f9d5d2;
        }

        .btn-disciplina span {
            font-size: 2.5rem;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }

        /* Efeito de clique (afundar) */
        .btn-disciplina:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #e67e22, 0 5px 10px rgba(0,0,0,0.1);
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 60px;
            text-decoration: none;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.2);
            padding: 12px 25px;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .btn-voltar:hover {
            background: rgba(255,255,255,0.3);
        }

        footer {
            margin-top: auto;
            padding-top: 50px;
            opacity: 0.9;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Ajuste para tablets e computadores */
        @media (min-width: 700px) {
            .menu-disciplinas {
                flex-direction: row;
                max-width: 800px;
            }
            .btn-disciplina { 
                flex: 1; 
                flex-direction: column;
                padding: 40px 20px;
            }
            .btn-disciplina span {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🐣</div>
    
    <h1>1º Ano</h1>
    <p class="subtitulo">Olá, explorador! O que vamos aprender hoje?</p>

    <div class="menu-disciplinas">
        <a href="pt/" class="btn-disciplina portugues">
            <span>📚</span>
            Português
        </a>

        <a href="mat/" class="btn-disciplina matematica">
            <span>🧮</span>
            Matemática
        </a>
    </div>

    <a href="../" class="btn-voltar">
        ⬅ Voltar
    </a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
