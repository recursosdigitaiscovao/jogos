<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Disciplinas</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ff9f43;
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Efeito de flutuação para tornar os ícones vivos */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .emoji-principal {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitulo {
            font-size: 1.1rem;
            margin-bottom: 25px;
            max-width: 450px;
            opacity: 0.9;
        }

        .menu-disciplinas {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .btn-disciplina {
            background-color: white;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 900;
            padding: 20px 10px;
            border-radius: 30px;
            box-shadow: 0 8px 0 #e67e22;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Estilização das imagens dos ícones */
        .icon-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        .portugues { color: #2980b9; } 
        .matematica { color: #c0392b; }
        .estudo-meio { color: #27ae60; }

        .btn-disciplina:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #e67e22;
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 30px;
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 2px solid white;
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            opacity: 0.8;
            font-size: 0.8rem;
        }

        @media (min-width: 700px) {
            .menu-disciplinas {
                flex-direction: row;
                max-width: 900px;
                gap: 25px;
            }
            .btn-disciplina { 
                flex: 1; 
                padding: 40px 20px;
                font-size: 1.6rem;
            }
            .icon-img {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

    <img src="https://cdn-icons-png.flaticon.com/512/4644/4644148.png" class="emoji-principal" alt="Mascote">
    
    <h1>1º Ano</h1>
    <p class="subtitulo">Olá, pequenos exploradores! O que vamos aprender hoje?</p>

    <div class="menu-disciplinas">
        <a href="pt/" class="btn-disciplina portugues">
            <img src="https://cdn-icons-png.flaticon.com/512/3532/3532851.png" class="icon-img" alt="Português">
            Português
        </a>

        <a href="mat/" class="btn-disciplina matematica">
            <img src="https://cdn-icons-png.flaticon.com/512/3771/3771278.png" class="icon-img" alt="Matemática">
            Matemática
        </a>

        <a href="em/" class="btn-disciplina estudo-meio">
            <img src="https://cdn-icons-png.flaticon.com/512/826/826070.png" class="icon-img" alt="Estudo do Meio">
            Estudo do Meio
        </a>
    </div>

    <a href="../" class="btn-voltar">⬅ Voltar</a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
