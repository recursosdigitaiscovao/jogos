<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Disciplinas</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ff9f43; /* Mantive o Laranja do 1º Ano */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .emoji-principal {
            font-size: 80px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitulo {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
            opacity: 0.9;
        }

        /* Contentor das Disciplinas */
        .menu-disciplinas {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
        }

        .btn-disciplina {
            background-color: white;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 0 #e67e22;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Cores específicas para cada botão */
        .portugues { color: #2980b9; } /* Azul para Português */
        .matematica { color: #c0392b; } /* Vermelho para Matemática */

        .btn-disciplina:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #e67e22;
        }

        .btn-voltar {
            color: white;
            font-weight: bold;
            margin-top: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 2px solid white;
            padding-bottom: 2px;
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        @media (min-width: 600px) {
            .menu-disciplinas {
                flex-direction: row;
                max-width: 700px;
            }
            .btn-disciplina { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="emoji-principal">🐣</div>
    
    <h1>1º Ano</h1>
    <p class="subtitulo">Olá, pequenos exploradores! Escolham uma disciplina para começar:</p>

    <div class="menu-disciplinas">
        <a href="portugues/" class="btn-disciplina portugues">
            <span>📚</span> Português
        </a>

        <a href="matematica/" class="btn-disciplina matematica">
            <span>🧮</span> Matemática
        </a>
    </div>

    <a href="../" class="btn-voltar">
        ⬅ Voltar ao Menu Principal
    </a>

    <footer>
        Recursos Digitais Covão - Professor Luís
    </footer>

</body>
</html>
