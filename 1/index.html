<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovens Leitores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #e9f1f8; /* Fundo azul claro */
            --white: #ffffff;
            --primary-blue: #5ba4e5;
            --text-grey: #7a8b9a;
            --orange-btn: #ff7043;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { background-color: var(--bg-body); min-height: 100vh; display: flex; flex-direction: column; }

        /* 1. HEADER (TOPO) */
        header { 
            background: var(--white);
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center; 
            padding: 10px 20px;
        }

        .hamburger-btn { font-size: 24px; color: var(--primary-blue); cursor: pointer; }

        .header-center { display: flex; flex-direction: column; align-items: center; text-align: center; }
        #header-icon { height: 60px; margin-bottom: 5px; }
        .title-main { color: var(--primary-blue); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; line-height: 1; }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.75rem; margin-top: 4px; }

        /* BOTÃO VOLTAR LARANJA */
        .btn-voltar {
            background-color: var(--orange-btn);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        /* 2. SUB-HEADER (ÁREA BRANCA COM CURVA) */
        .sub-header {
            background: var(--white);
            text-align: center;
            padding: 20px 10px 50px 10px;
            border-bottom-left-radius: 50% 30px;
            border-bottom-right-radius: 50% 30px;
            box-shadow: 0px 10px 15px rgba(0,0,0,0.02);
            z-index: 10;
        }
        .intro-text { color: #5d7082; font-size: 1rem; font-weight: 700; }

        /* 3. MAIN (ÁREA DOS CARTÕES - FUNDO AZUL) */
        main { flex: 1; padding: 40px 20px; display: flex; justify-content: center; }

        .game-wrapper { 
            width: 100%;
            max-width: 1100px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        /* ESTILO DOS CARTÕES IGUAL À IMAGEM */
        .game-card { 
            background: var(--white);
            border-radius: 30px; 
            border: 6px solid #ccc; /* Cor injetada pelo JS */
            text-decoration: none; 
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
            aspect-ratio: 1 / 1.1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .game-card:hover { transform: translateY(-8px); }

        .card-img-container { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
        }
        .card-img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        
        .game-card h2 { 
            color: #002d58; 
            font-size: 1.3rem; 
            font-weight: 900; 
            margin-top: 15px;
        }

        /* MENU DROPDOWN */
        .menu-dropdown { 
            position: absolute; top: 60px; left: 20px; 
            display: none; flex-direction: column; gap: 8px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 15px; 
            background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-decoration: none; color: #5d7082; font-weight: 700; font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            header { grid-template-columns: 50px 1fr 50px; }
            .btn-voltar span { display: none; }
            .game-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars hamburger-btn" onclick="toggleMenu(event)"></i>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>

        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="header-titles">
                <div class="title-main">
                    <span id="txt-titulo1"></span> 
                    <span id="txt-titulo2" style="color: #a5b4c4;"></span>
                </div>
                <div id="txt-subtitulo" class="title-sub"></div>
            </div>
        </div>

        <div class="header-right">
            <a href="javascript:history.back()" class="btn-voltar">
                <i class="fas fa-arrow-left"></i> <span>Voltar</span>
            </a>
        </div>
    </header>

    <!-- ÁREA BRANCA SUB-HEADER -->
    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <!-- ÁREA AZUL DOS JOGOS -->
    <main>
        <div class="game-wrapper" id="gamesGrid">
            <!-- Gerado via JS -->
        </div>
    </main>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => document.getElementById('dropdownMenu').style.display = 'none';

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // 1. Textos e Ícone Header
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano2;

                // 2. Menu Dropdown
                const menuBox = document.getElementById('dropdownMenu');
                Object.keys(config.links).forEach(key => {
                    const item = document.createElement('a');
                    item.className = 'menu-item';
                    item.href = config.links[key];
                    item.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[key]}" width="20"> <span>${key}</span>`;
                    menuBox.appendChild(item);
                });

                // 3. Gerar Cartões da Lista de Jogos
                const grid = document.getElementById('gamesGrid');
                
                // Mapeamento de cores para os temas
                const cores = {
                    "Português": "#5ba4e5",      // Azul
                    "Matemática": "#58bc8c",     // Verde
                    "Estudo do Meio": "#e85a5a"  // Vermelho
                };

                config.listaJogos.forEach(jogo => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    
                    // Aplica a cor baseada no nome ou cinza se não encontrar
                    const corBorda = cores[jogo.nome] || "#cccccc";
                    card.style.borderColor = corBorda;

                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
