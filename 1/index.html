<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pequenos Exploradores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #fbfdff;    
            --sub-header-bg: #ffffff; 
            --body-bg: #e9f1f8;       
            --primary-blue: #5ba4e5;
            --primary-dark: #3d7db8; 
            --text-grey: #7a8b9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden; 
        }

        body { 
            background-color: var(--body-bg); 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER */
        header { 
            background: var(--header-bg);
            display: grid;
            grid-template-columns: 60px 1fr auto;
            align-items: center; 
            padding: 0 20px;
            min-height: 85px; 
            flex-shrink: 0;
            z-index: 2500;
            box-shadow: 0px 4px 15px rgba(176, 196, 217, 0.4);
            position: relative;
        }

        /* Hambúrguer 32px como o anterior */
        .hamburger-btn { 
            font-size: 32px; 
            color: var(--primary-blue); 
            cursor: pointer; 
            background: none; 
            border: none;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .header-center { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #header-icon { height: 50px; width: auto; }
        
        /* CORREÇÃO: Títulos em linhas separadas */
        .title-group { display: flex; flex-direction: column; justify-content: center; }
        .title-main { 
            font-weight: 900; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            display: flex; 
            flex-direction: column; /* Força uma palavra por cima da outra */
            line-height: 0.9; /* Deixa as palavras mais próximas como no anterior */
        }
        .title-sub { color: #7A8B9A; font-weight: 700; font-size: 9px; text-transform: uppercase; margin-top: 4px; }

        .header-right { padding-left: 10px; }

        /* Botão Voltar 3D Estilo Anterior */
        .btn-voltar-topo {
            display: flex; 
            align-items: center; 
            gap: 8px;
            background: var(--primary-blue); 
            color: white; 
            text-decoration: none;
            padding: 10px 20px; 
            border-radius: 14px; 
            font-weight: 900; 
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--primary-dark);
            transition: 0.1s;
            border: none;
        }
        .btn-voltar-topo:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 var(--primary-dark); 
        }
        .btn-voltar-topo img { height: 16px; width: auto; filter: brightness(0) invert(1); }

        /* MENU DROPDOWN */
        .menu-dropdown { 
            position: absolute; top: 75px; left: 15px; display: none; 
            flex-direction: column; gap: 8px; z-index: 3000; 
        }
        
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 18px; 
            background: white; border-radius: 15px; box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
            text-decoration: none; color: #5d7082; font-weight: 700; font-size: 0.9rem; min-width: 200px;
            transition: 0.2s;
        }
        .menu-item:hover { background: var(--primary-blue); color: white; }
        .menu-item img { height: 22px; width: 22px; object-fit: contain; }
        .menu-item.btn-voltar-menu { background: var(--primary-blue); color: white; }
        .menu-item.btn-voltar-menu img { filter: brightness(0) invert(1); }

        /* SUB-HEADER */
        .sub-header {
            background: var(--sub-header-bg); text-align: center; padding: 12px;
            border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.03); flex-shrink: 0;
        }
        .intro-text { color: #5d7082; font-size: 0.9rem; font-weight: 700; }

        /* ÁREA CENTRAL */
        main { flex: 1; padding: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .game-wrapper { display: flex; flex-direction: column; gap: 12px; width: 100%; height: 100%; max-width: 500px; }

        /* CARTÕES */
        .game-card { 
            background: white; border-radius: 25px; border: 2px solid #e0eaf2; 
            text-decoration: none; padding: 12px; display: flex; flex-direction: column; 
            align-items: center; flex: 1; min-height: 0; box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .card-img-container { 
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; 
            border-radius: 18px; background-color: #f8fbff; margin-bottom: 8px; min-height: 0;
        }
        .card-img-container img { max-height: 80%; max-width: 80%; object-fit: contain; }
        .game-card h2 { color: var(--primary-blue); font-size: 0.85rem; font-weight: 900; text-transform: uppercase; }

        footer { padding: 10px; text-align: center; color: var(--text-grey); font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }

        @media (min-width: 768px) {
            header { min-height: 100px; }
            #header-icon { height: 60px; }
            .title-main { font-size: 1.5rem; }
            .game-wrapper { flex-direction: row; height: auto; max-height: 450px; max-width: 1100px; gap: 25px; }
            .game-card h2 { font-size: 1.1rem; }
        }

        @media (max-width: 600px) {
            header { grid-template-columns: 50px 1fr; }
            .header-right { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="hamburger-btn" onclick="toggleMenu(event)">
                <i class="fas fa-bars"></i>
            </button>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>

        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1" style="color: var(--primary-blue);"></span> 
                    <span id="txt-titulo2" style="color: #a5b4c4;"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>

        <div class="header-right">
            <button onclick="voltarUmNivel()" class="btn-voltar-topo">
                <img id="icon-voltar-topo" src="" alt="Voltar">
                <span>VOLTAR</span>
            </button>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function voltarUmNivel() { window.location.href = "../"; }

        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => document.getElementById('dropdownMenu').style.display = 'none';

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;
                document.getElementById('icon-voltar-topo').src = config.caminhoIconsMenu + config.iconesMenu.voltar;

                const menuBox = document.getElementById('dropdownMenu');
                const labels = { home: "Início", pre: "Pré-Escolar", ano1: "1º Ano", ano2: "2º Ano", ano3: "3º Ano", ano4: "4º Ano" };

                Object.keys(config.links).forEach(key => {
                    if(config.links[key]) {
                        const a = document.createElement('a');
                        a.className = 'menu-item';
                        a.href = config.links[key];
                        a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[key]}"> <span>${labels[key] || key}</span>`;
                        menuBox.appendChild(a);
                    }
                });

                const btnVoltarMenu = document.createElement('a');
                btnVoltarMenu.className = 'menu-item btn-voltar-menu';
                btnVoltarMenu.href = "javascript:voltarUmNivel()";
                btnVoltarMenu.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu.voltar}"> <span>VOLTAR</span>`;
                menuBox.appendChild(btnVoltarMenu);

                const grid = document.getElementById('gamesGrid');
                config.listaJogos.forEach(jogo => {
                    const tema = config.temaCores[jogo.tema] || { borda: "#e0eaf2", fundo: "#f8fbff" };
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.borderColor = tema.borda;
                    card.innerHTML = `
                        <div class="card-img-container" style="background-color: ${tema.fundo};">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
