<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequenos Exploradores</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f0f5fa;    
            --sub-header-bg: #ffffff; 
            --body-bg: #e9f1f8;       
            --primary-blue: #5ba4e5;
            --text-grey: #7a8b9a;
            --voltar-bg: #5ba4e5; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--body-bg); min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER */
        header { 
            background: var(--header-bg);
            display: grid;
            grid-template-columns: 60px 1fr auto;
            align-items: center; 
            padding: 10px 20px;
            min-height: 100px; 
            position: relative;
        }

        .hamburger-btn { font-size: 28px; color: var(--primary-blue); cursor: pointer; background: none; border: none; }

        /* TÍTULO EMPILHADO */
        .header-center { display: flex; align-items: center; justify-content: center; gap: 12px; }
        #header-icon { height: 65px; width: auto; }
        .title-group { text-align: left; line-height: 1.1; }
        .title-main { 
            font-weight: 900; font-size: 1.3rem; text-transform: uppercase; 
            display: flex; flex-direction: column; /* Título 2 por baixo do 1 */
        }
        .title-sub { color: var(--text-grey); font-weight: 700; font-size: 0.75rem; display: block; margin-top: 2px; }

        /* BOTÃO VOLTAR (DIREITA) */
        .header-right { padding-left: 10px; }
        .btn-voltar-topo {
            display: flex; align-items: center; gap: 8px;
            background: var(--voltar-bg); color: white; text-decoration: none;
            padding: 10px 18px; border-radius: 15px; font-weight: 800; font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-voltar-topo img { height: 18px; filter: brightness(0) invert(1); }

        /* MENU DROP */
        .menu-dropdown { 
            position: absolute; top: 75px; left: 20px; display: none; 
            flex-direction: column; gap: 10px; z-index: 2000; 
        }
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            background: white; border-radius: 15px; box-shadow: 4px 4px 10px rgba(0,0,0,0.05);
            text-decoration: none; color: var(--text-grey); font-weight: 700; min-width: 190px;
        }

        /* SUB-HEADER CURVO */
        .sub-header {
            background: var(--sub-header-bg); text-align: center; padding: 18px;
            border-bottom-left-radius: 50% 50px; border-bottom-right-radius: 50% 50px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.03); z-index: 5;
        }
        .intro-text { color: #5d7082; font-size: 1rem; font-weight: 700; }

        /* GRID DE JOGOS */
        main { flex: 1; padding: 40px 20px; display: flex; justify-content: center; }
        .game-wrapper { 
            width: 100%; max-width: 1100px; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; 
        }

        /* ESTILO DOS CARTÕES (CONFORME A IMAGEM) */
        .game-card { 
            background: white; 
            border-radius: 35px; 
            border: 5px solid #ccc; /* Cor injetada pelo JS */
            text-decoration: none; 
            padding: 18px; /* Espaço para a moldura branca */
            display: flex; flex-direction: column; align-items: center;
            aspect-ratio: 1 / 1.1; transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .game-card:hover { transform: translateY(-8px); }

        .card-img-container { 
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; 
            border-radius: 25px; 
            background-color: #f0f0f0; /* Cor injetada pelo JS */
            margin-bottom: 15px;
        }
        .card-img-container img { max-width: 75%; max-height: 75%; object-fit: contain; }
        
        .game-card h2 { color: #002d58; font-size: 1.5rem; font-weight: 900; }

        footer { padding: 25px; text-align: center; color: var(--text-grey); font-size: 0.8rem; font-weight: 700; }

        /* RESPONSIVIDADE */
        @media (max-width: 600px) {
            header { grid-template-columns: 60px 1fr; }
            .header-right { display: none; } /* Esconde o botão voltar em ecrãs pequenos */
            .title-main { font-size: 1.1rem; }
            #header-icon { height: 50px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="hamburger-btn" onclick="toggleMenu(event)">
                <i class="fas fa-bars"></i>
            </button>
            <div id="dropdownMenu" class="menu-dropdown"></div>
        </div>

        <div class="header-center">
            <img id="header-icon" src="" alt="Logo">
            <div class="title-group">
                <div class="title-main">
                    <span id="txt-titulo1" style="color: var(--primary-blue);"></span> 
                    <span id="txt-titulo2" style="color: #a5b4c4;"></span>
                </div>
                <span id="txt-subtitulo" class="title-sub"></span>
            </div>
        </div>

        <div class="header-right">
            <a href="javascript:history.back()" class="btn-voltar-topo">
                <img id="icon-voltar-topo" src="" alt="Voltar">
                <span>VOLTAR</span>
            </a>
        </div>
    </header>

    <div class="sub-header">
        <div id="txt-intro" class="intro-text"></div>
    </div>

    <main>
        <div class="game-wrapper" id="gamesGrid"></div>
    </main>

    <footer id="txt-rodape"></footer>

    <script src="dados.js"></script>
    <script>
        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        window.onclick = () => document.getElementById('dropdownMenu').style.display = 'none';

        window.onload = () => {
            if (typeof JOGO_CONFIG !== 'undefined') {
                const config = JOGO_CONFIG;
                
                // 1. Textos e Ícones
                document.getElementById('txt-titulo1').innerText = config.textos.tituloLinha1;
                document.getElementById('txt-titulo2').innerText = config.textos.tituloLinha2;
                document.getElementById('txt-subtitulo').innerText = config.textos.subtitulo;
                document.getElementById('txt-intro').innerText = config.textos.intro;
                document.getElementById('txt-rodape').innerHTML = config.textos.rodape;
                document.getElementById('header-icon').src = config.caminhoIconsMenu + config.iconesMenu.ano1;
                document.getElementById('icon-voltar-topo').src = config.caminhoIconsMenu + config.iconesMenu.voltar;

                // 2. Menu Dropdown
                const menuBox = document.getElementById('dropdownMenu');
                const labels = { home: "Início", pre: "Pré-Escolar", ano1: "1º Ano", ano2: "2º Ano", ano3: "3º Ano", ano4: "4º Ano" };

                Object.keys(config.links).forEach(key => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.href = config.links[key];
                    a.innerHTML = `<img src="${config.caminhoIconsMenu}${config.iconesMenu[key]}"> <span>${labels[key] || key}</span>`;
                    menuBox.appendChild(a);
                });

                // 3. Gerar Cartões de Jogos usando as cores do dados.js
                const grid = document.getElementById('gamesGrid');

                config.listaJogos.forEach(jogo => {
                    // Vai buscar o tema de cor definido no dados.js ou usa cinzento como padrão
                    const tema = config.temaCores[jogo.tema] || { borda: "#ccc", fundo: "#f5f5f5" };
                    
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = jogo.link;
                    card.style.borderColor = tema.borda; // Aplica a cor da moldura
                    
                    card.innerHTML = `
                        <div class="card-img-container" style="background-color: ${tema.fundo};">
                            <img src="${config.caminhoIconsJogos}${jogo.icon}" alt="${jogo.nome}">
                        </div>
                        <h2>${jogo.nome}</h2>
                    `;
                    grid.appendChild(card);
                });
            }
        };
    </script>
</body>
</html>
