<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Disciplinas</title>
    <!-- Fonte Fredoka para o aspeto lúdico -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ano1: #e6a75a; /* A cor vibrante solicitada */
            --portugues: #4b7bec;
            --matematica: #eb3b5a;
            --estudo-meio: #20bf6b;
        }

        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--ano1); 
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER - ESTILO DO 1º CÓDIGO */
        header {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 1.6rem;
            cursor: pointer;
            color: #2d3436;
        }

        header h1 {
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #2d3436;
            font-weight: 700;
        }

        /* BOTÃO VOLTAR 3D - ESTILO DO 1º CÓDIGO */
        .btn-voltar-3d-laranja {
            text-decoration: none;
            color: white;
            background-color: var(--ano1);
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #c98a3d; 
            box-shadow: 0 3px 0 #c98a3d;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        .btn-voltar-3d-laranja:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #c98a3d;
        }

        /* Sidebar & Overlay */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: var(--ano1); margin-bottom: 20px; border-bottom: 3px solid var(--ano1); padding-bottom: 5px; }
        .sidebar-item {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .sidebar-item:hover { background: #fff4e6; color: var(--ano1); }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* ÁREA PRINCIPAL - ESTILO PORTAL DIVERTIDO */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 20px;
        }

        .emoji-principal {
            font-size: clamp(3rem, 10vh, 5rem);
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitulo {
            font-size: clamp(1rem, 3vh, 1.3rem);
            font-weight: 700;
            color: white;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.15);
        }

        /* GRID DISCIPLINAS - ESTILO CARTÕES (CÓDIGO 2) */
        .grid-disciplinas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 900px;
            height: 45%; 
        }

        .card-disciplina {
            background: white;
            text-decoration: none;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            font-weight: 700;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            padding: 15px;
        }

        .card-disciplina:hover {
            transform: scale(1.05) rotate(1deg);
        }

        .card-disciplina span.icon { 
            font-size: clamp(2.5rem, 7vh, 4.5rem); 
        }

        .portugues { background-color: var(--portugues); }
        .matematica { background-color: var(--matematica); }
        .estudo-meio { background-color: var(--estudo-meio); }

        /* FOOTER - ESTILO DO 1º CÓDIGO */
        footer {
            width: 100%;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            text-align: center;
            color: #2d3436;
            font-size: 0.85rem;
            font-weight: 500;
            flex-shrink: 0;
        }

        @media (max-width: 700px) {
            .grid-disciplinas { 
                grid-template-columns: 1fr; 
                height: 55%;
                max-width: 350px;
            }
            .card-disciplina { 
                flex-direction: row; 
                justify-content: flex-start;
                padding-left: 30px;
                border-radius: 20px;
                gap: 20px;
                height: 75px;
            }
            .card-disciplina span.icon { font-size: 2.2rem; }
            .emoji-principal { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Navegação 🚀</h3>
        <nav>
            <a href="../" class="sidebar-item"><span>🏠</span> Início</a>
            <a href="../pre" class="sidebar-item"><span>🦒</span> Pré-Escolar</a>
            <a href="../1" class="sidebar-item" style="background: #fff4e6; color: var(--ano1);"><span>🐥</span> 1º Ano</a>
            <a href="../2" class="sidebar-item"><span>🐢</span> 2º Ano</a>
            <a href="../3" class="sidebar-item"><span>🦊</span> 3º Ano</a>
            <a href="../4" class="sidebar-item"><span>👨‍🚀</span> 4º Ano</a>
        </nav>
        <button onclick="toggleMenu()" style="margin-top:auto; padding:12px; border:none; background:#f8f9fa; cursor:pointer; font-weight:bold; border-radius:12px; color:#636e72;">Fechar ×</button>
    </div>

    <!-- HEADER DO 1º CÓDIGO -->
    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <h1>Menu do 1º Ano</h1>
        </div>
        <a href="../" class="btn-voltar-3d-laranja">
            <span>⬅</span> VOLTAR
        </a>
    </header>

    <main>
        <div class="emoji-principal">🐥</div>
        <p class="subtitulo">Olá, exploradores!<br>O que vamos aprender hoje?</p>

        <div class="grid-disciplinas">
            <a href="pt/" class="card-disciplina portugues">
                <span class="icon">📚</span>
                <span>Português</span>
            </a>

            <a href="mat/" class="card-disciplina matematica">
                <span class="icon">🧮</span>
                <span>Matemática</span>
            </a>

            <a href="em/" class="card-disciplina estudo-meio">
                <span class="icon">🌍</span>
                <span>Estudo do Meio</span>
            </a>
        </div>
    </main>

    <!-- FOOTER DO 1º CÓDIGO -->
    <footer>
        Recursos Digitais Covão • <strong>Professor Luís</strong>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
