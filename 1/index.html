<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogos - 1º Ano</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7f50;
            --vibrant-orange: #ff6b1a;
            --soft-orange: #fff5e6;
            --cor-texto: #8c5d40;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--soft-orange);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            width: 100%;
            padding: 30px 10px 50px 10px; 
            text-align: center;
            background: white;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 10px 30px rgba(255, 107, 26, 0.1);
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }

        .btn-voltar {
            position: absolute;
            right: 20px;
            top: 25px;
            background-color: var(--vibrant-orange);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 107, 26, 0.3);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 20;
        }

        .btn-voltar:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        h1 {
            white-space: nowrap;
            font-size: clamp(1.1rem, 5vh, 2.8rem);
            color: var(--vibrant-orange);
            text-shadow: 3px 3px 0px #ffe0cc;
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-text {
            color: #8c5d40;
            font-size: clamp(0.8rem, 2vh, 1.1rem);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 20px 25px; 
            overflow-y: auto;
        }

        .games-grid {
            display: grid;
            width: 100%;
            max-width: 1000px;
            gap: 20px;
            grid-template-columns: repeat(3, 1fr); 
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            border: 4px solid var(--vibrant-orange);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(255, 107, 26, 0.2);
        }

        .game-img-container {
            width: 100%; 
            height: clamp(80px, 15vh, 140px);
            background: var(--soft-orange);
            border-radius: 18px; 
            margin-bottom: 12px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        .game-img-container img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        h2 { 
            font-size: 1.1rem; 
            color: var(--cor-texto); 
            margin-bottom: 15px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            background: var(--vibrant-orange);
            color: white; 
            border: none; 
            padding: 12px 0;
            width: 100%; 
            border-radius: 15px;
            font-size: 0.9rem; 
            cursor: pointer; 
            font-family: 'Fredoka'; 
            font-weight: bold;
            transition: 0.2s;
            text-decoration: none;
            display: block;
        }

        .play-btn:hover {
            filter: brightness(1.1);
        }

        footer {
            background: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1rem;
            color: #777;
            font-weight: normal; 
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        /* --- AJUSTES PARA TELEMÓVEL (MENOS ALTURA) --- */
        @media (max-width: 800px) {
            h1 { font-size: clamp(1rem, 5.5vw, 1.5rem); }

            .btn-voltar {
                padding: 5px 10px;
                font-size: 0.75rem;
                top: 15px;
                right: 10px;
            }

            header { 
                padding: 20px 10px 35px 10px; 
                border-bottom-left-radius: 50% 10%;
                border-bottom-right-radius: 50% 10%;
            }

            .games-grid {
                grid-template-columns: 1fr;
                max-width: 260px; /* Reduzi ligeiramente a largura para o cartão parecer mais compacto */
                gap: 10px; /* Menos espaço entre cartões */
            }
            
            main {
                align-items: flex-start;
                padding-top: 15px;
            }

            /* Redução de alturas no telemóvel */
            .game-card {
                padding: 10px; /* Menos preenchimento interno */
            }

            .game-img-container {
                height: 70px; /* Altura fixa menor para a imagem */
                margin-bottom: 8px;
            }

            h2 {
                font-size: 0.95rem;
                margin-bottom: 8px;
                min-height: auto; /* Remove a altura mínima para encolher */
            }

            .play-btn {
                padding: 8px 0; /* Botão mais baixo */
                font-size: 0.8rem;
            }
        }

        @media (max-height: 550px) {
            .header-text { display: none; }
            header { padding: 10px 0 20px 0; }
            .btn-voltar { top: 5px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../" class="btn-voltar">
            <span>⬅</span> Voltar
        </a>
        
        <h1><span>🐥</span> Jogos do 1º Ano <span style="font-size: 0.8em;">✨</span></h1>
        <p class="header-text">O que vamos aprender hoje?</p>
    </header>

    <main>
        <div class="games-grid">
            <!-- Português -->
            <div class="game-card">
                <div class="game-img-container">
                    <img src="img/pt.png" alt="Português">
                </div>
                <h2>Português</h2>
                <a href="/pt" class="play-btn">JOGAR</a>
            </div>

            <!-- Matemática -->
            <div class="game-card">
                <div class="game-img-container">
                    <img src="img/mat.png" alt="Matemática">
                </div>
                <h2>Matemática</h2>
                <a href="/mat" class="play-btn">JOGAR</a>
            </div>

            <!-- Estudo do Meio -->
            <div class="game-card">
                <div class="game-img-container">
                    <img src="img/em.png" alt="Estudo do Meio">
                </div>
                <h2>Estudo do Meio</h2>
                <a href="/em" class="play-btn">JOGAR</a>
            </div>
        </div>
    </main>

    <footer>
        Recursos Digitais Covão
    </footer>

</body>
</html>
